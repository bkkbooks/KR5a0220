front:
  text: 靈寶無量度人上經大法卷之三十六麗六
  hash: sha256:cc4456c800e8be683da8389b228d9638eb3cb1824168a7c10cd73208a7fb684c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_036-001a, image: hfl/0092/0092-004.png}
body:
  text: 祛妖極厄品夫大法旨要有三局一則行呪二則行符三則行法呪者上天之密語也群真萬靈隨呪呼召隨氣下降符者上天之合契也群真隨符攝召下降法者主其司局仙曹自有群真百靈各效其職必假符呪呼之而來遣之而去是曰三局又有四報一則智報二則神報三則意報四則仙報智報者智慧日生神報者神靈通達意識不凡致於仙報又有七禁一則禁其口二則禁其目三則禁其耳四則禁其手五則禁其足六則禁其意七則禁其思口不罵詈作穢言則呪法通靈目不窺穢觸則目可視真靈耳不聽淫聲則耳能聽法音手不親穢物則訣目可通神足不履穢惡則躡罡可飛升意不起穢識則可招致真仙思不起雜亂則存思致神明是名七禁又有五忌一忌抱嬰乳小兒使法力不行二忌無事親姮娥好事多成魔三忌凶悖怒神真即逺去四忌心不普功德無仙簿五忌不敬信則邪混於正若能先明三局後明四報無犯七禁謹行五忌可以尋大法玄閫妙域矣凡學士行此大法多致群魔所惱遂致敗功獲罪但持誦金闕玄元道君滅九十六種外道一百八十種天魔智慧神呪曰天地雜氣生諸妖邪常以正道除去氛祲第一思惟無我無主諸法皆空不可轉相一實境界飛魔鬼神知所住處實知方便假空有故法性理旌湛然常住無有來去一知實故二知魔故三知相故四分别空元亨利貞邪不干正臨兵鬪者列陳前行急急如律令右法先叩齒十二通密誦不拘遍數所有諸魔應時發善念稽首於座下若欲除滅即廣持遍數其魔皆遁走隨呪消化上元重明九斗陽芒火鈴真符火鈴炎神炎神火鈴火鈴上通紫炎精極下徹黃微却妖錬魄赤帝之靈二神三台流光魄煉魂康萬妖上元賜福煉形易質殂落成煙飛揚天官中元赦罪地官下元解厄水官天蓬都元帥天猷副元帥翊聖保德真君佑聖真武靈應真君子至亥十二時直精神一得洞主者魁𩲃𩵄䰢魓𩳐魒入火鄉混合九氣總昊天流金震芒九元急急契虛皇有勑豁落貞利無彊急斬結空成梵真氣自生赤書玉字八威龍文治病斬邪萬生安寧保制劫運使天尊存急急如律令凡書符用黃素朱書南向左手搯玉帝訣念玄真諱亦曰玉音攝氣靈書曰祖道玄真炷香凝神雜丹筆引太陽九芒下降紙筆却依法次第發筆書不可失次第右符治木怪石精赤妖凶醜擾害民物鐵板丹篆以火鈴印其上埋本處土下尺餘其魔妖匿影登度道真若羽鳥群集穢汚福地林嶺當啓南嶽朱明赤帝作符遣之亦可施人吞佩此符先書火鈴二字次竪三筆於火鈴字上川呪自炎精至易質次橫纏五筆於三竪劃上之呪自魄錬至飛揚次轉十九回於五橫劃右下呪自三官至七星次曲轉三劃孑孑孑發上次第發于符上之中筆尾左出呪自洞入至虛皇次書勑字于符左下力腳帶過呪昊天有敕次作三回筆各出向右呪自流金至無彊次發二筆於符之上祝云急急急次書斬字於勑字力腳內具法位上啓祝曰一氣宗神長生大君小兆某上祈真氣謹召流金火鈴飛天赤氣帝君佐吏文秀舒光耀明消魔印攝祝畢引太陽紫光九芒吹布丹砂及茟中各一遍然後澄心正坐炷香靜神凝思丹靈上宫赤帝吐絳光九道入兆頂中下灌神府洞徹如日次思三台華蓋星在泥丸中光映一形復想目中有炎精二神長三寸丹裳赤冠口吐火光二道自二目出與三台星光洞合於茟端閉氣書符至急急發訣吹氣於符上若得九錬丹砂書之可以回尸起死右法如法師自服氣太陽氣日出時兩手結玉帝訣目合掌對太陽念呪一遍以口鼻引咽之九次以意送下丹田約至二九三九以至九九遍再念日君呪曰日魂朱景照韜緑映回霞赤童玄炎飈像呪畢又呪曰鬱貞離取氣如前咽下丹元正午前行持又太隂氣如前行持但自上弦𥘉九後下弦前十六七取氣十九後不行念都呪畢再念月君呪曰月魄曖簫芬艷翳寥婉虛靈闌鬱華結翹淳金精瑩炅容臺標呪畢又呪曰結亨坎取氣如前咽下丹元又天罡氣如前行持靣朝正北念都呪取氣畢再念天罡呪天罡大聖日月尊星真氣降注延壽益生魁魁𩲃𩵄䰢魓𩳐魒急急如律令取氣如前咽下丹元服三光氣行事畢各叩齒九通退行之百日夜睡光明滿室中呵嗽則有神光可生物二百日結成日月星真丹在丹田呪百物如真紅色治病行符真氣所吹立安布氣治病令病者虛咽之則自覺丹田溫暖神驗行持自知之劉天師混康云書符日月君天罡呪各念三遍取氣吹筆端面東南篆之書符畢再呪各三遍灌注符中流金火鈴神印南宫有韓司火府中有赤文流火之章金真神印結丹霞之秀氣凝三光之赤文名曰丹天流金火鈴神印丹華映日金火騰輝檄龍召雷錬魂登真剪伐水怪驅蕩隂爽愈災却癘度厄辟病焚燒九醜降伏五魔右侍一氣丹華上吏三千人火鈴大將六百人金光神童一百二十人直印請暉隨印節度乃赤帝之總章韓君之火令祕於丹炎之府輝耀之臺以絳瓊作文封以元照靈虛之章三百年以印給付南宫之官佐化行功於下元者受之於心不示凡才妄泄罰以左官考印方面二寸一分厚七分用靈地神桃向南枝以丙丁日取木火日命工開成埋於居靖東南隅深入地七寸日用香一炷焚於印地上三禮無祝言而退至第七日取出以流水洗去土用香浴訖以真丹填齒置丹黃錦囊中札於肘後至丁日丁時面丁方丁步火鈴罡存見玉女真形六人呪曰魁𩲃𩵄䰢魓𩳐魒勑𩴑𩲙攝入印中急急如火鈴攝祝之六遍每遍取氣呵印上七日不得食猪肉及諸腥辛等第七日足入日甲曰甲時面甲方步火鈴罡存六甲神將真形呪曰魁𩲃𩵄䰢魓𩳐魒攝入印中安急急如火令攝祝之六遍每遍取氣吹印上二日不得食五味菜果油至第三日丙日至丙方步火鈴罡面日叩齒九通存日光覆印窄齒周旋九重呪曰吁貟童子召光鬱儀赤帝洞浮南閻吐輝玉眸詵詵萬惡沉沉臣奉師命不敢稽違光氣九纒丁甲隨持元皇口勑隂氣消糜祝八十一遍取氣八十一次賁印上至辰日戍時步火鈴罡面斗叩齒七通仰面祝曰陀羅育邈清光斗晨太一靈童魁罡元君元皇妙氣育印通真至靈至聖逢邪必應火鈴金光叱馘妖氛魁暉罡氣推滅萬凶一印福生元亨利貞祝四十九過取氣四十九次吹印上候有所治或封山君神檄龍馘妖鎮水渡波愈瘟消患並左手搯火鈴印步火鈴罡面南存心火如練入印齒穿印纒繞九重如赤光羅映畢即叩齒九通呪曰小兆臣某謹啓南上一氣宗神長生之君韓君司馬大神即降真氣入臣印中隨氣召降金真玉光八景大神火鈴大將開明靈童三氣上吏文秀舒光隨印節度烜赫天威焚蕩妖凶擲火前伐流鈴後奔風征火伐所印利貞玉帝上命神公奉行急急如火鈴律令祝畢口引上宫正氣布印上以印印之或印沙石沉埋水中地中或印素上吞佩或印封泥或印苦處皆可不過三作必寧忌穢氣干印干之印破不神用印訣右手中指根至離文自離文至甲下挑發入印中北帝火鈴印印符文外又能治寒中氣痛等疾左手捻離文右手執印去兆兩步以印文向之即稱法位上啓一氣宗神長生大君小兆某疾上祈真氣謹召流鈴飛昴赤氣帝君佐吏文秀舒光曜明消魔印攝引日芒浹心混合為一復徙鼻出穿印繞兆纏絡三四乃止其印勿置塵揉犯違正氣若遣者佐吏不降徒然精苦於存思捻左手離文則中指中節也亦曰日君訣凡本多以辰為日訣不知辰為天罡也夫黃氣陽精育魂洞濠煉明三氣故以離為日訣右手執印行持當令動止詳緩無使神氣驚浮範象巫者取笑俗情思日芒繞兆身彌羅三匝故曰纏絡三四火鈴罡滅大害世有狂邪鬼精分而滅之人死而靈者鬼也物之所附者精也神之不正者邪也四生興孽者妖也凶煞變現者怪也或有山魈大狐大蛇長蛟作害生人者即建三天總氣壇以二人持灰各一斛自乾方起首分左右布圖一周面方六尺壇外布火七堆水入甕六時登壇仗劒誦神公受命普掃不祥呪如本經自三十二天起至列言上清不及七日其害被天神伐滅擲壇中以劒揮之棄流水中如小醜小妖不用水火於壇中布灰書延由二字六時繞壇誦掃蕩呪不及三日其妖囚壇中有跡或見形即祝遣壇中天神束送北天治罪或伐怪木邪廟以灰圍書掃蕩呪安於東南方密誦十遍取天門氣擲玉清訣吹之不一旬天雷破伐水湫泉穴書呪石上沉之未沉亦誦呪如前不七日伐出蛟蜃更以符伐之立應書延由二字並右手搯玉清訣以第二指劃之俱不用文檄如以土築壇尤勝平地急用不待壇成三天總氣壇延由延束鬼之庭由禁鬼之房延者束鬼之庭由者禁鬼之房並禁制鬼神以灰一斗朱書二字於黃紙上置於灰中心其妖邪鬼神自非攝伏其中或沉水內以為水獄或安火中以為火獄變化由已凡置獄呪曰束鬼之延禁鬼之由鬼邪干真捉入禁囚變化自然無使稽留右呪搯玉清訣念呪東方氣吹符并吹獄內其餘制度依度厄消災式除火妖人生鬼物乃為旱魃犬生駝形名曰火妖雲烈赤霞氣蓊熱燠風聲如奔馬乃作火災當搯坎文以墨塗為皂絲縛五纏面北方存水星辰有五蒼氣鼻引入口閉氣五息呪曰金之子告子知火克母子救之急飛灑成河池海江宅舍火滅煙麋赤妖之精沉埋萬尺急急如元始天尊律令急呪五遍望火妖之方吐之即時炎災息禍火妖沉殞治水怪隂霧暴起雲現赤黃氣突如煙必致風電烈雷水怪作妖或江海之中隂雲黑氣赤是大風損物當先步火鈴罡促四山詇至戌上自戌上巡斗至辰辰文至上淸詇搯定以朱點之了用赤絲纏三遭搯定面南立頂中存元始天尊在泥丸宫默誦大梵隱語十遍移訣搯玉清訣面南存熒惑星芒如火鼻引入口閉氣三息呪曰赤皇氣三昧靈元尊勑水精傾祝訖望雲頭吐氣如此三呪水精墮地風雷不損於物六丁斬水怪符用方磚石一口不以大小朱書符呪曰六丁大神六丁玉女奉天符命誅斬怪物剜睛截爪取腦剖腹急急如靈寶符命玉清訣取旬中丁方氣吹投之六甲除厭魅符朱書黃上王清訣呪曰上方世界八千人下方持地四將軍三五吏兵除惡鬼四六童子守汝身汝左情龍右白虎上有朱雀下有玄武前有功曹後有主簿若有厭魅還本主須臾不去與天斧急急如元始天尊勑取旬中甲方氣吹符一符佩之一符焚於中庭一符燒灰水調灑一室中一符同烏梅一箇甘草三寸煎數沸圓作丸子吞之其厭魅之物皆吐之驅蝗朱湖符用桃木板八片各長二尺四寸闊三寸雌黃書符八道即用茶酒緋繒彩三分祭南方萬應真君朱湖使者長三十萬丈紅睛焦髮緋袍絳裙丹冠朱履遍身萬丈火光手持三昧又輪乘丹穴朱雀之氣從以萬禽隨後祝之曰禀奉元始教旨玉皇勑文祛除蟲怪斬絶蝗螟吾今召汝一如奉行蟲蝗父母蟲蝗子孫速須逺去不得久停一蟲違令化為微塵急急如太上律令勑即取氣吹符以劒埋於八方入地三尺有餘即蟲蝗應時散滅全成稼穡以積濟世之功上部三境真符玉清聖境上淸真境太淸仙境上天大帝九天都官捉鬼將吏玉皇上帝五方五帝五星真君合為縛鬼直將速降真氣氣隨符行田字筆行神鬼行筆住神鬼住神筆既住時刻不移敕符呪曰謹請太上玄皇妙道真君九天丈人仙宫僕射五嶽尊神速降真氣入臣符中隨符所敕鬼死人安急急如三昧真符敕右符搯三清訣朱書黃上天門氣吹又以後呪祝符五方氣吹燒灰水調下一切疾病一日三服立獲痊愈中部輔翼真符紫微北極天蓬大天猷副翊聖大帝敕煞元帥煞元帥煞保德真君煞佑聖靈應真君煞天關大神煞地軸火神煞開天徹地臨了照破邪魔照目敕符呪曰謹請九天雲路上清追