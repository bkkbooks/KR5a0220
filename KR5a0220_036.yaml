驅符到奉行急急如神霄玉敕如有凶惡不能治鬼神朱書黄上燒灰吹去即時捉下逺方搯神霄訣吹符以劒指其方邪去萬里取五方炁忌葷腥大治山魈五通慢易其符反招天災書符畢祝患人事由指揮神將一一當先自然先捉下候師至行遣鎭海符如度江海遇風欲傾覆即書鎭海符存北斗斗口𦋇頭罡星指前對鼻鼻對舟舩之首祝消禍呪七徧投鎭海符再祝安鎭呪一徧吹舩其風波立息消禍呪曰卷蓬卷蓬河伯導前立止蛟龍萬禍消滅天炁晴明急急如元始上帝勑命止波呪曰水神波神馮夷主者子胥神君波靜水寜天仙地神玉帝出遊龍伏虎潜水官奉敕我等安然急急如律令安鎭呪元始安鎭敷落五篇赤書玉字八威龍文保制劫運使天長存靈寳五斗符開天東斗主筭角亢門呪氏房心尾箕西斗記名奎婁胃昴畢觜參北斗落死井鬼栁星張翼軫南斗上生斗牛女虚危室壁中斗大魁總監衆東斗主筭西靈魁𩲃𩵄䰢魓𩳐魒斗記名南斗上生北斗落死中斗大魁總監衆靈青帝護魂白帝侍魄赤帝養炁黒帝通血黄帝中主萬神無越急急如元始上帝勑亶妻阿薈至幽寂度人急急如元始上帝勑發符呪曰元始靈書无量度人无文不光无文不明无文不立无文不生无所不辟无所不禳无所不度无所不成飛天下觀上帝遥唱萬神朝禮三界侍軒群妖束首鬼精自亡琳瑯振響十方肅清河海靜黙山嶽吞煙萬靈振伏招集群仙天无氛穢地无妖塵冥惠洞清大量玄玄也急急元始上帝勑右符以十直齋日齋戒焚香朱書青上玉清訣三天正炁吹隨兆意用之吞服佩帶安鎭木星祕授符九木星木徳眞君動必懷仁憫炁徳君見志願壽我千春急急如元始上帝勑右符治木衰肝病目疾増壽安魂召生炁朱書青上吞帶洗貼卯文東炁火星祕授符三火星火星眞君主張諸惡去炁徳君邪護眞愼勿交錯急急如元始上帝勑右符治火衰心病口病増壽安神去邪除惡召成炁朱書黄上吞帶洗貼離文南炁金星祕授符七金星金星眞君禍无常准蠢炁徳君動成形俱希含忍急急如元始上帝勑右符治金衰肺病鼻中疾增氣鎭魄召天炁朱書白上吞帶洗貼酉文西炁水星祕授符五水星水星眞君含育萬𩔖禍炁徳君福不差其功罔匱急急如元始七帝勑右符治水衰腎病耳病益精保元召正炁生津液止渴燥黒書青上吞帶洗貼坎文北炁土星祕授符二土星土星眞君隂弘至徳福炁徳君我蒼生長躋壽域急急如元始上帝勑右符治土衰草木不榮禾稼不育理脾胃之疾治唇面之病安鎭地土不動召和炁生血脉保益志誠朱書黄上吞帶貼鎭中指中文中斗炁發符呪曰五星列照煥明五方水星却災木德致昌熒惑消禍太白辟兵鎭星四據家國利亨急急如元始上帝勑右法存五星在五方煥明念呪取本星炁吹玉清訣二十八宿璇璣符角亢氐房心尾箕斗牛女虚危室壁奎婁胃昴畢觜參井鬼栁星張翼軫二十八劃念二十群星飛光環拱紫極八宿名四方炁吹普天兆民常懷至徳急急如元始上帝敕右符調理營衞保鎭身形除災度厄去邪攝妖召眞炁明耳目久服洞見鬼神朱書黄上玉清訣四方炁中斗總靈符魁𩲃𩵄䰢魓𩳐魒貪巨禄文廉武破樞璇璣權衡闓陽瑶光二十一劃念斗諱取中斗炁七星煌煌云云急急如元始上帝勅右符治一切疾病朱書於白𥿄上斗炁吹問病人何處疼痛痺腫以淨竹作針念日出東方呪取斗炁吹針了令病人吹炁三口於寳字符上以手自按病處師隨其病針寳字符手足頭身再令吹炁念呪吹押令咳嗽出針不三次立安却將元符燒灰水調服忌辛厭靈寳總治病符念前呪念前呪靈寳符命普恵萬生功加一切天地咸寜急急如元始上帝勑右符玉清訣東南炁朱書黄上吞帶燒灰淨水下治百病日精祕授符太陽帝君密太陽帝君杲杲髙邁萬𩔖仰之群動可頼急急如元始上帝日魂十六字左轉勑取太陽炁出筆月華祕授符太隂皇太隂皇君常弘至道隂徳不君膜𠎝福屇億兆急急如元始上帝月魄二十四字右轉取太隂炁出筆勑搯坎文月光炁吹一切隂虚之疾除陽精之祟黒書白上清水吞之右二符聚書成形治隂陽精血俱虚𥙷神炁損憊除傳尸勞瘵安魂魄生智慧男子服之長生女人服之善子息靈寳无量度人上經大法卷之三十六
