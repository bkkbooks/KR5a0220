front:
  text: 靈寶無量度人上經大法卷之十三金三
  hash: sha256:74e054974789ee3f30d96df3dd33c93051cf61c60dc5a93bdabe13f527930433
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_013-001a, image: hfl/0087/0087-074.png}
body:
  text: 洞視修用品陽日玉字天命長𩴹天諱地諱日諱鬼月諱魁五行諱魑南斗諱魁𩲃𩵄䰢魓𩳐魒北斗諱將車梁髙騫爽日皇諱曜道支玉薈條月帝諱張表日諱長史日字文申月諱子光月字真定光鬱羅翹光妙音三師諱閌天皇字天皇之諱𨵴閏地皇字𨵈地皇諱閶人皇字人皇諱霐澄明三天內名𡙎衆三天隱名三真名台台台三台神虎夫人神虎主吏神虎玉女五嶽內名三塗名𩴑魁六丁名六甲名洞潛乞玄四直功曹人恆寧隂日玉字崔盧機鄧衡文竇陽四直名太一天真太素天真太和天真三一名太初天真真仙真人乾坤坎艮離震巽兊八卦務猷收延凌梵太一名重𡨋空皇帝諱張列世容星名句芒東帝祝融南帝蓐收西帝禺強玄𡨋黑帝葛賢軒轅次五方帝名玄女歲嶚熒𣋎晨崇惲𡾗五嶽真名湯君天名𡨋薰后土諱唵吟吒唎上帝隱諱寶鑬竟誾青玄諱雷𩂆震雷雨萬符諱祖氣果君吾何歸劉裏口嗽吳禽強四海名馮夷子胥四海水神無為木公名君解木公字自然金母名君思金母字花瀾廉持竟井南斗六星名玦珍珀琳瑛南斗魂名釗鏤鑑鏗鎬鋪南斗魄名朱光帝堯昌明南斗六星祕諱巳上並朱書黃薄𥿄上分隂陽日用二十一日後書於香板以舌舐之四十九日巳後書於瓷器內以水滌飲之四十九日後添三十二天帝諱七十二日之後添入靈書中篇凡行持洞視擇冬至前一陽初生吉日先具奏天省日月南北二斗五府祖師牒法籙中仙靈照應至日依常式朝真祝香默奏洞視事畢即步斗七星春夏先起右足秋冬先起左足入斗口三拜上香鳴法鼓二十四通次發爐上默表一通洞視書篆玉札兆焚香九拜叩齒三十二通召三氣存身在三色雲氣中內外蓊蓂左青龍右白虎前朱雀後玄武獅子白鶴羅列左右日月照明洞煥室內項生圓象光映十方密呪曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝顯服冠帶垂纓整其威儀駐臣左右前後通逹誠信臣今日今時專於壇內行持通目洞視書篆玉札天章所有密意巳具默表伏望三五功曹左右官使者等衆令臣所啓詞語徑御三天三寶上帝至尊几前三上香三拜起身跪奏具法位臣姓名誠惶誠恐稽首頓首上啓三寶帝君玉陛下切念臣生居下土獲遇明時夙契真筌躬承道化臣千載幸會參佩法籙濫司三洞得預真階茲者幸遇行靈寶大法某人於某年內傳授混元玉札靈寶洞視神文靈真內諱謹以今日今時專於壇內行持通目洞視降真召靈之法書篆內諱真文伏望祖師上帝三寶天帝不以冒瀆天聽為罪特降正真生氣大道慧光三寶法澤六通大慧流入臣身中除心垢外鍊目睛令臣洞觀三界徹視鬼神仍乞聖旨頒下靈司所屬洞視神文仙曹等衆差入本壇使臣永為三寶弟子普度幽明生成造化臣自行洞視之後不敢冒犯明科輕泄漏慢如違甘俟天憲有此情懇謹具口表上奏大道三寶大帝玉陛下伏望天恩允臣所奏俯伏壇前躬俟報應臣無任激切屏營之至謹言候得旨九拜起身兩手搯玉帝訣再召三氣以鼻引三十二過面向乾方目篆三天真形符吸入三宫化作三清乘三氣而出次想巳身化作神公之形頂金碧蟬之冠絳霞飛羽袍大帶朱履絳裙坐三色雲氣中左手擲七斗因成紫微印右手擲三火因搯玉清訣次念三十二天帝諱太皇黃曽天帝欎繿玉明至太極平育賈奕天帝大擇法門三十二天三十二帝至三界五帝列言上清急急如元始天尊敕太上道君律令召仙曹呪玉清寶司總攝真靈開通眼目洞視鬼神真靈下降顯現真形急急如律令上香召仙曹總章呪髙上之天全呪見洞視降召品次以目篆三天三境真符於天門存作三色並口吸三氣流入三宫三天三境真符夫三境者乃無上三天五劫之初三氣真精靈虛妙氣結成真文諸天自然之音根宗也本不傳下世而真人口傳心授有見聞此文皆夙生道骨勤而行之當獲神仙若長齋山林清堂修誦行八緯之真修七經之妙吞服真文不踰九日三尸自亡穀氣自住身安體健面生玉光體秀金澤不同藥石津氣良由自然真氣長生度世永無衰艾久服必獲神仙默念書符呪曰神靈氣靈氣接三清六丁六甲威劒無情九道自然拯濟羣生天符勻筆保守康寧何邪不伏何鬼見形火鈴天罡白獸金精周行衛護勇烈三清上帝符命敕下藏精凶邪者滅道氣者寧急急如上清三境律令敕更念前總章大呪一遍吹布十方再呪一遍取十方氣吹東南西北叩齒九通次念通目仙曹呪玉清寶司全呪見前念七遍謹請太一救苦天尊金闕上相大司命青華青童君青玄靈應真童碧霄洞視神君左神虎徹視大神右神虎洞視童君十天承受玉女三天承受玉女十天上奏靈官三天上奏靈官五帝上奏靈官太一上奏靈官太清上奏靈官洞觀玉女遙觀玉女主天文符寶仙官主雲篆天文仙官辨魔玉女伏乞一合下降願賜真氣流入臣身令書篆玉札洞視神文吞服之後即得徹視百靈洞觀萬方存諸神森然在目次念魁罡呪太上老君神聖法九天玄女順聖法魁罡靈魁罡聖逢著邪鬼急須應敕攝右取北氣吹入硯中次念乾元呪曰乾元亨利貞日月與吾并吾以非飢渴賴得神水清金木水火土五行之數六甲之精三氣天倉濁氣常盈黃父赤子守中無傾靈水入五藏永保得安寧神仙同羽化洞視見上清急急如律令右取氣一口呵入硯中次存水內太陽火輪自東方來入於水中運轉大赫光明照耀一室念太一天真呪曰謹請太一天真太初天真真仙真人上應乾位六丁佐神𩴑魁六甲佑軍為吾上受天心普救萬靈太一靈呪南方火輪除邪救病洞見萬靈耿水敕攝右取南方氣吹入水中次念天津呪曰天津天真保液神清一呪斬鬼永辟妖精再呪曰天罡真氣斬煞邪癘真陽之水永去萬里取北氣呵入水中再上香將硃砂用中指於器中左研四十九轉呪曰角亢氐房心尾箕斗牛女虛危室壁奎婁胃昴畢觜參井鬼栁星張翼軫魁𩲃𩵄䰢魓𩳐魒貪巨祿文廉武破太元真紐綱紀關取五方氣一口吹入水中左手循十二支右手把筆呪曰但弟子一年三度受氣受天氣地氣日氣月氣五星之氣北斗靈氣南斗生氣六丁柔和之氣六甲武罡之氣風雲氣雷雨氣四直之氣五嶽持身妙氣三天三寶道氣北斗神虎之氣天不能蓋我地不能載我衝吾者死撞吾者亡急令攝放下朱筆水次以左手運五帝訣隨訣念呪曰紅杏卯墨黑壬磨真兊襪臘離靈寶中指中興生轉寅獨𨽻遷卯可韓明辰功都成巳切角正午上自移指至中指中節又搯定聚魂攝次取天地人三塗氣吹𥿄上及朱筆中再呪曰功都聚魂招八方捷疾使者天神地祇萬靈同歸合天帝敕合明天帝日合明天帝日速露速露㗭唎㗭唎㗭唎嵌落嵌落嵌落速來速來速來右取八方氣一口吹於紙上不得放訣右手把筆向口離口三寸召三氣一口吹於筆上書玉札及降真召靈符書畢再上香復官靈寶無量度人上經大法卷之十三
