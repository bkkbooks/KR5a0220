front:
  text: 靈寳无量度人上經大法卷之四十六水六
  hash: sha256:5a438c11bed6ae499451c9e44d41e367cda9af2a249488face2365d348ca2602
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_046-001a, image: hfl/0093/0093-164.png}
body:
  text: 思神儀訣品夫宿啓者正齋前一日取亥時建壇設席𥙷職說戒宣科勵衆關盟三界即是齋啓告之夕非正齋行道之日也玄師曰明晨行道續更啓聞至日行道方入清旦𥘉朝及至宿啓關奏不在正齋行道之限應齋者並在前一日沐浴宿齋所至日亥時率衆具威儀引髙功法師詣玄師天師前立定請齋官燒香度齋詞與髙功法師然後髙功於師前關白齋意夫齋法精嚴諸天上聖並降監臨毎事須合法度乃至都講讃唱誦詠亦須緩急得所不得遲留稽廢失儀凡髙功啓奏之時東向平立執簡曲躬調聲正炁直詞小語朴畧曲素不得厲聲過有煩飾凡諸祈禱先自悔過然後請事言詞取莭情理須中勿事綺麗失其誠懇凡髙功行道登壇皆香湯盥漱名曰蕩穢出盥漱名曰閉真炁先道衆具儀請詣師前序立請齋官上香執詞長跪關白齋意知磬唱道知鑪華夏引髙功至壇下立定次敕壇次知磬舉華夏引髙功至壇前地戸外立次髙功叩齒三通念入戸呪變神訣二指上節呪畢乃登壇順轉一匝次第二級順轉一匝左西向序立次髙功升内壇西向設案上香彈訣請三師次知磬舉華夏引髙功上十方香次髙功詣天寳臺上洞案香祝白太清訣中指上節次髙功復本位香案東向長跪上手鑪香祝上清訣次都講舉各禮師存念如法玉清訣存三師法乃修行之道本在存師師之不存道何從得所謂師者曰度師度師之師曰籍師籍師之師曰經師以上人間三師也别有天上三師者太上老君爲度師虚皇大道君爲籍師元始天尊爲經師思神儀法平旦寅時當思青炁從肝出如雲之升帀繞壇殿青龍獅子備守前後仙童玉女天仙地仙日月星宿五帝大魔十方神王兵馬監齋直事三界官屬羅列左右即宣五星都呪午時當思赤炁從心出如雲之升帀繞壇殿朱雀鳳凰備守前後仙童玉女三界真仙日月星宿五帝大魔十方神王兵馬監齋直事萬靈官屬羅列左右宣命魔神呪人定亥時當思白炁從肺出如雲之升帀繞壇殿麒麟白虎備守四方仙童玉女天地真仙日月星宿五帝兵馬監醮香官三界官屬羅列左右再宣五星都呪閉目内思五星五真五帝備守身中金華映蓋一體體作金色從肺出頂後圎光如日之象使照明十方身中了然盡見内外晝夜三時行道皆用此法鳴法鼔二十四通叩齒法左左相叩爲天鍾右右相叩爲天磬正中相叩爲法鼔發鑪出神訣三五功曹卯勒至辰左右官使者己至午左右捧香驛龍騎吏未至申侍香金童酉傳言散花玉女戍五帝直符亥直日香官辰輪至午彈次焚發鑪符敷落神眞四字出官訣五体真官功曹吏卯上仙上靈直使酉正一功曹子出心左右官使者午隂陽神決吏丑寅科車赤符吏辰己罡風騎置吏未申驛馬上章吏戍飛龍騎吏等亥狼吏虎賁坎察奸鈎騎艮三官僕射天騶甲卒震天丁力士巽離坤兌彈監察考召甲子諸官君子輪至亥訣彈復鑪符入神訣從子輪十二宫至亥入中指中局定當心存入吸炁咽下丹田夫三籙齋發鑪並用洞元朝儀吏兵若髙功别受經籙即當隨所受法職於發鑪時關出吏兵夫禮十方皆從北方而起次東北方東方東南方南方西南方西方西北方上方下方蓋北爲尊神衆星朝拱之所故先朝禮於北方也復鑪畢舉出堂頌下壇引髙功至地戸序立髙功念出戸呪次髙功上玄師前香表白囘向念善畢次知磬舉云道場法事畢衆官復位敕壇思存儀夫敕壇之法先以水劒安在地戸上選有威儀道士具壇簡詣劒水所地戸者天地之炁所以𥘉生凡物之類所出入也是以東南爲極陽而生隂故東南爲地戸西北爲極隂而生陽故西北爲天門故修行朝真之法皆去隂而就陽先瞑目存經籍度三師在西向次存上仙蔽身大將軍姓唐名宏字文明戴朱明赤幘通天大冠絳章丹衣帶龍頭玉劒左手持金符次存上靈隱影大將軍姓葛名雍字文度戴朱陽青幘通天之冠絳紈丹衣手持玉戟次存上神藏形大將軍姓周名武字文剛戴朱陽赤幘通天之冠絳章丹衣手持玉陽之節存前有真官絳衣乘九鳳次歩破穢斗存北斗七星覆己頭上斗柄指前不得遮耳目次方稱法位關白齋意畢三禮收壇簡垂手握固召四靈四靈者龍虎朱玄也左手搯震午二訣存肝心二炁化形出立於前左吹彈右手搯酉子二訣存肺腎二炁化形出立於後右吹彈次兩手捧心足履丁字立誦召三官呪歩丁罡三歩向劒水所然後搯五方訣召五龍畢方劒水相向持呪臨壇洒淨畢即於人門歩禹歩罡至鬼戸煞劒退次三拜却搯中指中存諸神復化真炁再還兆身行持口訣凡肝氣上應木星位在東方爲青色炁凡屬木及東方青炁者主之肺氣上應金星位在西方爲白色炁凡屬金及西方白炁者主之心氣上應火星位在南方爲赤色炁凡属火及南方赤炁者主之腎炁上應水星位在北方爲黒色炁凡属水及北方黒炁者主之脾炁上應土星位在中央爲黄色炁凡屬土及中央黄炁者主之上田泥丸上清宫凡上清宫用事主在上田中田絳宫玉清宫凡玉清宫用事主在中田下田丹元太清宫凡太清宫用事主在下田混合日月法人之三田皆有真土毎遇子時巳後聚左右二腎真炁於下田丹元存如五色纒絡一丸中與泥丸中真炁混合復從玉樓降下留在黄庭與心炁混合復運從夾脊而昇循泥丸一徧復降在黄庭存黄庭有一天尊如己之形服此真炁自子時午時行此三次午時巳後却用心火降在黄庭中想天尊在大火中坐凝然不動依坐忘法歸息法每一呼自丹田起即存其息納在黄庭使天尊納咽毎一吸自鼻入亦存其息納在黄庭中天尊納咽朝元法存上中下三田各有天尊却存下中二天尊乘五色雲炁與黄庭中巳神同自絳樓而昇直至泥丸存坐三尊皆在玉局已却在玉局前長跪奏事畢却存三清天中三清乘三色雲炁來泥丸與己三田天尊混合共成三尊却存此三尊同成一尊此一尊却乘五色雲炁從絳樓下入黄庭住却行定法誦經法正月爲上元自十一月十二月正月皆存在上宫天尊誦經七月爲中元自二月三月四月五月六月七月皆存在中宫天尊誦經十月爲下元自八月九月十月皆存在下宫天尊誦經凡誦經時須是行定法後著耳徹聽天尊誦經之聲琅琅然如鍾聲凡祈禳在上宫凡錬炁在下宫凡爲亡靈在中宫爲人誦經凡爲祈禱誦經存泥丸宫元始天尊下降絳宫仍攝祈禱人陽魂來受經元始天尊授經典與道君一例飛奏之法黒一紅二青三緑四先須存已之神自黄庭存五色之雲徑從玉樓直上泥丸却存從泥丸中飛歩七星節節隨星歩上覺得身離地上極逺在大雲炁中乃將身横歩七星旋身入斗口疊歩六歩存身背北面南行到火星存紅色過火星向東行存過日宫紅色過日宫西行存過月宫白色過月宫向西南方左轉七徧却從此出循歷東南二方天星到東北角却折歩循歷北西南東四方天星訖再到東北角却望東直從魁星廵一遭徑出向火星上行過西方見金星白色過金星向北行至水星黒色自水星過東方木星青色却從木星再囘水宮復西自金星過西直向中宫土星位黄色再從土星復向金星水星到木星宫復從木星宫望西北角乘雲直上望見金闕凡人身中真炁與諸天炁合人以胎生胎中復受邪炁與正炁混雜故人身中有十二結三十九死戸先解十二結三十九死戸則人之真炁上與天通解結請道父道母之炁先從下田結去解了却解中田後解上田毎田有四結塞死戸請三十九天正炁復自下田起止於上田毎田有十三死戸解結之後合道父道母之炁爲一身歸於黄庭塞死戸後合三十九天正炁歸於一身號曰帝一即是人之真性歸於黄庭解結有解結經塞死戸有大洞三十九章雄一雌一回風混合之道凡治病驅邪先須五斗五帝五魔等與之安鎭五臓保命生津驅逐邪炁凡行此符先須行朝元法上請真炁具說某人病因今請此符命凡治病即用五斗等行符半月日後却朝元奏請中理五炁混合百神符付之吞服安鎮黄庭凡驅邪止是奏心章一通與之分别人鬼之炁不得入鬼神情罪凡治病驅邪一切行事便出黄庭中天尊居在泥丸合五臓之炁皆在混元中用事凡逐日無事長居靜室焚香精思使神不離身方能朝元飛歩通達幽冥凡心章止許奏請一事仍不得先語務要詞達上奏虚無自然玉闕謹因左右龍虎君侍香金童傳言玉女左右香官使者三炁正神促氣功曹飛章從事章前空紙用黄神印章後空紙用越章即章在大香爐内燒之存用朝元法三次第一次奏有章欲拜第二次奏章口奏内意第三次存天尊處分章事真靜法凡觀心之道須是内觀其心心無其心外觀其形形無其形逺觀其物物無其物三者既悟惟見於空空無所空所空既無無無亦無無無既無湛然常寂寂無所寂欲豈能生欲既不生即是真靜真常應物真常得性常應常靜常清靜矣人能如是然後身得虚無情囘太極可以接物利人超凡入聖此是正道仰惟切在行持自此行持蹊徑從無入有行日月混合之法安養聖胎全備夢𥧌之間與日無異方可行持大洞廻風之道得聖身康徤出入自然然後可以廵遊諸天瞻禮虚無金闕夜卧法凡卧先展開手足仰卧後存思五臓訖却存天尊在黄庭中凝然而坐放大光明十方暉照當此之時忘去身心留意内觀原我當來𥘉生之神如何凝湛如何日用役使我形其神如何而寓他日如何遷神如何沉思𥘉覺神識昏昧少頃心地豁然覺得四炁寧靜日月垂光雙照玄宫之内所存天尊分明端坐更無一點塵翳歴歴聽得仙宫妙樂又見世界種種竒異可觀之事即不得著想恐神流蕩此是本性之明經中所謂朗然見玉清境也仍須日日行混合日月之法可以養本性貴得陽神强壯可以焂忽萬里𥘉有所觀之時須是把定身心身心不定却成顛風齋醮法凡遇施科如宣五方靈文即逐方存本色炁來自家五臓中混合五方既畢所存五臓之炁混作一炁鎮在黄庭令己之天尊納咽在黄庭内候宣太上五靈老君召出臣身中此一叚文時仍存身中三田正炁上在混元宫列位等候請聖即存上天諸位聖衆列坐醮筵各降真炁來與己頭上混元宫諸神混合共成一身天尊在混元坐玉局上受醮祭供養俟復爐即歸天尊於黄庭中禦凶邪法凡遇凶惡顛邪之類即存三宫天尊昇在泥丸宫中列坐玉局之上呼召身中五臓正炁昇天中與五星正炁各化爲一帝者如人間帝王之狀各逐方色依位而立著逐方衣服手執玉簡更將五臓五星變爲五斗毎一星官著道士衣服各逐方色依位而立手執玉簡更將五臓五星變爲五天魔王如人間將官結束各依方色衣服手執長戟佩帶弓劒依位而立了却存已神將吏昇五帝五斗五魔直前擒下上件鬼賊到天尊前聽天尊約束押徃三官都司聽斷仍念此呪曰神公受命至金馬驛程九徧即給五帝五斗五魔符與病人服一月追薦用心章一通具述追薦亡人姓名郷里生死嵗月及上請玉清上相大羅无極神公分司下降主張追薦錬度之司更請五帝五斗五魔符爲亡人修正五臓請三十二天帝并大梵隱語爲詣十方獄司追薦亡魂仍齎元始符命一道歷關諸天一道敕制地祇一道普告三界一道分詣諸處追尋亡魂仍作奏狀具上件符命上乞敕旨更作狀申玉清上相乞賜關行元始符命至逍遥上清告行太嵗年月日具位奉行玉清上相無極神公報應凡病人夜卧用書二道三五符吞服用三五符一道繫在髻上一道繫在帳帶上一道安在竈上燒仍以劄子吿報六司同三五將軍追攝報應凡用此符先須是依朝元法黙表奏天尊乞符命報應了將髻中帳帶上二符淨處燒了禳鎮凡人間有種種不祥事用鐵板五片闊三寸長九寸寫五魔符背後寫禳鎮因依後下年月日時後下半銜姓名奉行仍先具心章一通具述奏上乞符命後方可行靈寳无量度人上經大法卷之四十六
