front:
  text: 靈寶無量度人上經大法卷之六十九出五
  hash: sha256:7503143e773fee01a26545851d44725b314b9678e7c90a8a43a79a3d7e3c8066
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_069-001a, image: hfl/0099/0099-004.png}
body:
  text: 錬度諸符品披黃受道紫府誥無上盟真玉匱靈寶披黃授道紫府真誥伏以神霄雲篆降自中天玉笈靈書頒從絳闕行之則超登真品佩之則克證仙階而況三世祖書度窮魂於幽夜九天寶誥拔苦爽於圜扉應為復命之流盡賴生成之賜某受持之後克為大道之民常居福堂得證無為之果今對黃壇傳度宜永遵承符到奉行一如玄科律令道隱無名莫測升沉之變氣鍾有象復形生死之機雖順理之無差奈緣業之有證今者亡過某命歸冥路魄散幽塗不無處世之愆諒有積生之過是以羅酆專考校之權九幽執禁罰之柄念兹苦爽何以赦原識性昏迷難超冥昧今日大吉咸禀釋除魂離長夜之庭罪滅惡根之苦披符受道續命超生洞達希夷登超妙道一如告命玄師曰九清之上有無上大羅玉京金闕盟真之科祕於玉匱中乃靈寶普度幽冥之法門也自赤明開圖之化元始天尊所說救苦拔罪之靈篇與諸萬聖結約證盟誓願於億億劫中救度苦爽故曰盟真也盟真之典有三品焉上有上元金籙之科中有中元玉籙之科下有下元黃籙之科總而言之法具於下元也為之無上盟真玉匱黃籙普度幽明無量齊也今為學者備出儀範愼勿妄示非人混淆三元罪招不原若遇其人不行流演閉塞道恩天愆立至兆宜謹之九天寶誥中元金書九天寶誥上帝符命宣告三官天牢地獄主司大神超度亡故某咸領符命部衛形魂祗受寶誥上朝帝庭罪仇和釋與道合并神登玉闕受煉長存一如告命風火驛傳年月日時告下書寶誥時面西北長跪焚香存九天上帝九人如帝服衮冕絳霄飛羽翠裳默奏訖祝九天生神章九遍取九氣光吹筆書符訖再祝一遍依前吹氣符上並玉清訣於三寶前宣讀訖給付亡人焚於青煙之中誥文四行年月一行右寶誥丹書黃上告文墨書紙素皆可用綾錦之屬裝背如今世誥勑樣度魂夜宣訖給亡靈法酒符玄元老君玄梵天金醴大梵天勑賜法酒玉津寶梵天瓊漿六氣道自然識混元素德之漿慧之漿靈之漿芝品煉質之漿四氣消三魂飲煉魔之漿妙覺變化隂陽並成無英五臟隂制陽豐中真敷滎離午完形運轉日月逃形天關皇人曰煉度水火既畢當賜法酒而煉之凡書法酒符用黃紋染寸面東南誦三天隱諱取其氣書符焚為灰調酒賜亡魂飲拔南宫升天寶劵元精灌煉魂神澄正玄津元根萬氣長存不經苦惱身有光明達朗披覬其化正宣天玄紀法主帝變津宜年月日拔度某煉度升真上登道境法位臣某奉行右劵青紙封角朱書闊三寸二分長七寸封皮升天寶劵付亡過某佩服超升上朝帝庭急急如上帝靈寶大法律令勑具位臣姓名告行謹封背符元始祖氣幽魂苦爽皆即受度上升朱宫皇人曰此寶劵乃帝君勑拔度上世亡魂不可闕以絳袋盛之付受度亡魂收執生天造神王升仙車輦皇人曰法用綵帛作紫車一乘以神王二人擁輪五馬牽輿中安亡位候度橋時以焚之切不可以亡幡而送蓋其攝召白幡於煉度之時焚於水池換紅幡而度火池度了再焚紅幡而換黃幡隨車以童子導引而度天門焚車呪曰搯上帝訣天尊威神力拔救衆生魂祥煙塞死戶慶雲開生門還將上天氣以制九天魂混然歸元一皆成自然人得馭紫雲車上朝泥丸君三界無遏難永脫輪回津燒紙呪曰火鈴炎熾變化八方萬神侍衛永除不祥急急如火鈴丹天律令勑呪畢存天尊垂一寶珠珠中光芒萬丈接引上生天界玄師曰巳上符簡誥劵第一次名為濟度第二次告下名曰超度第三次告下名曰升度若是普度並曰拔度也流通五氣落滅惡根呪曰紅杏佐左癰攣者伸震文震氣服符墨黑尚上耳目聰明坎文坎氣服符磨真佑右緩廢者平兊文兊氣服符襪臘下下跛痾起行離文離氣服符靈寶冲中身疆體輕中指中氣服符青帝護魂肝木長榮卯文卯氣服符赤帝養氣心火光亨午文午氣服符白帝侍魄肺金生成酉文酉氣服符黑帝通血腎水清停子文子氣服符黃帝中主脾土安寧中指中氣服符梵氣彌羅自然成真中指甲午氣服符回尸起死白骨成人子至亥天門氣服符濟度垂死絶而得生坎至離火氣服符九和十合變化上清急急如律令泰岱木司九氣元君衡霍火宫三氣元君太華金主恆山水帝七氣元君五氣元君嵩山上帝一氣元君巳上五帝玉諱之符青帝護魂符五行之主朹九氣司方青陽造化赫赫陽晶飛雲結篆風馬髙馴靈煙蕩瑞育化陽春木官大惠鎮護肝魂青帝符歌曰東望重拜手蒼帝玉皇君靈風鼓橐籥育物布元春雲龍轡嚴駕玉衛擁瓊輪枯萌泛霑及大惠無不均萬仙歌以道委曲戒天人心根迷自固拱跽戴洪仁右符護得道者三魂使其通靈澄徹青書白素佩之以立春之日受吞服書以竹膜上三枚黑帝通血符玄象變通結氣真元洪濛汗漫通徹黑奕控馭三宫玉帝飛龍沖妙元質至道難終黑帝符歌曰無質統有物淵兮上帝心不啓不發道藴妙化機深恐爾漏未盡隂想忽浸淫輪轉無涯波苦道相迷尋萬年嘗謹約一旦自湮沉無沖落鬼境殃譴不可任右符護育得道之人使血脉通利榮盛一身無有窒礙黑帝太無水帝也水在人身血墨書青素佩之以立冬之日受若吞服書以竹膜上一枚黃帝中主符混沉冥始萬梵三天開張大有總制圓象帝作土中黃宫無窮三陽發生逸豫萬春黃帝符歌曰黃天拱中宸控駕玉化根翹機貫億曆洞朗闢四門大有混皇真糾制星宿魂非帝道不運有方賴之存威忿即霜秋和預為陽春生成握元紀仰荷戴無垠右符營衛中府拘制萬神不令錯越若近取一身則肝藏魂肺藏魄絳宫丹田二氣交媾則赤氣下降玄泉上升心藏血腎藏精二氣返復交相生養黃庭之中神意所在也黃帝中主萬神無越黃書絳素佩之以土王之日受若吞服書以竹膜上五枚白帝侍魄符三氣吐清洞達之神入玄我身隂魂返陽朝晷七尸澡煉蜉蝣萬神侍迎金光散輝全我清靈白帝符歌曰六甲抱金闕七政守靈壇流鈴擲火化威劒巨龍蟠懇彼素靈真明憲孰敢干束制妖鬼魔凛落霄風寒流氣既巳息萬天俄而安真儔荷大庇抵顙相歌歡右符侍得道者七魄使無散亂閉絶鬼道白書紫素佩之以立秋之日受若吞服書以竹膜上四枚赤帝養氣符五氣運度泉脉日運玄珠貫穿光透華峯三宫升降往來無窮赫赫陽精紫房萬物發生混合九魂煉純披朱蕭仭流通血氣始丹劫臺返胎火庭赤帝符歌曰太景開玉樞洞堂啓金除騫林廕瑶砌丹鸞踏瓊珠寶房名曲麗明璫神所居飛遊豁飛道引目盻真都天日永不夕重煙鎖青廬太上勑印開帕几羅簡書裨風樹玄化殷辛諒有餘右符赤帝主火能生養元氣黃帝曰壯火食氣少火生氣氣得溫而後養也丹書黃素佩之以立夏之日受若吞服書以竹膜上二枚青天魔王巴元醜伯赤天魔王負天檐石白天魔王返山六目黑天魔王監醜朗馥黃天魔王橫天檐力五帝大魔萬神之宗右五帝真符煉度亡故某靈魂依式告行超升善域永不輪轉梵氣彌羅符太上梵氣彌羅玉京赤書玉字搯玉皇訣誦玉帝睿號逐字一遍取三氣吹成回尸起死符搯中指中取一氣閉氣一筆而成存金光萬丈於符中濟度垂死符搯離文呪曰濟度垂死絶而得生千和萬合變化上清急急如律令五篇玉章皇人曰五篇者乃元始天尊自然飛英至精虛無混沌之氣凝結而成玉章鎮於大羅之上昔上皇時星辰交錯惡曜加臨上犯三天曽命真梵真人齎持五篇付於五帝鎮於天元以制其天政又命真如真人齎持五篇付於五嶽以鎮於地紀以御其地祇又命妙行真人齎持五篇付於名山主者以候成道之士敷揚教法下度生死蓋五篇之氣其功甚博上可以消於天災中可以保鎮國祚下可以度於人民如召三界五帝建諸壇陛當以土旺之日青素朱書五篇敷落五方則萬靈振伏招集群仙召之即至靡有不從如書時當於淨室面東方再拜長跪存身為元始天尊萬神侍衛身有光明乃取五方五色之氣手握玉清訣鼻引九天氣入口九咽存運丹田之氣上衝泥丸周流一身遍於百竅放大光明照見諸天諸地日月星宿然後默誦密呪十二遍取氣吹筆起身再拜執筆叩齒三十二通隨散形呪而書之書符畢上以星斗蓋形存諸天星宿日月光明與元始五篇之氣相接交映內外藏之如用當朝天門再拜焚香具白事因奏於元始前再拜長跪而取之可以禳度厄運及五煉生尸之法焚而用之如生人受煉則佩負在身度世永無疾厄身過之後地司奉迎不經地獄即得返形遊行太空如幽魂受煉得遇玉文身生寶光永斷執迷度脫輪回之道夫行靈寶大法之士居山受錬之真豈可不遇斯篇佩荷在身或鎮於幽室之間則萬魔不敢近邪妖不敢犯界自有萬天敬重神明護門光明內外萬災不干可謂保制劫運使天長存者矣書五篇密呪曰混合帝尊八徊九生玉晨金華真文敷陳飛飈玉輪太素理真靈寶天根六合洞靈玉篇自然結成真文我今書篆元始氣分萬神合氣俱會帝庭第一篇玉符觀覽鬱繿寅大明紫虛寅九神度魂卯開闢玉真辰阿奕煒燁巳飛天流音寅輪景卯帝常卯都靈四指中頥臻豁落三指上大有三指中慶雲啓靈寅至中指中三真總御卯中指中四指中三氣分形中指上中下三節我位上王世久長榮寅七曜輝魔坎恬懀敷榮離五行運度兊九氣回旋卯七元中指中十二酉南仗紀政真身監映慶臻衛靈亥上彈第二篇玉符虛旡上首巳天紀彌宸午四吁育象未濯矅騰精坎煥赫洞陽離浮景玉光坤七靈謡歌寅世元紫堂四指上羅英四指中散景中指上曜明中指中玉房中指中金酉玄丑合受巳真精玄玄四象卯八卦輪八方七氣飛陽斗七元飛隂斗三元一正巳午大申五行璇璣中指中飛度五戶亥戍四景回施午三真未六氣已彈萬梵開張第三篇玉符八晨總獸韶主攝精九騫都鬱飛生上靈密羅淨境馥空灌郁輪沃黃華霐運神開玄明君廓延宛丹庭四六十有方律三門收威四氣遏守四門右符並中指中訣第四篇玉符大猷浮景子真定丑化元寅蜒宛卯素渺申玉梁澄煙亥蕭峙戍結禹丑景羅四指上七麗四指中秀盤三府四指下流輝九元酉寂然三指上虛邈中指中飛華坎拂軿酉晨濫録籍申大漠午由延未隂十陽九子午天變飛阿午阿丘九度五氣回飄未七玄度命酉六府充盈戍星宿停關流光百骸中指中第五篇玉符天坤舞乾蓊酉浮巳龍轅靄羅紫精巳馥淵亥溟涬大育寅九機化乾申覆形厚德四指上元阿淪精四指下育瑛四指中明陀三指下景晨渺雲三指上大隗總監三指中秀樂禁天坎紫虛陀丘離劫量交前西口碧霞韻梵卯渺渺遊元大指中六變運量大指下馘絶惡愆中指中𢗡冠玄漠萬變成仙午彈第二篇玉符告文太清九真安化上愛玉符符東方明氣發育木精飛英仁惠之氣滋行萬生天界地綱與時皆正凝耀神鄉結為青書光映萬里右奉元始安鎮真文告下東方青帝煉質亡魂飛升極頂一如告命年月日具法位臣姓某告行第二篇玉符告文交神生明玉化之符符太丹之氣衍光洞煥飄擲化火融煉九隂赤字凝章其文甚異敷映九億精明炳天右奉元始安鎮真文告下南方赤帝煉質亡魂飛升極頂一如告命年月日具法位臣姓某告行第三篇玉符告文真皇混丹肅玄之符符黃真之氣結精飛英中央虛落之氣混沌黃元之精交流曆律化交生文萬里精芒熀煜天端之間右奉元始安鎮真文告下中央黃帝煉質亡魂飛升極頂一如告命年月日具法位臣姓某告行第四篇玉符告文八威禁龍制虎飛英太白玉化之符符素威禁氣流化粹端飄權耀神凝結成書光柍萬里其文甚異列明凌芒威摧萬妖右奉元始安鎮真文告下西方白帝煉質亡魂飛升極頂一如告命年月日具法位臣姓某告行第五篇玉符告文明綱玄兆太明九化之符符玄精發耀萬物滋形生端不竭天曆有紀玉皇上相髙觀靈化接摘玄序開明天教冊封萬帝玄真感和天文敷炳典約清律天化大成凝結玉章光映九億右奉元始安鎮真文告下北方黑帝煉質亡魂飛升極頂一如告命年月日具法位臣姓某告行靈寶始青變化之圖天真皇人以紫筆記靈寶之氣交始青之氣變化之象也主世間及天地鬼神之生道能資蓄生氣以抱魂結練以得真也兆能有之以青書竹帛之上面西北服之保生益年神氣不散固全生道也佩之則神氣歸身返老回嬰應運滅度身經太隂帶服始青變化之圖始青帝君與兆同升逍遙太空也凡煉度亡魂在兆智慧而用之碧落空歌之圖天真皇人曰碧落之氣在人物為縷脉絡連貫穿注其氣生於碧落始青之天在人生三百六十脉三百六十經三百六十絡又生眇絡支絡絲絡絡大梵之氣以為其元中結此文以成圖佩用者神仙以碧書尺素召十方天真空歌一奏萬聖齊臨服用施化亦同上法大浮黎土之圖天真皇人紫筆定書以青為地黃為文赤為界封此土為浮黎土者區貫跖穴之所在也中黃太上明梵之氣回旋流演以正域內宫闕樓觀之所存有能佩之百神朝身三界司迎魔王禀命五帝侍軒中黃太一帝君與兆洞章同升紫房此圖主人陴胃營養太和服用同前法靈寶無量度人上經大法卷之六十九
