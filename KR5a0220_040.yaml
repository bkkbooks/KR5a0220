front:
  text: 靈寶無量度人上經大法卷之四十麗十
  hash: sha256:1151dbb6fd429f14b4fb874268f05ce1d5e72c304fa12ff6a11eb272b22d03b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_040-001a, image: hfl/0092/0092-162.png}
body:
  text: 還元叙玄品凡集仙求法之士神不歸根則不靈氣不還元則無寶法有五符五靈之氣能滌五臟穢濁清淨身心然後念道思真自然通悟道法應靈神通莫測修真之士却在逺聲色持齊戒忠孝家國濟物利人香火精勤速得感應法有五符以五色繒各半寸方硃書平旦燒香入靖服五靈氣將符為灰汲井花水調五方服之服七日之後呼召八十一大靈官及用八十一普濟之法飛章謁帝追度十方一切有主無主孤魂九州三界戰陳亡殁忠臣義士橫逆死亡普皆仗此大法悉得超度及祈禱雨澤普救萬病無不感應八十一品總呪始當詣座八會九光自然成文萬靈併藏祝訖一念想丹田有混芒九光恍恍飛騰歸於命根良久上朝八景氣入玄玄玄中太皇迎會萬真隨念應祈普召萬神五靈真符紅杏桃腸磨真墨黑靈寶總呪九光三氣七政五常中皇髙尊下降元陽召集萬神啓運符此符以青繒朱書靈寶訣元始祖氣焚之於香上可召集萬神不可輕用天真品訣在子祝云亶交度天神品訣在子之中祝云邈邈自騫地神品訣在甲祝云東覆郁羅水神品訣在亥祝云龍羅九醜飛空品訣在中指手心祝云竺笳落五嶽品訣全五嶽祝云上玄靈真伏神品訣在中手心祝云負天大力催生救度真應品訣在年來行人年祝云魔霐連池死胎品訣在巳祝云皆得度人受生品訣在中手心祝云始青化應死催品訣在巳祝云歘歌流精化生品訣在子午祝云阿易玄解𡨚品訣斗同天皇祝云幽寂五分得生品訣在年産死人本命年祝云山嶽吞煙變化品訣在甲祝云妙辨化元祛辟妖邪玄應品訣在中手心祝云刀利禪猷天魔品訣在中祝云噠精地魔品訣在中指上節祝云梵沖水魔品訣在中指下節祝云滇渺醜魑魔品訣同上祝云轟馘百怪品訣在小中祝云中魔鬼品訣在小上祝云利韓全妖魔品訣在亥祝云寂幽真服氣咽納洞真品訣在子祝云靈魔懀太陽品訣在卯祝云回靈玄太隂品訣在酉祝云十轉光天罡品訣在巳祝云力五靈品訣在五方八卦五靈祝云須玄延神靈品訣在巳祝云朗梵祖氣品訣在子祝云混恍靈布氣品訣在斗祝云靈明罡出神謁帝定極品訣在命自身本命祝云剝𠷈出神品訣在時當時祝云七茶飛神品訣在中手心祝云𩵄集神品訣在年命本祝云合明天存神品訣在中入掌祝云降丹元拜章品訣在日當日祝云流真精行神品訣在中四二指入掌心祝云喗嚤吽歸神品訣在本命祝云甲摩辨淨真洞視通真品訣在卯祝云靖端明淨目品訣在申祝云襪胸焰洞視品訣在申祝云滅魔試目辟品訣在午祝云流精炎日照品訣在未祝云遷達唧內觀品訣在午下祝云吻叨沖返視品訣在小曲祝云元囉嚩召聽品訣在四曲祝云呼囉普度無邊還元品訣在五嶽卯子酉午祝云遷靈仙普度品訣在三塗祝云吽吒哩攝魂品訣在斗祝云誾闥煉度品訣在子午祝云焰精合形品訣在四指三節祝云梵氣交羅解結品訣在斗祝云魔勒微芒返魂品訣在比帝搯大指中祝云復𠷈九醜超生品訣在中祝云入玄坐呼神王靜品訣在中祝云靖勑神王品訣在八卦祝云𨊠華五帝品訣在八卦祝云靈寶欲界品訣在曲指五指俱曲祝云啌色界品訣在虎口二指搯虎口祝云命魔無色界品訣在中甲祝云斬靈五老神公品訣在五靈子午卯酉祝云晶呼玄天丁仙兵品訣在丁午未之間並四三大指搯中祝云畾度魂合體演梵品訣在三中大指搯縫二中指中縫祝云含光天醫品訣在中祝云哆明監生品訣在中指上節祝云開明去穢品訣在子祝云靜光續魂品訣在卯祝云亢鳴靈光解除品訣在斗祝云叩囉辨契合品訣在辰祝云辨噠除業品訣在拳子祝云令味綿哆修禳普濟咸通品訣在太一巳祝云咭帝流禳天品訣在乾祝云帝呢靈書禳地品訣在坤祝云祗𡀎呢禳災品訣在中祝云風厨嗼禳兵品訣在酉祝云噭嚧禳火品訣在子亥中祝云黑唋禳水品訣在巳午中祝云囑囑禳蟲品訣在酉祝云叻㖀巳上祕訣並有不傳之妙上學之士志心持受口傳心授謹而勿泄泄之有殃萬劫考形總呪八十一字繿明醜玄阿囉龍邅須延談猷貟浮寶騫利禪詵剝婆萌梵天醜鐸善猷明離舉遷玃婁易邈範光首堅竺落笳伽扶唎大噂三摩妙辨坤覆道乾赤明輪和滅魔自蠲喑吻噠默陀郁馥沐篇真九氣吁流上仙勑巳上訣呪並合靈寶中訣凡遇行持默存元始祖氣心念八十一字然後施用八十一符濟生度死自然之道禳度祈恩無出於此非上士不得聞知妄有輕泄殃及九祖通玄祕旨萬法之宗得之專於守一行之在於神功一全神應靈感無方守神神靈氣聚寶盈神氣既住內外光明應感無礙巳達天真真中有神長生大君真神相應上朝帝庭名刋玉籍萬劫慶榮知之進道妙理自明知之懈退永代滅形輕泄漏慢七祖受刑謹之戒之天律非輕八十一靈官真形職位掌法靈官掌籍靈官掌奏靈官掌律靈官掌書靈官掌印靈官掌算靈官掌符靈官掌節靈官掌曆靈官左曹靈官右曹靈官左司靈官右司靈官執事靈官朱衣靈官繡衣靈官降生靈官釋𡨚靈官真陽靈官隂光靈官紫霞靈官飛雲靈官鼓吹靈官玉章靈官進書靈官混化靈官玄司靈官洞光靈官青章靈官真靜靈官丹皇靈官斗威靈官馘魔靈官玉𠕋靈官玄光靈官仁惠靈官安化靈官定化靈官定光靈官太白靈官大明靈官應元靈官告命靈官洞章靈官煉形靈官太虛靈官伏魔靈官紫虛靈官丹光靈官中皇靈官素華靈官元黃靈官七變靈官浩蕩靈官東華靈官安鎮靈官侍靖靈官恭靖靈官真靖靈官衛靖靈官紏察靈官啓奏靈官通傳靈官保度靈官傳奏靈官謄書靈官待報靈官傳送靈官集神靈官飛光靈官節度靈官言功靈官制魔靈官正精靈官蕩穢靈官攝召靈官明真靈官六天靈官明靈靈官玉輔靈官巳上八十一靈官各有隱名服之八十一日批降傳言剋期感應愼勿輕泄殃及祖先身受風刀隱名內篇陽年從鬼隂年從門北氣西南氣東南辰位正東存從天中氣下西北方正西方東北方正南方自止十字不用隂陽年用服符方位并訣並隨搯之一九坎中藏二九在坤方三九雷震發四九巽焰光五九居中位六九遇乾鄉七九兌上立八九鬼門傷九九離明上神遊合玉皇巳上訣符服九道攺方氣訣並存想本方氣色結成紅橘大降入丹田凡遇煉神之時入靖燒香密誦此呪元黃運氣馘絶邪蹤太上勑令定桃康公七靈靜制赫赫黃中戊巳結蓋嬰兒使通混合百脉萬竅齊聰神遊太漠我命無終急急如元始律令密誦七遍批降呪靈丑摩寅𠷈卯叨辰聻巳右五靈訣吹紙上五府納靈訣出元皇五元素府內冊靈文左目為太陽訣舌下左存太陽以左目視脾將肝氣相迎合而為青霞之氣納居肝中呪曰天蓬天火急右目為太隂訣舌下右存太隂以右目視將肺氣相迎合而為素霞之氣納居肺宫呪曰金酉輪卯制酉魔至攝卯酉至卯搯定眉中為天罡訣舌尖存天罡以心意脾也腎赤黃紫三色之氣自鼻中出相迎合而為青黃白三氣聚於兩眉之中化為一粒五色珠自泥丸以神迎寶珠入腹內咽之照徹內外五臟光明其珠直下丹田化為紅橘大珠放萬丈真火焚身一切穢氣盡皆清淨次見我法身如嬰兒之狀呪曰唵喗噠娑薩訶巳訣次誦密呪曰青精陽神太白庚辛炎炎赤帝壬癸之君付吾戊已合我形身千和萬合氣體通靈長生久視願得飛仙急急如元始律令次存五方真氣合我五臟自頂門入遍逰五府化為紅橘內於丹田吞符普召萬神呪曰元始律令道君勑文三光玄斗日月之精六通神光十方應化吾今召某神速降通靈急到壇前通傳應靈勑玉清訣如召五嶽搯紅杏至靈寶右訣任意存想十方神祇即時而至或自耳中如松風之聲或假於童子通傳萬無一失慎勿輕泄開天玉契品皇人曰契者劵也上天之合同也天尊頒詔得仙之子先賜玉契以俟飛仙得度天門無執遏者此之玉契也諸天官分如人間官曹所治各有拘遏安可便造故上天立此玉契以付學仙之士或冥數巳盡身歸太隂得此玉契便可徑還所治奉上天詔命背土凌空亦資此契以度罡風左社右稷扶助登真之人全慿玉契自非巳參身領治職不可輕付違者天誅九天玉契一名太一契凡開天門生死魂神飛升超度及諸九天十地三十二天天曹天師天門三將軍用之亶臻答負南邅靈宫刀都阿仙玃天沙人九地玉契一名司命契凡閉地戶超拔神魂斷地逮役及北隂酆都地府地司應干地道用之曇臻門貟前邅輪宫堂都首仙玄天𤤽人南極玉契凡諸南方南極南斗南曹南昌上宫南院天樞內省天樞院朱陵火府用之音須雲飛詵梵騫郍通宛由九乾坤鮮碧北極玉契凡諸北方北天北極北曹北院太玄都省天機內省北隂泉曲用之吟華玄阿千眇容馥嵎易神玉雲飛真元東華上相青童道君玉契凡諸東方九氣木德扶桑宫太一青靈始老宫用之無首忽麗答都廽羅南丹鬱明玉契凡諸南嶽魏夫人及南方三氣丹靈南上南靈丹靈真老宫用之玉空緑醜雲馥攬奕西龜素曜玉契凡諸白玉龜臺太素真人皓靈元老西方七氣宫用之婆色景寂阿辨浮桑北鬱玄明玉契凡諸北方五氣諸宫玄靈元老宫分及北冥北海水府龍宫四海四瀆九江水司用之九覆眇醜沙黎洞漠中天總真玉契凡諸蓬萊瀛洲十洲三島洞天福地靖廬諸治用之薈無浮玉猷婆育九日君玉契音須詵梵通宛乾坤月君玉契門無輪霐首無珍惡北斗玉契曇稼前澤堂流玄陀上元天官玉契亶曇南前刃堂玃亥中元地官玉契稼門澤輪流首陀𤤽下元水官玉契臻貟邅宮都仙天人天蓬玉契凡東方角亢七宿宫用之亶曇稼臻答無損門天猷玉契及南方井鬼七宿宫用之南前澤邅雲輪霐宫翊聖玉契及西方奎婁七宿宫用之刀堂流都阿首北仙玄武玉契及北方斗牛七宿宫用之雙玄陀天沙瑜惡人青帝玉契大東嶽真君東嶽泰山宫用之音須吟華雲飛玄河赤帝玉契大南嶽真君南嶽衡山宫用之詵梵千眇鶱郍容馥白帝玉契大西嶽真君覀嶽華山宫用之通宛嵎易由九神玉黑帝玉契大北嶽真君北嶽恆山宫用之乾坤雲飛鮮碧真元黃帝玉契大中嶽真君中嶽嵩山宫用之雲阿前馥堂玉玄元右件二十四玉契各只用天篆以柏木版長五寸闊二寸四分朱書奉玉詔或歸真日佩而用之即得遄歸本處無有執遏者上天所祕不可輕示非人若遇發上件宫府申奏文字亦書此天篆取東氣吹之從中間剪為兩片將其左貼於章奏申狀文字之首更不必用印以其右燒灰用東南方香水調服則無不達者靈寶無量度人上經大法卷之四十
