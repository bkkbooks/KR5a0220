front:
  text: 靈寶無量度人上經大法卷之三十八麗八
  hash: sha256:d2b8227e252f185d5c57d44abdf8ac2db171a06748a4c71de1e52b9be18ac4ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_038-001a, image: hfl/0092/0092-120.png}
body:
  text: 祈求嗣續品玄師曰靈寶之法變化無窮出於自然𥘉不可以意臆也為符為篆靡所不通天地神靈山川草木人民禽獸星宿日月凡所有形皆有符章之篆以治之非符之各有配合也蓋天地之內不出元始一氣耳既得生於一氣則一氣所到自爾常符之不同由其氣分之異故也靈寶束縛靈符之外又有二百餘符皆一氣所化也書符呪曰傾光回駕至嚴校諸天唵縳日囉喗拏唎薩訶紅光唵縛月囉喏母唎娑訶黃光並中指中為訣書名字左日七縛右月七煞存日月紅黃光交合入符中取東方氣一口西方氣一口二口發出念呪搯訣如要男以手自寅左轉至巳發出如要女以手自申右轉至巳發出夫婦相望夫面西婦面東清晨服符一道百日有子佩帶亦以前呪朱書白素男左女右帶之服則燒灰吞下太上育子神符祕法太上老君傳九天衛房聖母育子神符祕法老君曰凡處世最靈莫過於人是故人身難得蓋受父精母血隂陽二氣結成形像譬如天地之秀氣成形也天地養育萬物春夏茂長秋冬肅殺猶不可盡何況於人人絶其子是為大逆是乃天地好生而不好殺吾哀而憐之其旡子者豈非世之大貧乎吾今重為生靈傳授付漢天師張道陵降下人間普救世纒無嗣孤梗者令其夫婦食素每日侵晨焚香向彩繪九天聖前祝願各稱名禮拜求子因依各吞一粒令得早結胎孕牢固胞室令子顔貌鮮潔精神瑩秀好習文章伶利富貴人中殊勝服之四十九日自然報應或異夢吞日月或種種異物即是報應將後必生異子先須具狀申九天聖母衆神以酒果好香供養九天育胎神符呪曰九天衛房真氣攝書符時對聖祝了念十四遍書之呪盡符成醋調硃砂黃連紙上書之撚作丸乳香湯下致雨開晴品玄師曰天氣下降地氣不升則炎火亢極旱妖作災地氣上騰隂勃陽間則溢水隂霪水潦為害有隂德則俟來言行陽功則有所懇請治建癸壇以請澤立丙丁式以止霪告暘谷而奏太帝責職龍而禱三官分限極則朝玉闕降符簡而檄雷霆丁甲施功太一助力斗華摧妖治發敗正四女分𨽻和合斂翳功成百兆受澤德允萬物滋茂言功謝過司位遷秩名列天仙之籍德邁神公之比苟且無功罰夀降職兆宜遵守之訣曰凡雨者天氣下降地氣上升隂陽和合則雨降也旱者天氣下降陽氣獨運地氣不升隂陽不和則炎烈亢陽火旱作災又一隅主者酷毒暴虐怨恨敗正多致此災若地氣上騰隂氣干陽天氣不降則隂霪淋溢水潦為害又掌民之首隂謀潛毒刑德不明暗害忠良多招此禍也既司真階當自行隂德普為兆庶而密作祈禱若有投誠乞於救治乃曰陽德也請雨當建癸字之壇祈晴須立丙丁之壇大功三日中功七日下功九日應效乃分限𥘉則建壇齋戒持誦真經洞淵龍文關告社令行雨職龍暘谷神王水官司命次則奏於扶桑大帝申剌天曹然後朝神金闕章聞上帝委太一元君六丁六甲三昧火匣收束水妖韓司雷霆去除賊害丹羽之扇開晴黑符之簡致雨召龍行雷持呪布澤湖海神女開翳分光太和海妃和會上下信來先風號令而必晴未雨𥘉雷燠悶而未和尚霖功成非已德精誠契天地上玄不曲物須以德合符請雨降澤請雨先於淨地建癸字壇如式如急用以黑泥塗地作癸字形於壇北列醮位六時登壇誦大梵隱語或洞淵經文召龍呪祝限以十九日為期𥘉始三日第一日關告社令及行雨當職龍神申暘谷神王及水官府司命府並稱靈寶大法司其關告之式具所投詞旨無詞即具亢旱因依餘如後式或以香茶酒果七分遣仙曹遞送未有昭格次日奏扶桑大帝告下三元水府東海蓬萊都水監申剌太玄都省依前遣發尚未報應即具表奏玉帝拜章達三天神朝金關乞賜敕命下付水司方始朱書召龍符墨書致雨符於鐵杞上擲江海中方始告下五雷使者丁甲大神風伯雨師轉牒城隍九江四海湖潭溪澤龍神責限降雨取令周足三日未應次行中功七日為期二日為一限依前遵行科式如未報應方行下功九日為期三日為一限亦依前遵行科式若計十九日不報更不許祈請一則運數天災伐惡二則祈請無德三則誠心不臻所致况太上常善救物亦不過三限必應雨澤稍有輕怠三官紏察降職罰功應感之日醮謝天恩言功效職洞明癸水壇依常式不以大小上層去西北東北一角中層别接左右二序道下層去東南西南角三天召龍真符三天致雨真符右二符用鐵板長一尺二寸闊四寸面書召龍符以朱背書致雨符以墨詣有龍之水投之欲投符丁罡三步左手擎符右手仗劒呪曰三天符命召龍致雨天丁在前風伯師舉玉露閉塞隂陽關阻升降二氣飛風走雨當直龍神依符奉行敢有不伏水官飛奏上清天丁斬殺汝形玉清靈命汝須敬聽急急如三天律令投符訖急退恐雷水驚人請雨章請官式謹為上請太一直符五雷使者六丁玉女六甲文神河中玉女海中玉女湖中玉女應時下降執奉敕旨告下扶桑水府暘谷神王蓬萊都水大監水官司命四海九江三元水官并今嵗直雨龍神風伯雨師雷公電母九江社令龍神仰分布地分部領所部之地界分之中主水行雨龍神疾速和合隂陽興雲布露施降甘澤雱𩃰周足以救焦熬如有毀敗正氣妖惡乞從雷霆震伐以明天憲不致阻隔雨澤恩惟太上云云止雨請晴於露地彰幕下建丙丁壇或以赤泥塗地作丙丁壇形絳羅作扇書開晴符於八方申水官府暘谷神王告下神龍主雨神祇苐二日拜止兩章如不已即徑朝玉皇上帝差降太一元君丁甲大神敷三昧火匣收束水氣斬斷水妖分𨽻隂陽功成醮謝天恩布於壇中六時持誦大梵隱語暘谷丙丁壇依常式下層中别築一道序道中層分築二道上層如式不增減三天分開玊路請晴真符凡日久隂霪雨水作災於露地建壇上油幕以紅鵠羽作扇扇上須以黃書玉路符於其上呪曰金水相生反為相刑火土之氣克制相刑韓司整令三景光明隂陽分隸通達紫庭元始大道戊已丙丁急急如三天太上律令即立扇於八方持呪不過一時雨勢開晴三天分明止雨章請官式謹為上請河中玉女海中玉女湖中玉女水言直符告下三兄水府水官曹局江河海瀆泉源溪澗主水龍神雲雷雨部風伯等神今嵗行雨龍神兩師疾速收雲斂霧分𨽻隂陽止雨開光各歸所治以為效信如第二章亦云如是即便云又請太一元君六丁玉女六甲大神天丁力士一時下降速收水氣斬伐水怪分決泉源開通玉路顯明三光以為效信靈寶無量度人上經大法卷之三十八
