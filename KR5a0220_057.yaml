front:
  text: 靈寶無量度人上經大法卷之五十七玉五
  hash: sha256:b9cad53230c6421f06ecf99bc5cae1aae1dd61989695057ba7d571dcedfc50db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_057-001a, image: hfl/0096/0096-004.png}
body:
  text: 錬度祕訣品玄師曰昔上帝哀愍下方幽魂拘逼北方溟海之中泉曲之府九幽長夜等獄無由超度故說經教以拔衆生使九華真人理於南昌上宫主九幽之下宿對死魂又有南昌度命君錬度死魂中有流火之庭飛焰煥於八方流火之膏錬身則體生玉光明如眸子南極真人亦理於宫中應諸學道仙品未充皆詣流火庭內南極真人錬以火膏及月中黃氣洗煉蕩除塵垢得與真人為侣如生人煉度身形則魂神徑上南宫受煉於流火之庭隨其真修學功之淺深凖計年月之多寡時限既畢即得更生雖經時積歲有如睡頃不覺稽延從茲已往便期神仙其火池靈童名曰婆尾每至劫運一交即以陀丘之衆計即量行𥙷升朱陵之宫受福為仙官豈小𥙷哉赤明開運元始鍚為梵度天王太無真人遂居天王之府度長夜之魂遣南昌上宫朱陵火府官童將吏種種印法下降塵世傳付有道之士代天行化濟拔幽𡨋受此法者𥙷充南昌上宫錬度真官兼知黃籙院事此則以神煉神以氣煉魄兆行此大法誓願三元之日開壇煉度普天之下五道四生幽魂滯魄超離三塗得生人天永充功德凡隂魂未經受煉不過三尺喎邪跛躄形體不具並未完全罪垢汙染身常穢陋才經煉度之後方得全形罪垢烟消𡨚愆解釋身有光明兆與煉度畢焚化經財寶籙符誥與之收執差天道功曹齎執公文押付黃籙院交割取亡魂三世罪籍看詳除誣天謗地為臣不忠為子不孝暗損生靈賊害善良之外各隨功果速與受主免致沉滯則可以上副太上好生之意也元始靈寶自然九天生化超度隂煉祕訣兆焚香面東九拜啓白齊意再九拜平坐調神正氣誦生神寶章九過每一過引氣一口直入丹田即存九氣灌身於身中水府聚九氣之光結一嬰兒與己相肖嬰兒向外握固端坐餘光遍覆天地形神光明須臾五藏五色之氣如雲自下而升次載嬰兒自夾脊𩀱關上入泥丸化為黍米寶珠嬰兒即為元始五藏雲氣即為獅子元始即於寶珠之內玄坐五色獅子之上百千萬億光明洞煥諸天諸地明徹表裏次存三十二天萬聖千真浮空而來咸入寶珠之中元始帝前各各長跪如聽法狀次衆真畢集頃刻元始放眉間白毫祥光下照酆都九幽諸獄自泥丸而照及臍之下也一一光中皆現寶珠一一珠中皆現三十二天與萬聖千真扈從元始與前寶珠無二一一光中皆有救苦天尊隨光入諸地獄所有酆都諸獄承天尊道力陽光所及一時照破頓滅重昏化為淨土次存兩腎為酆都宫門以至諸獄悉開自內兩腎而下所謂大小腸胃者皆幽隂積結真陽不及皆地獄也獄門一開北帝與諸𡨋官獄吏列班朝禮於都門之外酆都水府之後腰脊骨之前朝禮畢即有十方飛天神王駕車金童翊衛其側手執元始符命自帝所面承道旨乘光而下徑入酆都諸獄應諸罪魂並皆赦宥即時出獄集於酆都宫前次存華池為森羅淨霐次存寶珠千真萬聖齊誦天河灌東井呪次存元始上帝命赤龍奮鼓霐池之浪下灌東井如瀑布急存舌為赤龍攪華池候神水滿溢左顧咽直入府前天河也次存水府前大海無量無邊一切罪魂入浴祥風和氣溫然如春薰蒸四體旡不欣喜頓去貪嗔歸心正道浴畢元始上帝敕金童玉女各捧淨衣不知其數賜諸罪魂存著衣畢想寶珠中千真萬聖異口同音誦救苦經大梵語次存太一救苦天尊十方救苦天尊隨誦步景雲而下以甘露法水遍灑諸魂即得身心清凉咽喉開泰十方天尊各以金盂玉匙貯以甘露玉膏玄空散哺諸魂享以法食一一飽滿訖次存脊骨為升天大法橋接至朱陵府宫絳也下通水府玉童玉女手執幢幡飛香散花引諸亡魂升橋至朱陵火府府中有長生大君帝王服司馬大神星官服韓君丈人白玉冠青衣皂緣司命司録延夀益算度厄尊神星官服監度諸魂入大火池猛火煉度一經火煉並衣天衣有百千火龍自火池中乘火焰躍出載諸亡者歷十二重樓飛空而上直至玉清境面拜元始上帝致身寶光之中兆即𡨋心湛然物我兼忘寂然不動勿問亡者去住何地稍掛一𢇁不成究竟無緣超度煉度師尊官吏太一尋聲救苦天尊太微南極長生大帝九天好生韓君丈人主煉仙魄南極真人主煉亡魂九華真人上清黃籙院使副真君上清黃籙院仙兵主宰南昌上宫煉度靈官南昌上宫煉度玉女南昌上宫煉度童子南昌上宫九光童子南昌上宫火陵童子南昌上宫丹靈大神南昌上宫皓華大神南昌上宫玄英大神南昌上宫變身大神南昌上宫復相大神南昌上宫正精大神南昌上宫火府大神南昌上宫返形大神南昌上宫脫胎大神南昌上宫斷胞大神南昌上宫散滯大神南昌上宫解結大神南昌上宫返魂大神南昌上宫度魂大神南昌上宫超化大神南昌上宫好生大神南昌上宫召魂大神南昌上宫天醫神吏煉度符吏仙兵火池水沼使者南昌上宫上奏靈官南昌上宫召魂童子掌煉度天印靈官南昌上宫承受玉女六道功曹神君直壇土池應南昌祖師至真官吏並立靖室專一早晚焚香持誦中篇禮獻仍持念玉清聖境元始天尊太乙救苦天尊御號各三百聲玉皇寶號一百遍願煉幽魂早遂生天終始勤之母怠母忽靈寶無量度人上經大法卷之五十七
