front:
  text: 靈寶無量度人上經大法卷之四十五水五
  hash: sha256:aa1cccdd604dca58130f644a0434509d84955f01a911c333c139663844e8d22d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_045-001a, image: hfl/0093/0093-124.png}
body:
  text: 十魔境化品皇人曰夫靈寶大法乃天地之根宗元始之妙氣鳳篆龍章結為真文靈音梵唱分而為呪元始上帝見無相之理傳要機於道君濟救群迷敷揚至道非世上之常辭皆諸天之隱諱上士行之可以飛躡玉京中士行之可以遷居仙室下士行之可以住世延年蓋下士愚俗福淺之徒豈能窺其奧且宗祖傳文皆神仙修煉大丹之士積功纍行之者遇其要妙遭際真師訣印符圖無不具述皆夢境得其筌蹄或神人傳其要旨即使心開神悟智慧日新觀其祕音通幽達理呼神召將皆駐目前三界敬從諸天欽仰所謂道而化生德而度死者矣後之學者多不遇真師或傳之於片紙文字或得之於誦詠經訣思存未值要文便言畢竟矜誇已是執著迷津蓋緣行淺德微福緣至薄或得之於文綺華麗或傳之於符篆篇圖呪訣不全符形靡辨行持差誤呼想不真以至將吏天真不能輔佐皆去真就偽象魔所試其怨道者多矣殊不知靈寶祕文法有倫序符有訣竅呪有祕章有制魔伏邪之寶文有出死入生之心印佩符肘印謁簡劵符誥帖環圖降魔戒誓得之者即超登上道飛謁玄元度亡魂於時刻之中濟朽骨於吹噓之內城隍社令悉歸掌握之中風雨雷霆盡屑指揮之部行道之士先明於制御之法其魔有十故具于篇內學者深而造之勿為魔之所試斯道不難成矣得者祕若珍寶不可輕露如違盟約則萬劫墮於幽隂永隔靈寶之光禍延七祖若能勤遵戒約明守針規念念在法通玄妙理則魔王保舉萬聖齊臨豈惟濟接生死久視之道便可見矣境化章一曰天魔二曰地魔三曰人魔四曰鬼魔五曰神魔六曰陽魔七曰隂魔八曰病魔九曰妖魔十曰境魔夫天魔者修煉居山之士一念纎塵而被魔王之所敗而不能成真何者正煉火丹修真養浩行持入靖或目見顯現形影幢蓋幡花百種天香異雲覆室或耳聞仙樂之韻此乃天魔之所試即非正道之所履行也可佩三皇內文及五帝消魔玉符置於座前左手搯中指中文右手執五帝大魔之印照之其魔自退變神為元始天尊夫地魔者行持之士步罡變神書符呪水起念不正多被地魔之所試何者正欲思存而心生疑議步搯書呪而亂其心元或照形而不辨其姓名或附身而不通言語抵敵道法毀辱真文皆非邪鬼之所依即是地魔之所試也當以神霄玊清真王五方衛靈呪并焚威未制天政德可伏御地祇敕十二字而遣之其魔自退夫人魔者行持之士皆有之或居山或入室書符步呪搯訣行持方欲行用一念有殊或被言語喧譁穢臭腥膻雞犬孕婦師僧尼俗衝突壇場以至惑亂法身思存不正符水不應呪訣不靈皆人魔之所試也當以混合百神印安於壇中書束縛魔靈四字以印印之焚於香火上搯左右子亥二訣持念魔王三品之章其魔自退夫鬼魔者行持之士或治人於郊野之中或建壇於伏尸之地一念稍悮即夜夢魅屋宇虛鳴禽鼠出以現形蛇蟲顯其怪狀惑亂正法恣壞靈壇皆鬼魔之所試也當以淨明法主印安於壇中書元始安鎮四字以印印之貼於壇所次誦淨明靈書二遍其魔自退夫神魔者行持之士或因驅攝或破廟除精攝祟召魂一念恣狂多為神魔之所試或現形影或作言詞拋石旋風吹號嘆泣變化多端見其異狀盜法壇之供具竊丹藥之祕文惑惱法身無有休息皆神魔之所試也當以嚴攝北酆印佩於肘上召玄範衆真以攝之仍書神公受命普掃不祥八字貼於壇四向次以三十二天帝諱章焚于室前而遣之其魔自退夫陽魔者行持者正欲內行以濟生死其一念心或不真情欲四起怨憎作念受著情懷煩惱憂心是非競亂此陽魔之所試也當正心默念降魔滅惡天尊九聲叩齒三作書八景冥合氣入玄玄焚而服之次佩五方制魔玉文誦五方制魔呪行旋斗歷箕罡訣其魔自退夫隂魔者居山之士修習祕文或思存之際入室之間一念差殊即聞四野歌悲冷風亂作心生倒見妄起貪嗔談及雜言多宣死諱或行於道路逢僧遇尸血穢厭我神光皆隂魔之所試也當叩齒七聲搯午文為訣存玄元之氣灌注身中次服五老啓塗群仙翼轅八字以五帝大魔印印之及佩童𥘉五元玊册誦靈書下篇及焚龍章鳳篆之文其魔自退夫病魔者行持之士一念乖殊四大失理飲食差時寒暑失調多生疾患纒綿不退損害行持此病魔之所試也當以消魔五符置於室中用五帝大魔印誦淨明靈書二遍服八景冥合氣入玄玄八字并淨明延生二符佩元洞玉曆章叩齒集神首罪贖愆仍焚香對聖宣雲笈寶籖科品集隂陽二神以合和其魔自退夫妖魔者山林多有之凡入靖修鍊一念不真多招狐狸山精石怪妖魅恐人成道化作妖艷以求宿食或歌艷麗詩詞以現形影故行大法之士多忌之宜須持志金石滅念停虛誦魔王三章輪搯十方飛天神王訣以天寶君印照之次焚五帝大魔符於室前次焚香升座宣靈寶三洞法語其魔自退永不至矣更以斛食施之夫境魔者行持之際或於道路别室之中見一物而一念起貪嗔之心目視非色耳聽惡聲或入室中見諸氣象形影之端皆境魔之所試也當凝心滌慮守氣存神使其合太虛之真內外瑩徹等若琉璃無所染著序空中有一寶珠光明徹照十方來朝仍吞服諸天隱諱誦淨明寶經一過佩上清九老伏魔之印其魔自退髙上神霄玉清真王消魔衛靈呪東方蕭仞扶桑方諸鬱霞元皇列真凝結靈牙明曜九芒合氣三華钁天振劒神虎辟邪安陽太帝攝御群魔上升神霄濯形天河南方炎氣浮煙運升赤明長生元聖髙居玉京降妙圎羅散品六冥元天大誥普濟群生消殄魔試奔飛火鈴保衛正氣億劫長存西方皓景金華長庚洞光大梵流布輪轉元綱蔚明交變騰化十方七關安鎮回合隂陽帝氣蕩蕩我享嘉祥玉文敷告生道延昌北方太隂朔單上連帝居流𤔵騰晶化形玉虛輔衛三境簡閲元圖真符煥發定籍清都標名金籙宿釁咸除飛神碧落超登太無中央元始虛皇祖土居中三氣洞元肇生太虛七轉七變混合回風散花萬神天地開通吉日行事億天所宗願保劫年享福無窮三皇內文祕諱天皇君召韓君司馬符諸天遙唱萬帝設禮中指中群魔束首中指中鬼精滅爽回尸起死白骨成人中指中韓君丈人坎至召制卯執符把籙離挑十方酉伏御地祇坤萬災不干神明護門子亥幽魂苦爽皆得受四指上中下度三莭挑至中天皇君召命諸天齊到咸遵玉敕已上並仰吸靈寶氣吹彈右文用青帛黃書於甲子日子時篆用赤書玉字印印之佩於兆身夫煉度隂尸佩於心胸之上默召韓君丈人立至天皇君召十方飛天神王符始青中書洞煥午魔王內諱子浮黎中太空百靈隱名司命司録司功司殺回骸起死卯飛天神王制魔命靈酉魂神澄正萬氣長存丑亥氣入寅輪十衆真監度玄玄二宫全其本年收入中指中入掌心吹彈右文用絳帛白書於庚申之日寅時篆用八威龍文印印之佩於兆身夫召十方飛天神王隨其方訣召之立至地皇君召三界大魔符五帝大魔萬神之宗自號赫奕諸天齊功金真朗郁酉輔翼萬仙卯至道無敵大道降伏衆魔之宗從有入無申至道之樞從無入有巳我位上王匡御衆魔右文用緑帛青書於六丁之日午時篆用道君玉印印之佩於兆身如拜謁飛步即三界大魔無拘天門矣地皇君召三官星宿璇璣符混洞赤文無無上真酉五老啓塗申大行梵氣周回十方戌三官九署亥十二河源子三官北酆明檢鬼營丑金馬驛呈萬神咸聽寅混合回風天地開通卯吉日行事辰巳祖土居中吹彈右文用黃帛朱書於六丙之日辰時篆用八威龍文印印之佩於兆身如禳度災厄召諸天星宿齊到帝前人皇君束縛魔靈符赤靈尊神統御丹天離千和萬合自然成真坎太一司命桃康合延乾上開八門混合百神坤束送妖魔精斬馘六鬼鋒諸天氣蕩隆蕩我道日興右文用素帛墨書於六辛之日酉時篆用道君玉印印之佩於兆身可以威制群魔人皇君却死更生符太清九真凝曜神鄉卯九隂赤字敷映生明坎精芒晃耀混沌黃元艮飛英玉化虎嘯龍吟巳萬帝玄真威制天文酉却死延年受化離更生右文用青紙朱書於壬癸之日子時篆用道君玉印印之佩於兆身可以延年益箕東方九氣青靈始老青帝消魔王呪曰洞耀育元晶青華開大明布育九天氣始生荐無英扶陽通攝御丹林合總真積霄始暉上鬱壘明霞晨靈光煥羅絡衛育保形魂混化合玄景仁慧消魔群萬遍道已超功當書上清南方三氣丹靈老君赤帝消魔王呪曰三氣靄靈闕明虛煥玉丹朱陵有帝真華雲飛絳軿統御萬界中撫運超億千執策按簡録洞章敷神篇解結散禍根流金摧凶姦志能成此道魔試俱無前保度冥劫津宴盻無窮年西方七氣皓靈黃老白帝消魔王呪曰西靈徊七度大眇鬱明華白元維我神皇真御景霞皎皎三素暉昭昭破百邪攝音延至氣金晶育三曰煉結固玉質寶耀映瓊鮮魔精當滅試逮地無沉連逸轡髙清館齊輪太上仙北方五氣五靈玄老黑帝消魔王呪曰北方三秀靄太上紫皇君總氣攝幽機造化敷靈綱下統虛危精寶育天元房通靈大妙神纒羅衛百關豁落滅魔試凶災永不干大道保自然夀命無𧇊殘萬劫享慶會白日登雲輪中央一氣元靈元老黃帝消魔王呪曰混化歸沖妙元皇總帝靈真老閉黃闕四御齊玄鈞圓華太張上同携堅玉君結津固百骸瓊耀擁胎仙晨輝注明景魔殃自滅形萬道保無虧返老回童嬰五會合一氣飛馭超雲亰青天大魔制邪玉文鬱藹蒼晶洞景開明始陽九氣停華育魂流英妙府靈真上神瓊碧雲冠飛光羽裙青腰玉女太上真人保度仙籙消魔却氛右符與青帝大符通靈合變節度同功赤天大魔制邪玉文昌陽真老赤靈尊神統御丹天檢制魔群嚴駕朱鳳三角之麟上道太清玄元之根炎熛三氣盤徊絳雲育養丹府保制長存右文與赤帝大符通靈合變節度同功白天大魔制邪玉文七靈皓氣三素元真中有黃老制攝魔精庚辛官將七十萬兵羽旗龍節金虎雲奔斷除妖妄練育華英與道長存歷劫無傾右符與白帝大符通靈合變節度同功黑帝大魔制邪玉文北隂鬱單玄氣之宫帝真靈會驅神駕龍室有玊女夜光之童掌握圖籙攝制魔蹤虛危合化紫煙激風寶晶煉育後天無終右文與黑帝大符通靈合變節度同功黃天大魔制邪玉文元皇上靈沖妙之尊混合真檏造化玄根感激幽微挺生大神攝召萬氣齊會華房消蕩百魔與道俱昌保度却災滅試除殃右文與黃帝大符通靈合變節度同功靈寶無量度人上經大法卷之四十五
