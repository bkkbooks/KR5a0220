front:
  text: 靈寶無量度人上經大法卷之四十一水一
  hash: sha256:12292a6987e20a13354462ab4f1da31c694c9ac3461197082464e7a7ec96d7d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_041-001a, image: hfl/0093/0093-004.png}
body:
  text: 章表思存品皇人曰夫拜章之法乃明皇道君受靈寶天尊祕法默朝三天口奏告啓之文非凡人所得聞之者皆三天有名真人之位方可出入金闕非一品仙官不得行靈寶大法皆不能拜伏章表其罡風世界無靈寶真慧之光不能破之其法當用庚子之日天色晴爽備香案朝天門先兩手搯上帝訣變身為真人之狀步五行超脫罡執筆叩齒存元始三氣降筆中用黃羅雌雄黃夾硃砂篆符入於冠履之內并書合明都匠符置於淨室中并章印皆供設於聖前并書𥁞章圖逐日誦呪焚香存想令熟五行超脫罡步罡呪曰唵蘇俱波伽瑟赧魯斯𠷑訶呪畢存三氣車兆身冠內符東方隱語書左履符南方隱語書右履符西方隱語書都匠符北方隱語書合明符臨伏章時安於簡上心與神合神與氣合陽同日曜氣與真合隂陽合真隂同月曜三天運明帝真合靈幹旋萬化洞達杳如日之升回轉無垠去穢符三道投入浴天地氛穢尸氣玄水蕩穢却隂香湯吐精玄光豁落甲庚東形攝功曹捧章符梵氣彌羅天光去來無礙所推直透天門捧齎玉章出隂倐忽萬程入陽風馬雲奔開天符命黃紙書符白紙書告文天洞天真上通天關三部使者速降威靈開道旡窮玉女靈童隂陽決吏持火當凶衝除浩氣大破罡風告文太上開天符命中玉女靈官使者齎執章表遙詣三天所過罡風浩氣等神不得斷截章表速達太上御前急急如靈寶大法律令年月日時發具位姓某押章印十二小符頓首玄再以都拜聞臣姓太陛王清封下太歲章月日尾朔辰思存訣先對御前依科宣科出官次開函搯左手卯文擎函右手開函念呪曰唵烏輪摩塗攝次出章文在案上以銀刀金鴈玉魚朱筆安章上只展露太清函位次宣章畢香上薰茟填陛下字次以印印之印畢卷章香上度念呪曰五色之煙衝章上天搯中指下節存五臟之氣化為紫煙纏繞章文五色之氣衝章逹帝搯中指上節存五方正真之氣化為紫雲之車下官故氣不得妄干急急如律令寅文吹彈次封章呪曰太上科禁青紫朱章隨吾心意徑造玄關真氣封閉玉女捧函隨章從事驅穢除姦上官典者無敢却還真元混結直透天關去來無礙出幽入間日月齊輝天地循環急急如律令次操章畢即左手斗訣自心劃至髮際次彈化身為枯木南方九鳳真官吐火焚身為灰燼忽大風一作吹灰不見惟存元燒處有一白氣起結為真人之狀存五斗罩體即通氣步罡步至第九步望天門禮三拜起身以劒水噀四方畢即再禮三拜就舌柱上齶存壇下有紫雲之車將吏兵馬各從十方而至兆乃登車而上存天上地下並皆空然寂無所有訣曰紫車乃轉地軸其白氣從下丹田而上直衝泥丸須臾見從金門而入惟見金光萬道照映已身次存自己有白玉之光自兆頂門上浹金光交遘通繞己身內外瑩徹忽見一寶珠懸於虛空之中兆乃心禮默奏事理畢須臾珠中有萬道金玉之光遍照十方世界一時明了有一真人就兆手中接章文奏太上少頃有玉童傳言以聞兆乃再三禮而退却存自天門而下至于壇表而興次覺真氣盈溢三氣交浹以意納下丹田書章表式科曰凡書章表先漱盥手面整飭衣冠淨室焚香如法上空八分謂省尺一寸之八分下通走蟻每行一十七字行闊一寸二分臣字不上行頭鬼字不得為首不得垂死露生及抽破人姓名誠惶誠恐至再拜不得破行以聞去再拜下空一寸臣姓去以聞空三行太清玄元去臣姓名空三行太歲去太清空三行太嵅後空三行少則添紙一幅太清階五十二字攢長二寸四分供設章中聖位三十六分道上二玄君五方五帝五童君建節監功大將軍靈壇四獸神君素車白馬大將軍正一功曹左右官使者罡風騎置吏隂陽神決吏科車赤符吏上仙上靈二官直使察姦都官鉤騎吏三宫都官僕射吏赤景子二君四都監功謁者吏天騶甲卒郎吏虎賁吏收神食神吏注氣監察考召官吏三元四始甲子諸官君赤陽三十五官君天師門下典者吏收氣食氣吏收鬼食鬼吏收邪食邪吏收毒食毒吏收凶食凶吏誅符破廟吏隨章從事十二書佐監章按章從事録章通章從事奏章考章從事齎章定章從事呈章校章從事直日上官典者章中四直功曹傳奏使者驛馬上章吏直壇土地侍衛靈祇所屬宫曹月分正月十二月上詣太上虛無丈人宫二月上詣太上玄老仙都宫三月四月上詣太上三天太清宫五月上詣太上重道宫六月七月上詣太上九氣文昌宫八月上詣太上天帝宫九月十月上詣太上大道宫十一月上詣太上侍中左右監諸將軍宫閠月上詣大上玄都宫所屬宫曹日分一日建玉曹治赤靈宫二日太素玄曹治太微宫三日太微曹治北平宫四日都正曹治太清下宫五日正一曹治通明宫六日玄一曹治上明宫七日太素曹治太清髙靈宫八日雲集曹治紫微宫九日元靈曹治侍春宫十日太清曹治紫靈宫十一日三水曹治素女宫十二日司録曹治巨野宫十三日清敘曹治西明宫十四日玄正曹治上絳宫十五日中都曹治典平宫十六日司非曹治北府宫十七日司姦曹治司命宫十八日統部曹治東明宫十九日統録曹治西靈宫二十日監考曹治司命宫二十一日監司曹治陽明宫二十二日典考曹治太陽宫二十三日司官曹治少陽宫二十四日玄元曹治太隂宫二十五日太玄曹治少隂宫二十六日都司曹治北辰宫二十七日都候曹治太白宫二十八日直使曹治休明宫二十九日司直曹治陽明宫三十日典考曹治啓明宫狀申三元唐葛周三真君三天門下引進真官三天門下上章詞表靈官直日上官典者千二百官君申狀式具位某右某今月某日時奉為某人某事拜奏某章幾通用方函封印全上詣某宫某曹治官乞謄奏三境至尊某隨章進對伏乞昭報除巳令直日官將齎章見到須至具狀申聞者右謹具狀上申某聖位伏望聖慈特賜省覽所上章文乞不候類聚先次進御上帝金闕崇樓殿付與青腰承翼玉女常陽朱雀童子即賜以聞恭聽勑命告報以承詔召亦乞為頒降合屬去處奉行上明大道慈悲好生之澤下副幽顯望恩之誠冒瀆聖聰謹狀年月日具位姓狀奏天師狀式散壇朱表用具位臣姓謹據某云今宵散壇切慮臣等預建壇席存念不正進退不恭有違壇律今拜言功謝過朱表一通奏詣三境帝闕切慮所奏朱表格式不合上天須至具奏告聞者右臣謹録狀上奏三天大法師正一靜應真君恭望天慈察臣無知憫臣等凡愚不明正氣赦以不及伏乞特賜指揮書佐除去外封隨誤證定徑為進呈不勝惶懼之至謹狀奏年月日具位臣姓某狀左右牒式靈寶大法司今月某日時奉為云云拜奏某章一通方函重封印全并申狀一通上詣三天門下某宫曹分投進除巳對聖宣讀點對訖須至專牒者牒請左右官使者隂陽神決吏左右上章諸靈官遞至三大門下母致上官典者有所譴謫牒至凖式謹牒年月日時牒具位姓某押科前祕呪九天上仙道化常生神室太景寢映珠瓊逸宅丹元受事玉清十轉九回七混五成神暉共擢振策皇庭道逹三變身神合靈玉帝散惠隱玄羽經千真傾輪五星命真披銖巾羽森羅帝庭左命神虎右佩金兵九天征伐煥擲火鈴滅魔破祅斬邪挾精風火赫震六天摧傾豁落北酆九魔寒煙失道者誅順道者生上帝有令敕衛神兵千邪滅試萬鬼無停敢有干逆以付天丁有祅則戮有毒則刑保神守衛攝邪戮精六天以誅威鎮萬靈寶神驅穢霄朗三清萬真受事俱會帝庭六象調和七景輝明神風散魔道場肅清神惠蕩鬼玉帝祝生九天乘命攝真御靈請奉皇命仙道乃成拜伏章表科各禮師存念如法宣呪鳴法鼓二十四通太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三氣正神急上關啓三天玄元太上道君臣今正爾燒香奏章願得八方正真生氣下降臣身中所啓速達徑詣至真無極大道玉皇尊帝御前長跪出神謹出臣等身中五體真官功曹吏出直使功曹二人出正一功曹二人出治病功曹三人出左右官使者二人出陽神決吏二人出隂神決吏二人出科車赤符吏罡風騎置吏驛馬上章吏官各二人出出者嚴裝顯服冠帶垂纓整其威儀住立臣前後咸受臣口中詞語分别關啓此間某處四面真官注氣監察考召官君道上二玄三元四始甲子諸官君赤景子二君五七赤陽三十五官君四始五老十二辰君三官重下考召諸官君將吏上啓太上老君太上丈人無上玄老天師嗣師系師三師君門下典者官將吏兵書佐小吏奉行文書事臣等前後齋戒朝禮關啓拜章奏表法符所請召法等上吏兵士卒并及所在真官一切靈祇防衛臣身中應受功賞以今云云謹依伏地拜上某章一通在臣奏案之上函中謹以開函伏讀章文次於函中出章表乃呪曰五色之煙衝章上天五色之氣衝章達帝下官故氣不得妄干急急如律令畢讀章文於香上度過跪讀次操章章表安案上取太清太歲向上書刀著太清左朱筆一管著太清右畢三上香執簡當心操章曰謹遣臣身中五體真官官一小吏十二書佐重敕功曹使者皆各嚴裝顯服冠帶垂纓整其威儀磨墨點筆佩劒治籙為臣及時操某章一通上詣三天曹隨章進對隨事分别章中若有謬悮脫落文字不諦言詞舛錯不相次比削治功曹以長毫利筆即為改正脫字為注悮字為定無令上官典者有所遣却閉口含氣徑上三天無極大道太上老君御前慎勿稽停左官歷關右官次稽次當令臣所請時下所召時到所禳者却所厭者伏所濟者度所申者通所奏者達若有下官故氣邪精鬼賊於道路雲霧之中斷截臣章文使不上達者録付天一北獄收禁依玄都鬼律正法治罪以明天憲臣某伏在案前須待玄恩報應次伏地良久存見三將軍左右真官功曹使者驛馬上章吏並乘車馬上有紫雲華蓋覆章了畢次乘赤紅氣上升天艮久雖然瞬息俄頃早經歷數萬里相似赤紅氣雲霧蕩蕩然兩邊别無霞翳惟多寶樹升如數百里忽見一橫道則日月黃道是也直過黃道了遙見前頭如五六里有紫雲隱隱然直進過紫雲見天門入天門數步少停住諸侍衛靈官亦住惟與周將軍及直使功曹侍章玉童向前玉女把章表案直使功曹通傳直往至玉關門下之覀謁見正一真人三天大法師門下大都功張再拜了具陳章表來由天師諾了即往鳳凰閣金門之外立須臾有一仙童朱衣玄冠於門內出向傳章玉童手中接章進太上少間見引臣俄而入見太上著九色雲霞之帔戴九德之冠當殿而坐左玄右玄二真人侍衛又有一太一著朱衣太上覽章表太一承太上意署太清玉陛下作依字了見一小仙童收章表於右階分付今日直曹官了便心拜辭太上出玉關門外再拜辭天師次同奏章直官抃躍却回至拜章壇所了起稱以聞以聞便取章表於壇西北燒之若尋常為人拜章但存令真官與吏兵將軍章表往前行若修行章表一一自與里域真官同往納官復爐臣上章事訖所出臣身中功曹使者一切靈官君吏各從臣衆妙之門而入在左還左在右還右纒身繞骨彌綸天地營衛百脈復於宫室一如故事無令差互靈寶無量度人上經大法卷之四十一
