front:
  text: 靈寶無量度人上經大法卷之三十九麗九
  hash: sha256:4f69c6646ba7eb37f112acf65ab5545516992dd362d7bf89528752a176eb2c05
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_039-001a, image: hfl/0092/0092-140.png}
body:
  text: 靈寶罡步品召十方飛天神王罡法諸罡並丁立起住皆左先右從單步飛天符訣符疊書成十方訣以左右手輪自震起入中指中文止召煉度司官吏罡搯三塗五苦訣並左右手輪訣自震起入中指中止召靈寶官吏星搯兩手中指中白寅步至午轉旋身三匝至兌宫召之召黃籙院官吏罡搯左右手中指三節自中步至召三界魔王罡自坎起交步至未上立兩手搯中指三節召三界直符通用召五帝罡自東步至西立兩手並搯金木訣麗九三召八方威神罡兩手並輪八卦訣自坤步至乾立回尸起死罡兩手搯四指中過中指中過三指中挑自北面起至南立伏御地祇罡兩手搯中指中至甲挑自子步至南再返身入中宫立群魔束形罡兩手子至午挑發自震起步至乾鬼精滅爽罡兩手子亥至申寅自坎至已立束縛魔靈罡兩手寅申已亥挑發自坎至午立普掃不祥罡兩手三指搯大指二節挑發自酉步至震宫立旋斗歷箕罡左手輪隂陽斗並單步自地戶回轉入天關共二十一步止入中宫步罡呪曰唵俱魯祗拘帝嗚𠰢俱嚧羯波爍言帝訶麼吽攝諸罡步並通用此呪右符並是元始真氣成自然之章降付學仙之士祕而行之凡步一罡內有一將主之須先黃紙朱篆其符章置於聖前然後步罡次畢即焚符於香爐中其君將立降目前壇司呪訣品押字法左手搯中指中呪曰唵般郍狠郍烏魯謨郍薩訶呪硯法左手搯中指上節呪曰唵眇莾烏爽俱知毗荼攝呪水法左手搯子右手執水呪曰唵鬱單勃赫含精陀羅景玄攝呪紙法左手中指中右手執紙呪曰唵菩育曇那摩羅阿那攝呪朱法左手午文右手執朱呪曰唵陀羅阿那元梵菩曇攝呪墨法左手子文右手執墨磨九轉呪曰唵形玄陀合幽律𠰢攝呪筆法左手寅文右手執筆於口相交呪曰唵郁空羅萌摩羅阿奕吁員攝祭筆法法用六丁六甲日繫羊毫筆各一十二管墨一十二笏朱砂一十二兩硯二兩於甲子日面天門排於卓子之上以棗湯一十二蓋香爐一箇供養勿令一切人見法官握兩手訣左子右午交訣於口召呪曰臣今依法式造到筆墨硃硯並排列於天門之下謹請靈寶法部靈官金童玉女將帥吏兵並各化身真氣入於其中令兆所用之時隨其呪意立獲通靈呪曰唵阿郍法筵摩夷阿𨚧密羅菩提婆婁薩羅梵那總監鬼神攝呪畢彈訣取天門三氣一十二口吹之次入筆符於筆內書符呪曰神筆靈靈上帝敕行三界禀令萬神敬聽書符篆籙洞達玄冥玄中太皇上帝髙真中理五氣混合百神急急如靈寶大法律令祝筆呪曰神筆通靈上合玉清書符殺鬼治病安寧凶災萬禍所向摧傾拔度幽魂符到斥行發符呪曰靈寶大法元始真文虛無大道結化三清氣降入符符到安寧人生鬼殺永保無終右二呪並搯玉清訣取天門氣吹筆上靈寶無量度人上經大法卷之三十九
