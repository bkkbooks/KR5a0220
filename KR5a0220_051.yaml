front:
  text: 靈寶無量度人上經大法卷之五十一五十一同卷
  hash: sha256:e0fe24699cf3eac9c03b6b0263877acdd145c28525164133a643174a025ff574
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_051-001a, image: hfl/0094/0094-166.png}
body:
  text: 燃燈破獄品回耀降光儀玄師曰盟真科有回耀降光之格懴除五纍苦門開生死之業道破黑暗之罪庭法用梓木作輪如車軸之象上一層燈一十二碗中一層燈一十六碗下一層燈二十一碗共四十九碗中央五纍苦門各立牌書寫諸獄名目依回耀燈儀仍造四十九口小繒幡黃白之色互相交間上書諸天尊琅函睿號於幡首朱書破酆都符法師宣懴燈儀大法師持策杖左手搯玉清訣右手執杖隨懴儀至每獄所卓立策杖念大梵隱語以柳枝淨水灑之就燈焚化小繒幡如此諸獄罪魂乘此陽光應時解脫諸苦斷除五纍煩惱惡障徑離塵勞之業根又於輪之東西用絳綵三十六尺造長幡一首幡頂揉金作泥書中斗之形幡身用墨大篆回耀靈幡四字空三字書轉輪聖王天尊左手彩畫日形書太陽鬱儀帝君六字右手彩畫月形書太隂結璘皇君六字兩足分書回耀頌曰回耀紫微宫曲映九幽户峨峨丘寒池回照廓冰浦炎炎烈火獄霈然灑法雨拔度長夜魂上登朱陵府此科乃洞玄之禁典若非妙行啓請宣示則下世豈得聞見能回三景之暉曲降九泉之户使水火消滅毒苦金刃摧挫惡鋒鐡城鎔解鬼官罷考滅萬劫之罪對拔億萬之窮魂覩此三光徑生人天梓輪蔡致虛路時中儀不用梓輪以沙為之外方內圎徑九尺凡三重如車輪樣第一外圍二十四輻第二中圍十五輻第三內圍九幅當中立𢌞耀靈幡一首燃燈一盞內圍九幅燃燈九盞於燈後立三惡門三尸道三徒界標榜中圍十五幅燃燈十五盞於燈後立五纍五道五苦門標榜外圍二十四輻燃燈二十四盞於燈後立一十四獄標榜內圍幡榜九色欲門元靈隱耀天尊上尸道威光寶際天尊天徒界普照幽冥天尊愛欲門隨機赴感天尊中尸道虛皇普濟天尊人徒界大慈救苦天尊貪欲門慈悲救度天尊下尸道無邊普度天尊地徒界法力超升天尊中圍幡榜十五人道洞玉晨天尊色纍苦心門普光弘濟天尊太山地獄苦道弘慈廣濟天尊神道通光普照天尊愛纍苦神門法輪開化天尊風刀地獄苦道靈源普潤天尊鬼道慈悲惠愛天尊貪纍苦形門神光廣被天尊摙山負石苦道玄上玉華天尊地獄道寶光通照天尊華競苦精門玉清玄上天尊作江河苦道慈恩萬善天尊傍生門金華慈惠天尊身纍苦魂門玄明梵行天尊吞火食炭苦道玉真隱韻天尊外圍幡榜二十四監天地獄廣常慈愛天尊玄沙地獄普垂妙澤天尊無上地獄開度無量天尊太真地獄光明寶華天尊虛無地獄隨劫救苦天尊火庭地獄尋聲救苦天尊毒刃地獄無邊普濟天尊寒夜地獄九幽拔罪天尊律令地獄妙化無邊天尊風刀地獄廣常覆謢天尊九幽地獄金華廣耀天尊刑正地獄聖力無邊天尊太平地獄廣大慈悲天尊清沼地獄無極快樂天尊玄隂地獄輪轉萬變天尊天玄地獄廣度沉淪天尊天一北獄髙皇玉晨天尊三十六天獄髙靈最妙天尊元正地獄慈教廣度天尊河伯地獄普垂惠澤天尊禁罰地獄廣大無邊天尊黃天地獄大弘普濟天尊纍劫地獄隨念往生天尊女青地獄開度宿障天尊三徒天徒散形三氣陽光窮魂冠帶定慧靈樞德契玄無混化變生善寂凝虛法輪運轉永免天塗玉清開光寶符付天徒驅雷役電官右寶籙符命告下落滅色根惡道靈官奉為亡過某人斬除上尸斷絶天徒界上尸道色欲門免天官奔雷逐電之役一如告命風火驛傳年月日時告下具位姓告行地徒散形三陽交兆九地肇圖光顯開度九氣華敷六字澄瀾脫彼地徒玉清開明寶符付地徒擔沙負石官右寶籙符命告下落滅愛根惡道靈官奉為亡過某人斬除中尸斷絶地徒界中尸道愛欲門免地官擔沙運石之役一如告命風火驛傳年月日時告下具位姓告行水徒散形祕景長生通真解滯幽關內景含和善破四魔眀徹凝照玄阿水徒開泰永出愛河玉清開太寶符付水徒漣汲溟波官右寶籙符命告下落滅貪根惡道靈官奉為亡過某人斬除下尸斷絶水徒界下尸道貪欲門免水官漣汲溟波之役一如告命風火驛傳年月日時告下具位姓告行右三符並用黃紙朱書符白素書告文搯三徒訣存三官立於左右並降真氣入符中畢用靈寶大法司印印之焚於獄燈前焚時搯上帝訣誦呪曰玉清寶符元始敕行幽徒禀命三官解形赦除閉繫斷役消名隨品受化萬神奉行誦畢剔訣焚道君敕赦焚敕赦時兩手並玉清訣捧符於心誦呪曰玉清上帝敕赦上清大帝敕赦太清上帝敕赦敕命十方靈寶救苦天尊朱陵上帝朱陵府神君南極長生大帝九天監生大神受度亡過某人魂神玉皇有敕上奉道君敕赦十方三界罪魂光散九幽流香滿庭唵吽吟嚧嘔娑婆諦薩訶急急如太上道君敕赦律令三尸符世科度靈有斬三尸度五苦門儀蓋本上清洞真部元始譜録太真玉訣云夫學上法宜遣諸欲落滅惡根道自然降仙自然成當篆變景流光玉符依文施用即度三塗五苦符是上尸符青書玄素中尸符黃書白素下尸符白書白素色纍門符墨書白素愛纍門白書白素貪纍門赤書白素華競門青書白素身纍門黃書白素其斬上尸符第子著頭上中尸心中下尸及五苦符並著兩足於三惡門下叩齒九通而呪之即世科上尸彭琚中尸彭質下尸彭矯三呪是也本經無呪今宗壇受上清寶籙則為之太上符法雖云神化無方濟死亦可度生然斬三尸呪用於亡者其間未免有窒礙處今故刪去所是落滅三惡飛度五户靈官自屬玉清靈寶大法隨訣召降宣通符命開度亡魂則於理為可行上尸中尸下尸五苦第一色纍苦心門符妙哉元始傾光紫微曲映九幽性悟神飛霈然法雨遍澤一本作遍咸施濁咸啓玉清流火寶符玉清寶籙符命告下飛度色纍戶靈官奉為亡過某人斷絶色纍苦心門免泰山地獄苦道之難一如告命風火驛傳第二愛纍苦神門符陽氣上升出死度慶隂合陽交入生幽寥火煉死魂二帝靈章得成仙質秀飄所告神生自超玉清流精寶符玉清寶籙符命告下飛度愛纍户靈官奉為亡過某人斷絶愛纍苦神門免風刀地獄苦道之難一如告命風火驛傳第三貪纍苦形門符阿羅光明瞿曇混間玄景制會耀衢酆山龍漢玄上𣑽氣虛間勿涉苦津滅去凶殘玉清流景寶符玉清靈寶符命告下飛度貪纍户靈官奉為亡過某人斷絶貪纍苦形門免擔沙負石地獄苦道之難一如告命風火驛傳第四華競苦精門符破暗燭幽靈暉斷除駕景九丘華競空浮玉清流霞寶符玉清靈寶符命告下飛度華競户靈官奉為亡過某人斷絶華競苦精門免填河灌瀆地獄苦道之難一如告命風火驛傳第五身纍苦魂門八芒刀刃身纍永度榮敷摧殂斷滅三塗玉清流輝寶符玉清寶籙符命告下飛度身纍户靈官奉為亡過某人斷除身纍苦魂門免吞火食炭鑊湯地獄苦道之難一如告命風火驛傳右符各用青紙朱書封角逐門焚之掐上帝訣存身為靈寶天尊以氣吹之焚符誦呪誦畢剔訣玉清寶符元始妙章隱玄幽象妙逹群陽變隂作晝廓翳停殃消除五纍飛度南宫皇人曰夫修真之士若能為庚申甲子之日書於黃素服之可以去三尸逐五苦也後學之士謹而行之遇真有日矣八難鐵牀符靈寶符命拔度亡過某出離鐵牀地獄乘此陽光得生人道中常獲聰慧一如告命准靈寶大法律令刀山符靈寶符命拔度亡過某出離刀山地獄乘此陽光得生人道中證男子身常辭五濁一如告命准靈寶大法律令銅柱符靈寶符命拔度亡過某出離銅柱地獄乘此陽光得生人道中形體完全具足十相一如告命准靈寶大法律令鑊湯符靈寶符命拔度亡過某出離鑊湯地獄乘此陽光得生中華之國為豪盛長者身一如告命准靈寶大法律令爐炭符靈寶符命拔度亡過某出離爐炭地獄乘此陽光得生人道中值有道君理治之世一如告命准靈寶大法律令鐡輪符靈寶符命拔度亡過某出離鐵輪地獄乘此陽光得生人道中獲禀命慈仁之惠一如告命准靈寶大法律令鋸解符靈寶符命拔度亡過某出離鋸解地獄乘此陽光得生人道中長值國土太平之世一如告命准靈寶大法律令寒冰符靈寶符命拔度亡過某出離寒冰地獄乘此陽光得生人道中常與三寶相遇永證仙階之職一如告命准靈寶大法律令書八難符呪曰天尊救群迷超度離八難慶會人道中五苦一時迸永滅三塗津輪煥法周範希夷養嬰童浩劫無窮限右符用緑紙白書搯上帝訣書成逐獄門焚之焚時誦呪曰靈寶玉符超凌八難度脫窮幽得證彼岸大道幽微陽光燦爛獲人道中發大讃嘆一如告命准靈寶大法律令玄師曰謹按清微寶格曰隂功有德超祖考陽德顯然福一身何不立功救無間自然天帝賜子真亂臣賊子永沉淪猶依殊澤化昆蟲九年諸天稱悅慶白日乘雲朝玉清無間者幽隂苦爽也夫幽隂考治之密旨各有攸宜凡世之四生六道輪轉生死無有休息若非超生三界體入自然焉能解輪𢌞之苦且人道至於戎蠻夷狄正化不及日月不照之地但有三業六根五纍者皆生人也普統於北天北天有三宫鬼官之主非清泠青華紫衢三官也此之三官專主三考報對身業重則火官考心業重則録官考口業重則水官考若六根三業俱重則風刀考也人之生也父精母血凝骨孕肉而化生形質胞胎養育十月全儀太微降氣生神夙性隨化魂識方始生成為男則天尊有位為女則元君有稱但緣三業自造六根牽纏數盡歸空隨業受報肌肉沉於土壤魂神絆於鬼鄉非宿世而橫亡社令都土主閉係長夜永無出期儻若𡨚業酬還徑使歸於鬼都萬劫亦未超生或罪多而功少歷五苦而始有托化之漸設若功多罪少經一塗畢而使證輪回之福罪功俱鮮逐業報生無功罪大萬劫沉淪或火官考則銅柱鐡牀金汁爐炭火濠灰河火車鑊湯之報或水官考則冰池寒塘毒糞穢臭之報或録官考則金鎚鐵杖之報或風刀考則屠割鋸解飛戈飄戟拔舌犁耕迅雷烈風八達交刃割切身心刀山劒𣗳分解形體火犬毒蛇穿嚙骨肉燃骨燒皮灰粉神軀晝夜之中萬生萬死業風吹灑應時復形罪若淺薄苦盡化形尚猶不失人路多生卑賤不具相貌之人或生四極戎狄夷蠻之域罪重業輕生為六畜之形十世五世再循人道若也罪業重大風刀考掠之後散飄神魂飛揚萬方隨其胎卵濕化四生分形微細昆蟲永無再生人身之路更有罪業少而過名大者備經三𡍼五苦之後方入餓鬼之門再生劫運拘為長夜之徒擔沙負石漣汲溟波驅雷役電之後托生鬼道醜惡之報億劫之中永沉隂冥於是辛玄子酆都記云有胎生之鬼是此也既生人世舉足動𡵯惟罪是修意志情纍皆為根業善事善業彼求報此惡事惡業此求報彼一失人身便有此境至於酆都北帝啓陳尚云先緣不幸身任冥司動經億劫不覩光明况其下鬼罪魂乎是以遵承太上慈訓示此因緣使學士覩此苦報旨趣體太上慈悲之念發慈悲之智慧行慈悲之法門證慈悲之妙道使苦爽獲慈悲之恩德豈不樂哉是故祖師起救苦度人之法門百千萬篇作苦海之舟楫為成真之徑路凡是學士發斯慈心者慎無曠慢靈寶無量度人上經大法卷之五十一
