front:
  text: 靈寳无量度人上經大法卷之五十一五十一同卷
  hash: sha256:45fdcb2b1388b88e1a561dd9106425f2b4bb22333195dd894fd955b74fd335c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_051-001a, image: hfl/0094/0094-166.png}
body:
  text: 燃燈破獄品囘耀降光儀玄師曰盟真科有囘耀降光之格懴除五累苦門開生死之業道破黒暗之罪庭法用梓木作輪如車軸之象上一層燈一十二椀中一層燈一十六椀下一層燈二十一椀共四十九椀中央五累苦門各立牌書寫諸獄名目依迴耀燈儀仍造四十九口小繒幡黄白之色互相交間上書諸天尊琅函叡號於幡首朱書破酆都符法師宣懴燈儀大法師持策杖左手搯玉清訣右手執杖隨懴儀至每獄所卓立策杖念大梵隱語以柳枝淨水洒之就燈焚化小繒幡如此諸獄罪魂乗此陽光應時解脫諸苦斷除五累煩惱惡障俓離塵勞之業根又於輪之東西用絳綵三十六尺造長幡一首幡頂揉金作泥書中斗之形幡身用墨大篆囘耀靈幡四字空三字書轉輪聖王天尊左手彩畫日形書太陽鬱儀帝君六字右手彩畫月形書太隂結璘皇君六字兩足分書囘耀頌曰囘耀紫微宫曲映九幽户峨峨丘寒池囘照廓冰浦炎炎烈火獄霈然洒法雨拔度長夜魂上登朱陵府此科乃洞玄之禁典若非妙行啓請宣示則下世豈得聞見能囘三景之暉曲降九泉之户使水火消滅毒苦金刃摧挫惡鋒鐡城鎔解鬼官罷考滅萬劫之罪對拔億萬之窮魂覩此三光俓生人天梓輪蔡致虚路時中儀不用梓輪以沙為之外方内圎俓九尺凡三重如車輪樣第一外圍二十四輻第二中圍十五輻第三内圍九幅當中立𢌞耀靈幡一首燃燈一盞内圍九幅燃燈九盞於燈後立三惡門三尸道三徒界標榜中圍十五幅燃燈十五盞於燈後立五累五道五苦門標榜外圍二十四輻燃燈二十四盞於燈後立一十四獄標榜内圍幡榜九色欲門元靈隱耀天尊上尸道威光寳際天尊天徒界普照幽冥天尊愛欲門隨機赴感天尊中尸道虚皇普濟天尊人徒界大慈救苦天尊貪欲門慈悲救度天尊下尸道無邊普度天尊地徒界法力超昇天尊中圍幡榜十五人道洞玉晨天尊色累苦心門普光弘濟天尊太山地獄苦道弘慈廣濟天尊神道通光普照天尊愛累苦神門法輪開化天尊風刀地獄苦道靈源普潤天尊鬼道慈悲惠愛天尊貪累苦形門神光廣被天尊摙山負石苦道玄上玉華天尊地獄道寳光通照天尊華競苦精門玉清玄上天尊作江河苦道慈恩萬善天尊傍生門金華慈惠天尊身累苦魂門玄明梵行天尊吞火食炭苦道玉真隱韻天尊外圍幡榜二十四監天地獄廣常慈愛天尊玄沙地獄普垂妙澤天尊無上地獄開度無量天尊太真地獄光明寳華天尊虚無地獄隨劫救苦天尊火庭地獄尋聲救苦天尊毒刃地獄無邊普濟天尊寒夜地獄九幽拔罪天尊律令地獄妙化無邊天尊風刀地獄廣常覆謢天尊九幽地獄金華廣耀天尊刑正地獄聖力無邊天尊太平地獄廣大慈悲天尊清沼地獄無極快樂天尊玄隂地獄輪轉萬變天尊天玄地獄廣度沉淪天尊天一北獄髙皇玉晨天尊三十六天獄髙靈最妙天尊元正地獄慈教廣度天尊河伯地獄普垂惠澤天尊禁罰地獄廣大無邊天尊黄天地獄大弘普濟天尊累劫地獄隨念往生天尊女青地獄開度宿障天尊三徒天徒散形三炁陽光窮魂冠帶定慧靈樞徳契玄無混化變生善寂凝虚法輪運轉永免天塗玉清開光寳符付天徒驅雷役電官右寳籙符命吿下落滅色根惡道靈官奉為亡過某人斬除上尸斷絶天徒界上尸道色欲門免天官奔雷逐電之役一如吿命風火驛傳年月日時吿下具位姓吿行地徒散形三陽交兆九地肇圖光顯開度九炁華敷六字澄瀾脫彼地徒玉清開明寳符付地徒擔沙負石官右寳籙符命吿下落滅愛根惡道靈官奉為亡過某人斬除中尸斷絶地徒界中尸道愛欲門免地官擔沙運石之役一如吿命風火驛傳年月日時吿下具位姓告行水徒散形祕景長生通真解滯幽關内景含和善破四魔眀徹凝照玄阿水徒開泰永出愛河玉清開太寳符付水徒漣汲溟波官右寳籙符命告下落滅貪根惡道靈官奉為亡過某人斬除下尸斷絶水徒界下尸道貪欲門免水官漣汲溟波之役一如告命風火驛傳年月日時告下具位姓告行右三符並用黄紙朱書符白素書告文搯三徒訣存三官立於左右並降真炁入符中畢用靈寳大法司印印之焚於獄燈前焚時搯上帝訣誦呪曰玉清寳符元始敕行幽徒禀命三官解形赦除閉繫斷役消名隨品受化萬神奉行誦畢剔訣焚道君敕赦焚敕赦時兩手並玉清訣捧符於心誦呪曰玉清上帝敕赦上清大帝敕赦太清上帝敕赦敕命十方靈寳救苦天尊朱陵上帝朱陵府神君南極長生大帝九天監生大神受度亡過某人魂神玉皇有敕上奉道君敕赦十方三界罪魂光散九幽流香滿庭唵吽吟嚧嘔娑婆諦薩訶急急如太上道君敕赦律令三尸符世科度靈有斬三尸度五苦門儀盖本上清洞真部元始譜録太真玉訣云夫學上法宜遣諸欲落滅惡根道自然降仙自然成當篆變景流光玉符依文施用即度三塗五苦符是上尸符青書玄素中尸符黄書白素下尸符白書白素色累門符墨書白素愛累門白書白素貪累門赤書白素華競門青書白素身累門黄書白素其斬上尸符第子著頭上中尸心中下尸及五苦符並著兩足於三惡門下叩齒九通而呪之即世科上尸彭琚中尸彭質下尸彭矯三呪是也本經无呪今宗壇受上清寳籙則為之太上符法雖云神化无方濟死亦可度生然斬三尸呪用於亡者其間未免有窒碍處今故刪去所是落滅三惡飛度五户靈官自属玉清靈寳大法隨訣召降宣通符命開度亡魂則於理爲可行上尸中尸下尸五苦第一色累苦心門符妙哉元始傾光紫微曲映九幽性悟神飛霈然法雨徧澤一本作徧咸施濁咸啓玉清流火寳符玉清寳籙符命吿下飛度色累戸靈官奉爲亡過某人斷絶色累苦心門免泰山地獄苦道之難一如吿命風火驛傳第二愛累苦神門符陽炁上升出死度慶隂合陽交入生幽寥火煉死魂二帝靈章得成仙質秀飄所吿神生自超玉清流精寳符玉清寳籙符命告下飛度愛累户靈官奉爲亡過某人斷絶愛累苦神門免風刀地獄苦道之難一如告命風火驛傳第三貪累苦形門符阿羅光明瞿曇混間玄景制會耀衢酆山龍漢玄上𣑽炁虚閑勿渉苦津滅去凶殘玉清流景寳符玉清靈寳符命告下飛度貪累户靈官奉爲亡過某人斷絶貪累苦形門免擔沙負石地獄苦道之難一如告命風火驛傳第四華競苦精門符破暗燭幽靈暉斷除駕景九丘華競空浮玉清流霞寳符玉清靈寳符命告下飛度華競户靈官奉爲亡過某人斷絶華競苦精門免塡河灌瀆地獄苦道之難一如告命風火驛傳第五身累苦魂門八芒刀刃身累永度榮敷摧殂斷滅三塗玉清流輝寳符玉清寳籙符命告下飛度身累户靈官奉爲亡過某人斷除身累苦魂門免吞火食炭鑊湯地獄苦道之難一如告命風火驛傳右符各用青紙朱書封角逐門焚之掐上帝訣存身爲靈寳天尊以炁吹之焚符誦呪誦畢剔訣玉清寳符元始妙章隱玄幽象妙逹群陽變隂作晝廓翳停殃消除五累飛度南宫皇人曰夫修真之士若能爲庚申甲子之日書於黄素服之可以去三尸逐五苦也後學之士謹而行之遇真有日矣八難鐵牀符靈寳符命拔度亡過某出離鐵牀地獄乗此陽光得生人道中常獲聰慧一如告命准靈寳大法律令刀山符靈寳符命拔度亡過某出離刀山地獄乗此陽光得生人道中證男子身常辭五濁一如告命准靈寳大法律令銅柱符靈寳符命拔度亡過某出離銅柱地獄乗此陽光得生人道中形體完全具足十相一如告命准靈寳大法律令鑊湯符靈寳符命拔度亡過某出離鑊湯地獄乘此陽光得生中華之國爲豪盛長者身一如告命准靈寳大法律令爐炭符靈寳符命拔度亡過某出離爐炭地獄乘此陽光得生人道中值有道君理治之世一如吿命准靈寳大法律令鐡輪符靈寳符命拔度亡過某岀離鐵輪地獄乘此陽光得生人道中獲禀命慈仁之惠一如告命准靈寳大法律令鋸解符靈寳符命拔度亡過某岀離鋸解地獄乘此陽光得生人道中長值國土太平之世一如告命准靈寳大法律令寒冰符靈寳符命拔度亡過某出離寒冰地獄乘此陽光得生人道中常與三寳相遇永證仙階之職一如告命准靈寳大法律令書八難符呪曰天尊救群迷超度離八難慶會人道中五苦一時迸永滅三塗津輪煥法周範希夷養嬰童浩劫無窮限右符用緑紙白書搯上帝訣書成逐獄門焚之焚時誦呪曰靈寳玉符超凌八難度脫窮幽得證彼岸大道幽微陽光燦爛獲人道中發大讃嘆一如告命准靈寳大法律令玄師曰謹按清微寳格曰隂功有德超祖考陽徳顯然福一身何不立功救無間自然天帝賜子真亂臣賊子永沉淪猶依殊澤化昆蟲九年諸天稱悦慶白日乘雲朝玉清無間者幽隂苦爽也夫幽隂考治之密旨各有攸宜凡世之四生六道輪轉生死無有休息若非超生三界體入自然焉能解輪𢌞之苦且人道至於戎蠻夷狄正化不及日月不照之地但有三業六根五累者皆生人也普綂於北天北天有三宫鬼官之主非清泠青華紫衢三官也此之三官專主三考報對身業重則火官考心業重則録官考口業重則水官考若六根三業俱重則風刀考也人之生也父精母血凝骨孕肉而化生形質胞胎養育十月全儀太微降炁生神夙性隨化魂識方始生成爲男則天尊有位爲女則元君有稱但縁三業自造六根牽纏數盡歸空隨業受報肌肉沉於土壤魂神絆於鬼郷非宿世而横亡社令都土主閉係長夜永無出期儻若𡨚業酬還俓使歸於鬼都萬劫亦未超生或罪多而功少歴五苦而始有托化之漸設若功多罪少經一塗畢而使證輪廻之福罪功俱鮮逐業報生无功罪大萬劫沉淪或火官考則銅柱鐡牀金汁爐炭火濠灰河火車鑊湯之報或水官考則冰池寒塘毒糞穢臭之報或録官考則金鎚鐵杖之報或風刀考則屠割鋸觧飛戈飄戟拔舌犁耕迅雷烈風八達交刃割切身心刀山劒𣗳分解形體火犬毒蛇穿嚙骨肉燃骨燒皮灰粉神軀晝夜之中萬生萬死業風吹洒應時復形罪若淺薄苦盡化形尚猶不失人路多生卑賤不具相貌之人或生四極戎狄夷蠻之域罪重業輕生爲六畜之形十世五世再循人道若也罪業重大風刀考掠之後散飄神魂飛颺萬方隨其胎卵濕化四生分形微細昆蟲永無再生人身之路更有罪業少而過名大者備經三𡍼五苦之後方入餓鬼之門再生劫運拘爲長夜之徒擔沙負石漣汲溟波驅雷役電之後托生鬼道醜惡之報億劫之中永沉隂冥於是辛玄子酆都記云有胎生之鬼是此也既生人世舉足動𡵯惟罪是修意志情累皆爲根業善事善業彼求報此惡事惡業此求報彼一失人身便有此境至於酆都北帝啓陳尚云先縁不幸身任冥司動經億劫不覩光明况其下鬼罪魂乎是以遵承太上慈訓示此因縁使學士覩此苦報旨趣體太上慈悲之念發慈悲之智慧行慈悲之法門證慈悲之妙道使苦爽獲慈悲之恩徳豈不樂哉是故祖師起救苦度人之法門百千萬篇作苦海之舟楫爲成真之俓路凡是學士發斯慈心者慎无曠慢靈寳无量度人上經大法卷之五十一
