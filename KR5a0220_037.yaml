front:
  text: 靈寳旡量度人上經大法卷之三十七麗七
  hash: sha256:4be9be7948a8d2ab75b2aa81fbd230e7b283ed4b29a8cc7489a3a20d19ecc82a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_037-001a, image: hfl/0092/0092-088.png}
body:
  text: 回死起生品夫三真飛斗廼駐景延生之道益筭保命之法其諸災厄立見應効謂如命禄將絶災厄至重欲作大功徳營辦未及或巳作功徳未能功成性命既絶遂爲俗謗故用三眞飛斗延生益筭大則三日次則五日次則七日可以别作仰謝諸天復魂拔魄囘喪車還性命延夀筭於𥘉三二十七或八節三元十齋甲子庚申本命元辰如在急速更不擇日止忌魁罡加臨病人本命及法師本命不可修用若更天數天筭數盡得九並不治前三辰爲罡後三辰爲魁隂日反此仍看浴盆之日雖安則其病淹延夀筭亦不甚長逺春龍夏羊秋狗冬牛納音支干犯水字謂如壬戍壬辰丁丑丁未是也先灑掃淨室用燈九盞依斗象安排毎一燈用燈草三莖淨油满盞要停勻時新五果九分時花九瓶清酒九升山泉淨水九盞香九爐雲鶴二十七隻雲馬九匹五色線各二丈並安排畢於雲馬上寫奏表九通於鞍橋上書本命九符又别於傍供養九分擎羊陀羅使者二分四直神君四分土地一分本命元辰一分本命眞官一分香茶酒果排列俱畢不得令僧尼産婦孝子鷄犬多口饒舌之人見之不得動鍾磬亦不得髙聲啓告依此行之必獲感應凡入壇奏告便上香先念淨天地神呪呪水灑徧壇席醮筵次明燈春夏從斗口點秋冬從斗柄點起毎一盞念呪一徧燒符一道呪曰七星煌煌子北之方台街之下帝庭之傍厥紀民物厥綱隂陽賞善罰惡降福除殃冀兆之夀不折而長冀兆之俗不虞而康斗中有靈聽臣宣揚點燈畢九拜再上香念淨壇呪曰吴天勑行流金蕩凝四七豁落穢消塵清念九徧吹八方又再九拜畢念啓請祝曰具位臣姓名今開啓侍香金童傳言玉女五帝直符直日香官三界直符上界直符鄭元熹中界直符焦公奴下界直符張元伯年直使者崔舒宣月直使者盧機權曰直使者竇楊光時直使者鄧衡文同左右龍虎君擎羊陀羅使者爲臣關奏北方五靈眞老帝君九天聖母北斗九晨星皇君四聖元帥眞君斗中聖衆臣今建置一壇敷陳斗象急告星天伏望聖慈降臨眞炁𠃔臣所奏剋獲報應臣某謹言次畢再上香九拜俯伏在地叩齒三十六通先存肝出青炁化青龍心岀赤炁化朱雀肺出白炁化白虎脾出黄炁化黄龍腎出黒炁化玄武五臓出五色眞炁如長虹之狀直衝北方斗口之前良久化爲度仙橋玉柱自已存已身衣冠依本職服色頂出紫炁乘紫炁登度仙橋至斗宫毎一星大如東輪光明如日中有金樓玉殿寳山瓊水琅玕寳樹侍衛皆九皇使者綉衣靈官金童玉女自已毎一星九拜奏告其事良久復至壇下有紫雲異香即見擎羊陀羅二使者若玉女相似一人托金盤内有羊頭一人把花枝仗劒先來檢察醮筵畢使者却昇入斗中或聞異香或自見紫雲乃九星上聖降臨也再九拜然後點茶上酒𥘉獻九拜畢讀奏醮主三奠茶酒三禱祝亞獻又三奠酒讀奏九拜三終獻讀關引將奏烈火焚之師與四直三使者本命星官元辰齎奏詣本屬星斗君闕下毎一星心三拜囘於醮筵前守等報應然後燒餘獻狀錢馬雲鶴畢念散神呪曰天神還天地神還地後召復來一如故事即念復爐消災呪九徧九拜祝曰朝向天靈臺暮宿九天來天神連夜奏消滅諸禍災即徹座散壇若病稍不添及减可即行育死局換生名除罪解厄可以延生住世可以備辦即關點三十二天仰謝或復魂拔魄醮奏斗式具法位臣姓某據投詞及本命生年月日時見爲某疾患次謝罪云云切慮有甚罪次解災深恐年災月厄運屬魁罡五行刑害天羅地網凶星惡煞臨命位見令如何謹録上奏北斗九晨星皇君九皇夫人北斗太一内妃靈妃玄母大女中女少女左右髙皇夫人斗中眞宰諸靈官伏望聖慈特降眞光照燭懇誠原赦罪業除蕩災厄滌除一切邪惡病炁蠲消邪鬼侵害延生續命添益壽筭救治病苦速賜安寜則仰謝皇天罔極之恩冒瀆聖聰臣下情无任惶懼之至恭俟感應伏候敕旨年月日具法位臣姓某狀奏經師上清妙行眞人籍師上清君后眞人度師上清泉降眞人巳上奏狀七通不用方函通封貼黄奏上七位晨星君三法位臣姓某狀奏謹封其諸九位獻錢馬雲鶴如常式於馬上鞍橋中書七元符朱書斗經符又法用大雲馬九騎於馬上寫奏法師位具事因乞作如何施行毎一馬奏一斗星神君並用伏聽聖旨於年月日時階位用飛玄三炁玉章印扵馬鞍上書斗經中符輔弼符用香茶酒果九分焚之其時禱祝三眞人願爲上奏明降報應𩀱手搯子午斗𦋇雲馬奏飛入斗中於雲馬後三眞聖號用封皮奏上某星君具法位上進謹封關丁甲四直神君飛奏入斗將灰三捻隨事取斗星淨水調灰服少許塗五心守候報應右七元符朱書及治妖怪種種用之飛神入斗章皇人曰下元有山川河海之内城邑郷塢之中石水禽獸之精五行不正之神下土强惡之鬼魑魅妖艶之魂妄作妖孽擅行異端纏惑生人諸不能治或有北隂鄷都之内神司血食之賔結連祖考近化姻親訟由冥曹延及生人伏連殃害諸不能解以此三辰玄樞靈壇即建淨室所祈立報解治安寜訣曰取淨土或密室或曠野无人逈靜之處建壇一所髙三尺上安南方七宿内南斗六司中九晨三台日月之位並㸃燈二十一盞并紫微大帝君中壇前列洞案一所設二十一位并三官四聖正一眞人三將軍四直使者太𡻕土地擎羊陀羅二君以五色線自斗燈口布直至洞案之下於地上以白琧土劃一所方可三尺六寸開四面門取二斗眞諱燒於爐熖師當自天門而入飛神入斗口章密奏髙眞暗書匿過合和年命鬼怪戢息人道肅清其應驗異至感至神先歩斗自柄入斗口復回至柄𦋇身再歩入斗口三拜至第三拜俯伏存身如法下田白衣入絳宫青衣入泥丸紫衣入畢想五臓五色炁以神乗之舌爲度仙橋如長虹之狀隠隠而見良久漸漸分明面前有一池水水上見橋直入斗口巳乗炁登橋至斗口見光明耀映如月之狀其中有玉殿金階黙呼四直使者具白醮意見使者入斗中逐一星宫奏之次忽見擎羊陀羅二使者下降檢察醮筵清潔復奏星宫有斗中上奏靈官引師奏事有可𠃔之意再拜便回又存如前至南斗中奏事見火鈴大將軍六星童子下降依前檢察訖良久有紫雲異香或赤光入戸乃二斗下降忌孝子婦女鷄犬僧尼飛斗用大紙雲馬於鞍橋上書南北二斗符出於本經並用朱書於空處寫奏一通逐匹雲馬書奏一星君名獻狀如常式臨火化宣之育死局經云有回生注死之功有消災度厄之力育死入生局乃眞人大慈留此女妙教度生靈感應頃刻凡人重病災衰書符一道并年甲姓名取一生罪狀實封以金錢十陌靜夜祭斗歩斗入斗口朝斗念呪視本色星吹之同燒移時别書一道燒灰令服之又别書一道令佩之是夜報延年幾何又以百刻點勘法合之書符呪曰謹請五星靈應帝君和合某甲年命急急如元始上帝勑律令燒符狀式具法位臣姓某據某甲年月日時生上屬北斗某星所主爲患云云切慮宿世𡨚愆今生罪過誤犯禁忌謹具實封陳首乞救苦延生度厄者朱書右謹請北斗中五星靈應帝君和合某申年命赦罪消災解除衆危度脫病苦使某甲一向痊安急急如元始上帝勑麗七天師真君律令太歳年月日具位臣姓某狀如當夜未有報應當用後符行持如前育換度人不死局書符呪曰中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延夀益筭度厄尊神廽骸起死无量度人急急如靈寳符命律令速度亡魂品玄師曰凡臨壇按治鬼邪務在存亡俱得利濟先爲破獄凡行此法與大齊度亡一同破獄呪曰旡上玄元大上道君教臣行符照破幽獄靈魂出離若按治云罪䰟急急如律令勑右呪面天門念九徧吹亡魂即俓得魂神離苦廼先行水錬法呪曰坎文歴出巳枯復榮巳滅復生得生天上更禀太靈九天之刧反覆胎嬰穢累蕩滅自尸返生右法以水一器正北叩齒九通思男玉童三人從心出女玉女七人從腎岀唾津七口行火錬呪曰离文勒發日光月華徘徊洞陽流火入器煉化隂芒尸穢消滅萬炁混康徑離五苦飛升天堂右法以火一器正南叩齒三通思前呪呵炁三口呪七徧取鄷都眞形火化成灰呪曰元始符命制魔奉行保舉亡魂度品南宫鄷都消燼三宫解形赦縳閍業受化更生隨品受煉上生福庭右呪畢以舌柱上腭存身爲元始天尊頂中黙誦隠語一徧存金光满口𩀱手搯玉清訣吹灰徃東北方放訣其魂即得上升朱宫此乃速度之要請至誠行之靈寳追魂符右凖玉淸寳籙追魂眞符告下三界靈司里域主者追魂攝魄神吏仰承太上符命速疾追取邪妖克害拘執不放徃生沉魂火急追取前來玄壇受度不得拘留速令徃生乗此眞符超升道境一如告命風火驛傳九天生神九煉祕符生神章第一離文丹天赤炁生神章第二兊文素天白炁生神章第三震文蒼天青炁生神章第四坎文玄天黑炁生神章第五巽文梵天紫炁生神章第六艮文梵天碧炁生神章第七坤文梵天銀色光炁生神章第八乾文梵天金色光炁生神章第九玉帝訣上天青黄白三炁報應九章玉光神呪靈魂隂精苦爽南溟聞吾一呪入上崑崙千妖萬怪太上之孫入夢現形出離幽冥六天大魔保生長存急急如上清大帝律令勑右符法搯玉清訣三五徧取天門炁吹鬼門再取鬼門炁吹於靈位或旛上即得現形墜旛通傳語言靈寳无量度人上經大法卷之三十七
