body:
  text: 鍊度諸符品降太上真水火法皇人曰夫幽冥隂暗之鄉苦魂滯魄身形穢濁執留泉扄若非得天地之氣鍊度之功何能超悟是以玄皇哀愍大捨慈悲留流火冶鍊之文使奉法之士體元始應化之身集隂陽玄元之氣和合三田之光假南方三氣之火升降清濁斬絶鬼户滌除穢垢使內外瑩徹百骸流光然後始證無為之道故追魂皆先用北斗之書聚其魂魄去其死尸而後以南極之篆監簿上生故知南辰北斗陶魂鑄魄即得返形遊行太虛北靈寶之上道也皇人曰法官執簡有變朝禮如法默奏上帝乞降太上真水真火下降先須解穢淨身步九鳯斗至斗口三捻上香再拜行用如法九鳯罡皇人曰左手本師訣右手執破穢符存身步罡服符並左右足單步九鳯破穢符天回地轉回轉九天元鳯却穢九鳳收君度穢君度九鳳蕩穢君度九鳯解穢君度碧落梵氣之符皇人曰書北符以兩手辰訣一覆一仰自心劃至髮際閉目存為元始項生圎象手執如意額中有九色光明化為五色獅子之座紫雲覆體內外瑩徹十方來朝即通出四二氣取三氣吹筆上次掐中指中節丁立面東書訖即叩齒九通咽液九過然後存五臟五色之氣注入符中拜奏章詞表文篆此以竹枝湯吞之書於壇場之上能召十方衆真來降口奏請水火式具法位臣某下愚尸穢冒忝師傳得受靈書遵行正教濟生度死以應誓言謹有情詞上干天聽誠惶誠恐稽首頓首謹言今據齋意今臣煉度亡魂某等不敢抑絶皇民善願謹具上奏祖師北極紫微大天帝祖師南極注生大帝君御前伏望聖慈特賜睿旨頒下水火二司五嶽總領真君乞降隂陽靈根真水真火即日今辰降下壇墠煉度亡魂使其神魂澄正萬氣長存身相具足復有光明上升天府仰賴天威慧澤洞鑒臣俯伏以俟天恩昭報無任瞻天仰聖激切待罪之至皇人曰法官秉簡叩齒存神默奏北帝禮三拜然後默奏面朝東北宣水科燒真水符真火符一同畢方行煉度事降太上真火訣寅加卯卯加寅風火交異午便剔出先吸南方火氣三口後吹入炭火中主火大將軍符三清玉帝北極勑左有右有日君月君天府真君度天相真君度天梁真君度天同真君度天樞真君度天機真君度南極長生大帝君度金烏南極注生大帝君度降彩黃氣日景髙奔鬱儀停午陽精圓明木公尊神居中融和萬彚鮮吁火龍奔衝育童炎烈離宫用主火大將軍符一道先於局中燒面東南召至壇下呪曰謹請主火大將軍願立降真火煉度亡魂取南氣吹火池中火起半青半赤之氣降太上真水訣左手子文右手亥文先取北方氣五口吹入水池中主水大將軍符三清玄元三氣君勑左右陽隂貪狼真君度巨門真君度祿存真君度文曲真君度廉貞真君度武曲真君度破軍真君玄北魁範君度玉兔度北極玄冥君度呈形徊水隱精丹景髙奔結璘居子圓明祖母元君交中分氣幽塗長夜玉體金津陶鑄咸覩慧光流門坎宫用主水大將軍符一道先於局中燒面東北方呼召至壇下呪曰謹請主水大將軍立降真水煉度亡魂取北方氣吹水池中再呪曰謹請太一凌空七祖神北隂玄司使者急降真氣再取北方氣一口吹水中存水中黑氣起靈寶淨天地符天地淨然洞中玄虛三清穢氣分散晃朗太元玉敕光映八方威神靈寶符命九衢使我自然九天普告乾羅答那洞罡太玄斬妖縳邪中殺鬼萬千山神呪元始玉文玄水洗穢按行五嶽却鬼延年八海知聞魔王束首侍衛我軒凶穢蕩盡道氣長存焚符玉帝呪曰神靈天真玉清元真上清華房元始老君妙入太霞光耀玄文七神飛泉北酆受煙我位上王逼合鬼群八威吐毒肅肅尊神千千去穢凶惡不存萬萬魔王護命剪形急急如律令右符黃紙朱書玉帝訣誦三遍凡建壇燒於水中灑壇三匝或法官出入臨喪或到産難之家及值厭穢回壇急書符燒灰於水中仍面東取氣入水以灑淨身元始符命皇人曰元始天尊在七寶騫林放大光明照見天上地下有諸罪爽不覩光明沉滯迷津飄沉苦海無由脫離故天尊哀愍降諸符命救拔罪魂得升道境永脫苦因受法之士當澡心滌慮精思至道依法告行則幽冥有所濟度矣五星元亨始青死魂炳煥利貞碧霞受煉太上魂魄攝召招真元經返形萬氣命靈黃氣仙化與天度品君中成人齊年南宫上清靈寶元始符命告下三官天牢地檻主職神司超度亡過某靈魂上升清微之天百神混合變化成真永離死户體變玉光秉受玉符參侍龍轅一如告命元始檄文靈明紫蘭太素髙虛太真玄晨三氣浮于玉清八觀朗映九衢妙覺變化始青肇圖應感輪回消魔瓊都芝精煉質逍遙帝輿三清曲赦照破夜塗五嶽九幽無間酆都波羅摩褥下救三塗五苦八難苦厄俱除冥官稟命元始真符急急如令違者咸誅急急如靈寶大法以救亡魂檄文律令石景水母玉精符係太上沐浴真符先誦呪然後書符呪曰東井黃華石景玉精飛玄水母金醴玉津滔滔源源不竭池亭九龍灌煉三光垂精仙人吐潤煉度魂靈內外朗徹表裏洞清百關九竅元氣滋榮五臟六腑萬神自生胎胞結節隨水開扄死無斷滅惡絶沉淪我今煉化死骸生魂返故攺貌玉體金容變化煉穢飛升紫庭急急如長生大帝勑誦畢取北氣及當日太隂氣吹筆閉氣書符以東井頌勑之呪曰天河灌東井石景水母精玄光拂靈曜圓暉映髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香水玉女流玉津冠帶濯玉液煉度五仙形體香萬神降乘景登髙明東井灌皇華石景水母精浣魄淨隂穢蕩形成玉嬰表裏瑩通徹內外光華清靈光神不昧正氣合真仙金童散紫煙玉女麾神精五芽分五氣三素布三雲鬱儀纒結璘飲之復完形詣我玄壇下煉神升玉京玉清真水合同符黑書黃上用二道取太隂氣吹筆月訣申至子取水氣三口或七口吹符太上霐池神龍運東慈敕無鏡之淵井華以滌攬兹太和玄和幽魂運容之津玉女灌之于神魂神道氣澄正長存呪曰搯子文太玄之一八景同靈五老祕諱日月運明璇璣運轉十千五行八史通靈招神致真聞吾呼召速降威靈承符奉命輒莫容情急急如律令取北氣吹入符中再以靈寶總呪勑之水煉超度真符一氣皈天二氣隂陽合氣皈人天地交并天清四方三五混合天清地寧合真黃華蕩形地爽煉度亡靈元洞玉曆龍漢延康渺渺祖劫混沌之中上無復祖兆當凝神靜念思自已下丹田有紫黑之氣結成宫殿下有淵泉有九龍居淵泉之中宫殿乃真人居焉又思九色之氣在上田結成金樓玉殿乃元始上帝所居存元始上帝開顔含笑下降金光一條直透下丹田中存真人乘龍自沉丸宫中直出龍吐真水洗滌亡魂次存元始上帝手執如意乘龍浮空中頂放真光灌溉亡靈體生玉光明如瑩玉了無瑕翳良久又存元始復逆上丹田真人皈下丹田兆篆此符用青紙黃書呪曰太華之水浩渺無窮能令枯朽返胎復嬰黃華灌煉魂魄生光降與真人俱會玉房玉真煉形符用黃紙墨書取北氣元始一氣混沌真一萬象化生無上玄元神水蕩穢惡氣不煙慈風洗蕩日精月華育消釋罪根養真元上帝有命普度幽魂呪曰浩浩渺渺太上靈泉潤枯育物流注自然神華生液澄清太玄生魂育魄靈液綿綿清泠保命北都純煙華池浩渺莫測其源石景九煉水母玉符祝符呪曰陽明煉精光煥紫庭八芒朗映魂芝日盈五回三轉氣通太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御石景水母灌精順生運氣隨日華榮九孔納真解脫本形黃氣隂華陽精洞鮮沐浴九魂冠帶金晨貟明啓告玉胎煉仙華光交煥流芳淘津九陽齊化玄霞散煙元景回靈曲映我身飛升上宫洞視瓊仙黃氣流精三合凝光玄暉返正冠帶八芒煉魂東井受明飛星含華散靈五君流芳夫人降醴潤灑十方洪芝下注六腑益充金精九仙易景返容乘虛落煙遊宴太空上造月庭與真齊雙變化八道出有入無二晨同暉永保無窮右存月中有五色流精下降池中想亡魂身有陽光照滿十方玉光瑩潔相貌端嚴法師默存黃華蕩形天尊朱陵度命天尊石景水母大神下符呪曰東井華池玉田浮霐石景水母玉胞金晶五方正氣日月之精玉眸已煉黃華蕩形靈寶符命受煉更生月魄符白地朱書玉清煉身符元始天尊靈寶道德神霄天尊天尊真王勑日魂朱景照韜緑映月魄曖回霞赤童玄炎飊象蕭芬艷翳寥婉虛靈蘭鬱華結翹淳金晶瑩炅容臺標首相散形呪曰亡魂首相具體全人是男是女骸變通神十干呪曰流火丹宫朱陵煉身玉眸真水黃華蕩形我身上告十干神兵飛騰玉府升入帝庭奉神霄玉勑速降元氣成祝符呪曰上元一真守固泥丸中元一真安鎮絳宫下元一真守衛命門三元齊景保命長存招真致靈坐降自然變形煉髓骨化成仙毛羽飛騰翺翔帝宸急急如律令甲乙丙丁却穢生神戊已庚辛正氣聚形壬癸生精復汝真形元始符命上升朱陵急急如律令法師凝神下符呪曰龍漢蕩蕩無形無名渺渺億劫黃道開明神燈朗耀九龍吐津玉虛澄輝太霞髙明元始開化諸天齊齡三元道養二象攝生未度者度未成者成已死者化巳枯者榮蠢動垍息一切冥靈懷胎含孕咸得受生亡者命過魂歸三清魄受煉度南宫變形今日大慶皆得光明五帝鑒映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大道至真尊神無窮無極普監衆靈惡根斷絶玄都記名衆真監度一切咸聽金液煉形符亦名召魂文煉符三寶煉度亡故某君勑三魂七魄靈光遍施遷升魂魄幽夜開明還聚本形呪曰靈寶符命金液煉形與道合真開明三景是謂天根無幽無極無始無終元皇九醜靈魔絳宫紫雲飛天身乘六龍火上水下流入三宫神皈陽明大道自通急急如上清金液煉形律令真火合同符黃紙朱書用二道先取太陽吹筆日訣寅至已取火氣書符太上南閻洞浮玉眸詵詵慈勑流火之膏浮熖之庭真氣下降煉度沉魂呪曰天中之靈日月俱通甲乙氣令五行旺剋八景玉音守形真符招真致靈攝魂符使聞吾呼召速降通靈承符奉命輒莫容情急急如上帝勑火錬成仙符朱明上景日月石景並明水母玉胞金晶中有赤帝南極玉眸老人名曰洞浮詵詵洞陽火煉甲乙隂消魄晶丙丁戊巳庚辛胎光玉嬰回骸起死長生壬癸受煉大君丹界天尊朱陵度命受煉更生急急如三台真人台靈寶度人律令光幽精爽靈玉胎煉仙符黃氣隂華沐浴九魂九煉陽晶固仙生尸冠帶金晨圓明啓告玉胎煉仙華光交映九陽育化流芳陶津玄霞散煙元景回靈曲映飛升上宫我身洞觀瓊軒呪曰日月光華徘徊洞陽流火入器煉化隂亡尸穢消滅萬氣混康徑離五苦上生天堂陽精已通飛華巳新皇芒流溢廕注內纒仰餐玄潤芳華來臻宫宅開張蕩洗囂塵體映玉光面發金真雲飛禹步上造日門日魂流光五色滂沱鍊魂金門圓景峨峨靈輝吐耀受明天河玉芝盈溢蘭潤芳嗟飲我皇水哺我飛華掇根咽實壽同靈柯形附太輝身騰飛霞千齡萬劫使不傾殂焚符呪曰陽明煉精火煥紫庭八芒朗映魂魄溢盈五回三轉氣通太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御石景水母灌津順天運氣隨日華榮九孔納真解脫本形急急如靈寶大法煉化成人律令皇人曰右符乃三景玄元之氣結成凡煉度亡魂用香九片書亡人姓名生死年月日時面東書符同香焚火池中則亡人全其形升昜境矣日魂符紅地黑書受煉召魂符三皇元君天洞金玉之光天真照徹十方攝召魂爽來詣察命溟漠玄治定録開通正定五府勑符一召本心開明隨呪來急次九轉云玉清上帝勑上清大帝勑太清大帝勑金木水火土五星尊神攝召亡過某赴玄壇吾奉太乙救苦天尊勑行焚