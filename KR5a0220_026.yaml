front:
  text: 靈寶無量度人上經大法卷之二十六生六
  hash: sha256:d6a757a180bff0f4234197f7413798e49fdcabb2511ebd9327518a0ce4ef8c3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_026-001a, image: hfl/0090/0090-026.png}
body:
  text: 神受大法品玄師曰兆欲念十方天尊一心智慧須令丹房瑩淨七情六欲俱無混亂一心專誠常不放逸少欲戒念見在知足行慈順生莭儉忍辱抑怒少食減睡息思慮省視聽默語言守動靜息心在茲常於動靜之間不失此度然後擇十直八莭是諸良辰汰浴內外燒衆妙香恭對玉清上帝元始天尊御容便足而坐叩齒集神咽液和魂定心淨念調氣使勻心拜三過安意一心諦觀聖容先從萬變玉清寶冠次觀圓明天顔金真之色圓色如九色虹霓次第九色離羅帔服二手展視天印轉次下觀雙足坐於金碧蓮座擎以玉局碧瑶玉几又復從天顏天冠相相諦觀時時閉目憶念在心若不明了還開目視極令分明不失毫末再閉目觀之行住坐卧此觀成巳然後於間靜之虔焚香默坐觀西北玉清之天玄虛之際廓然火光如日月之明遍滿法界無有山河草木此定成巳唯見一天尊在空虛之中如前觀威儀坐於金碧蓮臺之上舉手說法光明七十二瑞相八十一種好諦心觀察一一分明繫心無復散亂如是見巳便見亠方天尊光明相好天尊舉手說靈寶大法既見十方天尊便增見十方億劫應化天尊乃至無邊天尊初則近見漸次遠見轉遠轉大光光相摟見巳回觀西北復如前院不失毫末觀既成巳十方上下亦復如是十方厯厯分明當復一時遍觀十方百千萬億諸天一念所緣周遍得見而諸天尊同一智慧覺悟道源圓照諸法了入無為若如此者歲月既久定功乃成自然得見十方諸天尊皆為說靈寶大法疑網悉除得元為正道若是宿業障重不能得見天尊者但一日一夜六時懴悔精思入定懴禮平生惡業精勤進道隨順一切德喜心結於因循漸能得見縱使不為說法是人心巳證入快樂妙果身心安穩久亦得見無為大道也次能七日七夜湛然見玉清聖境前之大定精思巳成當於間靜之處乃至睡卧一心三聖存上宫泥丸廓然放白光大慧光遍照法界念念三聖心心光明歲月既久觀力定成七日七夜不昧决定見元始天尊說法神通現前訓誨汝心即入道源所謂念念無休息也稽首天顔而作頌曰一心三聖三聖一光光光心生明明因光一聖心通萬變乃光圓通遍覺不迷不荒又頌曰精誠正趣晷刻不空虛因求實空亦不空先空後應先得後通生心心滅無始無終隱朝帝師品朝玉清兆密室焚香端坐叩齒二十四通存己眉心直入三寸名泥丸宫元始上帝所居兆誦三天隱諱霐召三氣自泥丸中入下至中宫次入下宫次返上宫存已元神朝元始上帝誦隱諱不以遍數存見三氣充滿九宫光明洞照元始上帝在光明殿內坐千業蓮花光明如日頭冠玉清萬變寶冠衣九色離羅晨精丹羽寶帔項負圓光金容玉姿二手作玉清印一俯一仰存之分明想身在金闕下九拜長跪密奏曰糞土小兆學道男生臣某誠惶誠恐頓首稽首拜手奏啓無上三天玉清聖境祖師虛無自然元始天尊至尊上帝御前臣夙承道廕生值昌時得遇師承參授大法叨掌天印濫宰玄司日積愆尤未遑首謝恭望天慈特降敕允告下羅酆北府三官岱宗河源泉曲主執萬神原赦臣某千罪萬考萬禍千殃除落寃對記名三天進道修真免諸魔試胞源散滯結節開通三界稽首萬邦賔伏早遇玄師指授金丹鉛汞大道教臣坐進大定心悟重玄符水效靈攝召克應功成願備得預真仙仰荷大道罔極之恩臣無任祈天禱聖激切屏營之至伏取敕旨奏畢心六拜跪于帝前默誦三天隱諱候得旨兆存三氣紫光繞我身即三稽首而退下入絳宮次歸下田朝上清兆密室焚香端坐叩齒二十四通存已眉心直入四寸名流珠宫太上道君所居兆誦三天隱諱霐澄召三氣自泥丸上宫入至中宫次入下宫次返上宫存己元神乘三氣上朝太上道君在寶殿中坐千葉蓮華衣九色離羅紫雲之帔飛森霜羅之衣須臾百變之冠存之分明存身在玉陛下九拜長跪密奏曰糞土小兆學道男生臣某誠惶誠恐頓首稽首拜手奏啓無極大道太上道君上清上帝御前臣凡俗穢質獲遇師承參佩靈文效職靖治伏慮前生今世故犯悮為三業六根千愆萬過無門首謝日夕憂惶恭望天慈特垂原赦切念臣某常懼生死事重寒暑運煎朝露易晞靈椿難繼臣今行持上道祕典吞佩真氣靈章存三守一澡煉身形內解結莭胎根外除兩日氛穢却除疾病絶滅禍源恭願削落黑編刋絶死籍然後洞入幽微真常德性形神俱妙與道合真一切有情生六五咸成遒果臣冒瀆天威下情無任激切屏營之至伏候敕旨奏畢心拜六拜跪于帝前誦隱諱不以遍數候得旨即存三氣紫光來繞我身即三稽首而退下入絳宫次歸下宮丹田朝太清兆密室焚香端坐叩齒二十四通存已眉心直入二寸名洞房宫中央黃老太上所居之處兆誦三天隱諱霐澄召三氣自泥丸中入下至中宫次入下宮次返上宫存己元神朝太上誦隱諱不以遍數存見三氣光滿九宫光明洞照太上老君在金闕玉堂中坐千葉蓮華金容互相逢七曜寶冠衣晨精九色離羅白羽飛霜繡帔憑碧琳玉几手執振拂之羽存之分明存身在金關下九拜長跪密奏曰糞土小兆學道男生臣某誠惶誠恐頓首稽首拜手奏啓混元上德皇帝太上老君太清大帝玉陛下臣千載幸會獲遇師承參授法籙領户化民日積過愆未遑首謝恭望天慈頒降敕旨告下真司特垂赦宥令臣向去心開意悟耳聰目明萬仙會議賜臣金丹消災却禍遂獲神仙為教宗師闡揚大道濟拔幽顯利及群生得為後聖種民獲與天地相守恭願乾坤明素日月輝光星斗循軌山嶽效靈風雨時若水火潜形萬天道泰劫災不生蜎飛蠕動咸獲超升臣冒瀆天威下情無任激切屏營之至伏候敕旨奏畢心拜六拜跪于帝前默誦隱諱不以遍數候得旨存三氣紫光來繞我身即三稽首而退下入絳宫次歸下丹田玄丹宮眉心直入五寸昊天玉皇上帝所居明堂宫眉心直入一寸長生大帝神霄玉清玉所居明堂官左乃韓君文人分所居之處北斗九晨在腦中泥丸之上魒星指前北極尊帝二星在斗中兆欲行事但看所𨽻何宫若黃籙大齊則諸宫關遍告九幽煉度則告玉清與韓君文人雷雨事則告神霄祝文更不重序朝帝師受氣兆靜室焚香叩齒並依前朝元法存身在金關下長跪密奏曰糞七小兆學道男生臣某言念千載有幸獲奉道化仰惟靈寶太法實三洞之真筌上消天地之災變下正隂陽之愆期幽可以拯拔三塗修可以脫離生死大無不包細無不備無量之奧深不可詳臣今因吉日恭依玉格受諸靈氣伏乞祖師虛無自然元始天尊玉清太帝廣運慈悲特垂開度臣今吞服諸靈氣灌煉五臟蕩滌穢氛恭望天慈特賜降下逐位瑶光正真道氣入臣身中內除心垢外煉目精隨事蕆用無不顯靈臣今恭對御前請受真氣臣誠惶誠恐頓首稽首再拜謹言次左右手搯玉清訣誦請氣呪但弟子一年三度受氣受天氣仰乾地氣俯地日氣正月子月氣正月寅五星之氣五方三皇正子申寅南斗六司之氣正南北斗七元之氣正北三台真人之氣斗頭三天真隱內諱西北三師度我神氣五方五嶽持身妙氣五方三塗總司之氣子午乾位六丁柔和之氣丁方六甲武剛之氣甲方神仙太一之氣隨日之方神虎七元真氣北方斗隂四直所主之氣歲月日時旔上帝正真生氣天鬥九天玄女真氣西南內煉三真之氣天門雲雷雨部之氣巽方天不能蓋我地不能載我衝我者死撞我者亡急急如律令敕攝次搯五帝三塗訣紅香震墨黑丑磨真兊襪臘午靈寶中指中興生轉獨𨽻遷可韓明公都成切角正聚魂攝公都聚魂招八方捷疾使者天神地祇萬靈同歸合天地敕攝合明天帝日合明天帝日右念呪訖再拜兩手玉帝訣存三天三氣歸身次存前諸氣隨三氣入身中入下田畢遇初一日子時便服氣念三天隱諱一萬遍可以通真達靈呼吸雲雷雨電㫖召天地神祇不得髙聲不得令耳聞持齊一日不茹葷靈寶無量度人上經大法卷之二十六
