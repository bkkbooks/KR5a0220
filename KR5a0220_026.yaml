front:
  text: 靈寳无量度人上經大法卷之二十六生六
  hash: sha256:7b4c6ada39e4304c0bd522fcb50e89d31b866e1522db77544ffd859493e344a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_026-001a, image: hfl/0090/0090-026.png}
body:
  text: 神受大法品玄師曰兆欲念十方天尊一心智慧須令丹房瑩淨七情六慾俱无混亂一心專誠常不放逸少慾戒念見在知足行慈順生莭儉忍辱抑怒少食減睡息思慮省視聽黙語言守動靜息心在茲常於動靜之間不失此度然後擇十直八莭是諸良辰汰浴内外燒衆妙香恭對玉清上帝元始天尊御容便足而坐叩齒集神咽液和魂定心淨念調氣使勻心拜三過安意一心諦觀聖容先從萬變玉清寳冠次觀圓明天顔金真之色圓色如九色虹蜺次第九色離羅帔服二手展視天印轉次下觀雙足坐於金碧蓮座擎以玉局碧瑶玉几又復從天顏天冠相相諦觀時時閉目憶念在心若不明了還開目視極令分明不失毫末再閉目觀之行住坐卧此觀成巳然後於閑靜之虔焚香黙坐觀西北玉清之天玄虚之際廓然火光如日月之明遍滿法界无有山河草木此定成巳唯見一天尊在空虚之中如前觀威儀坐於金碧蓮臺之上舉手說法光明七十二瑞相八十一種好諦心觀察一一分明繫心无復散亂如是見巳便見亠方天尊光明相好天尊舉手說靈寳大法既見十方天尊便增見十方億劫應化天尊乃至无邊天尊初則近見漸次遠見轉遠轉大光光相搂見巳廻觀西北復如前院不失毫末觀既成巳十方上下亦復如是十方厯厯分明當復一時遍觀十方百千萬億諸天一念所縁周遍得見而諸天尊同一智慧覺悟道源圓照諸法了入无爲若如此者歳月既乆定功乃成自然得見十方諸天尊皆爲說靈寳大法疑網悉除得元爲正道若是宿業障重不能得見天尊者但一日一夜六時懴悔精思入定懴禮平生惡業精勤進道随順一切徳喜心結於因循漸能得見縦使不爲說法是人心巳證入快樂妙果身心安稳乆亦得見无爲大道也次能七日七夜湛然見玉清聖境前之大定精思巳成當於閑靜之處乃至睡卧一心三聖存上宫泥丸廓然放白光大慧光遍照法界念念三聖心心光明歳月既乆觀力定成七日七夜不昧决定見元始天尊說法神通現前訓誨汝心即入道源所謂念念无休息也稽首天顔而作頌曰一心三聖三聖一光光光心生明明因光一聖心通萬變乃光圓通徧覺不迷不荒又頌曰精誠正趣晷刻不空虚因求實空亦不空先空後應先得後通生心心滅无始无終隠朝帝師品朝玉清兆密室焚香端坐叩齒二十四通存己眉心直入三寸名泥丸宫元始上帝所居兆誦三天隠諱霐召三炁自泥丸中入下至中宫次入下宫次返上宫存已元神朝元始上帝誦隱諱不以徧數存見三炁充滿九宫光明洞照元始上帝在光明殿内坐千業蓮花光明如日頭冠玉清萬變寳冠衣九色離羅晨精丹羽寳帔項負圓光金容玉姿二手作玉清印一俯一仰存之分明想身在金闕下九拜長跪密奏曰糞土小兆學道男生臣某誠惶誠恐頓首稽首拜手奏啓无上三天玉清聖境祖師虚无自然元始天尊至尊上帝御前臣夙承道廕生值昌時得遇師承叅授大法叨掌天印濫宰玄司日積愆尤未遑首謝恭望天慈特降敕允告下羅酆北府三官岱宗河源泉曲主執萬神原赦臣某千罪萬考萬禍千殃除落寃對記名三天進道修眞免諸魔試胞源散滯結節開通三界稽首萬邦賔伏早遇玄師指授金丹鉛汞大道教臣坐進大定心悟重玄符水効靈攝召克應功成願俻得預眞仙仰荷大道罔極之恩臣无任祈天禱聖激切屏營之至伏取敕旨奏畢心六拜跪于帝前黙誦三天隱諱候得旨兆存三炁紫光繞我身即三稽首而退下入絳宮次歸下田朝上清兆密室焚香端坐叩齒二十四通存已眉心直入四寸名流珠宫太上道君所居兆誦三天隠諱霐澄召三炁自泥丸上宫入至中宫次入下宫次返上宫存己元神乘三炁上朝太上道君在寳殿中坐千葉蓮華衣九色離羅紫雲之帔飛森霜羅之衣湏臾百變之冠存之分明存身在玉陛下九拜長跪密奏曰糞土小兆學道男生臣某誠惶誠恐頓首稽首拜手奏啓无極大道太上道君上清上帝御前臣凡俗穢質獲遇師承叅佩靈文效職靖治伏慮前生今世故犯悮爲三業六根千愆萬過无門首謝日夕憂惶恭望天慈特垂原赦切念臣某常懼生死事重寒暑運煎朝露易晞靈椿難繼臣今行持上道祕典吞佩眞炁靈章存三守一澡煉身形内解結莭胎根外除兩日氛穢却除疾病絶滅禍源恭願削落黒編刋絶死籍然後洞入幽微眞常徳性形神俱妙與道合眞一切有情生六五咸成遒果臣冒瀆天威下情无任激切屏營之至伏候敕旨奏畢心拜六拜跪于帝前誦隠諱不以徧數候得旨即存三炁紫光來繞我身即三稽首而退下入絳宫次歸下宮丹田朝太清兆密室焚香端坐叩齒二十四通存已眉心直入二寸名洞房宫中央黄老太上所居之處兆誦三天隠諱霐澄召三炁自泥丸中入下至中宫次入下宮次返上宫存己元神朝太上誦隠諱不以徧數存見三炁光滿九宫光明洞照太上老君在金闕玉堂中坐千葉蓮華金容互相逢七曜寳冠衣晨精九色離羅白羽飛霜繡帔凭碧琳玉几手執振拂之羽存之分明存身在金關下九拜長跪密奏曰糞土小兆學道男生臣某誠惶誠恐頓首稽首拜手奏啓混元上德皇帝太上老君太清大帝玉陛下臣千載幸會獲遇師承叅授法籙領户化民日積過愆未遑首謝恭望天慈頒降敕旨告下眞司特垂赦宥令臣向去心開意悟耳聦目明萬仙會議賜臣金丹消災却禍遂獲神仙爲教宗師闡揚大道濟拔幽顯利及群生得爲後聖種民獲與天地相守恭願乾坤明素日月輝光星斗循軌山嶽效靈風雨時若水火潜形萬天道泰劫災不生蜎飛蠕動咸獲超升臣冒瀆天威下情无任激切屏營之至伏候敕旨奏畢心拜六拜跪于帝前黙誦隠諱不以徧數候得旨存三炁紫光來繞我身即三稽首而退下入絳宫次歸下丹田玄丹宮眉心直入五寸昊天玉皇上帝所居明堂宫眉心直入一寸長生大帝神霄玉清玉所居明堂官左乃韓君文人分所居之處北斗九晨在腦中泥丸之上魒星指前北極尊帝二星在斗中兆欲行事但看所𨽻何宫若黄籙大齋則諸宫關徧告九幽煉度則告玉清與韓君文人雷雨事則告神霄祝文更不重序朝帝師受炁兆靜室焚香叩齒並依前朝元法存身在金關下長跪密奏曰糞七小兆學道男生臣某言念千載有幸獲奉道化仰惟靈寳太法實三洞之眞筌上消天地之災變下正隂陽之愆期幽可以拯拔三塗修可以脱離生死大无不包細无不俻无量之奥深不可詳臣今因吉日恭依玉格受諸靈炁伏乞祖師虚无自然元始天尊玉清太帝廣運慈悲特垂開度臣今吞服諸靈炁灌煉五臓蕩滌穢氛恭望天慈特賜降下逐位瑶光正眞道炁入臣身中内除心垢外煉目精随事蕆用无不顯靈臣今恭對御前請受眞炁臣誠惶誠恐頓首稽首再拜謹言次左右手搯玉清訣誦請炁呪但弟子一年三度受炁受天炁仰乾地炁俯地日炁正月子月炁正月寅五星之炁五方三皇正子申寅南斗六司之炁正南北斗七元之炁正北三台眞人之炁斗頭三天眞隠内諱西北三師度我神炁五方五嶽持身妙炁五方三塗緫司之炁子午乾位六丁柔和之炁丁方六甲武剛之炁甲方神仙太一之炁隨日之方神虎七元眞炁北方斗隂四直所主之炁歳月日時旔上帝正眞生炁天鬥九天玄女眞炁西南内煉三眞之炁天門雲雷雨部之炁巽方天不能蓋我地不能載我衝我者死撞我者亡急急如律令敕攝次搯五帝三塗訣紅香震墨黒丑磨眞兊襪臈午靈寳中指中興生轉獨𨽻遷可韓明公都成切角正聚魂攝公都聚魂招八方捷疾使者天神地祇萬靈同歸合天地敕攝合明天帝日合明天帝日右念呪訖再拜兩手玉帝訣存三天三炁歸身次存前諸炁隨三炁入身中入下田畢遇初一日子時便服炁念三天隱諱一萬徧可以通眞達靈呼吸雲雷雨電㫖召天地神祇不得髙聲不得令耳聞持齋一日不茹葷靈寳无量度人上經大法卷之二十六
