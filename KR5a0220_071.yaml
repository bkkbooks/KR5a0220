front:
  text: 靈寶無量度人上經大法卷之七十一出七
  hash: sha256:864cc4181f771067a2f85976f233eda7c7223a8dec68c497cd4fcdb52b315984
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_071-001a, image: hfl/0099/0099-078.png}
body:
  text: 修齋受詞品請師科曰開度人天救護群品崇建齋法非師不成必在備受符籙明練科儀知俯仰之文明進退之格思神念真關啓敷奏間邪無失庠序得宜與天為徒體道無極廣開戶牖普濟沈淪德重功髙莫越師寶若法師佩三洞衆官參洞玄者可署之闕人之處可洞玄為法師紫虛正一為衆官也齋法出於靈寶屬洞玄以行之理亦為當其他十戒白簡道士不可濫署法職竊預名號凡欲修齋致薦濟存拔亡當蕆事之初必先推尋清髙勤行之士或棲真觀字或隱迹山林道價崇髙玄門宗仰僉議惟允卜筮協從後齋沐身心蠲諏吉日削心詞而皈命瀝齋欵以依投儻或未副精祈必再申誠控告志宜純一禮止于三必獲允俞始當營建蓋以皇天厚地幽府泉扄十方無極之鄉三界難量之際非宗師功德隆重行業清明則何以罄幽顯以宣通和人天而無間是以淵源上學深造玄微為生死之津梁作人天之眼目者乃可謂之髙功如其泛泛之流末學下士惟財利之是務真擲壇以冥行徒役精神虛費財寶其不為三官鼓筆者鮮矣尚何冀其感通者哉投狀具鄉貫奉道弟子姓某與家眷等右某所伸情旨伏為亡某荐日享年幾歲月日時生昨於何年月日時在某處身亡見殯葬何處深慮魂識未遂生方今者屆于某節謹啓志誠備置十方法信供養之儀於某處請道士若干人就某處崇建無上黃籙大齋幾晝夜滿散修設冥陽淨醮一座乞為亡過某人懴贖過愆資嚴生界仍乞附壇升度門中祖禰眷屬親姻旁及六趣三塗九幽五道冥司幽夜滯魄孤魂普仗良因咸超仙界謹具誠欵披投法位法師伏願法慈許賜依科升度施行未敢自專伏候法旨致詞維年號某月朔日某甲子某府縣鄉貫居住眷等謹齋沐虔誠稽首再拜上啓度師某洞法師先生切以祖氣肇分有物咸歸於覆被道源始判承流代出於真宗洪惟上學之流深證重玄之教輒陳祀事抑冒聰明切念某等伏惟亡過某人夙契真休叨居人道在地水火風之內有貪嗔愛惡之緣罔知幻化之無常益見人非之稔積俄淪夜壑永隔陽光非憑奧妙之科曷濟湮沉之苦旁求上士式建靈壇恭惟先生體道純真潛心虛寂悟三洞四輔之旨為十方三界之師開戶牖於玄門作舟航於苦海天人仰德幽顯咸恩伏望廓軫大慈俯從丹禱飛神控轡髙通三境之遙鍚命頒符下拔九泉之苦慶雲垂而生意無盡靈風聚而死骸發煙俾兹受對之魂證彼登真之果更冀九玄殢識六道幽靈咸登解脫之鄉共達希夷之岸依皈至切敷述奚殫干冒威明某下情無任激切之至謹詞啓盟髙功升座法衆立班啓堂法事候弟子致詞宣畢髙功捧香祝曰浮黎國內玉京山中億萬年結氣凝煙百千種通誠達信根盤騫林下瑞藹太虛空寶香一炷爇金爐三界十方咸稽首焚香執簡啓奏以今焚香供養三清三境十極十華無上至真道經師寶十方三界千靈萬真黃籙寶齋感應真宰伏願驂龍駕鳯飛空步虛降臨道場作證功德奧妙同元蓋一真之未布機詳有統由三氣之初分寂寂至無之宗蕩蕩自然之化生於象帝之始隱乎空洞之中元始開圖敷五篇於碧落洞玄啓祕周十度於本章生生之義難終難窮化化之源莫名莫測運兩儀之闔闢使萬物以化成德本好生獨立常生之道功惟不宰孰知真宰之筌非常道而非常名無棄人而無棄物粵自三皇之始人與道全迄乎五帝之終道為人逺人偽勝而天理滅幻境迷而覺性昏不能保命而愛神益見背真而就偽生由是死由是出於機入於機汨正念於喜怒貪嗔棄真常於夢幻泡影自取死壞離其本真人非鬼責以兼攻雪刃霜鋒之交至炎炎烈火獄峨峨丘寒池皆由一念之中自致九幽之苦舉聲悲呌徒知宿命之非救苦化身未遇霈恩之及繄于衆罪流吹不息恩惟太上拔領無邊宏敷黃籙之文茂著明真之典控五鳳八鸞之駕尋救十方宣九龍二虎之符開通六趣變雲浦為雪腴之醴消火翳為靈寶之光劒樹摧鋒鑊湯息浪普召隂冥之主吏咸遵濟度之科條三界莫不依皈一切普皆歡恱九卷既終而麗華得度一人無畏而北帝請陳是為無上之緣兹實難量之果蓋以元皇敷化列聖流通經分三十六部而度人最先齋列七十二等而黃籙惟大葛左玄授大洞之旨張靜應恢正一之文源分流𣲖而浩浩無涯法演經傳而綿綿不絶非惟功德之普博抑亦禁戒之威嚴非丹誠惟一惟精豈大範可聞可見今黃籙大齋官某人皈依十極請命三天奉先思孝而逺度億曽修齋建功而普資群爽齎紋繒而備列持質信以森嚴廣邀清靜之流祇建明真之會宜得上士與之宣行如某者塵世行尸玄門末學冒受九真之戒濫紆三洞之文體未洞真何足致形神俱妙德惟翦簿豈能使天地同歸是宜隳肢體而黜聰明處山林而就藪澤夫何塵迹誤辱丹詞顧惟戰灼之餘益認精虔之至敢不遵承科簡祈告蒼旻秉自愚不轉之心宣大道無為之化何異挾山而超海無殊斷鶴而續鳬短綆不可以汲淵大方必為之見笑所𦍒因緣有自翊贊得人皆法海之元龜實宗門之大匠更相汲引不鄙凡愚將共受於戒言庶克成於祀事况以科條具載功過悉分三官五帝之書九府四司之録毫分無失纎芥不遺弗容簡慢之為恐隳薦修之福必也盟告天地質誓鬼神各罄丹心不生異念當使功標丹簡俾七祖以生天無令罪結黑書致九玄之墮地登壇之際受職之初咸秉誓言仰干聖鑒今則齋莊既肅盟告云周珮玉鏘鏘見十方之振響威儀濟濟仰萬聖以臨觀潔志同誠舉揚勝事度亡玄局玄師曰既承投詞選擇吉地卜日告齋嚴命同志入靖對齋預告上穹修札關告十天九地三元九州靡不遍通持誦經號敷宣科教行香修齋建壇貢章召攝視現頒符命以俟感通功周幽顯名刋玉清普天懷德克日飛升訣曰所投詞即是大齋弟子之詞詞旨孝慈忠直懇切無私方許允度也擇吉地者名山洞天福地靖廬玄壇宫觀不經兵陳戰場非屠坊刑獄生産冢墓穢惡之地者皆名吉地也卜日告齋者要在三元八節五臘十直三會之日與亡靈七七周祥諱日相合或普度之時要值天赦甲子庚申與節會元臘司會名曰吉日不遇其日不可開建也告齋為立意之初通達玄元某日為始也嚴命同學上道同師同壇之友也同志謂其志同也普為幽顯者苟非其人和氣不生有隳功果自告齋之日入靖所不交人事對齋百日九十日四十九日三十二日亦可但量所度亡者多寡修文備事廣狹為則無致臨用有闕預於前期七日告三界九地十天十道九州北都冥府等於告齋之始勸緣大齋之首及求度亡魂之家同志同學之人齋戒沐浴持誦真文真文者謂薦拔亡魂經呪尊號也謂如大洞真經靈寶諸經九天生神寶章道德二篇黃庭玉經救苦三塗步虛九幽拔罪真經甘露神呪真一等經及琅函天尊睿號神呪也於開建前三日敷告修齋詞旨關告直歲神君行雨主雨龍神里域土主城隍山林孟長溪真及屬嶽之司一切洞天福地諸天仙曹等處一一各召差神兵衛護道場斥遂凶毒之物淨蕩穢惡之氣久晴之時防虞風雨久時隂雨剋日借晴仍選當境靈應衆人所欽之神直壇防非止惡以警非道妖惡之衆於前一日夜日入之時集與事羽流法事弟子詣建壇之所習演威儀至平旦集衆詣法師靖下請受致詞求師登壇建壇淨穢自此或七晝夜或五晝夜三晝夜一晝夜並三時行道六度行香十遍轉經宣科告戒並從古制節度拜貢章表敷露五方真文依式鎮信金玉宣符告簡並從科法召攝視現錬度感通齋後舉過始未同心功圓果滿散壇謝過言功效職三官保舉五帝奏名諸天稱慶上帝賜恩進品仙階功及幽顯克獲飛升稍有違悮罪亦無貸玄局儀範次第玄師曰自宗師垂示科教啓建大齋各有次第並依玄局啓載關告文檄牒狀之類并具齋詞旨揮請乞文語皆出大法師志意修撰不必定本成規混淆靈典的非經語之言豈可編次法內久而滋蔓使成俗格白石類玉似是而非有玷真道初則習演威儀預於前之日建壇至日清旦致詞請師登壇至于九師之前啓玄建壇任六職拜啓玄表文揭簽受職方始詣三寶像前開啓行香升壇行道之日先於壇肉燒化通關預告轉牒九州社令三界神司五嶽九州幽府北都里域城隍山林孟長溪真歲君神祇主雨龍神令部衛形魂普赴壇下止雨借晴關告都畢旋繞登壇拜素車白馬章開通道路章申奏天曹五帝四司三景星宫天省三院靈寶十天南北二斗四極真宫四聖師府三官所治五嶽司命三十二天紫微上宫丹天火府重明上宫諱司丹天童初五府東華西靈五老帝君天尊真人法中干預之者及衣奏諸師上帝一一周備宣告救苦真符太上敕赦生天寶籙訖宣啓行道科懴諷詠真經清旦事畢臨午行道告下三天白間九天寶器玉清破地獄真符拜破酆都業道章讃詠十王儀至晚朝行道宣讃童子救苦生天儀初夜行道壇外發召請表奏攝魂赴壇迎引亡魂赴浴拜沐浴錬度章宣沐浴錬度儀召請詣三寶前傳符受戒迎魂歸位呪食十念次懴回耀輪燈九巵神燈宣九獄儀法師破獄次召請九泉六道赴浴次設無礙夜齋教戒神祇都畢迎魂視影現形次至中夜登壇行道拜遷拔亡人章行持九錬變仙之法告下拔幽魂真符登真度命靈符長生符召降驛吏宣讀合同劵文宣放生儀次祝流火神庭魚龍分投焚化簡文茭郭茭龍童子等至終滿之時淨壇設醮起五方真文拜謝恩表乞詣玄師前還職拜言功謝過朱表乞祝納官祝罷壇如此科式不可超越或七畫夜九晝夜十四晝夜皆須委曲緩速行持近則三晝夜一日一夜關行稍違節次動失綱紀不惟混淆典憲冥曹亦須切笑三官鼓筆四司紏察徒用施為功德之恩萬分獲其一二學士宜遵守奉行五老本行具説三見黃籙尚自不墮地獄況其親行大教普濟幽冥若滿十數天上地下十方三界仙神人鬼飛走甲介皆是子之恩德所及魔王敬伏保舉上帝稱慶歡恱三官言功五帝列奏祖師鍚元皇飛符金闕降丹華羽軿拔七祖於北宫度九玄於死録一身骨肉仙化神形俱登道妙吞餌金丹佩服仙劵千騎萬乘白日登升三天隨其功業授補真階或為上清真人之位或登上清仙公之名或為太極左卿方始洞明普救無間功德之所致也子宜勉之竭志奉行鎮信威儀品鎮信經曰古人淳朴懷道抱德不貪不欲各足於身但用志誠自可通感不須財寶玄合天真末代時澆人民矯詐惟吝財貨不識因緣賤命重財輕生徇利內懷萬惡外結凶狂相繼滅亡未嘗覺悟念是之故令遣散之一則內賊不生二則外賊不起內外安靜衆苦消除所以質信效心必以財為首財既可捨心亦隨之聖善冥通隨夫心意髙天厚地玄聖上真非信不通非心不感通感之致在乎信焉故云學道之士齎金寶效心盟天也金龍一十三枚十方鎮十枚三枚隨簡授之科曰天子皇后太子用上金三品以下用中金九品以上用次金士庶以銀塗金各長三寸六分夫龍者上天之驛騎為傳逹通感龍騎為先負簡即騰信三官鎮壇以通誠十極鎮信之法以龍為首闕者考屬隂官曹鎮綵一十一假十段十方一假命信東方青紋九南方絳紋三西方白紋七北方皂紋五上方碧紋三十二下方黃紋三十二四維黃紋各一十二十方數合一百三十六天子四數諸侯丈數士庶尺數本命紋繒天子諸侯紫色士庶以本命納音色匹丈尺數各隨本命外加一以表延生之信科曰紋繒者顯五行之色象十方之氣降十天致五帝通真效信請命祈靈不可闕也闕者考屬天官玄都曹鎮十方紙墨筆硯一十副紙每方用十二幅科曰建齋行道或救拔億曽萬祖考妣二親或請福祈恩保制劫運則四司五帝三界十方紀録善功檢校罪目當以紙筆為録功紀善之籍施鎮十方不可闕也闕者則十天五帝不録其功九府三官不除其過闕者考屬三官曹鎮十方香華科曰香者以通感為用隔氛去穢華者以鮮潔為美表瑞效珍請福祈真香華為本香以沉箋降真花以香華木生者無花可以五綵剪簇以鎮十方不可闕也闕者考屬隂官曹鎮檀錢二萬四千科曰民之利用厚生非財不立民之重財尤過於命故齋法以財質心而不可闕也闕者考屬天官玄都曹鎮米二斛四斗科曰米者養生之本民以食為命故齋法以米質信天官增加品祿所不可闕也闕者考屬天官曹鎮油二斗四升科曰油者隂類也隂中生陽以油鎮隂官續陽景闕者考屬隂官曹鎮炭二十四斤科曰炭者陽類也陽中生隂以炭鎮陽官資隂氣闕者考屬陽官曹槿木簡三面各長一尺二寸闊二寸四分厚二分科曰蕳者記也告也記世之功告盟上真上下正方天子以玉為之玉有九德禮天地之信也餘皆槿木為之或柏木丹界五行丹書國號年月建齋之所及法師姓名投於名山大洞靈泉龍穴及齋壇之中告天地水三官使著明齋事奏于上境闕者考屬地官九都曹鎮十方玉璧十枚各徑二寸四分厚二分圓形虛中投龍璧三枚科曰玉有貞潔之德可以盟感上真故以為信若投龍簡當以青絲金鈕纒而副之青絲以代割髮金鈕以代歃血上告三官也投龍璧天官蒼璧圓形地官黃璧方形木官黑璧六出形天子以玉公侯以下並槿木為之闕者考屬地官九都曹投三簡金鈕二十七枚投簡之法當用金鈕九隻以副於簡三簡用二十七鈕各徑九分圓其外如環之形國家用金臣庶以銀銅塗金又皇人鎮壇儀範夫建齋壇當供設十方天尊五嶽三光水府經寶隨方各以紋繒之綵玉璧金龍以鎮之更於五方書五老真文玉字敷露盟告諸天三時禮念求哀懴悔更用楊木五假方磚之式以綵帛上書五篇之氣以鎮之五方散壇之夕挂於五方則可上消天災保制劫運下禳毒害以度兆民則生死受賴其福難勝者也用筆五枝墨五笏硯五隻算籌五把案紙五百幅分布五方以米五石分為祿米以錢五千文分在五方為命錢其紙各封押上題云東斗注算紙南斗上生紙西斗記名紙北斗落死紙中斗記善紙仍以木雕造童子五軀手執梓木函盛真文於其內散壇宣科而焚之即五方童子齎真文前行引導亡靈隨光明而生道或更以茭草傳龍二條童子二身左手執長竿右手執龍索候散壇之日將白簡符命以鐵線扎於茭龍之身即用遷神回黃二幡以童子手執之法曰所謂茭龍負身風火驛傳者也更在行持之士存三清之光三光之光三日之光合與真火而煉之其火盡存化為紫雲之升亡魂乘馭其氣得生天上次以靈寶將吏兵馬齎左右二劵擁從亡人而去直詣天門照證合同以升道境威儀科曰太上三尊居玄都玉京之山七寶玄壇紫微上宫十方世界上聖髙真一日三來旋行朝謁執符把籙建節持幢吟詠洞章遊空飛步奏鈞天妙樂散異景竒花鸞舞鳳翔三界齊歡萬真稱慶今之齋法登壇朝奏一象玄都玉京也威儀法式莫不備焉皇人曰元始天尊演説靈寶玄妙超度法門會集群仙於虛皇天寶之臺諸天隊仗紛紜日月星宿璇璣玉衡鳥獸鸞鳳丹輿緑輦幡蓋霓旌並來朝尊夫行法之士開建壇陛亦遵上天之儀以度下世兆民也節一對以五色絲為之上下五層懸竿頭金鸞鳯𠷢綬帶幢一對以珠蓋珠網八角一層懸竿木胎左龍右虎龍虎𠷢綬帶旌一對似節無龍鳳𠷢綬帶三層五色絲為之懸竿珠幡一對珠錦玉珮金鳳𠷢之懸竿五明扇一對以木雕成金彩裝上布星斗中列五嶽下繪海瀆竪以朱竿鶴羽一對以木刻成鶴翅竪以朱竿皇人曰夫登壇行事以代元始應化先造威儀以制萬天於壇內四維分布星宿嶽瀆坤輿之數立諸門氣各依大法不可輕慢冠裳劒珮品科曰服者所以旌禮也登壇朝真不容紊亂經圖該備職籙髙卑用以彰明各存法度始於五一終於講師髙下之儀一如正制正一法師玄冠絳褐黃裙絳帔二十四條丹火玉珮斬邪之劒長二尺四寸紫虛法師玄冠黃裙黃褐黃帔二十八條青玉珮紫虛陽光之劒長二尺八寸又五帝召靈之劒明玉珮洞神法師玄冠黃裳青褐黃帔三十二條白玉珮太一三元之劒長三尺又三皇太一之劒青玉珮洞玄法師芙蓉冠黃裳紫褐紫帔三十二條明光玉珮八景揮靈之劒長三尺六寸又五帝威靈禦邪之劒素玉珮洞真法師元始冠青裙紫褐紫帔青裏表三十九條珠玉繡履震靈八景之座玉簡瑶笏震靈之劒左右垂玉珮珠璫前後通真召靈之符或仙衲雲霞之帔大洞法師元始冠黃裙紫褐五色雲霞帔劒珮如洞真法師三洞講師元始冠黃裙紫褐九色雲霞之帔無劒珮如上品秩髙卑皆為朝真法服升壇以朝真交靈也寶海云劒者辟邪制非威神伏魔珮者進止動靜以中律度各有等級也大天真上聖法式威儀萬品千名變化無極至於樓臺宫闕結氣凝雲恍惚有無不常厥所或飛臺行館空裏轉移或金闕玉樓虛空化出或大包宇宙或細入毫芒其於羽衣雲衫霞衣玉珮珠幢寶節飛印瓊冠瓊笏霓旌鳳舉龍轂日旗月斾鶴駕虬驂雖資變化之神亦有等差之秩所以朝真法服劒珮冠衣取象上真垂儀下土若其清齋端默靜室凝神合氣虛無遊心淡漠密朝大帝隱叩玄關無煩服飾之殊自會感通之要尊卑品秩一切泯然其如行教化民闡揚齋法各循階序永作經常禮謁朝真蹌蹌濟濟弘道之士按而行之亦玄門之盛美也盟傳對齋品皇人曰夫靈寶之上道乃大法之根宗諸天上帝隱韻內音非下士之所能聞也當採擇其人神真內固威儀儼然言行有信慈悲忠孝謹節正己端直操心志慕希夷如此之人方可修持上法濟度死生若言行有虧忠孝不立心行邪侫諂曲詐欺內無德行外失威儀則福淺俗惡之人豈可動達天地神明者哉當審察賢愚分别仙凡然後方受詞誓具表以告三天獲其告報方擇吉日依科盟授凡受持之師行持半紀方許度及五人如一紀之後方度十二人不可再度然而靈寶之文非其正法之比且諸侯公卿欲濟國扶危保鎮國祚受此大法者當以上金一百二十兩五色綾羅各三十六匹硃砂青絲各一十二兩鎮信祿米一百二十石金錢一百二十千誓香三十六斤士庶人民欲濟度死生超升玄祖當以上金三十二兩五色絹綾各一十匹硃絲各九兩鎮信祿米一十二石命錢百十二千誓香六斤修煉有道之士當以金九兩紫綾一端青絲一兩硃砂一兩誓香一斤案紙一百幅以代幣帛筆墨五方各一件以錢米無力行道之士亦可用三分之二不可闕也蓋此法祕於上天其禁至重至於天人詣玄都上宫而傳亦齎金寶而受是以不許輕泄故也若有道之士所用法信傳度法師當一一具申天曹傳授按前應干傳用之物不可私心隱匿如傳度弟子吝惜世財及窺竊求取即師不許妄示輒傳度之後其道不行神真不侍經法百魔所敗師與弟子俱獲深殃切宜戒之如遵科格則諸天欣慶群魔束形萬神敬禮開壇傳授之時自有衆真監度以授於我道法流行百魔隱韻離合自然呼聖集真齊生度死積行纍功可不日而果備矣思微板劵維年月日時某州縣某人即日謹齎金寶質心依玄都舊格盟告十天稽首頓首再拜傳授上清靈寶經法品章隱祕之文依儀行道消諸不祥普度無窮受道之日名度南宫萬神侍衛身度三界位登仙翁魔王保舉衆真監度臣某謹遵大法敷落神真普度天人不敢隱祕而傳以天中之天為盟弟子得法之後不敢輕泄以示下人如違告盟身處鬼官減算除年萬劫受考永墮輪回禍及七祖今立劵文以為信約嗣法弟子臣某行年幾歲月日時建生上屬某嶽稟上天某氣君召謹奉元始天尊度太上道君度太上老君度天真皇人度妙行真人度諸天大聖度五老上帝度飛天神王度五帝大魔度三官五師度周天星宿度劵符式今日欣慶受度某人歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門東斗注算西斗記名北斗落死南斗上生中斗大魁總監衆靈青帝護魂白帝侍魄赤帝養氣黑帝通血黃帝中主萬神無越五帝大魔萬神之宗普告無窮萬神咸聽三界五帝列言上清右劵付弟子某人收執持為身寶以致飛天下觀上帝遙唱萬神朝禮三界侍軒群妖束首鬼精自亡萬靈振伏招集群仙冥慧洞清大量玄玄也急急如靈寶大法盟傳板劵律令靈寶修真誓戒靈寶傳度法壇誓戒牒付嗣法弟子某人謹遵大法合受誓戒開具于後靈寶十願一願志樂長生二願出死入生三願錬氣思形四願度諸衆生五願天下太平六願衆生悟道七願祖禰升遷八願永離鬼官九願形神俱妙十願與道合真靈寶五戒一戒惡殺去害常行忍救二戒嫉妬莫興常守成人三戒莫生盜淫常施正直四戒勿起貪汙常生知愧五戒斷諸憎嫉華綺常修儉慈靈寶十誓一誓不得大醉怒嗔二誓不得飢飽勞役三誓不得廣志逺念四誓不得折交非人五誓不得取非義財六誓不得怨道咎師七誓不得輒入神廟八誓不得亂行靈文九誓不得輕褻祕典十誓不得亂害鬼神靈寶十善一矜老恤孤二憐貧援寡三救濟幽冥四散施丹藥五敬重一切六勤行符水七常誦經呪八廣造經像九勤持齋戒十放贖生命牒具誓戒終始無虧身心不退即得拔度三塗不涉六趣諸天衛護萬聖欽皈宜當精行持齋奉戒夷心端謹志念分明一心皈向專想不二內外清虛每合自然鑒映爾心如戒行道為三界所範鬼神所瞻召真通靈形神俱妙道不負人勤行諦受勿使魔言謹牒太歲年月日時牒傳度師具法位姓某靈寶天仙寶誥三天門下伏以混沌一判元始開圖真文洞煥於層霄玉字敷宣於碧落神靈降質氣寶聚形含元氣於太虛運隂陽於寒暑統攝三界拘制群魔紫笈瓊篇琅函蘂簡經號稱於上品法獨冠於中宫是為萬法之宗玄機之祖諸天至重勤苦而聞審察賢愚方遵舊格盟十天而奏啓齎金寶以方傳輕露祕文禍延九祖今者嗣法弟子某人即日謹齎金九兩紫綾一端硃砂一兩誓香一角如係公卿士庶人民即别具數肘步投壇伏為自身本命某年月日時生重念某素心潔志守道純誠謹遵明科告盟傳授既獲吉祥之報宜加仙爵之褒保舉師十方至真飛天神王長生大聖無量大神監度師三十二天帝君妙行真人度師十方靈寶天尊虛皇道君經師九天髙明大使神功妙濟真君籍師三天扶教輔元大法師正一靜應真君度師玄中教主大法師東斗注算君度南斗上生君度西斗記名君度北斗落死君度中斗大魁君度謹按靈寶本科某人宜補授奉行上清靈寶大法某嶽先生某帝真人南昌上宫受錬司真官主管黃籙院事右遵盟真科格欣慶受度請列仙班奉三清玉帝勑符到奉行傳法度師具法位臣姓某太歲年月日時告下交兵給法牒靈寶傳法壇交將牒付嗣法弟子某人本壇先據云云謹詣壇下拜授上清靈寶大法經文祕訣符圖印章一宗誓願行持終始不怠除巳具奏上天許令傳度謹遵科格對聖分環破劵給誓受戒付度靈文交兵度將事須畫一專牒付弟子某人照會者一上清靈寶經法符圖玉篆科範儀格一靈寶大法司印道君印天寶君印錬度司印黃籙院印青玄救苦印八威龍文印赤書玉字印泰玄都省印神虎內諱印北魁玄範印神虎雌雄印總監衆靈印與道合真印五帝大魔印嚴攝北酆印混合百神印拜章印一戒牒一道誥一軸板符一道交兵牒一道環劵破獄符杖十方謁簡一上清靈寶法中天真上聖神王真君將帥吏兵童子玉女功曹符吏兵馬總計百億萬衆牒具如前付弟子某人遵承法職虔奉靈文恪謹針規克勤勿惰積功纍行進品仙階如或負盟自貽殃咎無怨咎於師資故牒太歲年月日時牒飛真朝元謁簡太上洞玄三景弟子某嶽先生某帝真人奉行靈寶大法南昌上宫受錬司真官主管黃籙院事臣姓某拜謁五帝破獄策杖右金闕化身真氣流周慧光煥景金虎破幽字靈寶環式皇人曰簡以梓木為之長一尺二寸以白粉為地緑簡四向中用墨書銜位為謁簡板劵以梓木為之長一尺二寸髙九寸以青為地朱書字黃書符策杖以楊木為之法長三尺六寸圍五寸四分四面刋呪以黃羅袋袋之傳法日排於上真前度畢弟子收之安於聖前每日供養如用即再拜而請環以銀一兩二錢為之中刋符以朱為之補將吏帖靈寶大法司帖補新差來輔法將帥吏兵等衆當職昨投度師某君門下乞保奏傳度上清靈寶大法符圖印訣一宗靈文巳蒙度師於今月日保奏上天補充仙職今來差到輔佐將吏兵馬合用收補入司駐劄事須給帖者右出帖補新差來輔法將帥吏兵等衆仰凖此指揮明施號令嚴整軍營修治器械隨呪即至輔正立功他日結勳即當奏薦不管有違破劵式維年月朔日某處居住嗣法弟子某弟子傳法即日謹齎法信恭依科格拜受上清靈寶大法符圖印訣一宗靈文誓願佐天行化助國救民濟生度死永依三寶今對天尊前盟約而傳度師不敢隱真出偽弟子不敢怨道咎師如有違盟並依冥譴其道不成一依科條律令科條律令冥譴其道不成一依不敢怨道咎師如有違盟並依天尊前盟約而傳度師不敢隱真出偽弟子天行化助國救氏濟生度死永依三寶今對上清靈寶大法符圖印訣一宗靈文誓願佐法即日謹齎法信恭依科格拜受維年月朔日某處居住嗣法弟子某弟子傳靈寶無量度人上經大法卷之七十一
