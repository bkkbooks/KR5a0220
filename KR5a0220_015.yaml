body:
  text: 靈寶洞視品洞視內行收神後右生上三十六息納息先陽日左生二十四息靈神先隂日右減二十四息現形後左下生三十六息陽日先三十六息成一爻為乾後二十四息成一爻變成坤卦隂日先二十四息成一爻為坤後三十六息成一爻變成乾卦兆每日吞服玉札畢端坐調息收神氣海納息丹田存臂中有真氣如紅絲狀在丹田中書中篇內四字畢用火候養以鼻引天上青氣入臍下畫成一陽爻如丹砂色排於氣海中六次引青氣成六陽爻次以鼻引天上黃氣入氣海晝成一隂爻再引天上黃氣六次通為六隂爻即止鼻引氣時微微心暗數之陽日九息隂日六息不可太粗引氣氣下不可咽亦依送入六爻畢陽日左轉四十九隂日右轉三十六於氣海中使氣調和轉畢叩齒九通止如有氛泄下氣任其自然不可抑止洞視催法呪曰王母仙苽攝王母仙桃攝王母真氣降我今服仙苽令我到東家我今服仙桃令我到瓊瑶得見東王父王父敕青童青童降我敕王母降真氣令我知吉凶令我得洞視徹見諸鬼神變化無凝滯王父真氣攝王母真氣攝精思法東王父五色衣絳冠名無為字君解左有王喬右有赤松子居日中號君阿名伏羲萬神之祖萬氣之先西王母五色雲髻名自然字君思左有圓光玉女右有太隂玉女太虛元氣之祖萬氣之先右當常行之請官通目法重請弱水玉女千四百人衣白衣為臣通達神影知萬里吉凶次存定中五色童子千乘萬騎喜相而入目中次呪曰左目童子名飛靈右目童子名晨嬰赫若天威放流星朗覩無窮徹玉清急急如律令右每存童子叩齒九通念呪九遍吸青氣嗽津三口入肝中以二手大指搯日君訣抵目九過止仙人洞視法三日前齋沐至三更月正中不得不見月也見月上香祝曰臣某三元正日上啓周將軍太隂君右晶水母三天真卿上清使者光照六律神仙布光月后玄洞君照日君太極蒙翳君上清三皇內真三天佐命真皇五明君元皇領籍君臣不敢煞害妄傷願通右目洞視見鬼神形狀隨法進入注大光眀從目入腦從腦入目往來無礙悉得神仙臣今受氣願得如意念畢退後足丁罡前行三步閉氣佇視月光自鼻引月之光華氣極方咽之了即吐氣手中揉洗左右目再呪曰回風混合法師降光童子攝誦畢揉目誦呪六度即止受持後自當日始常以器收露水凌晨洗目如無露以冰霜雪皆可用凡用洞視之法搯本師訣轉一匝却於本日辰搯住閉左目以右目視之佇視不得瞬目不得見尸穢如避尸不及若巳見即解之朱書符置水中洗目洞視攝見法呪曰天地日月照處萬神現形先書道言二字念上呪次念魁𩲃𩵄䰢魓𩳐魒左七轉便吸氣吹在手中揩眼至妙如攝召亡魂即吹在紙帳及幡上又法呪曰左目神珠之池右目玉珠之池願乞神符神水洗吾兩目令其清眀逺視萬里急急如律令呪曰天開地迷問一知十問十知百神符入腹心開意解耳目聰明急急如律令符燒灰清水吞下訣東北氣又洞視服玉字訣入靖叩齒九通坐調息八十一息息勻存元始上帝太上道君太上老君坐腎中央神龜上王母丁甲侍衛心丹如日即依經存身坐青黃白三色雲氣之中內外蓊鬱上丹田青色中丹田黃色下丹田白色內外如垣墻冥合身室存青龍從肝出立左白虎從肺出立右朱雀從心出立前玄武從腎出立後獅子六雙從後心出白鶴六雙從頂出羅列左右光如虹霓洞照十方日月照明洞煥室內存日月自兩目出光明照室頂生圎象光映十方日月光自大權出二道上合圓如光色次存四方三十二天宫金樓玉殿在空中五色雲內於宫內存天帝衮冕絳色儼然而坐如此分明即自皇曽天始一叩齒一心拜皆足即密呪曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出關啓所言今日吉慶長齋清堂修行至經無量度人臣為洞視萬靈徹視鬼神所啓上達徑御無上三十二天元始上帝至尊凡前畢鼻引東方八天入肝西方八天入肺南方入天入心北方八天入腎次看日支面本方天位坐如亥日念呪曰寂寂至無宗虛峙劫仞阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮華超陵三界徒慈心解世羅真人無上德世世為仙家再呪曰雲篆太虛浩劫之家乍遐乍邇或沉或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始下降真文誕敷昭昭其有冥冥其無沉滯自能超塵勞溺可浮幽冥將出沒由是升仙都發如是願者伏為洞視萬靈徹視鬼神普度無窮濟拔幽冥念玉札一遍吞隱諱又一遍即存本天色氣氤氲次見天帝口吐本色光同氣混合一道直下灌注頂門以次及七竅一身皆滿良久仰看天方有本天八色赤字光明見空中次兆以鼻引玉字吸一字入心引一字入脾吸一字入肺一字入肝鼻引一字入腎口吸一字入泥丸一字入中丹田一字入下丹田八字畢存入五脾三丹赤色如火光久久忽爾目覩夢見內視分明却是洞徹之祥應也或清潔之士日行八天或一日一夜取足便可七日中見仙真視鬼神也存三田五腑五色紫光照徹五臟七竅畢八拜了即起居行法三皇總真幽天符書幽天符呪曰九老帝君仙都大神三皇帝君八座真靈六甲直符三官百靈仐服幽天神符欲知未來休咎告我心神隨事報應通聖通靈急急如九老帝君律令呪盡筆盡搯玉清訣通妙訣𩴑魁三七日書篆吞服畢次書幽天符服之三皇帝君洞視之符太上老君徹視符以天開日服一年見萬里符書鏡上照形恆東見西見石中寶太上八史洞視符丹書紙上照日飲以清水送下仍服符投水中洗目逺望千里符投水中向日所出以投水中日則逺矣玉清通目法呪曰凡遇飛星咽之天熒星靈飛下臣身鬼神徹見混合至直右服流星之光法曰凡受光氣吞下丹田之後却靜坐觀丹田所得之氣盤旋目丹田左升上洗繞兩目之穢復歸丹田通目呪符光光眀明照見東靈玄中之聖聖中之神神靈付真與道合同冼吞皆可朱書黃紙上東氣玉凊印太上呪水洗目洞視呪日出東方赫赫大光神靈衛我通目仙郎吾降遊廪速付童厖三元滿體八神作疆黃老律令急令目光照轉世界急用童厖遊廪童全厖瑝急急如律令敕右法以昴日雞日凊旦望太陽持七遍取日氣吹水洗目四十九次寧神閉目靜坐少時開目如此七日便見鬼神四十九日即見天人自昂日雞日受持呪水早晨呪水七遍日氣吹聖前令男女冼五十次又依前閉目靜坐少時忽令開目即見天人鬼神忌辛厭見事畢收法呪日黃老律令遊童厖老却收本局恐泄神機急急如黃老律令以袖念呪吹日袖拂男女西次與餳湯服右法七星神呪每日望太陽持七七遍呪水服洗目夜望北斗七七遍呪水服洗目一百日神童若步斗子午卯酉時各七遍辟兵災水旱除彗孛妖星延年長生殺萬鬼布氣除百病太上通明神符男子女人凡書符左手結斗印右手執筆視筆呪曰此筆最靈天帝賜我真仙衛形辟怪除病使我長生書符呪水保合利亨急急如律令畢鼻引罡氣吹筆彈訣敕力敕力單力白直天監治頭地監治足人監治手扁鵲治目神符所到萬病消縮急急如律令右符專治男女諸般目疾大能明目通祝遇四立日或寅申巳亥四始月𥘉一日及甲子日庚申日并自已本命日焚香向王方春冬也依前法朱書不限多寡以多無慊每日臨用以一道投淨湯一盞中浸洗兩目投符呪曰左目神珠之池右目玉珠之池今以神符投水洗吾兩目願乞令其清明逺視萬里急急如律令畢次以杖攪之臨洗目呪曰日出東方鬱鬱黃黃神符作水洗目痛瘡為民毒氣飛揚濁氣消亡神符法水洗目光明急急如律令祭井除氛其法神驗遇三會或甲子庚申三元入節用柏湯茶酒各一十盞時果竒花香燈安設席位上香步斗變神對井念呪行持取逐日所吞方位之氣吹入井中呪曰小兆真人姓名謹致祭于井中大神井中童子井中神將井中靈氣直井護井一切真靈某以地泉靈氣吞服洗浣臟腑蕩滌穢氛洗去耳目積塵積穢水為神通功成同賞不敢負違叩齒三通誦攝井呪百遍搯戍亥為訣呪曰溟池寒水清清霐霐氣利廣大萬道日生五方泉流周流不停普宣帝命萬邦莫凌敢有干瀆刑以火鈴急急如青玄敕命步斗圍井禁邪如天罡子則井之午午則井之子餘效之變神步斗躍七星入井中想所步之星飛流入井步斗如常式既步斗流星入井之後以子午卯酉符用桃板書釘于井四畔立界蓋免鬼氣忤井之氣也則使水易得清淨靈明學者冝究之禁井真符右子地符北氣吹子訣右午地符南氣吹午訣右卯地符東氣吹卯訣右酉地符西氣吹酉訣造鏡祭獻夫造鏡之法以紙剪圓鏡為用次尋古鏡兩面隂陽鏡也以匣安之左右不得留穢處用香花酒果祭之次用攝鏡呪祝之祭曰小兆真人姓名謹致祭于某鏡中靈神鏡中靈氣直鏡侍鏡護鏡一切神靈某受太上玄元寶鏡洞照隂陽冥皓神靈鬼妖求與神通某今祭爾神靈爾等神靈當使某目明耳聰視聽徹達洞及隂陽不測之機功成同賞必不負違爾其神靈惟其聽之叩齒三通以攝鏡呪呪百遍玉皇訣呪曰太玄上皇禁氣而澄黃老鑄錬太上所靈照見鬼神洞及幽冥神不匿氣鬼不逃形千和所列百魅所并敢有不見滅迹殄形應當速見不得違令鏡中之神直鏡之靈同功成日飛升上清急急如上清律令敕攝祭印通靈兆擇吉日命工開造靈寶大法司印三天太上印通章三天合同印九靈章奏印靈寶諸印備香花酒果各十二分祭印中仙靈呪曰小兆真人姓某謹致祭于印中大神印中神仙真氣真人掌印靈官直印玉女直印玉童直印仙兵印中神仙某受靈寶大法管攝鬼神呼召仙兵通逹徹視與神偕遊永為至人惟爾印中仙靈享此誠禮助某道氣功成同享不敢負違叩齒三通念攝印呪百遍搯都監訣呪曰神真氣真氣真神真神分太極氣攝髙清玄印變化妙應妙靈急急如律令艻礙洞觀品夫學招真之道當遐思逺覽潛想內矚坐觀無涯洞想幽虛幽虛三歲中方審正真神披朗逆知未然究觀極天之境無幽不鑒無上不關無下不眄遂受太帝之號由積感所降豈生便任乎兆以乎旦天光未分青輝始發之時以兩手相摩令熱拭兩目皆三七過叩齒二十四通以舌舐蕩口內上下周匝令津液盛生咽氣九過畢以被通冠覆一身安體定卧令中方審正當使內外寂寞不聞音響手掩兩耳閉目內存身見東方九萬里外之事山川土色草木禽獸胡老之類如在目前使分明審正不定更存久久自然見也既分明便聞耳中有鐘鼓之聲琅琅良久仍見東嶽仙官乘青龍碧霞手把五芝從玉女十二人著飛青羽裙齎青精玉飴盛以金盤授與我身既見仙官各禮而受之即服覺其味甘便更拭目咽氣九遏止如此三年目見萬里之事耳聞萬里之音無不朗然逆知方來吉凶禍福年算長短之數兆即身生異光洞映表裏招真之道其法至妙口口相付不傳於文兆冝閉口奉行兆次還思如上法內存思見南方九萬里之外山川土色草木禽獸越老之人如在目前使分明審正不定更存久久自然見也既分明便聽耳中有百籟之聲嘈嘈良久存見南嶽仙官乘丹霞雲蓋從玉女十二人著丹錦飛裙齎玄綱絳實盛以金盤授興我身既見仙官各禮而受之即服覺其味酸便更拭目咽氣九過知此三年自然洞覩幽虛目見萬里之外耳聞萬里之音久久為之無不朗然逆知方來吉凶之事體生玉澤面有玉光招真之道其法至妙帝君口口相告不得文傳兆次還思如上法內存見西方九萬里之外山川土色草木禽獸玄老之人如在目前使分明審正不定更存久久自然見也既分明便聽耳中聞金鼓之聲鏘鏘良久仍見西嶽仙官乘素霞飛與從玉女十二人著紫錦飛裙齎金液丹精盛以金盤既見仙官各禮而受之即服覺其味甜便拭目咽氣九過止如此三年目視洞徹察見無窮萬里之事吉凶禍福朗覩未然面有金容招真之道不得文傳口口相授兆還思如上法內存見北方九萬里之外山川土色草木禽獸羌老之人如在目前使分明審正不定更存久久自然見之既分明便聽耳中聞有銅鍾之聲琅琅良久仍見北嶽仙官乘玄雲飛輿手把五芝從玉女十二人著玄錦飛裙齎瓊液琅腴盛以金盤授與我身既見仙官各禮而受之即服覺其味苦便拭目咽氣九過止如此三年洞觀八方察幽究虛坐見無窮身輕體明坐在玄空招真之道極真難宣口口相告不得傳文兆還存思如上法內存巳身徹見九天之宫臺山川林木飛龍走獸雲涯元暩之端與衆真相接群仙共言審正分明不正更思久久自然分明便聽耳中聞有五音絃磬之聲如可聽聞良久因見中嶽仙宫乘霞飛龍從十二玉女著黃錦飛裙手把五色華幡齎五芝丹精盛以金盤授與我身既見仙官各禮而受之即服覺其味甘便拭目咽氣十二過止招真致極妙法難可言宣行之三年洞覩幽虛徹見玄冥算祿夀命古凶之兆一身洞逹面生玉光口口相告不得文傳存思五方既畢起坐東向叩齒九通祝曰萬化混生玄綱御空回輪無聲運轉四方流光萬里洞觀空洞三清寶耀飛霞鬱房晨精玄注九竅開通四會八逹存虛招無令我神慧明究吉凶驂駕玄輿緑軿飛玄上升太晨進拜玉皇帝君內存招真洞視觀天上法事畢於此立驗之妙殊於衆用中方審正一心存念入室百日便有倣佛將來三年神真洞徹元不朗然萬不一遺可謂元中希真真為之降其道幽微非世所論故口口相付不傳於文人貴祿位我賫此道四海之中欲易吾法吾未聞也吾道不死之根遙知未然洞鑒幽虛仰測無窮聽徹萬里妙趣傍通天下之竒豈復過乎有得之者克乘緑軿飛霞女蓋上升帝宸惟在寶祕慎勿妄宣違負盟科泄漏真文下及一身九玄父祖同充長役身沒幽泉負考三官艱苦被受明戒之馬佩受紫度炎光修學存真招真洞視之道恆於别室寂處不關人事靜念存思天下四方萬里之外山川林木草澤禽獸人民夷羌傖老異類皆來朝拜巳身又思我兩目流火之光如天奔星焕落赫耀光充萬里之外四方山澤淮濟林木皆隨光消除極天清陽無復塵穢目覩無極之鄉周遍洞達無所不關皆令分明審正便叩齒九通仰祝曰玄光內映洞鑒無窮徹視達聽九户開張流精奔激萬里清通坐覩自然逆究吉凶得乘飛霞上登太空畢引氣咽液七過止若能修行此道百日之中便有倣佛將來三年目覩空洞坐見萬里之外耳聞萬里之逹至極妙道非可文傳口口相付竊之者風刀立至魂死無生九祖長役鬼官戒之戒之靈寶無量度人上經大法卷之十五
