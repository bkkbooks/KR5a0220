front:
  text: 靈寶無量度人上經大法卷之四十三水三
  hash: sha256:66f72f4ef92f36d9a27640336cf8b4875ece610ee70f8a600ee7fb70252a71cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_043-001a, image: hfl/0093/0093-074.png}
body:
  text: 運神合景品昔浩劫之初五劫分化元始開圖赤書成文字方一丈八角垂芒下運金澤之氣結成九天之相西元龜山四方羅絡二十八宿交纒三十二天巡繞日月五星交會其中上有稜層金樓玉室一十二所內有青丹皇金母道君西元龜臺王母是也自有龜山元録司掌群仙真文玉字山之空界旋斗歷箕𢌞度五常三十五分總氣上元而有內禁之玉司居於王母西瑶上臺乃曰靈虛宫又有靈虛别館中主大君玉嬰尊阿母曰九靈太妙真仙王母司握九靈之職旋斗晨通進章詞謁簡以進三十二天三天玉闕非靈虛仙職詞文不達非九靈章表不進大君奉命以紀其經北斗九晨乃中皇太一九晨皇君有跡九焉可躡而飛空上輔帝宸其星變化無窮名位萬狀不可盡紀中有髙皇太微天尊可祝一星壽注億千名標玉簡萬神朝宴修之七年分景散形變化萬物混合幽冥飛行太虛上登玉清大洞玉經曰瓊室瑶宫玉樓金殿逺在三境九天之上即未可及近在己身九宫泥丸皆以方寸存而成真矣天氣合己自然之氣故經云人心中神神含妙慧慧通法界之因從因起緣緣想自虛感應存泥丸及一身與九氣合德如身在金闕無異即得名通玉籍九玄升魂蓋泥丸九宫存如九天三境金闕見諸天帝儼然於上存身如己想在下丹田如深泉幽谷之下會合百神俱集混合一身存身如蓮實太上入泥丸如上升九天之上朝金闕帝前謹按師旨三洞玄科曰天尊雖逺妙近居泥丸宫宫室皆七寶窗牖自然分至真常妙應駕景騰紫雲此明自己三清上應玄境天人相貫精氣相扶於九宫也又曰不生亦不滅欲生因蓮華超凌三界徒慈心解世羅此明心元是元始分神居九重神膜為人命主於心中也拜章上詣自己九宫飛玄會道審覆章詞以神知神心神洞照所潜悉知母或疑二自取靈譴通天真符右符取自已本命日用柏木刋之長五寸闊二寸半用官尺上穿一穴以五色線穿札繫肘後男左女右凡拜章時方可施用未拜章時不得令人見以絳紗袋盛之常於星月明朗時於斗下供養以香花酒果并淨水柏湯十二分供養北斗九晨與二尊帝及通天符使若是臨拜章三日前服章符佩之肘後佩時香上熏符呪曰天輔無私乾象通微無幽無冥無感不知佩符帶圖神兵任呼我位上王位登天都急急如天君紫微上道律令右呪誦三十遍以沉香熏畢帶肘後然後吞符章並存想純熟至拜章時行用感應如神凡有口章默奏并上章並先關牒祭召仙靈章吏其應尤速勿令人知及見應如影響多有祥雲異香鸞鶴甘露黃霧景風天氣清和積隂頓開甘澤潤物天神視現章灰飛空神光罩壇百千玄感無所不有開心辟忘符具真誥第五卷協昌期第三篇云開心辟忘符王君撰用朱書此符摹長史晝此符摹掾晝右符用開日旦向王朱書再拜服之拜畢祝祝畢乃服服畢咽液五過叩齒五通勿令人見若不用開日以月旦月十五日二十七日一月三服一年便驗祕術也祝曰五神開心徹聽絶音三魂攝精盡守丹心使我勿忘五藏逺尋通真達靈開心太平符朱書黃素服符呪曰餐服神符通照真靈百神走使洞徹中情六甲宿衛淵淵清清五行元氣杳杳冥冥百物逃形混沌為本始聞聲以知名天地神經號曰開心服之太平達知自然飛升紫庭急急如律令呪畢叩齒三通以符安口內方存氣吞之審心章式具位臣姓某右臣某今為大明國某鄉貫居住某人本命年月日時生齊意云云專投臣某拜奏某寶章一通上達虛無自然玉帝御前乞諧𠃔願臣自揣凡愚穢質心境紛馳未能洞妙真理深慮躬臨壇席之際難以即時上達太清玄元金闕玉陛下謹齊沐身心於某月某日吉辰入靖焚香奉造太玄心章一通先次上進本命五府靈君聖前伏乞神功妙運以茲情懇今夜吉時徑為上奏虛無自然元皇玉帝御前所是某人奏請之事允與不允天曹作何施行今夜玄壇靖中咸乞預聞仰俟至靈克垂報應臣某知悉謹言年月日時姓某章心章用紙橫長四寸闊二寸半春用青紙夏用紅紙秋用白紙並皆朱書冬用黑紙白粉書之每季七十二日外有十八日用黃紙朱書凡書心章并太平符向旺方以淨水吞服服符時安於口內舌上仰面看東方以鼻引青氣在口中存作青色次仰看上天鼻引紅光真氣與青氣混合在口中畢次俯看地下鼻引黃氣入口三色混合并在口中圓成燦爛光明如日存符一粒在光中以水吞下其服心章以章灰入口一依符訣待審得報應允與不允方可拜章慎勿輕泄拜了再審合同方可言與齊官服章通神祝曰心中神丹元君長三寸廣七分著朱衣繫絳裙乘威德顯至靈通造化達至真住心中莫離身外有急速疾來告人心章上達太上聖情允與不允報我知聞凡此呪每日子午卯酉時存心中有神如已形若𥘉生嬰兒赤衣絳裙存見念呪無限數仍於本命日祭此心神仍常服辟忘符立見妙用神通八景真符取五月五日三月三日九月九日朱書魁𩲃𩵄䰢魓𩳐魒勑八字疊作符丸成丸安雞子空殼內與雞母抱候雞兒出取服之每日持念克應洞聽神呪曰竇盧李魏崔鄧急管送言來𩴑𩲙急管送言來急管送言來右自六甲日起首念十方萬萬遍足後逐日持念四十九遍凡遇章詞奏表關告報應念此三呪良久耳內聞有肸蠁之聲於是內告入事目大怒則神去矣升神入妙謹按師旨神者形之主主居則形固主散則形危凡世之人惟多養形不曽保精固主按西升經云神能通道道能長存神能飛形亦能移山神之甚貴莫大於三一也一者道之子萬靈之祖宗衆真之妙奧凡修行運神合景飛玄會道通章金闕朝謁上帝默朝升玄之道先當沐浴入靖煉形守神久久長存自然通道無適而不可若欲祈禱謁請即命駕上朝太清隨事奏懇則至要之道畢矣沐浴離塵擇東井之日沐浴乃是日月宿於東井之時於平旦就其方取淨水煎桃皮竹葉湯沐浴名為煉尸素漿神仙遊行塵世亦用此沐浴且竹虛素而內白桃却邪而折穢故用此二物以消形中之滓濁也出太上九變十化易新經具真誥昌期第三篇如能家有五香湯用之得五藏清涼塵垢潔淨桃白皮竹葉白茅香香白芷甘松青木香右不拘多少煎湯沐浴尋常入室誦經修行可用此灌漱其諸符水雖然可用亦不及此亦名五莭清香湯沐浴東井日且如正月一日起室宿左行遇井星直日即東井日也正月初十日即井星直日餘倣此入靖凝神每日子時入室向旺方平坐叩齒三十六通閉氣三十六息呼至臍上吸至臍下綿綿不絶往來細微然後聞目靜思存日月照耀滿室日東方月西方次存日君吐赤氣九芒貫身左繞月君吐白氣十芒貫身右繞令內外洞徹無所不通若有疾患亦可數數存思使疾去為良太陽太隂煉形先存已身作枯木次存赤氣變為火又存已心中出火與形俱成火燒煉枯木俄頃之間皆變成灰灰中有烟自然變成五邑氣氣中盤旋結為一嬰兒如自已貌存日中有上皇日帝君絳衣冠冕坐於日中又有五帝衣五方冠服侍坐雙手握固望太陽方鼻引氣九過入心中存心中日象火光明大如斗九光紫芒穿入三田泥丸皆有日光煉濯一身表裏洞徹身氣乃來入室瞑目端坐存太隂在東井之方雙手握固存月中夫人口吐白光十道如素練清瑩漸漸覺化為水沐浴嬰兒在白氣中才候浴訖漸漸存復本形如真人衣冠口吸黃華之水及月中黃氣吹於一身良久覺身在黃氣之中灑然森寒即是真氣來入體四肢五臟百脉皆令黃氣陽精遍滿潔淨身中萬神方來分神玉陛眉中之光便是三天門眉左角入骨三分有絳臺青房眉右角入骨三分名黃闕紫户如世之侯王宫門之臺闕也並以青玉黃玉為臺闕入眉一寸名曰明堂宫有門堂三神居之乃長生帝君之分神也入眉二寸名曰洞房宫中有黃老帝君乃太上老君分神也入眉三寸為丹田宫有上元泥丸天帝君乃玉宸道君分神也入眉四寸為極鎮宫入眉五寸為玉清宫有玉清神母居之此三宫是太清上清玉清分神居於泥丸也兆擇六甲吉日起首存諸天帝儼然在泥丸之上存自已身如蓮實在於下丹田如深淵幽谷之中迤旨升上中丹田過華蓋歷重樓穿金門度玉戶上至泥丸朝奏乞事如意復巡歷元始歸下丹田也如此日為之凡有章奏審覆可以聽候聖語知所未然輕泄七祖永沉北酆萬劫不原祭丹元真人法丹元真人乃自已神元皇分身降氣下入身中乃為命主用自已好食素食香茶酒果於元辰本命之日入淨室中四分自已住位存三人如法師者揖讓如法任意自飲食焚香祝曰丹元守靈內外守真左右三七助吾天成急急如元陽主者律令呪訖收坐以金錢雲馬各一分焚之畢常存在自已之左右帶劔持斧或執流金火鈴行則在前止則在後坐則在左立則在右百日即驗怒則逺人習真入定道無為無不為心可證非智知何謂知何謂應智遣智證虛應應無從虛乃道通於一萬事畢一為根事為門事歸一一常存存莫有假言守守虛無自長久悟無常道可長淡居內德彌張內韜然外成德忘形相泯心識色無塵心自真身處靜益心定香臭同心合空甘苦一心轉實體如遺心不隳意不亂心不散常凝然正氣全用無限為忘筌先焚香收神端坐以子守母神為氣子氣為神母一呼一吸以神馭之上下循環出入綿綿晝則開耳閉目夜則開目塞耳凡心動一念內外以心遏之曰我為某事不為此念但行數息第一心動多靜少忍緣萬境第二心靜少動多收心入靜第三心動靜相半第四心靜多動少直至一向神與氣合息與胎并心靜一向純靜方起一念仍先習默朝守三一之道純熟默朝及拜章時服心章亦默朝上章入定時默朝即能見景乃承得帝意正是自已天尊何勞上望靈寶無量度人上經大法卷之四十三
