front:
  text: 靈寳无量度人上經大法卷之十七金七
  hash: sha256:1476fb1dedd57522f4b8214081240b2b5d04d31ddead7c4bf2ddf171b7c61e72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_017-001a, image: hfl/0088/0088-038.png}
body:
  text: 佩服内音品上爾時太上於赤明𥘉年命天真皇人傳授諸天内音真法安鎮萬天立定乾坤文制星辰日月成立萬天及諸萬聖同於萬𩔖萬物皆受太上靈寳所成受元始天尊真炁方得生成各隨本性而受其名謂此法能度天上人間萬靈及於一切得道聖衆皆禀内音真法大𣑽之炁乃成大道人若遇此内音大道正法者悉能上昇所謂一切大聖皆得内音真法而成聖也天真皇人曰天上地下謂此音无所不辟无所不禳无所不度无所不成此是天真自然之音是名諸天内音真法自然成立天地乾坤也若遇此法時須要上合於天下合於地中合於人更能舉動方圎言不傷物常行損已救物之道如此修行方可行諸天内音真法自得飛昇上天之道謂明諸天諸帝諸王諸聖皆從諸天内音真法而成仙官之位此法妙重諸天齊功上天度人所寳不傳下世所謂内音之法故知元始天尊四萬劫一傳下世此明八功上音皆是諸天宗範謂明此音是昇天法故入聖之根長生之門是上天之路且人萬劫遇此法者一身得道昇天更能度於九玄七祖皆得神仙之道謂明此法天上人間一切聖賢真靈无有不從此成髙真之道所謂此音度人无量爲萬道之宗得道成真有如兩霧功算不知其數又喻云似人間天子萬官受位若離天子无由得官有似萬天真聖若離元始天尊无由得道謂明此法住今四百萬年再降人間若有人遇此法者獨行三界升入金門與天齊年所有靈寳諸天内音玉訣真法俱列如後東方九炁青天八會書音太黄皇曽天皇曽天中第一第二第三三字皆仰書玄都長樓之上具文以正天地之度數主召十方衆真大神其次第四第五二字仰書帝君遊臺南軒之上主空无之中生自然神真其次第六第七第八三字書日月之門主通九幽之光開長夜之府字皆方一丈八角煥明天真皇人曰修飛仙之道當以月十會之日朱書皇曽天中第一第二第三字向王服之呪如法百日萬神朝己以月十五三十日朱書第四第五二字向王服之呪如法服之二十四年神真並生生死皆得上升帝君遊臺之上以月上下弦望之日朱書第六第七第八三字向月服之八年身内有光面作金色生死皆得上升日月之館受煉而仙佩其文三官无復惡對之録名書皇曽天隨運生死億劫无窮其法妙重與天齊功大明玉完天玉完天中第一第二二字並書天覀北闕之上主天地劫數之期其次第三第四二字則書三界之門玉扇上始開之分度其次第五第六二字書紫微上館主罪福之塲開生死之門其次第七第八二字書北元玄斗之中主制天關輪轉之度天書皆方一丈八角煥明王完天中天真皇人曰凡修飛仙之道當以戊戌戊辰日朱書玉完天中第一第二字向覀北服之呪如法皆得隨運生死劫劫化生位齊飛天以本命日朱書第三第四二字向本命服之呪如法百日地官削死三界保仙生死皆得俓昇三便之門又以甲子之日朱書第五第六二字向北服之呪如法百日三官削落罪簿上天勒録於司命曹幽魂則出長夜之戸受度更生福徳之堂又以立秋春分之日朱書第七第八二字向王服之呪如法七年玄斗記名列仙帝宸七祖皆得駕乘羽之輦以昇玉宸之宫佩其文九幽則无宿對之魂長夜无復八難之根生死普受開度逍遥玄臺七寳林中清明何童天何童天中第一第二二字題金車上官主人生死圖録功過之根其次第三第四二字題玉京七寳玄臺主萬仙朝禮之儀其次第五第六二字題九靈之館主天地大期攺易之運門玄化之牝敷廣度之功其次第七第八二字題北元玄門之上主天地之炁御興廢之端天書皆方一丈八角煥明何童天中天真皇人曰凡修飛仙之道當以七月七日朱書何童天中第一第二二字向王服之呪如法百日則九府削罪於地簡玄都記名於金文死者即得開度於九幽魂神上升南極之宫又以八節之日朱書第三第四二字向北服之百日三界神真來朝巳形生死逍遥七寳林中又以戊戍戊辰日朱書第五第六第七第八四字向西北服之大運之災皆得過度水火之厄隨運更生始天之中玄胎平育天平育天中第一第二第三第四四字並題太極上宫青華之門主衆真玉女誦詠五和之音其第五第六二字題洞元之臺主天中慶雲之暉制和八音之章其第七第八二字題洞靈上館主御帝君遊觀八極制天魔王開度真人天書皆方一丈八角煥明平育天中天真皇人曰凡修飛仙之道當以甲子朱書上四字向王服之百日則得女遊戲其房誦詠感徹降於帝王又以春分秋分二日朱書第五第六二字仰天存白雲而服之百日面有玉光神仙交通又以十齋日朱書第七第八二字向王服之二十四年則生死同升遊行八極變化八方逍遥玄都七寳林中元明文舉天文舉天中第一第二第三第四四字書天三便之門主天地元數之炁開大有之關通龍漢之真其第五第六二字書融生之臺融生是南極上元之遊臺也主諸真人玉女散五和之香以天中之文其第七第八二字書紫陽之館主靈風之炁迅慶雲之輪天書方丈八角煥明文舉天中天真皇人曰凡修飛仙之道以戊戍戊辰日朱書文舉天中第一來四字向天門服之生死皆得度陽九之災主更始之中上遊三界之庭身入二便之門又以十齋日朱書第五第六二字向本命服之百日玉女下降萬神居身又以太𡻕之日朱書第七第八二字向南服之八年體生玉光有自然之香萬真交遊玉女在房皆得遊於紫陽舘中七曜摩夷天摩夷天中第一第二二字書玄都玉關之上主飛開大有之光而洒自然之靈其第三第四二字題紫微臺主開九幽之戸而出長夜之魂其第五第六二字書北靈之館於空洞制萬魔於帝庭其第七第八書北極主生死圖録善惡簿算合八字皆方圓一丈天真皇人曰凡修飛仙之道以本命之日朱書上二字向本命服之一年生死皆與飛天齊功命過不經地宫俓登玄都上宫又以庚申甲申之日朱書第三第四二字向西北服之七祖百日皆得去離長夜上登朱陵之宫八門也又以五月五日中時朱書第五第六二字向南服之二十四年皆得遊行文舉天中召魔制靈威服百萬又以七月七日朱書第七第八二字向本命服之百日北帝削死録南宫上生簿記算司命生身受仙尅成真人虚无越衡天越衡天中第一第二字書元始玄臺之上主天地開閉之紀綱維羅八極之道其第三第四二字書北上玄關之門主度運之炁其第五第六二字書天西北門上主五篇真文隱明之運開生死之期其第七第八二字題九夜之臺主死魂歸靈受生還人生死算録億劫縁根天真皇人曰凡修飛仙之道以本命之日朱書上二字向天門服之制身神與運生死長落福中不得去離又以行年之日朱書第三第四二字向地戸服之制身精炁與運生死長居南宫不離身形又以太𡻕之日朱書第五第六二字向太𡻕服之八年五臓並生紫光萬神並煉生死成仙又以冬至日朱書第七第八二字向北服之九祖皆得去離幽夜上升南宫身與元始同運輪轉億劫不絶飛天同功太極濛翳天濛翳天中第一第二第三第四四字書龍山九折之柯長樓之上主帝君遊觀俯仰之儀其第五第六二字書北斗玄臺主生死命籍其第七第八二字書南斗長生宫中主死魂度入南宫制受錬之神更生之名也天真皇人曰凡修飛仙之道以八節之日朱書上四字向王服之二十四年帝君下降上真諸房又以五月五日朱書第五第六二字向北服之北斗削落死籍度名生宫又以七月七日朱書第七第八二字向南服之南斗校取魂而煉度生宫體入自然福堂受禄天會也南方三炁丹天八會書音赤明和陽天和陽天中第一第二第三第四四字書洞陽之館主諸真人及得道者受煉之人給其羽儀而登真之名也天真皇人曰凡修飛仙之道以五月五日朱書上四字向本命服之五年則身躬澄正内外光明却穢致真神明交通又以七月七日朱書第五第八四字向太𡻕服之五内結仙頂有圓象萬神侍衛羽儀自然但登真人遊宴太清也玄明恭華天恭華天中第一至第四四字書玉京山玄臺之上主天元開運變化之靈其下四字並書南極上元宫中主生死功過算命簿禄合八字皆方一丈煥明恭華天中天真皇人曰凡修飛仙之道以立春日朱書上四字向東服之八年萬神見形變化八方隨運生死億劫長存又以本命之日朱書下四字向太𡻕服之百日三官削死簿南宫書生録九幽開九祖之魂朱陵迎更生之形萬劫皆在七寳林中耀明宗飄天宗飄天中第一至第四四字書天西南龍澤之山黄房之室主開朗日月飛天真人因録其功其第五第六二字書日月上館主三光分度盈縮之數其第七第八二字書天中心玄門之上主四方无極世界分度之期合八字皆方一丈煥明宗飄天中天真皇人曰凡修飛仙之道以本命之日朱書上四字向南服之身得過度陽九之災驅除之中又以月上下弦之日朱書第五第六二字向日月服之生死皆離晻冥恒處光明萬穢所不能傷又以太𡻕之日朱書第七第八二字向太𡻕服之生死得周旋无色世界不拘五苦之難逍遥忻樂之中竺落皇笳天皇笳天中第一第二二字並書紫微上宫主天門開明之期度人之名其第三第四二字書北帝寒靈之窻主萬魔之精其第五第六二字書三便之門主制雲中歌謠之鬼其第七第八二字書南北二斗之門主生死善惡功過之名合八字皆方一丈煥明皇笳天中天真皇人曰凡修飛仙之道以春分之日朱書上二字向東服之生死皆得度入朱陵受號爲仙人又以立冬之日朱書第三第四二字向東北服之百日萬鬼朝見敢有干試學道自正神真自降又以八節之日朱書第五第六二字向天門服之則詠誦朗徹上聞九天萬魔降伏道備成仙又以五月五日七月七日朱書第七第八二字向王服之百日北帝削死籍南斗書仙名生死皆得飛天真人虚明堂耀天堂耀天中第一至第四四字書玉京九陽之臺主飛天真人朝禮之典其下四字書浮洞陽上館主諸學人受度之品其八字並方一丈煥明堂耀天中天真皇人曰凡修飛仙之道當以八節之日朱書上四字向王服之生死皆得上朝玄都之宫受飛天灌五雲之華而成飛天真人也又以五月五日七月七日朱書上四字向南服之則魂神受煉炁自澄正八景備守共舉人身上昇玄都之上騫林之中也觀明端靖天端靜天中第一字書天關之上主四時之炁其第二第三第四三字書北斗玄關之上主衆真朝宴之儀其第五第六二字書金闕北壁主制天魔其第七第八二字書三便之門主學者應度之人合八字方一丈八角煥明於端靜天中天真皇人曰凡修飛仙之道當以八節之日朱書上一字向王服之百日萬災不能傷毒癘不能干與四時休和洞明自然又以八節之日朱書第二至第四字向王服之百日萬神朝身又以立冬之日朱書第五第六二字向東北服之萬魔降伏鬼精束形又以七月七日朱書第七第八二字向本命服之南上書仙名於玉簿出幽魂於地下身入法輪之門遊宴開明之戸玄明恭慶天恭慶天中第一字書紫微之宫北壁之上主領萬神事其第二字書南華宫主致神龍王儀典其第三至第六四字書三便之門主生死圖録總仙度品格其第七第八二字書南極宫中主炁煉度典儀合八字方一丈八角煥明恭慶天中天真皇人曰凡修飛仙之道當以正旦一日朱書上一字向東服之則萬神侍衛威制十方又以立春日朱書第二字向東服之八年神龍爲使又以五月五日七月七日朱書第三第四至第六四字向南服之百日北帝削死籍三界度仙品又以夏至日書第七第八二字向王服之百日面有玉光萬神安鎮五内結仙太煥極瑶天極瑶天中第一至第四四字書玉京七寳臺上主諸真人遊行儀典其下四字書紫微宫中主死得道人八字八角煥明極瑶天中天真皇人曰凡修飛仙之道當以八節日朱書上四字向王服之修齋行道萬神侍衛誦詠朗徹衆真下降又以本命之日朱書下四字向太𡻕服之三官削罪地簡紫微書名仙録玄都紫微官中靈寳旡量度人上經大法卷之十七
