body:
  text: 神虎追攝品神虎隱書天一北祚太一紫元混元玉札神虎隱書者昔天師葉真人成道之日藏此隱書於龍虎山壁魯洞中以石銘曰北魁玄冥天一北祚太一紫元混元玉札神虎隱書北魁祕於玄範天一宫中太一紫府之內北斗九天之中神虎九皇夫人掌管下元八極貴賤十方王侯百官兆庶萬品生民魂魄生死壽限延促神識去留祿命長短皆係主之凡人世四夷八蠻九州十道六戎五狄十二分野天蓋之下萬國兆民九壘之上咸皆隸焉人生在世北斗降神一分生於形內三萬六千真神魂父魄母主張元命大限三萬六千之日壽主一百二十年命遵依三綱五常保養魂魄精神不造罪惡不修善功壽命限盡真神還於斗曹一日收去一神滿三萬六千謂之天壽數終斗極注死太微除生天符降下告於地司隨其所在神靈奉行陽收其魂隂取其魄地收其水天取其氣火風散盡還形太隂神識飛爽任於造化隨業受報輪回生死萬劫無盡若生世之日修善建功玉曆增算神降善氣於身中修惡造罪地司除算神飛惡氣於身中還於斗府大惡除壽大善益壽小惡除算小善益算一算三日一壽一年紀算一十二日紀壽一十二年折算除壽去其真神若造大惡壽盡算絶真去神歸一身卒暴奄忽命終魂魄歸斗神識受苦惡業非大除壽收神鬼魔來侵善神逺離空尸行走危困疾惡縈纒其形小小惡業減算去神魂魄不寧邪氣為病若能改過悛惡修善建功立德行仁齋戒精修感動皇極真神再降神識靈明魂魄康樂萬神歡欣積日纍歲萬神備身神能飛形大則白日登仙中則尸解得道小則延壽長年所謂皇天輔德天佑善人踈而聽卑應如影響太上祕誥曰作善善氣至作惡惡氣至蓋北祚玄曹斗府星宫每一宫府皆有億萬九皇靈官億萬繡衣使者億萬金童玉女億萬天將吏兵下遊於世採録萬國人之善惡毫分無差其中最尊者有九皇神虎夫人神虎左右大聖神虎主生死玉女次有神虎追魂使者神虎追攝吏兵若能修善建功除邪戒欲去非輔正名列天一紫府位司太一北祚可以請降衆靈佐助大道回尸起死復魂返魄剪除妖魔叱吒幽司統禦冥曹注祿延壽愈災捍厄以招天勛功成善滿白日登真序分五斗玄範皇人曰夫東斗注算君乃青陽生氣之府青靈始老九氣天君主之西斗記名君乃皓靈養素之府皓靈素老七氣天君主之南斗上生君乃赤炎丹靈太淵之府丹靈真老三氣天君主之北斗落死君乃鬱絶中和之府五靈元老五氣天君主之中斗大魁君乃總監衆靈之府黃靈黃老一氣天君主之且東斗注算君但人之稟受一氣而生即五帝監生司命定算主録勒籍大而為壽小而為算夫人之生於世者並注一百二十壽一紀為十二年為一千二百算如司命定察功過髙大則為奏呈以增其算大則三百六十算小則一百二十算如司命定校罪惡貫盈則為奪算罪惡未深則為減算除年增促年齡各分等殊未有差之毫髮者也其東斗注算之君捧印持旌威禁極重蓋人之死亡隂魄皆屬北冥之所攝如天數未盡或犯罪皆禁斗獄名曰天一北祚陽則生人代罪分受冥考令冨乏嗣續貧多子孫男值凶橫而亡身女值娠妊而傷命或出入訟庭消磨産業或遭瘟疫或生瘡疽纍歲迍邅連年困篤皆亡靈之受考致陽世以遭殃或作善功正心奉道純忠全孝纍積隂功書名左劵魔王保舉諸天稱慶即魂登南斗魄煉洞陽赦隂過之考魂贖陽愆之責役其有天命或量校有無罪犯即拘留南嶽差注人間權攝里域候年限考終經北斗文曲之宫給大梵正音天書合同真文齎詣南宫量其福報受生人間分其貴賤男女之身其有壽終無功可紀無行可録罪積丘山無有善露即徑囚酆幽受其冥考動經纍劫不覩光明受報分形作諸異類永失人身深可悲哀故元始上帝慈憐觀見衆生為善者少為惡者多沉淪五道謫役三塗萬劫受苦無有出期是故發大慈悲流傳大法以混元之氣玉札之符散布真文仙經祕誥玉簡金書付以靈寶筌蹄指示篇目有道之士代元始以行化普救愚迷故法中雖符吏等殊咸遵帝命凖依行遣呪訣就玄魁北冥而搜攝之所謂無所不度無所不成是謂無量度人者也故行持之士不可不知召之當存身如枯木左右手玉清訣捧心存心中真火炎炎焚為灰燼却左手搯午右手子文義腰存腎中真水如車運轉與火交接忽震風一蕩吹灰全無即叩齒十二通面天門吸混元祖氣十二口閉息少時存天門有紫雲而來入兆頂次存巳中宫有黃白之氣纒繞而出與紫雲交接想身為元始天尊戴上清冠帔畢再想東極宫中太一天尊從空而來至兆前坐九頭獅子座手執楊枝淨水次再取太一天尊頂中青玄之氣合元始之氣化成百寶光明罩兆巳身次想天門紫雲碧霞之氣至兆面前其氣散處見神吏虎賁玉童玉女符吏並捧符執節兆乃拂訣於耳目役之候彈畢即通氣進案前焚香具白事由再叩齒丁罡十二步旋身面北兩手搯神虎印兩手小指相交大指並搯中指中呪曰唵俱賖魯祈容吒嚧平攝呪畢髙聲召云吾召神虎主伯主吏或云三部追魂使者等來至壇前聽吾處分存至祝曰吾稟元始勑符威章龍文掌玄元之靈寶神虎之冥司汝等正直聰明威容猛烈分幽冥之黑暗别生死之殊途既苦爽之未超當慈悲而追攝依遵玉札徑往重泉聚隂魄以皈身返陽魂而合體明分報應顯見玄壇使萬氣以齊仙普受開度開八門之妙道拔出幽關勿生懈退之心以廢真元之教火急奉行火令疾疾祝畢叩齒九通彈訣吹氣入玉札依法焚之師曰應靈寶諸罡步召將錬度召魂應干作用但左手中指中右手寅申訣默定心存念東極宫中太一天尊青玄上帝一氣七遍取青玄之氣一口咽之直至丹田再想丹田之氣與青玄之氣交結成雲直透泥丸而出化身為太一天尊北魁玄範神虎夫人北斗玄冥大聖第一夫人諱管子生人北斗玄冥大聖第二夫人諱管丑亥生人北斗玄冥大聖第三夫人諱管寅戍生人北斗玄冥大聖第四夫人諱管卯酉生人北斗玄冥大聖第五夫人諱管辰申生人北斗玄冥大聖第六夫人諱管己未生人北斗玄冥大聖第七夫人諱𩴮管午生人玉曹仙伯主吏各一員雄左玉曹主伯主魂大聖何雌右武鸞主吏主魄大聖喬右二神管星宿公侯及士庶之魂神虎玉女七員倒生玄司第一玉女蔣仁貴第二玉女蔣仁賢或作仁喜第三玉女王真第四玉女黃文第五玉女萇道仁第六玉女董希卿第七玉女翟普卿右七玉女掌一切橫死夭亡之衆各紫衣袂鳯冠朱履羽裙珂珮手執生死簿服符玉女七員第一玉女蔣仁貴第二玉女李華第三玉女由逢第四玉女趙申第五玉女韋卞第六玉女張信第七玉女徐明右神虎玉女七人各掌生人死亡魂魄輪轉受化生死之方皆係玉曆所録即知存亡之所几追取魂魄詳其注死之由同請降大聖玄司玉女齎持混元玉札往四生六道追取亡魂立至神壇鐵迹臺光使者神虎使者十五員張𧪵侯魏巳上三員主子午生人丁明卓伸之巳上三員主丑亥生人王滸王劉子和巳上三員主寅戍生人仔天祐任曽無巳上三員主巳未生人邵公權陵飛真孔𩳍巳上三員主酉辰生人三使者第一使者紫繡衣紅繡抹額侯第二使者紅繡衣黃繡抹額魏第三使者緑繡衣紅繡抹額張𧪵神虎功曹八員天道郜天真地道冉文仲人道胡當仙道索忠神道祖公弼鬼道翟尚業道萬贇畜生道王精右功曹各有一百二十員所用者七員監魂引魂童子各一員玉府監亡魂童子徐玉府引亡魂童子孔右童子各有一百二十員酆都功曹一十二員子神侯子恩丑神孫太平寅神張文卿卯神孟子房辰神鄭長卿己神石長生午神徐長卿未神松文卿申神程執明酉神王弓望戍神龍楚卿亥神隂貴卿混元玉札化元律魂星飛澤右用槿木長七寸闊三寸厚二分朱書告付三界十方生死之方追取生死魂魄又可以白繒長七寸闊三寸朱書玉札方器貯水卧尸返真符上手執返真靈幡歌斗章燒玉札於人中未及一日或卒暴去世皆可返魂復魄回尸蘇神若大數未絶當祈天求生如壽祿期盡當訴遺言急須遣歸儻非虛白內映善功格天投紫丹以活骸列大醮於玄魁不能久停再生矣陽日混元玉札神虎玄冥符命吾奉北魁君急召六甲神雄左追魂吏統制百節形手持玉札符稟勑往幽冥真精降一氣星元善惡悉分明為紀律萬神咸敬聽不問有無罪不管踈與親皈嬰攝魄赴主伯速施靈何受壇來命火急施行急急攝攝隂日混元玉札神虎玄冥符稟勑玄夫人吾召六丁神雌右武鸞吏倒生玄司君遵奉玉札劵徑往隂關尋天一北祚氣生死路分明三界何敢逹十方億劫𡨚仇對萬神咸敬盡皆迎符到悉皆停返聽死魂故根攝魂赴主吏速威靈喬荀奉壇來命火急施行攝攝疾疾陽符隂符變化威靈攝混元開泰攝肇脫分精攝冥聚魂魄攝玄星耀輝攝飛空統御攝澤被幽通攝右法思斗星所向逐星取氣吹入符中第一玉札夫人攝魂靈符尤教第二玉札夫人攝魄靈符吳問陽日聚形隂日聚形太上混元玉札急追索劵內三界九州亡靈急依帝勑命奉行無令怠慢神虎官吏火急捧符告下主司太一北祚天一紫文北魁玄冥混元玊札神虎符命追取某分野亡魂等衆來赴靈寶玄壇恭對三寶御前聞經聽法傳符受戒領受殊恩無違頃刻疾速奉行神虎所到萬神敬聽風火驛傳年月日時告下具位臣姓名奉行封皮具立臣姓名承玊札奉行背書混元玊札神虎玄冥符命追取某野苦爽幽魂方函混元玊札神虎符命告下某野主罪獄主曹萬神具位臣姓某謹重封皇人曰凡行玊札並按亡魂生時年甲所屬斗宫各於本屬星下書所追亡魂姓名如行普度止書某人等一切億曽萬祖幽魂苦爽孤魂滯魄之衆應玊札後書上帝勑文如專度用天書雷器之篆如普度用真書於建壇之夜次日清旦用使者真形符及二關引同玊札焚於烈熖中使者前行齎持符命召攝亡爽克期來赴太上混元玊札追魂鐵劵皇人曰凡欲追薦橫死之者須用鐵劵以攝之法用雌黃夾硃砂篆之召攝亡魂各於所屬星下書姓名生時年月及某月日身亡葬埋處若名數多則于玊札下列之或不記年月日時亦子細開説於玊札下同信帛等關焚於烈焰中扶無量扶蓋嬰神嬰自宫兆飛生自騫盤業覩盤基蘭翠宇九蘭定婆泥咎通淑易邈碧落無寂浮黎形攝總惡景監奕鬱上元上天無品蕭嵎飛天幽寂扶嬰兆盤大醜度人蘭定淑子逆至午化元律魄星飛澤午逆至子扶嬰兆盤蘭定淑者乃七元真君之隂名也化元律魄星飛澤者乃斗中夫人內諱也是北斗之精斡運隂陽聚其魂魄成其形影之象然後攝之何者蓋橫死者隂氣迷纒使其心神倒錯妄失真元至卒之後陽魂俱消隂氣隔障不覩光明魂離魄散故太上慈悲立此劵文以攝之此所謂靈寶無量度人者也總式靈寶大法司本司於今月日據云云備録申奏天省取旨外今依稟太上元降太一混元追魂玉札受付追魂使者前去隂關取攝亡魂某甲等赴本司今具亡人姓名玊札下項太上混元玉札急追劵章符文中合度一切苦魂幽爽生方死府咸從帝命神虎官將攝到如令不得怠縱勑右太一北祚天一紫元北斗玄冥混元玊札神虎符命徑下十方三界生方死府追攝上件亡魂某甲等來赴壇司朝謁上帝領受天恩主者萬神開關啓路疾速奉行母輒稽遲年月日時下具法位行神虎太一混元玊札攝召事臣某奉行內封具法位臣姓名承玊札奉行後書太上混元玊札取攝亡魂某等外方函太上混元玊札神虎符命告下十方無極世界九幽地獄主者萬神具法位臣姓某謹重封勑玊札呪曰玊札隱書降付北都囚