front:
  text: 靈寶無量度人上經大法卷之五十八玉六
  hash: sha256:1c3ffe972b61e62450765855f68534921179b629f11933360122c76e346726b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_058-001a, image: hfl/0096/0096-016.png}
body:
  text: 生身受度品師曰靈寶五煉生身受度名曰返真洞玄玉髓無上祕要昔靈寶天尊受元始天尊之祕訣付太一紫府太隂九華真人傳受南昌度命君主之本出於大有之宫煉金成字刻玉為編靈童侍軒仙妃主笈上則安鎮乾坤中則分制日月星辰下則陶成萬物實為萬道之宗至尊至極始因太上於赤明𥘉開化萬品觀見衆生受諸苦趣造三業六情死入地獄萬劫沉淪無緑超度深可悲哀遂命南極度命君受其靈文祕法煉度生身則使罪障蕩除百年數盡不為地司所執身有玉光得與真人為侣投云生身受度劫劫長存隨劫輪轉與天齊年於是琅函玉典迤邐相傳漸出人間其玄又玄是謂無所不度無所不成豈曰小輔之哉行此靈寶大法者不嫉不妬齊同慈愛異骨成親其道必成如違科教禍及七祖戒之戒之壇式建壇之法叩齒三通存神為赤明和陽天帝訣中指中文念淨天地呪取東南氣念呪曰混洞赤文無無上真元始祖劫化生諸天開明三景是謂天根上無復𥘵惟道為身五文開廓普植神靈無文不光無文不明無文不立無文不成無文不度無文不生念畢存身五臟中有五色光彩從口中出照耀天界次存其壇曰東方壇曰玉陽館如空洞中青光煥爛如碧玉次存南方壇曰流火之庭火光焰焰如日色次存西方壇曰金華之壇真氣交映如金色光照十方次存北方壇曰隂尸九錬壇碧氣中有神水之司水光映徹天河河中有五色流霞次存中央曰大黃之壇有真氣照徹黃氣中有五色霞光其壇各有宫室中有三色錦衣之吏圍繞五壇壇以淨沙為之髙三十寸闊三十二寸法象三十二天幡三十二首圍繞上書三十二天仍以燈三十二盞布四方中安三色界天每一壇用香爐水火外則用木牌書壇名步南斗罡逐一取氣先行水煉次行東方次南方次中央次西方次北方逐一煉形思存不可滅裂號曰大黃煉形次行金液煉質東方曰玉陽返體北方曰神水濯煉次曰真火受度一一依法行之變神凡變神為赤明和陽帝者南極度命君也掐中指中取東方之氣貌若帝君狀存太一救苦天尊立頂上宗師東華帝君居前韓君居左神將百千萬衆圍繞行持任意發遣依前變神左手上清訣髙聲召云靈寶大法司煉度一切官屬等存列在前即云神將吏兵只今為吾召天界功曹立赴壇下聽吾指揮存至搯玉清訣關引烈火焚之玉液煉形呪曰東方元始育童內完法光玉田輪舉度越玄黃鮮明無翳曲延九昌急急如律令太液鍊形呪曰南方赤明上生真靖煥光密羅華曜重理虛堂端夷無醜慶落和陽急急如律令金液煉形呪曰西方元童開明真芒顯光梵容安定無思勃狂浮江升崖載曲太黃急急如律令玄液煉形呪曰北方玄淵通霄龍變上騰運行常度融成玉瑛妙育文秀惠生元神急急如律令太黃煉形呪曰中央清氣上生髙興靈仙落回梵洞變化成真保固真葩元始玉身急急如律令右於五壇行持了都未告符再詣火池號流金火煉行事存東方日中精光五色流霞光射流火之庭搯日君訣呪曰太陽帝君日宫之精願降真氣灌注身形陶魂鑄魄添精益神邪不干正幽不蔽明形神俱妙得為真人身得受度髙奔玉庭急急如律令念畢存光中有紫氣大如目童煥耀在五色之內入火中次呪曰日魂珠景照韜緑映回霞赤童玄炎標象念畢取日光一道入池存日光中有童陽君冠飛天冠衣朱陵丹衣下降又存自巳左目中有童陽君一人與上合成一人而入池內日光五色煥爛內外皆明次告符叩齒二十四通呪曰陽晶巳通飛華巳新皇芒流溢蔭注內纒仰餐玄潤芳華來臻宫宅開張蕩洗囂塵體映玉光面發金真靈飛禹步上造日門急急如太陽帝君律令敕叩齒三通咽液三過內視金光從肺出散為金輝火光燦爛相接照曜十方火煉符妙氣陽晶光浮紫庭隂穢滌除洗蕩囂塵次存月中精光五色流精射入神水之中搯月君訣呪曰太隂皇君月宫之精願降真氣灌注身形拘魂制魄流衛通榮枯骨使潤涸者使榮形神俱妙髙奔玉庭急急如律令念畢存光中有黃氣大如目童煥耀月魄曖蕭芬艷翳寥婉虛靈蘭鬱華結翹淳金清瑩炅容臺標念畢取月光一道入池次存月光中有娥景少女長三寸五分冠七星進賢寶冠衣素羅飛裙下降又存自已右目中娥景少女粧束依然兩人合成一人隨光而入池內月光五色煥爛內外皆明告符叩齒二十四通呪曰黃氣流精三合凝光玄暉返正冠帶八芒煉度東井受明飛黃金華散靈五君流芳夫人降醴遍灑十方洪芳下注六府潤光金精九化易景返容急急如太隂皇君律令敕念畢取月光一道吹之叩齒三通存自巳腎中玄氣上騰心中心中赤氣下降二氣交接化為玉光從天河之水灌流入池乃存水中玉光明徹水煉符徊水結璘五氣混凝中有泛景太空朔望虧盈黃華號曰素靈光遍乾坤玄輝洞映映徹十方流光幽冥三合凝光遍煉隂形易景返容永保黃裳生身集神呪曰元洞玉曆龍漢延康渺渺億劫混沌之中上無復色下無復淵風澤洞虛金剛乘天天上天下無幽無冥無形無影無極無窮溟涬大梵遼廓無光赤明開圖運度自然急急如律令混合百神呪曰元始符命攝氣聚煙紫虛鬱秀輔翼萬仙急急如靈寶大帝混合百神律令還形復性符返本還源復命歸根二氣隂結肇形陽成午為魄戶子為元氣纒結氣耗魂營降誕神靈神衰魄散魂傾日月星光窮理性命變煉丙丁復體完形胎生上玄心稟太真悟道聞經離合上清服符呪曰復性返形九步八坤行罡七轉內外咸成三台子午絳宫受真氣化為主洞識元真返形易質往來俱榮天上地下洞徹光明永不輪轉離合上清皇人曰夫生身受度事畢須對天真謝思面東再拜服此符章則永不墮輪回之道法以薄黃紙朱書度亡亦用黃紙朱書入煉用元始上帝削死上生符元始上罪消北都名死魂帝之敕上南宫子午受煉仙化成人坤離仙道潛通寅昭彰妙道己削死上生升入無形中指中文元始敕命赦罪宥愆解仇和結削死上生名刋金簡位列玉階真光接引慈惠敷開金蓮捧步紫氣度關三變九煉返容易顔三天魔王保舉度仙真心洞明福智自生參侍龍轅受氣長生一如告命削死上生符呪曰生生得帝心名會重戶內紫房混五神魂魄常保貴七關受仙暉五臟元王氣俱過水火天披見四和蔚上歸皇一子與兆魂相對急急如上帝敕呪畢焚符并五老煉度真文皇人曰夫生身受煉須得削死上生之符方能身與太虛合德延夀長年法用梓木一片長九寸厚二分闊二寸四分以粉青為地朱書并文以青袋袋之然後同升天二劵併焚之靈寶無量度人上經大法卷之五十八
