front:
  text: 靈寳无量度人上經大法卷之一二同卷
  hash: sha256:628b240cb475b37f608a2edb96bc50d8baec95936a85af1c20065cd7f63c4a59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_001-030614b, image: sjb/03/030614b.png}
body:
  text: 八明開聦品玄師曰靈寳大法乃无上大羅元始天尊所說玉宸道君五老上帝髙尊上聖妙行眞人十方神王至眞大神所受後聖玄元金闕髙眞天帝行化下教世間得而聞之乃是三十六部尊經總萬八千篇衆道之宗玄淵隱奥與萬法一貫一則明元始祖炁從何先化玉字按靈寳玉字内音經云自三炁之先溟涬之後其中眞精歘化挺生元炁元炁之内有神曰元始天王其炁混凝與元始同生流化結芳非色非相或舒或張至延康開劫一炁分形而爲二炁虚无自然而生始炁二炁交結凝相太空彌覆无極字方一文八角垂芒莫知其理二炁混凝包藏玉字至龍漢開劫元始天王分隸二炁混沌開光炁清髙澄成天炁降積滓成地二炁分合中有和炁名曰玄炁亦曰大梵之炁至赤明劫元始開圖中有眞陽之炁化爲洞陽之火元始運洞陽之火冶錬三炁混合玉字而成赤文因而劫號赤明文號赤書玉字是茲理也二則明生育混沌陶冶萬範自混沌開析三炁成文火錬爲赤書光明之炁陽光之精成日靈光之精成月餘光布散分爲萬象三炁之神分爲三清之聖自此之後萬彚皆出皆生莫非玄元始三炁也至開皇劫分隸三元化生諸聖至上皇劫五劫周啓五行全形化生諸眞諸仙應五劫之内産生玄中之精精中之神皆名上皇故劫號上皇劫五劫之中五行正炁流方布形或聚或散或卷或舒或張或體應雲煙火霧或象類星斗金玉或形分蟲魚龍鳥皆出於赤書玉字分形自然生成三洞四輔之文龍胎石景億萬圖書三部千條局命天眞皇人太眞玉妃悉書其文録爲簡籙以正生成之本總括萬象之元陶鑄群品之機出産仙眞之紐三則明靈寳大法自然生成圖書總括萬象爲三才機紐是茲理也四則明大法爲三洞祖教出生一切聖人自五劫開化之後玉清洞眞上清洞玄太清洞神三洞之經四輔符籙皆因赤書玉字而化禀受靈寳之炁而成昔自元始天尊命上皇三十九帝九霄天帝各紀經祝而成大洞三十九章明五劫開化源洞之體述和合三炁歸一之法付玉宸道君次於諸天說三十六部尊經後自三皇之代金闕後聖玄元老君下化神農時下化爲郁黙子甞百藥分五穀而說長生經伏羲時下化爲元化子正八方演隂陽說靈寳元陽經祝融時下化爲鬱華子修三綱齊七政說靈寳五星混常經黄帝時下化爲廣成子說靈寳道戒經少皡時化爲隨應子說靈寳元藏經髙辛時號元陽子說靈寳微言經帝堯時號務成子說靈寳政事經帝舜時號尹壽子說太清經靈寳赤書夏禹時號眞寗子說五篇眞文經龍蹻經周時號郭叔子說靈寳赤精經道徳二篇靈寳八威治魔經秦始皇時授以鬼林經并策役鬼神之符漢世名赤松子說三一經文帝時號河上公說道徳篇章西王母奉元始之命說靈寳三十六部尊經於武帝時下降人間授帝无上洞真洞玄洞神之教至于桓帝永夀元年又下降人間演正一太清洞神之道方成三洞皆因靈寳大法化生一切聖人也五則明人身體法元始造立混沌而自人身生聖胎法身父母交精一點含和二炁分坼先生其腎三炁分肇而生神府者心也四炁交并華蓋成形五炁交光如華五葉即五内備炁如三炁至五劫之象也二炁分判上生泥丸而下至玄谷水府也三炁火錬上生日月如同兩目一身光明爲萬象也人身正同其理夫身外分形須知靈寳祖炁靈寳之炁入沙成金入石成玉禽生鸞鳳獸生玄龍草木生靈芝五穀含嘉瑞氣散成和風炁昇成慶雲炁降爲甘露入水生夜光在人生聖賢以比爲祖炁乃至和太一之精衆靈之首大寳既有此物如人之生形入大浮黎土丹谷中央也成行九轉分形五變而成法身乃元始十徧枯骨更生是也六則明元始祖炁无形之先比擬降質成炁化生萬寳今世作何体狀復採錬此炁餌之則登眞正所謂靈寳之炁如萬類亦有之謂龍珠虎寳牛黄鵶丹之屬也今流精玉光丹亦是也所是靈寳之炁天地者日月之對日中之時身中者神炁會合之初故太一眞人曰常於太極握樞機動靜神珠降幌幃自有靈寳生玄谷黍米空歌嘯詠時是也得此餌之必登眞人之位故下仙莫能階此髣髴矣七則明大法中大洞育物囘靈之道則白日登昇次誦詠長生度世尸解得道經經中俻有萬法是寳經之指迷天中元始說經之旨趣則常理矣上有修眞内錬骨肉同飛之道中有長生度世尸解之法下有昇祖度玄之教大則保鎭天地正天宿度愈災却魔之格小則有治療沉痾囘尸起死之功明則有嘯命風雷變化自然之靈幽則有策使萬靈徹視十天之文故曰備有萬法八則明大法有三品必成聖眞仙道如通玄究微行諸十品上道功徳合備則白日登昇若其餘修誦得一法一教長生度世爲地界洞天仙人之首或朝夕朝禮尊敬奉事供養則必獲尸解之仙十洲三島散仙之民矣靈寳无量度人上經大法卷之一
