front:
  text: 靈寳无量度人上經大法卷之七霜六
  hash: sha256:067cc6527500615a87a35dbbf973835f56a2f93422b7de7aad8993c7b94179fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_007-030655b, image: sjb/03/030655b.png}
body:
  text: 靈寳符命品中理五炁服之通百關潤肌膚混合百神鎮宅安禁忌龍神十轉廻靈鎭井泉鬼花木靈精萬炁齊仙鎭伏尸客亡鬼上開八門鎭宅財物興進飛天法輪鎭財物耗散罪福禁戒鎭子孫不旺多憂衰弱宿命因縁鎭夫妻嫉妬鬼普受開度安仁人手中得免罪上生梓木朱書告行之法死魂生身安亡人手中令子孫再生得壽梓木朱書告行之法人道渺渺治土瘟安鎭仙道漭漭治學道失心服食鬼道樂亏鎭舟船舟水性龍蜃不興災當人生門度傷死之鬼得生鎭地告亦同天道貴生鬼道貴終仙道常自吉鬼道常自凶髙上清靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人筭斷絶人命門阿人歌洞章以攝北羅酆采送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆落落髙張明炁四騫梵行諸天周廻十方无量大神皆由我身我有洞章萬徧成仙仙道貴度鬼道相連天地渺莽穢炁紛紛三界樂𠔃過之長存身度我界體入自然此時樂𠔃薄由我恩龍漢蕩蕩何能别眞我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故爲歌音三界之上渺渺大羅上无色根雲層峨峨唯有元始浩劫之家部制我界綂承玄都有過我界身入玉虚我位上王匡御衆魔空中萬變穢炁紛葩保眞者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復柰何魔王敬形敕制地祇永離鬼官魂度朱陵過度三界受煉更生是謂无量普度无窮書符呪曰天晶元元地廣川川雷公辟邪電母應天草人精靈役使萬年樹木靈異敢致壇前盧盧泠泠依佐四邊神靈在下召汝神魂立至使吾逆知千年立附立到随時報應瑟瑟栗栗靈祇速集洩洩吉帝靈龜敕制急急如太上靈寳敕右法左手卯文呪之並用黄紙朱書按前文靈寳无量度人上經大法卷之七
  hash: sha256:d153d4d326ca0dbe8176232ab02bde6f3eaa2502fc3965549817d48b2f4d2005
