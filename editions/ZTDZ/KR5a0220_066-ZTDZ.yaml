body:
  text: 神虎追攝品神虎隱書天一北祚太一紫元混元玉札神虎隱書者昔天師葉眞人成道之日藏此隱書於龍虎山壁魯洞中以石銘曰北魁玄冥天一北祚太一紫元混元玉札神虎隱書北魁祕於玄範天一宫中太一紫府之内北斗九天之中神虎九皇夫人掌管下元八極貴賤十方王侯百官兆庶萬品生民魂魄生死壽限延促神識去留禄命長短皆係主之凡人世四夷八蠻九州十道六戎五狄十二分野天蓋之下萬國兆民九壘之上咸皆隸焉人生在世北斗降神一分生於形内三萬六千眞神魂父魄母主張元命大限三萬六千之日壽主一百二十年命遵依三綱五常保養魂魄精神不造罪惡不修善功壽命限盡眞神還於斗曹一日収去一神滿三萬六千謂之天壽數終斗極注死太微除生天符降下告於地司隨其所在神靈奉行陽収其魂隂取其魄地収其水天取其炁火風散盡還形太隂神識飛爽任於造化隨業受報輪回生死萬劫無盡若生世之日修善建功玉曆増筭神降善炁於身中修惡造罪地司除筭神飛惡炁於身中還於斗府大惡除壽大善益壽小惡除筭小善益筭一筭三日一壽一年紀筭一十二日紀壽一十二年折筭除壽去其眞神若造大惡壽盡筭絶眞去神歸一身卒暴奄忽命終魂魄歸斗神識受苦惡業非大除壽収神鬼魔來侵善神逺離空尸行走危困疾惡縈纒其形小小惡業减筭去神魂魄不寧邪炁爲病若能改過悛惡修善建功立德行仁齋戒精修感動皇極眞神再降神識靈明魂魄康樂萬神懽忻積日累歳萬神備身神能飛形大則白日登仙中則尸解得道小則延壽長年所謂皇天輔德天佑善人踈而聽卑應如影響太上祕誥曰作善善炁至作惡惡炁至盖北祚玄曹斗府星宫毎一宫府皆有億萬九皇靈官億萬綉衣使者億萬金童玉女億萬天將吏兵下遊於世採録萬國人之善惡毫分無差其中最尊者有九皇神虎夫人神虎左右大聖神虎主生死玉女次有神虎追魂使者神虎追攝吏兵若能修善建功除邪戒欲去非輔正名列天一紫府位司太一北祚可以請降衆靈佐助大道回尸起死復魂返魄剪除妖魔叱咤幽司統禦冥曹注禄延壽愈災捍厄以招天勛功成善滿白日登眞序分五斗玄範皇人曰夫東斗注筭君廼青陽生炁之府青靈始老九炁天君主之西斗記名君乃皓靈養素之府皓靈素老七炁天君主之南斗上生君乃赤炎丹靈太淵之府丹靈眞老三炁天君主之北斗落死君乃鬱絶中和之府五靈元老五炁天君主之中斗大魁君乃總監衆靈之府黄靈黄老一炁天君主之且東斗注筭君但人之禀受一炁而生即五帝監生司命定筭主録勒籍大而爲壽小而爲筭夫人之生於世者並注一百二十壽一紀爲十二年爲一千二百筭如司命定察功過髙大則爲奏呈以増其筭大則三百六十筭小則一百二十筭如司命定校罪惡貫盈則爲奪筭罪惡未深則爲减筭除年増促年齡各分等殊未有差之毫髮者也其東斗注筭之君捧印持旌威禁極重盖人之死亡隂魄皆屬北冥之所攝如天數未盡或犯罪皆禁斗獄名曰天一北祚陽則生人代罪分受冥考令冨乏嗣續貧多子孫男值凶横而亡身女值娠姙而傷命或出入訟庭消磨産業或遭瘟疫或生瘡疽累歳迍邅連年困篤皆亡靈之受考致陽世以遭殃或作善功正心奉道純忠全孝累積隂功書名左劵魔王保舉諸天稱慶即魂登南斗魄煉洞陽赦隂過之考魂贖陽愆之責役其有天命或量校有無罪犯即拘留南嶽差注人間權攝里域候年限考終經北斗文曲之宫給大梵正音天書合同眞文齎詣南宫量其福報受生人間分其貴賤男女之身其有壽終無功可紀無行可録罪積丘山無有善露即徑囚酆幽受其冥考動經累劫不覩光明受報分形作諸異類永失人身深可悲哀故元始上帝慈憐觀見衆生爲善者少爲惡者多沉淪五道謫役三塗萬劫受苦無有出期是故發大慈悲流傳大法以混元之炁玉札之符散布眞文仙經祕誥玉簡金書付以靈寳筌蹄指示篇目有道之士代元始以行化普救愚迷故法中雖符吏等殊咸遵帝命凖依行遣呪訣就玄魁北冥而搜攝之所謂無所不度無所不成是謂無量度人者也故行持之士不可不知召之當存身如枯木左右手玉清訣捧心存心中眞火炎炎焚爲灰燼却左手搯午右手子文义腰存腎中眞水如車運轉與火交接忽震風一蕩吹灰全無即叩齒十二通面天門吸混元祖炁十二口閉息少時存天門有紫雲而來入兆頂次存巳中宫有黄白之炁纒遶而出與紫雲交接想身爲元始天尊戴上清冠帔畢再想東極宫中太一天尊從空而來至兆前坐九頭獅子座手執楊枝淨水次再取太一天尊頂中青玄之炁合元始之炁化成百寳光明罩兆巳身次想天門紫雲碧霞之炁至兆面前其炁散處見神吏虎賁玉童玉女符吏並捧符執節兆乃拂訣於耳目役之候彈畢即通炁進案前焚香具白事由再叩齒丁罡十二歩旋身面北兩手搯神虎印兩手小指相交大指並搯中指中呪曰唵俱賖魯祈容吒嚧平攝呪畢髙聲召云吾召神虎主伯主吏或云三部追魂使者等來至壇前聽吾處分存至祝曰吾稟元始勑符威章龍文掌玄元之靈寳神虎之冥司汝等正直聰明威容猛烈分幽冥之黑暗别生死之殊途旣苦爽之未超當慈悲而追攝依遵玉札徑往重泉聚隂魄以皈身返陽魂而合體明分報應顯見玄壇使萬炁以齊仙普受開度開八門之妙道拔出幽關勿生懈退之心以廢眞元之教火急奉行火令疾疾祝畢叩齒九通彈訣吹炁入玉札依法焚之師曰應靈寳諸罡歩召將錬度召魂應干作用但左手中指中右手寅申訣黙定心存念東極宫中太一天尊青玄上帝一炁七遍取青玄之炁一口咽之直至丹田再想丹田之炁與青玄之炁交結成雲直透泥丸而出化身爲太一天尊北魁玄範神虎夫人北斗玄冥大聖第一夫人諱管子生人北斗玄冥大聖第二夫人諱管丑亥生人北斗玄冥大聖第三夫人諱管寅戍生人北斗玄冥大聖第四夫人諱管卯酉生人北斗玄冥大聖第五夫人諱管辰申生人北斗玄冥大聖第六夫人諱管己未生人北斗玄冥大聖第七夫人諱𩴮管午生人玉曹仙伯主吏各一員雄左玉曹主伯主魂大聖何雌右武鸞主吏主魄大聖喬右二神管星宿公侯及士庶之魂神虎玉女七員倒生玄司第一玉女蔣仁貴第二玉女蔣仁賢或作仁喜第三玉女王眞第四玉女黄文第五玉女萇道仁第六玉女董希卿第七玉女翟普卿右七玉女掌一切横死夭亡之衆各紫衣袂鳯冠朱履羽裙珂珮手執生死簿服符玉女七員第一玉女蔣仁貴第二玉女李華第三玉女由逢第四玉女趙申第五玉女韋卞第六玉女張信第七玉女徐明右神虎玉女七人各掌生人死亡魂魄輪轉受化生死之方皆係玉暦所録即知存亡之所几追取魂魄詳其注死之由同請降大聖玄司玉女齎持混元玉札往四生六道追取亡魂立至神壇鐵跡臺光使者神虎使者十五員張𧪵侯魏巳上三員主子午生人丁明卓伸之巳上三員主丑亥生人王滸王劉子和巳上三員主寅戍生人仔天祐任曽无巳上三員主巳未生人邵公權陵飛眞孔𩳍巳上三員主酉辰生人三使者第一使者紫綉衣紅綉抹額侯第二使者紅綉衣黄綉抺額魏第三使者緑綉衣紅綉抹額張𧪵神虎功曹八員天道郜天眞地道冉文仲人道胡當仙道索忠神道祖公弼鬼道翟尚業道萬贇畜生道王精右功曹各有一百二十員所用者七員監魂引魂童子各一員玉府監亡魂童子徐玉府引亡魂童子孔右童子各有一百二十員酆都功曹一十二員子神侯子恩丑神孫太平寅神張文卿卯神孟子房辰神鄭長卿己神石長生午神徐長卿未神松文卿申神程執明酉神王弓望戍神龍楚卿亥神隂貴卿混元玉札化元律魂星飛澤右用槿木長七寸闊三寸厚二分朱書告付三界十方生死之方追取生死魂魄又可以白繒長七寸闊三寸朱書玉札方器貯水卧尸返眞符上手執返眞靈旛歌斗章燒玉札於人中未及一日或卒暴去世皆可返魂復魄回尸甦神若大數未絶當祈天求生如壽禄期盡當訴遺言急須遣歸儻非虚白内映善功格天投紫丹以活骸列大醮於玄魁不能久停再生矣陽日混元玉札神虎玄冥符命吾奉北魁君急召六甲神雄左追魂吏綂制百節形手持玉札符禀勑往幽冥眞精降一炁星元善惡悉分明爲紀律萬神咸敬聽不問有無罪不管踈與親皈嬰攝魄赴主伯速施靈何受壇來命火急施行急急攝攝隂日混元玉札神虎玄冥符禀勑玄夫人吾召六丁神雌右武鸞吏倒生玄司君遵奉玉札劵徑往隂關尋天一北祚炁生死路分明三界何敢逹十方億劫𡨚仇對萬神咸敬盡皆迎符到悉皆停返聽死魂故根攝魂赴主吏速威靈喬荀奉壇來命火急施行攝攝疾疾陽符隂符變化威靈攝混元開泰攝肇脫分精攝冥聚魂魄攝玄星耀輝攝飛空統御攝澤被幽通攝右法思斗星所向逐星取炁吹入符中第一玉札夫人攝魂靈符尤敎第二玉札夫人攝魄靈符呉問陽日聚形隂日聚形太上混元玉札急追索劵内三界九州亡靈急依帝勑命奉行無令怠慢神虎官吏火急捧符告下主司太一北祚天一紫文北魁玄冥混元玊札神虎符命追取某分野亡魂等衆來赴靈寳玄壇恭對三寳御前聞經聽法傳符受戒領受殊恩無違頃刻疾速奉行神虎所到萬神敬聽風火驛傳年月日時告下具位臣姓名奉行封皮具立臣姓名承玊札奉行背書混元玊札神虎玄冥符命追取某野苦爽幽魂方函混元玊札神虎符命告下某野主罪獄主曹萬神具位臣姓某謹重封皇人曰凡行玊札並按亡魂生時年甲所屬斗宫各於本屬星下書所追亡魂姓名如行普度止書某人等一切億曽萬祖幽魂苦爽孤魂滯魄之衆應玊札後書上帝勑文如專度用天書雷器之篆如普度用眞書於建壇之夜次日清旦用使者眞形符及二關引同玊札焚於烈熖中使者前行齎持符命召攝亡爽克期來赴太上混元玊札追魂鐵劵皇人曰凡欲追薦横死之者須用鐵劵以攝之法用雌黄夾硃砂篆之召攝亡魂各於所屬星下書姓名生時年月及某月日身亡葬埋處若名數多則于玊札下列之或不記年月日時亦子細開說於玊札下同信帛等關焚於烈焰中扶无量扶蓋嬰神嬰自宫兆飛生自騫盤業覩盤基蘭翠宇九蘭定婆泥咎通淑易邈碧落無寂浮黎形攝總惡景監奕鬱上元上天无品蕭嵎飛天幽寂扶嬰兆盤大醜度人蘭定淑子逆至午化元律魄星飛澤午逆至子扶嬰兆盤蘭定淑者乃七元眞君之隂名也化元律魄星飛澤者乃斗中夫人内諱也是北斗之精斡運隂陽聚其魂魄成其形影之象然後攝之何者盖横死者隂炁迷纒使其心神倒錯妄失眞元至卒之後陽魂俱消隂炁隔障不覩光明魂離魄散故太上慈悲立此劵文以攝之此所謂靈寳无量度人者也緫式靈寳大法司本司於今月日據云云備録申奏天省取旨外今依禀太上元降太一混元追魂玉札受付追魂使者前去隂關取攝亡魂某甲等赴本司今具亡人姓名玊札下項太上混元玉札急追劵章符文中合度一切苦魂幽爽生方死府咸從帝命神虎官將攝到如令不得怠縱勑右太一北祚天一紫元北斗玄冥混元玊札神虎符命徑下十方三界生方死府追攝上件亡魂某甲等來赴壇司朝謁上帝領受天恩主者萬神開關啓路疾速奉行母輙稽遲年月日時下具法位行神虎太一混元玊札攝召事臣某奉行内封具法位臣姓名承玊札奉行後書太上混元玊札取攝亡魂某等外方函太上混元玊札神虎符命告下十方无極世界九幽地獄主者萬神具法位臣姓某謹重封勑玊札呪曰玊札隱書降付北都囚獄冥司敬聽神符長夜苦爽寃對罷除身度太陽面朝玊虚急急如玊清上帝律令勑發遣神虎攝召科凡發玊札須備茶酒時果金錢雲馬一十二分左斗印右劒訣义腰存身爲靈寳天尊祝曰今則啓黄籙之祕典按靈寳之齋儀玄恩廣霈於冥司聖澤普霑於幽壤釋放亡魂赴壇受度切慮幽關阻滯冥路艱危有諸障礙未遂前來今起丹誠先當召請志心召請三元直使神虎將軍攝召冥官追魂使者惟願遵承科典俯察虔誠攝召亡魂赴壇受度風馬雲車來臨法會志心召請南陵樞府玊壇靈眞無礙神通攝魂使者惟願上遵帝勑下順孝誠攝召亡魂赴壇受度風馬雲車來臨法會志心召請玄天北府紫極靈眞攝召神官追魂童子惟願乗龍駕鳳走騎飛軒攝召亡魂赴壇受度風馬雲車來臨法會次念生神攝魂呪太微迴黄旗元英命靈旛攝召長夜府開度受生魂又祝云以今焚香供養三元追魂攝魄使者神官將吏聞兹告召降赴齋壇允聽關宣分班列位念兹誠懇薄有具陳酒醴珍餚伏惟享納次焚符讀牒上香獻茶酒次念遷神召魄呪符命通冥漠靈旛颺曉風遷神超北府飛舄上南宫再伸奉請三元追魂攝魄使者神官將吏惟願承兹告召每禱感通傳逹齋誠共遵聖敎騰天入地詣水乗風逹三界則立在須臾追魂魄而感通頃刻是故傾心虔禱願仗神威齋事周圓言功效報次上香酒次念青玄救苦偈青華慧力拯含靈救苦尋聲破鐵城弘濟無邊隨願力光明普照逹幽扄靈風扇處炎煙滅法雨霑時發朽滎无量慈悲咸救度亡靈俱得面慈尊再伸上香供養三元追魂攝魄使者神官將吏本壇剋於今夕關宣醮禮候俟合信飛符立召魂靈隨旛引導亡魂赴壇受度以證升遷齋事周圓同標仙籍次上香酒次召亡存身爲靈寳天尊自東歩至西北取天門炁三口吹身面北丁立搯玊清訣念呪金輝斡旋齊七衡飛罡神虎開幽關廻運天常履玄綱廻素元嬰定淑蘭泓遐扶盈映帝阿陵昌乘明盤兆羅和會七神作一家離合自然有玊葩玄範北魁掌生死至道呼吸根蒂昌我行玊札金虎文萬神敬聽靡不從如有逆吾大道者汝須出職道不成急急如北魁紫微夫人歌章律令攝左玊清訣右執玊札呪曰玄天玊札神虎符文混元眞精與符合炁太一玄冥通津統制追魂攝魄開陽啓隂萬神敬聽敢不奉迎神虎玊女神伯主吏神虎大聖夫人内諱追魂使者攝魄吏兵禀受符命一召速至宣告寒庭不得稽滯追魂攝魄形影顯現功奏玊宸來臨法會急急如玊清上帝律令斗罡歩至澤星進三台廻罡入斗口内呪讀關子同玊札焚之托水仗劒焚三使者符灰於左手心搯玊清訣念呪七遍黄老三寳君紫雲上天炁攝制九幽魂太玄無邊際皆成自然人地獄無拘閉開通光明門悟眞道自慧急急如律令噀水一口曰天一北祚太一紫元北魁玄範神虎玄伯斗中大聖玊女追魂十萬精兵隨我降靈一呼一吸入我印中隨炁而出隨炁而行變化億千元亨利貞急急如神虎勑呪七遍再噀水一口以扇灰往十方次遣曰太靈尸道神機紫策九炁雲章神帝勑攝神虎玊女神伯主吏追魂使者速赴生方死路追取札内亡魂等速赴法會領受靈寳升度功德遣神虎關子神虎威靈攝召鬼神九清符命逕下酆庭陽耀玄壇立見魂形不得容隱金馬驛程急急如玊清上帝律令遣三使者關子三部追魂大逞威靈部領神兵直下幽扄追召魂魄速見眞形不得容隱金馬驛程急急如玊清上帝律令左右神虎二大聖符雌右武鸞雄左大力二符謂之飛符用紅素各長四寸九分用粉書就神虎堂内發神虎文字一處同燒並無散形書時先念北帝呪次呪筆取東南炁吹筆上然後念呪書符北帝呪曰上靈天蒼中有甲英混芒一吸東有伏藏天帝所履玄跡天章今日書符作我天航急急如律令勑筆呪曰覆天齊速震萬靈勑命一下鬼爽離營覆降眞眞炁所成急急如律令書符呪曰北帝靈寳天帝噷唵召神虎豁落紛紛天飛羅明日月星營魂炁有成急急如律令雄左雌右右勑符再用前勑筆呪二大聖並如帝王服色一人有髭髯各統神將一萬二千名號神虎者謂天地掌魂之司也掌魂即神虎大聖也其玊魁玄範府局分左右自有神虎飛符攝魄使者一十五員並緋衣朝天幞頭各有本符召之呪曰覆天齊者覆乃神虎之名天齊乃北帝之諱玊札主吏二符玊曹仙伯何追魂符三清勑神虎元君幽字三清玊勑召神伯金虎玊何昌前奔札符令下元君魁都曹火令勑破幽壘酆泉遵依速施行玉札主吏喬追魂符三皇勑玊札符吏受勑破幽字三皇君勑召玊札魁司主玄範覆吏喬受命隂關勑取破制幽亡魂酆都都禀命速施行右二符吏管星宿公侯及士庶之魂書符召到壇中自述欲追魂情意任便祝之並同功曹符作用書之搯北斗訣取北魁炁吹符次燒符亦取炁一口吹壇中剔訣神虎追魂使者符後天篆檄神虎使者受領玊札劵追取亡魂某甲等速降來如律令前書靈寳大法司神虎追魂字中書符後書天篆後用太歲年月日某處行下次用行持主神召攝姓押此係神虎二使者符檄朱書黃紋青封如用使者符召攝幽魂不到者多是隂府照對隂訟及罪戻重者隂官拘留玄局自有元降符檄再召之無有不至亦用朱書黃紋青封元炁徑開地府重牢救度亡魂某普承符命滅除應犯諸罪元輕者速放前來勑令疾三使者符法用青黃紅繒各三尺毎三尺分二截各一截彩𥁞使者之形並曲脚朝天幞頭各衣本色衣碧玊束帶魚尾勢刀緑皮靴執符下一截朱書使者眞形符使彌滿次以引并玊札焚於烈焰中符成仍於符中心書使者名諱念神虎呪圈之又一法陽日符下書何喬魏隂日符下書侯劉張信上部使者符天地合德乾以覆運隂陽日月合明坤以載形二炁與符合并追魂使者侯准勑奉行中部使者符隂陽合炁天垂玄象魂魄合形帝以運靈生關死戸符廓通津追魂使者魏凖勑奉行下部使者符日月陽帝飛符昭灼合并炎精攝魄聚魂追魂使者張信准勑奉行書符總勑符呪神虎戟飛運招遥一統隨三七遍急急符後檄文某甲年月日某處告下具位右使者追取十方三界九州九地一切重隂病患死魂諸獄囚苦一切孤魂滯魄玄司玊女眞形符七道靈書七元眞君追攝有玄司玊女掌生民死亡順逆之魂魄召攝亡魂不記年月日及死亡因依但用此玊女眞符罔有不知第一提魂攝魄倒生玄司玊女符三清勑命告下北辰念夫人内諱並七轉圍之七元秉勑分身化形十方世界普救罪人已上三台勑北斗七元散形後符並同此法眞元正炁照徹幽冥已上玄炁二字後符亦同豁落流鈴眞符急召攝魄提魂救苦聚形玄司火令仁貴速行第二掌正病身亡人之魂玊女符玄魁旋運飛星致靈符命正病所攝之魂去痾聚魄仁賢速呈第三掌瘟疫瘴癘之魂玊女符飛光一攝瘟瘴蠱毒蟲疰妖穢解除滅殂魂魄聚形真卿急攝赴壇來第四掌勞瘵風癎癲癩病業玉女符飛罡玄運調治瘵疾攝完靈寳眞通惡患牽縈魂魄火急赴壇第五掌水火刀兵投河落井自縊横死王法玉女符飛星化无續形接骨追聚運動天衝蕩滌囂凶魂魄火急攝赴壇來出二二十七第六掌墮胎産死傷折血光之魂玉女符飛火蕩穢奔燌除腥魂淨速攝魄寧赴壇來呈第七掌隂暗不明雷伐枉鬼惑之魂玉女符飛星招摇懴解符命魂聚宿愆所告魄全速破幽隂火急到壇巳上七符看亡者生時所患何疾屬第幾玉女所主只發此一符追之依後召功曹符作用書篆搯上帝訣取天門炁吹符攝召追魂七玉女靈符法用青素各長二寸四分以辰砂書之未建壇七日預告之前髙功法師毎日服此符七道逐日從第一服至七日畢毎日早晨就三寳前面東服之其符逐日書一道燒灰用茯苓硃砂少許煎湯服之攝召立獲感應服符時須是行持不怠三五日前預發文字奏申應干去處關牒城隍神虎至日用淨室一間勿今一切厭濁焚香勑水灑淨建神虎壇如是七玉女主亡魂滯魄别有總司主其令神虎大聖二人収録魂魄放留生化皆主其職第一提魂攝魄倒生玄司玉女蔣仁貴第二主瘟疫瘴癘時炁天行卒死之魂李華第三主刀兵自縊勞瘵厭魅劫掠死魂玉女由逢第四主王法刑獄戰闘敺擊毒藥惡死之魂玉女趙申第五主落水蠱毒寒凍百病死魂玉女韋卞第六主火燒湯盪風顛驚癎癰疽瘧痢死魂玉女張信第七主饑饉虎狼蟲蛇及一切𡨚横死魂玉女徐明雄左玉曹主魂主伯何雌右武鸞主魄主吏喬使者眞符一十五道是符若急用只依前法念北帝呪書之如以第而書當逐一用散形而篆不可輕用盖帝諱之必宗第一使者眞形符幽寂坎廓奕子澄朗丑畢雷執符追魂寅急急第二使者眞形符并賚寅儲彪卯威綽酉肇宏辰資拒執符追魂急急巳第三使者眞形符澡章午曜凝未迥圖離亶渾申執符追魂攝申上挑第四使者眞形符纒魁午中侈亥昺和寅哲華酉丁仲執符追魂攝丑至申第五使者眞形符芒炫已益亶辰消湟卯明温執符追魂急寅第六使者眞形符昆雷丑皇元子鎬適亥極中戍卓申之執符追魂急酉第七使者眞形符披嶤申湮堅未玄寥午王滸執符追魂急急第八使者眞形符即寛巳侈冝辰時畎卯龍汾寅泬魔丑婆尼子王彚執符追魂急第九使者眞形符栗鐸寅匪庸卯薦辰蛟追巳劉子和執符追魂急第十使者眞形符洞涸申飛天酉濯曜戍育瑛亥天同執符追魂急子第十一使者眞形符騫鬱子景常丑騰精寅蕭嵎巳運量午曽元眞執符追魂急未第十二使者眞形符霄未秀亥樂酉陀申任魅執符追魂急戍第十三使者眞形符豁蠻四指上總獸四指中儲雲中指下邵公權執符追魂急第十四使者眞形符鹿幾四指下碧提中指中慶雲中指上魂精巳陵飛眞執符追魂急第十五使者眞形符盧羅中指中綽堂四指中四明酉衡肇亥孔𩳍持符追魂急右行符追攝亡魂不問天牢地獄九幽泉曲罪之輕重但用此使者符齎持玉札攝之應時而至神虎追攝功曹符神虎玄司壇局自有七道功曹毎一道各有功曹一百二十貟凡追攝須用符召而用之凡書符用黄紙朱書玉皇訣取東南炁七口吹筆端面東書之同玉札一道燒立降其前七玉女符同此訣呪凡欲用功曹即念吾召某功曹立降壇所急急如上帝律令勑如召到天道神道功曹使者即至解壇散席用酒泉全錢雲馬發歸天府面東念呪謹請天道功曹地道功曹人道功曹仙道功曹神道功曹鬼道功曹業道功曹立降眞炁急急如上帝律令勑攝如書玉女符即攺爲玉女之名天道功曹眞形符諸功曹並平内憤緋衣大袖玉皇上帝勑天皇上帝勑靈寳上帝勑郜天眞急降天道貴生勑令光明魄爽飛龍映煥魂沖勑呪曰九天之勑大道祖君造化旻象三十二清奉令如法上入玄冥急急如長生大帝律令勑上入玄冥一作入上玄冥地道功曹眞形符三台勑同前餘做之冉文仲急降神以運載勑令隂地陽工不停未制土宫神火眞炁奔激滿空勑呪曰洞元品品壘壘化形五陽徹應十極幽靈天符成象地道速靈急急如長生大帝律令勑人道功曹眞形符胡當人道當人急降渺莾生門髙上清靈爽不欲人道窮勑符呪曰六合成品三一化生共成周體速正元根道力一降萬威一成急急如長生大帝律令勑仙道功曹眞形符索忠仙道以攝仙急降莾莾北酆道常吉歌朗惟願仙道成太空我道日興隆勑符呪曰主掌職權分别上仙諸冥判運八極成全上王保攝共得爲仙急急如長生大帝律令勑神道功曹眞形符祖公弼急降无量大神變化皆由我身飛空過之匡御衆魔長存體入自然勑符呪曰上元八極運化天光三元五運八極九祥造化萬變結聚成章急急如長生大帝律令勑鬼道功曹眞形符翟尚急降鬼道諸天炁貴終蕩蕩斬馘六鋒統乗玄都轉道混中勑符呪曰冥陽極類隂結成眞果章九有通變九形一𩔖成七爲達全眞急急如長生大帝律令勑業道功曹眞形符龍漢蕩蕩火司有命令下何能别眞以發歌音不停薄由我恩急召業道功曹葛贇火令來勑符呪曰正化品格周流十方道德慈善普濟業行眞光符命永得利貞急急如長生大帝律令勑符後告文勑召玉府直道功曹火急至壇受領符命疾年月日時符召畜生道王精酆都功曹符子神侯子恩皂衣從官三十五人丑神孫太平黄衣從官五十六人寅神張文卿青衣從官二十五人卯神孟子房青衣從官四十五人辰神鄭長卿黄衣從官七十二人己神石長生赤衣從官五十八人午神徐長卿赤衣從官四十八人未神松文卿黄衣從官五十七人申神程執明白衣從官四十七人酉神王弓望白衣從官四十六人戍神龍楚卿黄衣從官三十五人亥神隂貴卿皂衣從官三十八人右童子十二人從官共五百二十二人隨時毎燒一道竟勾追一切寃魂立至取天罡炁吹符祝符呪曰幽幽冥冥天清地寧三皇助我六丁衞形辟除萬病使我長生吾是太上之孫真人之子追呼諸神欲擬驅使急急如律令牒内塡此姓名長雷卿罡了然昇仙子靈寳无量度人上經大法卷之六十六
