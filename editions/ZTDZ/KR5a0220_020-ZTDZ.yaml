front:
  text: 靈寳无量度人上經大法卷之二十金十
  hash: sha256:d3f3bda93e8eb9aae39c1946417618e3a69291b016ef4b0589cf65749f3b2fc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_020-030727c, image: sjb/03/030727c.png}
body:
  text: 隱書玄象品玄師曰乾坤開闢五行三才之象皆有形質爲人能全天地之炁而不能長久者謂其通於變化而不能拘於精神以養清真之炁而反爲妖孽邪魔夫人能養其天氣可證天真養其濁氣化爲魔鬼此則易知而難行易行而難言也長生飛升之道無非得道是故迷淪於色欲之界靈寳隠書雖其言寡其行奥欲清氣不荒於色欲之間濁炁俱澄於沉淪之内當赤明劫運流行上學其於下士莫可得焉迨我皇人得之浮空立象至精之中日月星宿風雨四時正炁之内卞璇璣玉衡輪迴晝夜世人能存其長生之道而不入於輪轉之界則具在隠書分別諸章酌然巳見長生要徑之門必使超凡入聖而易行上仙得之明風雨冥晦下仙得之通生死機候王侯得之推應四時資養萬物召感和炁乃至長生凡人不知委形與天地齊同使精神炁血耗散即衰老而自死靈寳長生之訣運度流行使歸根復命魂𩲸嘯詠炁血泛景然後隠形遁跡飢寒无侵消魔除毒避世絶味至於得无爲長生之道萬法之宗不出於此戸庭耳所以四極天中梵炁音文一極六十四字是五行卦象之文不離人身若能動息悟解精炁混合靈音和暢是爲長生不死之人在天成音文炁候在地成萬物形質在人得之冲識往來然後知空不空知色不色是爲照了達我妙音身與天地齊炁與隠書合知音者其行有七一徧身輕二徧神安三徧炁全四徧精通五徧神化六徧通靈七徧成寳自然和合變化上清飛身金闕遊宴玉京青帝大魔神功符凡欲受持立春日志誠焚香靣東陽初甲子庚申三元日同雞鳴正坐合目拱手如意自在候炁安靜勻和不可以手擦面目恐亂神炁次以津液盥漱咽液一過叩齒三下然後鼓炁一口使息炁調匀出自鼻中徐徐匀停調一手息自然徧滿肌膚血脉毛竅之間六根即得清淨此養東方阿薈无愁發生之炁鼓炁一口以養胎息若不鼓炁奔入南昌心帝之位相剋未可用也凡欲使息炁長久以心目相存於鼻竅之中自然得久次以閉息令長久以心聽耳内若蠅蟲蓊蓊之聲凡人觀聽於聲色所以精神飛走而出於耳目之間致疾病夀夭常以心聽耳有若蟲聲自若魂魄不散故人居色欲之界常存此法令情欲自滅精神不衰不知此法神疲精耗死則近矣次心中存身化山川林木身若在天地日月之下久行此法精炁内守覺如山岳之象以安百神即得精炁生存疾病自愈行持至此徐徐開目以淨水吞符此召青帝護魂按東方隠書自亶婁阿薈至四象吁貟此東方八天是八卦之象巳上六十四字分音炁爲六十四卦上属春官木徳蓊鬱之精東斗主算青帝君之治在人身爲護魂君主耳目口鼻毛髮生門之魂東方天魔名曰巴元醜伯天蓬兵法職之巴元醜伯勑九轉戊辰已巳納音属木當行東方炁符及兼行中極炁符外納音属木日凖此將上四字合爲一符或隨形勢大小篆之凡篆此符面東方以左手仰掌大指搯中指中右手執筆念東方八天音文六十四字畢念目想東方八天帝在雲霄半空之中垂一珠如彈丸叩齒三下取珠中青炁一口吹筆上念呪曰元始靈書勑巴元醜伯魔王受天蓬大法急急如律令次用朱書符先寫巴元醜伯次字上劃八卦重疊劃之人書勑字隨筆左轉九帀出筆赤天大魔神功符焚香安坐如法調十餘息令匀長存心常若蓮花之狀後盥漱咽液沃澤想心炁與眼炁相通次想心炁直上至頂後過聲若雷轟覺如風雨存在兩眉之間存見眼中𩀱瞳有若金環之狀金環想法目前隨左轉九回凡人眼前有花生或黄或黑爲精炁所散神光在外眼目有疾行此九轉神光法即得光明至老不昏昧次想身在猛火之中稍覺炎熱又想天柱之中時若雷電霹靂之聲覺百骨毛竅皆開身上若雨露升降大有剪邪辟惡之功按南方隠書自南閻洞浮至神纓自宫此南方八天是八卦之象六十四字分音炁爲六十四卦上属夏官火徳赫奕之精南斗上生赤帝之治在人身爲養炁君主心帝生炁樞機之門南方天魔名曰負天擔石天猷兵法職之負天擔石勑三轉丙寅丁卯日納音属火當行南方炁符及兼行中極炁符外納音属火日凖此凡書符面南搯中指第一節執筆念南方八天音文六十四字念目想南方八天帝君在雲霄之上垂一寳珠如彈丸叩齒三下取珠中赤炁吹筆上念呪曰元始靈書敕負天擔石魔王受天猷大法急急如律令次用朱書符先書負天擔石次劃八卦次書敕字三轉筆出筆如法白帝大魔神功符焚香安坐面西調十餘息令匀上想心中金色光明通照徧存心炁在兩乳中即巳徧然後盥漱咽液入華蓋肺腑之中想身在七寳林中上想見山不凡之狀髙若萬仞居大海中與塵世相隠次即心想兩乳左右有湧泉兩穴自丹天之下上升此穴流出身外皆散漫於海中此爲泝流之法使精炁保養凡人兩乳煞炁若杵聲心從尸神之所感尸神按西方隠語自刀利禪猷至栢空度仙此西方八天八卦之象六十四字分音炁爲六十四卦上属秋官金徳耀𩲸之精两斗記名白帝君之治在人身爲侍𩲸君主肺腑華蓋地根之𩲸西方大魔名曰反山六目翊聖兵法職之反山六目勑七轉甲子乙丑日納音属金當行西方炁符兼行中極炁法餘納音金日凖此凡書此符面西搯中指中節右手執筆念西方八天音文六十四字令目想西方八天帝君在雲霄之上懸一寳珠如彈丸大叩齒三下取珠口中白炁吹筆上再呪曰元始靈書敕反山六目魔王受翊聖大法急急如律令次書符先書反山六目次劃八卦次書敕字轉筆七帀出筆如法黑帝大魔神功符焚香安坐面北調十餘息令勻長想耳中黑炁飛散出耳内聲若殘蟬之聲餘音斷續不絶自然神炁寂靜通血君朝於元矣凡有四肢骨血之疾此法消除爲要也次調息閉炁存想上天日月之象降在兩眉前照徹十方然後日從左鼻孔入月從右鼻孔入直至頂後次入丹田中照耀光徹徧體先存日輪在丹田中旋行運轉九徧次想日左月右在丹田中不敢動放五色光明從天柱而上直至頂後光明十方想日月在丹田中若大冶鑄金石之狀如此烹煉隨意而止此爲内金丹之法行恃歳月即爲長生之人若鼔炁盥漱即成流珠之狀按北方隠書自玃无自育至幽寂度人此北方八天八卦之象六十四字分隂陽爲六十四卦上属冬官水徳曲育之精北斗落死黑帝君之治在人身爲通血君主真陽腎元生根之血北方天魔名曰監醜朗馥黑煞兵法職之監醜朗馥勑七轉丙子丁丑納音属水當行北方炁符兼行中極之炁納音属水日皆率此凡書符面北左手搯中指二節右手執筆念北方八天音文六十四字合目想北方八天帝君在雲霄之上懸一寳珠大如彈丸叩齒三通取珠口中黑炁吹筆上念呪曰元始靈書勑監醜朗馥魔王受黑煞大法急急如律令次書符先寫監醜朗馥四字次劃八卦次書敕字次轉筆七帀出筆黄帝大魔神功符焚香安坐調十餘息令勻長以心想頂門有黑炁直入至雲天碧落之中化成一宫若有所立圎象有式存自身披五色雲霞衣頭頂旒文冠手執玉簡珠履而坐所見圓象之内其中有靈光照徹天地之間如天帝所居之宫徃來所都皆自然矣以此召黄帝中主之君此乃元始中極之法中斗大魁君之治經云黄帝中主萬神无越總監衆靈之司魔王名曰横天擔力此尊在四極之上元始正炁土徳之精圓象修眞之法總炁歸於无色之界行持之後今人歸根復命煉精養炁煉炁成神煉質成眞經云上遊上清出入華房八冥之内細微之中下鎮人身泥丸絳宫中理五炁混合百神十轉回靈萬炁齊仙横天擔力勑一轉庚午辛未納音属土日當行中極炁符更不兼用四方法外納音属土凖此使内外金丹功成凡書此符面東存中央以左手仰掌搯中指中節執筆念呪曰光明立成度生辟禳度成想元始上帝在層霄之上垂一寳珠珠口中出五色炁吸炁吹筆上念呪曰元始靈書敕横天擔力魔王受中斗大魁法使吾煉精養炁煉炁養神煉質成真即日飛升急急如律令次用朱書符先書横天擔力不用卦次用光明立成度生辟禳度成十字次書敕字轉筆一帀出筆如法右法是上真之道所以飛升金闕遊宴玉京也學道之士行持至此依前法吞服巳上五符凡遇濟人治病看五臓所属以五行同類給符佩服如病在肝用東方符如水火刀兵之旤用五行所尅之符如旤患是水即用中央土符治之凡寫符於物色器具上或草或篆大小皆可但不失音文理劃爲妙也師曰自赤明開圖神農炎帝總三十二天帝君分降于世立成淳正之道至于黄帝有熊三十二天帝君又復始焉取用清濁立成法象皆形質之道天真皇人書其文爲五行之正亘古五行卦象用之乃長生接物之道靈書三十二天乃上帝綂御之司下應尊號帝王之位亘古之後自黄帝修真登太皇黄曾天百王輪轉至於有唐明皇玄宗登元載孔昇天皆書記典籍周穆秦始漢武之君位列輔臣者亦可數考焉是知天人上士登真之道具在隠書三十二天一天内音八字一極共音六十四字立象八卦世人得之可以長生蓋天之文日月星地之文山川林人之文精炁神日月星道用光明山川林道用度生故經云无文不光无文不明无文不立无文不成无文不度无文不生又云无所不辟无所不禳无所不度无所不成此爲道之妙用故三十二天下鎮人身以至四肢九竅五臓六腑𡨋合三十二天之宫分知之修煉合天之道復有黄帝真圓象大法修用按五行五炁日服一方炁符皆要治之訣昔黄帝之時爲妖孽所害遂用五方符圖書於劒戟之上以降滅之又以五方旙蓋畫象戰蚩尤於涿鹿是知圓象可以感動圓極至後功滿徳就白日冲舉黄帝書曰斗野之正以應圓象之地後失其所惟明皇廣求謂地有神人獻之在淮水之上四望正方遂建斗野堂今廢爲亭臺矣昔夏禹治水觀大梵靈音八卦之文隨山川形勢穿源鑿穴飛歩圓象疏决九河皆神之至故得太平之治周穆秦始漢武之君皆求此道多失其源後人攺易圓象符圖以大禹治五行形勢添减文畫无音可攻至東晋真人許遜因江湖爲妖孽所害曾親受黄帝之書用鐵板書此五符拽於湘渚斬馘妖毒今符板在長沙昭潭之下真人以此治妖孽救生靈積功累行拔宅飛昇仙翁葛洪常以此符用五行相剋日戲書於水泝流而上見者皆知其神異至秦皇訪求靈迹輔臣徐福獻禹歩天文地理圓象伏魔之書欲使民淳正佩奉行之可以朝至碧落暮返皇家遂去儒業慕蓬山之居役使生民枉死无數有失其治則天帝之官墮矣是知古聖今王皆三十二天之應治至於宣和庚子之運其象内方而外圓丙午之辰其象内圓而外方故西北有河潦之災兵革之害知此當立圓象以應淮水書靈符以投三山鎮此運會可以保天長存兆民受頼生死獲福畧紀其異以爲要驗之文靈寳无量度人上經二十
