front:
  text: 靈寳无量度人上經大法巻之四十二水二
  hash: sha256:d7eb844d8fc5dba7b83b7245fd098ceb10fe2362549b5f77a75ac10382170ece
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_042-030847c, image: sjb/03/030847c.png}
body:
  text: 元綱流演品黄石赤松真人曰天之至髙至清而有日月星辰神之至靈至聖而有仙賔羽容其神者寄會於身倚精炁爲人仗神爲主三者若住若聚可以混合百神神遊太虚上徹三境下徹幽冥上下無方去留無礙洞觀一切變化無窮莫出此也凡修真之士學有次第進有資序凡其法有三上中下士積累工夫自然通逹元綱流演一念遊廵神遊帝闕頃刻升騰三關一路朝真上下往來無礙有法有符用神用炁罡風静黙徑超祖刼之宫萬神侍拱巳復還元之府修真之士謹勿輕傳妄示非人萬劫不原可不戒之寳籙符黄紙朱書書符呪曰司權除殺籍東極上生名寳籙可佩服用之超魂神神靈天門開閉目念真法身外有吾身此是超凡格急急如律令每於甲子日入靖面東搯玉皇訣望斗中取炁一口復取東炁一口閉定書寳籙六十道或書六十甲子官君符六十道亦得六十甲子官君符甲子王文卿從官十八人鬼无光乙丑龍季卿從官十六人鬼邴丙寅張仲卿從官十四人鬼留昌丁卯司馬卿從官十二人鬼子方戊辰楚季卿從官十八人鬼生進已已何文昌從官十三人鬼傅下庚午馮仲卿從官十七人鬼却劉辛未王文章從官十五人鬼旨支壬申俟博卿從官十三人鬼石松癸酉孫仲房從官十一人鬼倚仙甲戌展子江從官十四人鬼四先乙亥龎公明從官十二人鬼乹進丙子邢孫卿從官一十六人鬼迪遐丁丑趙子玉從官一十四人鬼進卿戊寅虞子張從官一十三人鬼却心己卯石文揚從官一十五人鬼徑子庚辰尹佳卿從官一十三人鬼耳子辛巳楊仲公從官一十一人鬼元亮壬午馬子明從官一十五人鬼衍心癸未吕威明從官一十二人鬼歷子甲申扈文卿從官一十六人鬼琅光乙酉孔利公從官一十四人鬼聶全丙戌車元升從官一十二人鬼鏧星丁亥張文通從官一十二人鬼石耶戊子樂石卿從官一十四人鬼詮方已丑范仲卿從官一十七人鬼旨都庚寅禇進卿從官一十五人鬼總天辛卯郭文良從官一十三人鬼扶花壬辰武雅卿從官一十二人鬼苔點癸已史公來從官九人鬼軰力甲午衞上卿從官一十八人鬼縻子乙未杜仲卿從官一十七人鬼右石丙申朱伯象從官一十四人鬼扶伏丁酉臧文仲從官一十二人鬼王肝戊戌范仲卿從官十人鬼風髙巳亥鄧都卿從官一十三人鬼符天庚子楊仲升從官一十六人鬼季子辛丑林衞卿從官一十五人鬼以是壬寅丘孟卿從官一十三人鬼羅結癸卯蘇家陀從官十一人鬼進木甲辰孟飛卿從官一十四人鬼素良乙巳唐文卿從官一十二人鬼壘子丙午魏文公從官十六人鬼趙子玉丁未石叔通從官一十四人鬼矣位戊申范伯陽從官一十二人鬼道子己酉成文長從官一十五人鬼在公庚戌史子仁從官一十三人鬼進卿辛亥在子衝從官十一人鬼戴卿壬子宿上卿從官一十五人鬼却劉癸丑江漢卿從官一十三人鬼别扶甲寅明文章從官一十六人鬼則扶乙卯戴公陽從官一十四人鬼天竒典惡丙辰霍叔通從官一十三人鬼天摧羲理丁巳隺巨卿從官十人鬼夭横戊午從元光從官一十四人鬼耳迷已未時道卿從官一十七人鬼典惡庚中華文陽從官十五人鬼理千方辛酉邴元玉從官一十四人鬼權呼壬戌樂進卿從官一十一人鬼遺天癸亥左石松從官九人鬼商敝右法每日清朝呪水服符一道餘者以青袋佩之每於三元三會庚申甲子夜静入室佩甲子日所篆寳籙以兩手各搯卯文閉日静思閉炁不動以舌柱上腭咽炁一口覺身外有身衣服衣色形貌一如本身在前前有星壇髙九尺二寸左日右月南斗在後北斗在前即有前朱雀後玄武左青龍右白虎輔翼之覺飄飄然直至壇前丁罡三步上壇一級巡壇左行密呪曰仙道渺莽元始之家我欲陞壇清神變慮願得太上賜我流霞流霞之漿布炁芬芳我得服之可以𡵯罡五臓神君直日香官聞吾祕呪亦各以安急急如律令右呪念訖開炁入地戸復左行密呪曰无上大羅元姑玉清玉清之宫度法真人聞我祕呪度我尸形取彼玉霞以淨我神我今𡵯罡行帝乏郷臣朝金闕上謁玉皇急急如律令右呪念訖閈炁入天門即是第三重壇既入天門如有仙人二人玉童玉女侍杏傳言共六人次長跪閈目若有神人乘五色雲霞服似上清衣傳玉帝符金書照耀呼名復有一人執瑶爵中有玉霞漿北斗中有黒炁南斗中有赤炁日中有紅炁月中有白炁三台中有五色雜炁各一道流入盃中受之再拜而飲閉炁放訣下壇密誦靈書二徧騰空如到天上飛入北斗之中三台之星盖頂而行乃自魁星𡵯而之魒星囘身入斗六𡵯而出作三台之形乃出斗口左環七七四十九𡵯犯火星又東行自中過凡九九八十一𡵯至太陽朝祖帝上帝復乃右行自北入西凡八八六十四𡵯至太隂朝祖師仙皇君右旋而出出即左行右行復左凡七返如環此即无色界也定眼見无色界中諸仙來迎於是周歷十方謁三十二天帝二十八宿見一宿即丁罡十二以囘共三百三十六𡵯至于斗宿即借箕星乏罡以行直還望北斗天魒之次及交峰之山右旋南向四十九𡵯而過重入火星官經於太隂六六三十六𡵯之後而謁水星由水星東行至於大陽之側六十四𡵯而成木星再囘而行犯水星借罡復出太陽之傍八十一𡵯而成金星細行達於斗口三十五𡵯而入土辰由土返行再入金星水木之宿而後直望北方金闕巍峩即六羅三清之所在也乃八𡵯而進長跪再拜密祝之祝曰地行賤臣某𦍒因宿慶得遇聖師傳度祕訣使朝天闕凝神入靖九炁澄清身外之身得飛天閫臣無任瞻天望聖激切屏營之至稽首頓首再拜又祝曰臣𦍒膺玄貺遂遇聖師午夜飛神一心謁帝伏念臣凡骨性頑理難超舉精心孝弟以冀蒙恩果遂請求獲承宸眷庶令道心堅固神清炁明役使萬神咸遵旨諭伏願天恩允臣奏意咸賜如言右頓首再拜而出乃見本形就本身頂門呪之呪曰蛇蟬蛇蟬脱殻離塵吾今朝真上謁青雲欲使神人閉債封形舉步以去祕訣靈靈忽自頂門而入乃是𡵯罡了也若小可行持則不過三五足矣如欲專意求飛舉之法則莫大於此元綱流演飛歩圖太上登壇訣太一微言妙更真受生於我自通靈一思七座天名字勑使三魂隨駕迎玉皇一訣至天皇北斗三台歩得量直上金壇環絳節聲沉惟𤑔篆雲香身中三五功曹使萬吏同誠擁蓋忙遙逹九關元所障須臾鶴駕至寥陽寥陽門下本師前稽首投章擬奏言直候敕回師降旨須將凡業首前愆晩生狂計要登攀布炁陞雲覔玉關𦍒過罡風無阻兆金門方顯萬般難難中易訣訣難言瞬目之間到御前左右五師千聖會丹芝壇下九光鮮須將功行繼仙班禮聖朝真莫厭難妙理不多多不决他時决得更當閑玄門同學知音者得訣朝時莫等閑既受判成分罪福速飄仙馭下人間右登壇訣隠於天中今雖傳至士學者更祕而行之荐神密奏宿著玄圖惟空寂滅澄湛虚无飛神玄訣正一功曹在坎位丹田𥘵炁應丹元三五將軍乘素馬飛龍騎吏導迎前肝神青炁逝天頂化作龍車上九玄肺神童子持幢節朱衣引導至泥丸泥丸八片開法輪衝透天關形應神神離形時登素馬旋斗歷箕步紫垣紫垣歷關三十二入透罡風度九天各有生門須細認紫丹素碧是天關更度五靈遊太漠直至天門謁帝君正一真人前引導應念順時扣玉扄渺渺自然通大道進奏趨神見太清囘度五常還日月周而復始覩元君元君入舍凝神定巳降天書現玉文奏心章祕訣凡奏心章先須齋心食素先書草章不可以文害辭以辭害意叙事要切而巳既畢如常事用白紙三寸二分長随意細字端謹舍香當日旋書不得隔日一筆書成不得坐卧間斷仍須將法衘減省只作一行不得兩行書寫如不能書寫令人代書禁戒亦同必須食素沐浴焚香書寫不得攺刮挑乙漏落帶草寫減省筆畫與人交語犯者必獲重譴書畢仍以好香燻過即時卷封用龍腦糝於章上而後捲之訖以印印之以開天門符角之如大事𢦙巳拜章未驗即以黄紙朱書謂之朱章尤捷必獲感應矣奏章之日不拘早晚於靖治或道場内或於聖像前再拜上香先搯玉帝訣呼召以所行法及章中所遣神靈具事狀告白伺候齎章上奏黙奏上章之意再三懇禱畢再兩拜跪低聲讀章本一徧就拜處即詣香案前徹燭切近聖像端立注想而巳自巳丹田中一元始天尊漸漸升上至泥丸靣前而坐自巳跪於天尊之前黙奏章中之事詳悉懇切請祈再四或有自然念中天尊降語報應或耳中自聞人聲音若能出神之人以神交報應尤更端的不可有心以符合之也奏畢想天尊復降歸丹田自己亦退就案前將章入鐵架中必以香倚定關告將吏等衞侍章文上逹訖用洗淨麻骨焚之不得挑破章文候燒過再詣元立處存神息念若聴報應良久再謝而退如朱章即添遣黄甲玉女等自如本式也章灰送長流水中靈寳无量度人上經大法卷之四十二
