front:
  text: 靈寳无量度人上經大法卷之七十二出八
  hash: sha256:cc64052b40a2dd2f6c109539df2164b9156c3f553948fe8cc8d5d9972e81812a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_072-031057b, image: sjb/03/031057b.png}
body:
  text: 修齋受詞品傳度詞式維太歳年月朔日具郷貫某人謹齋沐誠惶誠恐稽首再拜投詞某伏聞洞玄設敎開度生濟死之法門靈寳垂文有脫殻昇仙之妙理非夙生之慶幸豈造次而得聞欲厠眞階須慿師匠某欲薦先亡之苦爽次拔泉滯之𡨚辜使一命以無虞保全身而脫厄某雖曽立誓未遇眞師兹者伏遇某君法師先生不掩玄關大開慈造下度愚昧輙具懇詞謹齎金寳以質心特造靈壇而控告拜傳靈寳大法錬度祕鍳誓終始以行持靡敢忘於教誨如苟違盟約甘墮沉淪伏望慈悲特垂允度庶累成於功行同共列於眞階謹具懇詞拜投壇下伏取法旨某誠惶誠恐稽首再拜謹詞傳度啓奏科臣聞元始祖劫化生諸天隱碧落之空歌敷紫虚而鬱秀開明三景用普植於神靈敷落五篇使保制於劫運玄坐五色師子之上說法度人端居七寳騫林之中授經付世萬聖臨軒而稽首衆眞侍座以皈依皆諸天隱袐之音非世上常辭之詠靈風槖籥致日月以亭輪金口宏敷俾神風而靜黙一遍而諸天稱善十過而枯骨成人是知妙道難窮玄功無量上天所寳下世不傳遇至士以赤心齎金寳而盟受衆眞監度萬聖臨軒諸天保以善傳魔王舉其道備方遵玄格許以流傳今嗣法弟子某夙縁積慶遭際玄風盟心拜手於清都虔意精誠於大法叩頭搏頰肘歩投壇恭依盟度之科以捨愛縁之念捧金齎寳歃血飲丹誓求大法之扶持願列仙班之職任臣早膺師匠獲佩靈文本接物以度人遇至賢而勿祕旣承懇禱表奏上天巳獲報於吉祥捐良辰而付授給符傳法受戒度兵伏願靈寳衆眞洞玄諸帝慈悲濟物方便度人使弟子某逈出塵寰永離浮幻蕩六根而清靜出八難之輪迴頓悟玄機得行道妙隆三千之功行招集群仙總五帝之魔王萬靈振伏臣與嗣法弟子謹稽首再拜次宣投詞度經謹按經云上學之士修行此經而通微奥即得飛度南宫不經地獄普度无窮一切天人莫不受慶无量之福生死蒙惠上天所寳不傳下世至士齎金寳效心盟天而傳輕泄漏慢殃及九祖長役鬼官侍經五帝玉童玉女各二十四人營衞神文保護受經者身祝畢弟子跪受次度法臣聞道法自然功施不宰本强名於至妙極元化於无形恭惟靈寳大法大有金書實元始之希夷乃至靈之沖寂淵宗莫究妙理難窮祕大羅金闕之天垂浮黎寳珠之旨諸天欽仰萬聖護持夙有善根方能窺奥莫不道用人宣人從道立今弟子某虔心稽首誓受祕筌首露十方盟誠三界願窮至理體道度人恭對聖前受持大法伏望金闕至眞玉京玄老祥開九夜洞照八冥遣玉女以飛函捧金章而廣示命金童以稱善敷玉笈以流傳使弟子某魂神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿德就飛升上清祝畢弟子拜十方然後謝師次師持丹水噀弟子身一噀三清上聖度二噀十方至眞度三噀三界衆眞度次持環劵師呪曰天地合信環劵爲盟行信忠孝心清緬平慈心愛敬言直潔貞始終如一其道合神勿生謟諛以起貪嗔損身敗惡三界不遵今分環劵其義斷金次給付環劵與弟子付帖牒板符印狀等靈寳經法萬天所崇今日受度三界欽從諸天書名位列仙公帝君大聖普告元窮无量度人我道興隆祝畢弟子再拜退傳度謝恩表式渾淪未判空洞凝華藹瑞彩於天中結飛玄於霄極靈風奏響梵炁騰輝爰模勒以成文乃祕藏於積劫自玄元之降授葉葉相承洎正一之流通繩繩不絶俾修盟於寳墠用普濟於人寰制斷惡根消禳劫運接物利生之便不間方來從粗入妙之微莫窮津極臣謬承先慶獲齒人倫載生育於昌期際希夷於盛旦澄心奉戒稽首皈誠願敷寳韞之科與進仙階之品治身理物式遵受度之言拯疾扶危敢忘告盟之訓儻違玄禁甘俟隂條祭將儀伏以百魔隱韻使離合以自然三景開明周大行之梵炁无上大羅之境端居元始之尊出法度人有返形之微妙傳經流世敷起死之眞功侍其經者八方威神衞其法者諸天上聖五帝大魔之所任十方飛天之所承至學旣巳盟傳魔王舉其道備遵上天之禁格露祭醮於靈壇召制十方御地祇於要訣威制天政束魔鬼於眞文誦詠是經則諸天齊到修行微妙則萬聖臨軒輔我法者聞呪訣而入無出有佐我道者承符命則去死來生八威龍文可保制於劫運赤書玉字能禳却於災殃混合百神三界魔王而稽首中理五炁萬靈眞宰以皈從今者謹按科盟備陳蘋藻伏望靈寳將吏總法官君受祭犒之薦嚴享精專之醮禮唯願興揚敎法賛助道功下鎭人身俾魔無所干犯執符把籙遏鬼無所施妖神監在兹當歆祭禮初獻伏以靈寳本章是度人之无量上品妙首爲大法之根宗或傳敎於人間或隱藏於天上宗奉敬禮者獲福輕洩漏慢者招殃今某夙世良因恭叅大法旣蒙師而受度當祭將以陳儀仰惟官吏之聰明俯鍳菲儀而肹蠁所兾威容咫尺輔正敎於玄壇靈造雍容賛元勲於小兆某初階下士遭際眞師雖慿大法以降魔全仗威神之賛助斷滅禍源則千千截首収伏妖怪則萬萬翦形仗金鉞前戮之獰屠割鬼爽張巨天後刑之猛風火無停或度幽隂解夙生之惡對或救痼疾令一時以復形德著同享其榮功成共分其利無令懈弛有廢前功恭聽吾言母生忽略亞獻伏以威分部伍共嚴整於軍營森列旌旗當修治於器械施彰號令明檢於鬼營賞罰至公利言於五帝鬼妖滅爽瘟邪不敢流行神明護門怪異皆祛别域兆行其法則平等而正直汝輔其道則謹節而勇忠共成莫大之功以佐無爲之化今者旣陳懇禱酒醴再三不違方寸之誠盡頼神明之鍳所獻錢馬當爲俵陳祭禮旣終乞還元治終獻宣帖䟽再拜退祭將符書符呪曰唵夜闍屠渠訶勒曇俱婆夷知帝薩吒搯中指中書十道分布十方並係黄書紅紙逐符以金錢一分而化之化符呪曰千和萬合混合百神神公受命總監衆靈群妖束首振伏萬靈保眞固命以度兆民生死受頼其福難勝功過無失保舉爾身急急如靈寳律令本法印篆品皇人曰夫行靈寳之法須得上天玉璽印章方能洞達杳冥若以凡世之文不遇眞師所傳則枉用心神終無所得且靈寳印章昔元始天王妙炁結成眞篆皆以碧玉爲之名曰金章玉璽降於眞靈之天付於道君後付於虚皇天尊虚皇天尊付於金闕帝君金闕帝君授之天皇大帝天皇大帝始授於軒轅軒轅後遇玄中大法師靜老天尊出世各辨其文各有品目軒轅請問殷勤故玄師敎之有法用之有式故靈寳大法玄師主之也自後代代設化方方傳經而不遇其人印章多隱於名山而不出厥後神仙出世遭值斯文而天尊慈悲付以印童方傳後世至學之者如遇之則當保惜不可輕傳下世以泄其章三界髙眞見之多痛哀不忍其泄泄之則返招重殃深可憐也今具于篇覩之敬信而祕藏之斯可矣上清靈寳大法司玉璽右印可移符文帖牒榜示三界鬼神見之爲信符如傳度表奏之後祭呪方可用鍊度司印右印廼上帝降付南昌受錬司眞君主錬死魂可錬度亡魂專印水火符篆錬度司分關申帖牒之屬黃籙院印右印廼上帝降付黃籙院使相主下元度上世亡魂如建大齋寳壇召攝君將吏兵符牒用之天寳君印右印廼元始上帝主敎之印可以鎭天地運隂陽斡旋造化召役萬靈如行持大法當以此印鎭於治所萬聖欽崇如朝元始之帝印光萬丈光爍群魔亦可印符籙此印於秦始皇時失之後至漢代天師以凡篆易用道君玉印右印廼道君主敎之印掌諸天星宿三界鬼神劫運之數如行持當佩此印變爲靈寳天尊亦可印符籙青玄救苦印右印廼上帝降付東極救苦天尊度三界十方一切苦魂如遇之有百寳光明應獄司覩此印光皆踈放幽爽逕生極樂可印符籙泰玄都省印右印廼玉帝降付天師掌泰玄都省申奏等事如召功曹符吏集諸兵馬醮奏星辰當關牒而用之此印漢代天師以凡篆而易之其祖傳祕印隨正一升天正掌泰玄都而用焉八威龍文印赤書玉字印右印廼元始上帝專掌諸天玉字眞文篆應醮奏壇墠敷露眞文赤書當印用之與道合眞印右印廼上帝降付得道之士佩負登天於三天金闕門下勘同印信也如度魂爽於地府功徳案文牒内列各書合同符契以印印之應隂府冥靈覩之如上帝親詔靡敢稽停也五帝大魔印右印廼上帝所賜行持之士佩受可制萬魔鎮凶治惡志心佩受則五帝侍衞群妖束形混合百神印右印廼上帝所賜行持之士佩受可役使萬靈凡印所在之處萬神朝禮三界侍衞應干召法中將吏符篆皆以此印印之立獲感應已上印章皆以七寳金玉爲之或以赤棗心或桃栢木命工於陽火日刋成隂水日露天一宿而收之靈寳无量度人上經大法卷之七十二
