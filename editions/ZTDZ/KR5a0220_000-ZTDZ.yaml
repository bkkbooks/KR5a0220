front:
  text: 靈寳无量度人上經大法序霜一
  hash: sha256:852854060efae1e101eaccbd9f8ef0e004bba1353473ac9c45d7d8b05c101061
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_000-030613b, image: sjb/03/030613b.png}
body:
  text: 天眞皇人撰集元始祖劫爲天地之根宗靈寳開圖總隂陽之樞紐推日月變通之理綂星罡躔運之機妙集旋綱提擕子午達五行之造化追二炁之魒魁進退乾坤飛旋離坎擒龍伏虎控鳳乘鸞朝餐紫府之英暮食青華之液錬形流火濯質東池六龍飛蹈於層霄九炁攅烹於玉鼎道之生我物无定形棄物留形則炁神交而眞自徹釋情養浩則精血通而炁目凝眞火髙奔飛扶丘之皎日水金拘制旺玉關之蟾蜍八鸞同鳴讃空歌之雅韻九鳳齊唱揚十絶之玄音俯仰靈阿十方之天眞自集朝叅太上萬靈之羽衛飛軿黍米髙懸變通莫測含包虚昧則无鞅數衆咸歸濁競奔趨則萬炁千眞盡散集炁爲寳聚神爲靈乾健純陽坤厚純隂自然之炁无形无名上極九清以炁假名爲號下徹九地以形則號爲名是知杳杳冥冥恍恍惚惚寂然不動感而遂通二炁廻旋天地應時而動三田通妙隂陽轉運而爲靡在他施何勞自造存神叩齒警初眞八道之門錬炁書符明學士守規之矩欲餌吞於九轉當造化於四時廻運周天交遘水火烹金鑄鼎錬石補玄盜日月之精華結神眞之鉛汞先明子午次辨水金進退抽添知時識候温調養育烹錬無差勿殺害以欲貪勿嫉妬而婬盜逺憎去𡜍異骨成親齊度天人闡教凡世通玄究微悉章洞慧束魔却惱斷六根障塞之源捨妄從眞滅五苦輪廻之路拘魂制魄養炁藏神身有光明形无影響開明三景離合自然髙宴鬱羅萬劫簫臺聳冠飛升金闕玉山絶境逍遥飛駕瓊輪十炁飛天自現控乘緑輦諸天五老傾光疾除罪簿之因落滅惡根之道妙乎兹法故品諸經提悟迷荒救擕未悟吾昔遇清微丈人授以二炁吐納次遇於玄皇玉帝賜以金丹訣言遂明天地權輿之數以了隂陽生殺之機衆卉百華盡守根而固蒂竒禽異獸咸抱一以含元故知顚倒五行畨覆四象盜元一飛玄之氣守眞精妙体之英建寳鼎於崆峒飛金晶於靈洞遘内外之水火合上下之刀圭元炁周流感元黄而玄珠光耀包藏宇宙含金丹而資用无窮是知天地之獨尊變化之无形无質乾坤之妙道生死之无始无終道勿逺求不出戸牖親之者鮮逺之者多棄本忘眞甘樂亡於泉壤入邪捨正徒負夏以經冬靜以生强安而思極七情鼓扇陽絶隂生而性命危六欲觸躭精散形離而神炁泯五藏揺蕩九竅閉關靡知性命之端安得竒耦相配何明造化豈辨玄機吾啓大慈願提仙子將茲神炁集號玄章故名靈寳之筌蹄以應眞經之内法付于妙行出世度人化現十方名號非一編諸經典徧滿恒沙句句爲玄頭頭是道悟茲妙理則入生出死而與道俱存了此眞機則離合自然而去來无礙遇之者夙非凡骨行之者累世眞仙悮謫人天慮差覺路指名圖定證悟法門行者祕藏了眞可度謹序
