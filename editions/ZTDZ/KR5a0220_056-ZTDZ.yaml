front:
  text: 靈寳无量度人上經大法卷之五十六玉四
  hash: sha256:6f2c5444783c62293d36a5217481439b7a2c0d8d5980bc8f54d589912344e2db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_056-030936b, image: sjb/03/030936b.png}
body:
  text: 取救亡魂品皇人曰夫取救亡魂之法全藉預吿遷拔朱章救苦符吏法式預於致齋前一月或半月或七日擇吉地建壇以茭縳茭龍驛吏二人各左手持劒右手持旛旛上書玉皇赦罪天尊背負青玄救苦真籙其金龍驛吏同黄籙院功曹符吏逕詣三官天牢五斗天一北獄及酆都重牢幽檻鐵圍无間地獄等處救拔亡魂前來齋壇其茭龍驛吏同地道功曹符吏俓詣五嶽九幽水府雷霆瘟司神廟社令牢狴等處救拔亡魂前來壇所其符命並隨拔度朱章并赦文一處發之先令幽隂赦罪放遂前來寄城隍司伺候攝召受度若行持之士不先行赦宥秪臨時追度實難彰感蓋救苦符命非黄籙白簡之符也法中自有青玄救苦破酆都之籙審而行之明青玄救苦寶籙品範皇人曰夫青玄救苦籙乃太一天尊真形符也當以青𥿄三幅朱砂書之前題云東極青玄九龍救苦真籙後書天書符文後書天尊真形之符次書拔幽魂破地獄真符并櫢文於後次苐書年月日時用衘位并玄天師銜列之用方函重封印付扵艾龍驛吏更以黄紙三幅朱書前題云南昌紫微流金鍊真籙後書天書符文然後書天尊真形之符次書金液煉形九天雷文韓君真籙超生金籙并檄文於後次苐書年月日時用銜位并玄天師銜列之臨焚符之時當存身爲效苦天尊搯中指上節丁罡面東叩齒九通念呪而焚之呪曰青玄天尊敕符救苦度脱幽冥救愆鬼戸隨願生天並无障阻靈寳律令開關地府不許稽留逆命罪汝唵辰吽卯吒离申呤子哩四中噠戌𠰢文彈訣取東方炁九口破酆都二十四獄元始威章一名太一天尊真形符一名青玄天尊救苦破酆都籙皇人曰此是玉清寳光梵真元始烕章之籙出九光紫陽之冊乃靈寳超度之文隂曹合符之契冥司官吏覩之如上帝合同之敕用黄紙朱書面西北長跪搯上帝訣大明東岀浮羅陽光紫炁鬱青九陽變化黄老真炁龍篆成章三寳内章太一青玄九龍正炁破獄滅考十方天尊混合成形上有分形三十六天下有三十六泉散影變化億千玉主所指鐵城九光圓象摧毀罪業蠲消普照十方魂神受度敕降青玄急急如青玄天尊敕右符如欲破獄預先書下陽日朱隂日墨不以多少臨破獄法師懷於心前候懴祝普掠燈後搯靈寳訣黙誦化形呪一徧同符就普掠獄中焚之再心祝敕吽叱哩見光明三徧瞑目存燈光成百寳祥光上達九霄下達九地存符化无量天尊徧詣獄中一切罪魂俱蒙原赦化形呪曰吾師天中救苦尊常善化形十方界以此威神成大悲濟彼衆生无量苦九夜重昏幽暗府普令朗照生光明牛頭獄卒盡升仙一切罪魂俱解釋三塗五苦諸囚繫考對停閑上紫清見聞有識及有情感此皆成无上道告文太上玉清寳光梵真元始威章拔亡寳籙道君有命敕付崑崙破毀鐵圍羅酆幽隂十方三界泉曲神郷三官九署十二河源上解魂識億劫罪源疾除罪簿落滅惡根不得拘留時刻升遷萬神護送俓詣人天隨品受化更生福鄉一如告命年月日具位姓某奉敕破獄律令十方救苦真符清微天禹餘天太赤天玄元始天尊玄穹上帝靈寳至真明皇道君今日告下南斗上生消除罪錄可韓奉命洞浮聽從尋聲救苦太一天尊元皇誥文東南入神分形雲雨洒布幽牢立破西北上方天尊西南西北東南五方五老東北下方天尊童子真人下拔亡魂十方億劫應化天尊順炁萬萬苦爽法明分身下降便是太上尊諸聖慧光九色三炁照破无間地獄𡨚仇和釋死魂上生風火驛呈萬神禀命一如吿命手執靈杖破毀鐵城寫了念三徧破獄十天玄化真符太一救苦天尋聲救苦天尊隨形赴感尊應念垂慈九幽拔罪天尊隨方濟苦朱陵度命天尊回死注生六轉廣度沉淪天尊轉輪聖王天尊聖力无窮天尊法橋大度天尊弘濟无邊天尊隨願往生天尊大慈大悲救苦真人四大慈大悲大慧真人極神章禀受符命敕剔一茟三官五常九府四司五嶽九幽六洞十宫酆都主者普行煉度一切亡魂岀離地獄上生天堂急急凖靈寳大法律令敕剔二茟奉行逍遥快樂天尊接引徃生極樂太上玉帝托生靈符青玄救苦慧光所至過度拔度重隂廓照寒扄三界昇入无形金龍負驛四天門王風火无停接魂上生告文右太一玉帝托生符超度某久滯幽隂不得托化況魂乗此符力人間天上隨業受生一如告命太一普度超生朱陵真符右給付亡過某上生朱宫一如告命風火驛傳右焚香東拜存太一心拜九過奏所度事先念聖號八十一徧吹筆書了又九徧呪符東炁吹之九幽玉簡日慧月慧星慧之光三光之光之光之炁煉魄度魂幽冥夜壑咸覩光煇鐵城獄卒摧毀停刑陽晶赫赫隂翳煥明隂陽合會三清空洞混元玉敕曲赦苦囚速出重泉急急如靈寳大法超度亡魂律令太上玉簡九幽符命告下酆都九幽五嶽重隂掾吏考官冥司典吏牛頭獄卒牢檻大神拔度亡過某靈魂永辤長夜出離九幽得覩慈光心神明了證品仙階𡨚愆和釋上生大有之天一如吿命九幽白簡靈寳祖炁洞玄梵陽之天九真赤陽之天始青碧落帝合自然六陽元姑真王純化立降敕命九壘遵承靈符九真妙應察命定籍度魂皈命天尊時刻昇避不得稽停靈寳符命九幽白簡告下羅酆北府嶽瀆九幽長夜冥曹土皇九壘十王案掾獄吏考官六洞隂魔九宫主者溟泠大神拔度亡過某靈魂銷平𡨚對洗滌深愆得離三塗永辤五苦身超丹闕得覩陽光悟道聞經逍遥真境乗此白簡拔度功徳上生天堂一如告命天官玉簡黄上朱書玉虚九天九霄祖炁九日導乾萬梵開張明炁四騫緑羅大千洞妙執符把籙自真總監上天普受開度死魂生身太上玉簡告下天官三府曹局主罪仙官天牢地獄考吏執法神紙拔度亡過某岀離天獄赦除大罪得升梵炁之天不墮重隂之地主者敬聴一如告命地官玉簡白上墨書風澤洞虚金剛乗天幽廓大憲溟溟通幽太上敕行斬絶地根神元解滌寃仇洞開陽寥元梵解滯豁懷慶垂七葉塞遏禍根靈寳符命地官玉簡告下中元清靈三府洞陽左宗天宫酆都右隂天宫九幽泉曲嶽獄冥司主生死罪録靈官四十二曹考司典吏案掾尊神拔度亡過某靈魂拔出地戸永離幽囚乗沐陽光俓生妙樂乗此靈寳符命拔度功徳上生福堂一如告命水官玉簡青上朱書陽華真一太和妙惠霐淨玄開玄溟泉閉明燭幽都紫雲覆蔽接舉身超魂飛天内靈寳符命水府玉簡吿下下方暘谷洞淵三府清泠左府南水宫酆都劫量泉曲河伯水獄冥司主生死罪録靈官四十二曹考司典吏案掾尊神拔度亡過某永辤北都寒池泉曲苦海溟波沐覩恩光俓生陽界乗比靈寳符命功徳上生玄天一如吿命皇人曰應普告三界符命並用依按紫英應化寳經元始梵炁體雲篆而成寳符凡吿三界神明莫不覩此而敬聴隨光而至山簡符太上三天天帝三光鍳映玉真威制山靈五帝廻運仙道常興真炁山嶽貫結蔵烟今謹有某州縣里居住弟子某歳本命生命属某帝名係某山謹爲亡過某就某處修建靈寳大齋晝夜行道事竟投簡靈山願神願仙長生度世飛行上清至神至靈乞削罪籍上名九天謹詣名山金龍驛傳年月日具姓名於某處靈山洞府投下投簡關靈寳大法司關直日受事功曹今發簡一面封印全前詣某山或水府或太𡻕土府投下須至尊遣者右關仰依科旨火急齎詣分明投下不得住滯凖律奉行故關年月日時關水簡符太上三元敕制九江四瀆水源河伯育祥天河回運削罪九玄今謹有齋官某年幾嵗命属某帝云投簡水府願神願仙三光同存九江水帝十二河源江河淮濟溟泠大神乞削罪録上名九天謹詣水府金龍驛傳土簡符太上三玄大羅九地土府居中神載呈祥萬仙朝會永作綿昌今謹有齋官某年幾嵗命属某帝云投簡靈壇願神願仙中央九土戊已黄神土府五帝乞削罪名謹詣中宫勒簡太玄金紐白信金龍驛傳山簡玉璧青圓水簡玉璧緑八角土簡玉璧白四方右三簡梓木各長一尺二寸闊三寸六分厚三分白粉塗簡雌黄界邊朱書符墨書誥山簡水簡封皮並用青紙朱書土簡以黄紙朱書金龍一條金紐十二枚玉璧一事散壇逐䖏設醮投之金闕玉皇寳誥符章靈寳大法司今月某日奉玉皇睿敕付下玄文寳誥度脫罪魂超度玉京者右奉金闕仙籙玉皇睿誥伏請靈寳至真十方上聖依靈寳度人之典施回骸起死之功敕下九幽俾苦魂而開泰誥行諸地令滯爽以霑恩主者奉行恭遵誥命年月日玉皇大天尊玄穹髙上帝太上玉文酆都符命靈寳大法司恭奉玄誥拔贖罪魂往生南府者太上玉文酆都符命拔除衆罪贖命幽都萬神敬聽永无執繫垂天尊之慧命出地獄之苦囚托質仙都常居樂境凖此奉行年月日具位告行无上盟真玉匱南昌上宫黄籙玉清清微天上清禹天寳君敕度餘天太清太赤天靈寳君敕度神寳君敕度梵炁彌羅上極无上萬範開張大羅玉清眇眇劫刃若亡若存天中之天玉龍章鳳篆山上京玉匱明真赤書玉字八威龍文南宫度命光明紫户生仙充溢與天齊年赤明開化元始真圖混合自然体雲成篆瓊文鳥迹炁結爲形上度生身劫劫長存下濟幽魂苦爽永契玄恩今有云云謹叩頭哀求詣玄壇請受无上盟真玉匱南昌上宫黄籙一道付某齎執永作津梁持爲身寳奉請南昌上生煉魂君煉魄君煉形君煉胎君煉神君度魂君化生君生根君護命君注生君火煉君水煉君流火真人判生真人注福真人注夀真人煉化真人左救世業真人右哀愍業真人混成真人運炁真人超界真人昇仙真人同垂巨澤受度亡過某上資往生南宫化生人天咸乞真仙一合來降護持上帝黄籙誥文諸天諸地上開八門三十六獄執治隂官左右獄卒河伯掾吏三元九府百二十曹局五局四司洞隂朔單執罰神兵等拔度亡過某等消滅大罪塞遏邪源寃仇和解黒簿除名魂神澄正識性圓明俓詣南宫福智自生驂侍龍轅永契无爲道炁長存一如告命風火驛傳年月日道場告下具位臣姓名告行主籙南昌上宫韓君丈人度籙南昌上宫煉化真人南極長生大帝君太上拔罪解寃真符太上天真玉帝上符天真皇人合明天帝天帝合明度脫幽隂正元化道罪苦皆停日月罡斗照破十方世界八威吐靈泉扄死魂罪業𡨚結皆停符炁三元三台三元三輔三光得度神人赦破地獄上度鬼魂九天上帝七政八靈上清混洞紫府之君降赦元命升度仙魂上天曲赦敕命非輕北都酆獄太一冥關咸停鬼魂承誥得赦上登帝君紫極元君赦罪去業解釋𡨚愆上帝符命與道合并玉清赤書普告幽冥𡨚結鬼爽拔罪釋愆朱陵普煉度化承今符命上度南宫更生澄質神識上昇天堂祝符呪曰天一赤文受度三清上應瓊府下徹幽冥紫元符命拔赦鬼魂億曽无間苦爽遊精削除罪業符到上生急急如救苦天尊敕右符乃九天之真元靈寳度人之炁結而成文爲度魂不墮之書凡篆符須看受度之魂罪業輕重如臨終之際及受患非業罪之疾不須告行如自縊自殘瘵疾瘟疫之疾死鬼方可告行此符專度不正死魂當依法書篆先面北啓奏東極訖變身爲救苦真人頂上清冠雲霞青法服手執簡若天尊之形然後取東炁三口再回身面北取白炁三口吹紙及茟上想左右青衣童子二人手持赤書玉字真文一軸一人持救苦真符在目前即手搯青玄救苦訣卯文依法書篆鬼魂覩此真文皆得贖罪解寃地獄聞之自然停苦誥文靈寳黄籙拔罪齋壇本壇今月某日具奏天省及拜貢章表上詣三天金闕奉爲某乞拔度某請降元始符命太上拔罪解寃真符超度亡過某及五道四生等衆出離冥塗上登朱府須至告下者符右奉玉皇上帝救苦天尊敕赦開地獄贖某不正患疾罪魂告下天牢地獄无極神郷上元星界波羅之獄下破酆都泉曲水府五嶽社令十方世界冥司隂獄幽扄一切寃愆積罪苦爽等衆削除罪簿落滅惡根隂治幽關不得拘留逼合鬼群速赴生方煉質澄神蕩除隂翳入道升真一如告命年月日時告下弟子内封太上拔罪解寃真符具位臣姓某謹封方函太上拔罪解𡨚真符告下天牢地獄三界无極神郷具位臣姓謹重封靈寳无量度人上經大法卷之五十六
