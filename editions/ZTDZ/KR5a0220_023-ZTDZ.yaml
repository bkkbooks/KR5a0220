front:
  text: 靈寳无量度人上經大法卷之二十三生三
  hash: sha256:c0be1c1447f3284af638eb5dde01eced808a24b35268554434f288cfb227f28f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_023-030745a, image: sjb/03/030745a.png}
body:
  text: 餐吸元和品昔玄師青童帝君受之於太微天帝君一名赤丹金精石景水母之經常當於日初出之時對日東向叩齒九通心中隂呼日魂之名五帝之字曰曰魂珠景照韜緑映廻霞赤童玄炎飈像凡心祝呼此十六字畢仍瞑目握固存見日中五色流霞皆來接一身下至兩足又存五炁上至頂於日光五色流霞俱來入口中又見日光之霞復有紫炁大如目瞳者累重數十煥赫在五光之中名曰飛根水母俱與五炁來入口中向日吞霞作四十五嚥炁嚥炁畢又嚥液九過叩齒九通微呪曰赤爐丹炁玄天育精剛以受柔炎水隂英日辰元景號曰大明九陽齊化二煙俱生凝魂和魄五炁之精中生五帝乘光御形採飛以虛掇根得盈首巾龍華披朱帶青轡烏流玄霞映上清賜書玉簡金闕玉名服食朝華與眞合靈飛仙太微上升紫庭祝畢向日再拜此之上道眞仙之儔萬人以上无有一人得知日魂之名者此道玄就非血食臭骸可得聞也天隂无日可於室中所卧潔淨處存而爲之清淨道士精通上感者皆可不待見日而修之也若道士休粮長齋五嶽絶塵人間逺思清眞得日日服日根之霞吞太陽之精則立覺体生玉澤面有流光如其外累人事未獲靜形浮遊世路心拘榮網者要以月朔日三日五日九日十三日十五日十七日十九日二十五日按而爲之一月之中十過也此日是日魂下接飛根之時行之十八年上清當録以金眞瑩以玉光位爲眞人飛行太空乘華三素以映天下太微服日炁開明靈符朱書青上呪曰太微丹書名曰開明致日上魂來化某形平旦嚴裝發自圓庭飛華水母日根金精紫映流光號爲五靈右光告日魂書符臨服時閉炁左手執符心黙念呪畢吞符採服隂華月精之法一曰黄炁陽精藏天隱月之精也當思見月初出時乃對月西向叩齒十通心中黙呼月魄之名五夫人之字曰月魄瞹蕭芬𧰟翳寥宛虚靈闌鬱華結翹淳金精瑩炅容臺標凡三心呼二十四字畢乃瞑目握固存見月中五色流精皆來接一身下至兩足又存五炁上至於頂於是月光流精五色俱來入口中又見月光之精復有黄炁大如目瞳者累累數十相隨在月精光五色之中名曰飛黄月華之精並與五炁來入口中向月吞精作五十嚥畢嚥液十過又叩齒十通微呪曰黄精玄暉元隂上炁散蔚雲飈條靈歛胃虚波闃頴挺灌停器月精夜景玄宫上賁五君夫人各保母位赤子飛入嬰兒續至回隂三合光玄萬方和魂制魄五胎流通乘霞飛精逸虚於東首結靈雲景華招風左帶龍符右腰虎章鳳羽朱帔玉珮金璫騫𣗳結柯號曰木王神蟇控根有𧇊有充明精内映玄水吐梁賜書玉札刻名雲房服食月華與眞合同飛仙紫微上朝太皇祝畢向月再拜存日月坐立任所便仙官之中无有一人得知月魄之名者其眞人當時有知之者天隂无月可於室中爲之施行要訣如服月光法夕夕爲之則立覺体生光照目有飛精也要法月二日四日六日八日十日十四日十六日十八日二十日二十二日二十四日一月之中十一過亦當成仙也此日是隂精飛合三炁盈溢月水結華黄神下接之時行之十八年上清當煉魂易魄映以玉光乘玄轡景飛行太空太微服月精太玄隂生符黄書青上右符月晦夜半東向服之先以告月魄也是時當先服開明符臨時服月符閉炁左手執符心祝曰紫微黄書名曰太玄致月華水養魄和魂方中嚴事發自玄開藏天隱月五靈夫人飛光九道映朗泥丸祝畢乃服符玄師青童眞君稽首膝行於金闕帝君之前固請上道不巳爾時聖君推几偃據忽然長嘆曰苦辭玄速精誠來悟子其用心至矣於是指點域墟有愍焉之意爰乃引雲鈞之琴撫而彈之清響虚粲激落百音瓊振九虚徹朗太霄而歌大洞神洲之章凝魂之曲玄頌靈藻天韻希夷飲照沖炁疑音清微其辭曰玄虚上清炁三素凌華芒淵響啓靈扉七門飛羽章豁落丹霄觀清寥冥運彰有覺悟玄會眇西飛太陽空臺大絧野幽逸英芝光遺盡翳雲輪絶宅自冥通髙會玄辰闕稽首朝玉皇神映來靈旨虚鼓響瓊鍾九轡縱雲軿逍遙紫霞峰丹陵啓碧室緑庭披五房金闕煥嵯我藹林上清宫味此日月華取彼無形方玄至三靈覺蕭條劫刀中何爲當途坐五難乘子胸何不御赤嬰乘我泥丸公不死亦不生不始亦不終於是聖君吟歌畢引青童君賜坐設流霞之漿鐶剛之果未𣗳白子絳木青實乃命五老上眞仙都左公開紫蘂玉芨雲錦之囊出此靈書紫文上經以付青童君徒下授有玄宫玉名常爲眞人者挹服三光品日君呪於日𥘉出時雨手結玉帝訣合掌對太陽念呪曰鬰儀之神離宫眞精灌服九芒乾元利貞呪畢以口鼻吸炁嚥之九次以意送下丹田二九三九以至九九再念呪曰唵鬱𠰢𠻗煜頁元暉嚩𠯐囉軍拏唎婆薩訶呪畢取炁再如前嚥之正午或午前行持午後不行玉清天日魂紫霞眞符靣東北念三光一字呪一遍吸炁三口灌筆端畢次依散形念呪書之三符一如此法呪日鬱離貞天地人敕長生霐持旡鏡攬姿運容祖道玄真烜赫正神帝理上眞熒惑操形冠帶帝重九芒光明月君呪於月𥘉出時兩手結玉帝訣合掌對太隂今呪曰結璘夫人坎位眞精圓耀八芒吉利元亨呪畢取炁再如前嚥之八次以意送下丹田約八八六十囚遍再念呪曰唵結歆𠷈亨照爁縛月囉㗶羅婆婆薩訶玉清天月魄九靈感眞玉符面東北念呪三徧吸炁三口灌筆端次依敢形念呪書之呪日結璘坎精炁神敕延生赤明和陽理禁威靈巴載孔昇戌已芒英薩羅婁王拘嵬制𩲸天罡呪於星出時兩手結玉帝訣人掌對天罡方念呪曰唵敕之神斗極眞精流輝七芒吽咤敕凝呪畢以口鼻吸炁嚥之七次以意送下丹田約七七徧再念呪曰唵唵吽吽迷離呶那婆羅修利唵吒唎𠰢呪畢取炁再如前嚥之正戌亥時行特徐時不行玉清天天罡正炁玄精祕符靣其方念呪三徧吸炁三口灌筆端次依散形念呪書之唵吽吒日月星敕合眞虚无正魒紫極帝運曜明宗飄囘旋上玄生三七帝招眞童總監上天威制天政那六月醜瑛曲育九昌明梵穹隆浮羅合神天中之尊右敕无極玄眞右上法謂之三光煉形隂日及風雲之時不行應服三光炁行畢叩齒九通而退毎遇三七日法官兩手斗訣靣天門歩北斗罡回身向南服三光符誦上帝三字諱曰洞濳玄天命長人恒寧次再拜以新水吞下又再拜念緫呪曰祖道玄眞烜赫正神鬱儀煉質熒惑操形赤明和陽理禁威靈耀明宗飄帝重光明戊已之英中央鎭星排蕩邪炁破滅淫精海逢之沸木逢之燼火逢之滅金逢之鎔長離之主統攝飛行迷離奴那唵唵吽吽迷離奴那唵唵吽吽總攝張羅東海青童迷尼奴那唵唵吽吽迷尼奴那唵唵吽吽迷尼奴那唵唵吽吽急急如上帝律令敕玉音攝炁靈書祖道玄眞同前玄師曰自日初出之時靣太陽先存見五臓分明了對日黙念靈章玉音攝炁呪一徧以口對日挹嚥九口又呪一徧瞑目以鼻長引暗數九次嚥之皆存吞日紫光九芒下入丹田作日狀以午時前數多爲功午時後不可用直至初三日夜月初出時依採日炁法十嚥存白光十芒至二十三日後不用採之月炁比日炁等共萬徧亦存月狀在丹田與日合半遇春先取木徳夏火秋金冬水四季土旺各本色都及萬徧逢一月五過依洞章法取斗中紫炁萬過名曰外侍八瓊丹一千徧夜有神光出没二千徧一身有光三千徧滿室有光四千徧舊病新疾患靨患瘧皆去色返嬰童五千徧地司除死名玉清書生録百靈侍衛六千徧舉身有光洞照百歩夜可細書鬼物不隱預知未然七千徧吹嘘百物可起死尸八千徧呵呪五金皆成至寳光生圓象九千徧丹成如日靣生金容骨秀五香三天注仙萬徧道俻位證眞人矣靈寳无量度人上經大法卷之二十三
