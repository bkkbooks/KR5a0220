front:
  text: 靈寳无量度人上經大法卷之四十八水八
  hash: sha256:b37c10689bc8089aabaacad3a876ba2b17490337d3a92bbcc88a9b7ff8f57875
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_048-030881b, image: sjb/03/030881b.png}
body:
  text: 登壇演祝品登壇演法章此一瓣香以杳冥爲根虚空爲體八風吹不動萬夫挽不回今朝出手拈來奉爲法壇施設先爲上祝皇帝伏願後天不老如日之升長爲大道法王永作太平君主此一瓣香奉爲當朝宰輔百執公卿我道吾邦要官賢職伏願一徳格天而固乆六鰲載地以齊堅佩玉横金咸躋要路攀龍附鳳皆上層霄此一瓣香奉爲在會一切賢士信人伏願道性淵澄頓悟一切煩惱罪根山峙永離无量縈纒人人玉骨凝真一一金書姓字先亡宗祖俱證善縁有識含靈咸超法界次陞座白文自然元始靈風鼔空洞之章无量度人流火鍊丹陽之炁開明三景普殖神靈以混化之五文妙神機之九轉或出或入負隂抱陽若存若亡深根固帶處真寂而叩之即應悟玄虚而感之遂通況夫自生者附土塊而沉魂得一者體輕清而浮爽由是說三十六部之祕藴獨靈本真錫千二百之官章拯濟流浪白骨在野遇長生靈符而枯朽發烟紫炁度關演妙法真經而鑊湯停沸方方教化種種生成强名曰大則六合不遼字之曰道則萬夫受分超太元則一法不立被含識則衆妙難言授帝王三籙之簡文標士庶九壇之科式死生蒙福今古共遵柰何隂陽路隔生死理幽徒切斷腸莫知罔極切以太上降返魂之籙玄都出度死之儀齋吿可崇靈音惟信是以洗心奉戒閑邪存誠青𢇁代割髮之紋金寳充質盟之信削詞露懇拜手祈天既沐謙勤難以抑絶況某等遁身林嶺抗志烟霞粗研祕籙於玄壇常愧飛神於寥殿當兹勉勵咸在滌除吾无心則心廓太虚吾定慧則慧光不礙舉揚玄範吟詠空歌琳琅之音而響徹十方梵行之炁而充滿八極金龍飛躍神虎驟奔玉札頒而岳瀆敬聽符命宣而酆幽遵領擲火萬里周旋大冶之鑪流鈴八衝下破寒丘之鍔是以日月之精光一吸照破夜臺天地之正炁聚機度斯靈識上頼天尊之道下賛樵木之臣法衆同心大開靈席開壇啓請詞章黄籙大齋弟子某稽首再拜輒露精誠上干視聽伏念某等生居塵冗長務俗華區區苦海之中汨汨業塵之境𦍒縁宿骨有善志慕清虚雖爲聾瞽之人心崇至道欲漸躋於玄妙推濟度於存亡擬將自新之功洗滌徃日之過况自今日巳前九州分野之内忠臣義士因爲國以亡身孝子順孫縁保家而䘮魄或流離異邑遭凍餒以消魂或暴露佗郷致不足以横夭或强虜凶殘假手還於宿債或遭罹兵運劫災償於前縁抱貞堅之烈婦懷赤心之正人犯觸一時之怒殞於刃劒之鋒或嬰孩炁怯病老尫羸因起居不節縁坐食不便死於道途漂泊郊野或自棄自殘投水赴火舟楫乗風濤之中屋宇遭風雨之害或故悮飲毒而歸溟泠或衝逢猛獸而遭吞啖顛險墮身國法喪命更有風勞氣泠數盡吿終茫茫苦累悲郷路以遥長渺渺幽隂歎何年而生化若不依憑道力此等何遂超升切聞黄籙大齋功徳不可思議洞玄醮法神力廣大善救無邊沉泉之苦能拯億萬期劫之魂金籙赦曩日愆非白簡度逍遥快樂三見此齋不經五苦何況精專修建伏聞某師先生廣揚教法丕闡真風演清靜於無爲拯存亡於下土功成行著衆所推崇徳責道尊人皆敬仰伏望慈悲憫念特垂允俞暫賜仙斿俯臨齋會提綱振領奉行髙功之令儀總宰壇塲廣闡盟真之教範功霑幽顯惠及存亡誠非弟子之功能皆出先生之道化弟子再拜師答某蓬蓽寒生蒭蕘下士雖得法於明師柰自身而未度伏聞内有妙而外妙自應内有真而外真自來縁某末學凡夫尚拘塵世無真妙之元焉能外揚至道本欲棲神岩穴絶智韜光吐納三晨之華灌煉九真之液内養胎仙形神俱妙方可濟物度生闡化流教特蒙誠懇敢不啓聞難當此職請求明師再請某等再陳丹懇之心仰瀆髙明之鍳伏聞正一天師獲丹書於荆山未欲修煉恐無功於下世漸事三境於天闕妙濟真君得玉籙於西楚徑行接物感拔宅而上昇所謂先積外徳次修内功表裹相扶丹誠貫日指洞天以遨遊定惠外修嘯風雲於仙闕自古髙真莫不如是伏望某師先生效前真之靈跡作濟世之津梁倣古仙之遺業修拯度之梯航特垂方便之門永開存亡之路億萬苦爽獲遂生成天上地下皆懹慈報況法壇巳備開啓俄臨𦍒乞慈悲俯賜方便存亡承開泰之恩生死荷提擕之化某等不勝戰灼之至師再答某伏聞盟真巨典玉匱玄章皆玉清天尊所宣實太上道君所授敷演三十六部之尊經具載百萬琅函之聖範保鎮邦家濟度幽顯諸天尊瞻仰仙真禀奉金符玉簡救多方之萬罪三皈九戒度億劫之𡨚讐破獄燭幽神燈分光於惠澤真經聖號金口所宣於苦海三回九煉十誦歌音非世上之常典乃玄都之禁文千真效職萬聖俯降有違纎毫威儀必受酆都刑憲某以凡材淺陋科格罕聞欲勉力而奉行恐沉墜於功徳一身招譴尤甘寧無負於亡者不敢克當請求明師弟子三請某等不避干冒之愆再陳懇悃之詞特蒙指教一一知聞切縁壇場巳備威儀肅清三界神靈佇望久立九幽長夜孤爽瞻仰惟願慈悲俯臨法會開度亡魂若稍有私心不一始勤終怠訕謗評議論量假真違科慢道不敬師尊甘受風刀之苦萬劫長夜無終伏望不違盟誓特賜允陳不勝望恩之至師第三允請蒙示三請區區足認汝等竭誠不欲避辭恐悞圓成勉强枝持一心奉行隨其所願普獲殊恩以此開壇功徳上資七廟尊儀遊神太漠煉真於碧落之天驂從玉皇養素於明霞之境次乃清除九土氛塵屏息四夷烟燧風雨時若有潤秋成疾疫不生蟲蝗殄滅一切亡爽上登道境四生六道皆獲妙樂今則威儀巳備開啓時至更不謙謙各惟珍重弟子謝師某等伏蒙某師先生允請不勝感恩仰謝之至再拜引師登壇登壇開啓生育天地運行日月長養萬物者道之用也垂科設教授戒傳符濟生度死者道之慈也黄籙白簡下拯冥途普濟幽爽者玉清之曲赦也明道之用運道之慈而祈玉清之曲赦者存乎人動天地感鬼神逺近幽深應如谷答者存乎誠苟非其人誠亦難格兹者伏承某人建兹法席夤奉真靈超度亡魂上生仙品我今克遵科教備列威儀有朱章以召魂有蘭湯以盪穢有華燈以回耀有寳旙以遷神有靈符以下於九幽有供養以資於六道先皈命於三寳次說戒乎九真回幽魄於南宫削黑名於北府注大法藥以救沉淪執大法炬以照幽昬布大法雲以覆群品其爲功徳難可勝言如某者誤承人知祗事瑶壇敢不惕惕于心求哀太上所冀髙真降格亡者超昇易容顔於九煉之庭消𡨚對於三官之府悉仗慈悲之願同遊道徳之郷更冀同壇敷揚教典拜章法語此一瓣香上通三境下徹九幽歷浩劫而必通御圓輪而常應以今焚向爐中奉爲亡過某人伏望蠲除瑕累逈脫塵根頓超有漏之郷俓達无爲之岸真源湛寂一法不存妄念分馳萬縁競起悟之則超凌大化昧之則沉溺迷途矧兹浮爽之憂未達返胎之旨故大道憫群生之苦而盟真垂濟度之章一念超升惟潜通於肸蠁叢霄沖漠曾不間於纎毫俯回曲照之恩感荷遷神之惠某式遵素簡叨系玄司既承訴列之詞敢怠謄陳之事今則百靈司在四炁澄清載肅威儀通行章御第惟𥘉淺曷副請祈尚冀同流共彰妙感鍊度說戒陞座請答章道士三禮跪詞云某等伏聞大道闡慈悲之教衆生蒙濟度之恩式按金科肅陳淨醮既真仙之下鍳而符籙之可陳福被三途功超九夜願施開度拔爾沉淪答云玉言金訓示之寳籙靈符九夜三途頼之度魂煉魄當付上士不傳非人顧兹闒茸之庸材詎敢獨當於大請再跪云三界俯臨一心至恪符籙苟陳於座席靈儀實頼以生天仰辱遜謙遽辭請禱覬仰體乎天意俯從乎人心願矜九夜之沉魂實乃道師之慈惠既精誠而必至望幢節之早來答云伏聞代天行化利物濟人必也道價之髙明故慰人情之願望實惟淺陋難以奉行再跪云伏念某拜表上章常屡聞於三界肆筵設席巳敷布於四隅齋心激切以瞻天苦爽悲愁而俟命伏乞髙功大法師言泉潤下大度包荒促羽斾以溥臨演靈文而廣濟三途五苦願施拯拔之仁滯魄幽魂實頼超升之澤某无任懇禱之至答云請約再三信誠備悉既真靈而俯垂下降顧愚昧而敢不上聞義不容辤禮當敷奏符籙裝嚴於寳軸靈魂鍊度於朱陵大衆前行願從其後請真師頌曰龍漢啓盟津劫劫度天人大開靈寳囿津濟生死輪是謂慈悲道能發枯朽榮自非吾世師孰與達幽冥靈寳无量度人上經大法卷之四十八
