front:
  text: 靈寳无量度人上經大法卷之六十九出五
  hash: sha256:0e2185d7c37ebb2cf5ee50def22fe1479f9ebac4f675408e15ef8d5c669b2ab7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_069-031034a, image: sjb/03/031034a.png}
body:
  text: 錬度諸符品披黄受道紫府誥无上盟眞玉匱靈寳披黄授道紫府眞誥伏以神霄雲篆降自中天玉笈靈書頒從絳闕行之則超登眞品佩之則克證仙階而況三世祖書度窮魂於幽夜九天寳誥拔苦爽於圜扉應爲復命之流盡頼生成之賜某受持之後克爲大道之民常居福堂得證无爲之果今對黄壇傳度宜永遵承符到奉行一如玄科律令道隱无名莫測升沉之變氣鍾有象復形生死之機雖順理之无差柰縁業之有證今者亡過某命歸冥路魄散幽塗不無處世之愆諒有積生之過是以羅酆專考校之權九幽執禁罰之柄念兹苦爽何以赦原識性昏迷難超冥昧今日大吉咸禀釋除魂離長夜之庭罪滅惡根之苦披符受道續命超生洞達希夷登超妙道一如告命玄師曰九清之上有无上大羅玉京金闕盟眞之科祕於玉匱中乃靈寳普度幽冥之法門也自赤明開圖之化元始天尊所說救苦拔罪之靈篇與諸萬聖結約證盟誓願於億億劫中救度苦爽故曰盟眞也盟眞之典有三品焉上有上元金籙之科中有中元玉籙之科下有下元黄籙之科總而言之法具於下元也爲之无上盟眞玉匱黄籙普度幽明无量齋也今爲學者備出儀範愼勿妄示非人混淆三元罪招不原若遇其人不行流演閉塞道恩天愆立至兆宜謹之九天寳誥中元金書九天寳誥上帝符命宣告三官天牢地獄主司大神超度亡故某咸領符命部衞形魂祗受寳誥上朝帝庭罪仇和釋與道合并神登玉闕受煉長存一如告命風火驛傳年月日時告下書寳誥時面西北長跪焚香存九天上帝九人如帝服衮冕絳霄飛羽翠裳黙奏訖祝九天生神章九遍取九炁光吹筆書符訖再祝一遍依前吹炁符上並玉清訣於三寳前宣讀訖給付亡人焚於青煙之中誥文四行年月一行右寳誥丹書黄上吿文墨書紙素皆可用綾錦之屬裝背如今世誥勑様度魂夜宣訖給亡靈法酒符玄元老君玄梵天金醴大梵天勑賜法酒玉津寳梵天瓊漿六炁道自然識混元素徳之漿慧之漿靈之漿芝品煉質之漿四炁消三魂飲煉魔之漿妙覺變化隂陽並成无英五臓隂制陽豐中眞敷滎離午完形運轉日月逃形天關皇人曰煉度水火旣畢當賜法酒而煉之凢書法酒符用黄紋染寸面東南誦三天隱諱取其炁書符焚爲灰調酒賜亡魂飲拔南宫昇天寳劵元精灌煉魂神澄正玄津元根萬炁長存不經苦惱身有光明達朗披覬其化正宣天玄紀法主帝變津宜年月日拔度某煉度昇眞上登道境法位臣某奉行右劵青紙封角朱書闊三寸二分長七寸封皮昇天寳劵付亡過某佩服超昇上朝帝庭急急如上帝靈寳大法律令勑具位臣姓名告行謹封背符元始祖炁幽魂苦爽皆即受度上昇朱宫皇人曰此寳劵乃帝君勑拔度上世亡魂不可闕以絳袋盛之付受度亡魂収執生天造神王升仙車輦皇人曰法用綵帛作紫車一乗以神王二人擁輪五馬牽輿中安亡位候度橋時以焚之切不可以亡旛而送盖其攝召白旛於煉度之時焚於水池換紅旛而度火池度了再焚紅旛而換黄旛隨車以童子導引而度天門焚車呪曰搯上帝訣天尊威神力拔救衆生魂祥煙塞死戸慶雲開生門還將上天炁以制九天魂混然歸元一皆成自然人得馭紫雲車上朝泥丸君三界无遏難永脫輪回津燒紙呪曰火鈴炎熾變化八方萬神侍衞永除不祥急急如火鈴丹天律令勑呪畢存天尊垂一寳珠珠中光芒萬丈接引上生天界玄師曰巳上符簡誥劵第一次名爲濟度第二次告下名曰超度第三次告下名曰昇度若是普度並曰拔度也流通五炁落滅惡根呪曰紅杏佐左癰攣者伸震文震炁服符墨黒尚上耳目聰明坎文坎炁服符磨眞佑右緩廢者平兊文兊炁服符襪臈下下跛痾起行离文离炁服符靈寳冲中身疆體輕中指中炁服符青帝護魂肝木長榮卯文卯炁服符赤帝養炁心火光亨午文午炁服符白帝侍魄肺金生成酉文酉炁服符黒帝通血腎水清停子文子炁服符黄帝中主脾土安寧中指中炁服符梵炁彌羅自然成眞中指甲午炁服符廻尸起死白骨成人子至亥天門炁服符濟度垂死絶而得生坎至离火炁服符九和十合變化上清急急如律令泰岱木司九炁元君衡霍火宫三炁元君太華金主恒山水帝七炁元君五炁元君嵩山上帝一炁元君巳上五帝玉諱之符青帝護魂符五行之主朹九炁司方青陽造化赫赫陽晶飛雲結篆風馬髙馴靈煙蕩瑞育化陽春木官大惠鎭護肝魂青帝符歌曰東望重拜手蒼帝玉皇君靈風鼓橐籥育物布元春雲龍轡嚴駕玉衞擁瓊輪枯萌泛霑及大惠無不均萬仙歌以道委曲戒天人心根迷自固拱跽戴洪仁右符護得道者三魂使其通靈澄徹青書白素佩之以立春之日受吞服書以竹膜上三枚黒帝通血符玄象變通結氣眞元洪濛汗漫通徹黒奕控馭三宫玉帝飛龍沖妙元質至道難終黒帝符歌曰無質統有物淵兮上帝心不啓不發道藴妙化機深恐爾漏未盡隂想忽浸淫輪轉無涯波苦道相迷尋萬年嘗謹約一旦自湮沉無沖落鬼境殃譴不可任右符護育得道之人使血脉通利榮盛一身無有窒礙黒帝太无水帝也水在人身血墨書青素佩之以立冬之日受若吞服書以竹膜上一枚黄帝中主符混沉冥始萬梵三天開張大有總制圓象帝作土中黄宫無窮三陽發生逸豫萬春黄帝符歌曰黄天拱中宸控駕玉化根翹機貫億曆洞朗闢四門大有混皇眞糺制星宿魂非帝道不運有方頼之存威忿即霜秋和預爲陽春生成握元紀仰荷戴無垠右符營衞中府拘制萬神不令錯越若近取一身則肝蔵魂肺蔵魄絳宫丹田二炁交媾則赤炁下降玄泉上升心蔵血腎蔵精二炁返復交相生養黄庭之中神意所在也黄帝中主萬神無越黄書絳素佩之以土王之日受若吞服書以竹膜上五枚白帝侍魄符三炁吐清洞達之神入玄我身隂魂返陽晁晷七尸澡煉蜉蝣萬神侍迎金光散輝全我清靈白帝符歌曰六甲抱金闕七政守靈壇流鈴擲火化威劒巨龍蟠懇彼素靈眞明憲孰敢干束制妖鬼魔凛落霄風寒流氣旣巳息萬天俄而安眞儔荷大庇抵顙相歌懽右符侍得道者七魄使無散亂閉絶鬼道白書紫素佩之以立秋之日受若吞服書以竹膜上四枚赤帝養炁符五炁運度泉脉日運玄珠貫穿光透華峯三宫升降往來無窮赫赫陽精紫房萬物發生混合九魂煉純披朱蕭仭流通血氣始丹劫臺返胎火庭赤帝符歌曰太景開玉樞洞堂啓金除騫林廕瑶砌丹鸞踏瓊珠寳房名曲麗明璫神所居飛遊豁飛道引目盻眞都天日永不夕重煙鎻青廬太上勑印開帕几羅簡書裨風樹玄化慇辛諒有餘右符赤帝主火能生養元氣黄帝曰壯火食炁少火生炁炁得温而後養也丹書黄素佩之以立夏之日受若吞服書以竹膜上二枚青天魔王巴元醜伯赤天魔王負天檐石白天魔王返山六目黒天魔王監醜朗馥黄天魔王横天檐力五帝大魔萬神之宗右五帝眞符煉度亡故某靈魂依式告行超升善域永不輪轉梵炁彌羅符太上梵炁彌羅玉京赤書玉字搯玉皇訣誦玉帝睿號逐字一遍取三炁吹成廻尸起死符搯中指中取一炁閉炁一筆而成存金光萬丈於符中濟度垂死符搯离文呪曰濟度垂死絶而得生千和萬合變化上清急急如律令五篇玉章皇人曰五篇者乃元始天尊自然飛英至精虚無混沌之炁凝結而成玉章鎭於大羅之上昔上皇時星辰交錯惡曜加臨上犯三天曽命眞梵眞人齎持五篇付於五帝鎭於天元以制其天政又命眞如眞人齎持五篇付於五嶽以鎭於地紀以御其地祇又命妙行眞人齎持五篇付於名山主者以候成道之士敷敭敎法下度生死盖五篇之炁其功甚博上可以消於天災中可以保鎭國祚下可以度於人民如召三界五帝建諸壇陛當以土旺之日青素朱書五篇敷落五方則萬靈振伏招集群仙召之即至靡有不從如書時當於淨室面東方再拜長跪存身爲元始天尊萬神侍衞身有光明乃取五方五色之炁手握玉清訣鼻引九天炁入口九咽存運丹田之炁上衝泥丸周流一身遍於百竅放大光明照見諸天諸地日月星宿然後黙誦宻呪十二遍取炁吹筆起身再拜執筆叩齒三十二通隨散形呪而書之書符畢上以星斗盖形存諸天星宿日月光明與元始五篇之炁相接交映内外蔵之如用當朝天門再拜焚香具白事因奏於元始前再拜長跪而取之可以禳度厄運及五煉生尸之法焚而用之如生人受煉則佩負在身度世永無疾厄身過之後地司奉迎不經地獄即得返形遊行太空如幽魂受煉得遇玉文身生寳光永斷執迷度脫輪廻之道夫行靈寳大法之士居山受錬之眞豈可不遇斯篇佩荷在身或鎭於幽室之間則萬魔不敢近邪妖不敢犯界自有萬天敬重神明護門光明内外萬災不干可謂保制劫運使天長存者矣書五篇宻呪曰混合帝尊八徊九生玉晨金華眞文敷陳飛飈玉輪太素理眞靈寳天根六合洞靈玉篇自然結成眞文我今書篆元始炁分萬神合炁俱會帝庭第一篇玉符觀覽鬱繿寅大明紫虚寅九神度魂卯開闢玉眞辰阿奕煒燁巳飛天流音寅輪景卯帝常卯都靈四指中頥臻豁落三指上大有三指中慶雲啓靈寅至中指中三眞總御卯中指中四指中三炁分形中指上中下三節我位上王世久長榮寅七曜輝魔坎恬懀敷榮离五行運度兊九炁廻旋卯七元中指中十二酉南仗紀政眞身監映慶臻衞靈亥上彈第二篇玉符虚旡上首巳天紀彌宸午四吁育象未濯矅騰精坎煥赫洞陽离浮景玉光坤七靈謡歌寅世元紫堂四指上羅英四指中散景中指上曜明中指中玉房中指中金酉玄丑合受巳眞精玄玄四象卯八卦輪八方七炁飛陽斗七元飛隂斗三元一正巳午大申五行璇璣中指中飛度五戸亥戍四景回施午三眞未六炁已彈萬梵開張第三篇玉符八晨總獸韶主攝精九騫都鬱飛生上靈宻羅淨境馥空灌郁輪沃黄華霐運神開玄明君廓延宛丹庭四六十有方律三門収威四炁遏守四門右符並中指中訣第四篇玉符大猷浮景子眞定丑化元寅蜒宛卯素渺申玉梁澄煙亥蕭峙戍結禹丑景羅四指上七麗四指中秀盤三府四指下流輝九元酉寂然三指上虚邈中指中飛華坎拂軿酉晨濫録籍申大漠午由延未隂十陽九子午天變飛阿午阿丘九度五炁回飄未七玄度命酉六府充盈戍星宿停關流光百骸中指中第五篇玉符天坤舞乾蓊酉浮巳龍轅靄羅紫精巳馥淵亥溟涬大育寅九機化乾申覆形厚德四指上元阿淪精四指下育瑛四指中明陁三指下景晨渺雲三指上大隗總監三指中秀樂禁天坎紫虚陁丘离劫量交前西口碧霞韻梵卯渺渺遊元大指中六變運量大指下馘絶惡愆中指中𢗡冠玄漠萬變成仙午彈第二篇玉符告文太清九眞安化上愛玉符符東方明炁發育木精飛英仁惠之炁滋行萬生天界地綱與時皆正凝耀神郷結爲青書光映萬里右奉元始安鎭眞文告下東方青帝煉質亡魂飛昇極頂一如告命年月日具法位臣姓某告行第二篇玉符告文交神生明玉化之符符太丹之炁衍光洞煥飄擲化火融煉九隂赤字凝章其文甚異敷映九億精明炳天右奉元始安鎭眞文告下南方赤帝煉質亡魂飛昇極頂一如告命年月日具法位臣姓某吿行第三篇玉符吿文眞皇混丹肅玄之符符黃眞之炁結精飛英中央虚落之炁混沌黃元之精交流曆律化交生文萬里精芒熀煜天端之間右奉元始安鎭眞文告下中央黄帝煉質亡魂飛昇極頂一如告命年月日具法位臣姓某告行第四篇玉符吿文八威禁龍制虎飛英太白玉化之符符素威禁炁流化粹端飄權耀神凝結成書光柍萬里其文甚異列明凌芒威摧萬妖右奉元始安鎭眞文吿下西方白帝煉質亡魂飛昇極頂一如吿命年月日具法位臣姓某吿行第五篇玉符吿文明綱玄兆太明九化之符符玄精發耀萬物滋形生端不竭天暦有紀玉皇上相髙觀靈化接摘玄序開明天敎冊封萬帝玄眞感和天文敷炳典約清律天化大成凝結玉章光映九億右奉元始安鎭眞文吿下北方黒帝煉質亡魂飛昇極頂一如告命年月日具法位臣姓某吿行靈寳始青變化之圖天眞皇人以紫筆記靈寳之炁交始青之炁變化之象也主世間及天地鬼神之生道能資蓄生炁以抱魂結練以得眞也兆能有之以青書竹帛之上面西北服之保生益年神炁不散固全生道也佩之則神炁歸身返老回嬰應運滅度身經太隂帶服始青變化之圖始青帝君與兆同昇逍遥太空也凡煉度亡魂在兆智慧而用之碧落空歌之圖天眞皇人曰碧落之炁在人物爲縷脉絡連貫穿注其炁生於碧落始青之天在人生三百六十脉三百六十經三百六十絡又生眇絡支絡絲絡絡大梵之炁以爲其元中結此文以成圖佩用者神仙以碧書尺素召十方天眞空歌一奏萬聖齊臨服用施化亦同上法大浮黎土之圖天眞皇人紫筆定書以青爲地黃爲文赤爲界封此土爲浮黎土者區貫蹠穴之所在也中黃太上明梵之炁回旋流演以正域内宫闕樓觀之所存有能佩之百神朝身三界司迎魔王禀命五帝侍軒中黃太一帝君與兆洞章同升紫房此圖主人陴胃營養太和服用同前法靈寳无量度人上經大法卷之六十九
