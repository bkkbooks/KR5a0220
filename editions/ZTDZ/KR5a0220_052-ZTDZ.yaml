front:
  text: 靈寳无量度人上經大法卷之五十二
  hash: sha256:71fe7fbdfb53fa62e0aadf11a72302d8d856bf8e280dc55046d544414df231f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_052-030907a, image: sjb/03/030907a.png}
body:
  text: 超度靈幡品皇人曰夫超度之格皆頼真師三田之炁以合天地三元之光呪訣符圖龍章鳳篆應魔王保舉昇度南天如若行持一念參差則再滯亡人於重暗之域不能覺悟得覩光明深可憫之故立超度之章令學仙之士遵而行之則濟死度生之事畢矣立遷神廻黄二幡此幡須按亡人年幾長短尺寸造之一黄一紅以按日月光明之象上書三天隠諱中書九天生神天篆呪章標於壇外以開長夜之光遷神幡首幡身書慈悲化主九幽拔罪天尊幡手書符命通溟漠靈旛颺曉風遷神超北府飛舄上南宫廻黄幡首幡身書慈悲化主寳憧接引天尊幡手書太微回黄旗无英命靈幡攝召長夜府開度受生䰟開道幡首書上帝諱幡身書六甲使者持幡開道幡手書空洞通幽呪靈音振空洞九玄離幽裔感賞无凝滯去留如解帶斛前救苦幡用黄縜幡四首各長三尺上書金書度魂呪妙哉怡五靈金書警萬神察命定録籍靈符度苦魂度橋陽暉幡用黄絹作幡一首長二丈四尺幡首書北斗七星幡身書太一天尊叡號左手畫日右手畫月書陽暉度魂呪兩脚書九天返根呪北斗日月像如常式陽暉呪明哉太陽輝神光洞三清炁散玄漢内水十一十九靈烟生紫庭飄飄淩无形返根呪明梵飛玄景開度長夜魂遊爽赴期歸炁炁返故根幡身書金闕梵行真人玉字東極宫中大慈仁者尋聲赴感太一救苦天尊道場内諸幡聖號引魂明光之幡接𩲸洞照之幡霞光朗耀之幡威靈拔度之幡垂光慈蔭之幡玉皇赦罪之幡梵炁彌綸之幡明霞通智之幡法燈朗照之幡慧光流光之幡玄明真定之幡靈耀八景之幡金英護魂之幡洞鍳幽明之幡流鍳照幽之幡五劫開化之幡通光普照之幡混化變生之幡靈光皓映之幡垂光流照之幡神光廣被之幡度明玉簡之幡滅光速感之幡龍威梵度之幡巳上二十四幡乃元始天尊在始青會演說度人上品十方至真各執寳幡旋繞寳壇以讃天尊度上世之魂凡遇立大齋不可缺也三光煉度天尊大光廣照天尊重光返照天尊寳光虚靖天尊流光梵現天尊三光耀明天尊光道致人天尊金光玉華天尊慈光普施天尊靈寳懸幡科啓聖伏以玉藏真文立種拔亡之式瓊科妙旨乃文濟度之因爰建神幡是爲冥寳標太微廻黄之字有無英命靈之功高懸碧落之中影落虚無之内危竿一竪超長夜之幽魂妙範繼宣救無鞅之苦爽諸天齊到萬聖臨軒光映十方功皈三寳次念靈幡赦罪天尊祥雲結就命靈幡影落浮空散世間縹緲凌風纔一舉舍靈俱得脫幽關今則謹遵大法特建寳齋幡開昏迷接群生之俓路符通溟漠按太極之真儀降三景之輝敷至真之道既立一竿之上巳經萬目之觀瑞炁遊颺六道四生皆離苦靈風鼓舞十方三界以聞音普及存亡咸乘道廕次念寳幢接引天尊仙真慈惠極含靈髙舉華幡振杳冥咸使遷神歸碧落福資寰海保昇平向來稱揚法事建立寳幡按明真玉匱之文乃度死濟生之式憑兹上善廣利无邊資助神魂超昇仙界伏願群仙接引速超清淨之郷衆善矜憐俓上南官之府福霑幽顯惠及含生一切有情俱登道岸保安遷神幡保安廻黄幡靈寳无量度人上經大法卷之五十二
