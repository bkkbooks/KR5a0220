front:
  text: 靈寳元量度人上經大法卷之六十七出三
  hash: sha256:1d4014969b95af8ab0babbca2fb61b877a0c4ebef9c528348c84fe176888664e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_067-031008a, image: sjb/03/031008a.png}
body:
  text: 神虎追攝品神虎召攝八門之壇召魂開鬼門放入畢復閉之如召到魂開八門赦罪轉輪返生靈符各用位牌面書符背書某道某門字人道開門符釋道休門符仙道生門符地獄道傷門符業道杜門符神道景門符鬼道死門符畜生道驚門符攝召旙符太一返眞召魂符太一總監召靈符上台中魁𩲃𩵄䰢台下台魓𩳐魒玄元元炁所化所運應變無窮魂魄澡煉衆星飛天所拱遵奉驛風火馳三魂符書于旙頂胎光延生爽靈幽精益禄絶死七魄符尸狗伏矢雀隂吞賊非毒除穢𦤀肺七惑開爾善因邪門閉塞上升朱宫咸爲七德巳上符女則轉爲右太一召魂合符幡式太上元君紫炁通津攝精聚魂使者來呈直符一召魄合魂靈合符散形太上合符玉京通幽攝魂使者還聚拘制本形酆都風火無停無爲自化大道功深神虎夫人内諱旙首符天靈地精人英鬼靈胎光幽尸狗伏精爽靈矢雀隂吞賊非毒除穢𦤀肺三炁化生三魂三召返靈速到不受死經陽降隂消東山耳目開聰化度元亨利貞鐵跡臺光寳章日星之光照耀八方鐵迹金晃光寳臺章威光爍爏蕩隂易陽魂魄神炁返嬰貫常八門通幽勿過死傷魂靈召到不得隱蔵右章以黄繒三寸丹砂書用茯苓茯神天門冬人参地黄各一分煎湯置八門召魂壇中舉召魂旙以召魂識召訖以栁枝灑壇十方蒙者生形全魄顯識視影現形或云以青素七寸四分用丹砂書八門壇旙上符鐵跡臺字光寳章字右二旙用雌黄和硃砂書之同亡人旙立於八門壇内如陽人以鐵跡旙招之隂人以光寳旙招之並掐玉皇訣陽耀通關壇監獄使者劉主攝先亡祖考億曽萬祖逺化近亡一切魂識隂靈攝魄壇監獄使者明主攝病死夭横自傷被殘囚禁繫滯久沉冥司一切魂識右法二壇並以新淨土二石布於地上方六尺或三尺六寸細篩令匀淨打令平正左手天皇印二指指大指根大指掐中指中大餘二指開關勢曲向後如斗標前斗中有二尊帝星以印呼雷役電止雨召龍禁勑雷霆之怒収攝虎豹之獰役神攝鬼皆用此印右手玉清訣中指依様書之中立監獄使者位榜壇名於前列神虎聖位於壇下用小卓子安香爐淨酒并監引童子符及神虎諸符命如攝召畢却用召魂符現形符通現符通幽符通語符沉西流水取水噴噀一切亡魂立見真形與生世之人交通言語歷歷可聞若生人悲泣即逺矣若忻喜則亡魂盡見其質與生世無異萬目共覩來往如市仍加敬重所召所遣如響答聲報應於頃刻也尤忌嗔怒及私心妄召餘無所戒也壇上安雌雄二印變左手掐寅右手上清訣中指上節瞑目存想自身爲救苦眞人身披青霞羽衣頂上清冠玎璫朱履如此分明即歩九鳳破穢罡右每一歩黙誦一字歩畢呪曰天蓬天蓬持劒當凶奉承北帝有大神通上聖髙眞令吾淨心莫起穢衝大道神仙驅山塞海晝夜不停六甲六丁追魂現形急急如女青律令呪畢吸上方青炁一口吹向前去再左手天皇印開啓畫陽耀通關壇呪曰五行所造𠔃復歸於五行四大假合𠔃却歸於太空或隂或陽𠔃任天地之根宗天地冥兮萬鬼潜天地動兮萬鬼爽隂陽運兮神鬼享感此徬徨赴我旙賜汝靈書皈上清急急如上清玄冥太一神虎律令畫畢面鬼戸取炁九口吹之彈訣畫隂靈攝魄壇呪曰隂陽推運兮劫數更遷生死周流兮孰愚孰賢輪轉無窮兮上玄造化未出三界兮拘於神變魁𩲃東斗兮𩳐魒西轉𩵄向南斗兮魓䰢北面隂靈兮茫茫没没陽魂兮碌碌悠悠天地冥𠔃萬鬼潜天地運𠔃萬鬼爽隂陽運𠔃鬼神享感此徬徨赴我壇賜汝靈書歸上清急急如上清玄冥太一神虎律令畫畢面鬼戸取炁九口吹之彈訣次仗劒面壇呪曰陽耀返魂不受死經隂精攝魄回尸度厄次念三魂七魄胎光不昧爽靈魂營幽精復生尸狗去奸伏矢除邪雀隂無垢吞賊開明非毒無滯除穢非千𦤀肺閉塞陽魂復因天地正眞炁再聚汝形神此是五行造化眞精五藏萬神永保康寧陽魂隂魄無逃避形一呼一吸速到變眞靈符一攝壇見魂靈急急如太上靈寳大法神虎律令神虎召魂符神虎大神虎攝吏一十地聖勑五人急追魂方陷隅攝赴此獄𩴮追魂使者侯迪魏張信追赴魂神使者監獄劉令急急現形靈飛玉斗天靈集勑符呪曰天道蒼蒼幽靈萬變天地所到急急奉行覆天齊速震萬靈勑飛一下鬼爽飛營右符以白地黑書天皇印玉清訣吹水中噴攝魂壇神虎現形符亦曰幽寂符左神虎右神虎神虎追魂大聖勑大聖勑使者侯魏張信魂魄見形神虎玉女七人内玄司玉女蔣仁貴禀符奉行使者劉急急赴身來神虎戟飛運招揺一統隨𩴮右訣同前以朱書黄紙沉北流水中法師自服一道亡魂及三年者可燒符灰手中擎之呪祝某人家亡魂云吹往東北方通現使者符朱書燒灰調噴灑壇内外神虎神君勑左右追魂引衞聖神吏魂童子遵奉神虎勑令亡魂速現急急如律令呪筆呪曰急力神虎攝二符合身形急急如律令通幽釋變符神虎飛符攝魂吏一十五員地方陷隅攝赴此獄左七轉魂飛玉律大力攝右七轉雲飛玉女天靈攝呪曰天道蒼蒼幽靈萬變天帝所勑急急奉行通語符太一紫玄霄輔助精大神覆魂眞君天一北祚元君上帝勑神虎令魂魄勿走現體急急如上露形帝勑攝右符燒灰噀人身令見亡魂及通言語呪曰上帝勑令神虎神將亡魂領掖急濟速通言急急如律令通目普現符神虎使者神虎神虎神虎大將玉女功曹禀勑急召魂魂急急現其形𩴮勑具神全魄再聚魂魄靈通達玄冥呪曰太上降慈悲令救世間人獨隂與獨陽耳目有靈光速來見神形速令聽神言謹請護法靈童明彰報應神虎全形符書於幽寂符下上元玉女中元下元神助玉女玉女炁助靈助眞助仙助聖助五關土炁助炁流精天德至德神德隂陽合運神生其形飛走萬里洞至幽冥神虎二聖急急奉行勑符呪曰玉清至聖統攝幽冥神虎受命急速奉行耶尼遍至北鬱通行水扄冥隂直至酆庭執札所至開關啓扄天神敬仰地祇拱身追攝幽壤囚寃解停北帝有命萬神咸聽急急如上帝勑現形呪曰唵勑宣尼吒嚄唵哆哆唎吃右符入札内封之念呪勑之一道燒亡位前香爐内現形玉府監引童子二符凡靈寳玉府自有監魂引魂童子各一百二十員監魂童子監守亡魂不令東西引魂童子引亡魂來往就座現形及沐浴受戒水火鍊度受領功德及昇度仙橋皆主其職書符取北魁之炁吹筆三作監魂童子眞形符勑字並同前眞部紫光功曹符作用元陽之童回光洞映通光齊契无達不通達靈元宗引魂童子眞形符仝太上始青幽徹顯前玄都之童徹威震羅酆死户閉塞四大九維亡九孔前通三界威雄魂隨歩躡景无踪周景與道日隆回旋元始命速神虎玄信逺攝符混元一炁分形足蹈招揺化身首冠三清北魁玄範聚攝魂神陽魄返尸五行隂尸出冥具足勑攝来呈信帛符圓象天元五嶽含煙日月八卦合形風達巽乾爲爐黄道居中分居四象載覆證明玄靈搯上爽帝訣胎光幽精吞賊尸狗伏矢雀隂非毒除穢𦤀肺右先書亡人姓名年月日時後念吞賊尸狗等名尸狗伏矢雀隂亡人妊名吞賊非毒除穢𦤀肺右二符用素帛二尺書之卷於神虎關内併五道牒符一道同焚之五道牒符三炁陽光日月元始三官並明玉勑告下玄冥北酆明檢鬼營巨天並開覺元洞力士泉曲虚辭叅髙眞渺莽九醜髙上分配天道貴生清爽五行七政均施萬炁齊仙明炁上元三官四騫侍并九府咸得玉文神虎玉勑攝魂速至五道奉迎風火无停神虎關前符三部大梵北炁行持凡發玉札畢便服北斗神虎玉札顯應靈符建陽耀壇祝召劉噀水一口艮炁先吞幽寂符次書覆魂通鬼符與生人帶入獄中即與祖先對語建隂靈壇召明主攝病死横夭自傷被殘囚禁乆滯冥司一切魂魄法筳畢臨用時仗劒而向西南執水呪曰神虎獄神明我令行神虎之令攝召一切閑魂野鬼不得久停急速赴獄要見踪形急急如律令右法東南炁吹於水中噴西南却取西南炁吹入獄中仍書符與人吞之須臾見盡入獄中神虎玉札顯應符朱書吞服左雄大力提魂攝魄倒飛魂使者生催鬼神速攝魂七遍七出吞符呪曰提魂攝追飛捷急急如律令覆魂通鬼符獨明千變丈尺飛力雄威十萬神虎乾元使布形沙鬼滅餘殃閉魄奉行神虎之律无得動作明遍顯現急急如律令祝符太微令急摧落鬼居急急如律令右符以朱書自帶與他人帶入獄中一切孤魂悉令通說死亡之處若入郊野或墳圍帶之群鬼來見與人通語可知其姓名法曰立隂獄時可吞前符吞時再呪曰三官北酆至列言上清天獄主吏収領魂爽无致違戾急急如律令立獄畢仗劒東向呪五遍取炁吹水噀獄雄左玉曹主伯雌右武鸞主史我今攝召某魂速赴吾獄勿得遲疑何昌喬荀輔我身神我令所下急速奉行急急如律令噀水獄中畢所召亡魂孤爽不計其多少二符並天皇印玉清訣巽炁師先吞一道吹北流水中噴噀壇中及室内四向壁上亡魂人皆見之此名爲通幽釋變也生字符上清大帝玉清十方救上帝太清大帝苦天尊昊天上帝頂通天之冠垂天地水三天河之帶攝召九祖七玄官金書玉誥拔度某現形上生神虎壇灰下安鐵迹召魂符寅文艮炁呪曰幽幽寥寥上至九霄下臨分野鬼神速招元始符命追爾魂超不得離散違者氷消急急追魂神將急急追上某魂就元頭取來都召鬼魂符呪曰幽幽冥冥天地清寧三皇助我六丁衞我吾是太上之孫眞人之子煩呼諸神急急應靈勑符呪曰太上神符攝爾諸鬼呼名立至現形懽喜青龍在左白虎在右天魔在腹吾頭戴天罡玄武足履萬神速離使符召鬼無有不至右法未攝召先燒之納眞符太上符命攝神収鬼天神佑我地神載我日月照我五星護我河伯度我百靈護我衆邪畏我百鬼伏我眞符衞我所戴之者萬神匡我急急如律令右符以八節日於七星下閉炁書置髻中每至節日將新者替之凡行攝召先於三五日前法師服之通目符日是我父月是我母五星是我兄弟太一是我朋友吾用通目神符攝伏諸鬼所召者至立現身形急急如上帝勑天蓬勑上帝勑命五雷使者五方童子引魂眞君雷部火令急追亡魂某立到壇下凖勑奉行火令急急太微帝君神虎龍章上清北都太玄之境紫英夫人函以杳靈冀以禁臻降範北魁數足有機無神敢忘神虎之律急急流祥七元之眞綂攝雷翔冀力不彰顯迹雲剛召訣男中指第一節女第二節孤魂五指根吹召天一天將綂兵一千貟速至壇所急急如女青詔書律令集太上神符攝爾諸鬼呼名立至見形歡喜青龍在左白虎在右天魔在腹吾頭戴天罡玄武足履萬神速離使符召鬼無有不至急急如律令天皇訣三遍艮炁旛上左大指爪寅歷至巳以二指爪大指甲下歷至根却以大指爪大煞文亦名天蓬元帥訣凡握山訣上則訣上向下則訣下墜山字左小指入中指背二四指勾小指大爪上帝訣中指直罡法左右足順行歩至第十歩左手天皇印右手上清訣神虎大聖神虎將軍天一北祚元君太一復魂眞君霄輔助精大神一同提起兩手合掌搯五帝總訣至此提起勿竦身攝魂神將劉將軍掐寅义腰追魂神將何昌返魂神將喬聚魂功曹張文英攝魂玉女十五人對魂神將劉廣庭整魂神將太一君唵咄咄㖂呦呦音階掬掬攝㖟二左山字訣中指中文每一呪取東北炁啄吉盤陀伽利攝㖟二炁吹旛上微以身如墜狀尋魂攝魄呪曰奉請神將馬將軍先往城隍并五道次於水府及人間五嶽酆都諸地府尋取亡過某赴道場上帝訣北炁追魂呪曰吾今行攝召奉請馬安仁先往城隍問次到嶽府尋泰山渾不見地獄受苦辛整魂呪曰靈都開玉戸酆都罷對分三塗除惡業吾今召汝魂諸處無拘管酆都定罪深帝君今有勑火急召汝身速往朱陵府立於生天門受吾清淨呪諸司急放魂諸司急判魂右法如見半身兩手艮文握起喝全見攝見呪曰謹請東北方紫微大羅天尊玄中大法師左玄眞人聞弟子啓奏揺金精撼玉戸攝見天上地下亡過某速來見形急急如東北方紫微大羅天尊律令又呪曰都功對魂聚魂攝又呪曰黒君黒帝速分鬼炁成形又呪曰南斗天罡神楚楚服應靈斗口玉女神生天現影形到吾壇下者徘徊十萬兵法曰或攝召來遲者書神虎釋變収魂符并感應催魂見形靈符燒之収魂符神虎提魂攝魄使者劉神虎萬千形不離影飛行急十方精光都一吸左領三魂不得住右帶七魄獨飛行天師勑下奉行神虎之律急如律行勑符呪曰天行運嘿幽精化形急急如律令右符以朱書取北炁入符中此符貼於人家門戸上則夜夜呌人姓名不絶三月不知彼呌人即死也此乃上帝留之以治凶惡之徒師當勿以私心用之法曰若人死亡近化三年可書符燒灰手擎呪祝其人家亡魂吹艮方次以前符燒灰水調噴壁上立見又有卒然而死未及三日等身掛旛披尸上以白繒七寸朱書符火化於人中之下仍前告下玉札不移時魂神再返元尸立得更生凡攝生魂之法當以尸脛未損及未過三炁可追之餘不可追如行此法用關何喬二將齎玉札仍開說之神虎攝魂符凡書此符先面巽呪筆取炁吹筆朱書呪曰天地閉隂陽行魂魄返急急行上台虚精寅至巳中台六淳丑至午下台曲生子至未天帝有勑神虎將軍追魂使者攝鬼見形𩴮右符用追攝亡魂見形以白紙粉書追魂攝魄呪曰三官北酆明檢鬼營不得容隱金馬驛呈普告無窮萬神咸聽三界五帝列言上清急急如元始天尊勑此符揭棺於鼻下燒之須臾立返凡遣玉札關子呪曰何喬二神禀此玉札速追生魂急急如律令同玉札關子燒之須臾立返如見棺依法取巽炁呪三遍其人棺中作聲神虎訣辰文攝召章召將神虎力士監總天丁攝召靈魂普臨法會手執旛面北呪三遍用金錢馬三分隨旛脚下燒神虎催關次付旛於童子師黙念呪曰金吒全吒玉帝立勑攝金吒全吒咄吒玉帝立勑攝唵金晶唵金晶金晶咄咤玉帝立勑攝右法斗訣搯辰文罡炁三遍三取炁歩南斗南立便現金色耀靈光貴賤隨我旛北斗天蓬勑玄武開幽關目哆野堵急急如律令右法以左手掐上帝訣呪一遍以手一招之放訣三作呪曰寳輪急急如律令呪七遍七吹在旛令童子把住掐卯歷子訣剔又法泰山疾速神廟降臨天蓬急壓急急訣口受山字訣沐浴水動呪曰智車蔑蘖攝急急如三官律令勑右法子入卯出口受引至座見形呪抳帝㘑嚕嗚怒义催亡元始清清朗朗靈靈本司追魂吏速攝見眞形疾疾一本作本司神虎吏右法掐定掌中指根乃中指倒指掌心中令童子閉目呪三七次次令開目看之現形了則止未現再念前三呪必現也鬱儀符火池圓形方景呪曰唵嚩唎囉吽存紫光九芒左九本訣結璘符水池方形圓象呪曰唵泪唎囉吒存白光十芒右十本訣鉢形譜護火車攝煉度如此呪每符轉之二符並用此呪塗之右符寅文七遍可於香爐内燒之煉度念前受煉呪水法正煉時用智車輪攝七遍北炁火法火車輪攝七遍南炁耳通傳呪烏侖屠义急敎它神通傳語話右兩手斗印取天門炁吹兩耳墜旛玉皇上帝勑晶嬌離火勑三陽現五明萬神聞吾命分身速現形神虎大聖何三部追魂使者昌喬荀速攝侯迪魏逵張信急攝所受亡魂附旛現形普現火神催上疾疾石符玉訣艮炁口受香爐内焚於攝召旛下附符上元天官中元地官下元水官横天大將軍開至破年月日時直符使者左太陽帝君右太隂皇君方圓一轉眞炁皆皈右法左手辰訣右手斗印角冷水先令服之斗轉魁罡神聖兵辰戍斗左青龍在甲乙卯右白虎在庚辛酉前朱雀在丙丁午後玄武在壬癸子向陳覆上辰騰蛇蟠下巳吾奉上帝勑六神急降追攝亡過某人眞魂眞魄附童子身通接陽眷疾疾右法先暗許下金錢次云上帝靈貺與吾攝魂入體疾右吸炁一口和訣彈童子額上想魂魄並從童子衆妙門入歸五臓六腑四肢八脉並從亡者魂魄也三二人中内一人顫得緊者留之喝云神將急催亡人附童子體急顫疾顫以訣撫伊心下云分明通說說畢云亡者急皈隂府如未醒時念醒魂呪曰三魂還歸七魄再返天地昏昏靈魂速降取玄炁吹童子面上攝魂未現三塗五苦訣呪紅杏墨黒磨眞篾臈靈寳功都成切角鎭興生轉獨𨽻遷可韓明聚魂攝功都聚魂招八方捷疾使者天神地祇萬靈同皈合明天帝日謹請乾坎艮震巽離坤兊八卦大神収攝亡魂某人付吾紙鏡疾速現形疾疾存天地人三字於鏡上巽炁吹鏡及人面上再催之曰紅杏翼宿唾點五嶽訣掐之破墨黒存吾左磨眞摺降襪臈撻驛破靈寳聚吾手邪魂追考過摺降落疾疾右法紅杏法以追魂取鬼邪在人身中問勘不肯供通姓名用此掌燒紅杏燒篾臈水又魑𩲕急急現其身天門眞炁降疾速赴壇前七過離散魑朝太一萬靈盡總皈又魑朝太一火急耀其身又幽魂受正法萬靈盡總皈太隂混元三界追魂符玉清追魂使者符天一北祚太一嚴攝死魂玄冥北酆受煉玉清追魂使者方昭急攝某人魂立至上清追魂使者符上天度人列言追魂濯魄上清聚魄浣形上清追魂使者張昉急追亡過某人魂立至太清追魂使者符天眞全其拔命玉帝經法本年受度太清追拔幽翳百骸太清追魂使者郭流光𤊺急追亡過某魂立至右符並掐玉訣取三清炁供養神虎壇範皇人曰夫建神虎二壇須五方用五篇敷落仍上以大浮黎土之圖安於中以召之立至如無此文即神虎將吏無其契合之光不能至也仍於行持之日當誦魔王三章并焚赤書玉字八威龍文二章於室前盖天將符吏非天元祖炁眞文玉字不能召之夫二章乃玄都至禁元始天尊召諸天上帝三界萬靈即誦此章書其眞文萬聖見之咸覩玉光而至夫靈寳上道非小術全在思形煉已守炁存神煉身如元始天尊之眞身與天尊而同慧方可同達如不遵典精思不全徒用前功其効靡見反招譴謫徒怨於髙眞也神虎印章皇人曰夫行神虎玉札追魂自有四印祭而行之如有符而無印則是有兵而無將如有印而無符則是有將而無兵符印炁訣歩罡召靈發役驅馳闕一不可是故靈寳法中事有十全未嘗有違戻者也第一印者總監鬼神印乃靈寳法之總制也其文曰總監衆靈四字用時搯總監印取靈寳中炁吹而用之專印玉札總監訣中指中直印乃五帝大魔王掌之第二印者北魁夫人内諱之章乃玉司之專權也專印攝召等旛用之用斗罡搯斗訣取北方玄炁吹而用之第三印名北魁玄範之印又曰雄左玉印專佩左肘之上以召神虎主伯并印主伯吏眞形符上三印之仍供養於陽耀壇中用畢却以縫袋盛之第四印名雌右玉印佩右肘之上以召主吏并印主吏使者玉女功曹眞形符上三印之仍供養於隂精壇中用畢却以縫袋盛之總監鬼神印神虎内諱印神虎雌印神虎雄印右佇印並用甲子日天炁晴爽命以桃木刋之祭印呪法法用茶酒時果九分吉日於淨室供養法官面北方掐神虎顯應訣左手大指掐中指根中指却到大指根先丁罡三歩念呪吸炁一十二口吹之想北魁下有紫玄之炁九道降注入印中再拜呪之呪畢以酒沃印覆安於淨盆中化金錢四分在印上然後収於淨處勿令一切人見之見之不靈如後十二年方再刋申奏換之其舊印棄於巖洞無人到處祭印呪曰天一北祚太一紫元神虎主伯斗中大聖玉女追魂十萬精兵隨我降靈一呼一叹入我印中變化億千元亨利貞急急如神虎勑持誦十四遍存聖位隨香煙紫玄之炁俱入印中祭畢縫袋盛之凡遇月旦師佩印叩齒呪曰神虎之印威猛通靈吾今常佩使我長存追魂攝魄立見眞形急急如玉清上帝律令祭印法皇人曰祭印之法用棗湯十二盞淨茶十二盞明燈十二盞金錢甲馬各十二分布列於天門之下至星宿見時法官具其衣冠精心上香搯變神訣中指中左手同取十方炁吹身變身爲靈寳天尊丁立南面歩八卦朝天罡回身靣天門朝禮三禮起身黙奏上帝言所傳法事云今擇某日依法醮祭伏望三尊慈悲降三炁於印璽之中差直印金童玉女各二十四人以爲侍衞令臣用印通靈隨印感應十方上聖皆爲證明再禮三拜吸天門三炁吹之次長跪將印逐顆雙手大煞文捧於額上呪曰舍靈眞丹曜靈素威玄天英玄天姿安暉音容太化方玄樞應大定卿久英禎呪畢取炁吹三過彈訣誦大梵隱語一遍而収之靈寳无量度人上經大法卷之六十七
