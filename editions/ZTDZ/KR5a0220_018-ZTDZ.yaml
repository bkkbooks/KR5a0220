front:
  text: 靈寳无量度人上經大法卷之十八金八
  hash: sha256:d67d48b457779378bca84ab4663d0fbab48c130b8324cfe956bf25b40473de47
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_018-030718c, image: sjb/03/030718c.png}
body:
  text: 佩服内音品下西方七炁素天八會書音元載孔昇天孔昇天中上四字並書南極玄窻之上主諸得道人受煉品目其第五第六二字書南極洞陽之館主得道人受煉遊仙品目其第七第八二字書南上北窻上主制萬魔干試之炁合八字皆方一丈八角煥明孔昇天中天真皇人曰凡修飛仙之道當以五月五日七月七日朱書上四字向南服之身體生津内外光明萬神鎮宫又以本命之日朱書第五第六二字向本命服之三官削罪録南宫度仙名又以立春之日朱書第七第八二字向北服之萬魔降伏鬼精滅爽神真總歸身飛太清太安皇崖天皇崖天中上二字書金闕之南主天地開關之運其第三第四二字書大羅之上通真之房主諸塵穢之炁總得度之名其第五以下四字並書南宫福堂之上主飛天得道人髙下品秩合八字方一丈八角煥明皇崖天中天真皇人曰凡修飛仙之道當以太𡻕之日朱書上二字向東服之生死皆得隨運往來光明不絶又以八節之日朱書第三第四二字向王服之萬穢清蕩神炁澄正名書朱宫仙官來迎又以七月七日朱書下四字向南服之太極度仙品九靈記福堂生死皆受自然之厨懽樂七寳林中顯定極風天極風天中上二字書月宫之隂主天王遊宴之儀制月光之散輝其第三第四二字書玄都紫房主天地劫會之期下四字並書玉京玄臺主生死録籍善惡功過合八字皆方一丈八角煥明於極風天中天真皇人曰凡修飛仙之道當以生月三日朱書上二字向月服之三百日面有金容身有光明又以八節日朱書其下二字向西北服之皆得過大小劫會天地之災又以太歳之日朱書其下四字向本命服之百日三官除地簡南宫記仙名二十四年當以三色之雲迎子上升景星之庭逍遥太元之中位爲景霄真人始皇孝芒天孝芒天中上四字並題南上朱闕主生死開度解善惡縁對赤簡之録其下四字並書日之上館主得度之人受煉之容披九幽之戸入更生之門合八字皆方一丈八角垂芒煥明孝芒天中天真皇人曰凡修飛仙之道當以本命之日朱書上四字向本命服之百日九幽削宿簡南宫記仙名生死滅度世生福堂又以月十五日正中朱書其下四字向日服之三年日童下降面有日光滅度則得受煉而更生大運滿則得駕乗飛景之輿遊三界之上太寂之庭七祖同福世世生仙太皇翁重浮容天翁重天中上二字題玄都九層長樓主召天中之魔其第三第四二字題三便之門主制天中魔王謠歌之音其下四字題北虚上館主治萬鬼之牢合八字皆方一丈八角垂芒煥明翁重天中天真皇人曰凡修飛仙之道當以齋日行道求仙朱書上二字向北服之則萬試不干真靈即降又以入山請乞及誦經之日朱書其第三第四二字向東北服之則詠誦朗徹上天遥唱心神澄正七年成仙以惡夢及爲百鬼所害朱書第五至第八四字向東北服之百鬼束形三官攝妖精邪自滅神真降身輪轉運足剋成上仙无思江由天江由天中上四字題九天玉闕之上主四時之炁隂陽之數其下四字則書明真之臺主滅度之録領更生之人合八字皆方一丈八角垂芒煥明江由天中天真皇人曰凡修飛仙之道當以八節之日朱書上四字向王服之則與四時之炁混同自然經災不滅履害不傷又以本命之日朱書下四字向本命服之則九幽削死録於地簡上生名於南宫七祖同福長入懽樂之堂上揲阮樂天阮樂天中上二字書紫微臺北軒之上主得道者之品格其第三至第五三字書南陽之臺主校幽夜之録開度更生之魂上升朱陵之館衣食自然之福堂其下三字書大羅之上始陽之臺主上品之人得度大千之界升入元景之堂合八字皆方一丈八角煥明阮樂天中天真皇人曰凡修飛仙之道當以正旦一日朱書上二字向東服之百日東華記名上仙之品又以七月七日子時朱書其下三字向北服之九幽削長夜之録南官記更生之名九祖皆得去離五苦上升玄中福禄之堂又以八節之日朱書其下三字向王服之滅度皆得上升大羅之天逍遥七寳林中无極曇誓天曇誓天中上六字並書東華宮青林之𣗳主天中空生自然之音其下二字書玄都玉臺之上主諸真人服御五雲之精日月之光合八字皆方一丈八角垂芒煥明曇誓天中天真皇人曰凡修飛仙之道當以登齋行道之日朱書上六字向王服之則聲叅太極炁入神霄上帝遥唱計日成仙又以雞鳴朱書其下二字服之而嚥雲芽百日面有光精五府充溢舉形煉仙九祖出幽夜更生人中功滿剋得駕乗三素之軿遊宴紫微之宫也北方五炁玄天八會書音皓庭霄度天霄度天中上二字並書玄都長樓之上主天地開閉明自然之真其第三至第六四字並書神樓之上主天地劫會之交度得道人煉以太和之炁使得入自然之真也其下二字書天門之扇主得度之人上詣天門受煉而還也合八字皆方一丈八角垂芒煥明霄度天中天真皇人曰凡修飛仙之道當以正旦未書上二字面東服之則隨運輪轉不失本形又以正旦朱書下四字向東服之滅度即得受煉太和之炁而入自然之真又以九月九日朱書下二字面西北服之以身滅度則與九祖同升九天之門受煉而更生也淵通元洞天元洞天中上二字書扶桑司靈之館其次二字書東井華林之堂並主洪水四出盈縮之度其下四字並書太極宫中主大水出時司命校録度學仙之人合八字皆方一丈八角垂芒煥明元洞天中天真皇人曰凡修飛仙之道當以冬至後甲子日朱書上四字向北服之二十四年則能水行河伯同迎萬靈侍衛天災不傷也又以朱書下四字佩身則名叅帝録生死爲仙大水時朱書向北服之則鳥母迎以鳳東上登須彌之山逍遥遊觀洪波之津也翰寵妙成天妙成天中上二字書月之上館主明天地之隂陽通長夜之光其第三第四二字書三便之門主生死之籍度得道之人其第五至第八四字書紫微雲宫主生死得度之人羽服飛行之儀合八字方一丈八角垂芒煥明妙成天中天真皇人曰凡修飛仙之道當以月生三日朱書上二字向月再拜而吞之七年身内發月光照見五内又以八節日朱書第三第四二字向王服之皆得度大會之災身爲帝王之民五帝保舉位爲仙王又以八節日朱書其下四字向王服之生死皆得上詣朱陵受仙衣羽服而遊諸天也秀樂禁上天禁上天中上二字書玊臺之上主空洞自然之書其第三第四二字書三便之門主生死圖籍試得道之人其下四字書紫微長樓主總監諸天炁主得道之人升仙之名合八字皆方一丈八角垂芒煥明禁上天中天真皇人曰凡修飛仙之道當以平旦朱書上二字向王服之身與四時節候相應誦詠靈音上叅神霄又以七月七日中時朱書第三第四二字向本命服之百日北帝削死録南宫上仙籍魔王保舉生死得道又以八節日朱書其下四字向王服之八年七祖皆得上升朱陵之宫身與諸天同犮交遊上清也无上常融天常融天中上四字書紫微上宫通陽之館主得道之人功徳輕重之品其下四字書天地元玄斗之中主煉度得道人身以遷自然之堂合八字皆方一丈四角煥明常融天中天真皇人曰凡修飛仙之道當以七月七日朱書上四字向王服之百日三界書其功言上朱陵之府七年位爲真人又以正旦朱書其下四字東向服之生死皆自然光明去離九幽之根升入无極福堂玉隆騰勝天騰勝天中上四字書玉清雲宫主衆聖上朝之儀典主雲霞而聚雲也其下四字書紫陽上館主自然音和空洞之章合八字方一丈四角煥明騰勝天中天真皇人曰凡修飛仙之道當以八節之日平旦正中日入三時朱書上四字向王服之百日萬神朝已二十四年則致碧霞之輦上升七寳雲宫又以八節之日正中朱書其下四字向王服之八年則能自然知諸天之音洞達玄虚與真合同龍變梵度天梵度天中上二字書紫虚太微之館主度得仙之人其下六字並書南陽上宫紫臺之軒主得道功勲輕重之叙合八字皆方一丈四角煥明梵度天中天真皇人曰凡修飛仙之道當以正旦朱書第一第二字向王服之八年朱宮書名飛天同功又以七月七日朱書下六字向南服之二十四年自然識其先身宿命因縁之根生死並得上升玉清之天懽樂之宫太極平育賈奕天賈奕天中上四字書玉清上宫太極陽臺主虚旡自然生真之號其下四字書北闕玄牡之戸主六梵之炁煉度得道之人合八字皆方一丈四角煥明賈奕天中天真皇人曰凡修飛仙之道當以正旦朱書上四字向東服之九年坐知自然空中之事太極書名於仙録之品又以立冬之日書下四字向北服之百日六府受真體生光明二十四年生死皆得遊大羅之上逍遥之林也隨四時之節佩服内音訣天真皇人曰凡修飛仙之道及滅度之法尸隱解化輪轉生死隨運逍遥无拘太隂當朱書諸天玉字旡量内音白素佩身隨文服御心不受穢五内清和六府恬寂空泊旡爲八年洞達諸天坐見十方神真交降體生玉光馳騁龍駕白日登晨玉童章上道四萬劫一行修行之法當依土朱書春正月二月三月當以朱書文向王叩齒九通呪曰飛天大梵維羅八方九炁清天總爲神王五合八會流煥太空上關龍漢神仙之宗下抜長夜九幽之房抜度苦魂朽骨生光身變毛羽五色衣裳蒼龍碧輦飛歩空行今日上告青天始陽萬碩諧和與炁齊同昇入无形永保无窮畢服文仰咽八炁止夏四月五月六月朱書文向王叩齒八通呪曰天書敷羅梵行赤明上開八通五合通靈大運啓期洞陽煉精玉文煥朗三景自明下度生死一切受形今日良吉大聖臨庭九夜開牗幽房朗清三惡休息我道自成五帝保度上登華京七寳林中長享劫齡畢服文仰咽八炁止秋七月八月九月朱書文向王叩齒七通呪曰飛玄八會結炁成真六十四字總靈天根開度生死朽骨還人幽魂披散受炁上玄今曰時慶萬願開陳衆真交會我願我仙景與道合我願我神得乗素雲上升帝宸七寳歡樂交友真人畢服文仰咽八炁止冬十月十一月十二月朱書文向王叩齒五通呪曰玉字開冥流煥上門八炁結真梵行景雲神王啓光三象洞分五色徘徊照我靈魂今日值合仰希帝君開宥出書授我真文玉澤交灌五府生真毛羽變化駕景乗宸出幽入无仙度自然七祖同歸歡樂上元畢服文仰咽八炁止天真皇人曰此祝說之辭皆四會之炁八和之音自然之章行之者上天遥唱三界設禮萬神束帶侍衛靈文隨節服御祝說咽炁百日諸天記録地官削簡八年神真自降體生玉光洞達幽虚坐覩自然死戸更生反胎還人輪轉不滅生死得仙道尊法妙四萬劫一行輕泄漏慢身負河源風刀萬劫終不得仙明真舊格宜祕之焉靈寳无量度人上經大法卷之十八
