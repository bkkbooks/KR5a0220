front:
  text: 靈寳无量度人上經大法卷之三十五麗五
  hash: sha256:4d96a4545124670a06990fa031723ada759ad7abd3bcf352a9b912172b8c40aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_SJB_035-030800b, image: sjb/03/030800b.png}
body:
  text: 自錬形神品錬神法章法於一陽生後受錬形神凡一周𡻕然後聞奏上帝關行三界攝召亡魂方行開度未及一年急欲救拔須啓請錬度眞人九光童子受錬司眞宰奏聞朱陵大帝三炁天君熒惑眞君南宫上宫度生君火府眞聰錬魂聚魄攝魂使者主將吏兵存在左右庶得衆眞監度魔試潜消凡隂魂不過二尺在世喎邪跛躃殘疾刀兵形骸不具隂府亦然當行五府事一爲泉曲之府是名腎宫此主天一水位之精則當存水神爲水沼以洗滌孤魂二爲陽明之府是名心宫此属地二火位之精則存火神爲火池以錬度孤魂魂既得洗滌又得錬度不可不具五府須存天三生木属肝是爲發生之府以象春之生物也次想地四生金爲肺宫是名崑崙之府以象秋之收成也夫春属肝爲木位主青龍秋属肺爲金位主白虎夏爲朱雀應心冬爲玄武應腎四象既備萬神俱歸其於中黄之庭黙行五府事當存脾神在於中宫爲黄庭之府能生長萬物五行圎備則萬神咸亨矣然後亡魂形體悉備可以洗錬俾得托生天界仙衣輝嚴則流火之庭火鈴滿地焰焰燭於天界從此孤魂各登仙郷永辤苦趣然後玄祖乘此妙因神識超脫逍遥霞霄之上身得道真矣毎日清旦焚香面太陽先摩兩手心令極熱拭兩目次兩耳兩鼻然後左右各摩三次方搯四門訣勒至中指中文存東方青帝駕青龍與自巳肝中青炁青帝自眼出合而爲一搯卯文黙念紅杏吸青炁使津入肝又次想西方白帝乘白龍與自已肺中白炁白帝自鼻出合而爲一搯酉文黙念磨真吸白炁使津入肺次想南方赤帝駕赤龍與自巳心中赤炁赤帝自口中出合而爲一搯午文黙念襪臈吸赤炁使津入心次想北方黑帝駕黒龍與自已腎中黑炁黒帝自兩耳出合而爲一搯子文黙念墨黒吸黑炁使津入腎次想中央黄帝乘黄龍與自已脾中黄炁黄帝自脣中出合而爲一搯中指中文黙念靈寳吸黄炁使津入脾想五藏五色鬰勃充滿即心拜五方念金液錬形呪并太液呪取太陽炁九口通徹内外矣金液錬形呪曰金液錬形與道合真開明三景是爲天根无幽无極无始无終元皇九醜靈魔絳宫紫炁飛天身乘六龍火上水下流入三宫神居陽明大道自通急急如上清金液錬形律令太液錬形呪曰太液錬形金馬驛程上下水火森羅淨霐元範恢漠幽寂度人受錬元窮爲道至真三元降合五炁會神太上符告六丁潜靈紫羅鬱秀行符玉京急急如太上太液律令次誦太陽流金火鈴真一呪天中火光月中精光大明火鈴金剛之精日宫太陽髙陽明魁星五輔天元廷保鈴火速元鄒兵猛獸正妖入鬼精熒星火星火神王太一元兵平火山大聖金童星火及上童昊凶流金敕金剛寳光律令攝急急如南方熒惑寳光律令敕攝自錬法訣毎日凌晨焚香少斗立斗中想爲錬度真人先搯四門訣靜神絶慮兩手玉皇訣交於口上黙念金液錬形呪直視太陽吸炁一口三次一咽吸炁九口念呪三徧想日輪九道光共咽口復念太液呪如金液作用咽炁畢念錬神呪曰太上錬神九歩八坤行剛九轉内外咸成三台子午絳宫受真符煉萬靈赤心降精心辟惡毒往來俱榮北都曲府離合上清大洞自然風火无亭急急如太上陳形律令右仰視太陽左右手丑訣交於口上吸炁九口作三次咽念呪三徧如前法念呪曰坤順内營甲巳潜形三魂受錬七魄成眞五炁中理斷絶惡根九宫康配列言上清太一含元戮伐魔精三貟四正地方坤寧神魂眞魄往來玉京五嶽震伏萬毒自傾急急如太上錬神律令右仰視太陽服炁念呪並同前次同火星眞炁念呪曰南方之君赤炁之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬類發生天帝有敕使者須聽攝召魂魄錬度眞形除災滅禍囘屍返生急急如律令右兩手火訣取南方眞火咽下三口再念火鈴眞一呪仰視南方取炁如前次端坐丁立取南方眞火一口吹身左畔東南地上想爲火池存錬身大神乗龍吐火於池中將右手劒訣攬自巳心火從口中出左手火訣次剔向火池中炎熾錬一身上下通瑩更无隂翳洞徹畢想赤龍一條從焰中飛入左耳孔中次搯子文取北方眞水一口吹身右畔西北地上存爲水池想流精玉女乘鳳吐炁於池中將右手劒訣攪自已腎水從口流出取北炁子文吹剔於水池中波浪滔滔濯質上下晶潔更無塵染洞徹中外畢想黑龍一條從水中飛入右耳孔中水竭次呪曰魂神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿徳就飛昇上清又呪曰生身受度劫劫長存三徧叩齒心拜而退凡行錬度之道更須帝誦南昌錬度蕩穢才露龍漢大呪不以徧數則錬度亡魂蒙其功徳徑獲超脫又呪曰龍漢蕩蕩洞陽玉錬章夫洞陽玉錬法夙有仙籍莫能行此且人雖有目可視一里之内則一里之外不可視雖有耳可聞崇墉之裏則崇墉之外不可聞而況幽明踈逺其可目見耳聞乎必頼上帝垂慈宣行妙化役使火府勑制地祇乃行錬度夫人不能自錬安能錬鬼鬼在幽𡨋隂暗之間得此錬度滌除垢穢百骸流光然後始獲超生譬猶冶之鑄金不能自冶安能鑄金上帝哀憫下愚於下元甲子遣六甲神仙降世流傳此法謂之玉皇禁書非下士所可見聞也輕泄漏慢觸犯憲章罪無容赦幽則累及玄祖明則禍及子孫災害相仍可不愼哉今行持之士既有心拔度亡爽宜先自錬元陽陶鑄萬範不求眞而自眞不求神而自神化合太玄苦爽咸頼輒慕虚名叛道誑惑行屍走鬼失笑幽𡨋无所禱也戒之戒之勉勵形神隱顯獲慶毎月玉錬法日精圓形方景赤色每月三日九日十七日十五日二十二日凡五過於金門之上以金精石景水母芝英錬於日魂此日華流散金精滂沲普天得潤若此日採日根靈降玉戸行此道升到金門金門在天西關之上日月通靈之門也右取日根先取井花水一瓶露扵中庭朱書石景水母玉符青紙上置水中面向水叩齒十六通呪曰陽明景精光煥紫庭八芒朗映魂芒溢盈五轉三廻炁周太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御石景水母灌精順天運炁隨日華榮九孔納眞解脫本形急急如律令次向日中叩齒二十四通服符呪曰陽精巳通飛華巳新皇芒流溢蔭注内纒仰餐玄潤芳華來臻宫宅開張蕩洗囂塵体映玉光面發金眞靈飛禹歩上造日門急急如律令右仰頭引日炁四十五咽餘水洗面沐浴還室内次面西向叩齒二十四通暝目思見日中五色流霞下來接繞一身及有紫雲大如目瞳累十數重煥耀五色之内與炁俱入口中便引炁四十五咽液九過呪曰日魂流光五色滂沱錬形金門圓景峨峨靈輝吐耀受明天河玉芝盈溢蘭潤芳嗟飲我黄泉哺我飛華啜根咽實夀同靈柯形附太輝身騰飛霞千齡萬劫使我傾殂急急如律令次心三拜畢石景九錬水母玉符五炁玄華冠帶石景玉英圓光九錬魂魄日月垂映吐輝三天月華方形而圓景黄炁以毎月𥘉五日十五日二十五日三過經東井之上東井玄耀之門也右取月華月臨東井日取井花水清旦露中庭夜半白上朱書陽精玉胎錬仙眞符納符水中面水呪日黄炁陽精三合凝光玄暉返正冠帶八芒錬度東井受明飛星金華散靈五君流芳夫人降醴徧灑十方洪芳下注六腑溢充金精九化易景返容急急如律令次向月叩齒三十六通服符呪曰乘虚落烟遊宴太空上造月庭與眞齊雙變化八道出有入無二景同輝永保无𧇊急急如律令右仰頭引月炁五十咽餘水沐浴洗面還室内次東向叩齒三十六通瞑目想見月中五色流光下繞兆身及有黄炁大如目瞳方圓内外累數十重煥映五色之内與炁共入洞房中便引炁五十口咽液十五過止呪曰藏天包光黄炁鬱鬱結精含凝入芒朗煥瑩飾黄華石景淘灌玉芝盈溢潤光霄漢普天受潤登明晨旦駕景登空得昇帝館長離下世超離八難與日同輝與月同榦次心拜三禮畢陽精玉胎錬仙眞符黄華隂炁陽精沐浴固仙九魂九九煉生尸圓明啓告華光交映轉冠帶金晨王胎錬仙流芳淘津九陽育化元景回靈飛昇上官玄霞散煙曲映我身洞觀瓊軒九宫洞視品玄師曰未有定力見一切无道鬼神可依九宫法男於離宫起一歳順行女一𡻕起坎逆行並一𡻕易一宫至何宫分即於年上起月月上用日日中用時又於時上起得患或作過鬼神發作𡻕支月支日支及方所即知鬼神情狀乾乾象主頭沉舉體重難任兩足俱冷痛祟是一陽人惡病纒身死西北是沉淪飜香有願誓皂衣及邪魂坎坎宫身悶亂懶語腸還鳴水蠱或支滿溺死語難伸正北因遊走怪夢足悲吟一鬼隂陽祟細問見其因艮艮方心腸懣喉中哽塞傷狂言并怪行悲笑同難量群鬼須八數廟社行不藏更有木金怪東北審形光震震宫瘟㾮病寒熱傳四支食厭并呪罵犯罪天使之刑傷疫驚死青碧死魂隨紅黄女鬼見三日有傾危巽巽宫顛狂鬼盲目不能明家先明隂語外厭是女人魂魄居鬼手書夜使呻吟潔齋求大道方始保康寧離離宫正南地癰癤火燒瘡上熱多黄病血鬼産傷亡緋紫横死客沾親魂是陽正向火位討邪鬼見行藏坤郷脾胃疾痢下體尫羸乆須難治療西南有伏尸動土傷𡻕破光怪顯其時勾引家先母厭延死魄隨兊兊意癆尸疰喘嗽作迍邅𦵏埋坐不利刑傷有伏連横夭求功徳古器在宅邊鬼邪三人伴同共致𡨚愆玄師曰凡一切修誦度化消災制伏救治呪祝百物摧滅凶妖禳鎭不祥辟斥光怪召龍致雨請晴開光止水治火除瘟去害發符呪水收束毒獸求仙修眞七經八緯降眞召靈並須密誦靈書萬徧之後所欲立至神通漸至十萬徧坐致自然造化无方如火事書隠語火化吹颺或安髙山巖谷石上書寫或埋地中或沉水底採摘仙虊救病皆用此隠語誦之者一依口訣靈寳神鑑品道之至虚則應感萬物以咸生天之至清則鍳臨萬方以無隱地之至靜則育載萬彚以安寧水之至澄則潤澤萬品以化成日月至明照煦萬道以輝映其有物可體日月水之澄明可象天地道之清靜虚而應物无窮未甞留物者外指事則九寸圓明是也内指事則方寸絳宫是也故靈寳大法之道以玄宅爲主通神洞妙以明鑑爲端於是天羅天相首叙靈寳神鑑妙法一十八篇九天九地之大數燭幽暗昧察鬼神之密機洞玄鑑微知聖凡之隱顯昭明五府映視十方如目覩掌法用九寸圓明清瑩平靜不經鑑粧者依式持呪布炁鑑面八十一日陽數法足所向神光必現眞跡所謂洞觀三界徹視十方元逃纎毫況鬼神情狀踪跡乎苟心不澄正念不虚靜志不潔誠多致魔精變幻顯現非眞修用之子可不謹歟靈寳五嶽三塗寳照呪紅杏墨黑磨眞襪臈靈寳右以左手輪搯震坎兊离中即念呪捻定中指中文靈寳印取五方炁吹鑑畢呪曰功都聚魂招八方捷疾使者天神地祇萬靈同歸合天地勑攝右念呪畢再取中天炁吹艮方却吸艮方炁吹鑑畢以大指循八卦又呪曰謹請乾坎艮震巽離坤兊八卦大神催促入方天神地祇吾鑑中現形右以左手輪八卦靈寳印文以右手靈寳印文以中指於鑑上自乾方點八黙於鑑面至兊亦循至靈實印搯住吸八方炁吹鑑放印在鑑上再念入室呪靈寳都天入室明鑑呪風收東巽雲崿上天乾炁收斗乾雨散五方右二隅炁吹鑑再輪搯五嶽即呪曰隣紅杏入天成破象八方正東卯墨黑成雨降雨對四瀆龍乾元靈收卦北坎磨眞想見金執千人甲坤混動五方炁西兊襪臈照南斗吾大溢在手地元對乾元離靈寳心内守中指中文襪臈列狀紐像宜破宫攝右法輪五嶽印念呪取五方炁吹鑑上再誦一徧自中文退至兊上搯定印吸西方炁吹乃靈寳入道五門鑑法然後召天神入鑑切鑑視天神呪曰順帝勑差靈寳照右法南方炁離文吹鑑再呪曰吾從何所能切鏡視天神收祖三元炁都天大法行上總取八方乾元助太陽幻隂從夜降吾列向五方右法念呪一徧吸天地人門炁吹又念呪一徧吸八方炁再念呪一徧取太陽炁吹鑑次念呪一徧自北方吸炁西南東中五方炁吹鑑可以視天神現形如昬濛未見再持移昬呪移昬寳照呪曰昬移閃破澄角翼新開公明炁斷收入驅擎迮移神清動神清動收收右法靈寳印吸日月明光吹鑑如方差殊未辨再念天都呪天都騰藏寳照呪移炁攅五音天門合入眞邪炁犯五行地炁取三隂法靈催毁眞三陽逐日散逢隂到取陽勑感應絶收勑攝右法念一徧搯靈寳印吸天門炁吹鑑再念呪一徧取太陽炁吹鑑畢再祝召合炤天神名位吹鑑中次持五嶽呪催合炤天神視見靈寳五嶽神照呪紅杏木行斷須呈足卯墨黑水破隂須疾催坎磨眞金切角與西東兊櫗臈火經錬須成我離靈寳土靈寳歸生因中須疾摧疾疾右法以左手輪五嶽印自東北西南中天吸炁吹鑑中分仙眞鬼物之品象萬類邪正之差殊再用三塗呪聚神成眞三塗聚光寳照呪興生轉乾獨𨽻遷坤可韓明巽公都成切角正艮對魂炁收攝中收收收右法念呪吸三塗炁吹鑑詳視中可覩眞象或八方進召神祇移景通見八方事再持換炁呪可以洞明換炁合卦寳照呪換炁移成堅天門立成新知題地戸尋文知炁全中右法搯乾坤靈寳印三次呪三方炁吹於鑑上可鑑八方事如遣而復召當持復見呪七覺換炁復見寳照呪曰隂靈徹覺滅瀆志天祁之神收對聚右法搯靈寳印念呪西北炁吹鑑即得所召之神後現於鑑内五行正炁寳照呪曰紅杏墨黒磨眞襪臈靈寳興生轉獨𨽻遷可韓明功都成切角正聚魂攝功都聚魂招八方捷疾使者天神地祇萬靈同歸合天地勑攝合明天帝日勑攝右法先以左手輪五嶽三塗印取五方炁吹鑑上放印再輪八卦印以右手點鑑上八方八黙再呪曰謹請乾坎艮震巽離坤兊八卦大神催促八方天神地祇吾鑑中見形右法念畢八方炁吹鑑上如照鬼神即攺念呪云收攝八方无道之鬼吾鑑中見形破對籙緑呪曰合咸池聽益緑白霜絹破緑體動朝昬緑破角分别緑依持西明緑可離見盡緑收管攝收管攝右法搯東嶽訣念法東方炁吹鑑辨英爽之衣服鬼魂之器用於鑑中視現知或潜姦隠由可用後法破匿成度呪曰繳意破角力度響名元立名度取性過力分度羅荒秀列破度右以可鑑幽隠或詐妄真正未别書依後法天洞六神呪曰三元妙洞定元華清洞持率勵行洞敕絳霄館洞意歷收李洞分六赤洞切右法靈寳印望天門仰視念呪取炁吹主爲祟自稱大神高仙等以此用之以觀天界知其眞假如或言是星宿直從後法驗之翼宿四神呪曰輪華年翼神清玉月翼神分定取照日翼神歆列助意時翼神右法靈寳印念呪東南炁吹又再呪取𡻕月日時建炁吹主鬼神之妄言爲星宿之形狀或因人忤犯作災祟辨之乃見實端照精樸体呪曰招体四到空五方聚意成呼日結意破見意到數中結理意下成分炁在霞中可朝收意体結撲都意成右法向太陽搯靈寳即念呪吸日光炁吹再念呪向空中取五方炁吹鑑詳之蓋精炁爲物𡻕久作害以此辯精魅結樸爲形之始依何体挺質爲精附人窮源照本事理可見擅興祠廟用後法治之三神對題呪曰破切逆攔交宿送管取到正可明悔廻禄右法靈寳印西北炁吹鑑主鬼神之强捍令癲狂以怪妄擅興祠廟曲求祭祀令其見形把對生人如未眞實再用後呪對望四行呪曰千察移易性行攝列到制足炁行攝移覷辨徳正行攝躡移蹤離可行攝右法靈寳印四方炁吹鑑對辨鬼邪之眞僞證望祟賊之虚實開通四方行跡可見四辨和形呪曰羸正和黒木察運通離忻别移八斷愛利切切切右法靈寳印四方炁吹鑑主諸邪類隨所以好惑人從欲入体乃牽引爲禍祟辨别形影察見根源六玄察隂呪曰堪治渺眞助玄罔貪破玄朝冝到玄呼瀆對玄六白輪轉意玄象移報玄右法靈寳印北炁吹鑑主難明幽冥之章不測之機用法可見七品辨品呪曰開理妙宫長華離宫對中筭宫閻落妙宫取祟破宫寳城離宫對瀆角宿滅耗蝕音犯宫右法靈寳印念法東南炁吹鑑次西南炁吹鑑辨鬼神之邪正品位之大小用去究之即見靈寳无量度人上經大法卷之三十五
