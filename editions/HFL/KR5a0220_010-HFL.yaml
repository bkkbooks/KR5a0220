front:
  text: 靈寳无量度人上經大法卷之十霜九
  hash: sha256:05b9b629c0871ae38155b9368e044a36cd025f6f5810e2d6bc4f39345dd8c125
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_010-001a, image: hfl/0086/0086-174.png}
body:
  text: 洞視降召品夫靈寳降眞召靈乃三洞飛玄之炁自然結成靈章以召三元衆聖萬靈千眞兆既司青宫眞階靈虚仙品欲降致千眞役召百靈以青繒七尺二寸中絶丹書降眞符黄篆召靈符安於靖中用黄錦作席或繒亦得用醮禮祭之毎九日祝五帝内諱存符於掌中九祭之後眞炁結秀於掌中百日降眞召靈使者玉女金童各三人隨祭下降直衞靈文所召眞靈立降子室可以目覩天眞耳聽靈音三祭之後彷彿見形學不信篤五嶽試人輕泄祕密所召不神凡諸天仙眞遵靈符而届前无此神文乃爲妄召雖精思苦徹萬无一報或有降者多是魔試受者當依玄都憲格齎三素繒隨年尺詣于經師戴空而心記不載於文章而恐鬼神禽獸竊視之漏泄玄袐耳虚皇降眞符虚皇召靈符兆當具奏元皇眞王誓請降二符乃爲可用爲靈寳之樞要也修用大法利元通神當淨左手不得犯一切穢汙搯五嶽訣取五方炁吹左手令童男童女善男子善女人吹炁手中三吹三壓見左手碧色或青色乃可入境餘色不可入境五嶽眞諱呪曰紅杏墨黒磨眞襪臘靈寳念呪一徧取五方炁吹訣上不得放訣以右手於空中使二指書召眞符以口吸吹左手念呪五徧取五方炁吹壇所令大人小兒定目覷自已右手令衆人吹自再念取五方炁嚥壓之即令看人開目看自掌心有青色如碧天方始行事如未見再行持於衆人擇其所見分明如法看既見青色即呪曰謹請虚皇降眞召靈符使火急持符見形急急如靈寳律令取東南炁吹左手又令看人三吹自又念呪三吹三壓又令見者看之即見手掌兩冋赤色兩段又請又吹見左向降眞符文右向召靈符文篆文分明然後召靈寳官属見符既見分明令某人定目看官属不可轉睛師當去手不用其官属於空玄之中徃來顯見眞形此靈寳利元通神入境祕訣不載文字口傳心授當謹祕之召降眞靈入局先焚香洗手畢先念五嶽内諱了安坐次以右手於案上書此直花押次以手掬押字入手即輪搯五嶽訣念五嶽諱五方炁吹手三次又於案上書太清押直掬入左手又輪五嶽訣念五嶽内諱吹手如此三次次看手青色如未青色又念五嶽諱五方炁吹直候青色如天碧色即止然後請降眞召靈符使謹請元皇降眞符使玉帝召靈符使速降取西北炁吹於左手青炁上兩邊光見紅色如未見再請降眞召靈符使直至紅色方看左右掌邊見符二道一直篆一横篆如未分明更念降眞召靈符使只要分明即止然後念靈寳靈風聚煙呪曰玉音攝炁靈風聚煙紫虚鬱秀輛翼萬仙千和萬合自然成眞取東南炁吹即見與符俱動如未動更念呪吹然後召五方童子呪曰謹請東方青靈始老啓道童子速降急速現形吾奉帝命與吾速降速東方炁吹謹請南方丹靈眞老啓道童子速降急速現形吾奉帝命與吾速降速南方炁吹謹請西方皓靈黄老啓道童子速降急速現形吾奉帝命與吾速降速西方炁吹謹請北方五靈玄老啓道童子速降急速現形吾奉帝命與吾速降速北方炁吹謹請中央黄靈蒼老啓道童子速降急速現形吾奉帝命與吾速降速上方炁吹候見一方了再請第二方不可重疊一并請也如炁吹之後見影子分明然後念呪吹衣服分明然後看面貌不得看錯子細行用俟見童子了然後請降六丁玉女即念通光大明神呪請六丁六甲玉女現形如大人一心覷定看玉女形狀師收手入袖中念通光大明神呪曰紅杏卯文墨黒坎文磨眞兊文襪臘离文靈寳中指中文興生轉寅獨文𨽻遷卯文可韓明辰文功都成巳文功角正午上移至中指中文搯定聚魂攝右以左手輪訣隨訣念呪取天地人三塗炁吹於鏡中再念呪功都聚魂招八方捷疾使者天神地祇萬靈同歸合天帝敕合明天帝日合明天帝日速露速露㗭哩㗭哩嵌落嵌落嵌落速來速來速來取八方炁連訣吹於鏡上召六丁六甲玉女速於鏡中見形呪曰謹請左飛右靈甲子玉女甲戍玉女甲申玉女甲午玉女甲辰玉女甲寅玉女丁丑玉女丁亥玉女丁酉玉女丁未玉女丁已玉女丁卯玉女取五方炁吹先見炁後見形影衣服深淺後見靣如未分明再念請呪取炁吹之如此都了方許别召仙眞如不依次第必是不應雖應亦艱難此五帝六丁六甲乃萬炁之祖故先召之召青玄府仙靈入局謹請東極宫中長樂舍内大慈仁者尋聲赴感太乙救苦天尊乞降眞炁助臣目力取東方炁吹又念呪曰謹請青玄靈應眞童升降元命急急如青玄天尊敕直如天碧色方止然後只得召青玄府内仙曹逐一現形亦須現炁然後見影後見衣服面貌召太隂宫仙曹入局念太隂帝攝降月君呪月魄曖蕭芬豔翳寥琬虚靈闌鬱華結翹金精瑩炅容臺標取太隂西方炁吹之然後看手内明如月即可召玉童玉女靈官功曹看之召太陽宫仙曹入局念太陽帝攝降日君呪日魂珠景照韜緑映回霞赤童玄炎飈象取南炁吹念畢寫一圈想日念呪取炁吹手中候見光如日即止如未見現再呪之直候見光取南炁又吹如光明即召玉童玉女仙曹等依前現炁影衣服相貌七星宫仙曹入局謹請魁𩲃𩵄䰢魓𩳐魒北斗靈童一呼百應卯中兊戍辰离坤彈斗在鏡上取北炁吹之如現七星方止如未現念呪再吹候見方巳如數内不見一星止注一件吉凶病人不見本命星大凶如七星足然後方可召北斗天神將吏並如前見炁影然後衣服相貌化靖仙曹入局先念五帝諱召玉方童子六丁六甲然後念化靖呪洞中玄虚晃朗太元八方威神使我自然靈寳符命溥告九天乾羅答那洞罡太玄斬妖縛邪殺鬼萬千中山神呪元始玉文吾誦一徧却鬼延年按行五嶽八海知聞魔王束首侍衞我軒凶穢消蕩道炁長存急急如律令取北炁吹即見樓臺宫闕屋宇宫舘亦先見炁次見形影然後召玉童玉女官君等神霄玉府仙靈降眞召靈都呪天書羅敷下盻太微玄化生成靈煙九囘八景六周黄運所持我今大願開發天機龍漢蕩蕩无窮无極普告三界驛龍風馳右呪凡欲召玉府仙曹金童玉女將吏功曹等先三捻上香念呪三徧然後隨所召呪召之自金關侍中三元眞伯至右殿軍隨其所主職事召而問之叩齒三四通將召仙官符於面前香爐中焚之𩀱手玉清訣召神霄仙官呪曰神霄玉清主者眞王文武仙官東西華臺雲錦玊衣玊佩金璫朱履寳冠佩服印章今當召請速降壇場急急如神霄玉清眞王律令敕右法念呪一徧取東南神霄炁吹淨壇中或鑑中隨事召之謹請某仙官疾速降臨吾奉帝勑不得久停急急如神霄真王律令勑如人有災厄即召解厄君如延壽即召延壽君問命禄即召司命司録君如設醮即召左右伶華君隨事召之皆左右凝目將合召仙官符燒於香爐中召玉童呪曰玉帝命下宣靈童速請青羽繡衣玉童霞羽繡衣玉童碧羽繡衣玉童紺羽繡衣玉童絳羽繡衣玉童玄羽繡衣玉童紫羽繡衣玉童黄羽繡衣玉童爲吾速降吾奉帝命與吾速降速召神霄玊童呪曰謹請神霄殿下諸童子號曰玉霞吾奉帝命與吾速降至聖至靈分明現形吾奉神霄玉清眞王律令右法叩齒三通玉清訣東南炁吹燒符如前若要現形先現光次現影子形貌召神霄玉女呪曰玉清神府中有眞仙五色錦衣雲袂羽扇執節執符飛騰九天排列儀衞召集天仙今奉帝勑速降壇墠急急如神霄玉清眞王勑又呪曰謹集柔和之炁九靈女眞命曰玉女鳳衣輕裙眞王之命召降神庭一如律令衣五色繡羽服右法叩齒書符焚香爐中召之召玉女呪曰謹請左靈右飛甲子玉女太玄玉女黄素玉女絳宫玉女青腰玉女常陽玉女直印玉女直式玉女直劒玉女直花玉女直香玉女十天承受玉女辨魔玉女與吾速降吾奉帝命與吾速降速右法叩齒九通玉清訣東炁吹召神霄玉文功曹謹請玉清神府中有仙曹天道地道仙道神道鬼道業道功曹等衆吾今所召疾速降臨吾奉帝命不得久停救治百病斬伐邪精傳達章奏上詣天庭急急如律令敕右叩齒九通書符焚於香罏中召之召功曹呪玄曹玉文立功之官受事玉清奏報三天聞吾一召速降靈壇吾奉帝命與吾速降速右搯玉清訣取東南炁吹之召神霄大將軍神霄玉清十萬天丁金玉介胄龍絛虎巾擒制萬魔收捉鬼神隨符所敕道炁潜營攝魂還魄夀命无傾急急如神霄玉清眞王律令敕謹請神霄某將軍幾人爲吾速降吾奉帝命與吾速降速右搯玉清訣叩齒九通書符焚於香罏中召之取東南炁吹召神霄霹靂摧魔呪神霄玉清髙上玉清中有雷電霹靂諸神天丁力士行風行雲霹靂百魔摧伐妖精左擲流電右擲火輪伐暴誅惡霹靂錚轟雷兵千萬火炁腥煙吾今所召立赴壇前不得稽遲救護黎元急急如神霄玉清王府律令敕召神霄雷部靈官呪南司火府韓君上宫龍圏雨部雷宅神庭五方電主霹靂神丁受命眞符上召主靈天尊教令風火不停速駕十方法雨慈雲迅雷捜龍烈風雷火掃除不祥摧碎魔群天獄收妖速降眞靈急急如可韓玉帝洞淵三昧敕右叩齒九通搯玉清訣書符焚於香罏中取東南炁吹之召仙官呪髙天之上玉清爲主靈寳三炁二省樞主上帝主之天曹王府各有所職下助玉府分品列位仙官所處聞召下降一依天璽急急如律令右叩齒九通搯玉清訣書符焚於香罏中取東南炁吹之召大洞百靈神呪玉清眞王大洞聖眞眞諱隱道黄室童君雌雄玉女混合將軍召出身中疾速現形修行大洞飛昇玉清降臨眞炁合服眞形使我徹視萬劫无傾急急如髙上神霄玉清眞王律令右叩齒九通搯玉清訣書符焚香罏中取東南炁吹召仙曹總章呪髙上之天玉清爲主玄罡大魁太玄生府中有帝君寳虚王母統制嘯詠玉文金符司治仙禁金童玉女校精辨魔統制百史上達三天形成司舉傳奏教令蠲災救苦備衞護道囚縛鬼侮流浪諸天濟生度死解厄摧怪通達紫府十天告命召其所主急急如上清靈命元始上帝律令敕右叩齒九通搯玉清訣書符焚於香罏中玉清科曰齋九十日召降仙靈玉清局東南炁神靈降彷彿自知先見炁次影次色次衣次貌隨見三育平局次鏡次如意次空一呪一金青分破失之不至三失永失非金骨玉相慕道如渴嬰求母乳去財若百蛇之去肌切不可傳泛好末學之流靈寳无量度人上經大法卷之十
