front:
  text: 靈寳无量度人上經大法卷之二十一生一
  hash: sha256:bf4c99dd68513e389a5e2be9b714bd365ae70ef5c3332d7ed85c8a957ba49b17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_021-001a, image: hfl/0089/0089-004.png}
body:
  text: 五嶽眞形品音漢孝武帝好長生之道常祭祀名山大澤祈祀靈嶽以求神仙之應以元封元年正月甲子登嵩髙山起道宫帝齋七日祠訖乃還至四月戊辰閑居東方朔董仲舒在側忽見一女人著青衣非常之麗帝愕然問何人女曰我墉城宫玉女也爲王母所使從崑山來語帝聞子欲輕四海之禄尋道求仙降尊王之位而屢禱山嶽勤哉有心仙可以教百日清齋不交人事到七月七日西王母當暫來武帝下席跪諾言訖女隱忽然失所帝於是登尋眞之臺齋靜存道其四方事權於大臣到七月七日乃肅宫掖之内設座於大殿之上以綺羅薦地燔百和之香張雲錦之帷燃九光微燈設蒲桃蜜醴爲客主之饌帝乃盛服立於階下勑端門内一不得妄有窺者内外謐寂以俟仙官到夜二唱之後忽見天西南如白雲起鬱鬱直來逕趣宫庭須臾轉近聞雲中簫鼔之聲人馬之響復半食項王毋至懸頭殿前有似鳥集或駕雲龍虎或乘白鹿或乘白麟或乘白鶴或科或車或乘天馬群仙數千充滿庭宇既至從官不復知所在唯見王母乘紫雲之輦又駕九色斑龍列五十天仙側近雲駕皆身長一丈同執柔旄之節佩金罡雲璽策天眞之策倚柱殿下母扶二侍女上殿侍女可年十六七服青綬之桂容眸逺盻神爽清發王母上殿東向坐著黄錦袷䙱文彩鮮明金光奕奕交帶雲飛大綬腰分景之劒頭上太華結戴太冥晨纓之冠躡玄瓊鳳丈之舄映朗雲楝神光暐曄眎之可年三十許修短得所天姿菴靄雲顔絶世眞雲人也下車登牀武帝拜跪問寒暄畢丘如也因呼武帝共坐帝南面向王母自設厨厨精麗非常豐珍之餚芳華百果紫芝王蘂粉若塡𥛧清香美液非地上所有甘炁絶殊武帝不能名之又命侍女更索桃果須臾以玉盤盛桃七枚大如子形圓色青以呈王母王母以四枚與帝王母自食三枚桃之甘美口有盈味帝食桃輙録核王母問録核何爲帝曰欲種之耳王母曰此桃三千歳一生實夏地薄種之不生如何帝乃止遂下地叩頭自陳曰徹受質不才沉淪流俗承禪先業遂覊世累政事多闕兆民不知風雨失節五禾無實徳澤不逮冦盜四侮當非其主積罪山嶽然少好生道仰慕靈仙未能棄禄委榮栖迹山林思絶塵耳罔知攸向且捨世尋真鑚啓無師歳月見及恒應奄忽不圖天仙頓集今日下臣有𦍒得瞻上聖是臣宿命當得度世願垂哀矜賜諸不悟得以奉承切忌之教王母曰汝能賤榮樂卑耽靈味道自復佳矣然汝情姿體欲滛亂過甚殺伐非法奢侈其性姿爲裂身之車滛爲破年之斧殺則響對奢則心爛欲積神殞聚穢命斷以子蕞爾之身而宅滅形之賊盈尺之材乃攻之百刄欲以此解脫三尺全身永久難可得也有似無翅之鷃願鼓天池朝生之菌而樂春秋者也若能盪此衆亂撥穢易韻保神炁於絳府閉滛宫而不開靜奢侈於寂室愛衆生而不危守茲道戒思手靈味務施惠利鍊精惜氣俾却浮麗令百競速逝汝行有若斯之事豈無彷彿也哉如其不爾无爲抱石而濟長津也帝跪受聖戒請事斯語帝見王母巾中有一小卷經盛以紫錦之囊帝請問此經是靈方即不審其自可得瞻盻否王母出以示之此五嶽眞形圖也昨青城諸仙就我請求今當過以付之此乃三天太上所出文祕禁重豈汝穢質所宜佩乎今且與汝靈光生經可以通神勸志也帝固請不巳王母曰昔上皇清靈元年三天太上道君下觀六合瞻河漢之短長察丘山之髙卑名髙柱而安乎地理植五嶽而擬諸鎭鋪貴崑陵以舎靈仙尊蓬丘以館眞人安水神乎極隂之源棲大帝乎榑桑之墟於是方丈之阜爲理命之室滄浪海島養九老之堂祖瀛玄炎長元生流鳳麟聚窟各爲洲名並在滄流大海玄津之中水則碧黑俱流波則震蕩群精諸仙玉女聚居滄海其名難尋其實分明爾乃因山形之規矩覩河嶽之盤曲陵回阜轉山髙隴長周旋委蛇形似書字是故因象制名定名實之號畫形於玄臺而出於靈眞之信諸仙佩之皆如傳章道士執之經行山川百神君靈尊奉親迎汝雖不正然數詣山澤叩求之志不忘于道欣子有心今以相與當深奉愼如事君父洩示凡人必致禍考按九老仙都千明之科九炁丈人照生天符大靈群文皆是三天太上道君所撰或是三皇天眞所造或是九天父母眞人赤童所出此輩三十年得傳一人四十年无其人聽八十年頓二人耳授非其人是爲洩天道可傳而不授是爲閉天寳不計限而妄授是爲輕天老受而不敬是爲慢天藻洩閉輕慢四者延旤之車也洩則身死道路受亡形而骸裂閉則盲聾於來生命凋枉於卒殁輕則禍鍾於父母詣酆都而考罰慢則暴终而墮惡疾於後世復有愈此罪者宗斷而族滅同道謂之天親同心謂之地愛傳授當相親愛共約榮辱營心眞一一珍精液共養和氣氣全神歸必齊靈會如其不爾天降汝厲此皆道之科禁今古相誡不可不愼若汝有所授董仲君者似其人也即命侍女更取一圖以與武帝侍女探懷中得一卷形書精明俱如向者王母以手付帝帝再拜跪受王母曰若汝遂克明正身反惡修善復三年七月更來告汝道也須更殿南朱鳥䆫中有一人來看闚王母帝驚問何人王母曰汝不識此人也是汝侍郎東方朔也是我隣家小兒性多骨稽曽三來偷此桃子昔爲太山仙官太上令到方丈使助三天司命攷諸仙家朔到方丈但務山水遊戲了不共營和氣擅弄雷電激波揚沙風雨失時隂陽錯逆致令蛟鯨陸行山崩境壞海水暴竭黄馬宿測妨農芝田沉湎嗜酒失部御之和𧇊奉命之科於是九源丈人乃言之於太上遂謫斥使在人間去太清之朝令處濁臭之倫近黄金華山二仙人及九嶷君比陳乞以行原之於是帝始知朔非世人也言語飲食因告武帝仙官從者姓字及冠帶執佩物名所以得之而紀焉至向晚王母别去臨發人馬龍虎鼓吹導引如初來時雲氣勃鬱盡爲香氣極望西南良乆乃絶於是帝既見王母乃信天下有神仙事欲有去世計數矣而滛色自任殺伐不休百姓歎於勞役死者怨於無辜不從聖母之言遂不復來先王母見帝多所稱說或延年之訣致神之術帝自撰集一卷及所與經圖之属帝乃盛以黄金之几封以白玉之函安著栢梁臺上後到太初元年天火焚臺於是眞形及靈光生經自撰受集要遂爾燒失王母以武帝不從訓誨而灾之耳但帝先承王母言祝圖授董仲君仲君登寫頼此得在也其後一旦東方朔乘雲龍飛去時衆人見從西北上冉冉仰望上天大霧覆之不知所在帝甚懊恨自知失道其年十二月襢蒿里祠后土東臨勃海望祀蓬萊山春還受計于甘泉二月起建章宫夏五月正曆以正爲歳首色尚黄數用五定官名恊音律遣將軍公孫敖築塞外受降城秋八月行安定遣貳師將軍李廣利發天下謫民西征大宛玄攺暦以正月爲𡻕首是王母意也靚察王母衆仙之宗珍貴此文何況凡近小人而欲盻之乎漢武帝以王母言問東方朔朔對如别青牛先生言家有五嶽眞形一嶽各遣五神來衛護圖書所居山者山澤神又𢘆遣官防身營家凶逆欲見傷害皆反其殃辟五兵五瘟可帶履鋒刄又司人之奸穢言人之不正不正者禍身奸穢者禍門是以深冝忌愼人有帶此文及執持以履山林者百山地源靈主皆出境拜迎尊貴圖信鬼神猶執卑降禮何況凡人可慢墮哉江河淮水及中央之山林陵阜皆統中央之部也諸入山採八石石象石腦流丹流珠飛節黄子石髓桂英及芝草藥自无五嶽圖佩之此仙物終不可得也欲佩之法以青爲繒或用白爲繒盛以紫囊或帶之頭上或帶之心肘山无大小皆有靈神神來形見自稱某山某甲來迎是太上眞人以爲竹使策文五嶽衛此圖經如今世人敬監司之章節杖所以丘山之神來拜謁也受付之法限之四十年一傳盟血誓而約人有此文在家者五嶽各遣五神來奉衛圖文所居山川源澤諸靈各遣侍人營護子身他人憎疾謀議口舌逆賊凶害及縣官繫子者五嶽所衛二十五神及山川侍官即白所居之部嶽君即使鬼物反害彼人還自中也奉之者不可不正身清神若行邪亂慢不尊所受忽賤靈信輕侮宗教者禍至滅家不可不愼入山无眞形則衆精壞人採藥不得眞形則群靈蔽之爲道不得眞形則魂炁不定三尸恐亂千道萬事不得此文皆不成就但有此文以佩身乃足彌綸家神横行天地在家則神人奉衛入山則群靈奉迎採服芝草則眞仙營護經疫渉害則天災自滅爾乃虚往實來眞驗禍福將來有道者其祕而尊焉漢元封元年西王母授孝武皇帝五嶽圖序東方朔所出五嶽眞形者是山水象也磐石迴轉陵阜形勢髙下參差長短舒卷波流湧於奮筆鋒芒暢乎嶺崿雲林玄黄有如書字之狀是以天眞道君下觀規矩擬蹤趣向因如字之韻隨形而名山焉子有東嶽形令人神安命延存身長乆入山履川百芝自聚子有南嶽形五瘟不加辟除火光謀惡我者反還自傷子有中嶽形所求唯利致財巨億若欲剋合不勞身力子有西嶽形消辟王兵入刄不傷山川名神尊奉司迎子有北嶽形入水却災百毒滅伏役使蛟龍長享福禄子盡有五嶽形横天縱地彌綸四方見我歡恱人神攸同昔黄帝徴師諸侯與蚩尤戰於涿鹿之野遂禽之諸侯咸宗軒轅爲天子代神農是爲黄帝天下有不順者從而征之破山通道未甞寧居東至于海登泰山勒武宗西至崆峒登雞頭南至于江登熊湘北逮輝粥合符釡山而邑於涿鹿之野遷徙往來无有常處察四嶽並有佐命之山惟南嶽孤特而无輔乃章詞三天太上道君命霍山潜山爲儲君奏可帝乃自造山躬寫形像連五嶽之後又命青城爲丈人署廬山爲使者形皆以次𥘉續此適始於黄帝耳東嶽泰山君領群臣五千九百人主瘟治生死百鬼之主帥也血食廟祠宗伯者也俗世所奉鬼祠邪精之神而死者皆歸泰山受罪考焉諸佩五嶽形入經山林及詣泰山泰山君及諸山百川神皆出境迎拜子也泰山君服青袍戴蒼碧七稱之冠佩通陽大明之印乘青龍從群官來迎子南嶽衡山君領仙官七萬七百人諸入南嶽所部山山神皆出迎南嶽君服朱光之袍九丹日精之冠佩夜光太眞之印乘赤龍從群官來迎子中嶽嵩髙山君領仙官玉女三萬人入諸山是中嶽所部名靈皆來迎中嶽君服黄素之袍冠黄玉太已之冠佩神宗和陽之符乘黄龍從群臣來迎子中嶽是五嶽之主子善敬之太上常用三天眞人有徳望者以爲君之西嶽華山君領仙人玉女四千一百人道入其所之山川神並來迎華山君身服白素之袍冠太素九流之冠佩開天通眞之符乘白龍而來迎子北嶽𢘆山君領仙童玉女七千人入其所部之山川神皆來迎北嶽君服玄光之袍冠太冥靈隂之冠佩長津悟眞之符乘黒龍來迎子青城丈人黄帝所命也主地仙人是五嶽之上司以緫群臣也丈人領仙官萬人道士入其嶽丈人服朱光之袍戴蓋天之冠佩三庭之印乘科車從衆靈而來迎子廬山使者黄帝所命位比御史主緫仙官之諱蓋五嶽之監司道士入其山使者服朱緋之䙱平華之冠佩三天眞形之符而來迎子亦乘科車霍山南嶽儲君黄帝所命衡嶽之副主也領群靈三萬人上調和氣下拯黎民開衆仙制命水神是峻騤之府而爲諸靈之所愼也道士入其境儲君服青錦之袍戴啓明之冠佩道君玉策而來迎子或乘車虎无常潜山南儲君黄帝命爲衡嶽儲貳時叅政事合職以輔佐者也入其山潜君服紫光繡衣戴叅靈之冠佩朱官之印乘赤虬之車來迎子諸佐命山君並輔弼嶽君預於政事道士入其山佐命服朱袍戴仙華冠佩太上眞形章而來迎子所乘无常東方朔言古畫五嶽眞形首目者乃是神農前世太上八會群方飛天之書法殆鳥跡之先代也自不得仙人釋注顯出终不可知凡道士欲佩圖唯取山象及書古文卷異以此題外靣然後盛之帶符常得正月寅建齋七日於齋中寫符訖醮如傳法但易章中自說辭旨可隨人也几書寫皆燒香於圖左右靈寳五嶽眞形圖三天太上長存符道士佩之入山林江海横行天下衆神奉衛莫敢當子齋祭帶寫如五嶽同一名太上道君敕文不可見東方朔顯出之此乃鳥跡以前有𩔖三皇文佩之者與五嶽眞形共盛唯仙人題山中名物芒處作謹字外不得一上之耳有命天地山丘陵神護我子愼害患令久安長全東春東嶽眞形圖南夏南嶽眞形圖中央戊巳土中央眞形圖西秋西嶽眞形圖北冬北嶽眞形圖青城丈人青城山眞形圖保運眞君廬山眞形圖霍山南儲君霍山眞形圖潜山南儲君潜山眞形圖墨有山形赤者水源黄者洞室穴也畫小者則形微大者則隴洪髙下隨形長短取象其源畫神芝草有室之處自是後來出人皆於山處識而志之靈寳旡量度人上經大法卷之二十一
