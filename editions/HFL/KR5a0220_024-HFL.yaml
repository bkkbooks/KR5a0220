front:
  text: 靈寳无量度人上經大法卷之二十四生四
  hash: sha256:e3caea5a9267f38d1d1b90370214fffef72d8b6f971ffb13075aa716397a24c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_024-001a, image: hfl/0089/0089-100.png}
body:
  text: 吐納正炁品經曰引炁三十二過又曰玉音攝炁靈風聚煙紫虚鬱秀輔翼萬仙玄師曰靈寳正炁即三十二天正眞道炁若不採納此炁内修無功成之基外施无感應之驗空尸行上道下鬼誦靈章徒用施爲東方八天之炁太皇黄曽天黄炁太明玉完天緑炁清明何童天青炁玄胎平育天赤炁元明文舉天蒼炁上明七曜摩夷天黒炁虚无越衡天黒炁太極濛翳天紫炁玄師曰歩斗牛女虚危室璧之罡取炁則八天天君遣眞仙侍衛能洞觀八天之事所適无礙南方八天之炁赤明和陽天白炁玄明恭華天緑炁曜明宗飄天黄炁竺落皇笳天青炁虚明堂曜天赤炁觀明端靖天蒼炁玄明恭慶天黒炁太煥極瑶天碧炁玄師曰歩角亢氐房心尾箕之罡依色取炁則八天天君遣眞仙侍衛能洞觀八天之事所適无礙西方八天之炁元載孔昇天紫炁太安皇崖天白炁顯定極風天黄炁始皇孝芒天緑炁太皇翁重浮容天青炁无思江由天赤炁上揲阮樂天蒼炁无極曇誓天黒炁玄師曰歩井鬼栁星張翼軫之罡依色取炁則八天天君遣眞仙侍衛能洞觀八天之事所適无礙北方八天之炁皓庭霄度天碧炁淵通元洞天紫炁太文翰寵妙成天白炁太素秀樂禁上天黄炁太虚无上常融天緑炁太釋玉隆騰勝天青炁龍變梵度天赤炁太極平育賈奕天蒼炁玄師曰歩奎婁胃卯畢觜參之罡依色取炁則八天天君遣眞仙侍衛能洞觀八天之事所適无礙玄師曰並先叩齒九通自天門入上元綱流演至宿分歩之存一天如金樓玉殿天帝端坐衣服如天之色口吐本炁如𢇁鬱鬱然布於兆口中各從其數凡有所奏依帝玄治炁中黙奏立待感通四維梵天中斗罡皆取直宿日服兼於四天並行圖局宿罡知後缺圖經曰眞中有神長生大君无英公子白元尊神太一司命桃康合延玄師曰此二章中大洞之道上道禁經有九眞中經上議長生大君變化萬神凡人生太微降炁生人方始分形脫胎自生之後三萬六千神俻而壽至三萬六千日神歸太微中則曰鬼也鬼者歸也有一生罪咎損炁抛神自取死壞故不滿天年而夭亡襁褓者神不全也神不全則形不固況小罪折一筭而北斗追取三日之神大惡減壽一年則拘去三百六十神炁一小善則増一筭而三日延生添神一大功則益壽一年而三百六十日延壽降福所以増減也此之七神乃北斗隂神又曰玄丹太一亦上道禁典若知此道則添神益壽萬劫長存元尊長生頌曰中天有斗主魂魄玄丹太一七隂神手握靈旛攝百神與奪善惡増減形一筭三日除其生一歳三百六十停有人知此運七靈昇入玄天開七門三魂鼔舞合一形百神歡悅歸歸俻欲得此道何所云元谷火起飛七神徑入斗中開玄關再拜扣搏天地間回元惡逆除死名降神益筭保生成可以分形爲億兆可以廻骸致天仙黙黙内外萬物忘猿馬死而隂返陽此道祕而不妄傳守之億劫永長存刻金列名奏三天輕泄永閉於河源但須守心使石堅百日神全活根元飛玄紫炁品玄師曰三十二天之根有西元龜山元録内有丹黄飛玄紫文空洞靈章是也色界魔王云我有洞章正是此文也飛玄紫炁凝神根綱維玉靈總萬神空中鬱勃結自然上有凌層十二傳玉樓峨峨曜景雲流精紫闕帶金軒瓊堂瑋鑠繞八騫中有青金九靈仙丹皇眞母號精延飛青羽䙱晨嬰冠手執玉節握靈旛五色命魔對帝尊把持符籍當生門咀日嚼月噏醴泉離羅吐暉煉五魂内充外溢絳府欣金光煥煥形正圓從朔入金色純純唯有開明曉此言日五月十精比元克見華蓋領仙君紫炁左回與斗連歷度四七入金門正是丹皇校萬仙有明此訣加精勤披形宻思每令分妙景感會得要文三年當守保長存九年乘空致羽裙鳳衣輕翔升龍山俯仰九靈謁玉宸右修其道以一年計十二月毎月中三日五日九日十五日二十五日一月五過清齋詠玄文一徧以半夜後仰視西方金門之上若在人間天隂无光當於室内黙念内思如法思紫雲自金門左靣歴箕斗回繞北斗意還金門之上每令分明思畢當心拜紫雲四過叩齒三通仰祝曰天氣朗清幽虚啓眞流炁徘徊金華四騫丹皇敷暉靈飛雲軿是夕開陳青金受仙成我上願体應自然結命月華保命日根三靈合景停景龍山密夜清披請如斯言呪畢便鼻引紫炁二十八嚥止行此三年别有神仙降兆寢室也身有紫雲霞映絡一身九天書名九年必獲神仙玄師曰天有紫雲之炁干於日月五景北斗之分在其方國皆有得道之人得仙之君如此了候其象自見得見紫雲便依文禮祝不必須其常日也勤加其意克得雲降昇騰有會也況紫雲黄炁徘徊於巖谷如茵如蓋或赤白黄青紫絳黄白或五色雲炁光明四靣丹霞者皆天尊上帝出遊在山谷者有得道之人居也又宜徃此而修錬或俯盻仰視天尊眞人而會見時急燒香再拜陳其心願勤行之必見帝尊之容立致飛升止可封之於心不得輕以示人道泄則靈散仙无由可成如文始先生尹君侍金闕聖君爲標凖也兆宜謹之勉而行之三一玄微品九霄君曰夫三一者造化之機關也非獨至藥有之而人身中亦皆自有自俻若能修身中三一者即子母不相離神炁自相守怡怡和煦光照明白子不見正陽之月當晝景風雲不生纎羅不動碧空澄澈豈有障翳哉人亦有之若能調三一則萬慮不生與碧空之炁相合内外光明盧无同體亦可以升騰矣世人或有竊聞此道者云是服炁乃鼻吸口吐鼔腮强咽立可致其殞斃亦猶藥中錯服毒丹不可赦也蓋身三一與至藥不殊祕訣不可輕授玄師曰上一九天帝帝君諱玄天字三元一名伯无上一名伯史華執神虎符青玉函中右有帝卿名肇勤精字中玄生一名起非一名常扶大洞經紫玉函中從天仙兵馬一萬二千人其上一長九寸九分著紫繡金帔戴玄寳冠坐七寳之座或時乘九龍之車遊歷三界手執天寳之爐治化玉清上一玄尊有二大臣合成三人左臣號玄一道君頭青衣青衣右臣號太和老子頭白衣白衣二神爲道之魂魄也上一帝君居兆泥丸宫有日象圓九寸赤光紫芒衝天萬丈上有斗覆斗柄指前狀如嬰兒衣紅錦衣祝曰交度神炁神飬骨髓納我華精神炁塡滿體發光鮮上元眞一符玄師曰中元帝一眞皇諱神運珠字子南丹一名生上伯一名史雲拘執火星一符玉函中右有輔卿名中光堅字四化靈一名幽車伯一名重史華執明月珠從神仙兵馬一萬人其中一長六寸六分箸丹錦之帔戴九鳳之冠坐七寳之座或時乘九驎之車遊歷十方手執金鑪治化上清中一元尊有二大卿左號眞人右號光堅入兆鳩尾三寸中心如蓮華中有日象赤焰衝天帝君衣丹錦衣坐日象中祝曰散輝赤子還魂復魄返老嬰童度命廻年保命无窮中元眞一符玄師曰下元帝一元王諱始明精字谷下玄一名嬰兒胎一名伯史原執金星大有經黄玉函中右有弼卿眞人名歸上明字谷下玄一名奉申伯一名承光生執明月珠從地仙兵馬一萬一千人其下一長五寸五分箸黄錦之帔戴九龍逺遊之冠坐七寳之座時或乘五色獅子之車廵行五嶽手執香寳之鑪治化太清下一元王有二大臣左有幽精右有帝卿入兆臍下三寸名下丹田中有月象黄色滿丹田元王永黄錦衣狀如嬰兒坐月象中口中吟曰玉莖白珠液凝結爲白神養形五老符拔籍帝一軒命門不可傾金液不可愆回精白滿塞勿漏玉水泉生死皆所由閉之乃神仙祝曰清蕩穢濁除故納新生我五老帝眞化形變化骨髓腸化爲筋金骨玉髓契道契眞自然變化壽禄无窮永與三寳同保命根下元眞一符右自半夜至巳時存上元眞一自午至日晡存中元自黄昏至夜半存下元乆乆存之眞一現形與子通接言語穿星度月審覆章奏教子通玄之術其三一上道不得燥怒及犯淫色怒則三一去失淫色則功不成不得抱初生嬰兒謂其有淫穢之炁未除觸犯三一之道行住坐卧應當存之三一玄微奧旨玄師曰欲達玄微之妙當靜行之春分日夜半子時起坐東向瞑目存我身中三一之卿及我合七人我在中央俱乘紫雲之煙共登北斗陽明者北斗之東神也於是存入星中央而坐之吞紫炁三十過行之乆乆自見陽明東元太上宮宫中有青玄小童授子眞炁也先當北斗星下紫炁大如絃從星直上直下注我前然後乃存三一周君口訣存七人中斗七星而共登陽明鴈行我中央中星者以魁覆頭柄杓指前吞紫炁三十過我存紫炁而嚥之也又思三一之卿並同時吞之也吞畢更存七人縁向者紫炁宫中來下還兆之宫良乆心祝曰三尊上眞太玄髙神陽明主春萬童開行丹元主夏朱紫合煙隂精主秋天威六陳北極主冬萬邪塞奸五土秉壬戊巳天關所摧皆滅所向莫干煉我七魄和我三魂生我五臓使我陽眞登飛上清浮景七元長生順住嘯命千神兆亦可眠存之四節共此一呪太極寳章太上寳章傳太帝君太帝君傳天帝君天帝君傳太微天帝君太微天帝君傳金闕帝君金闕帝君傳東海青童君以封掌名山召制五嶽以朱書素上佩之左肘勿輕汙穢佩之八年三一俱見矣正月旦日青書一符北向再拜吞之三一相見之後以金爲質長九寸廣四寸厚六分刻而書之以封山川之邪神掌五嶽之眞精也臨時三元眞一君當悟兆施用莭度神眞之道也服符北向叩齒三十六通因仰呪曰三眞守房元老固精天地混合三炁交并帝君威策命章攝靈旨山召海摧滅群精促召北帝排列魔名撿統无横敕還鬼營又呪太極帝君三元眞一東海青童度人視現佩受吞服洞見鬼神山川五嶽受吾所轄帶持永乆同章飛斗太極寳章三一眞符左手中指恰掌心大指掐子文右佩符封山召海制御萬靈役使禽獸伏諾天兵遊行五嶽臨時皆當先叩齒三十六通存七星覆兆身頭上口吐赤炁冠滿一城四靣周币焚燒内外无復孑遺見巳身在火中央須臾有五嶽神官及山野之獸來朝巳身便呪曰元始出令宣告萬靈天眞帝君與炁同生自下總統悉歸上清若有不及收攝眞形封山召海應令摧傾速來自伏不得稽停急如正律无令越冥畢嚥炁三十六嚥以待旨之三一元神諭三身一體吾所化三一之神本眞一一神自巳元神所化也一身不眞二化假眞一之神妄想而存不眞吾二神亦假非眞三一元王不用存三一之神自然之化所化人身各有之存之不眞成意馬以意所存乃成妄想一念之間使忽化應經云一回存想一神出不知一日損一日蓋言此也凡修天仙之道行玉清正法者當遇六甲六丁之日冥心定神於子午卯酉四時入靖焚香朱書當日符存當日神將玉女靣北吞服定思端坐瞑目握固想五方洞陽太靈五色眞炁自太空而下直貫兆身從泥丸入鬱鬱旋回九度入絳宫運合帝宅次入崑崙臍也與兆三一三炁青黄白正神混然一體須臾自然升降行之一年三炁萬神出見兆身應化无所不至然後歩二十八宿罡請三十二天炁入丹田結三十二玉字升至泥丸諸天化萬神可以用攝召萬神章下告三界以飛玄三炁章上奏天省章表存拜立致神化无不允可凡修天仙之道行玉清正法者擇本命相生日端坐調息勻閉口出息以心神馭炁呼致於根直至命元吸至於蒂夾脊上朝泥丸綿綿若存用之不勤俟炁勻息定任其出入三日光白眉七日凝神癡十日神達飛忽然對靣見巳耳中仙音風雨須叩玄關使三宮通達乆日三田孕寳可錬神丹凡修天仙之道行玉清正法者以元神日於大鏡中子午卯酉四時照巳一一閉口存見不差以甲子日子時靣南叩齒鳴天鼓各三八通疊手端坐調息勻如前想身入下丹田中白炁内約一寸二分如嬰兒漸至脾衝華蓋度重樓過金房二穴入泥丸出頂門立存紫炁黄霧氤氲覆蓋然後疑疑移歩下至頂門至靣前相對立想如一二歳小兒如已兒不得顧視他事恐爲境所奪便却再想騰身從頂門泥丸而入下二穴度重樓復入丹田如此爲一功常日行住以神馭炁存三一眞君如一月足子午二時放弄一月後漸存長大與身等出入徃來行歩習與人言語加之閉息住胎中尤見功捷一百日想羽衣升騰朝元凡修天仙之道形炁内全出入无間上朝太虚下遊五嶽一念之間洞然无滯凡所騰奏三清九霄諸天仙界則召攝所受法籙中眞仙官吏丁甲將軍玉女金童功曹使者與身中三炁正神窈然泰定冥合虚无上升九天神與道合炁與眞化每遇行持之日未篆其符吞之次呼召存神冥心靜念形炁都融衆神與兆一身三宫正神混合妙化心合太虚萬神俻体一念之間无不洞徹上朝三境隨意所陳則无不克應先吞符依符召攝存金上相上宰上輔上保眞伯仙伯候卿籠巾貂蟬冠絳服履珮次存眞官仙官俯仰冠青帔圭履次存六甲六丁大將軍金甲兠牟仗錦旛次存六丁六甲玉女鳳冠羽服執鏡次存六甲六丁金童青衣雙髻捧文字次存運神會道功曹側子玄冠緋衣抱文字次存運神飛玄功曹使者幞頭抺帶抺額青黄紅錦衣魚尾刀巳上各一十二人次冥心靜念形炁都融調息滅念窈然泰定然後召攝萬神自下丹田入混合巳神至中丹田混合丹眞至上丹田混合帝君如法在三炁中上相仙官出上元侍立上部左右青炁中將軍玉女金童出中元立中部左右黄炁中功曹使者出下元立下部左右白炁中自已出紫戸忘形冥合太虚然後舉一念上朝三境隨意所陳下遊五嶽隨心祝說无滞无不克感運神合景飛玄會道九靈飛歩章奏祕旨靈寳无量度人上經大法卷之二十四
