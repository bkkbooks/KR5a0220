front:
  text: 靈寳无量度人上經大法卷之四十七水七
  hash: sha256:73fc2cc6aa493b8d922822c62b08caf323a24933dbb530e087981e5cd71d33e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_047-001a, image: hfl/0094/0094-004.png}
body:
  text: 壇圖幕式品壇外燈圖右壇外燃燈合一百五十九燈太嵗燈隨年建本命行年大小墓燈隨齋主生属安之本命行年燈隨十二支轉大小墓燈以五姓納音推十方九宫二十八宿五嶽燈並於逐方然之七祖九幽燈本法然於中庭恐妨行事可以西南然七祖燈於鬼門然九幽燈建立壇墠黄籙建立壇墠法天家地周布星𨇠飛空歩虚旋綱躡紀或露於三光之下或建於厦屋之間或珠宫素巳築成或私室臨事創立必在規程合格制度不差是以先代宗師無不注意廣成先生曰齋壇定制固不可違若經營之時必須詳審裁木壘土依法爲之今時常情皆以露壇爲宜殊不知誠之所感九天非遥志之不通跬歩爲逺若丹襟動於真聖注念合於神明豈屋之能蔽乎禁壇之後不可壇内逆行及歩驟往來失雍容庠序之規有匆遽奔馳之貌體貌既紊誠敬全𧇊故儒家盛服失容不祭蓋虞於此耳將伸齋薦宜深思焉壇法外級廣三丈六尺髙三尺六寸又法廣五十尺中級廣二丈四尺髙二尺四寸又法廣三丈六尺一級廣一丈二尺髙三尺又法廣一丈八尺壘以寳塼砌以文石或材木暫建壘土創成務合規程以崇朝奏之禮或露於空明之下以逹志誠或建以天寳臺取法上境建齋行道以此爲先中列太上三尊之像如朝會玄都玉京也壇上下四重欄楯天門地戸飛橋等務令精好纂作瑞蓮之狀或八十一七十二六十四四十九隨壇廣闊設之壇下或布塼作砌外廣八尺壇法立纂各以青絳繩縻之無使傾倒秪開東南西北門餘皆攔斷三級之外欄竿亦依數立也朱爲長纂黒爲短纂中門及十二門上皆安燈不在此數其所排燈位略標大槩其數多少隨力所營或秪依然燈威儀簡文所載然之亦可照耀諸天續明破暗下通九幽地獄上照无極福堂功徳之中最爲上法或兼諸香液或雜以蘭膏鸞燭千巵鴛燈萬熖攅花疊蕚鳳羽鯨鱗照灼竒姿熒煌異狀或傍分月像擬霜兔之精神逺寫日芒模梭烏之羽翼或綴南箕之勢或傳北斗之形或縷以篆文或圖成真像依稀衆釆散亂俾群儀合規自然獲福修崇之士則而象之可也外壇長纂八門榜十氊蓆裀蓐等威儀在外壇分左右序立中壇長纂八短纂十二門榜四氊蓆裀蓐等内壇長纂十八短纂十門榜十裀蓐等上安十方洞案及經案立天寳虚皇之座六職知磬表白詞懴印劔童子下上餘不可登五色幡花然燈如法壇榜篆文外壇門榜八乾宫梵通之炁黄書黒榜西北乾地坎宫洞隂之炁黒書赤榜正北子地艮官梵元之炁黄書黒榜東北民地震宫洞青之炁青書黄榜正東卯地巽宫梵行之炁黄書黒榜東南巽地離宫洞陽之炁朱書白榜正南午地坤宫梵隂之炁黄書黒榜西南坤地兊宫少隂之炁白書青榜正西酉地中壇門榜四日門黄書青榜寅地月門黄書白榜申地天門青書黒榜亥地地戸黄書赤榜巳地内壇門榜十東南始陽生炁門白書黄榜辰地下方九靈皇真門黄書青榜巳地南方洞陽太光門黄書赤榜午地西南元黄髙晨門白書黄榜申地西方通隂金闕門黒書白榜酉地西北九仙梵行門白書黄榜戍地上方大羅飛梵門青書白榜亥地北方隂生廣靈門青書黒榜子地東北靈通禁上門白書黄榜寅地東方青華元陽門朱書青榜卯地羽蓋瓊輪之符玄元祖炁混沌十羽蓋結凝之根囘靈丹輿緑輦之符絳實寳飾輝精舉輦命茟敷陳交映風程朱鳳之符朱鳳驂轅辟穢張威四靈飛舞振伏華肩玄龍之符五色玄龍飛蹈交肇建禦太空運始奔衢九色之節符蕭仭寳光受化虚皇純陽華結梵散十絶靈旛之符飈營鬱勃寳光曜輝萬聖散施奪日瞻依九鳳齊唱之符元炁散廓雲霞彩光結化九鳳飛蹈九芒八鸞同鳴之符七炁旋繞八鸞同鳴氤氲崑崙歌無量音五色獅子之符萬烕萬獸獨𡵯大布摧伏瞻依無畏獰咸無礙惠通端拱居中巨力普施受道無爲九光白鶴之符道契光映圓光羽鶴玄光十方項負翶翔旋繞太虚嘯詠呈祥青龍侍衞之符太上玄明演法三界八方騫林侍衛威神使我自然束縛魔靈青炁羅絡與道合真變易龍形白虎鎮守之符七炁齊英大律大法玄象應合結炁聚形五帝大觀圭鑿白虎壇殿元純鎮守華靈朱雀陽精之符仙道自吉髙上明炁結命清靈四騫朱陵日陽赤炁赫赫朱雀擁護玄精至道長存玄武後擁之符空中萬變玄炁嵯峨威伏受命萬天太阿玄玄豁落合形龜蛇右符章並搯玉清訣取青黄白三炁吹成凡建壇陛分布十方以衛靈壇也泰玄都省居壇之東一泰玄省主齋醮之事黄籙大齋悉屬本省内立玄師天師北帝法師泰玄上相之位玉清上相之位作帳幄設聖像几案供養如法天樞院居壇之西一天樞院主奏章之事黄籙大齋敷奏頒行悉屬本院内立二師天樞上相天機上相天樞院使之位作帳幄設聖像几案供養如法考校所居壇之東二考校所主録齋壇功過詮定善惡悉屬其所中立三官五帝九府四司録官之位作帳幄設聖像几案供養如法錬度司居壇之西二錬度司錬度亡魂遷昇幽爽生尸冶錬悉屬本司中列錬度之司真靈之位供養如法救苦堂居壇之東三救苦堂主召集隂冥救拔罪苦中立救苦天尊北隂大帝十王幽宰之位供養如法化治居壇之西三化治主告盟演法領衆化民行道始末悉由本治中設髙座两班序立設位神虎堂居壇之東四神虎堂主頒行符命攝召亡靈之職中立神虎將吏之位作帳幄設位供養如法此堂常行遮斷非行攝召之人不可出入於堂内齋官行香宜置爐於簾外社今司居壇之西四社令司主關盟通召之命監衛齋壇引領亡魂之事中立里域社令司命等神神將吏兵之位受度堂居壇之東五受度堂設所薦亡魂祖先真像之位普度堂居壇之西五普度堂中立六道四生九州分野十類孤魂滯魄之位建壇堂陛章皇人曰夫建壇當先建十二堂陛召集髙仙方縁旛幢召真靈分章奏且十二堂者一曰青華之堂二曰神虎之堂三曰紏察之堂四曰精思之堂五曰冥官之堂六曰監生之堂七曰蕩穢之所八曰受錬之司九曰黄籙院十曰受生之案十一曰五道都府十二曰通章之司各有官將名位行遣儀式盡依規式而行之其功甚大不可不盡誠也青華堂聖位東極宫中大慈仁者尋聲赴感太一救苦天尊九幽拔罪天尊十方救苦天尊大慈大悲救苦真人大慈大悲大慧真人皇人曰上以碧落空歌之圖安其中毎日焚香當歌詠青華救苦頌三時行道而朝禮之夫啓齋之始宜先進通天救苦表以吿啓天尊慈悲聞聲應感立至玄壇而施救度之心青華救苦頌三首早朝天尊發願大悲心救苦方方化善因五嶽四司皆禀命酆都北府盡停刑真符吿下咸蒙赦童子傳宣救罪人元始化身真妙相度人无量道方成午朝天尊誓願度衆生說法荘嚴坐寳林獅子九頭分瑞相慧光一照廓幽隂刀山劔𣗳皆摧折火翳風雷悉罷停无量大悲來救度酆都地獄悉瞻聞晚朝天尊慧力拯含靈救苦尋聲破鐵城弘濟無邊隨願度光明普照逹幽扃慧風扇處炎烟滅法雨沾時發朽榮无量慈悲咸救度亡魂俱得面慈尊神虎堂聖位見神虎追攝品紏察堂聖位玄中大法師靜老天尊三天大聖都天大法天師靈寳經籍度三師上元一品賜福天官中元二品赦罪地官下元三品解厄水官九天採訪使應元保運真君皇人曰夫建齋之始當進啓玄表文登壇𥙷職應朝禮事畢並還紏察其過愆預對師君贖其罪愆免受考於冥司至散齋之時當進謝玄表文并𥙷職狀并看經數目名字及三官謝罪禮畢文狀即再囘謝五師之恩請三師儀經師金簡靈篇琅函寳誥既流傳於末學宜尊仰於真師憑青絲金鈕以誓勤行探蘂笈雲囊以求奥旨及修齋祀先奉經師仰望真慈俯臨法席某等無任恐悚戰灼之至籍師範金爲籍柔玉成篇蓋上聖之祕書紀諸天之隱諱積功累徳雖纎芥而不遺擢品升真歷劫年而無墜爰修齋直當奉籍師仰望真慈俯臨法席某等無任跼踳俯望之至度師叅佩經籙實仰祖師拔俗超真是憑教父顧後學敢忘於立善而迷塗尤得其旨歸幽顯俱遵古今一貫况陳勝範當奉度師仰望真慈俯臨法席某等無任兢慄哀祈之至精思堂又曰存真堂金真演教天尊直印靈官掌劔童子掌儀靈官監察使者臨壇主盟髙功大法師都講大法師監齋大法師侍經大法師侍香大法師侍燈大法師冥官堂聖位東嶽天齊仁聖帝南嶽司天昭聖帝西嶽金天順聖帝北嶽安天元聖帝中嶽中天崇聖帝地府酆都大帝地府九壘土皇君一七太素妙廣真君二七隂徳定休真君三七洞冥普靜真君四七玄徳五靈真君五七最勝耀明真君六七寳宿昭成真君七七泰山正道真君百日無上正度真君小祥飛魔演慶真君大祥五化威靈真君十王案分諸司官典九幽地獄冥官十大地獄冥官十八地獄冥官二十四獄冥官三十六獄冥官大小鐵圍山無間地獄冥官祝文九泉之下長夜之中隂官掌罪之司鬼趣執刑之府苦魂受考萬死萬生滯爽罹殃一來一往非獄吏操心而至乃衆生造罪所招匪憑靈寳之大齋莫出幽隂之暗府伏惟五嶽聖尊酆都地主冥官主者考罪曹僚遵天尊之符命開地獄之重門宣金籙之真符赦幽關之罪對超離狴犴升陟南宫普承開泰之恩共入玄元之道福資存殁利及有情監生堂聖位九天延壽益筭君九天𢌞骸起死君九天儲福定命君九天監生大神九天衛房聖母六甲保胎符吏送生童子九天一切真宰九天監生符飛玄之炁結成真文死骸開度萬品生根右天書玉符書於監生司中設一位香案上供養亡人見之自然百骸流光禳却尸血之光蕩穢天醫所聖位運穢神君解穢神君收穢神君卻穢神君除穢神君斬穢神君滅穢神君洗穢神君破穢神君蕩穢神君東西南北四靈解穢神君天醫度厄續命君鶣鵲使者天醫院官童聖衆正一治病功曹使者六甲治病將軍砭石小吏尚藥靈童受煉司聖位開光尊神九光童子丹天左右衛大將軍妙行真人煉魂大聖火鈴靈童煉魂使者掌水火池使者十二生炁將軍掌天仙道大神掌地獄道大神掌人道大神掌神道大神掌畜生道大神掌餓鬼道大神靈寳无量度人上經大法卷之四十七
