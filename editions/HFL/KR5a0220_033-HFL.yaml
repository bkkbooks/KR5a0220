front:
  text: 靈寳无量度人上經大法卷之三十三麗三
  hash: sha256:476777f30063b203d5f657f70f688d56f782f36823d86c4e4bffd6a38e3a5572
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_033-001a, image: hfl/0091/0091-072.png}
body:
  text: 修禳條格品玄師曰四時失度隂陽不調星宿錯度日月失昬國主有災兵革四興疫毒流行兆民死傷師友命過亦當修齋行香誦經凡建靈寳之法壇集同學之清士取九方之清泉貯金玉之妙器墨書九野之名埋瘗三晨之象隨蓋加持驗災増減備神明之好樂奏九聖之所𨽻心丹合天九功乃就克臻昇舉泄語外知其功不注訣曰四時失度謂春行秋令夏行冬令之𩔖隂陽不調謂雨暘不時亢陽炎威之𩔖皆須修齋誦經六時行香星宿錯度謂五星凌犯九曜差躔妖彗出野怪炁異生日月失昬謂交移失次餌蝕暈虹蒙霧霞暗皆爲失昬國主有災謂奸臣賊子篡權專制逼脇王命違和失政之類兵革四興謂八方未化畨戎侵境賊鋒逆臣肆伐亂征鎭山壓野男號女悲互相殘凌疫毒流行謂時行瘟疫徧連城邑惡獸毒物妖惑流行兆民死傷謂風勞炁冷鬼邪侵犯山崩地陷水火相侵河海山川惡物興禍野道蠱魅鬼怪侵凌伏連延纏死傷兆民師友命過謂同學𡛸親爲有片善可習爲師九種隂功大則靈寳玄壇小則建三晨小壇内師友命厄則量度誦建命過則依升度品格靈寳玄壇格取生炁方无穢汙石礫之土又非戰場刑獄屠坊生産之地建壇三級下層方九尺髙一尺中層建八角縱横長七尺二寸上層圓面去五尺髙九寸爲式四時失度隂陽不調格上層供養鎭壇禳災四時失度隂陽不調靈符次設虚皇天尊五方五帝三官四司扶桑大帝暘谷神王中層九州社令五嶽大神四瀆龍君四海源王八卦大神下層設河上玉女海中玉女雲雷雨部風伯雨師直壇土地嵗徳尊神十二月將十二時官四時失度隂陽不調靈符星宿錯度日月失昬格上層供養鎭壇禳度星宿錯度日月失昬靈符次設天皇大帝太微天帝君北斗七元星君五方五帝九曜星君太陽帝君太隂皇君韓君丈人九天太皇萬福眞君上清妙行眞人青羅眞人三台星君中層設二十八宿星君十方飛天神王天地水三官四三元帥下層設八卦大神九州社令十二月將五嶽大神十二辰將星宿錯度日月失昬符國王有災兵革四興格上層供養鎭壇禳度國主有災兵革四興符次設昊天上帝聖師天師天皇上帝太微天帝君玉虚上帝十方靈寳天尊十一矅星皇君十神太一眞君中層設三十二天帝君十万飛天神王九宫三竒太一神君下層設九壘土皇君九州社令五嶽神君城隍主者社令神君主九州社令太一八門神君大𡻕皇君國主有災兵革四興符疫毒流行兆民死傷格上層設昊天上帝妙行眞人長生保命天尊十方靈寳天尊慈悲度厄眞人三天大法師天地水三官四聖元帥中層列三元將軍解厄度厄兵士收瘟斬瘟大將軍廿露童子清涼玉女六職天醫下層列五方天兵騎吏太𡻕神君九州社令疫毒流行兆民死傷符上眞星宿好樂琵琶鳳管時新華果山泉歡喜團五色飯五豆五穀青木香甘松香米飯細茶大棗茆香五色旛五色錦綵太一神祇好樂竹弓蘆箭印甲馬剗馬兵士木刀鎗劒㦸緋黒紙錢五色繒綵時華細果加持密呪經洞淵神呪經五星祕授經十一曜消災經髙上老子消災經長生保命護身經无量度人上品妙經大梵隱語三晨象日金月玉五星五金月孛天一羅㬋計都用五色石英埋於天層土中深三尺爲式九州分野揚州鄒混分野社令正神九宫釡荆州張象分野社令正神二宫嘵兖州費萌分野社令正神八宫蒼徐州賈萌分野社令正神四宫銅雍州盛季分野社令正神六宫寳冀州馮遷分野社令正神一宫昴豫州范祀分野社令正神五宫鼎青州韓育分野社令正神三宫罡梁州張謙分野社令正神七宫魁右以朱書鼎名於器外黑書州名於器内於中壇八方以朱書河圖文於八方上安其器以鼎名向外平穩安之无致欹側河圖驗器中災福厄會法黒濁水災黑渾雨澇黄濁風災黄渾疫災黄穢蟲災字列地震白濁字黯小寇白渾字滅兵災水渇耗旱災水紅赤字淡水災青渾飢荒如有非法變易須速白天省批報以別之如平常者皆一州平寜九宫八節愈災法玄師曰南上之宫韓司主柄有九宫天星下降九地執奉天命司行災異一節主定炁一年主分百日主廵治一日主變令坎宫玄淵之神曰太一星也主兵水河泛岸决穀貴兵戎離宫丹炎之神曰天一星也主大旱草枯亢陽火災穀焦民飢中宫厚化之神曰天符星也主地炁害坼土功地震疾病民勞乾宫飛雲之神曰青龍星也主霜寒大水火兵艮宫積隂之神曰太隂星也主隂霾霪霧日月无光震宫青龍之神曰軒轅星也主迅雷烈風苦雨藩營多病重霜巽宫虚藹之神曰招摇星也主卒風雹雨傷損禾稼蟲蝗坤宫元土之神曰攝提星也主土功暴寒霜凍大霧傷殺草木兊宫金秀之神曰咸池星也主霜冷五穀折毁兵盜狂賊此之九年奉南上之命各主一節令之災異按九土而廵行多置尅制之宫成四時失度隂陽不調又有三清長吏太一神君專主兵革旱澇疫毒流成况紫微上宫天皇玄府青羅眞人主劫數曆限推遷七政司括下元民災國厄日月薄蝕五星變易失度差躔天坼地震妖彗凶孛怪星異炁亦主九土災祥凡八節自冬至日爲始先面東誦經十過以消冬至至立春四十五日九土之災自一宫坎宫面北誦一轉九宫誦九轉畢至面東誦一轉以消坎宮北方之災如立春節先面東誦經十過以消立春四十五日災自艮宫爲始至七宫兊宮成九過而面東成十轉也並如九宫式是遇八節日誦經一十過誦畢並祝侍經玉童玉女典行其意每思一土如元始十徧二回說經之祥自始青皆得度世一念一存思八節九宫之圖玄師曰凡九土災祥皆於年中十月十五日下元節普校大會之日上帝預定至十一月冬至一陽炁應災祥隨炁井潜同乎數者先於正月元日後災祥發矣不遭數者即候日月巳盡災祥始興而下世凡俗昧知既司洞玄仙職不待臨事而消預於十月十五日下元之後行功救世助國濟民擇同學之人九貟建三天總炁壇上層法天中層象人下層体地依三層設位上層東西用金玉作日月形銀銅亦得圓形日象九分月象十分安卯酉之地壇沿之極處次以五石英作五星形如彈丸按五方埋瘗上層日月之裏三寸各深一寸於壇心上以衝天柱髙三尺二寸每八寸穿一天盤作三重第四下一重安斗罡如曲尺燈架上層壇周側以青色彩泥如淡碧色以丹砂書二十八宿罡之形中層以黄色彩泥増於壇周側四方書靈寳五功符書四維四道次書三十二天大梵雲篆光明玉字於中層四維均布之及書三十二天帝諱於下以寳器或清淨不津陶之器九雙於壇九方取深淵源長之泉九器内中宮之器亦安坤方未納水時法師九人各面九方執筆存極萬里人物山川城郭取炁吹筆安九方按宫分數炁存思如面南方宮九次取炁吹筆訖於器中黒書九州之名將九方水煎沸納於器中使平滿以蓋覆之安燈於側及香於前器後立牌書如法下層以白色彩泥又於壇側開八門二道盡八卦畫四海五嶽中嶽亦在坤宫九州分野依式置壇訖並依三層設聖位都畢方於子時入壇八方敷几案裀席以八人同志各典一方内大法師立髙座在地戸面天門而守典中央五宫之職如此置位了方可六時行香每人各誦靈寳大經一徧同聲諷誦一徧共周十徧仍各有心映内功經法以意施爲至一晝夜六時畢於亥時入壇開器視之見九土災祥再依前行持又至亥時視之以器中水并所書如常即罷壇設醮謝恩除災度魂祈謝外並用此行持玄師曰此乃大赤金科勿以私意輙行更變失其規式所感不應徒勞无成十方東方九炁總炁丈人南方三炁總炁丈人西方七炁總炁丈人北方五炁總炁丈人東南六炁總炁丈人西南二炁總炁丈人東北四炁總炁丈人西北八炁總炁丈人上方一炁總炁丈人中央十二炁總炁丈人八門坎方太淵絶水門艮方太安玄石門震方太元神雷門巽方太虚靈風門離方太明絶火門坤方太釋九地門兊方太素衍擇門乾方太昊祖天門巽方地戸乾方天門上輪三境位左右玄眞人太一眞人妙有眞人青羅真人靈寳眞人四相共十三位中輪昊天五皇上帝天皇大帝北極大帝西元金毋東華木公三官四聖五帝四師共二十一位下輪聖祖天尊大帝太一救苦天尊十方應化靈寳天尊消災解厄天尊九宫捍厄天尊普慈護國天尊長生保命天尊靈寳无量度人天尊大慈大悲大慧眞人救苦眞人眞定眞人鬱羅真人光妙眞人太極眞人三天法師共一十五位曲尺斗燈北斗七元左輔右弼九位第一層天輪十方太一眞君十一曜星皇君大梵度人不死君南極注生大君南極長生大帝度世司馬大神好生韓君丈人太皇萬福眞君扶衰度厄眞君𢌞骸起死眞君南斗六司眞君十方飛天神王共四十五位第二層人輪法中仙曹執職靈官功曹金童玉女等一位在中央次列九州社令在外左列六丁玉女右列六甲神將五嶽五方五行佐命共三十二位第三層地輪八卦大神四海龍君四瀆源王𡻕方太𡻕星方十干十二支大神風伯雨師雷公電母霜雪上吏雹霰上吏雲霧上吏九壘土皇當處城隍四直使者監醮香官直壇土地共六十二位中央立十洲三島大州洞天靖廬福地主者一位靈寳无量度人上經大法卷之三十三
