body:
  text: 混元玉劄品下六甲武罡炁符甲子護我身甲戍保我形甲申固我命甲午守我魂甲辰振我靈甲寅育我真六轉云天地日月星辰敕右日吞六字召武罡炁祝曰甲子王文卿從官十八人符吏天季神將執明玉女月光旬吏隂阿君甲戍展子江從官十四人符吏天隂神將穹隆玉女登姑旬吏張不臨甲申扈文長從官十六人符吏天行神將監兵玉女開明旬吏陳子思甲午衛上卿從官十八人符吏天償神將靈光玉女漢旬吏杜除君甲辰孟飛卿從官十四人符吏天雄神將天禽玉女嬰臺旬吏公孫大君甲寅明文章從官十六人符吏天望神將孟章玉女登之旬吏徐君望吾今行符君等爲直日爲吾走使頭戴繡帽正入無門急急如律令右法六甲絶早吞符畢往其方六十歩内十歩外取本方向木頭或枝葉亦得右手取木左手折一半在地一半左手中指節握其落在地草不得著歸入室西方存本甲神將玉女立呪曰六甲九張天圎地方四方五行青赤白黄太乙爲師日月爲光禹爲治道蚩尤辟兵青龍俠轂白虎衛𠑽熒惑前引辟除不祥北斗誅伐除凶去殃五神導我周遊八方洞梘元礙徹見八方當我者死背我者亡惡我之者返受其殃急急如律令右面方鼻引炁入於腎中日存出從衛夜存入腎中一旬一易凡六甲如春呪曰春甲在天上應天玄輕清附炁黄道金元夏甲在寅散滿奎直靈圖大厦八方之力秋甲在地下應九泉生成之炁助我三田冬甲在陽炁𠑽斗牛周天列宿助我田苗右法於六甲早晨面甲方先搯五嶽訣念魁罡乹元天真三呪隨甲方吸炁一口滿口漱咽三十六漱分三口咽直至丹田然後叩齒三十六通面甲方坐長舒二足二手倒又手合安於頭上直伸臂鶴啄三度摇動二關一十八遭平分頂水如納波浪納至臍下咽炁一口然後取符安舌上呪如前以津咽下即止行一甲金精自固二甲經絡流通三甲金精凝結如紅玉四甲百神守固五甲五神守護六甲丹田結寳自後方可起藏如犯嗜欲前功頓棄六丁柔和炁符丁丑延我夀丁亥拘我魂丁酉制我𩲸𩴑丁巳度我厄𩲙丁卯消我難丁未却我災六轉云隂炁雲雷電雨右日吞六字召柔和炁祝曰丁卯玉女文伯仁髙丁丑玉女文髙仁貴丁亥玉女文通仁敬丁酉玉女文卿仁恭丁未玉女文質仁和丁巳玉女巨卿仁逹能知六丁岀入杳冥亦无所畏亦无所驚千年保守萬年不傾天地同休劫劫長生急急如律令右於六丁日絶早吞符了念呪取本方炁吹身往本方行六十歩内十二歩外其淨草左手取草右手折草勿返顧回歸入室放草於本方存爲玉女形狀上香祝曰恭然寳香上聞六丁先師有約授我神方拜奉羙香鹿脯蜜湯安期大棗細核多穰天之緑蟻香熟瓊漿酥餅淨果燈燭熒煌等心稽首請召神王願我師友命如金剛延夀益算長樂无央合家大小願獲吉昌髙而不危鬼毒消亡凶邪魍魉逺去他方寃家嫉妬伏匿潜藏所求者得萬事吉昌洞見神鬼无隱毫芒通靈通聖耳聰目光今日召請願乞降祥急急如律令右法取六丁方炁如丁卯則九炁並入腎夜存在腎白日存出隨行毎月𥘉六日夜依前念魁罡乾元天真三呪呪朱念五嶽呪吹紙書六丁諱剪作三段上旬服上二字中旬服中二字下旬服下二字於六日安牀頭邊并呪水至五更𥘉即起披衣坐面丁旬方取上二字以水送下念其諱不計徧數直至𥘉有人門外行聞其聲音嗽便望聲音豦吸其氣咽之存二丁入心中後至二六依前行之俟三旬畢凡有投詞陳乞治邪救患即上香安狀於面前面丁念諱吸炁吹狀又念諱吸炁吹來人又念諱吸炁咽存六丁神在心吸來人炁一口存於心中定神息慮良久待心中起一念爲祟之鬼有无多少及病狀一一言之皆中其情實切不可雜念邪慮及第二念即便不是若預疑惑即不中不實也戒之戒之四直陽神所主之炁符俱魯直嚧眚直詵李直年天道月人道日地道瑞夷直時仙道四轉云烏輪荼又四直隂神所主之炁符旭斯直年晨濫直月馥淵蜒渺直日直時四轉云唵夜荼俱叉右二符並輪八卦訣甲陽卦丁隂卦取北方炁吹而成呪曰樞璇機權陽堯衡文四直使者直日功曹年神月將時直主者有事來報急事來呈急急如律令右面太𡻕方吞符存四直使者陽日紅黄隂日青紫交脚幞頭繡抹額立於四方呪曰崔盧鄧竇急急送言來四直李魏急急送言來右一炁念百徧叩齒四通存四神侍從呪曰敕四直使者直日功曹待我使汝上天爲吾俓往天曹待吾使汝入地爲吾俓往地府待我使汝入水爲吾俓往水府速去速去不得久停常侍吾側衛吾身形急急如律令右於太𡻕日書此八字佩之右肘後早晨燒香了吞服符仍須帶之肘後夜間取下早間佩之須吸符炁吹身晚間卧時吸身上吹符五司祕諱符孟章延生固精監兵注禄固靈凌光保命固神執明守體存真穹隆煉形鎮心五轉云金木水火亡右搯五行訣本炁而成符三將軍祕諱符唐宏上部三田暢葛雍中部八景分周武下部九陽靈三轉云玄元始右搯中指上中下三節三塗玉諱符興生太霞扶桑乾人塗獨𨽻下鎮鄷都坤地塗可韓韓君丈人度人不死中指中文灭塗三轉右取三天炁鼻引入兆口中閉炁書成吹呵各三呪曰興生轉獨𨽻遷可韓明功都成切角正聚魂攝右毎日面天門念呪吞符畢搯三塗五苦印取西北炁三口入頂中西南三口入脾中東北炁三口入丹田中五帝玉諱符紅杏太華木司九炁元君墨黑衡霍火官三炁元君磨真金華金主七炁元君襪臘恒山水帝五炁元君靈寳嵩山土帝一炁元君五轉逐方訣炁書成呪曰東方青帝青精太山南方赤帝丹靈霍山中央黄帝中山嵩髙西方白帝白石華山北方黒帝玄滋恒山五方五帝各降真炁服食五石以𥙷真炁百脉流通長生乆視右凡遇金木水火土日念本方呪二句靣方存五色炁各依方所住存帝并侍從按五方取炁服之是五方九色之類是也須於丑後行次可行五方洞視雷神祕諱嘔嘻微咁嗶唎吒嚙唵臨十一轉再呪玄字呪右辰訣云雷一雷二雷三雷四雷五局在子上爲訣候書成以巽炁吹之服符呪曰玄玉内妃隂陽合配三師紀律四聖分銳六甲陽神六丁隂吏四直元君五司都帥三塗五嶽鎮輿坤地巽震雷震隂陽拘制兊乹施光坎离交位下辟鬼門滌垢除穢飛昇仙家獨歩无畏元亨利真逆順神炁受持玉札式凡受此法須預修於元旦之日先期齋沐揀一淨室面北安几案書諸隱諱再拜畢收入淨器中作三五處安列黙記勿令差互甲子日取三天隱諱天地玉字三真内諱上帝内諱服之甲寅日取七曜南北二斗三台中斗内諱服之甲辰日取三皇内諱三將軍二始三師隱諱服之甲午日取六甲六丁四直功曹内諱服之甲申日取神虎神吏玄女内妃天人内諱服之甲戍日取雷神内諱服之服符之法設香爐劒盂鐘子各一就寢至丑寅時自起明燭漱盥次汲井水一盂於聖前然後取符安排案上分記了退身出戸雙手玉清訣歩斗至案前春夏自魁口歩至魒秋冬自斗魒歩至魁上香望天門三拜黙表一通魂於爐中再拜雙手玉清訣面北呪水依前行持黙表大明年月日具位臣某稽首再拜上言伏念臣生居下土周旋塵世宿契有幸佩叅法籙叨奉大道玄恩濫司三洞清職本願佐天行化助國救民誓當祈恩請福謝過消災救度存亡剪邪立正元元之心不敢少替臣中謝重念臣雖誠遵守天規動意未合真理罔致洞達幽微不能神通妙應蓋緑臣凡軀穢質胎尸肉人豈得洞徹於天界况亦難見於鬼神罕使邪魔皈正鮮功及物况有目如盲有耳如聾先蒙師資付授混元玉札三皇内文聖真内諱洞徹神文令臣受持臣今採擇吉日自此長齋依法吞服内滌心垢外錬目精所欲洞見於三界所乞徹視於鬼神伏望祖師本師真師上帝至尊三寳真聖玉陛下不以冒瀆賜臣天恩至願特降正真生炁大道慧光三寳法澤六通神慧妙化真光入臣身中内除心境塵障外去二目穢氛煉消百神隂翳開通臓腑光明蠲釋罪業障厄斷除結節胞根摧伏魔試萬真恊從臣吞服内諱之後坐觀三界立照萬方洞見仙真徹視鬼神暗知未兆明覩天文永脱八難三災解釋千殃九厄所向吉利陳願宣通大道興行群生信向誓願生生世世濟生度死降伏妖魔萬劫千載之中永爲三寳弟子如蒙玄景報應不敢泄漏一言半句天機謹伏地拜上心表一通上徹俓詣三天門下乞隨香烟傳逹奏御大道三寳上帝至尊几前臣無任祈天望恩激切屏營之至臣稽首再拜以聞上香祝白維年月日具法位臣姓某請願于天謹上啓三清上聖玉皇上帝紫微大帝日月五星南辰北斗三台星辰三天上真四聖元帥五嶽五帝七辰内妃南昌丈人六丁神君六甲神君雷神雨部神虎大聖使者四直功曹四直神將洞觀神將徹視童子臣今謹依靈寳大法混元玉札上清隱文毎遇六甲之日吞服上真内諱隱名玉字齋戒吞服所祈洞視洞觀神真役使仙靈追魂攝魄伏望聖慈不以瀆犯之責許以服食名諱玉符今者伏遇甲子之日謹服上真内諱賜以道炁法眼洞視百靈役使千真左呼六甲右召六丁坐致行廚預知未然身生水火變化無方臣無任祈天望聖之至祝畢再拜六丁訣内註六丁訣曰於六丁日午時書以黄素丹篆六丁真諱從本諱六守毎二字一符面當旬之方爲首以次從之各吸炁布之爲三符於此夜丑初巳屬七日也披衣面丁方取一符圓而托之呪其名以水吞之候其時有人初作聲速急望方吸炁六口咽之至中七下七日同功及三旬足凡有一切事面向祝名吸炁咽之瞑目少時神告知心意所啓皆是未來之事一一應也六甲訣外直六甲訣曰於六甲日卯時以白素朱書六甲名面向方吞以西流或不見三光井水訖𩀱手握固端坐鳴天鼔三十六通叩齒二十四下兩手相叉鶴啄六度揺轉二關九次手分頂水心存丹田有日光赫赫一身洞然如火内外通赤祝名三十六度吸炁吹身常存六神侍之六甲足日未然之事夢中告請六甲常侍其身久久可見役召任意凡小末妖魔作過用朱書同金錢火化其邪立被六將軍遣出海中夢中異其報六丁訣凡見有邪鬼纒惑之者心念一徧閉目良久六丁告於心神意中所出言語皆是鬼邪作禍之由至於服色人數一一皆合其驗功曹訣法應是毒物所傷及癰腫丹瘤五臓大小之疾書於疾所或内吞外貼不過三字即安三天諱訣通章合契訣曰於毎年歳除日預前一日沐浴更淨衣至來日平且於宻室中端坐面天門持誦三天隱諱霐使至十二時足三十萬徧至來日不語一日自此之後應章表詞奏念法一徧東方炁吹文字上致通逹自有曉報右法於晦日誦十萬徧奏章立達三天報應俓下凡世三天真諱訣危厄救護訣曰八莭日清齋於戍末亥初入靖坐持念三天真諱防中袁丘徳累及十萬徧毎遇虎狼毒物閉炁七息念三十二徧萬毒潜消不敢爲害右法於朔日誦一萬徧三日外應一切災厄自散黙念三十二徧其災厄自解五嶽訣五嶽持身訣曰於立春後九日立夏後三日立秋後七日立冬後五日四季土旺一日後面遂方於子午卯酉寅申己亥時叩齒如方數存東嶽君引四嶽君官吏面前搯五嶽訣祝諱吸五方炁咽之一年功足遇求事或恐懼急厄謁貴人入山度水先扣齒五通祝名吸五方炁咽又吹身又布方即脫厄所向元吉如願五嶽三塗訣左手震紅杏東嶽中指離墨黒南嶽四指兌磨真西嶽中指根坎襪臘北嶽中指中文靈寳中嶽中指中可韓天塗坤文獨隸地塗巽文興生人塗五嶽三塗印以左右手三小指第四指仰手相又各以二指左右互勾二小指以左右手第二指各勾左右手第四指直其左右二中指以大指各搯中指中文五嶽安鎮符五嶽諱安五方人塗東南天塗西北地塗西南都功東北總書成也應一切凶怪精妖壇席廟貌伏連惡地水魅蛟螭書於大石上沉之或埋不一百日天雷震毁朱書符文搯五嶽三塗訣取五嶽三塗炁吹之斗諱訣洞明萬慧訣曰於五月五日朱書北斗諱不計其數以朱蠟圓之置青竹筒中重紙封固安雞巢抱栖中俟成取之服一日誦萬言洞明智慧通神日誦萬言不忘右法朱書黄素黄蠟和爲七元一日一服清心淨水吞下七七日之外智慧自明誦萬言開口不忘南斗諱右法朱書黄上吞佩治百病靈寳无量度人上經大法卷之十二
