front:
  text: 靈寳无量度人上經大法卷之二十七生七
  hash: sha256:166789ef64bed5ca1931541a9604133a360bd04811028dcdba3a6c62d81b4799
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_027-001a, image: hfl/0090/0090-046.png}
body:
  text: 首愆謝過品修眞之要寡過爲先過之不悛去道逺矣雖行持符法未至上道之階使爲行不檢亦豈足以折伏鬼神況於進拜表章濟度幽顯哉功過之司毫分无失晉許逺遊遁迹山林勤心味道漸入眞品而三官都禁遣周魴等出丹簡罪簿以詰之曰夫欲學道慕仙上𨽻眞人玄心棲邈恭誠髙靈者當得世功相及禍惡不構隂徳流根仁心上逮乃可歩眞索仙度名青府耳由此言之未及許逺遊者其可不知寡過自修耶奉法行持求仙學道所當悔懲已往之愆犯積累方來之功勤故玄綱論曰過惟改而不復爲功惟立而不中倦是謂日新其徳自天祐之儻口行祈謝之科心乏省愆之念首之前而作之後飾之外而敗之中然復苦已勞形瞻星禮月持齋奉戒焚香誦經亦爲徒設矣有大言眩世則云罪之不積惡之不爲豈須懴謝斷棄教科此又矯激太過從容中道無過不及所宜悔至於心知咎必省依經奉教按格行科削罪目於三官五帝之司上生名於十極九霄之境立功不怠舉形仙飛国有分焉亦無自阻有志者多成事也謝過毎歳除秋分一日外常以三元八莭本命生辰甲子庚申及諸良日入靖室或宫觀山澤靜潔去處焚香專志省咎思愆先於壇側端黙而坐深念生世以來所行所作无非愆犯不善云多戰兢自艾恨不剖心𤁋膽誓母復爲今兹慚愧措身无地方振衣而起整肅形神登壇啓告无壇虔立香案展壇布行用入戸誦呪上香如法祈謝之儀早以東爲始夜以北爲始分五方懴念本合置立科儀發爐循格至三上香後方行禮方如自然朝儀但此等事以密爲尚兼獨行朝修不宜繁𤨏故今止編四方謝罪之文損益隨事之宜爾先祝香道香徳香无爲香无爲清淨自然香妙洞眞香靈寳慧香超三界香王境眞香滿瓊樓玉京遍周天法界以今焚香供養虚无大道三境天尊昊天上帝紫微北極大帝紫微天皇大帝后土皇地祇三十二天帝君萬天上帝上清十一曜星君中天北斗七元星君天地水三官帝君北極四聖元帥眞君靈寳五師眞君四方二十八宿星君三界五帝大魔王十方无極飛天神王北隂酆都大帝東霞扶桑大帝五嶽五天聖帝洞天福地名山靖治主録仙眞聖衆三洞四輔法籙中靈官將吏三界官屬一切威靈仗此香雲普伸供養玉華散景九炁凝煙香雲密霧徑衝諸天侍香金童傳言玉女上聞帝前令臣關啓咸得如言具法位臣某以今良日齋潔洗心祈眞告道先伸上祝皇朝社稷宗廟先靈駕景九霄垂休萬葉今上皇帝基圖永久祚業昌隆聖壽等於乾坤徳教均於造化萬方向善百榖咸豐有識有知悉悟至眞之道无邊无極共躋榮樂之郷大教興行正法无斁敢伸凡願上冒宸嚴臣下情无任戰兢惶懼激切屏營之至謹啓以聞唱方臣某志心皈命東南西北四維上下十方靈寳天尊三十二天上帝周天二十八宿星君天眞上聖五嶽眞君山川河海洞天福地一切神仙諸靈官次向北方三拜長跪晝以東方爲始夜以北方爲始具位臣姓某志心皈身皈神皈命北方東北方无極太上靈寳天尊北方八天帝君北方髙眞上聖斗牛女虚危室壁七宿星君北嶽恒山黒帝眞君北方洞天福地山川河海一切眞靈北郷神仙諸靈官臣聞大道垂慈啓悔愆之路髙眞設化開謝罪之科若非請命以祈恩豈獲釋愆而逭譴伏念臣愚庸賤品蠢陋凡資幸浹眞風叨逢道運乆膺法籙冒玷簮裳不能勉强以立功乃復因循而造罪莫知檢束罔謹操修所慮萬祖億曽昔亡往逝曁臣千生累劫宿世先因爰至今身謀用之問舉室親姻之衆造諸元惡成彼深愆无量无邊難名難述結在天曹地司之内著於日月星辰之宫永劫不原終天无解懼其報至恐及禍萌以令皈命首陳盡祈湔洗伏願天垂恩宥道啓慈憐萬聖流祥衆眞錫慶赦臣九玄七祖以及兹身萬劫千生至于今日滔天重罪蓋世深愆消滅惡根削除罪籍庶使臣早成正道獲際眞師身世安榮法徒在俗言眷寧泰更祈祖宗神識師友魂靈已逝親姻先亡眷屬長居快樂永遂逍遥六道三塗四生萬類俱蒙拯度悉被陶成臣无任慚悔禱祈激切之至謹言次向東方具位臣某志心皈身皈神皈命東方東南方无極太上靈寳天尊東方八天帝君東方髙眞上聖角亢氐房心尾箕七宿星君東嶽泰山青帝眞君東方洞天福地山川河海一切眞靈東郷神仙諸靈官臣聞開云同前次向南方具位臣某志心皈身皈神皈命南方西南方无極太上靈寳天尊南方八天帝君髙眞上聖井鬼柳星張翼軫七宿星君南嶽衡山赤帝眞君南方洞天福地山川河海一切眞靈南郷神仙諸靈官臣聞同前次向西方具位臣某志心皈身皈神皈命西方西北方无極太上靈寳天尊西方八天帝君髙眞上聖奎婁胃昴畢觜參七宿星君西嶽華山白帝眞君西方洞天福地山川河海一切眞靈西郷神仙諸靈官臣聞同前次向中央具位臣某志心皈身皈神皈命上方下方无極太上靈寳天尊三景九霄大羅无極三十六天帝君五老上帝天曹主宰无鞅髙眞羅酆隂境十地眞靈三十六土皇君中央嵩山黄帝眞君中央洞天福地山川河海一切眞靈上郷下郷神仙諸靈官臣聞同前次歸位對席志心稽首禮太上无極大道志心稽首禮三十六部尊經志心稽首禮玄中大法師次啓白臣某謹重誠上啓无極大道上帝髙眞三界威靈十方衆聖以今懴愆謝過入靖修眞獲遂陳請仰祈大宥伏願隂曹削罪仙府書名道遇至人學无魔試臣敢不益堅善念深悟前非願契道眞永依沖廕十方共慶九祖蒙休爲上因縁念十方靈寳天尊无量不可思議功徳次出戸如常式靈寳自然朝先啓聖次禮十方次懴悔三禮次回向念善今五方謝過即靈寳自然朝之餘意止以五方者貴其簡而易行不舉玉音梵唱貴其精黙感格奉道修眞之士不問法籙髙下悉可按行乆乆行之内加痛省則罪減福生成眞得道三元八節朝眞謝過科先搯上帝訣念入戸呪地戸丁立望天門閉炁黙念呪朝入戸法師向地戸右叩齒三通密呪老子存思圖曰存見四明功曹一人通眞使者一人傳言玉女二人侍靖玉女二人呪曰四明功曹通眞使者傳言玉童侍靖素女爲臣通達道室正神上元生炁降入臣身呪畢入戸先左足入夜入戸入戸同前老子存思圖曰存見四上功曹一人龍虎使者二人侍靖素女一人開明童子一人上玄少女一人呪曰四上功曹龍虎使者正一生炁侍靖素女夜有啓請願得開明童子上玄少女與臣俱入黄房之裏通達所啓皆使上聞三禮執爐啓聖畢宣科臣伏聞一炁開機握化機於渺邈三天啓範張玄範於洪濛五千四百科文下敷塵世三十二天梵炁上總玄綱思禍福之无門察盈虚之有數流傳法籙開度天人道出鶴鳴正一演修眞之化功標龍漢混元垂出世之文大道難名純誠可格以今吉日清堂朝眞謝過伏願金童敷席玉女典香上聞妙有之庭徑御虚无之境簫簫鳯吹龍神敷碧落之歌渺渺鸞驂羽騎森丹旗之衛七輿八轡泛灝炁以浮空三界十方燭靈暉而蕩穢伏念某玄關下士赤劵初階受穢生形禀愚賦性背違科教稔積愆非謹按仙科式陳祕範伏願玉京帝主金關師尊普降厖恩遐施霈澤開厥自新之路處其可赦之科曠蕩沉愆廓清紛累降以太元之炁合成靈寳之軀鍊骨續筋留形住世恩歸祖禰剋獲飛升惠及𡨚親咸蒙和釋千愆萬過一念消除八難七傷四時解散修功有漸進道无魔一炁資扶百靈挾佑願遂登眞之契常陪仙侣之遊與道合眞形神俱妙謹稽首再拜次長跪懴悔臣志心皈身皈神皈命三清化主十方靈寳天尊无量度人經中聖衆念臣爰從往劫以至今生三業六根五情七慾宿殃往業定録玄科陽過隂愆名書黒簿以今懴悔願悉消除伏願洪靈洞照丹闕垂慈鍚命行尸流恩朽骨胞原解結七祖飛昇心境无塵障魔消散皈依大道滌蕩沉愆禍咸滅於无邊功普加於一切得道之後升入无形與道合眞次發十大願呪曰三清玉帝三素元君太上髙靈仙都大神今日吉慶所願開陳上願飛霄長生神仙中願天地合景飛雲下願五嶽與身長存四願七祖解罹怨愆五願帝君斬伐胞原六願世世智慧開明七願魈鬼斬馘六天八願開徹通幽達靈九願一會莫不如言十願飛仙上朝三元次囘向稽首靈寳洞玄主无量度人眞道師道包天地无得名法貫隂陽不思議隨縁應化救群品超越三界及十方巍巍无上功徳山歸心念念无休息今日所佩祕法上消於天災劫運下度於兆庶人民廻屍起死以完形救病除殃而輔正功圓行滿早吞金液之丹心了神靈進受玉皇之詔爲上良因念十方靈寳天尊朝出戸出地戸畢回身面壇叩齒三通存玉女一人呪曰出隂入陽萬神開通關啓事畢請閉黄房侍靖玉女明俻神宫呪畢出戸先右足出夜出戸出地戸畢回身面壇叩齒三通存少女一人呪曰玄上太隂八窻開明向有所啓少女通靈事畢復位萬神潜寧毎日入靖燒香朝禮儀先兩手玉清訣握固存神叩齒丁立靣天師而誦呪曰天書敷羅下頒太微元化生神靈煙九囘八景六周皇運所持左賔青方右啓帝妃南昌丈人灌煉辟非儛軒赤明開發眞機今日大慶萬道同皈合并正炁保天无衰普告三界驛龍風馳祝香啓聖切念臣早廁玄關夙依黄老受大道之庥蔭寓眞舘而止棲慚无十善之因以賛六道之惠自披玄褐幾易歳華未能感激於神明動則輕違於戒律初勤後怠有始无終奉法或邪行仁不正燒香失節存叩違科慮三彭暗奏於愆辜六府明書於罪目特傾丹欵仰扣虚无祈罪惡以原除冀愆辜而釋散名全上善命合長生玄功積累於三千丹藥早逢於九轉黄籙白簡消死魂而上生名金關玉京有昇進而元退降仙曹紀善鬼録除殃八景金書得鍊炁修眞之術五文玉篆獲長生乆視之功法屬安寧舘舍光顯金木水火之厄永不驚傷青黄白黒之災俱希蕩散更冀是非兩遣衣食自然魔障不生憂患不至上報君師父母之恩下濟幽塗沉滯之苦驅邪輔正興教立功百靈皈依萬神振伏形神俱妙與道合眞靈寳无量度人上經大法卷之二十七
