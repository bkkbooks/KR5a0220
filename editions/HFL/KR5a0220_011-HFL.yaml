front:
  text: 靈寳无量度人上經大法卷之十一金一
  hash: sha256:9d1b8b2f9f09f53c44bec7ad9934042a718e1eac1a25aaa50c798599447db461
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_011-001a, image: hfl/0087/0087-004.png}
body:
  text: 混元玉劄品上皇人曰上清三洞九品之文分四輔萬篇惟靈寳玉階有緒餘神章則救死度生爲上下元學真之士往往始勤終怠止縁塵根暗識六慧不通被六天魔惑四邪妄興作諸變化不能洞了故三洞之文上曰洞真以凡修真洞合形神目覩真人與道合契逮乎中下洞玄洞神乃萬法之祖六通之本是以天尊證道眼慧眼真人定法眼慈眼故觀三界如居掌中天真役法已明内觀外作洞觀以傚道慧之眼洞視徹視遥觀以體法慈之目是謂三洞凡學洞真洞見真人然後成真既曰洞神目擊神真然後通神而作神仙凡三洞萬法无不先要三洞自明然後可通神神靈降身至於洞神洞淵洞靈大洞八史六丁靈飛六甲炎光洞觀並設通目之道男士之滛女士之邪六根不淨耗失真元豈能洞真洞神純陽則神仙不隱純隂則鬼神現形是乃祖真祕受玉劄一卷三洞之祖修之百日通神通靈千日真仙現迹見之可以役使可致天真功備徳合白日飛昇三洞召真視神无此玉礼徒勞施用終不洞明惜自不傳下世因靈寳教行鬼邪出隂以此洞之不能隱形免惑道士玉札皆上真内諱隱名依法用之克日成真授受之者擇三元八莭十直之日齎玉簡二枚上金九兩命素千尺信財百二十貫以盟三官師授若不盟信妄泄天寳師代以風刀之考弟子修之終無所成折筭十紀明詳寒栖之士勿失其人不可圖財泄之非道罰亦如之靈寳洞視五戒夫三洞四輔百萬千篇道徳神經億千萬字唯以三洞洞視爲本上有洞真真降然後成真中有洞玄玄降然後成仙下有洞神神降然後成道凡修洞視之道先明五戒第一齋戒精專靈神降身若不齋戒精專必遭神譴第二清淨身心清淨身心則神光徹視若不清淨身心穢氣凌犯神光昏翳第三終始如一終始如一則神功早見若不終始如一則妙應難成第四神靜氣和神靜氣和則招真會靈若不神靜氣和怒則神逺第五祕密修持切勿泄漏隂機泄漏隂機則神明責人右法謹依五戒更要擇冬至前後戊辰戊戌甲子甲午日爲首洞視若不依式洞視亦必難成須是精誠端確潔白身心勿食葷穢醉酒婬色方可行持次吞服符札真炁入身滌去凡穢煉隂成陽則真仙見形故不自藏天炁符防中之真合炁玉京太華表徳輪轉不停丘紅妙樂圓羅育靈音曜呪曰軋元亨利貞日月與吾并吾受天炁治身去毒内外俱成内除百病外收攝百精安家救人去毒藏形急急如律令右法毎月一日五更二點雙手握固向東行丁罡三𡵯閈炁握手呪之了望東方仰天取炁九口又念呪一徧南三西七北五中央十二五日之後任便使之地炁符清都元始岳麓所制鬱成坤道化形煥壘造化无窮黄中理炁衆妙之宗音疊呪曰天降炁地生成服吾符得長成急急如律令右法遇辰戌丑未日面地戸方存地炁出萬萬丈以口吸入脾中再呪具法位臣某謹稽首奏啓承天效法厚徳光大后土皇聖母九壘皇君真皇洞神天尊金剛力士神王靈官主生主成真宰願降真炁入臣身中信行信願皆如所言洞徹地中萬物地上鬼神咸皆現形臣謹啓祝畢口引十炁入脾中三天隱諱符玉清始青玄元凝結中訣上清禹餘混芒降固上訣太清大赤混熖騰晶下訣鼻引三天青黄白三炁灌筆朱書黄紙上服之厚載无私化形玉虚卯五赤坤輿上連帝君辰九疊祖土三炁洞元寅鼻引九地二炁乃黄北帝二炁灌筆朱書服之千靈變化攝御群魔酉元皇列真凝結雲芽申中黄内象感化嬰兒亥鼻引東方九炁而成朱書服之服符呪曰元父合雌玄母歸雄天地混元人道居中玉符保命五藏光衝耳目開爽我道興隆三天内諱符森羅淨霐霐池无鏡祖劫化生上清訣阿陀龍羅堅敷澄宗四象吁貟玉清訣流羅梵萌浮羅合神太清訣鼻引三天之炁而成霐太一天真諱太初天真諱真仙真人諱上帝内諱符神戸纒絡真皇道舍元散精子文明炁晶育魂洪綱洞潜洞虚宸洞開告寧午文微酉文入中指中鼻引子午中宫炁而成書服呪曰太一捧符太初命靈真仙護命三帝司迎炁通玄關魄煉魂英服炁吞符洞徹萬靈七曜内諱符赫赫太陽衆太隂純化廣陽之宗辰文帝理生酉文皓景金華庚扶桑鬱霞九朔單辛洞光酉文炁合華卯文五炁元老化炎帝赤明奔一炁靈寳形子文飛火鈴午文中黄肇玄中指中文金一七此乃日月金木水火土七曜内諱也各本訣吸取本方之炁隨其色象而書之日吞七枚召七曜也服符呪曰東運扶桑西貫咸陽五行相配混合中央日炁符日魂珠景照韜緑映回霞赤童玄炎飈象右呪畢面日光以鼻引光瞑目引炁九口再呪曰鬱貞离右引炁九口入心中每受日炁毎月一日五日十五日二十五日月炁符月魄曖蕭芬豔翳寥宛虛靈闌鬱華結翹淳金晶瑩炅容臺標右呪畢面月光鼻引瞑目引炁十口再呪曰結貞坎右引炁十口入於腎中每受月炁毎月初三初八十五十九存月光十芒五星炁符甲乙日木星丙丁日火星戊已日土星庚辛日金星壬癸日水星呪曰金木水火土五星之精入臣身中内煉五臓耳目聰明徹視萬里洞見鬼神學道神仙飛昇上清急急如律令右法木九火三土五金七水一並以鼻引回轉入口以炁送之再呪九曜順行元始徘徊華精瑩明元靈散開流盻无窮降我光輝上投朱景解滯豁懷得馭飛霞身騰紫微人間萬事令我先知急急如律令右法鼻引依前口數咽之木入肝中火入心中金入肺中水入腎中土入脾中南斗炁符魑离宫之祖日陽餘炁𩲕三炁炎炎丹天朗耀四明尊帝騰勝威天六轉云急急如上帝敕六字聚疊書取南斗炁而成离上爲訣逆至子吹呪曰大行梵炁周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君文人中有南上司命司録延壽益算度厄尊神回骸起死无量度人急急如元始上帝律令右法叩齒六通面南斗看星存火光以鼻引一星三炁入口内送入丹田三六夜行北斗炁符魁阿奕恬懀𩲃紫精陀丘𩵄觚亶琅璀䰢岑昺太行魓幽微畢雷𩳐明陀唵痛魒梵秦貫標七轉云急急如上帝敕七字聚疊書取北炁而成子上爲訣至午挑日吞七枚以召七元呪曰青城玉樓中據斗九晨君上靈摇天槌明陽照除炁五色玉樓内攀魁上晨君育嬰激明光隂精决生門黄臺玉樓裏主仙華晨君歸垪度衆踖真人降氤氲朱臺玉樓中歩斗真人君玄上飛蓋晨冥樞摇天柱素臺金樓内躡紀七晨君上開變五道丹元散九芬玄臺玉樓裏歩罡北晨君明靈昌上元北極降妙勛九層玉樓中乗龍北蓋君玄樞歸天徒天關佑善人紫炁玉樓内遊行三界族帝尊九晨君精常空上開玉臺紫館裏徘徊三陽歸帝真九晨君幽空陽明輝右法先叩齒七通面斗存毎星有五色光芒念呪四句鼻引炁九口入口中一炁送入丹田共八十一口每遇三七夜行持服符呪曰南司北政陶魂鑄魄順道而造逆天法輪周旋玄象回死作生神虎炁符玄玄所化元運所造應變尢窮魂魄澡煉衆星所拱飛天遵奉𩴮馳驛風傳正訣云玄元應化星飛澤七轉云化元律魄星飛睪右七字聚疊書取魁星之炁灌筆而成子亥爲訣日吞七枚召七妃呪曰神虎戟飛運招摇一綂隨十方精光都一吸急急如律令右法於𥘉三二十七日向北斗星存紫炁入口念呪毎一星七口炁共四十九口炁入口中以炁送之神虎神吏符卓雲青府寅文混元覺縁丑文嶪覩般基中指中文玉玄演候卯文寂元渺凝辰文極中混清中指中文皇達无靈午文七轉云昌荀逵迪信貴七字疊書取東北玄範司之炁灌筆而成服符呪曰魁張玄範應化无邊掌持青律度魄遷魂飛度五戸驛馳風傳元皇九醜樂秀三田逵迪察命變攝昌言荀持令貴信通玄三界綂司盡禀吾權中斗正使祕諱符四景囘樞濯形天河旋斗歴箕回度立常魕太玄璣渠玄君斬尸𩵄天王秉權五帝命魔䰫控適天元回眄帝堯遊行太空俯迎玉衡玉文八威正炁所臨八轉云中斗大魁總監衆靈右八字疊書取中斗之炁灌筆成符訣中指中文服符呪曰中斗大魁旋斗歷箕回度五常逃形天關太一天一二始分張八景冥合司命桃康二始祕諱符太一三轉云遊之宗宴太阿天一之宗五轉云遐想天常巳上五字分二疊重書共八轉訣中指中取中央炁而成服呪同前三台祕諱符太清佐命三炁乹爲天坤爲地靈爲元真人中皇炁結氤氲虚皇總炁精元有英天寳妙化終昇六太虚並四指上炁混康停靈寳化生至道曲密華房華育䰟元宗四指中文延生度世神寳守宗萬神護攝四指下文服符呪曰上部八景胎結泥丸中部八景胎盤絳宫下部八景胎鮮脃根三元暉映台魂鮮明右日吞三枚召三台也天皇内諱符泛景太霞甲子元君白素嘯詠洞章灭皇䰟炁九玄解乗胎仙六轉云六合八遼玄冥乾訣地皇内音符溟涬大梵甲申地皇萬炁遼廓无光絶𡨋黄素元君九華元陽六轉云巴元靈曜炁生坤訣人皇内音符无形无影甲寅元老太微玄无極无窮晨紫素人皇君落混沌六轉云洞幽迦摩梵慧中指中訣服符呪曰天皇人皇三素元君解結散滯閉塞死門辟非去尸心神寧閑玄女祕諱符八景冥合炁入玄玄梵炁彌羅萬範開張玉音攝炁靈風聚烟三轉云玄運珠三師祕諱符定光真定光慧羅翹大羅智翹妙音真妙流音梵景空謡並隨炁四轉中指爲訣挑遂字轉吹彈四聖祕諱符喑唄嚕嗂嘧囉咜喫嘰𠱾𠰉九轉隨炁疊書巳上桃勒至中指中服炁四指却勒至亥吹桃靈寳无量度人上經大法卷之十一
