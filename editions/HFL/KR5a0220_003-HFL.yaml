front:
  text: 靈寳无量度人上經大法卷之三霜二
  hash: sha256:7db7bc4f20d3fe9ad44f4eb50bdfa71ee8dc8228c06d4e9438daa9d92acebd02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_003-001a, image: hfl/0085/0085-040.png}
body:
  text: 修誦瓊編品修誦存思章玄師曰凡欲誦詠並依神化於靜室中目想四方三十二天名色雲炁交沓之中有宫觀樓殿天帝衣天色之衣冕服一一分明即存神自太皇天爲始先叩齒一通心拜訖次太明天三十二過畢即閉目靜思三田出玄元始青黄白三色雲炁並如絲漸離身雲炁濃厚先交絡一形次纏映所坐几及席經席无不周徧次蓊鬱旋繞一室然後出外圍布一方良乆㝠合天地次存青龍出肝立左白虎出肺立右朱雀出心在前玄武出賢在後獅子出脾下丹田十二𨾏列於左右想白鶴自腦泥丸出九隻圍列四向方存眉後六合宫中有日月出自二目去面九寸光照室内洞徹煥明次存日月光凝景圍在大推骨頭之户頭成九色圓象如虹蜺之狀照耀光映十方如此分明元始密祝有心祝微祝密祝心祝則心中神存意祝也微祝則自巳可聞其聲也密祝口言而巳與外人俱不可曉其聲也十徧爲一過十過爲一轉誦則下聲而誦之詠則朗吟以詠聲十言一嚥澤百言一啄齒嚥津則養炁而潤澤内宫啄齒則集眞而和神外保不空尸竭神也錯一字前覆三十字以誦之越一字再覆五十字以誦之十徧一存思終篇可食息凡起居移時食畢皆再思如法不可混淆雜言心馳他境口不崇於上道髙聖至眞之法心不奉於三寳君師父母之文志不敬於翠玉華珍寳章形不禮於香火朝修拜跪口誦心馳形存志别徒音聲以取聽逞捷利以數敷差前訛字輕誦神文何萬徧而望駕雲軿雖億數而返沉酆憲徒咎道爲虚語豈不知其自致須是受於師匠必然誦合天規若萬徧不登太空我道坐招譴罪之尤終无仙眞之位可證乎受誦之子宜勉志焉无犯輕誦輕泄之罪犯之非道不慈天有明憲神不敢私誦詠存念詳式每遇誦經行持之日先洒掃淨室齋戒身心入室東向平坐燒香叩齒十通勿令耳聞黙念淨口呪丹朱口神吐穢除氛舌神正倫通命養神羅千齒神却邪衛眞喉神虎賁炁神引津心神丹元令我通眞思神錬液正炁長存次瞑目靜存東方青龍吐雨合月華白炁及腎水如大海中浴洗去五臓穢濁良乆存南方降眞火同日精赤炁合於心火燒身并道室灰燼並无纎毫煙穢即覺大風吹盡塵垢即存丹田内嬰兒自地戸歩斗登壇黙念淨天地呪洞中玄虚晃朗太元八方威神使我自然靈寳符命普告九天乾羅答那洞罡太玄斬妖縛邪殺鬼萬千中山神呪元始玉文持誦一徧却鬼延年按行五嶽八海知聞魔王束首侍衛我軒凶穢消蕩道炁長存微吸四方眞炁畧吹徧身從東方爲始黙禮十方東向想丹田内嬰兒黙念開經玄藴呪寂寂至无宗虚峙劫仭阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮華超陵三界徒慈心解世羅眞人无上徳世世爲仙家即自頭誦至飛昇上清次閉目靜思三十二天自北維起太皇黄曽天由東及南以至四方各有八天在青霄之中紫雲之内金樓玉殿之中東方想在左耳上縫西方想在右耳上縫南方額前北方腦後毎天之中各見天宫樓觀帝君儼然而坐侍衛羅列下灌一天之炁如玉霞之暉入我身中毎到一天先黙叩齒一通運心神上聞一天帝畢心拜一過三十二天周竟次想上丹田印堂出青炁中丹田心出白炁下丹田臍下出黄炁與外東方青炁西方白炁南方赤炁自逐方而降混合身中三色之炁照映滿室我坐其中雲炁洞徹于一身五臓之間内外蓊鬱如坐百寳光中又思肝中青炁從左耳出爲青龍侍于左肺中白炁自右耳出爲白虎衛于右心中赤炁從頂門出爲朱雀導于前腎中黒炁從足出爲玄武從于後獅子出下丹田臍下白鶴出兩眉之上中各六六隻導前玉童玉女侍經几案之側羅列左右次存六宫之腑即眉後兩小穴日月自其中出紫赤九芒灌我鼻中徑入金華宫腦後四寸却自紫微玉桃之宫頂上化生九色圓象如虹蜺之狀光映洞徹十方聖境想嬰兒在丹田中密呪至无量度人即叙誦說之意後誦至元始上帝几前畢即引三十二天之炁周竟十方微音誦經十過凡引炁時依前自皇曽天爲始皆鼻引而嚥之也如東方八天之炁存皈肝膽之間其精化生无英公子住於肝中南方八天之炁存皈心胞之間其精化生司命住於心中西方八天之炁存皈臓腑皮慮之間其精化白元尊神住於肺中北方八天之炁存皈腎臓骨莭之間其精化桃康君住於臍下正月行持止六月一同七月行持止九月一同十月行持止十二月一同正月是下丹田行持七月是中丹田行持十月是上丹田行持謂之三田亦曰三宫升降正月行持自已嬰兒自丹田中隨三色雲炁而上下田臍下行持如一七月行持自已嬰兒自丹田中隨三色雲炁而上中田心上行持如一十月行持自己嬰兒自丹田中隨三色雲炁而上上田印堂行持如一誦詠式皇人曰凡誦經行道須佩真符而行此道則萬神敬從矣行道之日者謂應是誦經之日皆當沐浴也香湯五香之湯也以白芷青木香沉香白檀香甘松香各以二十四銖治下篩用東流長泉一石煎數沸先當解衣燒香於左就座存日光華五色交錯入於五香湯中存五方五色仙童五人玉女五人燒香散華執巾執水左右即以杓攪水三十二下臨水呪曰五香玄泉日月華英澡鍊身形去濁留清尸塵滅落臓腑光明穢炁蕩除胎劫散根策空乘虚飛入上清沐浴符如後呪畢叩齒三十二通先取飲一器温涼自適次以别器沭浴呪曰太帝散髮使我長生左爲隱月右爲日根今日清錬百神受恩呪畢沐髮了櫛髮呪曰日月之華流精泥丸沐養九宫百神忻懽尸邪滅落眞師下觀賜受神虎得爲帝賔呪畢結髮浴身又三清諸法及仙人下遊有煉尸之素漿桃皮四兩竹葉二兩内白淨清虚之物煎湯沐浴勝於其餘雜法所是青木香阿母大有三竒經云乃玉莭之清香開塵濁之穢亦曰五香之湯如誠奏上玄得以焚之開通塵穢使通霄漢浴訖冠帶呪曰今日吉慶上合帝恩塵穢以清尸魂沉淪罪垢業厄表裏蕩清呼日吸月歩躡九晨囘旋三台周遊五星佩符散章鳳衣虎裙手執玄文誦詠洞靈聲徹太霄五帝囘軿賜我明書登昇上清呪畢冠帶如常凡遇服食湯劑仙藥呪曰謹請五方五靈老君召出天醫扁鵲官史各五十人當令臣服藥身得離病病得離身駕魁乘罡登昇上天數遊九地命禄俱榮長生不死與道合眞呪畢面東服之凡修此道誦詠玄文舉止庠雅動合威儀若踈麤簡狂鬼神切芙三官司過紏其失規故視兆之齋戒科條既言道士者非道士之模範不行凡言眞人者非眞人之規不習况學士乎臨食呪曰百榖五味流入脾胃五臓安寧尸邪亡墜七祖安寧長生久視呪訖叩齒三十二通嚥液九過方食食宜午時前勿食酉時後臨食勿言死食勿久露午前天神食酉後鬼魔哺言死生疾病久露來邪炁故眞人斷榖入山以求升仙之要臨睡呪曰天有九星地有九宫我有百節萬神相從三尸伏藏五臓流通三田四肢動息守中龍虎八卦侍我瓊容鬼妖萬精勿干眞官叩齒二十四通呪訖又叩齒如上凡卧勿開口勿尸眠上道衣冠法服器皿勿假人服炁守三一誦玄文者尤忌之臨圖叩齒三通呪曰左徳神右清神左有司士夫人右有六丁辟穢邪除我死籍上我生名叩齒三通勿噀唾勿向北勿仰視三光勿男女混登皆致不祥出門呪曰出隂入陽四道開明八神六甲隨我利貞日月使賛頭帶七星叩齒七通存七星在頭罡星指前沐浴符太上神水真炁流行隂陽合明神燭旁靈穢炁清淨殂落死名安靜三尸久視長生與道合并沐浴呪曰念呪三徧三呵攪水金醴玉津澡盥身形玄水洗穢清淨元辰七靈侍衛萬炁開陳志慕清虚列象玄明正月誦經眞符玉几玄珠流降心田百神拱衛萬聖臨軒飛梵綱輪通幽達靈七月誦經眞符金簡煥映龍章太玄五行金洞回旋玉房度命延年十月誦經眞符真元散敷朗煥九衢神變帝臺梵響太虚周行六合飛昇仙都右符一名曰長生久視玉帝寳籙八節誦經眞符真炁虚象三關羅絡玄華通徹八景與日得補陳敷合并真人巳上四符於靖室内青地朱書行持勿與人語修眞之士素地丹書長生日面東南火化淨水調服本命日誦經眞符胎仙澡煉左命上景精神玉華右嘯役靈常保金晨使神利貞右符名曰神霄玉清仙王降眞靈符焚符誦玉帝呪曰神靈天眞玉清元眞上清華房元始老君妙入太霞光耀玄文七神飛泉北酆受煙我位上王辟合魔群八威吐火肅爾尊神千千去穢凶惡不存萬萬魔王護命翦形急急如律令念玉帝呪三徧凡建壇並用灑壇三帀修誦訣驗品誦二章正經訣凡誦經之日於淨室中東向設經案坐具次入室背席面東三禮禮畢退身面北就席坐炁定即漸漸左轉面東平坐誦玄藴呪呪畢即按手於膝上叩齒三十二通閉目存三十二天中各見一帝君思念一天名心拜一天帝從皇曽天爲始隨日而轉周囘四方漸漸向上賈奕天總三十二拜形雖不動隨心屈伏拜畢即思存身在青黄白三色雲炁之中須臾滿室鬱鬱藹藹左有青龍右有白虎前有朱雀後有玄武獅子六在前兩行相望而坐白鶴之數亦同又在獅子之外日月在後明耀室内項生九色圓象照徹諸天更覽所存森然在目黙念呪曰无上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言所言者謂天地日月星辰國主師友祖先自身兆身所析之事呪至關啓字下當稱之也今日吉慶清室修行至經无量度人臣及甲乙甲乙者當稱所願同上即云臣及某人及某事轉經受生願所啓上徹徑御无上三十二天元始上帝至尊几前呪畢徐徐於三十二天之一天引炁一口嚥之依前法止則開日誦二章經畢南向下席再禮而退巳上以陳景元義合張萬福訣定此章靜坐圖右圖大槩如此但明室内之事不必面南啓戸也誦内音訣誦束方六十四字自亶婁阿薈至四象吁眞平坐叩齒九通思九色之龍導引前後青雲九重覆帀身形黙念呪曰赤明開圖八炁囘眞總炁玄門青帝大神流化九外纏絡我身靈音八書六十四篇洞明天地與我合仙運至龍駕上升帝轅呪畢引炁九嚥誦之誦南方六十四字自南閻洞浮至神纓自宮平坐叩齒三通思朱鳳翺翔其方絳雲三重覆帀身形黙呪曰三炁徘徊靈鳳來飛玉音八字煥爛紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空玄歩足踐鳳梯周旋八天七祖相隨畢引炁三嚥誦之誦西方六十四字自刀利禪猷至栢空度仙平坐叩齒七通思白虎獅子衛護前後素雲七重覆帀身形黙呪曰七炁金靈八天尊神白虎策輦獅子捧轅七炁纏絡錬我成仙身發金光映照素雲内外變化昇入洞門七祖出夜九幽旋魂億劫開度隨運長存呪畢引炁七嚥誦之誦北方六十四字自玃无自育至幽寂度人平坐叩齒五通思飛龍玄武羽蓋蓊鬱神童玉女羽衣飛裳黒雲五重覆帀身形黙呪曰玄天徘徊流景上清大有啓運八字開明飛玄澄空洞隂自生五炁纏絡灌我身形冠帶北單受鍊洞靈腎府北出内外光精飛行三界遊宴紫庭七祖同福歡樂劫齡七寳林中返胎更生長夜出離南宮記名黄籙白簡世世生仙呪畢引炁五嚥誦之誦詠科條章上聖巳成眞人通玄究微師曰此條非凡世之人誦詠謂通玄究微能悉其章者獲十品功徳至學之士師曰謂至人學士誦之獲六品功徳學士師曰謂世學之士誦之獲三品功徳供養尊禮師曰謂一切學士行此功徳獲五品善功凡誦是經師曰亦謂巳成眞人再言自身功徳果報萬祖苦爽上昇朱宫依朱陵品格九年更生受化得爲貴人自身功徳滿日飛升上清金闕許遊宴玉京也上學之士師曰乃至學也止得自身受度飛升南宫不能功及曽祖也世人受誦師曰止得延壽尸解返形太空一身不獲上度朱陵之福曽祖難生受化魔王歌音師曰百徧名度南宫千徧魔王保迎萬徧飛升太空此是三界歌音非餘文也有聞靈音師曰心形歸信諦聽誦者獲九品善果行是功徳師曰發心修齋燒香誦經者獲二品善果右别至人師曰至學之人行是功徳克獲爲上清後聖帝君金闕之臣有知其音師曰中篇也謂如曉其文功力齊而獲八品福報此音師曰中篇之音有辟禳度成四種无量威神之力誦之者獲十品祥應齎金寳效心盟天而傳依玄科四萬劫一傳齎金寳質心依舊格告盟十天然後而付焉師曰此三條廼傳付受授之條立四萬劫乃舊劫之格自黄帝受圖大禹受符高辛受天經至太極下教豈有四萬劫也依阿母降世新格下教之科四百年一出有其人四十年聽再付四百年共不得過七人四年有至人亦許一授而三條付授之科言二章大法及三品誦經之式也其歌音中篇别有明憲具玄憲仙格輕誦身則被殃輕泄漏慢殃及九祖泄慢墮地獄禍及七祖翁師曰此三條統言不齋戒沐浴行香誦經者獲被殃之罪若輕易忽科妄泄非人漏慢玄奥不依年限而私傳或依年限而不齋戒盟受漏泄祕禁與非人使輕慢不信玄文皆入中科殃及九祖若泄漏輕慢不以爲然巧僞求竒評論聖典訾毁玄文竊盜天寳皆入此條禍及七祖翁修誦玄感師曰誦經欲知其功徳合於上玄有一百五十一種玄感既有玄感則去仙登空有日若無玄感更宜懴謝端潔一志以玄感昭應爲禎祥諸天遙唱等十種上聖禎祥五帝侍衛等六種志學禎祥伏御地祇等三種學士禎祥門戸興隆等五種供養禎祥諸天齊到等十種凡誦者禎祥皆即受度等二種受誦禎祥延壽長年等六種世人禎祥斷地逮役等二種正月誦之禎祥身得神仙等三種七月誦之禎祥安鎭國祚等六種十月誦之禎祥九宫眞人等一種本命日誦之禎祥魂神澄正等十種本命禎祥閉目靜思等九種入靖禎祥三五功曹等六種玄局召使禎祥洞章萬徧等十四種禎祥天地否終等四種祈禳禎祥末學道淺等三種太隂煉尸禎祥天地運終等十種修齋行道禎祥諸天記名等五種行功禎祥知音誦之等六種禎祥无所不辟等二十種誦者禎祥盲者目明等十種内誦生元始聖胎禎祥玉晨君明十徧說經說經召十方无極元量品无鞅之衆十方境土天人聴法應時而驗一徧東方至眞大神浮空而至安太堂郷納善世界聾病耳皆開聰二徧南方至眞大神浮空而至宛利城境棄賢世界盲者目明三徧西方至眞大神浮空而至福空淵咸行世界瘖者能言四徧北方至眞大神浮空而至鬱亶野清淨世界跛痾積逹皆能起行五徧東北至眞大神浮空而至福集郷長安世界乆病固疾一時復形六徧東南至眞大神浮空而至元福郷用賢世界髪白返黒齒落更生七徧西南至眞大神浮空而至延福郷仁靜世界老者返壯少者皆強八徧西北至眞大神浮空而至福徳野延賢世界婦人懷孕鳥獸含胎巳生未生皆得生成九徧上方至眞大神浮空而至諸天宫關地藏發世金玉露形十徧下方至眞大神浮空而至澗淵九壘正行逰梵四音三十六宫大地宫府枯骨更生皆起成人誦二章正經驗正月長齋誦詠是經爲上世亡魂斷地逮役度上南宫七月長齋誦詠是經身得神仙諸天書名黄籙白簡削死上生十月長齋誦詠是經爲國王帝主君臣父子安鎭國祚保天長存世世不絶常爲人君安鎭其方民稱太平八節之日誦詠是經得爲九宫眞人本命之日誦詠是經魂神澄正萬炁長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿徳就飛升上清誦之十徧諸天記名誦之百徧名度南宫誦之千徧魔王保迎萬徧道備飛升太空若能遇斯辰依訣持誦上消天災保鎭帝王下禳毒害以度兆民中拔祖先已身得道可謂巍巍誦内音驗東方大梵之音誦之九年八天各以青腰玉女青華玉童各八人侍衛身形降致青芽九炁之精身生光明徹見虚无萬徧道成飛行上清七祖同升南方大梵之音誦之三年八天各以丹霞玉女太陽玉童各八人侍衛身形降致朱丹三炁之精反貌留容萬劫不傾七祖超升上入福堂返胎仙家即得更生西方大梵之音誦之七年八天各以素靈玉童八人侍衛身形降致太素七炁之精停年留貌萬劫童顔慶及七祖升度南宫返胎更生世世神仙北方大梵之音誦之五年八天各以太元玉童八人侍衛身形降致玄滋還年留景保命三清福及九玄世世飛升四方内音若能依訣持誦則无所不辟无所不禳无所不度无所不成飛天下觀上帝遙唱萬神朝禮三界侍軒振伏群靈肅清十方道備功成臣事三境靈寳无量度人上經大法卷之三
