front:
  text: 靈寳无量度人上經大法卷之三十二麗二
  hash: sha256:a8dc437674d89ac749808b20d87eee9c3e307e11e060a6d4c5e2ec4ddd80a237
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_032-001a, image: hfl/0091/0091-032.png}
body:
  text: 禳度施用品隱學修應道士書青帝赤書眞文置東方則東嶽仙官至長齋百日精思靈寳尊神則天眞下降給青腰玉女九人取東嶽神仙芝草不死之藥青帝鬼魔逺舎九萬里一方凶悖惡獸毒螫皆不生害心反善仁國土東方及春三月有災欲使東郷安鎭當朱書青石上鎭東方九日災殃自滅凶逆自消一方仁人蒼龍來翔善瑞自至國土太平書文佩身却諸禍殃身无患害恒與神明相符當保國家享福无窮道士書赤帝眞文置南方則南嶽仙官至長齋百日精思靈寳尊神則夭眞下降給朱陵玉女八人取南嶽神仙芝草不死之藥赤帝鬼魔逺舍八萬里一方凶悖惡獸毒螫皆不生害心反善仁國土南方及夏三月有災欲使南郷安鎭當朱書赤石上鎭南方八日災殃自滅凶逆自消一方仁人善瑞顯明鳳凰來遊白鸞飛鳴天人歌詠欣樂太平書文佩身萬災不干禳凶却穢坐致神靈福慶无窮延年長生家致興隆國祚安寧道士書黄帝眞文置中央則中嶽仙官至長齋百日精思靈寳尊神則天眞下降給黄素玉女十二人取中嶽神仙芝草不死之藥黄帝鬼魔逺舍十二萬里中央凶悖惡獸毒螫皆不生害心反仁善長齋修行二十四年身得神仙但佩此文亦得尸解輪轉成仙國土中央及四季月有災欲使中央安鎭當朱書黄石上鎭中央十二日災殃自滅凶逆自消四方和睦善瑞自生麒麟來歸白虎遊庭國豐民富普天安寧書文佩身萬災不經身康氣強五宫精明長保國家永享利貞道士書白帝眞文置西方則西嶽仙官至長齋百日精思靈寳尊神則天眞下降給太素玉女六人取西嶽神仙芝草不死之藥白帝鬼魔逺舍六萬里西方凶悖惡獸毒螫皆不生害心反善仁長齋修行二十四年身得神仙但佩此文亦得尸解輪轉成仙國土西方及秋三月有災欲使西郷安鎭當朱書白石上鎭西方六日災殃自滅凶逆自消西方自歸善祥來遊靈獸飛軒金雀銜符五老歸賔國寜民休書文佩身神明交遊災不加身與五帝同厨子孫昌熾世享王侯與善因縁何慮何憂道士書黒帝眞文置北方則北嶽仙官至長齋百日精思靈寳尊神則天眞下降給太玄玉女五人取北嶽神仙芝草不死之藥黒帝鬼魔逺舍五萬里北方凶悖惡獸毒螫皆不生害心反善仁長齋修行二十四年身得神仙但佩此文亦得尸解輪轉成仙國土北方冬三月有災欲使北郷安鎭當朱書黒石上置北方五日其災自消凶惡自滅北方自賔善瑞自昌地藏發泄金玉露形天人歌詠國富民豐書文佩身萬災消亡夀同天地福禄難量所向所求莫不利貞子孫昌盛世出賢明師曰按赤書玉訣眞文呪說古文後來學者難可施行故髙上著筆以解曲滯玉訣眞要開演古文微妙元辭諸天髙尊披誦玉音十方遥唱上天設禮神魔降伏而令講世書道法以舊文通之多有謬異又以常有者爲賤而偶得者爲寳世俗貴難尚同溺於先見故文字多以先得者爲貴世俗貴異復以難得者爲竒而易得者爲廢謬所以世師有得其妙者多不以及人盲師錯說各立方論遂駭於後人今審諦以仙房叅同務爲簡要眞旨宗說无疑乃爲善爾大梵正音師曰大梵正音之章乃元始自然飛輪之炁結成誦詠之者可以制伏萬靈超度五苦大法之士能於六丙之日靣東朱書於黄素之上佩負兆身則祛制群魔消却萬災當存爲靈寳天尊搯中指上節取元始祖炁灌筆而書之書章誦呪曰元始祖輪結梵彌絡自然靈妙元始元終洞杳菩猷提渠廓崇玄爽杳邈眞神靈峰道達總魁超冀无窮急急如靈寳上首律今大梵正音廣生髙映覺元洞虚應元九眞化交肇圖文靈運構宗範元都感變總括威昭自成緑岑遷景皇道含明天林耀權炁精育魂融羅負立圓英隱旻期巨神包洪綱告寧章炎通泛堅敷澄宗虚象玄華龍陽儛穹微正霄艶淵太凝冲元關三紐大梵飛空隱覺隆益天倫慶呈神戸纒絡眞元散精浮握明照徊合升遷導騫宴雲靈應騰天剛澤徽控隂峻孤儀貫炁𡨋素宸洞開微周化幽應澄輝帝臺平遐挹虚恢茂童池結飈臨育麗无散開陽通百六沉芒隱階幽廓𡨋黙眞峰會靈堅丕順道告命騫林龍安洞變純陽隱玄方本還炁象伏髙貟神變惠𠃔解錬靈根赤精純道成號威尊利雲有常億仞中丘鬱城瓊壘謠音慶流受位玉室大憲通幽玄章煥落綱輪廼周大梵隱語无量音師曰大梵者天中之天也隱語者諸天祕音也廼太上玉晨大道君受元始天尊祕訣修行之微妙故按六十四卦而成其句以象中黄之數凡煉丹之士當擇丙丁火旺之日面東南設案再拜而書於黄素上以鎭佩則萬靈振伏召集眞元以叩三田若朱書碧紙上度下世亡魂則身入光明不居重暗是謂大梵无量之音者也東方八天搯震文吸東方八天之炁入口吹彈身中却搯中指中靣東書篆呪曰眩昺煥落耿蘭幽芳澮蒲標竺載孔猷元皇九醜攝豫隨蠱臨觀噬嗑貴剥復无妄大畜頥大過坎離咸南方八天搯午文吸南方八天之炁入口吹彈身中却搯中指中面南呪曰中寂虚一混華仙綜和暉陽堂赫胥耀同晶虚瞿容攝恒遁大壯晋明夷家人睽蹇解損益夫姤萃升困西方八天搯兊文吸西方八天之炁入口吹彈身中却搯中指中面西呪曰游惠照蘇陀伽含羅岐俱渺郁台映盧摩畢淑少都攝井革鼎震艮漸歸妹豐旅巽兊渙節中孚小過既濟北方八天搯子文吸北方八天之炁吹彈身中却搯中指中面北呪曰元皇寳耀延靈鬱單扶桑敬禦凝晨總玄洞妙宗明攝未濟乾坤屯蒙需訟師比小畜履泰否同人大有謙靈寳无量度人上經大法卷之三十二
