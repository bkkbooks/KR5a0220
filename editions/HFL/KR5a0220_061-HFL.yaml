front:
  text: 靈寳无量度人上經大法卷之六十一玉九
  hash: sha256:66272ef01079cb74cfdaaa4de960285814d8b48c3a7fd5c8cc6c8c7830160cf5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_061-001a, image: hfl/0096/0096-076.png}
body:
  text: 靈寳煉度品法師拜起立存神靜黙交乾布斗變神爲太一天尊想諸神在左右次於水火池内行持升座側立整飭衣冠棲神定志躬身焚香啓白具法位臣某焚香仰啓三清上聖十極髙真太一救苦天尊天樞三省五府主者三天扶教大法師南昌上宫長生大君南宫度命君九華真人南極真人左玄真人朱陵上帝開光尊神火府髙真水宫仙聖韓君司馬煉度司主宰黄籙院仙宰黄籙院判官將吏功曹神兵土地飛天大聖妙行真人煉度真人八威龍文神君火池神將水池神將攝魂使者度魂主吏火府功曹童子吏兵火池童子司命真君司録真君延夀益算度厄尊神廻骸起死无量度人監生大神五道大神溟泠大神煉度直日功曹煉度吏兵一切真宰伏願飛雲暫出於丹天羽蓋下臨於法界五色鬱勃慈光徧燭於幽冥四象吁員惠澤普霑於黒壤即使臣得行開度拯拔幽魂今乞先賜大慈允爲明證謹稽首再拜請聖法事臣伏聞靈寳本章追度亡爽十回度人九冥隱韻開化自然空洞降靈太虚生神總治法象綂歸三元瓊宫大聖髙居帝尊敷弘至妙考校因縁元始符命下拘幽扄普爲衆生追度祖先上詣朱宫切告三官嶽瀆靈洞十二河源原赦罪爽不得稽停太會玄都速召萬神中有東極尋聲赴感太一救苦天尊中有度魂化形之君中有太冥煉尸大神中有大慈妙行真人中有天樞天機好生文昌延夀益算度厄尊神招靈玄都无量度人今日校録諸天臨軒謹召十方龍威大神丹靈大神皓華大神玄英大神煉度大神變身大神正精大神火府大神返形大神超生大神光明照耀洞朗諸天神霄上相陶仙伯南昌上宫韓司主録監生大神執籙把籍齊到帝前普度衆生上世亡魂敕攝鬼帝來聽教言酆都洞隂司禁侍郎各持黒簿削落罪根不得拘留逼合鬼群所有元始符命敕制地祇歷關諸天普告三界請滅三惡斬絶地根飛度五戸名列太玄魔王監舉无拘天門臣无任懇禱之至念太乙救苦天尊召飛天神王焚符鬱景廻度華眇森羅廻駕傾光摩辨空歌飛歷玄關通變靈魔總監鬼兵遊乗太阿受符元始廻旋太霞念寳幢接引天尊伏願長生大聖飛天神王飛天使者吏兵等衆一如昔日始青天中浮黎法會之中不忘元始天尊教戒之言伏爲齋主某人特垂開度亡過某人伏願死魂受煉仙化成人生身受度劫劫長存然後福垂後裔慶及家門一切有情俱登道岸宣元始符命讀大神牒謹召南昌上宫受煉司直壇土地火急爲吾召主煉大將二貟火府神兵五百人黄籙院管押亡魂大將二員神兵五百人並請嚴裝顯服立至壇下爲吾關報南昌受煉司靈童四直使者黄籙院諸司功曹火急赴壇聽候指揮宣敕制地祇誥汝等位列仙曹職司傳報凡有呼召即爲敷聞兹者本壇巳蒙道旨許令今月某日夜子丑時依科普行煉度今則蘭塲備列蘂笈伸謄當爲請召靈寳大法司一切聖衆靈官玉女南昌受煉司黄籙院仙童將吏功曹判官丹天左衛大將軍直日功曹符吏地道功曹黄籙院功曹丹天童子追魂主吏追魂童子攝魂將軍度魂引魂童子引魂使者火急前來咸聽誓言宣金液煉形符誥吾等嗣行教法掌握化權位朱陵火府之仙領南昌受煉之職今則仰遵祕範恭演真科將煉度於幽魂必告盟於主執汝等遵禀爲吾關行宣登真度命誥當司謹奉道旨煉度死魂汝等威神主吏當爲處分太山五道城隍主者地府隂神引魂官吏疾速恭依原赦攝召亡過某人形魂前到壇下以憑煉度宣玉清雷文誥念金闕化身天尊伏以返魂聚魄妙道皆存瓦礫糠粃至真咸在既逐萬縁之長將迷一性之真展轉塵寰漂流濁穢今者奉爲亡魂水火既濟滌蕩腥膻灌溉三田周流一體念黄華蕩形天尊謹召掌水池使者煉度一行官君將吏引領所度亡魂入水池受煉誦大梵隠語三徧焚水煉諸符切以育物陶形頼五行而既濟隂消陽長宜一炁以虚无仰所度亡魂昇入黄華結璘之府受煉更生奉爲亡魂宣吟水煉神呪巳枯復榮巳滅復生得生天上更禀太靈九天之劫反復胎嬰穢累蕩滅白屍反生急急如長生大君敕念清水度魂天尊東井皇華石景玉精飛玄水母金醴玉津滔滔源源不竭池亭九龍灌煉三光垂精仙人吐潤煉度魂靈内外朗徹表裏洞清百關九竅元炁滋榮五臟六腑萬神自生胎胞結節隨水開扄死炁斷滅惡根沉零我今煉化死骸生魂返故改貌玉體金容變化煉穢飛升紫庭急急如長生大帝敕念黄華蕩形天尊用水洒十方搯子文呪曰天澄炁清五色髙明日月吐輝濯煉身形神津内盥香湯煉精光景流曜焕映上清炁不受邪五腑納靈罪滅三塗禍消九冥惡根斷絶福慶自生今日大願一切告明普受開度昇入帝庭念朱陵度命天尊搯中文取北方炁吹入水中焚丹陽符龍漢蕩蕩无形无名渺渺億劫黄道開明神清朗耀九魂吐精玉輝澄輝太霞髙明玉皇開化普度天人三元導養二象攝生朽𣗳故根巳枯使榮蠢動蜎息長生化形懷胎含孕俱得生成亡者命過魂歸三清魄受煉度南宫飛昇今日大吉皆得光明五帝鑒映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虚洞空洞仙无極大聖至真尊神无窮无極漙監度生惡根斷絶玄都記名衆真班列一切咸聽念法雨普潤天尊煉度一行官吏引領所煉亡魂出離水池念火煉丹界天尊謹召掌火池使者同九光童子火鈴靈童煉度使者火府將吏引領所度亡魂入火池受煉誦大梵隱語焚火煉諸符并十二經絡符切以陽炁爲魂隂炁爲魄隂陽既濟形神化生仰亡魂上登太陽鬱儀之宫受煉更生濯形火府式消炁血之腥煉質離宫必獲形神之妙奉爲亡塊念火煉大呪曰南方之君赤帝之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬物發生天帝有敕使者須聽攝召亡魂煉度真形急急如長生大帝敕念玉清正一天尊炁化成人尸變入玄三化五煉升入九天九天之劫更度魂神受化更生得爲真人急急如長生大帝敕念玉清正一天尊焚酆都山真形奉爲諸幽魂拔度罪業根丹墨書示真北府酆都形七祖得長謝蕩滅於胎門六天策文祕馘爽除幽原爾等長記憶開度受生旛北都咸池府中有萬鬼𡨚水火煉度法三官赦罪愆制魔同保舉逍遥朝至尊急急如律令念金闕化身天尊煉度一行官吏引領亡魂出離火池念日月普明天尊化返生符舉頌返生頌代謝若循環椿木不改柯淨心念至真隨運順離羅常能誦玉章玄音徹霄霞永享无終紀豈知年劫多謹召混元一炁生腎六元運陽化隂大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生左右腎生精生炁謹召混元二炁生心七變徊風混景大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生心臟生神生榮生志謹召混元三炁生肝八徊合元大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生肝臟生魂生筋生血謹召混元四炁生肺九光會靈大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生肺臟生魄生衛生皮毛謹召混元五炁生脾十合隂陽大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生脾生肌肉生肢生意五臟謹召混元六炁生膀胱十一變靈大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生膀胱腑生水胞謹召混元七炁生小腸十二運化大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生小腸腑生水道謹召混元八炁生膽十三陽光大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生膽生精生汗謹召混元九炁生大腸十四運度大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生大腸腑生榖道謹召混元十炁生胃十五成隂變陽大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生胃生水道謹召混元十一炁生三焦十六三境混成大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生三焦謹召混元十二炁生心胞絡十七隂陽合靈大將軍從官符吏等飛行變化助吾真靈攝召生炁爲亡過某化生胞絡生經血脉祝曰靈寳符命煉化亡魂五臟六腑胞絡根元華精徧布懸澍丹田玉音攝炁靈風聚烟三景涸徹萬神齊仙九光煥耀生化自然千和萬合上登玉天急急如長生大帝敕念太清靈變天尊今則浴質明池煉形流火一切汙染悉獲蕩除五濁穢軀盡令涓潔魔无干犯身有光明更爲亡魂生尸九煉臣謹稽首上啓扶桑大帝木公尊神道君太真夫人金母尊神元君臣聞玄黄降炁妙物化精爲天地之尊神總靈司之主宰周行元梵萬品生成密運璇璣三才陶育重玄大化擬議難詮今有齋主某奉爲亡過某修建无上大齋煉度大法追拔亡過魂儀返生人道切以亡過某人身居萬景性染六塵五行蕩失於太无十炁无歸於根蔕三元受譴萬劫无期不假聖恩實難可逭臣等恭依妙範體乾坤化育之方謹按玄科法隂陽和合之理是感崇圓密行匹配願降流水之精煉而成胞火煉丹界天尊昭火之明煉而成胎九幽拔罪天尊乗木之真煉而爲魂十方救苦天尊柔金之形煉而成魄逍遥快樂天尊合土之英煉而爲臟朱陵度命天尊致坎之靈煉而爲腑法橋大度天尊昭離之精煉而成竅轉輪聖王天尊激震之聲煉而爲景太乙救苦天尊利兌之形煉而爲神寳華圓滿天尊臣聞天地和合九煉徘徊復請元始妙炁纒繞身形純陽道炁經羅内外三元育養得成其形靈珠内合化爲内神三素元君與其真魂可體一炁以爲神煉九炁以成真臣等仰對靈真敷敭寳偈舉金木頌扶桑啓靈運鬱鬱吐青芽妙用流金母和合自然葩神炁凝元宫靈物耀絳霞自得生人道名籍繼仙家臣等謹熏沐上啓鬱單无量天帝上上禪善无量夀天帝梵監須延天帝寂然兠術天帝波羅尼密不驕樂天帝洞玄化應聲天帝靈化梵輔天帝髙虚清明天帝无想无結无愛天帝恭聞三寳開光九神感妙无形无影有象有聲浮於太空之中列位隂陽之内正五緯之出没使萬彚以化生乃九炁齊并三元合徳臣今依式煉度亡魂先具奏請木公大帝尊神金母太真尊神降兩曜之英華結五行之秀炁立根受祖溟涬生精感炁含神恍惚有象伏望九天上帝錫正炁於九關十極髙真禀胎元於十月流精混沌育質玄中謹上請鬱單无量天生神章第一帝真胞命元元一黄演之炁纒其胞使胞原宣通上徹於天以生成謹上請上上禪善无量夀天生神章第二帝真胎命元洞冥紫戸之炁纒其胎結解根下響於地以固靈謹上請梵監須延天生神章第三帝真魂命元長靈明仙之炁纒其魂使魂門通神以逹精謹上請寂然兠術天生神章第四帝真魄命元碭尸冥演由之炁纒其七𩲸使𩲸戸閉關天王降仙謹上請波羅尼密不驕樂天生神章第五帝真臓府命元五仙中靈之炁纒其五臓使五臓清涼五帝朝真以存神謹上請洞玄化應聲天生神章第六帝真靈府命元髙真沖融之炁纒其六腑使胃管生津以納和謹上請靈化𣑽輔天生神章第七帝真元府命元髙仙洞笈之炁纒其竅使孔竅開聰星宿朗明以開通謹上請髙虚清明天生神章第八帝真華府命元真靈化凝之炁纒其八景使三部八景整具形神幽夜顯光以防身謹上請无想无結无愛天生神章第九帝真嶽府命元自然玄照之炁纒其身使三關五臓六腑九宫金樓玉室十二重門紫戸玉閣三萬六千關節根源本始一時生神令神布炁滿聲尚神具毛髮生神諸天下臨廼得生身臣等稽首再拜啓畢念變煉有形天尊九章誦徹五體生成既膺大道之洪恩當秉上真之慈訓澄心歸向諦聽奉行蓋以九天之炁生其神三元之精育其質黄白致相混沌合形六甲周流五行交感法天象地包隂吐陽則地剛柔應天分度千真備具萬象森羅合道通真既尊且貴於是首爲崑崙髮爲星辰眉爲華蓋眼爲日月鼻爲天柱耳爲天窻口爲天門面爲天鏡五嶽四瀆九江八河一元二儀三光四象五行六律七政八景九宫十方三十六天三十六地莫不備焉皆大道之應妙神靈之所滋也汝等當自清虚滅欲正念无邪則炁養其神神與炁并炁與精凝返胎更生漸登无何有之郷可不樂哉如或躁動渾濁淫惡存心則傷害其神炁盡神逝魂沉五道魄役三塗无有休息可不悲哉即使三官鼓筆九祖罹殃劫劫生生莫能超脫汝等能含純養素抱朴脩真於慧性中超生樂土顧善惡因縁不可忽也稽首皈依无極大道念回靈養素天尊臣等伏聞長生大聖飛天神王當赤明之祖劫會始青之上方山嶽吞烟承靈寳之隱韻鬼精滅爽振妙首之本章施回骸起死之功著監真度生之品尋聲赴感隨願徃生伏願長生大聖飛天神王齎元始之符命赦北都之罪魂使亡過某人獲制魔之保舉得時刻以昇遷侍衛送迎拔出地戸超凌三界逹上南宫脫五苦八難以逍遥薦七祖九玄而快樂請无拘制克副元科臣无任懇禱之至念隨願往生天尊宣玉清合同升天大劵向來煉度功徳並巳周圓今當告請一行干係神將官君功曹吏兵齊赴壇下聽候發遣指揮讀發遣護送亡人牒伏以亡過某人蔑有超生之路必資拔度之門今來當司追念冥塗冀登道岸罄瀝悲傷之念恭修煉度之科依按玄文備陳妙善懴愆贖罪煉質遷神𡨚尤既巳蕩除性識自當明了然後名除黒簿姓記丹書依仗真風永契虚无之界修持寳誥克臻廣漠之郷洞景若春舞轡大羅之境天書不夜散花大渺之堂身入玉都面朝元始仰金闕玉房之範瞻瓊輪寳蓋之儀速證逍遥永不輪轉更當洗滌念慮整肅魂儀禮謝虚皇好辤壇去靈寳无量度人上經大法卷之六十一
