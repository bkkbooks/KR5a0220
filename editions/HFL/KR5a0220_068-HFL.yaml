body:
  text: 鍊度諸符品降太上眞水火法皇人曰夫幽冥隂暗之郷苦魂滯魄身形穢濁執留泉扄若非得天地之炁鍊度之功何能超悟是以玄皇哀愍大捨慈悲留流火冶鍊之文使奉法之士體元始應化之身集隂陽玄元之炁和合三田之光假南方三炁之火升降清濁斬絶鬼户滌除穢垢使内外瑩徹百骸流光然後始證無爲之道故追魂皆先用北斗之書聚其魂魄去其死尸而後以南極之篆監簿上生故知南辰北斗陶魂鑄魄即得返形遊行太虚北靈寳之上道也皇人曰法官執簡有變朝禮如法黙奏上帝乞降太上眞水眞火下降先須解穢淨身歩九鳯斗至斗口三捻上香再拜行用如法九鳯罡皇人曰左手本師訣右手執破穢符存身歩罡服符並左右足單歩九鳯破穢符天回地轉回轉九天元鳯却穢九鳳収君度穢君度九鳳蕩穢君度九鳯解穢君度碧落梵炁之符皇人曰書北符以兩手辰訣一覆一仰自心劃至髪際閉目存爲元始項生圎象手執如意額中有九色光明化爲五色獅子之座紫雲覆體内外瑩徹十方來朝即通出四二炁取三炁吹筆上次掐中指中節丁立面東書訖即叩齒九通咽液九過然後存五臓五色之炁注入符中拜奏章詞表文篆此以竹枝湯吞之書於壇場之上能召十方衆眞來降口奏請水火式具法位臣某下愚尸穢冒忝師傳得受靈書遵行正敎濟生度死以應誓言謹有情詞上干天聽誠惶誠恐稽首頓首謹言今據齋意今臣煉度亡魂某等不敢抑絶皇民善願謹具上奏祖師北極紫微大天帝祖師南極注生大帝君御前伏望聖慈特賜睿旨頒下水火二司五嶽總領眞君乞降隂陽靈根眞水眞火即日今辰降下壇墠煉度亡魂使其神魂澄正萬炁長存身相具足復有光明上昇天府仰頼天威慧澤洞鍳臣俯伏以俟天恩昭報無任瞻天仰聖激切待罪之至皇人曰法官秉簡叩齒存神黙奏北帝禮三拜然後黙奏面朝東北宣水科燒眞水符眞火符一同畢方行煉度事降太上眞火訣寅加卯卯加寅風火交異午便剔出先吸南方火炁三口後吹入炭火中主火大將軍符三清玉帝北極勑左有右有日君月君天府眞君度天相眞君度天梁眞君度天同眞君度天樞眞君度天機眞君度南極長生大帝君度金烏南極注生大帝君度降彩黄炁日景髙奔鬱儀停午陽精圓明木公尊神居中融和萬彚鮮吁火龍奔衝育童炎烈離宫用主火大將軍符一道先於局中燒面東南召至壇下呪曰謹請主火大將軍願立降眞火煉度亡魂取南炁吹火池中火起半青半赤之炁降太上眞水訣左手子文右手亥文先取北方炁五口吹入水池中主水大將軍符三清玄元三炁君勑左右陽隂貪狼眞君度巨門眞君度禄存眞君度文曲眞君度廉貞眞君度武曲眞君度破軍眞君玄北魁範君度玉兎度北極玄冥君度呈形徊水隱精丹景髙奔結璘居子圓明祖母元君交中分炁幽塗長夜玉體金津陶鑄咸覩慧光流門坎宫用主水大將軍符一道先於局中燒面東北方呼召至壇下呪曰謹請主水大將軍立降眞水煉度亡魂取北方炁吹水池中再呪曰謹請太一凌空七祖神北隂玄司使者急降眞炁再取北方炁一口吹水中存水中黒炁起靈寳淨天地符天地淨然洞中玄虚三清穢炁分散晃朗太元玉敕光映八方威神靈寳符命九衢使我自然九天普告乾羅答那洞罡太玄斬妖縳邪中殺鬼萬千山神呪元始玉文玄水洗穢按行五嶽却鬼延年八海知聞魔王束首侍衞我軒凶穢蕩盡道炁長存焚符玉帝呪曰神靈天眞玉清元眞上清華房元始老君妙入太霞光耀玄文七神飛泉北酆受煙我位上王逼合鬼群八威吐毒肅肅尊神千千去穢凶惡不存萬萬魔王護命剪形急急如律令右符黄紙朱書玉帝訣誦三遍凡建壇燒於水中灑壇三帀或法官出入臨喪或到産難之家及值厭穢回壇急書符燒灰於水中仍面東取炁入水以灑淨身元始符命皇人曰元始天尊在七寳騫林放大光明照見天上地下有諸罪爽不覩光明沉滯迷津飄沉苦海无由脫離故天尊哀愍降諸符命救拔罪魂得升道境永脫苦因受法之士當澡心滌慮精思至道依法告行則幽冥有所濟度矣五星元亨始青死魂炳煥利貞碧霞受煉太上魂魄攝召招眞元經返形萬炁命靈黄炁仙化與天度品君中成人齊年南宫上清靈寳元始符命告下三官天牢地檻主職神司超度亡過某靈魂上昇清微之天百神混合變化成眞永離死户體變玉光秉受玉符叅侍龍轅一如告命元始檄文靈明紫蘭太素髙虚太眞玄晨三炁浮于玉清八觀朗映九衢妙覺變化始青肇圖應感輪廻消魔瓊都芝精煉質逍遥帝輿三清曲赦照破夜塗五嶽九幽无間酆都波羅摩褥下救三塗五苦八難苦厄俱除冥官稟命元始眞符急急如令違者咸誅急急如靈寳大法以救亡魂檄文律令石景水母玉精符係太上沐浴眞符先誦呪然後書符呪曰東井黄華石景玉精飛玄水母金醴玉津滔滔源源不竭池亭九龍灌煉三光垂精仙人吐潤煉度魂靈内外朗徹表裏洞清百關九竅元炁滋榮五臓六腑萬神自生胎胞結節隨水開扄死無斷滅惡絶沉淪我今煉化死骸生魂返故攺貌玉體金容變化煉穢飛升紫庭急急如長生大帝勑誦畢取北炁及當日太隂炁吹筆閉炁書符以東井頌勑之呪曰天河灌東井石景水母精玄光拂靈曜圓暉映髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香水玉女流玉津冠帶濯玉液煉度五仙形體香萬神降乗景登髙明東井灌皇華石景水母精浣魄淨隂穢蕩形成玉嬰表裏瑩通徹内外光華清靈光神不昧正炁合眞仙金童散紫煙玉女麾神精五芽分五炁三素布三雲鬱儀纒結璘飲之復完形詣我玄壇下煉神升玉京玉清眞水合同符黑書黄上用二道取太隂炁吹筆月訣申至子取水炁三口或七口吹符太上䨎池神龍運東慈敕无鏡之淵井華以滌攬兹太和玄和幽魂運容之津玉女灌之于神魂神道炁澄正長存呪曰搯子文太玄之一八景同靈五老祕諱日月運明璇璣運轉十千五行八史通靈招神致眞聞吾呼召速降威靈承符奉命輙莫容情急急如律令取北炁吹入符中再以靈寳總呪勑之水煉超度眞符一炁皈天二炁隂陽合炁皈人天地交并天清四方三五混合天清地寧合眞黄華蕩形地爽煉度亡靈元洞玉曆龍漢延康渺渺祖劫混沌之中上无復祖兆當凝神靜念思自已下丹田有紫黒之炁結成宫殿下有淵泉有九龍居淵泉之中宫殿乃眞人居焉又思九色之炁在上田結成金樓玉殿乃元始上帝所居存元始上帝開顔含𥬇下降金光一條直透下丹田中存眞人乗龍自沉丸宫中直出龍吐眞水洗滌亡魂次存元始上帝手執如意乗龍浮空中頂放眞光灌溉亡靈體生玉光明如瑩玉了无瑕翳良久又存元始復逆上丹田眞人皈下丹田兆篆此符用青紙黄書呪曰太華之水浩渺無窮能令枯朽返胎復嬰黄華灌煉魂魄生光降與眞人俱會玉房玉眞煉形符用黄紙墨書取北炁元始一炁混沌眞一萬象化生无上玄元神水蕩穢惡炁不煙慈風洗蕩日精月華育消釋罪根養眞元上帝有命普度幽魂呪曰浩浩渺渺太上靈泉潤枯育物流注自然神華生液澄清太玄生魂育魄靈液綿綿清泠保命北都純煙華池浩渺莫測其源石景九煉水母玉符祝符呪曰陽明煉精光煥紫庭八芒朗映魂芝日盈五回三轉炁通太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御石景水母灌精順生運炁隨日華榮九孔納眞解脫本形黄炁隂華陽精洞鮮沐浴九魂冠帶金晨貟明啓告玉胎煉仙華光交煥流芳淘津九陽齊化玄霞散煙元景回靈曲映我身飛昇上宫洞視瓊仙黄炁流精三合凝光玄暉返正冠帶八芒煉魂東井受明飛星含華散靈五君流芳夫人降醴潤灑十方洪芝下注六腑益充金精九仙易景返容乗虚落煙遊宴太空上造月庭與眞齊雙變化八道出有入無二晨同暉永保无窮右存月中有五色流精下降池中想亡魂身有陽光照滿十方玉光瑩潔相貌端嚴法師黙存黄華蕩形天尊朱陵度命天尊石景水母大神下符呪曰東井華池玉田浮霐石景水母玉胞金晶五方正炁日月之精玉眸已煉黄華蕩形靈寳符命受煉更生月魄符白地朱書玉清煉身符元始天尊靈寳道徳神霄天尊天尊眞王勑日魂朱景照韜緑映月魄曖回霞赤童玄炎飊象蕭芬艶翳寥婉虚靈蘭鬱華結翹淳金晶瑩炅容臺標首相散形呪曰亡魂首相具體全人是男是女骸變通神十干呪曰流火丹宫朱陵煉身玉眸眞水黄華蕩形我身上告十干神兵飛騰玉府昇入帝庭奉神霄玉勑速降元炁成祝符呪曰上元一眞守固泥丸中元一眞安鎭絳宫下元一眞守衞命門三元齊景保命長存招眞致靈坐降自然變形煉髓骨化成仙毛羽飛騰翺翔帝宸急急如律令甲乙丙丁却穢生神戊已庚辛正炁聚形壬癸生精復汝眞形元始符命上升朱陵急急如律令法師凝神下符呪曰龍漢蕩蕩無形無名渺渺億劫黄道開明神燈朗耀九龍吐津玉虚澄輝太霞髙明元始開化諸天齊齡三元道養二象攝生未度者度未成者成已死者化巳枯者榮蠢動垍息一切冥靈懷胎含孕咸得受生亡者命過魂歸三清魄受煉度南宫變形今日大慶皆得光明五帝鍳映普吿萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虚洞空洞仙無極大道至眞尊神無窮無極普監衆靈惡根斷絶玄都記名衆眞監度一切咸聴金液煉形符亦名召魂文煉符三寳煉度亡故某君勑三魂七魄靈光徧施遷昇魂魄幽夜開明還聚本形呪曰靈寳符命金液煉形與道合眞開明三景是謂天根無幽無極無始無終元皇九醜靈魔絳宫紫雲飛天身乗六龍火上水下流入三宫神皈陽明大道自通急急如上清金液煉形律令眞火合同符黄紙朱書用二道先取太陽吹筆日訣寅至已取火炁書符太上南閻洞浮玉眸詵詵慈勑流火之膏浮熖之庭眞炁下降煉度沉魂呪曰天中之靈日月俱通甲乙炁令五行旺剋八景玉音守形眞符招眞致靈攝魂符使聞吾呼召速降通靈承符奉命輙莫容情急急如上帝勑火錬成仙符朱明上景日月石景並明水母玉胞金晶中有赤帝南極玉眸老人名曰洞浮詵詵洞陽火煉甲乙隂消魄晶丙丁戊巳庚辛胎光玉嬰回骸起死長生壬癸受煉大君丹界天尊朱陵度命受煉更生急急如三台眞人台靈寳度人律令光幽精爽靈玉胎煉仙符黄炁隂華沐浴九魂九煉陽晶固仙生尸冠帶金晨圓明啓告玉胎煉仙華光交映九陽育化流芳陶津玄霞散煙元景回靈曲映飛昇上宫我身洞觀瓊軒呪曰日月光華徘徊洞陽流火入器煉化隂亡尸穢消滅萬炁混康逕離五苦上生天堂陽精已通飛華巳新皇芒流溢廕注内纒仰飡玄潤芳華來臻宫宅開張蕩洗囂塵體映玉光面發金眞雲飛禹歩上造日門日魂流光五色滂沱鍊魂金門圓景峨峨靈輝吐耀受明天河玉芝盈溢蘭潤芳嗟飲我皇水哺我飛華掇根咽實壽同靈柯形附太輝身騰飛霞千齡萬劫使不傾殂焚符呪曰陽明煉精火煥紫庭八芒朗映魂魄溢盈五回三轉炁通太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御石景水母灌津順天運炁隨日華榮九孔納眞解脫本形急急如靈寳大法煉化成人律令皇人曰右符乃三景玄元之炁結成凡煉度亡魂用香九片書亡人姓名生死年月日時面東書符同香焚火池中則亡人全其形昇昜境矣日魂符紅地黑書受煉召魂符三皇元君天洞金玉之光天眞照徹十方攝召魂爽來詣察命溟漠玄治定録開通正定五府勑符一召本心開明隨呪來急次九轉云玉清上帝勑上清大帝勑太清大帝勑金木水火土五星尊神攝召亡過某赴玄壇吾奉太乙救苦天尊勑行焚