front:
  text: 靈寳无量度人上經大法卷之九霜八
  hash: sha256:df826e7f951a5e7be29e092f7afb64f751920e288f7442ed323d879fa6462c04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_009-001a, image: hfl/0086/0086-152.png}
body:
  text: 十轉回靈品十轉回靈萬炁齊仙玄師曰十轉之道廼五行生成之理其十轉之法是天尊十過說經神化者是其理也衆眞侍座玄師曰一身眞集可議斯言元始天尊說經一徧諸天大聖同時稱善是時一國男女聾病耳皆開聦玄師曰眞集常善水數生一普天蒙恩水生上朝徧流山谷沐腎増智聾耳得開病耳得聦以至道言之迷音不知音外眞病耳不聽無聲大聦亦聾曰得水之眞一流智昇慧開而病耳聦也說經二徧盲者目明玄師曰一身光明之主日月精華之根者目也爲集眞之戸牖見道之靈宗上道禁經日月爲首光明者火也中主之瞳熒惑之本日月分輝也火二生數天一眞水浴生本始之根上玄眞火騰飛於心故復光返明接景三光是盲者目明況生化之本甲坼兩腎戍亥之元系水朝元二瞳上凝於心生火視三光合并二瞳主目光曰吁員是也至道生育亦猶其𩔖耳說經三徧喑者能言玄師曰木之生數也以至道言之一物生五行一色有五彩隂陽互用生成反復藏其用其喑者以常道言之肺主音也以五常用之言主金也金主聲也即天尊三徧木之生數神化理在西方正金之體以木召金返復神變故喑者能言是也說經四徧跛痾積逮皆能起行玄師曰金之生數也跛痾者偏枯肌血四肢攣曲癃痾跛蹇也積逮之疾者世傳逮及積沉不愈是也此正筋脉舒縱血絡澁流屬於木脉肝炁羅絡之主却四數神仙正所謂返覆五行生成之法也以至道言之法身之病金木互用則亡正是水火互相須金木互相愛故四徧金之生數而成木之神變此之謂也說經五徧久病痼疾一時復形玄師曰五乃土之生數之道肌血形骸皆屬於土故五徧復形全於五行之體聾盲喑啞跛痾積逮久病痼疾一時痊愈復形全質是五行生數也說經六徧髮白返黒齒落更生玄師曰水一生數使聾病耳皆開聦而水之成數於六眞水成化髮白返黒齒落更生也說經七徧老者返壯少者皆强玄師曰說經七徧火之成數一身光明内生五臓光華外攺老者返壯少者得之顔貌益强皆水火之功也說經八徧婦人懷妊鳥獸含胎巳生未生皆得生成玄師曰八者木之成數生炁育物皆得生成聖胎凝靈八炁秀結分形胎化无諸惡損皆木之生炁之所主也說經九徧地藏發泄金玉露形玄師曰說經九徧聖胎九轉金之成數形難隠諱金光玉華照耀萬里所謂金容玉貌瓊肌瑶體沐漑一身嘘呵萬物立化金玉吹炁成金唾地成玉百花千彩映絡一身皆由五行成用金玉發泄聖胎分形也說經十徧枯骨更生皆起成人玄師曰土之成數謂之十轉回靈萬炁齊仙回骸起死枯骨變仙更生成人此十徧之道元祖五行生數至於末後五行成數明此道則長生修此道則神仙脫殻飛升止於此矣若功成行滿位證髙眞八十一日一轉八百日小乘三千日大乗不離斯言應出産一切神仙萬法逕路殊途事歸一揆眞師口訣盡於斯馬法空眞人十轉回靈萬炁齊仙頌曰自一至十五行爲本隂陽周回出入聖關日上扶桑月沉玄衮萬神朝眞得同大混玄師曰四玄二道大定神光黍米入妙中理五炁十轉回靈眞人而說頌偈洞其奥則昇騰有限明其旨則神仙有自胎化法質品皇人訓曰元始聖胎有十月生成之數有七首五根之道上品妙首十五歳无行上首二十五歳須延明首三十五歳阿那品首四十五歳宛首五十五歳三界稽首六十五歳群魔束首七十五歳群妖束首玄師曰上品妙首不待九年之功无行丄首七年可以成眞阿那品首九年白日飛昇須延明首一紀功滿成眞宛首十八年尸解得道六十五歳地水之仙名注天府故三界稽首七十五歳長生度世无諸魔試故群魔束首巳下延夀天年群妖束首也上无色根是爲天根斬絶地根保命生根落滅惡根玄師曰上无色根諸塵漏淨入於无想无爲之品是謂天根未達此根先斬絶地根无諸業累苦債即得保命生根二道並以落滅惡根爲首又曰上法天根中法生根下法地根除於色根落滅惡根玄師曰既知聖胎七首五根之道方可入元始聖胎玄師曰元始聖胎生於赤文之後碧落之先産於大浮黎土心胞八脉外應九色煉於九鼎七首五根之先赤文碧落之初天地起於有數有數要在口中呼吸之炁既有呼吸之炁運於出入之息晝夜一萬三千五百息一息脉四至在呼吸之間一呼三寸一吸三寸呼吸之間六寸出入一至之脉一寸五分是十五分隂陽大數天地之體天一地二人三也其眞炁入九鼎連汞攝鉛造化元始聖胎每一時氣長六千七百五十寸十二時通長八萬一千寸共計八千一百尺爲八百一十丈眞炁是十二時也每一時權機八刻二十分十二時通一百刻每一時定一千一百五十息十二時定一萬三千八百息每一息定火一銖二十四銖乃定一兩三百八十四銖定火一觔萬三千八百息計眞火三百十五觔二兩半八隂八陽依天地運度定人炁血周流一晝夜百刻中每刻六十分一時八刻二十四分得三百六十息一呼一吸天地運行六十里一晝一夜運行九十六萬一千五百里周天三百六十五度二十五分半又周天一百八十二度七十二分七十五杪度一千四百六十四里六寸二十八宿行運皆隨天地旋斗歷箕進炁追之每刻天地運一萬八百里毎一刻六十分一分六息一時八百九十寸天地運行八萬六千四百里一時炁長六千七百五十寸十二時炁行七十萬八百九十寸天地行時炁血行隂陽運時營衞行日月交時内炁交内炁交時産至寳至寳聚而成大丹大丹圓而成聖胎其走漏之道八邪所攻造丹之基十干之合配於九鼎合於九色成於九轉元始内宫心胞八脉之圖利元通神品天眞皇人曰陽全則仙隂全則鬼陽全則天眞可覩故有洞眞洞玄洞神隂全則與鬼爲徒故有洞隂朔單鬱絶玄隂寒庭長夜人禀冲和之炁隂陽兩半不能覩其仙眞者謂陽不全也有絲毫之陽不能爲鬼有杪忽之隂不能爲仙是九天之上隂炁都消九地之下眞陽永絶是故修行靈寳大法先當身不雜務心不他想内外清虚抱元守一次採服正炁煉炁成神使純隂去體陽神降身方可洞視百靈召降千眞祛除妖魅禳却五兵兆當誦詠靈書歌章晝夜不怠方獲精感妄泄一字眞靈皆散萬无一成兆宜閉口奉行當擇三元八節日稽首書十大眞人十大玉童十大玉女降眞召靈符法中仙曹五帝玉童承受玉女上奏靈官護道正神於卧床之後立一小室安排仙曹聖位法籙等文香華時果供養以爲監察司師功過動靜關告守等報應於其吉日入靖朝眞罷存想三寳各受碧玉金字眞炁長九寸闊五寸題曰玉清眞炁上清眞炁太清眞炁受訖再拜退身持念通神眞人玉童玉女累及萬徧寒處得温熱處得涼倦處得勤臭處得香厄處得安皆得如意法中内外之事焚香禱祝皆來吿人或大或小或光或影言語聲音光象色景隨意詳察以見吉凶通章達奏咸有感應太極眞人太玄眞人太一眞人定光眞人妙光眞人寳積眞人普得眞人妙行眞人正一眞人玄一眞人金光童子无上童子正眞童子開光童子清光童子慧光童子法敬童子圓光童子道眼童子慧眼童子太玄玉女青腰玉女太素玉女玄妙玉女六丁玉女三清玉女八極玉女九宫玉女靈飛玉女變化玉女右法十眞人玉童玉女若變特竒異相若起邪心必墮地獄大怒呼呌失信違盟其神逺去臨事不神兆欲修行靈寳當擇戊辰戊戍已未巳丑爲首至日子時之後朝眞罷對聖歩斗自柄至斗口囘身入斗口中又九拜三捻上香兩手結五嶽三途印捧在心前覷定水一鍾叩齒九通呪曰魁罡靈魁罡聖逢著邪炁必須應敕攝敕攝右法念九徧向天吸北炁呵入水中存想水内有靈字覷定水呪曰乾元亨利貞日月與吾并吾亦非飢渇頼得神水清五行之炁六甲之精神水入五臓永保得安寧神仙同羽化飛昇朝上清急急如律令右法念九徧向北取炁呵水再呪曰紅杏卯墨黒坎磨眞酉襪臘南靈寳中指中興生乾獨隸坤可韓巽謹請太一天眞太初天眞眞仙眞人上應乾位六丁左神六甲右軍爲吾上受天心太一靈呪南方火輪除邪去病耿水敕攝太一諱右呪念十徧向北取炁呵水中念呪時存太陽如大火輪在水中取炁放印即將二手廵五嶽三途訣再呪曰但弟子一年三度受炁天炁地炁日炁月炁五星之炁南辰北斗之炁六丁六甲之炁北斗九皇之炁三台華蓋之炁无上三天之炁五嶽持身妙炁風雲炁雷雨炁四直之炁天不能蓋我地不能載我衝我者死撞我者亡急急如律令攝念呪三徧取北炁吹入水中然後向北再念呪一徧取五方炁入口灌漱入腹將水呷三呷壓下眞炁以訣彈於身中再上香九拜而退靈寳无量度人上經大法卷之九
