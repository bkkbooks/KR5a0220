front:
  text: 靈寳无量度人上經大法卷之六十三玉十一
  hash: sha256:a07c9b6627d7f57ce1b0adf763f9540746b4111c9e3035ec5fd6c500c4c73ad5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_063-001a, image: hfl/0096/0096-158.png}
body:
  text: 九煉生尸品師曰三景開明九陽運化混元合炁聚而成靈寳三元數推周分十二在天則十二官分在地則十二分野在人則十二經絡十二臓腑以應六隂六陽亡靈若經九煉則表裏生化還復人形若不經九煉生尸則形體不具罪垢纒身是故靈寳大齋祕法始以九煉亡魂生尸返神次之神仙中保修真之士可以全身定炁修身化形依法修煉可以運隂陽造化自然神炁與道合同皆自隂陽變化隂盡純陽可登真域凡人不能尊其炁保其形貴其神情欲恣縱勞神損炁耗散元陽自取死壞離其本真至於魂況九夜魄墜三塗不自知覺難遂超生是以太上慈悲元皇憐愍垂三洞拔亡之格闡生尸九煉之科普度存亡幽明共頼至學之士持誦金書吞服此符周而復始即得九天太和真炁流入三宫躡景登晨指日可待亡魂煉度可以解除業障和釋上生謹按師旨自龍漢木劫生胤鬱單无量天上上禪善无量夀天梵監須延天中凝玉清始青天始元天始丹天上化太霄青霄碧霄是也赤明火劫生胤寂然兠術天波羅尼密天洞玄化應聲天中凝上清太玄天太丹天始玄天上化紫霄絳霄神霄是也上皇土劫生靈化梵輔天髙虚清明天无想无結无愛天中凝太清太初天太素天太始天化景霄玉霄琅霄是也至六千六百六十六萬年至延康素華金劫立四方三十二天帝二十八宿界四極天真上皇分司四方至五萬五千五百億萬年至開皇元陽之劫乃水劫也生五方五老五帝五嶽人民五劫開化分於四隅而九方九天九霄九聖九真九仙九微九道九曜九星九宫九壘九隂皆玄元始上中下三元青黄白丹紫絳碧景琅九炁所化故經云自此三號雖殊皆天地之極也清微妙範曰炁清髙澄上積陽而成天界炁濁凝滓下積隂而成地位二炁交降隂陽相索沖炁凝和以生人道凡是生化人形與天地造化之元一體一象未甞有易太初之本玄炁无形陽精兆生神谷渺蕩无形混同无質无相无聲无光乃人身元始大神天寳祖炁之根至乎火發潜宫流化洞陽二炁混合交纒煉變神炁會同精血符合乃靈寳祖炁之本已立隂陽體象二劫赤明之法胎結中黄炁周二十七度兆胚有億化之神變位三才沖和成形大極生焉三十六度金炁育魄四十五度天一太一育魂五行俻位五臓生華上生泥丸九宫中化三元六腑色華九彩乃全人形九月天數八十一周地數三十六足胞胎九炁全功上應九炁九天則太一元君執注生之符長生帝君定命品髙下司録定年丈人勒籍司命定筭夀五帝監生成九天聖母衞房九天司馬命章召太微之一炁生萬神百戸三界俻守萬神恭敬而生爲人身豈有異於天地哉故經云九天司馬不下命章萬神不唱恭諾終不生也當生之時亦不爲陋也但人不能保育元和煉養赤子但積貪嗔暗招罪戾遂致萬神去體一眞蕩散魂神拘絆於冥漠罪垢汙染於三田自非九煉生尸苦惱何由開泰兆宜俯念幽塗遵禀奉行以祈真應母自簡畧上冐天憲謹按師旨凡行九煉生尸先用香華燈燭精嚴望東供養髙功上香先進三拜再上香再拜長跪口奏齋意上啓九煉天尊靈寳自然神真九天帝君五方五天帝君允臣所奏特降敕命頒付九煉返生真司仙靈符吏官將五方五靈童子鑒臨生尸九煉臣深慮肉質凡軀祈告關奏難以達御發爐啓奏不依科格謹備五方五色神炁注入臣身蕩除五濁清淨三宫使臓腑開通百關流暢臣啓奏即得上達恭望天慈允臣懇請臣誠惶誠恐頓首稽首再拜次左手搯中指中節丁立存想東有九色神光而起良久之間變數千丈神光爍爍兆以左鼻孔引接東方之上神炁吞入三田之内次面南方西方北方中央並如前存想取神炁五方取炁服畢兆再詣天門上三拜上香長跪啓奏臣奉爲某人生尸煉度已請五方五色神炁灌注三田恭望天慈賜臣神炁下入身中洗滌塵垢神炁堅固啓吿玄穹速賜感通呼召神吏立獲感應亡魂九煉即遂昇遷齋功成就魔障不生臣冒犯天威下情无任激切屏營之至謹稽首再拜謹言兆登壇端想左手搯普度訣宣科存想煉度之所自然有五色神炁覆盖煉度之所存見太乙救苦天尊十方救苦天尊廣度沉淪天尊朱陵度命天尊法橋大度天尊火煉丹界天尊轉輪聖王天尊金闕化身天尊逍遥快樂天尊寳華圓滿天尊九天神章天帝君九煉返生真司官君將吏天尊並著九色雲霞羽服九天上帝衣冠冕執圭煉度將吏如世之侯伯各乘雲歩空降於壇所黄雲紫霧五色神炁罩於壇上兆集神精思不可神思散亂九煉神吏運洞陽之火煉度亡魂俟諷九章兆存泥丸出九色神光一道徧滿虚空中有玉宸元皇道君左右二真人侍道君放无極神光下煉所度亡魂焚符兆搯九煉訣黙念超昇呪曰玉清符法爲汝煉魂再返人道以超太清急急如律令念呪畢取東方炁吹符上送於火池内焚之再黙念太一救苦天尊火煉丹界天尊朱陵度命天尊各三聲次念生尸開度呪曰南閻洞浮流火之庭玉眸煉度黄華蕩形神魂得度升入朱陵急急如律令次念九煉返生開度超升呪曰真光煉度一切罪魂魂神澄正滯魄超升金容變化九煉飛升急急如律令兆行持九煉並要寧肅心田使身形俱忘則精思感徹若或心中掛一毫髮事亦不爲究竟兆宜遵式奉行九天九炁自然符无上盟真玊匱黄籙大齋壇本壇今月某日爲某人某事具奏天闕請降鬱單无量天帝真胞命元元一黄演之炁真符生尸九煉正性聚神須至吿下者餘行見符命門右凖鬱單无量天帝真胞命元元一黄演之炁真符告下煉度亡過某人及九州分野五道四生幽魂滯魂等拔擢冥魂調理隂陽制魔保舉度品南宫死魂受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超陵三界逍遥上清一如吿命太歳年月日具法位臣姓某承誥奉行内可漏帝真胞命元一黄演之炁真符具位臣某謹封外方函鬱單无量天符命告下煉度亡魂某人及五道四生幽魂滿魂具法位臣姓某謹重封上上禪善无量夀天帝真胎命元洞冥紫戸之炁真符梵監須延天帝真魂命元長靈明仙之炁真符寂然兠術天帝真魄命元碭尸冥演由之炁真符波羅尼密不驕樂天帝真臓府命元五仙中靈之炁真符洞玄化應聲天帝真靈府命元髙真沖融之炁真符靈化梵輔天帝真元府命元髙仙洞笈之炁真符髙虛清明天帝真華府命元真靈化凝之炁真符无想无結无愛天帝真嶽府命元自然玄照之炁真符右九天九炁真符誥文並同前式預十日前用黄紙九幅長一尺二寸用朱書符墨書誥文白紙作封皮方函書畢逐道誦九天生神章取東方青炁吹符想符光彩燦爛煥赫奪日兆逐日誦生神章呪之焚香面東啓白齋意調神正炁誦詠九天生神寳章一過引九天真炁灌煉一身叩齒三十二通存自已三丹田出三色真炁上接天界三清上帝自三丹田出九天上帝自泥丸九宫出元陽慈父丹林大帝木公尊神衣五色衣冠左有王喬右有赤松子自肝中由左目而出西龜夫人金母元君五色雲髻左有圓光玉女右有太隂玉女自肺中由右目而出二神乃萬神之祖萬炁之先立於空際存自己五臓出五色雲炁自泥丸中出存五方五天帝君三十二天帝君浮空而來立於五色雲中存十方靈寳天尊十方救苦天尊十方救苦真人乗空歩虚燒香散花同諸天帝放百寳光明照耀下方无極世界九幽羅酆五嶽四瀆九州社令應諸冥獄罪魂得覩祥光俱得出離次存玄壇之外土皆作碧玉无有異色九煉返生真司靈官將吏各乘真炁立於壇之左右前後存丹靈大神朱陵神君各乘火龍自心中由重樓自兩眉間出在壇内其火龍踴躍徧地皆成五色真火无有邊際存九煉官將管押亡靈及幽魂滯魄无量百千萬億咸來受煉次焚符火池内其符吏仙靈乘符真炁灌煉亡魂復相生形九天上帝諸天真仙在空玄之際同聲誦詠九天生神寳章預壇法衆存爲監煉真人在會之人存爲監煉大將次存鬱單无量天帝以胞命元一黄演之炁纒其胞上徹於天以生成上上禪善无量夀天帝以胎命元洞冥紫戸之炁纒其胎下響於地以固根梵監須延天帝以魂命元長靈明仙之炁纒其三魂使魂神通靈以達精寂然兠術天帝以碭尸冥演由之炁纒其七魄使魄戸閉關天王降仙以安寧波羅尼宻不驕樂天帝以五仙中靈之炁纒其五臓使五臓清涼五帝朝真以存神洞玄化應聲天帝以髙真沖融之炁纒其六腑使胃管生津以納和靈化梵輔天帝以髙仙洞笈之炁纒其七竅開聦星辰朗明以開通髙虚清明天帝以真靈化凝之炁纒其八景使三部八景整具形神幽夜開光以防身无想无結无愛天帝以自然玄照之炁纒其身使三關五臓六腑九宫金樓玉室十二重門紫戸玉閣三萬六千關節根元本始一時生成令神布炁滿聲尚神具毛髮生身次焚五神混合符使五神復住五臓焚混合百神符使百神會集四體如淨瑠璃中舍寳月並无一點塵埃次存三官九府百一十曹五帝考官九宫掾吏酆都水府五府社令冥曹治職各持黒簿來到帝前祖師上帝放九色真光光中迸出真火焚燒亡魂罪籍皆爲灰燼其諸亡魂歡喜踴躍稽首天帝其諸天帝各乘雲炁自兆泥丸中入各歸宫府亡魂遊行自在相貌端嚴逐日三時耒詣齋壇朝禮慈尊如不行南昌煉度纔焚罪簿了即升經橋上登道境靈寳无量度人上經大法卷之六十三
