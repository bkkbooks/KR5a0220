front:
  text: 靈寳无量度人上經大法卷之五十三玉一
  hash: sha256:778a9c99fe214a948eb39171b4db454032d93c5360e80a1fd057a070aff3d522
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_053-001a, image: hfl/0095/0095-004.png}
body:
  text: 齊同慈愛品師曰應學道之士行靈寳大法務在拯幽度人之道欲求其應現於陽眷通傳語話或入夢中現形以此方爲妙理凡有幽魂寃結不解在於冥中或仇讐執對或累劫相纒或奴婢横亡或漂流大海或久沉幽夜或被繫諸獄或學道未成而歸幽府或僧或尼或商或賈或母死子存或産子亡母或子母俱喪或自縊而作凶殃或犯王法以致横亡或宦逰南北染患而死或因呪詛顛邪以壞身或遭虎噬或值蛇傷或因物以亡身或水火之生變或陣亡或因餒流離而散家或作穿窬而被害或六道之種或十𩔖之靈各有其門與之追度雖金籙以度命有惡業之重輕於是太上視寳笈琅函出度人之典故知司属可以昇度蓋大法建八門之壇隂陽二獄鐡跡臺光寳章皆爲罪業輕重所以立之三壇令現形跡與之升度各隨業報現於八門今以升度符命隨其亡過之報並與解釋追攝庶免其渾雜耳如用符宜子細詳之不可差悮爲民度脫九祖靈符上帝訣師曰靈祖法師先爲人度脫九祖法師亦自當如此若未能度於九祖何以度於幽魂先書此符以度之不論何地此符纔到便得升濟呪曰靈寳出符命玉笈降神經追度長夜府昇濟九天魂承符離幽冥度脫九祖靈急急如靈寳帝君律令爲民度脫六親情眷真符師曰靈寳法師先度九祖次脫六親或爲民或自度皆用此靈符與其濟度並用黄紙朱書書符呪曰靈寳天帝一切靈寳真君及諸天君神王諸位真宰主者速得通靈符中將吏度脫六親九祖升濟飛升太清急急如玉清律令敕符呪曰天帝玉章昇拔隂房寳符徧度地獄開張六親情眷解釋寃殃魂神受度昇上南宫急急如玉清上帝律令解釋因寃對而病死真符師曰凡人世上多因財物多因酒色結成寃家逓相報對无解脫時當以此符與之解釋免沉夜壑覩見光明和寃成友用黄紙長六寸朱書搯寅文敕符呪曰靈寳符命解釋寃愆捨惡從善和友無慊宿根斷絶使保天年凖今符命解結升天急急如玉清上帝律令召神吏索亡魂罪籍解釋真符師曰亡魂滯爽在世作罪造惡或不孝六親毀謗良善造作多端名記隂曹注籍冥府雖作大齋何以得其升度須當至誠召神取索亡魂前生宿世罪籍當太上御前與之解釋削罪黒籍注名金簡用黄紙長七寸朱書搯上帝訣敕符呪曰靈寳真符降付幽都取索罪籍升度冥途削除業簿登注善書神符急下神符開都急急如玉清上帝律令召五嶽吏兵追犯呪詛亡魂真符師曰凡世人多被呪詛而染顛邪身雖未盡天年而夭者皆𡨚對所纒耳須用尋訪追之與之和釋須召五嶽吏兵追尋用黄紙長七寸朱書搯上帝訣敕符呪曰玉極靈章下至酆山五嶽神吏追取亡魂解釋和順逓相爲良呪詛消蕩同升天堂嶽庭將吏承符尋訪急急如玉清上帝律令召亡魂解釋呪詛和釋上升符師曰凡人呪詛身亡魂入冥寞未得升度而附平人求以解釋當書此符度之敕符呪曰玉清降符命頒付九幽行救拔沉滯魄濟度呪亡魂承符各和順爲友結爲朋消除㗸負語升濟入天門急急如玉清上帝律令解自縊死魂真符師曰凡世人在世多因酒欲多爲財帛多爲氣宇多爲寃家相纒是致横夭而未盡天年而喪何以與之追度將此符用黄紙朱書長五寸燒化呦之其繩自解丑訣敕符呪曰滯魄靈靈上應天庭寃濫自害身殁幽冥凖今符命和釋超升急急如玉清上帝律令告文右凖符命抜度六道四生孤魂等衆解除縊死之對或爲奴婢或爲小民或被逼迫以自縊或爲鬼祟之求替或爲人吊縳而死或因自忿而亡縊死彼時含恨累世承兹符命解釋寃仇時刻昇遷一如告命度傷殺死魂真符上帝訣師曰凡有幽魂曽因被殺身亡㗸寃夜府未能解脫聞聲執對何以起度用黄紙朱書此符長五寸與之解釋自得脫離冥郷敕符呪曰帝君有命解釋前非寃對相纒和釋咸歸亡人今世宿業報時凖今符命超度天儀急急如玉清上帝律令告文右凖符命拔度六道四生孤魂滯魄等衆解除殺傷之對或爲閭里或乃親姻或爲飲酒分財或爲爭名圖利或因暗行奸盜或自一時忿爭以致殺傷因而亡殁承兹符命解釋寃仇時刻昇遷一如告命度水溺死魂真符師曰凡人世間或爲水漂蕩魂拘北府魄入冥郷黄紙五寸朱書敕符呪曰江海之神河瀆之神升濟水魂超度幽沉準今符命火急奉行急急如玉清上帝律令告文右準符命拔度六道四生孤魂滯魄等衆解除溺死之對或因忿怒而投井或以附舟而落河或鬼祟引迷而不知或生人推墮而不記遂致溺死沉滯水司承兹符命解釋寃仇時刻昇遷一如告命度復連蠱疰亡魂真符師曰凡人在世間或祖代相傳勞疰而喪或祖墓生殃或三或五或至一門俱喪冥郷何以追度可書此符與之升遷用黄紙五寸朱書燒之敕符呪曰三尸之靈九疰亂神喪人魂魄傳疰敗真玉清符命追取幽扄捨惡從善飛升紫庭急急如玉清律令告文右凖符命拔度六道四生孤魂等衆解除復連死魂之對或家親勞疾而傳或屋宇伏尸之染或氣傳而夫婦俱死或飛尸則親姻皆亡號曰復連互相纒染承兹符命解釋寃仇時刻昇遷一如告命度塜訟死魂真符告文右凖符命拔度六道四生孤魂滯魄等衆解除塜訟死魂之對或祖先墳墓以興災或因子孫悮犯而致死或報對三官之府或注訟五墓之中受死亡魂號曰塜訟執對長夜爭訟冥曹承兹符命解釋寃仇時刻昇遷一如告命度中藥毒身亡魂真符師曰凡人在世上或因財物或至寃仇爲色爲氣被人以藥謀或因酒食爲人所害身歸幽府寃寃相報无解脫期可書此符與之升度用黄紙五寸朱書燒之寅文敕符呪曰玉清符命告下幽扄㗸寃苦爽執對寒庭承符解釋上超朱陵急急如玉清上帝律令告文右凖符命拔度六道四生孤魂滯魄等衆解除藥死之對或因食物中毒或信巫師而罔醫或五金八石反惡而亡沉滯冥司含恨累世承兹符命解釋寃仇時刻昇遷一如吿命追寃結不解幽魂符師曰追寃結不解亡魂須令地道功曹追赴壇與解寃愆使令解脫用黄紙長七寸朱書搯上帝訣敕符呪曰五清垂慈追度幽魂解除寃結削罪北冥真符和釋超入朱陵急急如玉清上帝律令解寃讎執對幽魂符師曰凡人生於世仇讎相害以致身亡劫劫相纒執對无息當書此苻以與解之免滯隂司憑托生人宜用此符升度用黄紙長八寸闊二寸朱書敕符呪曰隂靈隂靈執對寒庭宿對仇讎負寃幽冥累劫無化申告難憑真符超濟和釋上生急急如玉清上帝律令追累劫相纒幽魂符師曰凡人世轉報輪廻无暫停歇㗸寃負債世世相纒逓相報對何以解釋今將真符可與升度黄紙七寸朱書搯上帝訣敕符呪曰玉清上帝令降付幽都解除纒對消却黒書真符到處獄吏聽命急急如玉清上帝律令追奴婢横夭惡死符師曰凡人間奴婢或被主家因事所逼拷打終朝告訴无門非理而喪㗸寃夜府執告隂司以求執對何以解釋將此真符與之和釋更用經文功徳與之升度用黄紙長五寸闊二寸朱書敕符呪曰玉清寳笈文追度横亡魂開度長夜府昇濟九幽沉真符罷釋對和順離幽冥急急如玉清上帝律令追漂沉大海魂魄符師曰凡人詣壇申訴或爲商客或以效是男是女經河海大江波濤而殁漂流何所尸蕩佗方不記死時无門追度以此符命更帖神虎部衆及尋訪捷疾使者追尋赴壇顯現形迹通吐因依與之升度用黄紙七寸朱書上帝訣敕符呪曰元始降符命大法濟漂沉升度長夜府開度受生魂急急如玉清上帝律令追被繫諸獄未解脫魂符師曰夫人欲追諸魂識先度諸獄之中被繫亡魂皆是作諸罪犯死入冥曹被繫諸獄劫劫生生逓相報對入於諸獄无解脫期用此真符宣行升度上帝訣敕符呪曰玉清誥命升濟幽冥諸獄囚魂各釋消氷寃隨善念業報分輕慈尊救苦刀消雪扄急急如玉清上帝律令追末學道淺未成亡魂符師曰夫人欲修養爐煉丹砂欲擬長生未知七返之方因病而魂歸幽壤幽幽於冥寞之郷寂寂乎長夜之府豈不哀哉可用此符與之追度用黄紙五寸闊二寸一分朱書上帝訣敕符呪曰玉清寳籙降付幽關地獄摧毀鐵城開宣末學亡者使令神全凖今符命再返人天修心不退道備升天急急如玉清慈尊律令追僧道師尼魂符師曰夫爲僧道爲尼師未逢師旨不得修身之要訣而遽入冥司亦是寃愆豈无報對修心欲脱輪廻俟慈容而超升三界皆由心造並是自爲既往冥曹皆須有累故建八門之壇開立釋濟之戸超度魂儀增崇道業用此真符即行升度用黄紙長七寸闊二寸二分朱書敕符呪曰寳籙垂文遷拔慈魂下降幽户上度儀神解除罪業削退魔群慈魂升度煉質朱陵神皈太陽道徳自生急急如玉清天尊律令追諸産亡死魂符師曰凡人生於世而爲婦人最憂皆因累劫故爲女人身出嫁男家隂陽結聚故以爲胎是故生産有諸難候或母亡子存或子亡母存或母子俱亡或未産之間子存於腹而俱亡皆因宿世寃執相纒執對如是魂歸隂夜哀救無門四肢解散心腹疼痛於長夜之中啾啾於荒郊之内何以追度蓋行法之士而不知其理只一槩據文升度難求感格升濟无方故用符文關血湖之獄與之追取赴壇洗滌身形全其骸質使形貌俱全神炁備具得升天路快樂自然今將諸符具列于後追母喪子存符追母存子喪符追子母俱亡符追未産子母俱亡符敕諸符呪曰玉清降寳籙昇度産亡魂拔出長夜府超上化生門解除累劫罪削去積愆身乗符徃朱府受煉變成人急急如玉清上帝律令師曰諸産死者皆有宿世寃家故來相害乃至今生一一還報寂寂於冥夜之中於幽冥之下苦痛堪傷難求解脱渾身血汙臭穢觸天何以解釋隂府中有一獄在北隂大海之底其名血湖獄如此等魂皆在其中有一神主者號曰血湖大神在於无極水底水流其上臭穢侵天今人法師皆不以所属但以神虎部属追之何以得至神若見之亦須觸汙不可近但關血湖大神請差神吏同神虎押至壇下仍須申請斗下天醫君與全形貌次可追攝臨壇行道之士詳而行之追犯王法死亡魂符師曰凡人愚癡不知有王法之存亂用其心殺人害物或闘打闘爭一爲宿對二爲寃纒雖一時之忿怒豈知喪於一身魂守法場魄等爲對今生還之後世依然兩兩相纒无有休息如此之類何以解釋雖白簡之升濟而罪根難逃用此靈符宜與解釋符用黄紙朱書長五寸闊二寸玉清訣竹頭山穴又疒走广工彳亻言犭辛真曰音大太辛見阝丸厂口寸王生豆大才下上山山土官示立辛鬼申咒簡黄易开斤𠕋勿彡制百乂止尹車又回皿召癶王玉韋匕昇丹舟者耂韋白雲亟求古冥玄不方力弄无極个曲广府立巾帝尊也巨臣衣司同命殺度非奠離長夜光余釋乗心惠亥必堂籙録劫劫相呼凖今符命超度南都形貌全骸快樂无餘急急如玉清上帝律令追諸被廟食攝喪横亡幽魂符師曰凡人於世或爲神廟追取諸夭亡皆未盡天年而喪命生記无方魂歸何所飄沉冥路无解脫期用此靈符與之升濟用黄紙五寸闊二寸朱書玉清訣敕符呪曰靈寳符命急降廟廷捜尋横喪來詣家靈廟神藏匿束送酆城檢以律令滅其之形放出幽魂魄煉朱陵魂神受煉受化更生急急如玉清上帝律令追諸被虎狼蛇虺毒蟲所害亡魂符師曰凡人命逢惡死而遇毒物虎狼禽獸傷其正命亦是前生宿債愆纒至於今日亦有天數蓋自横亡既喪之後幽幽山林之中寂寂荒郊之内无門升濟何以超升用此符命與之超度用黄紙長五寸闊二寸朱書玉帝訣敕符呪曰玉清有命開度幽隂虎狼喪魄來詣家庭宿寃罷對積債消輕凖今符命昇度朱陵急急如玉清上帝律令追因水火喪身亡魂符師曰凡人諸因大水命殁波濤或值火焚魂歸九夜无所濟度魂魄何堪水漲於腸火焚其身痛切聲號呻吟可愍用此與之升度黄紙長五寸朱書玉清訣敕符呪曰靈寳真符下拔冥途水火焚溺魂魄昭甦形神罷苦淨魄還故凖今符命速離幽途煉質朱府上生南都急急如玉清上帝律令追諸爲官在仕路身亡之魂符師曰諸承天命逐禄逺方染患身亡望家郷之杳清魂何倚仕業難施仗此真符與之升度用黄紙長七寸闊二寸一分朱書敕符呪曰玉清寳籙玉篆靈章超度宦子拔出地廂獄戸罷對關鏁開張魂魄受煉升度太陽急急如玉清上帝律令追諸軍闘亡之魂符師曰諸因出塞爲國赤忠對敵而欲立大功屯邊而欲成王事兩相攻擊震鼔喧天鬼怕神愁死尸徧野魂爽何倚滯魄何歸用此真符與之升度玉清訣敕符呪曰太白運行太一運兵下臨分野昭破諸軍對敵身殁魂魄幽拘真符降下罷對削威和爲善友身度太微急急如玉清上帝律令追諸凍餓流離散家亡魂符師曰諸時逢饑饉之年凍餓街坊流離骨肉死歸夜府哀救无門啾啾郊野寂寂重泉望子孫无祭祀之勤骨肉分飛何所故太上開救苦之心仗靈符而濟度用黄紙長五寸闊二寸朱書玉清訣敕符呪曰玉清真符頒降三途凍餓滯魄散蕩諸魂賜之靈篆超出冥途各生飽煖骨肉昭甦煉質朱府昇上南都急急如玉清上帝律令諸符都呪曰符命追攝神虎凖行寃仇執對和釋來臨明承天命不得留停長夜開泰悉覩光明符命到處急急現形急急如太極真王律令現形勑解邪妖拘執寃結真符右凖符命拔度六道四生孤魂滯魄等衆解除邪妖拘執之對或廟宇邪神故取或家親舊怨致侵或因呪詛爲神鬼所拘或方少艾而爲精邪鬼攝或强爲夫人妻妾或驅爲僕吏鬼兵生筭未窮死簿不録承兹符命解釋寃仇時刻升遷一如告命解三世寃債真符右凖符命拔度六道四生孤魂滯魄等衆解除三世寃債之對或因財因色或爲冨爲貧閨門之内嫉妬忿争交遊之間奸欺侵刻至今三世尚對九泉承兹符命解釋寃仇時刻升遷一如告命右法出紫書及淨明鳳炁龍文品流金浮玉鳳炁龍文之譜一二三四五六七八九十百千萬又日月年時刻金木水火土从金从水點水从水擏火卩从土門女从文草頭敕符呪曰靈寳真符頒降幽冥犯法滯識報對寒庭㗸寃負債解釋无門凖今符命釋對超生同爲善友煉質朱陵急急如玉清上帝律令解獄死真符右凖符命拔度六道四生孤魂滯魄等衆解除獄死之對或犯罪而本無大惡或證佐而事實爲輕或在獄以疫氣而身亡或獄吏受私情而陷死或爲寃對于今未休承兹符命解釋寃仇時刻升遷一如告命追盜賊被害身亡幽魂符師曰凡有盜賊起自貧窮或穿窬而爲刃亡或劫賊返爲所害貪求小利而失天年既入冥曹哀苦无路雖因宿世亦是前縁以此真符宣與解釋玉清訣敕符呪曰靈符告下徧告冥途穿窬夜魄被害之徒寃寃相報劫劫相呼宿寃罷對積尤消輕魂魄受煉昇度朱陵急急如玉清上帝律令靈寳无量度人上經大法卷之五十三
