front:
  text: 靈寳无量度人上經大法卷之七十出六
  hash: sha256:cfa7e0d07d4e618eefda520bd437708557c17b4605b9672e52b53a159fa202c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_070-001a, image: hfl/0099/0099-058.png}
body:
  text: 凝香昭應品道德香符應設醮拜章黃籙通用玉皇訣呪曰道德竒香變滿法界徹逹三境事誠感通長生度世急急如律令超度三界香符訣同前呪曰香超三界遍滿虚空逕逹御前浮結供養祈禱必通急急如律令右二符並黃紙朱書中指中文西北炁吹入符中普度亡魂香符訣同前用普度印呪曰大道慈悲隨聲咸度一切亡魂隨香普度開徹九幽飛騰太虚不可思議功德右呪三句用印傳符簡香符傳命印東炁呪曰元始符命普度亡魂金龍驛傳不得留停破九幽香符呪曰金光玉煙速噴帝前符命悉傳通達幽關九幽諸都速開罪魂超度南天沐浴亡魂香符沐浴印北炁呪曰玉泉瓊煙鍊玉飛昇玄明瑩潔快樂自然急急如律令右符用青紙黃書掐子文取直北炁吹入符中焚於浴室中皇人曰亡人旣蒙沐浴塵穢蕩除當易仙衣使登壇陛如不給衣則冠帶不具難對聖眞故太上慈悲大法中有變衣之法以度魂爽符用黄紙朱書面南丁罡三歩叩齒三通左手握天皇訣念呪而變變仙衣符呪曰九曜扶衰眞炁變衣四神合衞五緯交暉炁分羅綺綵集空威六合扶挾三炁玄微至眞煥爛仙女齊緋圓景素明元始慈悲急急如律令變衣呪曰唵吽吽呼嗚伐夷帝明都變鍊有形攝變冥食皇人曰亡魂夊居冥昧不遇餚羞常懐飢渴之思難遇飫充之饌喉嚨生火累劫飢陽如遇大齋全憑變鍊行持之士當以甘露玉符焚于水中手結五嶽印誦詠袐章加持法食變爲甘露亡人食之即獲清凉快樂生天回心向道絶諸苦惱具足飽滿行持之法左右手玉清訣存身爲元始天尊列天門三炁降接兆身然後以炁吹符焚水中以楊栁枝灑之誦秘呪普救亡魂其福難勝變食符呪曰唵嗡囉哩長叅陁他尼陁耶多伽陁彌陁變食呪曰酆都夜壑忽以光輝照燭幽魂來霑香麋靈寳鍊符百骸自飛得見妙會仙𡵨知歸萬劫難遇功縁可崇開闢幽趣全假眞風梯航彼岸濟惠無窮念念生因駕景飛空甘露開咽喉符呪曰浩浩渺渺太上靈泉潤枯育物流注自然神華生液澄清太玄生魂育魄雲𣲖綿綿清泠保命猛火絶煙華池浩渺莫測其源急急如律令右符黃紙朱書三道燒於水中或吹於亡位前子文北炁鍊度生天香符五嶽印東炁呪曰洞慈洞明灌鍊九尸逹度玄天逍遥自在普度法橋香符呪曰法橋大度法橋普度急召急升歩虚玄靈呪施夜齋香符五嶽印東炁焚於香爐内呪曰食滿十方通關百飽食之無盡普沾歆享召魂赴壇香符攝魂印東炁呪曰元始眞文急召靈魂速赴吾壇領无上道受度法衣香符玉清訣東炁呪曰百色之衣流光飛霞服之飛昇上歩玄空飛遊太極領魂受經香符中炁呪曰金口所宣玉文所司音徹三界九幽罷對亡魂生天无量度人香符无量度人印東北炁呪曰天中之眞天中之神九和十合變化上清尋聲救苦香符太一救苦印東炁右一點一畫稱太一號四寳符化一珍爲千車之寳化一金爲千車之金普及無窮之世界散霑無極之鬼神靈寳无量度人上經大法卷之七十
