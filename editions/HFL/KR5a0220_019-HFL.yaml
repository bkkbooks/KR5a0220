front:
  text: 靈寳无量度人上經大法卷之十九金九
  hash: sha256:b4169fe590901075bf6b52aae6df8486e995f1a4320cb7d88f0bebf21f010df4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_019-001a, image: hfl/0088/0088-106.png}
body:
  text: 五方雲芽品元始赤書五篇真文生於太虛之中天地未光開闢未明潜結元根三景成立五炁生焉五色分彩煥照五方置以五帝導以隂陽輪轉九天之紐運明五星之光植五嶽以安鎮育五府以養神是以至真之人常依陽光之始明上道元始之正炁下引玉泉以流芳致元精於太極招五帝於靈童營溉之者不衰存守之者无窮回萬劫而更始保五芽於顔容實靈寳之妙訣快萬聖之宗崇元始赤書服食青芽導引九炁青天玉訣修養青芽導引東方九炁青天之法常以立春之日雞鳴入室東向九拜平坐叩齒九通思東方安寳華林青靈始老君姓閻諱開明字靈威仰形長九寸頭著青精玉冠衣九炁青羽飛衣駕乗蒼龍之輿建頴旗從甲乙胡老之君九十萬人從九炁青天中下來降室内須臾化生青炁鬱鬱如雲之沓烟貫覆已形從已口中入直下肝府又思木星煥明東方光照我身皆令分明竟便開目仰祝曰九炁青天元始上精皇老尊神衣服羽青役御天宫煥明𡻕星散輝流芳淘溉我形上餐朝霞服引木精固養青芽保鎮朽零肝府𠑽溢玉芝自生回年億劫色返童嬰五炁混合天地長并畢引青炁九咽止便服東方赤書玉文一十二字右十二字則九炁青天之名導引青帝九炁服食青芽皆朱書白紙上存思訖而頓服之則九炁不招而自降青帝應聲而見形五芽堅固於東嶽肝府玉芝而自生靈童齊真文於寢側青腰來輔翼而使令九年積感變化立成神仙度世萬劫不傾常以雞鳴陽光始分東向叩齒九通摩兩手令熱以掌拭面目九過仰祝曰東方青芽服食青芽飲以朝華畢便以舌料上齒裏甜脣三過令玉泉滿口而咽之三過又引青炁九咽令鎮肝之中其道畢也元始赤書服食赤芽導引三炁丹天王訣修養丹芽導引南方三炁丹天之法常以立夏之日雞鳴入室南向三拜平坐叩齒三通思南方梵寳昌陽丹靈真老君姓洞浮諱極炎字赤熛弩形長三寸頭著赤幘玉冠衣三炁丹羽飛衣駕乗丹龍玉輿建朱旗從丙丁越老之官三十萬人從三五丹天中下來降室内須史化生赤炁煥煥如火之明貫覆已從已口中入直下心宫又思火星煥明南方光照我身皆令分明竟便開目仰祝曰三炁丹天朱宫靈童元始上老叅駕赤龍丹羽飛衣錦帔光明驅魂天宫運道隂陽三炁吐輝灌我絳宮赤子保鎮金芽飾容朝餐朱景玉芝滿𠑽回停劫年朽骸返童長齡天地永享无窮身生水火變化百萬畢引赤炁三咽便服南方赤書玊文一十二字右十二字則三炁丹天之名引赤帝三炁服食丹芽皆赤書白紙上存思訖而頓服之則引赤炁而流溢芳芝玄注於絳宫赤帝降真於存思受赤文於靈童保丹芽以永固食三炁於祝融榮赤圭以通靈運五篇以召神長齋黙感於太寂上天書名於南窻可謂坐致而不難永享之而无窮也常以雞鳴陽光始分南向叩齒三通摩兩掌令熱以拭面目三過仰祝曰南方朱丹服食朱丹飲以丹池畢以舌料下齒甜脣漱口玊芝滿口而三咽之又引赤炁三咽令鎮心宫之中其道畢也元始赤書服食戊已導引元炁黄天玉訣修養黄芽導引戊已十二炁中黄之天常以春分夏節秋分冬節四日雞鳴入室向王十二拜平坐叩齒十二通思中央玊寳元靈元老君姓通班諱元氏字含樞紐形長一尺二寸頭著黄精玉冠衣五色羽衣駕乗黄龍玉輿建黄旗從神戊巳越老之官十二萬人從十二炁黄天中下來降室内須臾化生黄炁勃勃如景雲之吐輝貫覆已形從口中而入直下脾府又思土星煥明中天光照我身皆使分明便開目仰祝曰中黄慕山元炁徘徊上有元老總綂四嶽叅駕黄龍五色羽衣運導九天輪轉璇璣煥明土星流光散輝玉英芳芝𠑽溢四飛淘溉我身脾府鮮開養芳餐精萬神總歸檢魂制魄仙煉八威表裏洞明常生不衰通真達靈升入太微畢引黄炁十二咽止便服中央赤書玊文一十六字右十六字則中黄天名導引黄帝十二炁服食黄芽皆赤書白紙上存思訖而頓服之則上引元炁於九天下注玄膺於妙門太倉无粮而自𠑽脾府不煥而自薰老應響巳玄和靈童披襟而告文素運走給命東西妙哉玉訣爲萬仙之端常以雞鳴陽光始分向王叩齒十二通摩兩手令熱以摩拭面目十二過仰祝曰中央戊巳昻昻太山服食精炁飲以體泉畢以舌撩上腭玄膺取玉泉甜脣三過咽之又引黄炁十二咽令鎮脾府之中其道畢也元始赤書服食素芽導引七炁素天玉訣修養素芽導引七炁素天常以立秋之日雞鳴入室西向七拜畢平坐叩齒七通思西方七寳金門皓靈皇老君姓上金諱昌開字耀魄寳形長七寸頭著白精玉冠衣素羽飛衣駕乗白龍建紫旗從神庚辛玄老之官七十萬人從七炁素天中下來降室内須臾化生白炁浩浩如秋雲之羅天貫覆已形從口中而入直下肺府又思金星煥明西方光照我身皆使分明便開目仰祝曰金靈七門浩映西華中有素皇元始之家叅駕白龍七炁峨峨徘徊玉門散精朱霞金星吐輝芳芝霶𩃰玄奥我身養我素芽明石鮮光萬劫不殂服以流泉食以太和金九六九天上帝給以玉華保年駐白顔景敷羅長存天地三光同遐畢引白炁七咽止便服西方赤書玉文一十二字右十二字則西方七炁素天之名導引白帝七炁服食素芽皆素書白紙上存思訖而頓服之七炁天神玄注素暉以灌溉明石自生玉芝以奥肺宫開明而納真太倉不哺而自薰素靈應響而驅策叅乗九天之門餐之不休夀與元始而同年常以雞鳴陽光始分向西叩齒六通摩兩掌令熱以摩試面目七過仰祝曰西方明石服食明石飲以靈液畢以舌撩齒上甜脣漱口令玉芝滿口便三咽之又引白炁七咽令鎮肺腑之中其道畢也元始赤書服食玄芽導引五炁玄天玉訣修養玄芽導引五炁玄天常以立冬之日雞鳴入室北向五拜畢平坐叩齒五通思北方洞隂朔單鬱絶五靈玄老君姓黒節諱靈會字隱侯局形長五寸頭著玄精玉冠衣玄羽飛衣駕乗黑龍玉輿建皂旗從神壬癸羗老之官五十萬人從五炁玄天中下來降室内須臾化生黒炁暉暉相沓光若流星之煥耀貫覆已形從口而入直下腎府又思水星煥明北方光照我身皆使光明使開目仰祝曰北方玄天五炁散靈上有大神始老元精駕龍建旗遊宴上京是日元吉慶雲敷榮飛芝流灑滂沲四盈玉女玄奥灌我身形腎宫𠑽鎮朽芽更生五府納真上通神明五老降接仙道早成變化水火衣服羽青飛行太空遊造紫庭夀同三景萬劫長齡畢引黒炁五咽止便服北方赤書玉文一十二字右十二字則北方五炁玄天之名導引黒帝五无服食玄芽皆赤書白紙上存思訖而頓服之則玄老員籍於朱陵靈童題簡於赤文五炁流芝奥於枯宅玉泉湧池生於端門神鎮靈厥腎府生薰太玄玉女役使東西萬劫不衰玄老同存常以雞鳴陽光始分北向叩齒五通摩兩掌令熱以摩拭面目五過仰祝曰北方玄滋服食玄滋飲以玉飴畢以舌撩下齒内甜脣漱口令玉芝滿口三咽又引黒炁入腹令鎮腎府之中其道畢也昔道言導引餐芽之法常以八節之日各依其日入室清齋存思五老像像呪說畢各隨方導引服諸天名行之八年仙官到迎玉女侍衛身生光明照映十方出入遊行五帝稽首三界司迎此位唯三天上真之號此文具藏南圃赤洞五城之内三天仙官備守仙樓十二重藏以紫玊之匱刻以黄金札掛以丹芝光草即以太上中章皆授宿有仙籍名書丹臺應爲二天上真之人目无此挺終不得眄篇目舊科四百年一出常以雞鳴安身定神以次行事先服東方青芽炁次南方次中央次西方次北方如上法五帝畢便叩齒三十六通咽炁二十五過止又都呪曰白石巖巖以次行源泉湧洞似玉漿飲之長生壽命延長畢以舌撩上下中央令玉芝滿口而三咽又引炁二十五咽過極炁而咽之其道都畢靈寳无量度人上經大法卷之十九
