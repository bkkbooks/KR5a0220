front:
  text: 靈寶無量度人上經大法卷之六霜五
  hash: sha256:8781742798dd16404302e1335f6cc9dda7c380a0f368ec10ea858cc06e0f1bfa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_006-001a, image: hfl/0086/0086-004.png}
body:
  text: 靈寶符命品靈寶本章佩之利見大人服之去三尸九蟲十回度人佩之延年服之生貴子告之度亡魂離合自然佩之能成萬事服之安和五臟混洞赤文佩之辟幽鬼服之治心病元始祖劫鎮宅祛邪絶傳尸之鬼化生諸天朱書災化於棺中絶傳勞告之度七絶病托生開明三景頂戴吞服誦經悟道告之令亡者生天是為天根書石上安於山中百獸不居告之度獸傷之魂五文開廓佩之安五臟令五行不相剋普植神靈破廟貌遣舊神伏尸書鎮八方鬱羅蕭臺治山勢勇猛住居及墳不安用鐵板尺二鎮在山根即福生玉山上京帶頭頂吞服治頭風佩之得仙告之生天三華離便服之治口病生津液令神光長肌膚氣清大有妙庭佩之得仙令人悟大道治山嵐惡瘴辟水箭金闕玉房佩服供養生貴子求子益嗣森羅淨霐佩服治眼疾洗之目明度人不死取天尸蟲三姓井水午時服長生之君取地尸蟲三五家井水申時服度世司馬取鬼尸蟲乳香楊栁湯酉時服韓君丈人取飛尸蟲紫藤香子時服司命司録佩之頂戴落死却罪告之仇冤削罪托化人天度厄尊神解厄護身祛邪保命佩之大吉回骸起死吞服佩帶起久病催生下死胎乳香湯下告之拔産亡之魂飛天至真服佩成仙清心換骨韓司主録佩服日久得生貴子告之血尸得生人天監生大神佩服催生下死胎先服一月换隂成陽得生貴子告之産亡得免血湖生天人界諸天丞相佩鎮伏尸祛瘟邪吞服安心神下邪氣南昌上宫佩服能却禍害惡星凶曜執籙把籍佩服利見王侯求官得遂所作皆成無極神鄉錢板書鎮井中可通地引水兼治水怪去水毒龍三官九署取三尸九蟲桑白皮湯丑時服十二河源辟井泉河伯水傷之鬼鐵板書安於水中貼於其傍告之水鬼得離水中疾除罪簿佩服頂戴落罪籍久而得仙落滅惡根佩之清心解穢下鬼胎催生不得拘留凶惡鬼神書鎮宅庭其凶惡鬼邪反能自害逼合鬼群安鎮辟山精妖魅佩之亦吉告之魄取之魂得告生天北都寒池安鎮縛鬼令惡鬼自死部衛形魂佩服安魂定心神去驚怖死魂受煉安死人手中絶傳染其人上升告之復連得生人界仙化成人佩之變形服之變神皇曽鬱繿佩服之治肝病伏水精怪玉完那由鎮宅安土祛土瘟利人口何童元育佩之鎮宅祛魔除夜夢祛伏尸平育內鮮佩服治小兒夜啼祛客亡魂治無辜之疾文舉醜法服之令人聰明延夀摩夷懀延鎮葬犯山林興災隆禍可似告土府安神越衡正定鎮冢墓巽方令山林盛大子孫冨貴却古冢滅邪用梓木朱書濛翳九昌鎮冢墓巽方令山林盛大子孫冨貴却古冢滅邪用梓木朱書和陽上真佩服治心病伏火災可以告火神恭華醜音鎮壓司命壓君為災宗飄重光鎮却伏尸化成塵土皇茄妙辨佩帶興命鬥敵得勝告陳亡敵死之魂托生堂曜婁生鎮壓百毒入宅見形端靖羅千鎮宅八方養子不成恭慶菩提鎮冢墓離方令火山伏慝不現詞訟子孫不橫死用梓木朱書極瑶無延鎮冢墓坤方令子孫昌盛不生短命絶傳尸五逆用梓木朱書孔升定光佩服治肺病伏詞訟皇崖阿貪佩服保命治飛尸之鬼極風真童佩服治兵刃之鬼孝芒薩羅佩服鎮伏尸治血尸之鬼浮容閔巴鎮除自傷之鬼江由梵光鎮除附物之鬼揲阮勃監鎮冢墓乾方使玄武不起免有盜賊奴婢牛馬興盛用梓木朱書曇誓飄穹鎮冢墓兊方使白虎山不起免有賊盜奴婢牛馬出入免有婦人剛強奴婢走失梓木朱書霄度覺昏佩服治腎病伏盜賊通元行觀佩服祛百病解藥毒妙成那育鎮養奴婢不成鐵板朱書安井中秀樂覺長鎮子孫散亂不奉上下土子常容總監攝群妖柳木朱書鎮其方玉隆行元鎮飛鳥入舍為怪變度運上鎮冢墓坎方令田蠶豐熟子孫不絶旡刃亡惡煞用梓木朱書費奕法門鎮冢墓艮方免水火惡道利進田蠶爵祿不絶用梓木朱書天真空洞鎮伏山精異怪毒蛇敷落神真佩服禳禬本命凶暗惡煞令惡星退度回生福慶今日受度歷關諸天佩服禳禬本命凶慈神照令惡星四福服祐斷絶地根佩之落死籍服之絶地脈注算記名佩帶注算求子記名落死上生佩之上生落死延生久服得仙告之令生天界中斗大魁鎮除丘陵伏尸之怪總監衆靈安鎮縛一切鬼邪不動護魂侍魂佩服安魂定魄養氣通血佩之護形服之養氣行氣血及通血脈中主萬神服之安脾長肌肉治泄瀉巴元醜伯治肝病服豆湯下負天擔石治心病丹砂湯下反山六目治肺病蒮香湯下橫天擔力治脾病棗湯下監醜朗馥治腎病鹽湯下總監鬼兵頂戴用兵即戰勝安於旗鼓用兵大捷麾幢鼓節佩令人有歲儀精神強盛遊觀太空洗目目明服之生智慧令人聰明精神煉度用之令生五臟六腑腸胃自號赫奕佩之服之治心邪火煉符上天度人書柳木版長一尺二寸安死人手中絶傳尸勞嚴攝北酆佩鎮鬼邪自滅神公受命安鎮却伏尸普掃不祥服之下鬼胎鬼氣八威吐毒安鎮佩絶刑獄無鬼告之杔化猛馬四張安鎮佩帶服治蠱氣天丁前驅安鎮驅鬼佩解魂魂大帥仗幡佩解呪咀延年益壽擲火萬里鎮火炎伏水鬼治衆疾又名朱明符流鈴八衝治血妄行經絡敢有干試左右各四轉塗之治牛馬六畜瘟疫拒遏上真佩解三世寃家金鉞前戮巨天後刑安鎮驅山鬼屠割鬼爽安鎮驅水鬼風火無停鎮水驅龍蜃水怪千千截首有鬼處安之書鬼名於下可以滅迹除形萬萬翦形鎮於廟堂泥神座下令廟自廢魔無干犯佩之伏魔鬼無妖精安鎮八方即鬼神不入界三官北酆佩帶令鬼不見其形不得容隱免産難金馬驛程服之一年令身輕如飛告之起死超生上無復色服之頂戴治頭風病下無復淵鎮宅服辟龍蜃之妖風澤洞虛頂戴令人不懼當心不驚恐金剛乘天治作犯宅土安鎮八方梓木安木木書溟涬大梵書此符於水中進食供養其食旡數皆可變服食形變鬼見無數遼廓無光鎮冢墓興災赤明開圖鎮貓自子損小兒運度自然鎮犬上屋作怪赤書玉字鎮其所利益牛馬八威龍文服之日久可令飛升告之可以超生梵氣彌羅鎮山鬼害人萬範開張左右各三轉鎮凶宅興災旋斗歷箕解官災毒舌赤口回度五常護身保命泛景太霞治六種被蠱蝕鎮本地嘯詠洞章治蝗蟲鎮本地金真朗郁治肺勞去尸蠱靈風聚煙佩鎮服食治五方五蠱氣千和萬合佩鎮和合萬事財物服食和合五臟學道得成自然成真和合萬事服食安神真中有神春服辟榖葛湯下治肝病長生大君夏服辟榖柏枝湯下治心經病無英公子冬服辟榖乳香湯下治腎病常服辭獄師云凡書符治病皆無服之白元尊神秋服辟榖生松柏湯下及生柏脂湯下治肺病太一司命佩之司命護形落死桃康合延服之治脾病長肌肉執符把籙佩帶護身安胎保命生根佩服保身解冤債告之令托生下鎮人身服之安五臟去三尸泥丸絳宫服之益精氣治頭風靈寶元量度人上經大法卷之六
