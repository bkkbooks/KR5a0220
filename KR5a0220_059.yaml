front:
  text: 靈寳无量度人上經大法卷之五十九玉七
  hash: sha256:a9393cebd5c32e6d29f16a138bbcec3c1201b821660ae5d940fe77635bd0e548
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_059-001a, image: hfl/0096/0096-038.png}
body:
  text: 三光煉度品皇人曰夫超度幽冥如不行南昌之科只用三光符炁受煉亦謂靈寳自然无量度人者也先對聖焚香三禮啓祝具法位臣姓某伏聞元始開圖本自然之一炁朱陵度命法總出於三天應物流形隨機變化顯赤書之出世垂玉曆以度人是以靈寳建齋洞玄演教既曲迂於飈馭獲普被於吉祥宜敷徳於冥津使均恩於度品謹請太上玄都左宫太陽日君日中皇華洞明洞靈太素真人太光散輝童子太上玄都右宫太隂月君月中皇華石鏡水母流光夫人圓光散輝童子南昌朱宫丹英火鈴煉光生方正真九華度品南上開光度生一切真聖伏願混合三光照重隂之有識超煉群品示普度之无方念日月普明天尊次執水明燭呪曰赤爐丹景圓華九明太輝啓晨煥耀朱精五帝肇霞映洞萬生豁落上真玄天條乎運炁煉彩流蕩五形煉我神化六府敷榮同齊帝君太一无英驂乗絳雲陽火如軿上奔日中與帝合靈壽均天地二晨相傾與道合真次燒符於燭上入水中念九光煉度天尊次明燭執水呪曰黄精啓運元隂内章映觀太玄開洞萬方散蔚寒飈七晨懸琅回隂三合天地吐光紫耀遊落浮華九空圓明賦彩六炁化通五帝夫人攝雲挹風靈帔鬱羅佩琚帶璫羽裙拂霄送雲扇東騫𣗳敷晨蓋條秀蓬雲幕練摩扶養木王洞根萬里蔭靄吾躬魂和神化六玄靈𠑽還元歸嬰玉映返童帝君合化軿景桃康時乗流鈴飛雲十龍上奔月宫天地无窮次燒符於燭上入火中以二燭併執之念火煉丹界天尊宣大煉消魔呪三炁藹靈闕明靈煥玉丹朱陵有帝真華雲飛絳軿綂御萬界中撫運超億千執策按簡録洞章敷神篇解結散禍根流金摧凶姦志能成此道魔試俱无前保度冥劫津宴眄无窮年次燒符於二燭上入水中次執燭焚火池捧水灌水池念法橋大度天尊如用南昌煉度法就此入科如三光煉度不用次引亡魂至聖前上香次宣火府童子煉度儀我聞寒庭拘閉正思遷拔之玄恩穢炁芬葩實頼蕩除之法水故我天尊哀愍大道慈仁澇漉衆生濟度諸苦啓洞玄之要典垂煉化之明科俾沐浴於靈津獲超凌於欲界然後形神俱妙福慶自生汝等魂爽虔精受煉次誦煉真呪曰太上髙真九靈之精使魂飛仙上登紫庭沐浴華池身神澄清精通太虚萬炁自生次誦東井呪曰天河灌東井石鏡水母精圓光拂靈曜玄暉瑩髙明元始披重夜天人遂月生沐浴蘭池上龍負長庚瓶金童洒香花玉女流五星冠帶濯玉津煉度五仙形體香萬神降乗景登髙明次祝白靈魂等衆一炁混流三光洞朗无幽不燭有道則符但聞苦海揚波業風扇焰重積无明之罪寧逢有赫之恩不洗染塵无期超慧今日吾奉玄元道旨委曲宸恩請正火於三光度積隂於九壘汝等當發大願願除无始以來貪嗔惡業願發今日以後清淨身心願塵塵刦刦斷絶七情願世世生生皈依三寳悉由解脫之道俱入逍遥之郷我等法衆咸有是心當與衆魂同誠皈向次讃道寳伏以无形无名因象顯發運行日月覆載乾坤自在无爲隨有現相爲萬物之奧作善人之寳報皈所宗仰尊道寳次讃經寳伏以玉篇雲篆金簡瓊文八角垂芒大方一丈三十六部四品五千道接三乗仰尊經寳次讃師寳伏以一切顓蒙當從接引十方苦海必假舟槎願立師資提携正果敬禮法身仰尊師寳次三禮讃今爲靈魂等衆皈依三寳伏願應號十方化身三世諸天梵境福地神仙十極魔王无鞅聖衆尋聲救苦應感分暉開導迷津同皈正化復混成之一炁返元始之本真神化无方互相融攝各圓成於妙智无遮礙之局心日月光明星暉曜煥悉自神光而化普成品度之功既開煉度之門當闡通玄之妙汝等靜念諦受玉章次誦九章次誦三光煉化玉章寳章廣生髙映覺元洞虚應玄九真化交肇圖文靈運構宗範玄都龜西龍首風澤通廬咸變總括威昭自殊日精𠑽盈月魄同塗星精育煉魂魄常扶天林耀權逹有通无魔王監舉三景无拘次白云切以四生迷昧六趣昏蒙煉三炁於三光視九陽於九道魂魄宫闕耳目精神當從此以更生使神遷而受化次誦五天生神消魔煉度呪洞耀育元精青華開大明赤明布三炁玉丹爲生神西靈廻七度大眇鬱華英北玄三秀靄太上紫皇真混化歸沖妙元皇總中靈注算食血尸落死紀生名五會合一契中主大魁君風馭爲監舉齊承青炁騰又白云靈魂等衆汝等到壇士農工商姻親朋友若父若母若叔若伯若兄若弟若姊若妹若夫若婦若男若女若踈若親若賢若愚列上下以居方較噐能而辨正則分從等級遂至千差然貴賤窮通蓋一時耳智愚賢否安可長耶心自相拘精神不泯猶守尊卑之等常懷飢苦之心光自愚癡不聞正教尚從此訓以滌爾迷今茲靈寳大齋乃是元尊至化返元復一守真抱靈宜除有相之觀盡入无遮之境靜廻達觀斷去凡心湛寂神嬰諦聽祕韻衆真監度爲作證明次誦大梵隱語再祝白伏以十𩔖沉魂夙滯幽隂之趣三光正炁合施煉化之功既遷質於陽晶遂棲神於丹梵夙生慶幸勿更沉迷一洗鏡塵永獲殊寳伏願衆真監度列聖垂慈俾善性之堅剛得超昇於仙界不經魔試徑入天門接引靈妃慈悲開度察命童子金龍驛傳祝畢宣左劵誦三十二天帝隠諱次宣右劵誦魔王三章次宣符受戒日君真形玉字書符呪曰赫赤太霞暉暉鬱儀真精陽炁滌垢華池太隂真形玉字書符呪曰素圓玉光飛玄結璘輝渾隂精育魂澡形天罡真形玉字書符呪曰罡星正炁纏筋繞骨上透泥丸開陽崷崪太陽符八字赫赤太霞陽精度魂太隂符八字玉光玄暉真精育魄天罡符六字罡星正炁煉魂右三光玉符乃答惒天帝書於朱陵上宫瓊臺之上以受煉亡魂靈寳无量度人上經大法卷之五十九
