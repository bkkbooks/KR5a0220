front:
  text: 靈寶無量度人上經大法卷之二十九生九
  hash: sha256:9d8f1ca0b55465772732f7531684e807b8efe6698dcbc14adb863e6ed2967d96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_029-001a, image: hfl/0090/0090-100.png}
body:
  text: 上玄所治品玉清境元始天尊位在三十五天之上九聖之境大有玉清宫屬清微天上清境太上道君位在三十四天之上九真之境上清紫微宫屬禹餘天太清境太上老君位在三十三天之上九仙之境太清太極宫屬大赤天昊天玉皇上帝位在三十二天之上三界之上境太微玉清宫屬無上天學士但知三十二天之上有大羅三天孰知大羅又有三十六天無色無影無形無名虛無自然之天玉清十二天上清十二天太清十二天共三十六天之下有四種民謂之梵天次無色界四天色界十八天欲界六天共二十八天統氣係於二十八宿名曰星界紫微天皇大帝統御衆星列宿斡旋諸天在勾陳內宫亦太清上帝之應化所是北極紫微大帝統御諸天大神位在中斗大魁之中天真大神無鞅數衆上制群魔下鎮北鄷三十二天宫府皇曽天紫極宫又曰下夷宫遊年紫府玉完天紫房宫又曰騰天宫窮陽府何童天九晨宫又曰成離宫進康府平育天元景宫又曰臺陽宫延生府文舉天廣寒宫又曰班晃宫乘初府七曜天太隂宫又曰幽闕宫天篤府越衡天太玄宫又曰璇璣宫無極府濛翳天玄都宫又曰離合宫始生府和陽天長明宫又曰開陽宫隂陽府恭華天東華宫又曰丹陽宫黃録府宗飄天昊元宫又曰天衡宫泰元府皇笳天青玄宫又曰都神宫華蓋府堂曜天重華宫又曰天竈宫天華府端靖天光華宫又曰胞命宫人光府恭慶天開合宫又曰雲霧宫順陽府極瑶天帝康宫又曰離命宫陵陽府孔升天延命宫又曰上夷宫華陽府皇崖天開明宫又曰命門宫黃乾府極風天大赫宫又曰榑桑宫長命府孝芒天太丹宫又曰中夷宫司徒府翁重天華蓋宫又曰靈門宫仙都府江由天明堂宫又曰巨闕宫玿瑶府阮樂天雲連宫又曰玉戶宫元真府曇誓天中元宫又曰紫極宫成行府霄度天瓊瑶宫又曰天井宫通天府元洞天真元宫又曰上狄宫衡國府妙成天靈幽宫又曰北平宫天阿府禁上天化靈宫又曰五消宫丹精府常融天萬福宫又曰下狄宫節皓府騰勝天白蓋宫又曰中狄宫腦映府梵度天雲保宫又曰無上宫玉歷府賈奕天天寶宫又曰神璣宫元孝府二界四民三十二天天人夀數道果各有等差天帝所主天國位業亦各有殊並見洞神大有經仰謝儀諸天宫闕始青天即東方九氣始皇青天大浮𥠖土即浮𥠖大國玉京即大羅天上玉京山朱宫即南上朱宫赤帝錬度魂爽之宫南宫即南昌革新魂火府之宫太空之境在太清之中太極之下不歷南宫神升太空九宫除中央尊位周回八宫以應八節誦經功盛封號九宫真人即非九天之宫乃山上虛宫天中之天即玄中之玄道中之道乃大羅之上無上大梵之境元始之天鬱羅蕭臺玉山上京即大羅天上玉京之山山上有七寶玄臺蕭然九層山林鬱茂光華曄然三華宫即玉清三元宫上元玉華宫中元金華宫下元九華宫離便宫大有宫妙庭宫在玄都玉京之北天尊宴息之宫北人身雌一之宫在泥丸宫之地北也金闕玉房玉清之境以黃金為城關白玉為宫室即紫微之上上帝金闕白玉玄房森羅淨霐此之金闕玉房森羅淨霐四宫在玉京之南太素元老華陽帝君流珠真神赤子元君居之人之泥丸之南淨霐又玉清二池處人首二目也十天世界東方諸天安太堂鄉大千納賢世界南方諸天宛黎天境大千棄賢世界西方諸天福堂洲大千威行世界北方諸天鬱亶野大千清淨世界東北方諸天福集都大千長安世界東南方諸天元福田大千用賢世界西南方諸天延福鄉大千仁靜世界西北方諸天福德野大千延賢世界上方玄都玉京紫微之中無鞅世界下方無極洞淵清靈之中無鞅世界諸真所治三界天界地界水界又曰欲界色界無色界無極神鄉十方旡極世界無窮之神鄉北都羅鄷即北方鄷都羅山內外共一十宫名曰六天三官九府天地水府各有一宫一宫有三府共九府上元天官三府左右中中元地官三府左右中下元水官三府左右中又曰北鄷三官亦有九府並具載圖局中北都寒池鄷都幽夜有丘寒之池寒冰夜府三徒一曰長夜二曰寒池三曰摙石又曰天官徒驅雷役電地官徒負沙擔石水官徒連汲冥波三惡色欲愛欲貪欲三惡一道五戶五道門也又曰衰病死墓絶又曰五纍門天門三界諸天之門又大君曰角為天門又曰行算斬絶地根有戊已天門隨日以輪轉東西南北有四斗之宿角亢氐房心尾箕斗牛女虛危室壁奎婁胃昴畢觜參井鬼柳星張翼軫四斗真人主算記名落死上生中斗者璇璣玉衡七辰運於中天普臨萬方以齊七政世人呼為北斗者乃中斗也謂之大魁總監衆靈鬼營二十八宿鄷都六天皆有鬼營風澤洞虛乃洞淵九壘三十六地土皇之府五常金木水火土五常德星三十五分三十二天無上三天謂之三十五分皆係大羅上元元始之功用化機玄主宰八門即法輪開度罪福之場罪門福門禁戒門宿命門因緣門死魂生身門身得受生門為八門乃見三真法輪經內六鬼峯即鄷都山六天之六峯一峯有一宫一宫周回千里第一紂絶隂天宫第二泰煞諒事宗天宫第三明晨耐犯天宫第四恬照罪氣天宫第五宗靈七非天宫第六連宛屢天宫又有山上六外宫主領鬼神部録朱陵即南昌上宫朱陵火府諸天臺城玉京山下長樓亦曰樓都有樓都之鼓皇曽天中有帝君遊臺名薄臺又有日月之門戶謂之惒門天中有五色飛玄之氣繞於日月之門玉完天西北關門名須延門何童天中有七寶林樹名阿奕樹彌覆四方平育天有華都太極宫青華門仙菩樓有玉色慶雲文舉天有答落玉關是三界便門門內有慶雲紫館摩夷天有始生之門入此門則九族蒙慶越衡天有空峯之山濛翳天有九新之山阿丘之嶺和陽天有流火之庭號南閻庭帝諱洞浮錬魂有流火之膏名曰玉眸恭華天有四斗觀華臺宗飄天有澤山山上有衆龍之寧天中有黃金房玉堂菩玉臺真晨道君所治皇笳天有金華山山上有五帝宫得道者詣此中受太一信以制魔試堂曜天有九都玄臺五色騫林端靖天有空輪天關以召天真恭慶天有龍淵之霐天人運東井以灌天真天中乃有三界天門內太和之津以生為神孔升天又曰禪黎國上有洞陽宫福德堂皇崖天有太渺宫景雲車迎養根之仙升入化生堂極風天有紫霄遊宴之儀固極風之根孝芒天有寂寂之庭翁重天有九層之臺在玉樓之前又有束鬼之庭禁鬼之房以伏群魔江由天有龍山之嶺阿丘天王乘三素之軿以登龍山阮樂天有玄中福堂校幽夜之簡録曇誓天有東華宫騫木之衆青霞翠峯碧雞栖嗚其木有反香之草風鼓吹霄度天有九玄之門象輪之車元洞天有鳳車以迎學仙之人妙成天有雲阿嶺羽林雲宫禁上天有飛玄之氣在空霄之上結成空洞之經常融天有沙蘭之宫集陀丘仙泉計功上升玉清紫微館玉隆天有碧霞之氣中有七寶之宫內有自然洞章名曰空歌梵度天有太虛館妙化堂天王符九仙籙賈奕天無色梵天髙清洞浮有至真天人三天靈司品經曰侍經五帝玉童玉女各二十四人營衛神文保護受經者身東方青靈啓道童子二十四人南方丹靈啓道童子二十四人西方皓靈啓道童子二十四人北方玄靈啓道童子二十四人中央黃靈啓通童子二十四人巳上百二十人度東方九氣青靈玉女二十四人南方三氣丹靈玉女二十四人西方七氣皓靈玉女二十四人比方五氣玄靈玉女二十四人中央一氣黃靈玉女二十四人巳上百二十人度經曰召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人三天自然更生功曹三十二人三天自然奏事功曹三十二人三天自然傳言功曹三十二人三天自然玄妙功曹三十二人三天自然飛香功曹三十二人五帝自然更生功曹三十二人五帝自然奏事功曹三十二人五帝自然傳言功曹三十二人五帝自然玄妙功曹三十二人五帝自然飛香功曹三十二人玄師曰三五功曹有二端神化各司靈局有三元五德功曹乃太清洞神之所𨽻也此乃三天五帝功曹亦非胎化有類之形皆三五自然真氣所化也以天真道氣召録身中三田五臟正氣造化而成靈神用功曹有所執之曹局故曰功曹左官使者三十二人右官使者三十二人侍香金童三十二人傳言玉女三十二人玄師曰左右官使者即隂陽通逹之神五官舉意之先也侍香金童陽初清潔之氣傳言玉女隂本淨謹之靈傳言飛香奏意達誠皆四品之元真也東方青帝直符三十二人南方赤帝直符三十二人西方白帝直符三十二人北方黑帝直符三十二人中央黃帝直符三十二人玄師曰亦是五內真氣符合道德之氣所化也直日香官三十二人玄師曰直日香官是直六十甲子之日三皇之子孫也甲寅天皇統甲辰是六田之魂甲之父母也日有三十二人以直芳香之氣散穢招真是其效職其男女本生六甲之氣所化也凡諸百靈非止三十二人但召奏止用四方天數三十二人每一天有三五功曹二人左右官使者共二人侍香金童一人傳言玉女一人五帝直符各一人直日香官一人每一天計一十二人三十二天統有三百六十人其諸一人功曹二人謂三天五帝各一人上應千二百官君下合三萬六千神氣也玄師曰玉清靈虛宫靈寶天仙內院有仙曹分降以給宫中仙官使令皆上請而下降辨魔部辨魔玉女二人仙卿之上得給四人八威治魔都領五人仙卿之上得給十人神慧殺鬼都伯史五人仙卿之上得給十人寶章部諸天符寶真人一人扶寶記天文郎二人譯符書寶記真官二人扶掌諸天寶記天文玉女二人承受部十天承受玉女各一人三天承受玉女各一人五帝承受玉女各一人三清上奏靈宫各三人三十二天承受玉女各一人主職部靈虛掌印靈官靈虛掌法靈官靈虛對定靈官靈虛發放靈官靈虛監獄靈官各一十一人天醫部天醫尚藥仙官主辨脉形候天醫尚藥靈官王隨病處藥天醫尚藥神吏修合製錬天醫尚藥太清生形博士主者生形復肌天醫尚藥三五治病功曹切脉論病天醫尚藥請藥療病砭石小吏砭針灸烙下有敷藥靈官收毒將軍使者各二人儀衛部護道神王二人伶華玉女三十二人伶華仙官三十二人玉清主執功曹一十二人玉清大將玄師曰玉清有赫奕天將大神助法消魔隨命即降歷關諸天靈官自戌至辰斗訣落滅下鬼惡道靈官自辰至戌落滅地獄惡道靈官自坤至艮落滅畜生惡道靈官自艮至坤斬滅胎根靈官斬滅胞根靈官斬絶結根靈官斬絶節根靈官斬絶欲根靈官斬絶六根靈官斬絶地根靈官辰飛度色纍戶靈官申飛度欲纍戶靈官酉飛度愛纍户靈官寅飛度情纍戶靈官巳飛度貪纍戶靈官亥名列太玄靈官上清魔王監舉靈官玉清丑無拘天門靈官乾東斗主算司録真官卯西斗記名司命真官酉北斗落死司非真官子南斗上生司厄真官午中斗大魁司禁真官中指中總監衆靈考校真官子午斗青帝護魂真人震白帝侍魄真人兊赤帝養氣真人午黑帝通血真人坎黃帝中主真人坤萬神無越真人乾青天大魔王寅卯出赤天大魔王巳午出白天大魔王申酉出黑天大魔王亥子出黃天大魔王四山艮上挑青帝大魔王震巽赤帝大魔王離午白帝大魔王兌申黑帝大魔王坎亥黃帝大魔王坤戍總領鬼兵三天大帥九天尚父執麾左領神王執幢右統大神鼓按後部力士執節前引天丁玉清神公太玄上相六品並玉清訣紫微印召青龍大神震白虎大神兊朱雀大神離玄武大神坎辟邪大神兌獅子大神坤窮竒大神艮騏驎大神巽天馬大神午大力天丁前驅大神玉清合掌命魔仗幡大帥辰文曲指玉清擲火大神將寅離午震手挑玉清流鈴大神將申坤離中指丑寅卯七擲金鉞前戮大神將玉清訣直二指巨天後刑大將四指根五指俱拳玉清屠割使者右手如金挑訣玉清風火征伐大將軍左手四山至巽挑離始剪截鬼穢大神中指根艮上挑明檢鬼營大神坤離巽震串中指中文丑挑金馬驛程大神自午十二支復離至午挑列言上清録事中指三清訣至五方復上清訣玄師曰此玉清天大將大神皆統屬玉清神公太玄上相也與諸天大帥髙靈齊功自號玉清靈寶赫奕司輔翼玉清劫運攺更滅魔掃災升度學仙之子檢校三界驅除妖惡嚴攝北鄷制禦鬼爽搜究鬼營肅清道氣以備後世種民仰見太平聖君也皆扶衛掃蕩之臣耳玉清有升天券以賜得道升仙之子及天尊賜券於承度苦魂使詣南宫若無券天門吏呵止不令前進求券得之故天門無拘執之阻請諸天滅三惡者內因三業所招外生三毒之愆而致墮落下鬼畜生地獄三惡道中既今日受度於玉清則隨所生甲乙上屬三十二天師資歷關請滅三惡內除身口意三業不造外絶貪嗔癡三毒則地獄無由可墮下鬼無由可入畜化無由可化雖受度以滅三惡內外不除業毒三惡亦未能免於墮落也夫人之生也上有十二莭父母傳留死氣之根也中有十二結一身禀受死氣之根也下有十二胞結傳留子孫死氣之根也皆為地根故受度之日亦須斬絶內除三十六根外制六根惡趣地根斬絶閉債封形然後飛度五纍苦戶得以名列太玄魔王監舉得升天門此骨肉同飛上清升玉清之日受度之旨也巳下神公禀受掃蕩之命也神公即地皇之臣馬祖大帝之嗣角龍辰宿大神之父也位為玉清神公太玄上相號為馬龍氏諱廓奕靈寶無量度人上經大法卷之二十九
