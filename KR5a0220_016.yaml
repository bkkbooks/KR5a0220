front:
  text: 靈寶無量度人上經大法卷之十六金六
  hash: sha256:e27875885237ac795ef7a99f78388c227f922a03a52806d692ac434d6434cd16
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_016-001a, image: hfl/0088/0088-004.png}
body:
  text: 遏絶魔試品玄師曰凡學士行持洞視多致群魔所惱遂乃退敗功力如見美貌靈妃不可熟視多是三官五帝玉童玉女察人功過亦有清靈善爽魔軍變化故來惑人或作鬼怪變現百種魔試欲人大功不成及內人視戚間阻皆魔鬼使然欲其中道而廢常誦元始靈書中篇及五天魔王大呪自青天魔王至列言上清及三界魔王歌章遏絶魔試則不退心百日積十萬遍入靖洞視先持誦金闕玄元道君滅九十種外道一百八十種大魔智慧神呪及召辨魔玉女别其真假書五方驅魔符於幡上挂於五方然後方可洞觀百靈徹見十方功成行滿名書正凊長生久視天魔拱手萬神敬伏三官選舉升為真人若有淫穢嫉妬是非通同始勤終怠前功漸棄身役鬼官殃纍九祖戒之戒之滅魔智慧呪曰天地雜氣生諸妖邪常以正道除去氛祲第一思惟無我無主諸法皆空不可轉相一實境界飛魔鬼神知所住處實知方便假空有故法性理性湛然常住無有去來一知實故二知魔故三除相故四分别空元亨利貞邪不干正臨兵鬪者列陳前行急急如上帝律令敕右法先叩齒十二通密誦不拘以遍數所有諸魔應時發善念稽首於座下若欲除滅即廣持遍數其魔望塵遁走隨呪消化青帝御魔總真靈符四神四氣飛雲丹霄金六啓華總御制伏百魔無為自然二梵氣彌羅日月停景璇璣不行巴元醜伯與道合并正氣所居群魔束形保制劫運使天長存右符吏啓華領兵九十萬人守衛其文其符并赤書真文以春甲乙之日朱書紫上置於東方禳却萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之三年之後生青玉之英於肝府之中光映形外道成青帝召迎至誠佩之永消殃患赤帝御魔真靈符八方威神使我自然負天擔石遊觀太空明真總御却邪辟兵天真上聖自然之音萬靈振伏招集群仙群妖束首鬼精自亡熒惑合契與道合并右符吏明真領兵三十萬人守衛其文其符并赤書真文以夏丙丁之日朱書青上置於南方禳却萬災保鎮旡窮召延嘉祥物阜時康學道之士以時服之三年之後生赤玉之英於心府之中光映形外道成赤帝召迎至誠佩之永消殃患白帝御魔總真靈符煥散五方威伏魔鋒茂成總御使我太威北帝興隆攝北羅酆赤書內文變化飛空八景冥合氣貫玄宗匡御諸魔諸天齊功反山六目靡敢不從九和十合億劫無窮右符吏茂成領兵七十萬人守衛其文其符并赤書真文以秋庚辛之日白書黃上置於西方禳却萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之三年之後生白玉之英於肺府之中光映形外道成白帝召迎至時佩之永消殃患黑帝御魔總真靈符回州玄皇九維九醜天中之神氣運樞紐天中之尊幹旋箕斗靈寶洞玄三界稽首五帝侍衛位極五元諸天遙唱萬設禮魔精喪眼轉靈寶旨鬼妖滅爽萬神朝禮萬災不干神明護門今日欣慶普度天人監醜朗馥守元固靈飛升金闕遊宴玉京右符吏守元領兵五十萬人守衛其文其符并赤書真文以冬壬癸之日黑書白上置於北方禳却萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之三年之後生玄玉之英於腎府之中光映形外道成黑帝召延至誠佩之永消殃患黃帝御魔總真靈符七政所臨天回四氣朗清地轉三台九晨豁落斬摧擲火流鈴萬神總梵靈寶衆經中主萬神飛天大醜變化爾身橫天擔力總領萬兵屠割鬼爽風火無停三官北酆明檢鬼營協冥總御飛謁黃庭右符吏協冥領兵一千萬人守衛其文其符并赤書真文以四季戊已之日朱書黃素置於中央禳却萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之三年之後生黃玉之英於脾府之中光映形外道成黃帝召迎至誠佩之永消殃患滌穢除垢凡行持洞視建局當先預期齋戒至期日請師開局備列香茶酒果十二分祭告法中籙內仙曹才行持之後不得吊喪入産穢豬圈戰場刑獄之所及見屠宰六畜交合如遇親戚有吉凶之事當依上清金根寶書煉度親眷魂神超生然後沐浴解穢再入室行持若或出入不得巳誤有觸犯仙禁殗穢之時須罰功斷事二十四日然後沐浴入室再得行持若正當行持之時設有雞犬僧尼孕婦穢汚之人觸犯壇禁前功並棄作穢之者必致滅亡設有此事急當燒香詣聖前脫巾叩頭摶頰二十四次再拜念十方大慈救苦天尊太一救苦天尊三皇內諱數百遍呪水解穢念淨天地呪噀灑淨免致損害人物三日後再得行持兆每日侵晨用水一盂念呪面北取氣吹入水中以水吞符仍用水自噀身呪曰天河灌東井石景水母精五方生旺氣凝結華蓋形拘魂制七魄一洗五濁清解穢真符𩳐魒魓魁䰢𩵄𩲃呪曰神仙沐浴氣芬芳洗除厭穢令消亡日為將軍月為司馬教我通目無不見者急急如律令符朱書先寫三箇日字次寫斗名次念呪七遍書畢吞一道次以水傾一半在地上即步自水上過呪曰履茲三清水洗滌五濁泥身騰無色境灌溉上天池解穢畢方可入靖行持洞視及上道大法起居存修兆每夜遇子時起牀上面南披衣坐兩手各搯五帝訣紅杏叩齒三十二通存心為唐將軍左腎為葛將軍右腎為周將軍四靈神將在吾左右前後青龍自肝出目立左白虎自肺出鼻立右朱雀自心出口立前玄武自腎出耳立後唐將軍出心靈絳府葛將軍出左腎左玄宫周將軍出右腎玄元宫各領兵騎八十萬人羅列在吾左右心拜三十二過叩齒三十二通存見三十二天帝君密呪曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十六人出隨吾首陳急急如元始上帝敕次存南方火星三人絳衣歸心赤色東方木德星九人青衣歸肝青色覀方金星七人白衣歸肺白色北方水星五人皂衣歸腎黑色中央土星十二人黃衣歸脾黃色三魂七魄三萬六千神俱在體中呪曰魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上清急急如元始上帝敕次存想左日右月星辰羅列在上漸漸自天門入玄臺宫絳闕宫洞徹內外光照一室畢則黃老君著紫色衣坐中黃宫臍下無英公子著紫道衣居左白元尊神著白衣居右至則守之使氣綿綿自鼻入閉口勿吐勿泄徐徐行之飛升上清仍存左腎青色氣一道青光遊於左脊縷直至腦後入左目穿右目次存右腎黑色氣一道變紫光遊於右脊縷直至腦後入左目呪曰兩睛眼目水墨之符真氣入眼徹視虛無洞觀三界真仙同塗右營目各九過欲行洞視洞視起居夜卧覺急閉目常更叩齒九通咽液九過畢以手按鼻之左右上下數之十過祝曰太上四明九門法精耳目玄徹通真逹靈天中玄臺流氣調平驕女雲儀眼瞳英明華聰晃朗百度渺清保和上元徘徊九城五臟植根耳目自生天臺鬱素柱梁不傾七魄澡煉三魂安寧赤子攜景輒與我并有敢掩我耳目太上當摧以流鈴萬凶消滅所願必成日月守門心藏五星真皇所祝群嚮敬聽畢咽唾青色入肝九過摩按面目令小熱以為常卧覺輒按祝勿失一卧也令人耳目聰明強識豁朗鼻中調平不唾津涕面有童顔制魂録魄却辟萬魔又法先按眉內角兩頭骨凹處三九過以兩手隂按之用中指痛按之祝曰開通天庭使我長生徹視萬里魂魄反嬰滅鬼却魔來致千靈上升太上與日合并得輔真人列象玄名又法服玉字畢先按又摩指掌拭目使二手合於頂中三九次存青紫絳氣出於目前再祝曰眼童三雲兩目真君英明注精開通清神太上雲儀靈嬌翩翩保利雙闕啓徹九門百節應響朝液泥丸身升玉宫列為上真有掩我耳目大上將摧以流鈴徹視萬里洞見鬼神急急如律令子午二時行畢亦可常行使人耳目精明兩手捻中指上節每呪三遍北氣吹掌上是大指下為掌尉眼至腦後如此再念三遍依前北氣呵吹掌尉眼又呪九遍吹水中以中指點水滴眼中每日一次洞視入局批降凡欲批報審章等事先將紙書天無浮翳四氣朗清冥慧洞清明氣四騫四符書時存東南玉京山數百萬文日月朗明星宿晃耀搯玉清訣取氣吹筆念一字寫一字重疊成符投水中洗目如書符不及地中取淨土念呪十五次呪土沉於水中攪轉澄清洗目了將所請文字露於地天下燒香祝所發去者靈官玉女了再搯訣念玉音攝氣呪吹文字念五帝諱取東氣吹須是看得上件文字如天碧色罩於紙上乃是真氣垂降如未再念呪青色為度然後念呪九遍結空成梵真氣自生赤書玉字八威龍文保制劫運使天長存梵氣彌羅萬梵開通取天門氣吹紙上於紙看未分明玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真混洞赤文無無上真元始祖劫化生諸天開明三景是為天根上無復祖惟道為身五文開廓普植神靈無文不光無文不明無文不立無文不成無文不度無文不生急急如元始上帝敕取天門氣吹紙上看如𥘉學之人一二分目力如蟲竇路或隱或起紙文若三分目力如牌子字每一劃兩邊髙起中間如渠內有淡淡水墨路如四分目力見淡墨路子五分目力其路如青色或淡粉紅或淡黃色或如淡墨雲氣盤旋於紙上五分以上目力漸見紅色至十分目力多黃色如上件字劃未甚分明再念呪吹直至依得上件分數格式不至紊雜方始合格然後再念無文不光呪若見烏黑當念無文不明呪取氣直至字劃半見半隱分得字劃方可模寫如未分明再念呪吹及洗目祝靈官玉女并神虎呪𥘉間行持但分得字劃得一二十字即止不得貪多每日漸進十數字不要退了目力其所退目力往往緣模字太多體倦神疲認字不真便行書札文意皆錯真氣變亂或如蟲竇或如牌路或如鳥文所以不定錯失目力蓋天書文篆真氣結成千萬慎之如一百刻中二百刻目力不退方始目力定然後可進先念五方呪書五符謂之靈寶五功符吞下分隂陽日將玉札服即便看多增目力也入局領事右每日入局先念入户呪曰四明功曹通真使者侍靖玉女傳言玉童為臣通達道室正神上元生氣入臣身中令臣所啓皆得上聞默畢叩齒十二通入戶右腳先行至聖前叩齒九通九拜左手三捻上香曰玉華散景九氣舍煙香雲密羅上沖九天侍香金童傳言玉女上聞帝前令臣所啓咸賜如言然後隨心所祝了步斗至斗口中九拜長跪奏密表了從頭呼祝應干法籙中仙曹遍曰汝等俟吾朝真罷吾入局治事當須分明現形顯白報應不得有違祝畢存仙曹盡在左右方始搯訣依次第行持依隂陽日吞玉札洗眼目了然後端坐據案吞通目洞視符及攝召符面前安紙一張摺三片分三日謂如今日係七月𥘉七日入局合有上天降下文字中下二界神祇呈到公事或仙曹有呈覆事件請主靖仙官靈官玉女主者批上良久香上一一存見分明少頃即依洞視法念呪吸青色及白體文字露念呪分明一一模寫看有甚事俟晚朝理會出靖念出戶呪曰出隂入陽萬神開張關啓事畢請閉黃房侍靖玉女明備神軒呪畢出户先左足入户勿返顧顧即來邪氣所奏不達先拜九拜拜時閉氣拜之出戶勿返顧顧即忤真氣勿踏戶限勿使竈中火勿以口咬香皆天之大禁罰即考身如所批之事與師犮議之大假理會未得須再批審候報應晚朝斷也靈寶旡量度人上經大法卷之十六
