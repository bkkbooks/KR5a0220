front:
  text: 靈寶無量度人上經大法卷之十九金九
  hash: sha256:d0fc0885b2e8fa8654653db768b9eab15c168d8afc8fa6c40ce1d0ecb16164a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_019-001a, image: hfl/0088/0088-106.png}
body:
  text: 五方雲芽品元始赤書五篇真文生於太虛之中天地未光開闢未明潛結元根三景成立五氣生焉五色分彩煥照五方置以五帝導以隂陽輪轉九天之紐運明五星之光植五嶽以安鎮育五府以養神是以至真之人常依陽光之始明上道元始之正氣下引玉泉以流芳致元精於太極招五帝於靈童營溉之者不衰存守之者無窮回萬劫而更始保五芽於顔容實靈寶之妙訣快萬聖之宗崇元始赤書服食青芽導引九氣青天玉訣修養青芽導引東方九氣青天之法常以立春之日雞鳴入室東向九拜平坐叩齒九通思東方安寶華林青靈始老君姓閻諱開明字靈威仰形長九寸頭著青精玉冠衣九氣青羽飛衣駕乘蒼龍之輿建頴旗從甲乙胡老之君九十萬人從九氣青天中下來降室內須臾化生青氣鬱鬱如雲之沓煙貫覆已形從已口中入直下肝府又思木星煥明東方光照我身皆令分明竟便開目仰祝曰九氣青天元始上精皇老尊神衣服羽青役御天宫煥明歲星散輝流芳淘溉我形上餐朝霞服引木精固養青芽保鎮朽零肝府充溢玉芝自生回年億劫色返童嬰五氣混合天地長并畢引青氣九咽止便服東方赤書玉文一十二字右十二字則九氣青天之名導引青帝九氣服食青芽皆朱書白紙上存思訖而頓服之則九氣不招而自降青帝應聲而見形五芽堅固於東嶽肝府玉芝而自生靈童齊真文於寢側青腰來輔翼而使令九年積感變化立成神仙度世萬劫不傾常以雞鳴陽光始分東向叩齒九通摩兩手令熱以掌拭面目九過仰祝曰東方青芽服食青芽飲以朝華畢便以舌料上齒裏甜脣三過令玉泉滿口而咽之三過又引青氣九咽令鎮肝之中其道畢也元始赤書服食赤芽導引三氣丹天王訣修養丹芽導引南方三氣丹天之法常以立夏之日雞鳴入室南向三拜平坐叩齒三通思南方梵寶昌陽丹靈真老君姓洞浮諱極炎字赤熛弩形長三寸頭著赤幘玉冠衣三氣丹羽飛衣駕乘丹龍玉輿建朱旗從丙丁越老之官三十萬人從三五丹天中下來降室內須史化生赤氣煥煥如火之明貫覆已從已口中入直下心宫又思火星煥明南方光照我身皆令分明竟便開目仰祝曰三氣丹天朱宫靈童元始上老參駕赤龍丹羽飛衣錦帔光明驅魂天宫運道隂陽三氣吐輝灌我絳宮赤子保鎮金芽飾容朝餐朱景玉芝滿充回停劫年朽骸返童長齡天地永享無窮身生水火變化百萬畢引赤氣三咽便服南方赤書玊文一十二字右十二字則三氣丹天之名引赤帝三氣服食丹芽皆赤書白紙上存思訖而頓服之則引赤氣而流溢芳芝玄注於絳宫赤帝降真於存思受赤文於靈童保丹芽以永固食三氣於祝融榮赤圭以通靈運五篇以召神長齋默感於太寂上天書名於南窗可謂坐致而不難永享之而無窮也常以雞鳴陽光始分南向叩齒三通摩兩掌令熱以拭面目三過仰祝曰南方朱丹服食朱丹飲以丹池畢以舌料下齒甜脣漱口玊芝滿口而三咽之又引赤氣三咽令鎮心宫之中其道畢也元始赤書服食戊已導引元氣黃天玉訣修養黃芽導引戊已十二氣中黃之天常以春分夏節秋分冬節四日雞鳴入室向王十二拜平坐叩齒十二通思中央玊寶元靈元老君姓通班諱元氏字含樞紐形長一尺二寸頭著黃精玉冠衣五色羽衣駕乘黃龍玉輿建黃旗從神戊巳越老之官十二萬人從十二氣黃天中下來降室內須臾化生黃氣勃勃如景雲之吐輝貫覆已形從口中而入直下脾府又思土星煥明中天光照我身皆使分明便開目仰祝曰中黃慕山元氣徘徊上有元老總統四嶽參駕黃龍五色羽衣運導九天輪轉璇璣煥明土星流光散輝玉英芳芝充溢四飛淘溉我身脾府鮮開養芳餐精萬神總歸檢魂制魄仙煉八威表裏洞明常生不衰通真達靈升入太微畢引黃氣十二咽止便服中央赤書玊文一十六字右十六字則中黃天名導引黃帝十二氣服食黃芽皆赤書白紙上存思訖而頓服之則上引元氣於九天下注玄膺於妙門太倉無糧而自充脾府不煥而自薰老應響巳玄和靈童披襟而告文素運走給命東西妙哉玉訣為萬仙之端常以雞鳴陽光始分向王叩齒十二通摩兩手令熱以摩拭面目十二過仰祝曰中央戊巳昻昻太山服食精氣飲以體泉畢以舌撩上腭玄膺取玉泉甜脣三過咽之又引黃氣十二咽令鎮脾府之中其道畢也元始赤書服食素芽導引七氣素天玉訣修養素芽導引七氣素天常以立秋之日雞鳴入室西向七拜畢平坐叩齒七通思西方七寶金門皓靈皇老君姓上金諱昌開字耀魄寶形長七寸頭著白精玉冠衣素羽飛衣駕乘白龍建紫旗從神庚辛玄老之官七十萬人從七氣素天中下來降室內須臾化生白氣浩浩如秋雲之羅天貫覆已形從口中而入直下肺府又思金星煥明西方光照我身皆使分明便開目仰祝曰金靈七門浩映西華中有素皇元始之家參駕白龍七氣峨峨徘徊玉門散精朱霞金星吐輝芳芝雱𩃰玄奧我身養我素芽明石鮮光萬劫不殂服以流泉食以太和金九六九天上帝給以玉華保年駐白顔景敷羅長存天地三光同遐畢引白氣七咽止便服西方赤書玉文一十二字右十二字則西方七氣素天之名導引白帝七氣服食素芽皆素書白紙上存思訖而頓服之七氣天神玄注素暉以灌溉明石自生玉芝以奧肺宫開明而納真太倉不哺而自薰素靈應響而驅策參乘九天之門餐之不休夀與元始而同年常以雞鳴陽光始分向西叩齒六通摩兩掌令熱以摩試面目七過仰祝曰西方明石服食明石飲以靈液畢以舌撩齒上甜脣漱口令玉芝滿口便三咽之又引白氣七咽令鎮肺腑之中其道畢也元始赤書服食玄芽導引五氣玄天玉訣修養玄芽導引五氣玄天常以立冬之日雞鳴入室北向五拜畢平坐叩齒五通思北方洞隂朔單鬱絶五靈玄老君姓黑節諱靈會字隱侯局形長五寸頭著玄精玉冠衣玄羽飛衣駕乘黑龍玉輿建皂旗從神壬癸羌老之官五十萬人從五氣玄天中下來降室內須臾化生黑氣暉暉相沓光若流星之煥耀貫覆已形從口而入直下腎府又思水星煥明北方光照我身皆使光明使開目仰祝曰北方玄天五氣散靈上有大神始老元精駕龍建旗遊宴上京是日元吉慶雲敷榮飛芝流灑滂沱四盈玉女玄奧灌我身形腎宫充鎮朽芽更生五府納真上通神明五老降接仙道早成變化水火衣服羽青飛行太空遊造紫庭夀同三景萬劫長齡畢引黑氣五咽止便服北方赤書玉文一十二字右十二字則北方五氣玄天之名導引黑帝五無服食玄芽皆赤書白紙上存思訖而頓服之則玄老員籍於朱陵靈童題簡於赤文五氣流芝奧於枯宅玉泉湧池生於端門神鎮靈厥腎府生薰太玄玉女役使東西萬劫不衰玄老同存常以雞鳴陽光始分北向叩齒五通摩兩掌令熱以摩拭面目五過仰祝曰北方玄滋服食玄滋飲以玉飴畢以舌撩下齒內甜脣漱口令玉芝滿口三咽又引黑氣入腹令鎮腎府之中其道畢也昔道言導引餐芽之法常以八節之日各依其日入室清齋存思五老像像呪説畢各隨方導引服諸天名行之八年仙官到迎玉女侍衛身生光明照映十方出入遊行五帝稽首三界司迎此位唯三天上真之號此文具藏南圃赤洞五城之內三天仙官備守仙樓十二重藏以紫玊之匱刻以黃金札挂以丹芝光草即以太上中章皆授宿有仙籍名書丹臺應為二天上真之人目無此挺終不得眄篇目舊科四百年一出常以雞鳴安身定神以次行事先服東方青芽氣次南方次中央次西方次北方如上法五帝畢便叩齒三十六通咽氣二十五過止又都呪曰白石巖巖以次行源泉湧洞似玉漿飲之長生壽命延長畢以舌撩上下中央令玉芝滿口而三咽又引氣二十五咽過極氣而咽之其道都畢靈寶無量度人上經大法卷之十九
