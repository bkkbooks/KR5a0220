front:
  text: 靈寶無量度人上經大法卷之六十二玉十
  hash: sha256:cdaac216c7bd4d4ed7e99b1ad6c4dbb0fb999db1478903ed4dbf6bacc83a5b3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_062-001a, image: hfl/0096/0096-110.png}
body:
  text: 混元隂煉品混元合氣聚而成靈三元九數周分十二在天則十二宫分野在人則十二經絡臟腑以應六隂六陽表裏化生成形也夫隂尸變煉攝氣聚靈煉真朱景洞徹陽光不墮幽趣登真道境法曰以茭草為人形狀以亡者所化而衣之將丹書化形符十二道分布五臟六腑及丹書大梵隱語天篆貼於腹上又丹書升天大劵絳袋盛之帶頭上更以丹篆靈寶五符安布亡者五臟混成三部八景二十四真先建壇行道致齊設醮啓奏虛皇上帝關行九壘泉曲寒庭去訖追攝亡魂方可行用至夜分法官具威儀置茭人安大門外東北鬼門上法官於地戶上化身為九華真人步罡立罡斗尾望天門呼召真氣令一童執召靈幡立於天門上法官攝召一氣化成一臟即今道衆舉金闕化身天尊令童子以幡旋招真氣下布菱人身中十二氣畢即於人門上法官存化茭人為人形道衆同法官念隱語旋繞茭人以楊栁灑法水三匝了道衆舉步虛引擡茭人於壇下法官依次第煉度行十二混元儀此法作九幽黃籙只度三名亡魂可用若度多不可用也水池幡符右法以黃絹上青書幡首曰天河東井君幡兩手書曰玉女灌五香聖母慶萬年三界並歡樂稽首禮天尊散形太上三真天河九魂合氣交并灌溉煉形月精黃華三靈神魂真魄流雲往來玉京九龍拔度離合上清聚形火池幡符右法以紅絹上黃書幡首曰朱陵火府君幡兩手書曰氣煉元臟腑紫戶目生仙數周衆真會啓陽應感繁三天太上上應胎真寶輝太華太極金鈴紫氣遊往丹文晶靈熒星內明度魂奔衝神皈大神應運太陽水煉符三氣尊神育胎結形太隂純化魁𩲃旋輪煉形返質九氣齊并龍漢瑛鮮幽魂枯朽發烟開度育邈合延東井皇華石景玉精飛玄水母金醴玉津滔滔源源不竭池亭九龍灌煉三光垂精仙人吐潤煉度魂靈內外朗徹表裏洞清百關九竅元氣滋榮五臟六腑萬神自生胎胞結節隨水開扄死氣斷滅惡滅沉淪我今煉化死骸生魂反故攺貌玉體金容變化煉穢飛升紫庭急急如長生大帝敕火煉符三景流暉台真洞明韶遙九魑氣列正隂陽凝虛光彩合璧玄景耀衢乾象回旋萬氣齊仙呪曰炎精二神三台流光煉胎易質魄煉魂更穢氣殂落乘烟飛揚隂氣消釋陽氣混康精神益壯洞入火鄉混合九氣總氣虛皇昊天有敕流金根芒九玄煥落貞利無疆急急如長生大帝敕主火大將軍符搯午文書符呪曰玄象赫明結陽聚神隨符降氣受煉死魂搯子文書符呪曰陽精隂耀洞煥五行隨符降氣受煉幽靈大梵隱語天篆靈寶五符混元十二氣混神三景真符天真皇人曰夫煉度隂魂不過三尺在世喎邪跛躄殘疾刀兵形骸不具者隂府亦然須當行九陽煉度攝度經絡真符一十二道焚于火池次行十二大將軍真形符化生五臟六腑十二經絡訣目生腎符子文生心符午文生肺符未文生脾符丑文生膀胱符辰文生小腸符戌文生膽符寅文生大腸符酉文生胃符卯文生三焦符申文生心胞絡符亥文生肝符巳文九陽符書畢捧符總呪曰九天梵氣為之結形中有大帝慈悲惠生甚妙靈符魂魄返蘇千變萬化從有入無身心湛寂俱棄玄珠萬劫難遇開闢幽塗受此隂煉魂登太虛右陽符十二道出神霄玄一六陽神仙籙依法印造上加三台日月敕用合同散形呪書之十二大將軍符皇人曰符內大將軍有百二十貟總領各一貟煉度召之焚符逐一用之化生五臟六腑書十二真符須入靖室召諸大將軍靈官降焚香啓告太上述所陳煉度亡魂因依面東南以雄黃夾硃砂篆於黃繒上落筆不得語言一心神定念真存三境一氣而成取中黃氣注符并混沌赤文焚火池中九隂符一氣生腎六元運陽化隂大將軍楊黑地白書二氣生心七變混景大將軍丁紅地黑書三氣生肝八徊合元大將軍丁青地朱書四氣生肺九光會靈大將軍陳志元白地朱書五氣生脾十合隂陽大將軍王先之黃地白書六氣生膀胱十一變靈大將軍張同白地黑書七氣生小腸十二運化大將軍李淵紅地白書八氣生膽十三陽光大將軍申孚青地白書九氣生大腸十四運化大將軍周自然黑地白書十氣生胃十五成隂變陽大將軍章修白地黃書十一氣生三焦十六三景混成大將軍王卓立黃地白書十二氣生心胞絡十七隂陽合靈大將軍鄭明紅地白書右隂十二道出天樞法洞陽玉煉依法印造上加三台日月敕下注將軍姓諱煉度亡魂先逐一呼大將軍名諱搯訣以梵呪呪筆書取東南氣灌符上面東南焚之太隂煉化升天大劵日月天帝真陽開化合明梵陽隂煉魂强公子輔黃寧總録具形神頭冠九芒帝真席身佩珠纓命明道回輪保舉升天合同大劵皇人曰夫超度亡爽功成果滿須詣三天若三界大魔不行保舉無合同符契亦不能升舉是以元皇慈愍留此大劵濟度存亡三氣盧無三寶陽日合并玄都結氣成天南宫陶鑄北府消愆三部召制使者魂爽得度真元佩負法文升虛入妙證道無為敕制地祇侍衛送迎拔出地戶五苦八難永離鬼官魂度朱陵受煉更生過度天門敕送南宫玄師曰三皇內文有升天版劵於得道之日飛升之時天尊遣真侍賜劵使骨肉同飛過度天門下世不許僣行此文乃三天合同玉清寶劵上帝靈命玉皇真文給賜生身學士朝元謁真拔度死魂煉魄南天使無拘天門使青紙一方摺成四面用丹砂書劵文背書告命三行一行年月日時一行法師銜位共作五行以絳羅作囊盛之結以青絲學士必當掛於心前亡者給付焚化與天門吏曲度者頓放芻身劵文今日欣慶受度某人歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門一如告命生身合同劵告文某人今日欣度歷關諸天云云無拘天門玉清符命升度道境一如奉行混神一氣生腎坎氣坎文混神二氣生心離氣離文混神三氣生肝震氣震文混神四氣生肺兌氣兌文混神五氣生脾坤氣坤文混神六氣生膀胱艮氣艮文混神七氣生小腸火氣丑文混神八氣生膽巽氣巽文混神九氣生大腸軋氣軋文玉十十二混神十氣生胃火氣戍文混神十一氣生三焦火氣未文混神十二氣生胞絡火氣辰文升天左劵左劵背文左劵告文靈寶升天左劵告下三界天門守衛諸神具法位臣姓某奉行太歲年月朔日時告下傳道境魂神受度更生自然一如告命風火驛三天升度亡過某乙上登太上撰次降自元始靈書玉清中篇面書大梵隱語六十四句背書三皇內文六十八字元始靈書玉清中篇太上撰次降自三天升度亡過某乙上登道境魂神受度更生自然一如告命風火驛傳太嵗年月日時告下具法位臣姓某奉行靈寶升天左劵告下三界天門守衛諸神升天右劵右劵背文右劵告文靈寶升天右劵告下三界天門守衛諸神具法位臣姓某奉行太歲年月日時告下道境一如告命風火驛傳人亡過某乙承茲功德上登上清無量之奧深不可詳敷落神真普度天大魔天中之靈九和十合變化音隱韻天中空洞自然靈章天中之尊天中無色之境天帝玊真梵行帝諱三界天名隱面書三十二天帝背書三皇內文無色之境天帝玉真梵行帝諱三界天名隱音隱韻天中空洞自然靈章天中之尊天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人亡過某乙承茲功德上登道境一如告命風火驛傳太歲年月日時告下具法位臣姓某奉行玉十十七靈寶升天右劵告下三界天門守衛諸神右一半函付天門吏俟驗認合同左一半付亡人收執結于幡腳上發真劵可漏以黃紙三寸腰封具法位某謹封方函靈寶升天合同真劵告下三界天門守衛諸神具法位姓某謹封普度左劵右語元始靈書中篇大梵隱語無量之音中篇玉字普度九州分野十道冥鄉三界九幽北帝泉曲五嶽五道天牢地獄六洞十宫河源山府無間之牢一切亡魂上登道境飛天書功萬神侍身魔王保舉上仙大勳遊行三界升入金門一如告命風火驛傳普度右劵右語諸天隱諱諸天隱名敷落神真普度天人亡過某乙上登道境今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門一如告命風火驛傳發劵牒無上黃籙大齊壇牒上三界天門守衛諸神本壇今月某日為某鄉貫某人崇建無上黃籙大齊以某日夜升度亡過某人等超升丹界謹按靈寶大法破升天左右契劵除將一分付亡過某乙收執外一分入方函封印全牒上三界天門守衛諸神請行照會須至專牒者牒前件劵文隨牒見到請照會交管伺候已受度亡過某乙等齎執劵文到來即與驗認合同應時超度魔王監舉無拘天門牒凖靈寶大法科令奉行謹牒太歲年月日時牒發劵關子無上黃籙大齊壇本壇今為齊主某人開建無上黃籙大齊追薦亡親某人等除已依科開度外今告行靈寶升天大劵文升度亡過某乙等魂上登道境所有合同劵文一函須至關發前去者右關某日當直功曹使者請疾速齎管前去徑詣三界天門守衛諸神告下候亡過某乙執劵到日依科放入天門受生施行太嵗年月日時關玄師曰二劵並以青素丹書髙九寸前後書告文背書三皇內文六十八字分八行勻書男給左劵女給右劵如普度男女衆給二劵止書受度之首者破劵時正中截斷以右一半用柏木函無柏木以黃紙代之付天門吏一半付亡人收執如專度一名青囊盛置之芻身左右佩之並於三寶前宣焚靈寶無量度人上經大法卷之六十二
