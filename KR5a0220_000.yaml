front:
  text: 靈寶無量度人上經大法序霜一
  hash: sha256:c18b72deca5d40c2ffc16a83dcfd3ab717039ee3d0249bc015e74991b6c28ffb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_000-001a, image: hfl/0085/0085-004.png}
body:
  text: 天真皇人撰集元始祖劫為天地之根宗靈寶開圖總隂陽之樞紐推日月變通之理統星罡躔運之機妙集旋綱提擕子午達五行之造化追二氣之魒魁進退乾坤飛旋離坎擒龍伏虎控鳳乘鸞朝餐紫府之英暮食青華之液錬形流火濯質東池六龍飛蹈於層霄九氣攢烹於玉鼎道之生我物無定形棄物留形則氣神交而真自徹釋情養浩則精血通而氣目凝真火髙奔飛扶丘之皎日水金拘制旺玉關之蟾蜍八鸞同鳴讃空歌之雅韻九鳳齊唱揚十絶之玄音俯仰靈阿十方之天真自集朝參太上萬靈之羽衛飛軿黍米髙懸變通莫測含包虛昧則無鞅數衆咸歸濁競奔趨則萬氣千真盡散集氣為寶聚神為靈乾健純陽坤厚純隂自然之氣無形無名上極九清以氣假名為號下徹九地以形則號為名是知杳杳冥冥恍恍惚惚寂然不動感而遂通二氣回旋天地應時而動三田通妙隂陽轉運而為靡在他施何勞自造存神叩齒警初真八道之門錬氣書符明學士守規之矩欲餌吞於九轉當造化於四時回運周天交遘水火烹金鑄鼎錬石補玄盜日月之精華結神真之鉛汞先明子午次辨水金進退抽添知時識候溫調養育烹錬無差勿殺害以欲貪勿嫉妬而淫盜逺憎去𡜍異骨成親齊度天人闡教凡世通玄究微悉章洞慧束魔却惱斷六根障塞之源捨妄從真滅五苦輪回之路拘魂制魄養氣藏神身有光明形無影響開明三景離合自然髙宴鬱羅萬劫簫臺聳冠飛升金闕玉山絶境逍遙飛駕瓊輪十氣飛天自現控乘緑輦諸天五老傾光疾除罪簿之因落滅惡根之道妙乎兹法故品諸經提悟迷荒救擕未悟吾昔遇清微丈人授以二氣吐納次遇於玄皇玉帝賜以金丹訣言遂明天地權輿之數以了隂陽生殺之機衆卉百華盡守根而固蒂竒禽異獸咸抱一以含元故知顚倒五行畨覆四象盜元一飛玄之氣守真精妙體之英建寶鼎於崆峒飛金晶於靈洞遘內外之水火合上下之刀圭元氣周流感元黃而玄珠光耀包藏宇宙含金丹而資用無窮是知天地之獨尊變化之無形無質乾坤之妙道生死之無始無終道勿逺求不出戶牖親之者鮮逺之者多棄本忘真甘樂亡於泉壤入邪捨正徒負夏以經冬靜以生强安而思極七情鼓扇陽絶隂生而性命危六欲觸耽精散形離而神氣泯五藏搖蕩九竅閉關靡知性命之端安得竒耦相配何明造化豈辨玄機吾啓大慈願提仙子將茲神氣集號玄章故名靈寶之筌蹄以應真經之內法付于妙行出世度人化現十方名號非一編諸經典遍滿恆沙句句為玄頭頭是道悟茲妙理則入生出死而與道俱存了此真機則離合自然而去來無礙遇之者夙非凡骨行之者纍世真仙悮謫人天慮差覺路指名圖定證悟法門行者祕藏了真可度謹序
