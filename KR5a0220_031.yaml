front:
  text: 靈寶無量度人上經大法卷之三十一麗一
  hash: sha256:7281d6c0a33476919abd0b6b6c87c30a897445fa59c674c03fb7ef89a93c500b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_031-001a, image: hfl/0091/0091-004.png}
body:
  text: 欀度施用品赤書玉文元始赤書五篇真文上清自然之靈書九天始生之玄奧空洞之靈章成天立地開張萬真安神鎮靈成生兆民匡御運度保天長存上制天機中檢五靈下策地祇嘯命河源運役隂陽召神使仙此至真之文妙應自然致天髙澄使地固安五嶽保鎮萬品存焉安鎮星度天災玉文保安欀災安鎮玉文受法攝伏鬼神玉文止洪水度水災玉文安鎮星度天災玉文東方嵗星輔肝角亢鎮真氐房心尾四景回旋箕土七辰正斗明輪承氣輔非掃除災羣南方熒惑輔心井鬼守房桞星張翼統御四鄉軫總七宿回轉天常召運促會正道驆行赤文命靈本行經無赤文命靈四字西方太白檢肺奎妻保魂胃昴畢觜主制七關參總斗魁受符北元北方北辰輔賢斗牛衛扉女虛危室豁落四開壁總七星執凶斛非却災掃穢明道輪輝中央鎮星輔脾回度北元魁𩲃主非裁邪斬姦𩵄䰢魓𩳐攝穢除氛魒正玄斗明度天關九天符命金馬驛傳右東西南北四方並青紙朱書中央黃紙並隨方色石刻之亦得凡諸天星宿各有分度至於徑道錯越更相侵犯或有異星見於方境皆由天氣運度否激所陳災有所妨出其分國故以天光轉照玄告不祥故元始埀文和天安地解災却患安國寧民至士精心依法修行災見之日書真文如法露中庭向方靣叩齒十二通散髮仰祝曰元始上天三光髙明回景照耀四方朗清運度所衝激揚流星五界錯越三流失寧五斗總晨七宿明靈真君大魁厥諱玉精夫人皇妃字曰育嬰總御玄關回轉諸天今有客災玄告不祥謹以真文赤書上呈散髮謝愆披露丹誠惟垂玄鑒回復天經氣不橫越災不橫生焚燒靈文散煙玉庭上景監明普告萬靈氣消三關災滅九溟隂陽調和國土太平謹以金龍風馳驛傳呪畢露真文於中庭各按方所以金龍鎮之假災東方則九日九夜竟而燒文散灰青煙之中凡禳天災安國寧民法皆隨方然燈照曜諸天假災東方可九燈亦可九十燈九百燈用金龍一條青繒九十尺九日九夜災在南方則然三燈亦可三十燈三百燈絳繒三十尺三日三夜災在中央則然十二燈亦可百二十燈千二百燈黃繒百二十尺十二日十二夜災在西方則然七燈亦可七十燈七百燈用白繒七尺七日七夜災在北方則然五燈亦可五十燈五百燈黑繒五十尺五日五夜此靈寶上元科法保安欀災安鎮玉文東方東方九氣始皇青天碧霞鬱壘中有老人總校圖籙攝氣奉仙南方南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣勃光神仙受命應會太陽中央中央總靈黃上天元始生五老中皇高尊攝氣監真總領群仙典録玄圖宿簡玉文催運上氣普告萬神西方西方素天白帝七門金靈皓眏太華流氧白石峨峨七氣煙煴上有始生皇老六神總領肺氣主校九天檢定圖録制召上仙北方北方玄天五氣徘徊中有黑帝雙皇太微總領符命仙煉八威青裙羽䙱龍文鳯衣上帝所舉制到二階右依方色書白剌上記姓名月日如投簡則九年五方仙官到使青腰赤陵黃素太素太玄玉女來皆見叩齒十二通呪曰玄上高靈元始尊神大聖徘徊萬真臨軒三景敷輝慶雲四陳上告較圖推算九天今日啓願投剌靈山丹山赤字自然真文上告五帝記名玉篇萬神監映日月盟言願度願生願神願仙天地星宿互照我身三官九府五帝大神普告無窮削除罪根元始大開莫不納言九祖幽魂受福自然三塗五苦永離八難得與三景同輝紫宸輪轉不滅身得飛仙宣呪畢投剌絶岩名山之頂散華靈山之上又叩齒三通面本命方再呪曰元始監映仙名巳書三官九府罪莫不除散華五帝告盟太虛請如所陳萬劫長居受法攝伏鬼神玉文東方東山神呪攝召九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣水宫敢有稽延朱書青上南方北攝酆山東送魔宗符教所討明列罪源南山神呪威伏百方群妖滅爽萬試摧七黃書赤上中央勑攝北帝遏塞鬼門剪除不祥莫有當前白書黃上西方赤書玉字九天正文攝召萬氣普歸帝君黑書白上北方北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧青書黑上兆面東北東九次南三次中央十二次西七次北五次俱叩齒三十六通閉氣九口而仰誦呪曰三元開明回轉天常運推數終百六乘岡大劫交會萬妖爭行北都不拘放逸鬼宗群魔縱肆妖閉天光上帝有命普告十方演明天度法教開張正道治民掃除不祥有何小妖群聚為場赤書玉文統攝鬼鄉北都三官速明傳行千魔束爽萬鬼送形流鈴交煥激氣太陽金虎四邀天丁輔亡大小齊到不得匿藏元始所告列奏上蒼止洪水度水災玉文東方下制東河溟海水神大劫洪災蛟龍負身水府開道通徑百千上帝赤文風火無間黃書青上南方南河水帝太伯龍王神呪流行普掃不祥洪水飛災止蛟召龍開除水徑千道萬通敢有干試攝送火宫赤書所告莫有不從黃書青上中央中山神呪召龍上雲制會黃河九水河源不得怠縱善惡悉分千妖萬奸上對帝君莫有干試太陽激燌赤書玉字宣告普聞黃書青上西方西山神呪八威七傳符水上龍召山送雲在所校得一伂果同到帝門輔衛上真斬滅邪源若有不祥截以金關赤書符命風火驛傳黃書青上北方九河傾訖鳥母群飛蛟龍通道水陌洞開赤文王書驛龍風馳黃書青上道言天地大劫之災洪水四出蕩穢除惡萬無遺一當此之時天地冥合人民漂流無復善惡唯有至學之士得靈寶真文大劫小劫之符乃可乘飛羽而髙觀登靈嶽而翔浮當此之時神自當使蛟龍為通路開水徑以度身河伯司迎不待津梁乃明靈文之妙豈拘大劫之交哉遇此之際當依舊文施用北向叩齒五通閉氣二十五息存巳身心中生大火出頭頂而燒四方山林草木及巳身都盡形骸皆成灰塵一時飛翔入青煙之上無所復遺思大水浩蕩除天下巳身化成蛟龍隨水而流又叩齒二十五通仰祝曰上始回靈開明九元天推地轉三氣流傅五行相促運度機關隂陽否激結成災衝大劫傾訖蕩除妖氛九河受對洪流激川水母徘徊鳥烏合群日月冥會三景停關上選衆神推校玉文棄惡貴善清濁永分我系帝簡名列九天太災四會赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈山浮度我身九河水府溟靈大神開深水徑通利河津蛟龍應符攝山送雲負我度我驚馳四奔丹書赤字元始真文金龍驛呈時刻無間立須奏御上對帝君畢引氣二十五咽須臾自當有水神開道以度兆之身在山則山浮在水則水開可謂臨厄濟倏歘之頃也靈寶無量度人上經大法卷之三十一
