front:
  text: 靈寶無量度人上經大法卷之八霜七
  hash: sha256:75ce3d49bb7f07e6bc4cff6a5f83b698a4c2f532b833dcbceeaaa8f2b9d745aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_008-001a, image: hfl/0086/0086-126.png}
body:
  text: 神光大定品七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山嶽藏雲天無浮翳四氣朗清一國地土山川林木緬平一等無復髙下土皆作碧玉無有異色衆真侍座元始天尊懸坐空浮五色獅子之上玄師曰此説元始天尊妙用神通化機運感之所至既言七日七夜日月星宿一時停輪何以分其畫夜七日七夜之數又非止是玉清有浮黎土有如此威神妙化道君所言諸天也一時是應三界諸方萬天皆如是也此之微妙聖應天尊外化日月不行星宿不運璇璣玉衡停輪不顯晝夜其實內運主宰功用未嘗暫停故玉宸用七日七夜之數又非玉清玉京説經比人世七日七夜之理言一國諸天諸地皆統言之乃云一國地土也緬平一等則普周萬彚神化無不遍及故云無復髙下以內言之諸天日月則日不瞬也星宿則氣不運也璇璣玉衡脈不息也神風靜默無出入息也山海藏雲隂陽無朝交也天無浮翳內外無物也四氣朗清內外上下一同也一國地土猶一身也山川林木猶四肢百脈毛髮孔竅榮衛神室骨節也土皆作碧玉入於道定之境也玄師曰以內言之乃大定神光湛然見玉清境有七日七夜之功七晝七夜日月停輪二目不瞬即非瞑目亦非內視亦非臨目是七日七夜久視停其目瞬照明三部內外洞然其一身氣朝運於百節經絡隂陽榮衛皆系於三部息脈其息脈乃人之一身璇璣玉衡也四至為璇璣三部應玉衡既是璇璣不運則日月駐景星宿停輪四至不至則三部不息一身氣血俱不運輪先要在神風靜默無吹噓出入之聲山嶽藏雲無蔽明妄想之景清明湛寂天無浮翳自然溫良寒燠四氣朗清萬物皆同一色况一身內外皆如碧玉無一毫之塵漸至百神守死户萬真朝一身形可以舉身乘空百日神合道妙千日白晝騰飛上升其天尊空浮乃自己元神居玉清宫又曰玉帝宫所謂自己有天尊何勞上望天讃曰天尊雖逺妙近言泥丸宫宫室皆七寶窗牖自然分是也五氣朝絳宫威神之妙化結成獅子天尊因而乘之下入丹田左青右白前赤後黑中黃故有五色之稱坐空浮有無化應虛實信感七日七夜湛然見玉清天尊是時大定神光上乘至妙功圎會遇立至輕舉可以力取定中魔試水火刀兵王法萬種執於絲芒之實皆不得道七日七夜之外所見者皆未來之事或言之則前功並棄無望仙冀可不愼厥口哉訣曰以耳對肩以鼻對臍收其六根尊神於目非外非內觀其神光三日之外於密室之中見神光一點孜孜定神四日之外漸明漸大七日神光滿室定中百物皆為未然定中見一切真靈鬼物方入洞觀徹視大定神光之圖璇璣玉衡之圖一呼一吸四至共六寸一呼二至一吸二至各得三寸一至得十五分經緯天地縱橫十五故上帝付黃帝河圖也徹視章目本命為始行定法七日之外定力有凖方行徹視定若未成不可行之於空中存身為元始天尊目駐萬里之外不顧面前之物得如此又七日漸有倣佛共一百日功成可以坐觀三尊徹視十天見諸十方及年中有災誦詠妙經故為九宫真人凡行此大定徹視之道須遵持二品戒行大定三年靣朝玉清天尊賜劵白日飛升位輔天真若持大定之道不持戒德智慧不生難入大乘之妙不能體合至妙升入玉清威神妙戒章第一戒者執心平等不得自欺第二戒者忠事君師孝敬事天地父母第三戒者仁慈及物貧儉節身第四戒者清淨端直不得阿黨第五戒者敬重上法深信修行第六戒者欽重鬼神不得輕侮第七戒者凡所衣食百物皆出元始祖氣不生外想第八戒者灰水蕩穢不用修飾第九戒者口誦心拜無使勞役第十戒者七日大定神光湛然見玉清境智慧妙德章第一善德不殺心生意想口言假手勸助教誘殺戮一切衆生皆謂之殺第二善德不害隂謀內潛諂賊外施穽陷網籠酷毒非法損害衆生皆謂之害第三善德不嫉懷怨藏機乘勢説非願彼遭惡謂之嫉第四善德不妬暗使心情私密願望勝已色想欲擬陷害力去能根宗生謂之妬第五善德不淫非色非財不正其意六親通私淫犯骨肉不以禮交私心意慕不論妍嗤謂之淫第六善德不盜穿窬墻壁拆函開封擊鎖改換印章私心隱匿貸借不還欺昧侵竊謂之盜第七善德不貪言意無根情量度闊覩於萬物皆欲盡有無足無歉更實其情不量分定求而無厭皆謂之貪第八善德不欲心猿顚而意馬駿馳六根般運使作七情慕生於愛擬定欲心謂之欲第九善德不憎偏見執著香臭淨汙妄想分别髙下貴賤不為一等謂之憎第十善德不嫉情量疑慮過與不及心生狡佞邀阻不遂謂之嫉第十一善德言無華綺第十二善德口無惡聲諸大定之道告汝學者在於定中觀心無心乃是真心觀形無形乃是真形心形既忘自入無形之道乃是白日上升之法太一真人大定神光頌曰蓊冥無心大淵潛形蒼色混同存化凝靈鴻毛不動內外含真龜啖紅虺結秀真精日月朦朧璇璣不升白霓青霧往復交并七日神通自見玉清黍米入妙品十遍周竟十方無極天真大神一時同至一國男女傾心皈仰來者有如細雨密霧迮國一半土皆偏陷非可禁止於是元始懸一寶珠大如黍米在空玄之中去地五丈元始登引天真大神上聖髙尊妙行真人無鞅數衆俱入寶珠之中天人仰看唯見勃勃從珠口中入既入珠口不知所在國人廓散地還平正無復欹陷玄師曰謂十遍説經巳竟十方無極大神并天真一時同至召十方慧力經緯祥應一國皆獲護度咸得長生故傾心皈仰傾國來赴説經之所喻如細雨密霧不可稱量其數故言無鞅之衆萬天普言一國一國並會大浮黎土其地不能厚載天尊經力重德及無鞅廣衆則地迮偏陷來者之衆雖巳迮國一半尚自不能禁止是以天尊施玄妙大化懸一寶珠大如黍米在空玄之中莫測所懸之系去地五丈離於濁色之表登引天真大神上元之真九品之真上聖髙尊中元聖尊九品之聖妙行真人下元仙真九品真人隨天尊登引俱入寶珠之中其一切天人非天真上聖真人故難隨無為化機不能同入空玄黍米之妙祗仰看而巳見勃勃從珠口中入於珠中既入珠口不知所在且如下格小仙有芥納須彌之妙懸壷天地之景何況大聖天尊敷宣大教視現神變也所言寶珠大如黍米巳是微妙更去地五丈能見寶珠在空玄之中者非天人不有此明慧又況見其珠口者實天尊登引聖真入妙有虛無之境當其隨天尊入於寶珠之時天人仰看即見珠口既俱入寶珠之中即天人不能見寶珠之內玄妙之化是以國人廓散地還平正無復欹陷此當時説經之境天尊寶珠之妙也以至道言之大道神通大無不包細無不入聚則成形變億萬元鞅之衆俱成毫芥之妙聚則如是散則從無生有遍及萬天諸國分形億兆無所不遍無所不及散則如是去地五丈則離其五欲五塵五聚五色五香五聲五濁在五行數外故能入空玄之妙黍米者五榖之長一國者一身之比欹陷者道有傾迮未全一體難稱重玄之化天人即萬神也上聖天真妙行真人則三元之神也天尊則一身之主也以內景妙道言之乃玉清寶珠神化胎仙之訣也以大法言之却粒愈疾之法也以修誦言之威神玄通之儀蠲災召福之品也玄師曰九轉十遍功用既周則證從有入無空玄黍米之妙先召陽精後召隂華比細雨密霧而入一身周盈祖氣十回神化元谷祖氣一歸衆氣同隨化黍米之玄丹鎮黃庭之靈府丹成貫日餌之立駕雲舉上登玉清位為真人太玄真人黍米入妙頌曰靈眄比天上應太玄三日陽合七朝隂全十三坤位十八連乾望朔帶符八乃為弦二十三夕隂陽宗元夕日常道此會三田一塵有染失於綿聮五神混合品召五神混合符上元太一實居泥丸中元司命安坐絳宫下元桃康坐官把籍無英自元尊神玉符一召五公子神合并急急如律令敕符呪曰千和萬合自然成真真中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根急急如元如無量度人律令服符呪曰太上靈丹光耀三田殺滅尸蟲辟却魔煙五神混合百關通全能令冬熱即使夏寒回反坎離旋氣綿綿我身蕩蕩由化千端入我五臟百神不干真氣內降剝坤健乾急急如靈寶混合五神律令五神混合之圖白元尊神泥丸太一中央司命命門桃康無英公子乙庚合成緑丁壬合成蒼戊已合成紫丙辛合淡紅玄師曰五神混合符學士行靈寶七經八緯及諸內行並用朱書黃素上每日早面東吞服一道上清訣五方氣吹符即得五神守護三一常存存思施用無不感格妙行真人中理五氣頌一氣朝宗入於八冥天門地户啓閉塞通生本太微明梁祖氣天入作陽天門為隂地泄為真納與邪功水火同來百神回東歸於谷室靈寶元量度人上經大法卷之八
