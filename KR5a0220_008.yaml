front:
  text: 靈寳无量度人上經大法卷之八霜七
  hash: sha256:535bebeeb97e5ec0ff7797b3c5e8ebf4531b034fecf01f9884f270bd5b289a2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_008-001a, image: hfl/0086/0086-126.png}
body:
  text: 神光大定品七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜黙山嶽藏雲天无浮翳四炁朗清一國地土山川林木緬平一等无復髙下土皆作碧玉无有異色衆眞侍座元始天尊懸坐空浮五色獅子之上玄師曰此說元始天尊妙用神通化機運感之所至既言七日七夜日月星宿一時停輪何以分其畫夜七日七夜之數又非止是玉清有浮黎土有如此威神妙化道君所言諸天也一時是應三界諸方萬天皆如是也此之微妙聖應天尊外化日月不行星宿不運璇璣玉衡停輪不顯晝夜其實内運主宰功用未甞暫停故玉宸用七日七夜之數又非玉清玉京說經比人世七日七夜之理言一國諸天諸地皆統言之乃云一國地土也緬平一等則普周萬彚神化无不徧及故云无復髙下以内言之諸天日月則日不瞬也星宿則炁不運也璇璣玉衡脉不息也神風靜黙无出入息也山海藏雲隂陽无朝交也天无浮翳内外无物也四炁朗清内外上下一同也一國地土猶一身也山川林木猶四肢百脉毛髮孔竅榮衞神室骨節也土皆作碧玉入於道定之境也玄師曰以内言之乃大定神光湛然見玉清境有七日七夜之功七晝七夜日月停輪二目不瞬即非瞑目亦非内視亦非臨目是七日七夜乆視停其目瞬照明三部内外洞然其一身炁朝運於百節經絡隂陽榮衞皆系於三部息脉其息脉乃人之一身璇璣玉衡也四至爲璇璣三部應玉衡既是璇璣不運則日月駐景星宿停輪四至不至則三部不息一身氣血俱不運輪先要在神風靜黙无吹嘘出入之聲山嶽藏雲无蔽明妄想之景清明湛寂天无浮翳自然温良寒燠四炁朗清萬物皆同一色况一身内外皆如碧玉无一毫之塵漸至百神守死户萬真朝一身形可以舉身乘空百日神合道妙千日白晝騰飛上昇其天尊空浮乃自己元神居玉清宫又曰玉帝宫所謂自己有天尊何勞上望天讃曰天尊雖逺妙近言泥丸宫宫室皆七寳窻牖自然分是也五炁朝絳宫威神之妙化結成獅子天尊因而乘之下入丹田左青右白前赤後黒中黄故有五色之稱坐空浮有无化應虚實信感七日七夜湛然見玉清天尊是時大定神光上乘至妙功圎會遇立至輕舉可以力取定中魔試水火刀兵王法萬種執於𢇁芒之實皆不得道七日七夜之外所見者皆未來之事或言之則前功並棄无望仙冀可不愼厥口哉訣曰以耳對肩以鼻對臍收其六根尊神於目非外非内觀其神光三日之外於密室之中見神光一點孜孜定神四日之外漸明漸大七日神光滿室定中百物皆爲未然定中見一切眞靈鬼物方入洞觀徹視大定神光之圖璇璣玉衡之圖一呼一吸四至共六寸一呼二至一吸二至各得三寸一至得十五分經緯天地縱横十五故上帝付黄帝河圖也徹視章目本命爲始行定法七日之外定力有凖方行徹視定若未成不可行之於空中存身爲元始天尊目駐萬里之外不顧面前之物得如此又七日漸有彷彿共一百日功成可以坐觀三尊徹視十天見諸十方及年中有災誦詠妙經故爲九宫眞人凡行此大定徹視之道須遵持二品戒行大定三年靣朝玉清天尊賜劵白日飛昇位𥙷天眞若持大定之道不持戒徳智慧不生難入大乘之妙不能體合至妙昇入玉清威神妙戒章第一戒者執心平等不得自欺第二戒者忠事君師孝敬事天地父母第三戒者仁慈及物貧儉節身第四戒者清淨端直不得阿黨第五戒者敬重上法深信修行第六戒者欽重鬼神不得輕侮第七戒者凡所衣食百物皆出元始祖炁不生外想第八戒者灰水蕩穢不用修飾第九戒者口誦心拜无使勞役第十戒者七日大定神光湛然見玉清境智慧妙徳章第一善徳不殺心生意想口言假手勸助教誘殺戮一切衆生皆謂之殺第二善徳不害隂謀内潜諂賊外施穽陷網籠酷毒非法損害衆生皆謂之害第三善徳不嫉懷怨藏機乘勢說非願彼遭惡謂之嫉第四善徳不妬暗使心情私密願望勝已色想欲擬陷害力去能根宗生謂之妬第五善徳不婬非色非財不正其意六親通私淫犯骨肉不以禮交私心意慕不論妍嗤謂之淫第六善徳不盜穿窬墻壁拆函開封擊鎻改換印章私心隱匿貸借不還欺昧侵竊謂之盜第七善徳不貪言意无根情量度闊覩於萬物皆欲盡有无足无歉更實其情不量分定求而无厭皆謂之貪第八善徳不欲心猿顚而意馬駿馳六根般運使作七情慕生於愛擬定欲心謂之欲第九善徳不憎偏見執著香臭淨汙妄想分别髙下貴賤不爲一等謂之憎第十善徳不𡜍情量疑慮過與不及心生狡佞邀阻不遂謂之𡜍第十一善徳言无華綺第十二善徳口无惡聲諸大定之道告汝學者在於定中觀心无心乃是眞心觀形无形乃是眞形心形既忘自入无形之道乃是白日上昇之法太一眞人大定神光頌曰蓊冥无心大淵潜形蒼色混同存化凝靈鴻毛不動内外含眞龜啗紅虺結秀眞精日月朦朧璇璣不昇白霓青霧往復交并七日神通自見玉清黍米入妙品十徧周竟十方无極天眞大神一時同至一國男女傾心皈仰來者有如細雨密霧迮國一半土皆偏陷非可禁止於是元始懸一寳珠大如黍米在空玄之中去地五丈元始登引天眞大神上聖髙尊妙行眞人无鞅數衆俱入寳珠之中天人仰看唯見勃勃從珠口中入既入珠口不知所在國人廓散地還平正无復欹陷玄師曰謂十徧說經巳竟十方无極大神并天眞一時同至召十方慧力經緯祥應一國皆獲護度咸得長生故傾心皈仰傾國來赴說經之所喻如細雨密霧不可稱量其數故言无鞅之衆萬天普言一國一國並會大浮黎土其地不能厚載天尊經力重徳及無鞅廣衆則地迮偏陷來者之衆雖巳迮國一半尚自不能禁止是以天尊施玄妙大化懸一寳珠大如黍米在空玄之中莫測所懸之系去地五丈離於濁色之表登引天眞大神上元之眞九品之眞上聖髙尊中元聖尊九品之聖妙行眞人下元仙眞九品眞人随天尊登引俱入寳珠之中其一切天人非天眞上聖眞人故難随无爲化機不能同入空玄黍米之妙祗仰看而巳見勃勃從珠口中入於珠中既入珠口不知所在且如下格小仙有芥納須彌之妙懸壷天地之景何況大聖天尊敷宣大教視現神變也所言寳珠大如黍米巳是微妙更去地五丈能見寳珠在空玄之中者非天人不有此明慧又況見其珠口者實天尊登引聖眞入妙有虚无之境當其隨天尊入於寳珠之時天人仰看即見珠口既俱入寳珠之中即天人不能見寳珠之内玄妙之化是以國人廓散地還平正无復欹陷此當時說經之境天尊寳珠之妙也以至道言之大道神通大无不包細无不入聚則成形變億萬元鞅之衆俱成毫芥之妙聚則如是散則從无生有徧及萬天諸國分形億兆无所不徧无所不及散則如是去地五丈則離其五欲五塵五聚五色五香五聲五濁在五行數外故能入空玄之妙黍米者五榖之長一國者一身之比欹陷者道有傾迮未全一體難稱重玄之化天人即萬神也上聖天眞妙行眞人則三元之神也天尊則一身之主也以内景妙道言之乃玉清寳珠神化胎仙之訣也以大法言之却粒愈疾之法也以修誦言之威神玄通之儀蠲災召福之品也玄師曰九轉十徧功用既周則證從有入无空玄黍米之妙先召陽精後召隂華比細雨密霧而入一身周盈祖炁十囘神化元谷祖炁一歸衆炁同隨化黍米之玄丹鎭黄庭之靈府丹成貫日餌之立駕雲舉上登玉清位爲眞人太玄眞人黍米入妙頌曰靈眄比天上應太玄三日陽合七朝隂全十三坤位十八連乾望朔帶符八乃爲弦二十三夕隂陽宗元夕日常道此會三田一塵有染失於綿聮五神混合品召五神混合符上元太一實居泥丸中元司命安坐絳宫下元桃康坐官把籍无英自元尊神玉符一召五公子神合并急急如律令敕符呪曰千和萬合自然成眞眞中有神長生大君无英公子白元尊神太一司命桃康合延執符把籙保命生根急急如元如无量度人律令服符呪曰太上靈丹光耀三田殺滅尸蟲辟却魔煙五神混合百關通全能令冬熱即使夏寒囘反坎離旋炁綿綿我身蕩蕩由化千端入我五臓百神不干眞炁内降剥坤健乾急急如靈寳混合五神律令五神混合之圖白元尊神泥丸太一中央司命命門桃康无英公子乙庚合成緑丁壬合成蒼戊已合成紫丙辛合淡紅玄師曰五神混合符學士行靈寳七經八緯及諸内行並用朱書黄素上每日早面東吞服一道上清訣五方炁吹符即得五神守護三一常存存思施用无不感格妙行眞人中理五炁頌一炁朝宗入於八冥天門地户啓閉塞通生本太微明梁祖炁天入作陽天門爲隂地泄爲眞納與邪功水火同來百神囘東歸於谷室靈寳元量度人上經大法卷之八
