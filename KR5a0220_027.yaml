front:
  text: 靈寶無量度人上經大法卷之二十七生七
  hash: sha256:4a216167573402b0ceb1b4c5f5fce31a9f896855fb36f8b6e1b34318a26b7a72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_027-001a, image: hfl/0090/0090-046.png}
body:
  text: 首愆謝過品修真之要寡過為先過之不悛去道逺矣雖行持符法未至上道之階使為行不檢亦豈足以折伏鬼神況於進拜表章濟度幽顯哉功過之司毫分無失晉許逺遊遁迹山林勤心味道漸入真品而三官都禁遣周魴等出丹簡罪簿以詰之曰夫欲學道慕仙上𨽻真人玄心棲邈恭誠髙靈者當得世功相及禍惡不構隂德流根仁心上逮乃可步真索仙度名青府耳由此言之未及許逺遊者其可不知寡過自修耶奉法行持求仙學道所當悔懲已往之愆犯積纍方來之功勤故玄綱論曰過惟改而不復為功惟立而不中倦是謂日新其德自天祐之儻口行祈謝之科心乏省愆之念首之前而作之後飾之外而敗之中然復苦已勞形瞻星禮月持齋奉戒焚香誦經亦為徒設矣有大言眩世則云罪之不積惡之不為豈須懴謝斷棄教科此又矯激太過從容中道無過不及所宜悔至於心知咎必省依經奉教按格行科削罪目於三官五帝之司上生名於十極九霄之境立功不怠舉形仙飛國有分焉亦無自阻有志者多成事也謝過每歲除秋分一日外常以三元八莭本命生辰甲子庚申及諸良日入靖室或宫觀山澤靜潔去處焚香專志省咎思愆先於壇側端默而坐深念生世以來所行所作無非愆犯不善云多戰兢自艾恨不剖心𤁋膽誓母復為今兹慚愧措身無地方振衣而起整肅形神登壇啓告無壇虔立香案展壇布行用入戶誦呪上香如法祈謝之儀早以東為始夜以北為始分五方懴念本合置立科儀發爐循格至三上香後方行禮方如自然朝儀但此等事以密為尚兼獨行朝修不宜繁瑣故今止編四方謝罪之文損益隨事之宜爾先祝香道香德香無為香無為清淨自然香妙洞真香靈寶慧香超三界香王境真香滿瓊樓玉京遍周天法界以今焚香供養虛無大道三境天尊昊天上帝紫微北極大帝紫微天皇大帝后土皇地祇三十二天帝君萬天上帝上清十一曜星君中天北斗七元星君天地水三官帝君北極四聖元帥真君靈寶五師真君四方二十八宿星君三界五帝大魔王十方無極飛天神王北隂酆都大帝東霞扶桑大帝五嶽五天聖帝洞天福地名山靖治主録仙真聖衆三洞四輔法籙中靈官將吏三界官屬一切威靈仗此香雲普伸供養玉華散景九氣凝煙香雲密霧徑衝諸天侍香金童傳言玉女上聞帝前令臣關啓咸得如言具法位臣某以今良日齋潔洗心祈真告道先伸上祝皇朝社稷宗廟先靈駕景九霄垂休萬葉今上皇帝基圖永久祚業昌隆聖壽等於乾坤德教均於造化萬方向善百榖咸豐有識有知悉悟至真之道無邊無極共躋榮樂之鄉大教興行正法無斁敢伸凡願上冒宸嚴臣下情無任戰兢惶懼激切屏營之至謹啓以聞唱方臣某志心皈命東南西北四維上下十方靈寶天尊三十二天上帝周天二十八宿星君天真上聖五嶽真君山川河海洞天福地一切神仙諸靈官次向北方三拜長跪晝以東方為始夜以北方為始具位臣姓某志心皈身皈神皈命北方東北方無極太上靈寶天尊北方八天帝君北方髙真上聖斗牛女虛危室壁七宿星君北嶽恆山黑帝真君北方洞天福地山川河海一切真靈北鄉神仙諸靈官臣聞大道垂慈啓悔愆之路髙真設化開謝罪之科若非請命以祈恩豈獲釋愆而逭譴伏念臣愚庸賤品蠢陋凡資幸浹真風叨逢道運久膺法籙冒玷簮裳不能勉強以立功乃復因循而造罪莫知檢束罔謹操修所慮萬祖億曽昔亡往逝暨臣千生纍劫宿世先因爰至今身謀用之問舉室親姻之衆造諸元惡成彼深愆無量無邊難名難述結在天曹地司之內著於日月星辰之宫永劫不原終天無解懼其報至恐及禍萌以令皈命首陳盡祈湔洗伏願天垂恩宥道啓慈憐萬聖流祥衆真錫慶赦臣九玄七祖以及兹身萬劫千生至于今日滔天重罪蓋世深愆消滅惡根削除罪籍庶使臣早成正道獲際真師身世安榮法徒在俗言眷寧泰更祈祖宗神識師友魂靈已逝親姻先亡眷屬長居快樂永遂逍遙六道三塗四生萬類俱蒙拯度悉被陶成臣無任慚悔禱祈激切之至謹言次向東方具位臣某志心皈身皈神皈命東方東南方無極太上靈寶天尊東方八天帝君東方髙真上聖角亢氐房心尾箕七宿星君東嶽泰山青帝真君東方洞天福地山川河海一切真靈東鄉神仙諸靈官臣聞開云同前次向南方具位臣某志心皈身皈神皈命南方西南方無極太上靈寶天尊南方八天帝君髙真上聖井鬼柳星張翼軫七宿星君南嶽衡山赤帝真君南方洞天福地山川河海一切真靈南鄉神仙諸靈官臣聞同前次向西方具位臣某志心皈身皈神皈命西方西北方無極太上靈寶天尊西方八天帝君髙真上聖奎婁胃昴畢觜參七宿星君西嶽華山白帝真君西方洞天福地山川河海一切真靈西鄉神仙諸靈官臣聞同前次向中央具位臣某志心皈身皈神皈命上方下方無極太上靈寶天尊三景九霄大羅無極三十六天帝君五老上帝天曹主宰無鞅髙真羅酆隂境十地真靈三十六土皇君中央嵩山黃帝真君中央洞天福地山川河海一切真靈上鄉下鄉神仙諸靈官臣聞同前次歸位對席志心稽首禮太上無極大道志心稽首禮三十六部尊經志心稽首禮玄中大法師次啓白臣某謹重誠上啓無極大道上帝髙真三界威靈十方衆聖以今懴愆謝過入靖修真獲遂陳請仰祈大宥伏願隂曹削罪仙府書名道遇至人學無魔試臣敢不益堅善念深悟前非願契道真永依沖廕十方共慶九祖蒙休為上因緣念十方靈寶天尊無量不可思議功德次出戶如常式靈寶自然朝先啓聖次禮十方次懴悔三禮次回向念善今五方謝過即靈寶自然朝之餘意止以五方者貴其簡而易行不舉玉音梵唱貴其精默感格奉道修真之士不問法籙髙下悉可按行久久行之內加痛省則罪減福生成真得道三元八節朝真謝過科先搯上帝訣念入戶呪地戶丁立望天門閉氣默念呪朝入戶法師向地戶右叩齒三通密呪老子存思圖曰存見四明功曹一人通真使者一人傳言玉女二人侍靖玉女二人呪曰四明功曹通真使者傳言玉童侍靖素女為臣通達道室正神上元生氣降入臣身呪畢入戶先左足入夜入戶入戶同前老子存思圖曰存見四上功曹一人龍虎使者二人侍靖素女一人開明童子一人上玄少女一人呪曰四上功曹龍虎使者正一生氣侍靖素女夜有啓請願得開明童子上玄少女與臣俱入黃房之裏通達所啓皆使上聞三禮執爐啓聖畢宣科臣伏聞一氣開機握化機於渺邈三天啓範張玄範於洪濛五千四百科文下敷塵世三十二天梵氣上總玄綱思禍福之無門察盈虛之有數流傳法籙開度天人道出鶴鳴正一演修真之化功標龍漢混元垂出世之文大道難名純誠可格以今吉日清堂朝真謝過伏願金童敷席玉女典香上聞妙有之庭徑御虛無之境簫簫鳯吹龍神敷碧落之歌渺渺鸞驂羽騎森丹旗之衛七輿八轡泛灝氣以浮空三界十方燭靈暉而蕩穢伏念某玄關下士赤劵初階受穢生形稟愚賦性背違科教稔積愆非謹按仙科式陳祕範伏願玉京帝主金關師尊普降厖恩遐施霈澤開厥自新之路處其可赦之科曠蕩沉愆廓清紛纍降以太元之氣合成靈寶之軀鍊骨續筋留形住世恩歸祖禰剋獲飛升惠及𡨚親咸蒙和釋千愆萬過一念消除八難七傷四時解散修功有漸進道無魔一氣資扶百靈挾佑願遂登真之契常陪仙侣之遊與道合真形神俱妙謹稽首再拜次長跪懴悔臣志心皈身皈神皈命三清化主十方靈寶天尊無量度人經中聖衆念臣爰從往劫以至今生三業六根五情七欲宿殃往業定録玄科陽過隂愆名書黑簿以今懴悔願悉消除伏願洪靈洞照丹闕垂慈鍚命行尸流恩朽骨胞原解結七祖飛升心境無塵障魔消散皈依大道滌蕩沉愆禍咸滅於無邊功普加於一切得道之後升入無形與道合真次發十大願呪曰三清玉帝三素元君太上髙靈仙都大神今日吉慶所願開陳上願飛霄長生神仙中願天地合景飛雲下願五嶽與身長存四願七祖解罹怨愆五願帝君斬伐胞原六願世世智慧開明七願魈鬼斬馘六天八願開徹通幽達靈九願一會莫不如言十願飛仙上朝三元次回向稽首靈寶洞玄主無量度人真道師道包天地無得名法貫隂陽不思議隨緣應化救群品超越三界及十方巍巍無上功德山歸心念念無休息今日所佩祕法上消於天災劫運下度於兆庶人民回尸起死以完形救病除殃而輔正功圓行滿早吞金液之丹心了神靈進受玉皇之詔為上良因念十方靈寶天尊朝出戶出地戶畢回身面壇叩齒三通存玉女一人呪曰出隂入陽萬神開通關啓事畢請閉黃房侍靖玉女明備神宫呪畢出戶先右足出夜出戶出地戶畢回身面壇叩齒三通存少女一人呪曰玄上太隂八窗開明向有所啓少女通靈事畢復位萬神潛寧每日入靖燒香朝禮儀先兩手玉清訣握固存神叩齒丁立靣天師而誦呪曰天書敷羅下頒太微元化生神靈煙九回八景六周皇運所持左賔青方右啓帝妃南昌丈人灌煉辟非儛軒赤明開發真機今日大慶萬道同皈合并正氣保天無衰普告三界驛龍風馳祝香啓聖切念臣早廁玄關夙依黃老受大道之庥蔭寓真館而止棲慚無十善之因以贊六道之惠自披玄褐幾易歲華未能感激於神明動則輕違於戒律初勤後怠有始無終奉法或邪行仁不正燒香失節存叩違科慮三彭暗奏於愆辜六府明書於罪目特傾丹欵仰扣虛無祈罪惡以原除冀愆辜而釋散名全上善命合長生玄功積纍於三千丹藥早逢於九轉黃籙白簡消死魂而上生名金關玉京有升進而元退降仙曹紀善鬼録除殃八景金書得鍊氣修真之術五文玉篆獲長生久視之功法屬安寧館舍光顯金木水火之厄永不驚傷青黃白黑之災俱希蕩散更冀是非兩遣衣食自然魔障不生憂患不至上報君師父母之恩下濟幽塗沉滯之苦驅邪輔正興教立功百靈皈依萬神振伏形神俱妙與道合真靈寶無量度人上經大法卷之二十七
