front:
  text: 靈寶無量度人上經大法卷之四霜三
  hash: sha256:7f399815383f151003a9e400cf21d72ecdad57939460e6c3c812971f3e66864a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_004-001a, image: hfl/0085/0085-086.png}
body:
  text: 訓釋經義品元始祖劫化生諸天祖劫者龍漢延康赤明開皇上皇也大羅天者虛皇居之包含天地不可窮極經云上無復祖唯道為身於五劫之間化生天地大羅一氣生三天三清之境是三天降氣而生九重一曰鬱單無量天二曰上上禪善無量壽天三曰洞虛極上須延天四曰無極上靈玉虛元洞寂然天五曰洞極無崖不驕樂天六曰上極元景洞微化應聲天七曰無名至極梵寶天八曰太極無崖洞幽摩夷天九曰元洞波梨答惒天一重各又生三天九重總為二十六天本經所謂上清之天是也髙上虛無皆謂之上清非特稱一境而巳次乃分種民三界三十二天統治四方在九天之下三光之上宫室分度各有等序降連星宿元氣相接化生萬物陶成品彚又有八極八天外梵一天在三十二天之下三光之外八極之表自清微天至外梵天總數八十自然之氣結成宫闕於是虛皇各命之以帝君輔之以天相置之以寮佐分之以民物與大羅一氣共為八十一天道氣下降乃生九地一曰潤色地名元德其氣上青中黃元土卿之所治二曰剛色地名皇德其氣通黑元庭土丞之所治三曰石脂色澤地名帝德其氣通蒼虎口土龍之所治四曰潤澤地名王德其氣通黃元心土大將軍之所治五曰金粟澤地名人德其氣通赤元福上令之所治六曰金剛鐵澤地各水德其氣通白元骨土長之所治七曰水制澤地名里德其氣通紫甲土父母之所治八曰大風澤地名復德其氣通青始賢土宗正之所治九曰洞淵無色綱維地名昌德其氣通緑軒始土下二千石之所治謂之九壘每壘土水火風各一重上下相次一地則虛皇主之又四土皇君同主宫室輔佐並等降以法上天凡三十六土皇上應九重三十六天之帝也九壘之下浩蕩頑宫裹以風澤風澤者元始梵風之氣也剛於真金亦名罡風擎持九壘乃載諸天髙而洞浮垂而不落上接大羅蓋道之氣故經云風澤洞虛金剛乘天也夫三洞通化九氣混生浮於太元沖乎四虛法象之大唯道能包之五劫名元始祖劫化生諸天龍漢延康赤明開皇上皇渺渺億劫混沌之中大羅三境名大梵之氣俯建九壘玉清清微天上清禹餘天太清大赤天三界之上渺渺大羅九重三十六天玉清境十二天上清境十二天太清境十二天無上鬱單無量天無形天無精天入色天無極禪善無量壽天梵行天玄微天玄清天無窮洞虛極上須延天玄梵天氣玄天玄無天無極玉虛玄洞寂然天上真天飛梵天流精天玄上洞極不驕樂天玄清天紫虛天化靈天上極無景化應聲天九玄天元清天極梵天無名至極洞微梵寶天微梵天虛梵天空梵天太極無崖梵迦摩夷天自然天玄梵天天雲天無色洞微波梨答惒天洞微天玄上天極色天超凌三界逍遙上清種民世界三十二天三光開明三景日是為天根月星辰八景冥合氣入玄玄八極外梵天名青元天始青天始分天太玄天太丹天始玄天始素天太素天域中仙境名嶽者鎮也坤厚載物而不移五嶽三島十洲仙聖之所居神洲者中國也王者居之為域中之大其中人民修行正道升而為仙真上有十大洞天三十六小洞天七十二福地並仙官治之洞天之中有五山亦謂之五嶽作中國之鎮其餘小國更不列之神洲三島五嶽十洲皆在三光之下大地之上巨海之中也洞淵九壘名三官九司三官九司謂三元九宫也上元宫闕在九天之上中元宫闕在九地之間下元宫闕在澤洞淵之中三元總九宫二十七府百二十曹靈仙真聖無量無極天地神靈莫不屬之職之大者唯三元三官也右以李少微注合三元品戒經普天聖位圖定此章目三官九署十二河源元黃左府明梵曹威靈曹太常曹太清曹元黃太極左宮元黃中府宣威曹明都曹都靈曹太儀曹元黃右府明法曹考正曹明威曹元都曹青靈左府明真曹監正曹梵行曹開靈曹上元元陽七寶紫微上宮青靈中府禁神曹通明曹正神曹開明曹青靈右府三都曹南上曹元功曹三靈曹洞白左府司正曹四明曹監天曹太明曹洞白太極右宮洞白中府明天曹幽都曹威儀曹太陰曹洞白右府下元曹監司曹監靈曹司煞曹上元三宫者上帝之所居一品天宫治其中有九府三十六曹上主諸天上聖下主化生品物結玄元始青黃白三色之氣而成宫也諒事左府南昌曹考算曹太陽曹都律曹明都曹南極洞陽左宮靈神中府九令曹招靈曹監天曹宣野曹監令曹宗神右府丘承曹九氣曹中神曹五氣曹耐犯明晨左府元靈曹維正曹靈威曹黃神曹靈紐曹中元洞靈清虛中宮七非恬照中府明元曹威仰曹嶽正曹洞天曹九都曹紂絶陰天右府五集曹通明曹儀範曹九考曹連宛泉曲左府開度曹司非曹韓司曹執正曹酆都陰天右宮罪元咸池中府督煞曹役考曹攝氣曹司煞曹斗加曹玄繫曹泰煞九幽右府司微曹九煞曹九幽曹寒夜曹中元三宫者上帝之離宫二品地官治於其中有九府四十二曹總諸地仙官靈祇及生化品物結元洞混靈之氣凝極黃之精而成宫也靈紐左府明劫曹機令曹水梵曹罪福曹南水左宮靈寶劫刃中府簡會曹促氣曹攝靈曹召龍曹九河曹烈女曹長夜右府開明曹度魂曹檢精曹清正曹青元靈淵左府火明曹清水曹烈火曹三明曹下元青華方諸中宮朔單中府簡封曹水令曹明範曹洞源曹檢會曹劫諒曹九府寒夜右府促水曹洞陽曹龍廄曹機會曹開度劫諒左府北斗曹正考曹九科曹四極曹羅酆右宮通靈大劫中府幽夜曹長劫曹苦神曹三難曹五法曹萬掠曹泉曲鬼神右府劫刃曹長苦曹溟波曹無極曹下元三宫者亦上帝之離宫三品水官治於其中有九府四十二曹總主八海四瀆水帝龍王水仙及隂陽生化結風澤之氣凝神浩之精而成宫闕也三十二天總括隱祕太黃皇曽至上明七曜摩夷六天為欲界虛無越衡至無極曇誓一十八天為色界皓庭霄度至太素秀樂禁上四天為無色界是謂三界也太虛無上常融至太極平育賈奕四天為種民今考本經分為十事一曰天名劫初分定之名二曰帝號元始所命之號三曰帝諱天帝之名也四曰天帝所主掌道之職也五曰係宿氣降運二十八宿氣也六曰氣名元氣稟受之名七曰氣色九氣分力之色八曰大梵隱語內音也道君綴成事具明內音所因章中九曰分界上下升降也十曰天民壽數長短之數此圖量為寶經之要誦持者宜詳而行焉謹以陳景元義合成玄英疏李少微薛幽棲嚴東注混元圖翼空洞靈章經內音玊字經定此章天名帝號帝諱天帝所生係宿氣氣名氣色大梵隱語分界天民夀數太黃皇曽欎緼玊明觀覺長生之籙奎壁梵元陽黃亶婁阿薈無惒觀音欲九百萬嵗太明玉完須阿那曰攬覺度魂更生壁上陽緑須延明首法攬箁曇欲一千八百萬歲清明何童元育齊京大覺敷布正教室太陽青稼那阿奕忽訶流吟欲三千六百萬歲玄胎工育劉度內鮮育王召魔舉仙危清陽赤華都曲麗鮮菩育臻欲七千二百萬嵗元明文舉醜法輪梵雲通行元氣虛洞陽蒼答落火梵散煙慶雲欲一億四千四百萬歲上明七曜摩夷恬懀延玊真開度幽難女通陽黑飛煙玊都明魔上門欲二億八千八百萬嵗虛無越衡正定光無上明無上道牛建陽碧無行上首回跖流玄色五億七千六百萬歲太極濛翳曲育九昌吁員煉度苦朽斗極陽紫阿陀龍纏四象吁貟色十一億五千二百萬嵗赤明和陽理禁上真煥明煉仙斗成真箕梵始陽白南閻洞浮玉眸詵詵色二十二億四百萬歲玄明恭華空謡醜音世無應化一切箕陽輝黃梵形落空九靈推前色四十六億八百萬歲曜明宗飄聖光明洛覺劫終納學仙人尾陽洞緑澤洛箁臺緑羅大千色九十二億一千六百萬歲竺落皇笳摩熒妙辨韶試學仙人心陽明青眇莽九醜韶遙緣邅色一百八十億三千二百萬歲虛明堂曜阿𨚧婁生雲上開度天地房陽演赤雲上九都飛生自騫色三百六十八億六千四百萬歲觀明端靖欎密羅千淨度學者之身氐陽玄蒼那育郁馥摩羅法輪色七百三十七億二千八百萬嵗玄明恭慶龍羅菩提鏡度得道之身亢陽浩黑霐持無鏡攬姿運容色一千七百七十四億五千六百萬歲太煥極瑶宛黎無延廓奕試學仙之人角陽極碧馥朗廓奕神纓自宫色二千九百四十九億一千二百萬嵗元載孔升開真定光猷煉度死角魂更生軫梵少陽紫刀利撣猷婆泥咎通色五十八百九十八億二千四百萬歲太安皇崖婆婁阿貪宛開度善人軫太陽白宛首滌色太眇之堂色一萬一千七百九十六億四千八百萬歲顯定極風招莫童流度有善功之人翼浩陽黃流羅梵萌景蔚蕭嵎色二萬三千五百九十二億九千六百萬歲始皇孝芒薩羅婁王易邈拔夜開幽張洞隂緑易邈無寂宛首少都色四萬七千一百八十五億九千二百萬嵗蓊重浮容閔巴狂阿繿召塊集真星開隂青阿繿郁竺華莫延由色九萬四千三百七十一億八千四百萬歲旡思江由明梵光阿丘開度善魂柳玄隂赤九開自辨阿那品首色十八萬八千七百四十三億六千八百萬嵗上楪阮樂勃勃監無量品類天人等級鬼昊隂蒼無量扶蓋浮羅合神色三十七萬七千四百八十七億三十六百萬嵗無極雲誓飄弩穹隆隗度一切仙人井極隂黑玉誕長桑柏空度仙色七十五萬四千九百七十四億七千二百萬歲皓庭霄度惠覺昏極拔度學人井參梵隂生碧玃無自育九日導乾無色一百五十萬九千九百四十九億四千四百萬歲朔通元洞梵行觀生浮黎度學仙之人參隂化紫坤毋東覆形攝上玄無色三百二十萬九千八百九十八億千八百萬嵗翰寵妙成那育醜英陀統治之王觜隂明白陀羅育邈眇氣合雲無色六百二萬九千七百九十七億七千六百萬嵗太素秀樂羅覺長隗領録魔王畢隂洞黃飛天大醜總監上天無色一千二百七萬九千五百九十五億五千二百萬嵗太虛無上總監鬼神極拔學者之身昴隂靈緑沙陀瑛劫鮮量龍漢種民無極太釋玉隆眇眇行元浮黎召集仙真胃隂魂青碧落浮黎空歌保珍種民無極龍變梵度運上玄玄惡奕進仙成真婁隂結赤惡奕無品洞妙自真種民無極太極平育大擇法門精上度學者身奎隂極蒼元梵恢漠幽寂度人種民無極五方五帝所主經義所在五天五天者稟五神之氣居太空之中上列五斗立五嶽五帝治之蓋方色之天非成象之天也五老五帝五斗五大魔王名諱及所主掌誦經者固當知之以陳景元義合成玄英疏李少微注尚書治要圖五篇真文經定此章五方五帝五帝姓諱五斗五天魔王姓諱五大魔王姓諱五帝所主五斗所主五大魔王所主東方青靈姓閻諱威明角亢氐房姓斌諱姓迫落青天始老號靈威仰心尾箕齒成已諱萬刑護魂主算巴元醜伯南方丹靈姓洞浮諱栁井鬼栁星姓弗諱姓赭赤天真老炎號赤熛弩張翼軫由爾上指養氣上生負天擔石西方皓靈姓上金諱昌奎婁胃昴姓赤諱姓鄧諱白天皇老開號白招拒畢觜參張市呼倪侍魄記名反山六目北方五靈姓黑節諱靈斗牛女虛姓徐諱姓島諱黑天玄老會號叶光紀危室壁直事公孫通血落死監醜朗馥中央黃靈姓通班諱無貪巨祿文姓天門姓宛躬主領總監橫天黃天元老成號含樞紐廉武破諱陂狂諱産生萬神衆靈擔力係宿氣四方二十八天一天係一宿之氣四維四天各係二宿之間梵氣又等降相交東北之天復係西北之宿蓋生氣上轉如羊角而升者瞆理之流雖同義趣而慮惑於方維因作此圖以明之三十五分總氣上元北斗七元星君與四方二十八宿為三十五分總元氣於上天以司造化北斗者中斗也史記天官書曰斗為帝車運于中央臨制四鄉分隂陽建四時均五行移莭度定諸記皆繫於斗謹以列宿圖定此章八數八數者應八之數備之此也以嚴東注合法輪經定此章八威八景八冥八門龍日東極東天法輪之門麟月東南極東南天法輪之門虎木德嵗星南極南天法輪之門豹火德熒惑西南極西南天法輪之門獅子金德太白西極西天法輪之門丹蛇水德辰星西北極西北天法輪之門天馬土德鎮星北極北天法輪之門猛獸五斗諸星東北極東北天法輪之門八首尾天尊説經二章前後有序大梵隱語前後亦有序皆道君所作也事具明寶經緘藏降世章中及明內音所因章中也今則離其首尾分其篇目依藏本以定字數并題目計四千五百七十六字篇目太上道君二章前序自道言昔於始青天中至東向誦經一千五百九十五字元始天尊寶經前章自元始洞玄靈寶本章至三界五帝列言上清一千二百七十八字元始天尊寶經後章自元洞玊曆至泄慢墮地獄禍及七祖翁七百八十六字太上道君二章後序自道言此二章至乃當洞明至言也四百四十字大梵隱語前序自諸天中至靈書中篇一十九字大梵隱語自亶婁阿薈至幽寂度人二百五十六字大梵隱語後序自道言此諸天中大梵隱語無量之音至大量玄玄也裂字為符品元始章皇人曰元始者天尊之尊號也有十二號何謂也蓋老君應化十通道君應化十一通元始應化十二通故中央十二氣以應玄元始之度人者也可以隨經句行用濟死度生訣在中指中一元始度人無量上品二元始天尊當説是經三元始天尊説經一遍四元始天尊懸坐空浮五色獅子之上五元始懸一寶珠六元始即於寶珠之內七元始天尊説經中所言八元始上帝至尊几前九元始洞玄靈寶本章十元始祖劫化生諸天十一元始符命十二元始靈書中篇元始二字散形太極太初太始祖氣二氣分形三才定位四始成儀少女定坤妙極玄玄女胎成質靈寶中存一轉天廣清淸二轉地廣靈靈三轉人合玄真道言章皇人曰道言者元始天尊玊勑也其言十二按一年之數可以治萬病集千神召和氣於身田以七氣成符一道言昔於始青天中碧落空歌大浮黎土中指中仰視中宫而吸中黃之氣入兆口中接三田之氣灌注身田吹篆成之二道言是時元始天尊説經一遍東方無極無量品至真大神無鞅之衆浮空而至可制伏強邪魔橫逐方訣召三道言元始天尊説經中所言並是諸天上帝內名隱韻之音亦是魔王內諱百靈之隱名也子文書篆諸天名諱密呪用之四道言凡誦是經十過諸天齊到中指甲召十方上聖髙真飛天神王受度等用五道言正月長齋誦詠是經中指中凡誦經隨節氣先服之六道言行道之日中指中登壇朝謁治病伏魔先服之或佩七道言此二章並是諸天上帝及至靈魔王隱祕之音四指上凡書玊字先服之八道言夫天地運度至普度無窮大指中凡用隨經句所用九道言夫末學道淺至便得神仙五指甲書凡謝過上章先服之十道言夫天地運終至無量度人中指下節書隨經句所用十一道言凡有是經中指中可以召三界大魔保舉上仙十二道言此諸天大梵隱語無量之音寅申巳亥可以通奏章表佩之可度罡浩直通天關森羅淨霐章皇人曰森羅萬象之光朝拱帝宸淨霐者丹池東井黃華諸天真仙鍊形之所故下世罪魂若以淨霐黃華之泉鍊其隂翳即得升陽境行持之士自能鍊形則得尸解之道不經地獄遊行太空書時左手搯中指中右手執筆向天門吸氣一十二過吹筆誦呪成符金醴玊漿洞景丹陽靈寶正氣森象光芒曲映玄都鍊育鬼鄉得遇變易魄壯魂強東井呪曰天河灌東井石景水母精圎光拂靈曜玄暉瑩髙明元始破重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香花玊女流五星冠帶濯玉津煉度五仙形體香萬神降乘景登髙清經句為符章道言酉文治百病始當詣座子午斗催子下胎妙行真人上清文辟邪流精玊光亥文治夢交腎病五色鬱勃酉文治之少氣神風靜默山嶽藏雲子文治氣病天無浮翳四氣朗清中指中文治目病懸坐空浮五色獅子中指中文鎮宅及口氣不足五色玄龍辰文治腳病嘯歌雍雍酉文治肺病五老啓途中指中文治脾病群仙翼轅寅文催生護身治嗽諸天丞相治草木不榮卯文書地根監生大神監真度生卯文催生救産難東斗主算卯文益算西斗記名酉文殺邪北斗落死子文度厄南斗上生離文消災中斗大魁總監衆靈子午斗辟惡巴元醜伯玉清訣治瘡病負天擔石玉清訣少氣吞反山六目玊清訣治病目監醜朗馥中指下文生氣橫天擔力上清文治少氣自號赫奕諸天齊功上清訣遣邪神功受命普掃不祥玊清訣治鬼八威吐毒治二切毒吞酉文猛馬四張治馬疾午上天丁前驅中指中莭護身大帥仗幡辰文保命擲火萬里燒怪流鈴八衝却魔孟上清文敢有干試巨遏上真玉清訣開路屠割鬼爽治鬼千千截首斬妖萬萬剪形斬邪並玉清訣千和萬合自然成真上清文和合元始安鎮敷落五篇玉清文鎮宅右以墨書重疊成符或於經中二字四字八字以意取之成符面東南方想通光符吸氣吹筆書成念大梵隱語一遍再取氣吹之即依直日遣飛天神王下使者為直符隨符前去無不應驗如意通光符書符合形呪曰鬱繿阿那育京內鮮醜輪懀延定光育昌理禁謡醜光明摩夷伽婁密羅菩提宛黎真定阿貪招童薩羅巴狂明梵勃監穹窿慧覺行觀那育覺長總監行元上玄法門靈寶無量度人上經大法卷之四
