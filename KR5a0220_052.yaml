front:
  text: 靈寶無量度人上經大法卷之五十二
  hash: sha256:80c09211ea929e84b4d7ca0046635728c816f84a36a6571a66379756897aa8be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_052-001a, image: hfl/0094/0094-206.png}
body:
  text: 超度靈幡品皇人曰夫超度之格皆賴真師三田之氣以合天地三元之光呪訣符圖龍章鳳篆應魔王保舉升度南天如若行持一念參差則再滯亡人於重暗之域不能覺悟得覩光明深可憫之故立超度之章令學仙之士遵而行之則濟死度生之事畢矣立遷神回黃二幡此幡須按亡人年幾長短尺寸造之一黃一紅以按日月光明之象上書三天隱諱中書九天生神天篆呪章標於壇外以開長夜之光遷神幡首幡身書慈悲化主九幽拔罪天尊幡手書符命通溟漠靈幡揚曉風遷神超北府飛舄上南宫回黃幡首幡身書慈悲化主寶憧接引天尊幡手書太微回黃旗無英命靈幡攝召長夜府開度受生魂開道幡首書上帝諱幡身書六甲使者持幡開道幡手書空洞通幽呪靈音振空洞九玄離幽裔感賞無凝滯去留如解帶斛前救苦幡用黃縜幡四首各長三尺上書金書度魂呪妙哉怡五靈金書警萬神察命定録籍靈符度苦魂度橋陽暉幡用黃絹作幡一首長二丈四尺幡首書北斗七星幡身書太一天尊睿號左手畫日右手畫月書陽暉度魂呪兩腳書九天返根呪北斗日月像如常式陽暉呪明哉太陽輝神光洞三清氣散玄漢內水十一十九靈煙生紫庭飄飄淩無形返根呪明梵飛玄景開度長夜魂遊爽赴期歸氣氣返故根幡身書金闕梵行真人玉字東極宫中大慈仁者尋聲赴感太一救苦天尊道場內諸幡聖號引魂明光之幡接𩲸洞照之幡霞光朗耀之幡威靈拔度之幡垂光慈蔭之幡玉皇赦罪之幡梵氣彌綸之幡明霞通智之幡法燈朗照之幡慧光流光之幡玄明真定之幡靈耀八景之幡金英護魂之幡洞鑒幽明之幡流鑒照幽之幡五劫開化之幡通光普照之幡混化變生之幡靈光皓映之幡垂光流照之幡神光廣被之幡度明玉簡之幡滅光速感之幡龍威梵度之幡巳上二十四幡乃元始天尊在始青會演説度人上品十方至真各執寶幡旋繞寶壇以讃天尊度上世之魂凡遇立大齋不可缺也三光煉度天尊大光廣照天尊重光返照天尊寶光虛靖天尊流光梵現天尊三光耀明天尊光道致人天尊金光玉華天尊慈光普施天尊靈寶懸幡科啓聖伏以玉藏真文立種拔亡之式瓊科妙旨乃文濟度之因爰建神幡是為冥寶標太微回黃之字有無英命靈之功高懸碧落之中影落虛無之內危竿一竪超長夜之幽魂妙範繼宣救無鞅之苦爽諸天齊到萬聖臨軒光映十方功皈三寶次念靈幡赦罪天尊祥雲結就命靈幡影落浮空散世間縹眇凌風才一舉舍靈俱得脫幽關今則謹遵大法特建寶齋幡開昏迷接群生之徑路符通溟漠按太極之真儀降三景之輝敷至真之道既立一竿之上巳經萬目之觀瑞氣遊揚六道四生皆離苦靈風鼓舞十方三界以聞音普及存亡咸乘道廕次念寶幢接引天尊仙真慈惠極含靈髙舉華幡振杳冥咸使遷神歸碧落福資寰海保升平向來稱揚法事建立寶幡按明真玉匱之文乃度死濟生之式憑兹上善廣利無邊資助神魂超升仙界伏願群仙接引速超清淨之鄉衆善矜憐徑上南官之府福霑幽顯惠及含生一切有情俱登道岸保安遷神幡保安回黃幡靈寶無量度人上經大法卷之五十二
