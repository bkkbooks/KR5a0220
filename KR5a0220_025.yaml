front:
  text: 靈寳无量度人上經大法卷之二十五生五
  hash: sha256:f5dc393b62e9b1e8db008f9875ec1597e270bd2590da096f3eaeb42aba98b728
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_025-001a, image: hfl/0090/0090-004.png}
body:
  text: 内朝三景品玄師曰修行大法未能洞達天眞威化下被魔試交攻神祇不欽所召不感當内朝三景飛仙分形之道於辰戍丑未時朝存心中中元司命神字玄堅中極大君也下在脾中脾爲玉堂宮一曰玉房是太一君偃息之所也主養兆一身之形質於此四時叩齒五通存脾中有黄炁滿脾脾上有一眞人如初生小兒黄衣冠呼之曰中極玄堅太一眞君某欲得眞人神仙黄庭之道五呼之因眠瞑目五十息念之此中央司命神丈人下化太一帝君乃九天生神之父也治太極宫知者形不入地獄玉童玉女侍之役使萬神常以寅卯午申時朝上元太一神君號南極老人下在大一官中主兆魂魄胞神命炁胎府之父也於此四時叩齒九通存頭上直入一寸名太極宫一號太一宫有赤黄炁满宫炁中有眞人如童子之狀衣絳衣呼之曰南極元老太一眞君某欲得神丹長生不死之道九呼之因眠瞑目念之九十息止修之者延年不死可變化神仙滅魔試致眞仙常以子酉巳亥時朝下元玄道母下在雙合官中腎爲雙合宮對上南極故號北極主兆精炁生死符籍之母也於此四時叩齒四通存賢間有白炁炁中有神龜龜上有玄女青白衣如初生小女子左有司録君白衣天官右有司命君青衣天官呼之曰下元元神北極玄道母字玄妙某欲得金醴玉漿可飲食者乞敕司録司命削某死籍更注長生役六丁玉女坐致行厨四呼之因眠瞑目念之四十息止以時不廢曰月乆行應感无窮九年𥙷太極仙卿一年便有髣髴役靈使神所欲无不應心常行勿妄獨愼其口克日成仙乃洞玄三皇帝君所行實靈寶之密機亦盟天告師而行之靈寳黙朝煉頂章每日寅午戍三時入靖兩手玉清訣存身爲白鶴仙人法存天門開有一白鶴而至次存身乘白鶴飄飄直至三天之上見元始頂放九色金光灌注入我頂中想己身萬竅流光遍照十方世界畢然後再乘白鶴復𢌞本治乃受元始之靈寳祕玄至訣如有啓告即俯伏玉墀而奏拜章亦如上法未想之前先以訣煉其頂通其天門然後變神訣曰金吒金吒大力敕煉頂訣左手此乃元始親授妙行眞人天眞皇人昇舉之口訣不可輕露皇人曰夫靈寳之道甚明而易暁甚要而至當得其人而受持何慮无萬神欽奉昇舉可期者哉受持策杖品皇人曰靈寳之道有神通策杖以威六天鬼神以策使三界萬靈就名山洞天福地靖廬玄壇之所以𠮷日採甘竹一根長六尺可十二節自上第三節左右各一曲於曲凹中上刋日月下作斗形於頂中開一穴納中央守吏符第二節下開四穴納四方守吏符以蠟封灌記其四方第三節下刋十方靈寳億劫應化天尊自初一日爲始依十直日持呪取五方炁靣五方誦訖以炁吹每夜存思一年炁足方可施用用之之法當叩齒三十六通思五帝直符吏各一人隨方色各有五色之光流煥杖上五帝玉女各一人合侍衛杖左右呪曰太陽之山元始上精開天張地甘竹通靈直符守吏部衛神兵五色流煥朱衣金纓輔翼上眞岀幽入冥招天天恭攝地地迎指鬼鬼滅妖魔束形靈符神杖威制百方與我俱成與我俱生萬劫之後以代我形制爲五解神昇上清承符告命靡不敬聽呪畢引五方炁三十六嚥止以杖指天天神設禮指地地神司迎指東北方萬鬼束形指破地獄亡魂返生以指災厄應指崩傾五解之道乃五行眞炁奪北斗之權衡脱離死厄尸解得道神昇上清東方守吏符東方九人青書黒上南方守吏符南方三人丹書音上西方守吏符西方七人白書黄上北方守吏符北方五人黒書白上中央守吏符中央十二人黄書赤上隠跡五解品玄師曰青城山月波谿龍門遇丈人同謁眞候先生密傳授五脱之法不得輕泄亂傳非禮不道之人如神藏滅脱凡超俗彼莫見其形是謂隠身之法五脱者金木水火土也是謂受天地隂陽之炁達天地造化之機盜隂陽運炁之莭日用頻行凡求大道未逃生死謂值元辰之厄難災曜來臨魔難奉於眞昧脱死生日限之時當妙用此法神聖難言金解遇庚子日取多年古鋌鐵一十二兩打作尺一條於淨室内嚴淨身體自於初更向牀前去一丈二尺地放下尺在地上候至子時初先潔淨喫乳香腦子水一盞叩齒二十四通想尺如自巳形貎不令自耳聞黙誦靈呪七遍念了拈尺於氊席下勿令人見如此想四十九日滿後用時白絲牽子一條繫在尺上急投下便走不得廻顧返視念呪時更用腦子乳香水噀之尺上念呪取旺方炁七口在尺上後四法倣此呪曰三台生我傳法三台護我升仙通風去尺斷應當我復形本元急急如魁𩲃𩵄䰢魓𩳐魒律令木解遇甲子日取紅落梨枝一條如自巳長臨用日潔淨身體並如上法四十九日足臨時放在地上不得回顧仰觀天日而去不得顧形呪曰枝波畫烏魚波畫咖㖿波畫三台生身畫此日生身度道七七功德上升千變萬化濳身上清杖化我身急急如魁𩲃𩵄䰢魓𩳐魒律令水解壬子日取大龜殼一箇重一觔法度行四十九日足臨用日如逢大水或橋上船上便將龜放去水中不得返顧呪曰靈穀散炁入杖中吾有大道與俗不同出日入月驅虎逐龍去代我化泉脉相通急急如魁𩲃𩵄䰢魓𩳐魒律令火解丙子日夜取雀一隻雄者用小籠子盛法度同前但餵飼在頭邊安頓用水噀之取炁吹炁如前法四十九日足度雀在手中臨用時緋線一條繫雀頭上雀死收之懷中見大火處擲雀入火中便去不得返顧呪曰朱雀居吾前吾握造化權三台護我命五帝注生全支波鳥神火化仙令吾性神兩全急急如魁𩲃𩵄䰢魓𩳐魒律令土解戊子日取自巳鞋一隻用法如前四十九日足臨用時取黄線一條繫在鞋子上擲在地上不得返顧呪曰元始黄龍旺在四時中宮正位權首施機主判土司吾奉帝勑汝今代吾以假吾權數執十八戊己之期急急如魁𩲃𩵄䰢魓𩳐魒律令神眄諾天品玄師曰兆欲觀三十二天先當俻修諸行然後發大願用諸心次存思靜定乃可獲見兆先從散心入次即發願我今觀諸天帝普願三界十方舍靈滯爽四生六道名上諸天同我魂神上朝帝宅酆都苦趣歷劫沉魂及我億曽萬祖俱超冥昧廻出苦輪同我魂神超登聖果逺諸五濁逍遥道境普天萬國一切生靈消諸惡業拔諸衆罪離諸苦惱得爲法身十相具足常遊諸天說法教化開悟群迷紹續聖種通十聖道我今内身有形之跡神升三天得侍祖師元始上帝授靈寳大法遊翫諸天萬劫長存今生來世常居福境七寳具足園林屋宅妻奴子女一切朋犮與我觀心布施十方三界象馬珍寳車與衣服飲食卧具常當布施並无恡惜水斷造橋路邊立井度諸行人救諸飢渴𦵏埋六畜飛禽屍骸皆得安穩无令暴露三光發誓願修善行巳入於存思不怠即當靜定然後燒諸名香先觀青霄雲路扶揺羊角而上壘壘沖髙壘壘上至天界次觀天帝所在兆當存其天界廣博嚴好香炁常氛无有雜穢其天帝君乘八景玉轝三素飛雲瓊輪羽盖五色華光龍麟虎豹獅子白鶴嘯歌邕邕其地皆薦以黄金四邊階道並用白玉七寳珠珍光明煥燿天帝披離羅之帔冠百寳天冠左右侍從悉皆飛天眞人身有光明耀翳日月其諸鼓樂絃歌洞簫並發人氏熾盛无夭年之子无叫號之聲彼諸天宫亦有劒𣗳其條不揺見諸天衆无鞅无數有自然飲食種𩔖豊盈味流下土其諸天有寳𣗳金池五色光耀紫林微風枝葉相觸自成妙音彼諸天宮並以衆寳合成其天帝端然居之彼諸天光朗徹九幽天帝以善妙法普度天人其諸天人聞法讃善帝君玉案之上有赤書玉字招集群仙有黄籙簡文普度幽𡨋兆每日存思巳形法服羽衣乘九色之雲詣一天之中隨其天中仙官列班朝禮而退遇三元八莭日随班上朝諸天預諸法會坐於劫刃寳臺其臺如圓壇層層不計其數仰觀上說法乆乆純熟定中目成夢寐忘形之時神飛道境目觀見天帝說法耳聞天帝聖語及仙樂簫韶笙篁之音當此之時陽神巳結能朝諸天然後可觀三天兆行神觀諸天先當齋戒沐浴當詠天中空洞自然靈章先滿三百遍次及七百遍豆一千遍然後方可行之擧念則神飛萬里意動則玄應十方一年之後陽神不遊於塵世常居諸天小則七年大則九年必得超出塵世上生諸天欲界之天猶有炁化生元色界於九品蓮花而成形芳夢寐之間見青碧白递有成道之漸也進道則蓮花開苞道廢則含蓮不開罪愆則蓮花凋謝靈寳无量度人上經六法卷之二十五
