front:
  text: 靈寶無量度人上經大法卷之十一金一
  hash: sha256:dd5f94f41c9b15370f1cfef91cefe84d949a8062c43a9217b78ca03cd999292d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_011-001a, image: hfl/0087/0087-004.png}
body:
  text: 混元玉劄品上皇人曰上清三洞九品之文分四輔萬篇惟靈寶玉階有緒餘神章則救死度生為上下元學真之士往往始勤終怠止緣塵根暗識六慧不通被六天魔惑四邪妄興作諸變化不能洞了故三洞之文上曰洞真以凡修真洞合形神目覩真人與道合契逮乎中下洞玄洞神乃萬法之祖六通之本是以天尊證道眼慧眼真人定法眼慈眼故觀三界如居掌中天真役法已明內觀外作洞觀以效道慧之眼洞視徹視遙觀以體法慈之目是謂三洞凡學洞真洞見真人然後成真既曰洞神目擊神真然後通神而作神仙凡三洞萬法無不先要三洞自明然後可通神神靈降身至於洞神洞淵洞靈大洞八史六丁靈飛六甲炎光洞觀並設通目之道男士之淫女士之邪六根不淨耗失真元豈能洞真洞神純陽則神仙不隱純隂則鬼神現形是乃祖真祕受玉劄一卷三洞之祖修之百日通神通靈千日真仙現迹見之可以役使可致天真功備德合白日飛升三洞召真視神無此玉禮徒勞施用終不洞明惜自不傳下世因靈寶教行鬼邪出隂以此洞之不能隱形免惑道士玉札皆上真內諱隱名依法用之克日成真授受之者擇三元八莭十直之日齎玉簡二枚上金九兩命素千尺信財百二十貫以盟三官師授若不盟信妄泄天寶師代以風刀之考弟子修之終無所成折算十紀明詳寒栖之士勿失其人不可圖財泄之非道罰亦如之靈寶洞視五戒夫三洞四輔百萬千篇道德神經億千萬字唯以三洞洞視為本上有洞真真降然後成真中有洞玄玄降然後成仙下有洞神神降然後成道凡修洞視之道先明五戒第一齊戒精專靈神降身若不齊戒精專必遭神譴第二清淨身心清淨身心則神光徹視若不清淨身心穢氣凌犯神光昏翳第三終始如一終始如一則神功早見若不終始如一則妙應難成第四神靜氣和神靜氣和則招真會靈若不神靜氣和怒則神逺第五祕密修持切勿泄漏隂機泄漏隂機則神明責人右法謹依五戒更要擇冬至前後戊辰戊戌甲子甲午日為首洞視若不依式洞視亦必難成須是精誠端確潔白身心勿食葷穢醉酒淫色方可行持次吞服符札真氣入身滌去凡穢煉隂成陽則真仙見形故不自藏天氣符防中之真合氣玉京太華表德輪轉不停丘紅妙樂圓羅育靈音曜呪曰軋元亨利貞日月與吾并吾受天氣治身去毒內外俱成內除百病外收攝百精安家救人去毒藏形急急如律令右法每月一日五更二點雙手握固向東行丁罡三𡵯閈氣握手呪之了望東方仰天取氣九口又念呪一遍南三西七北五中央十二五日之後任便使之地氣符清都元始嶽麓所制鬱成坤道化形煥壘造化無窮黃中理氣衆妙之宗音疊呪曰天降氣地生成服吾符得長成急急如律令右法遇辰戌丑未日面地戶方存地氣出萬萬丈以口吸入脾中再呪具法位臣某謹稽首奏啓承天效法厚德光大后土皇聖母九壘皇君真皇洞神天尊金剛力士神王靈官主生主成真宰願降真氣入臣身中信行信願皆如所言洞徹地中萬物地上鬼神咸皆現形臣謹啓祝畢口引十氣入脾中三天隱諱符玉清始青玄元凝結中訣上清禹餘混芒降固上訣太清大赤混熖騰晶下訣鼻引三天青黃白三氣灌筆朱書黃紙上服之厚載無私化形玉虛卯五赤坤輿上連帝君辰九疊祖土三氣洞元寅鼻引九地二氣乃黃北帝二氣灌筆朱書服之千靈變化攝御群魔酉元皇列真凝結雲芽申中黃內象感化嬰兒亥鼻引東方九氣而成朱書服之服符呪曰元父合雌玄母歸雄天地混元人道居中玉符保命五藏光衝耳目開爽我道興隆三天內諱符森羅淨霐霐池無鏡祖劫化生上清訣阿陀龍羅堅敷澄宗四象吁貟玉清訣流羅梵萌浮羅合神太清訣鼻引三天之氣而成霐太一天真諱太初天真諱真仙真人諱上帝內諱符神戶纒絡真皇道舍元散精子文明氣晶育魂洪綱洞潜洞虛宸洞開告寧午文微酉文入中指中鼻引子午中宫氣而成書服呪曰太一捧符太初命靈真仙護命三帝司迎氣通玄關魄煉魂英服氣吞符洞徹萬靈七曜內諱符赫赫太陽衆太隂純化廣陽之宗辰文帝理生酉文皓景金華庚扶桑鬱霞九朔單辛洞光酉文氣合華卯文五氣元老化炎帝赤明奔一氣靈寶形子文飛火鈴午文中黃肇玄中指中文金一七此乃日月金木水火土七曜內諱也各本訣吸取本方之氣隨其色象而書之日吞七枚召七曜也服符呪曰東運扶桑西貫咸陽五行相配混合中央日氣符日魂珠景照韜緑映回霞赤童玄炎飈象右呪畢面日光以鼻引光瞑目引氣九口再呪曰鬱貞離右引氣九口入心中每受日氣每月一日五日十五日二十五日月氣符月魄曖蕭芬豔翳寥宛虛靈闌鬱華結翹淳金晶瑩炅容臺標右呪畢面月光鼻引瞑目引氣十口再呪曰結貞坎右引氣十口入於腎中每受月氣每月初三初八十五十九存月光十芒五星氣符甲乙日木星丙丁日火星戊已日土星庚辛日金星壬癸日水星呪曰金木水火土五星之精入臣身中內煉五臟耳目聰明徹視萬里洞見鬼神學道神仙飛升上清急急如律令右法木九火三土五金七水一並以鼻引回轉入口以氣送之再呪九曜順行元始徘徊華精瑩明元靈散開流盻無窮降我光輝上投朱景解滯豁懷得馭飛霞身騰紫微人間萬事令我先知急急如律令右法鼻引依前口數咽之木入肝中火入心中金入肺中水入腎中土入脾中南斗氣符魑離宫之祖日陽餘氣𩲕三氣炎炎丹天朗耀四明尊帝騰勝威天六轉云急急如上帝敕六字聚疊書取南斗氣而成離上為訣逆至子吹呪曰大行梵氣周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君文人中有南上司命司録延壽益算度厄尊神回骸起死無量度人急急如元始上帝律令右法叩齒六通面南斗看星存火光以鼻引一星三氣入口內送入丹田三六夜行北斗氣符魁阿奕恬懀𩲃紫精陀丘𩵄觚亶琅璀䰢岑昺太行魓幽微畢雷𩳐明陀唵痛魒梵秦貫標七轉云急急如上帝敕七字聚疊書取北氣而成子上為訣至午挑日吞七枚以召七元呪曰青城玉樓中據斗九晨君上靈搖天槌明陽照除氣五色玉樓內攀魁上晨君育嬰激明光隂精决生門黃臺玉樓裏主仙華晨君歸垪度衆踖真人降氤氲朱臺玉樓中步斗真人君玄上飛蓋晨冥樞搖天柱素臺金樓內躡紀七晨君上開變五道丹元散九芬玄臺玉樓裏步罡北晨君明靈昌上元北極降妙勛九層玉樓中乘龍北蓋君玄樞歸天徒天關佑善人紫氣玉樓內遊行三界族帝尊九晨君精常空上開玉臺紫館裏徘徊三陽歸帝真九晨君幽空陽明輝右法先叩齒七通面斗存每星有五色光芒念呪四句鼻引氣九口入口中一氣送入丹田共八十一口每遇三七夜行持服符呪曰南司北政陶魂鑄魄順道而造逆天法輪周旋玄象回死作生神虎氣符玄玄所化元運所造應變尢窮魂魄澡煉衆星所拱飛天遵奉𩴮馳驛風傳正訣云玄元應化星飛澤七轉云化元律魄星飛睪右七字聚疊書取魁星之氣灌筆而成子亥為訣日吞七枚召七妃呪曰神虎戟飛運招搖一統隨十方精光都一吸急急如律令右法於𥘉三二十七日向北斗星存紫氣入口念呪每一星七口氣共四十九口氣入口中以氣送之神虎神吏符卓雲青府寅文混元覺緣丑文嶪覩般基中指中文玉玄演候卯文寂元渺凝辰文極中混清中指中文皇達無靈午文七轉云昌荀逵迪信貴七字疊書取東北玄範司之氣灌筆而成服符呪曰魁張玄範應化無邊掌持青律度魄遷魂飛度五戶驛馳風傳元皇九醜樂秀三田逵迪察命變攝昌言荀持令貴信通玄三界統司盡禀吾權中斗正使祕諱符四景回樞濯形天河旋斗歷箕回度立常魕太玄璣渠玄君斬尸𩵄天王秉權五帝命魔䰫控適天元回眄帝堯遊行太空俯迎玉衡玉文八威正氣所臨八轉云中斗大魁總監衆靈右八字疊書取中斗之氣灌筆成符訣中指中文服符呪曰中斗大魁旋斗歷箕回度五常逃形天關太一天一二始分張八景冥合司命桃康二始祕諱符太一三轉云遊之宗宴太阿天一之宗五轉云遐想天常巳上五字分二疊重書共八轉訣中指中取中央氣而成服呪同前三台祕諱符太清佐命三氣乾為天坤為地靈為元真人中皇氣結氤氲虛皇總氣精元有英天寶妙化終升六太虛並四指上氣混康停靈寶化生至道曲密華房華育魂元宗四指中文延生度世神寶守宗萬神護攝四指下文服符呪曰上部八景胎結泥丸中部八景胎盤絳宫下部八景胎鮮脆根三元暉映台魂鮮明右日吞三枚召三台也天皇內諱符泛景太霞甲子元君白素嘯詠洞章滅皇魂氣九玄解乘胎仙六轉云六合八遼玄冥乾訣地皇內音符溟涬大梵甲申地皇萬氣遼廓無光絶𡨋黃素元君九華元陽六轉云巴元靈曜氣生坤訣人皇內音符無形無影甲寅元老太微玄無極無窮晨紫素人皇君落混沌六轉云洞幽迦摩梵慧中指中訣服符呪曰天皇人皇三素元君解結散滯閉塞死門辟非去尸心神寧間玄女祕諱符八景冥合氣入玄玄梵氣彌羅萬範開張玉音攝氣靈風聚烟三轉云玄運珠三師祕諱符定光真定光慧羅翹大羅智翹妙音真妙流音梵景空謡並隨氣四轉中指為訣挑遂字轉吹彈四聖祕諱符喑唄嚕嗂嘧囉咜喫嘰𠱾𠰉九轉隨氣疊書巳上桃勒至中指中服氣四指却勒至亥吹桃靈寶無量度人上經大法卷之十一
