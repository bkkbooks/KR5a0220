front:
  text: 靈寳无量度人上經大法卷之五十五玉三
  hash: sha256:e6bf0c78f82eae137046fe32198583e9a8e4a8d10fc929dafa8be5cc345ec7e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_055-001a, image: hfl/0095/0095-102.png}
body:
  text: 普度符誥品太上生天寳籙玄師曰九清之上有無上大羅玉亰金闕中有盟真之科祕於玉匱之中乃靈寳普度幽冥之法門也自赤明開圖之後元始上帝所說救苦拔罪之靈篇與諸真萬聖結約證盟誓願於億億劫中救度苦爽故曰盟真之典有三品馬上有上元金籙之科中有中元玉籙之儀下有下元黄籙之法總而言之法下元也謂无上黄籙盟真玉匱普度幽冥无量大齋也建齋之法先承投詞即是承大齋弟子詞旨孝意忠直懇切若果無私方許允度今爲學士備出儀範慎勿妄示非人混淆三元招罪不原遇得其人不行流演閉塞道徳天譴必至兆宜尋詳仙風道骨即付度焉謹按師旨世有救邱貧乏濟度人天奉戒修齋供養三寳或爲三師煉真養神功未𠑽足會窮滅度經由太隂者方可表奏虚皇文達青宫乃可曲行救拔告下救苦真符外以栢簡作長生靈符告下丹天世界使擢簡帝堂煉神火府若罪魂身乏片善抑又无功及於人天者不可曲行救苦之符濫受煉真金籙但得遵用太上生天寳籙使覩見神暉更生陽界則忝沐萬幸矣故玄告至言誠非大醮不降二簡啓壇之𥘉未敷長生之籙先告救苦真符用拔魂神來朝三境功圓徳就乃錫長生之籙使超丹天苟書篆乖訛章奏差錯冥官輕慢不即奉行必墮功徳亡爽更増沉没深宜謹恪遵守奉行使幽冥開泰咸被玄恩寳籙修用寳籙敕赦告下隂司釋放罪累實玉宸道君之宸湛也欲書寳籙先將硃砂面東存青玄上帝如法奏陳詞旨次誦青玄寳號研硃砂左右八十一轉請青玄之炁灌硃砂中次露日光一日月光一夕則受日月之正炁隂陽之煉也書籙時先誦度人經一過或十過依經行持次入室凝神自煉然後長跪啓白玉宸上帝具陳詞旨次九拜存天門開天門是三重金門金色煥然内有金闕寳殿中見玉宸上帝御容侍真羅列御前次黙奏詞意乞降太上生天寳籙復回九拜良久見玉宸慈顔喜悦敕命玉童玉女捧寳匣乘百寳光下降兆案前啓匣敷開寳籙與兆前所造之籙合而爲一光明徘徊於上无極无盡次面南黙奏詞意良久九拜存見南斗六星毎一星如日輪𥘉出之貎至于籙上與籙中六星合而爲一每一星存有字在内分明盡皆透底光明如一上香叩齒十通呪曰大行梵炁周囘十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延夀益筭度厄尊神廻骸起死無量度人急急如上帝律令敕呪畢再面天門寫籙依法存靈官將吏圍繞左右左手都監訣右手執筆長跪念太上敕赦呪五十徧无上玄元太上道君教臣行符照破地獄死魂出離急急如太上道君律令敕取西北炁存三炁吹筆即將筆篆籙唵吽吒哩四字書四字時止念其玉諱爲呪不計其數次以一筆挑上蓋其形呪曰元始符命時刻升遷亡魂受煉立便生天急急如元始上帝律令敕再吸天門炁出筆發訣如上四字乃玉宸祕諱元始是玉宸之師故用元始律今亡者得之无不生天故爲生天寳籙抺星之法魑運處離宫名同日耀𩲕宰御火帝𩲓禀質隂陽尊位南極陶魂鑄魄威勝萬方右每位各六轉筆念府相梁同樞機取南斗炁吹再呪曰南斗六真出入幽冥吾奉帝敕速監生靈南昌上籍即得返魂急急如上帝敕又祝曰太上敕赦生天寳籙告下冥官主者救度亡魂隨品受生托化人天一如吿命風火驛傳書訖執籙香上祝曰太上道君敕付崑崙神符一下抜度死魂急急如律令呪不計徧數多尤好取天門金光之炁挑玉清訣布符上挑訣時存金光道炁自訣迸出太上敕赦寳籙散形青玄救苦大慈愍救分身敕命吿下九夜咸原散影隨念尋聲三光真精玄元普度罪魂神君尋聲救苦赦罪超生玄元祖炁灌溉身形丹天三炁北府二象銷名回傾紫炁覆身亡魂秉籙右取天門時刻升遷炁吹符内次書唵吽吒哩四字書一字轉筆九帀呪曰元始符命時刻升仙亡人得此立便生天急急如律令敕再取天門炁重疊書轉七帀念曰覩見光明速生天界急急如天尊敕又搯十方訣轉十帀拂十筆念十方救苦天尊再於上轉三帀拂一筆云玉清大帝敕慧光一到幽牢罷對速生天界書符畢存光芒照耀天地又念曰上清大帝敕慧光一到幽牢罷對速生天界太清大帝敕慧光一到幽牢罷對速生天界次篆寳籙真文再取金光之炁吹之想其寳籙之上爍爍有金色煥耀光明奪日亡魂十功九徳純備及黄籙齋壇一一嚴肅可用前告文其或亡靈功徳未備齋壇於心有歉用第二告文若普爲九州孤魂滯魄濟拔别不昇度冝用第三告文並不得差互无上玄元太上生天寳籙敕勘大明國某州縣某人投詞伏爲亡故某人本命年月日時生於某年月日時命終以今崇建某齋用伸追薦除已録奏天闕請命施行外須至出給符籙告下寳籙度人不死之神南極長生之君度世司馬大神好生韓君丈人真文右奉太上敕赦生天寳籙告下酆都北府内外宫洞三官九府百二十曹五帝考官司命司録司功司殺四明真公賔友僚佐九幽二十四獄四方三十六獄八十一獄天一北獄女青四十九獄大小鐡圍无間地獄劒林火山泉曲寒池四方諸大地獄六宫掾吏五道都府溟泠大神金頭鐡面執罰神兵巨天力士天騶甲卒牛頭獄吏威劒神王六洞大魔三塗五苦主役考魂冥官三元水府九江五湖四瀆四海十二河源三河九澤十二溪谷河伯河侯考校隂治五嶽十山七十二司五嶽掾吏諸大地獄二十八治隂曹考校一切官屬九州社令城隍主者隂治冥官六道四生十道主者並仰遵依太上敕命原赦獄中億劫往古輪廻報對罪魂苦爽五道四生含靈抱識等衆及亡過某等自昔劫以來至于今日所作三業六根惡業寃愆或誹謗大道背真就僞或傷殘兄弟謀及師尊或六親通同滛犯骨肉或爲劫賊殺害人命或屠割衆生自饒一身或以强凌弱以貴虗賤或浮好三寳執心不專或輕法師穢賤靈文或心懷隂賊安忍嫉妬或惡口兩舌闘亂善人或殺生滛祀躶露三光或心生口語或自作教他積劫以來所有諸罪无量无邊或久被嚴刑克生善念有心攺過无意怙終所犯細微无諸大惡或因讎隙辨證縈牽久繫禁囚未獲和釋應文内聲說不盡自此等罪並與赦除一一原釋或久滯隂司年代綿逺无有休息不經追贖或心思道法乞丐解脫並從今敕赦岀離地獄覩見光明萬罪蕩除寃仇和釋神開意解身心泰然疾除罪簿落滅惡根不得拘留時刻昇遷各隨品格托化人天外有科律不該度者或上天專降敕命永不原赦或永劫不原三掠不原終天不原者並與理經一赦量行差宥減罪轉輪仍與舉行生前殁後所作道釋功徳一切善功並與收使即使上件亡魂等七炁成真六儀運虚五靈續絶二曜扶衰旋罡躡空飛歩雲宫胚胎有始塵劫无終金城孕質玉洞凝神真炁内養以成真人上入六虚下洞幽泉雲宫寳闕中有真魂出入福郷周旋生門咀嚼靈芝灌漱金泉甘露川流懸㴻丹田紫霞朝映三炁凝煙瓊室化仙安坐金蓮真儀掩日塵劫爲年一如告命風火驛傳年月日時告下具六職法位姓髙功法位臣姓告行泰玄知省天君天樞右相天樞左相天樞使相天機内省上相天機省上相玉清神公无極上相在天内封太上敕赦生天寳籙具位臣姓某謹封方函太上敕赦生天寳籙告下五嶽酆都水府社令冥司主者具位臣姓某謹重封右寳籙上帝御前長跪宣讀焚於烈焰中第二告文具如前右奉太上敕赦亡過某人自昔劫以來至于今日云云止一一原釋即使亡過某出離三塗超越五苦疾除罪簿落滅惡根寃仇和釋時刻昇遷神登玉闕受煉長存隨劫輪轉與天齊年一如告命風火驛傳餘式如前第三告文具如前右奉太上敕赦生天寳籙敕赦九州分野五道四生幽魂滯魄自從昔劫以來至于今日未得托生等衆除興妖怪欺道自營一生昧心奸私肆縱不忠不孝負命負財毒惡刑科律不該度其餘罪衆並行赦宥其有久厭幽隂發生善念或況迷待替執著尸坵或遭毒藥兵刀或遇焚溺墜陷或飢饉疫死或虎啖蛇傷或自縊産亡或傳尸鬼疰或久被嚴刑克生善念有心攺過无意怙終或死犯細微无諸大惡或係累劫一切寃仇未能和釋應干聲說不盡自此等衆悉皆昇度速與消除罪録落滅惡根不得拘留時刻昇遷萬神護送俓詣人天隨品受化更生福郷一如吿命風火驛傳右寳籙封函題只告下東嶽太山府東極青玄九龍符命謹按師旨凡山林寒棲之士普爲下土貧乏之家薦拔亡爽修建急告簡齋法或普度幽隂苦趣或薦拔善功死魂及四生五道一切冥爽當佩九龍符命心映南昌長生錬金真籙遵持元皇九真智慧妙戒消釋日前萬罪即得名上南宫位登仙品名絶鬼録然後奉行齋事此廼仙府祕語玄師慈訓儻怱斯言以爲虚誕自已猶爲罪鬼安能薦拔幽圄之苦學士遵之擢簡帝堂指日成真關九龍符命使者隨符告下應九億萬之窮魂俱獲更生上升仙宫如急應告簡法會止可用九龍真符玄感无極兆宜祕之東華東極九老仙皇太一九炁青宫大帝敕命天尊救苦九龍使者五方五老符命乗駕九龍育煉死魂九天九炁三寳丈人附符生炁上帝慧光開度苦魂曲湛神庭重泉主者有違有拒束送天刑拔度奉行有功有濟列言玉清元皇告命萬神敬聽善功死魂罪隨北赦乗斯符命超度南宫急急如上帝律令告文兆佩帶不用告文背書九戒東極青玄救苦九龍符命告下三官九府五嶽九州酆都六洞十宫九幽河源泉曲五道都府九州社令冥關幽扄一切主者咸領符命拔度亡過某及九州分野五道四生幽魂滯魄囚苦罪魂俓出幽翳永離隂冥地獄消苦開泰泉扄火翳消熖刃毒摧傾下明黒暗上生朱陵超度三塗宿對停輪一如告命風火驛傳年月日時告下具位臣姓某告行東極天中長樂宫内大慈仁者尋聲赴感太一救苦天尊内封東極青玄救苦九龍符命具位臣姓某謹封方函東極青玄救苦九龍符命告下十方三界九野地司冥曹主者具位臣姓某謹重封右符命朱書黄素告文方函圓封亦朱書面東焚香於密室長跪密奏詞旨存天尊在東極青宫百寳祥光殿内衣絳羽青華飛雲龍紋帔頂玉清寳冠有五色獅子九頭共捧九色蓮花座獅子口吐火焰徧繞天尊於光焰中别有九色圓光如虹蜺項有圓光象如日頂中出白毫相光如刀鎗劒戟鋒芒蓮花座下又有二小蓮花乘天尊足左手執碧玉晶寳器如鍾鼎之形右手執空青羽枝金容玉相慈悲慧目左有大惠真人右有救苦真人侍從金剛祈王力士天丁玉女靈官從太一八十一位神君五方太一吏兵於五色雲中兆存思分明再黙奏訖即念天尊聖號八十一徧存天尊命右侍救苦真人開紫陽九光寳藴付兆隨有九龍使者甲乙如請數兆受符九拜存天尊洒甘露於十方良乆天地如百寳光明倐忽不知所以兆執丹筆再祝天尊睿號九聲取東方炁吹筆書符命訖又祝睿號九徧取炁吹彈玉清訣本法於天尊聖位下書破酆都符不用亦可書訖祝十方天尊聖號九十徧取十方炁吹次祝救苦天尊睿號九徧東方炁吹書彈玉清訣對三寳前宣讀訖焚於烈焰中祝九龍使者隨符告下虚皇九戒皇人曰兆巳佩九龍真符戒文當冥心映南昌紫微流金煉真之籙亦曰長生靈符蓋髙上靈策紫微寳章也煉簡丹天明霞結藴神光煥落召降宸華保錬丹心養育赤子受者取月陽竒日備青素九寸闊二寸五分丹篆其符符作八疊以絳囊方寸懸當正心毎日燒香訖出戸東向若雲雨晦暝可就寢靜所凝心虚形面對圓羅鼻引赤霧洞浹一身髙下三宫一塵不立念極良久乃叩齒三通咽液三過微音祝曰司府受煉相火盛罡梁爲天宰洞感炎光樞機輔弼星列玄章育精大明赤車凌芒練化神府表裏俱昌再叩齒三通咽液三過止行之三年後施上法則試觀不陳風飈克御翹暉倒景流軿紫虚盻眷髙清玉京可歩也策云月陽謂六陽月也竒日謂甲陽日也後施法謂上清諸法非行策三年始營佩符揖景也燒香出戸謂岀庭戸非依朝真格出巽戸也青素明潔非指白爲素也如道呼紫青絳爲三素雲也策云應當以九龍符背書九真妙戒用青錦作囊佩之以丹錦爲囊佩長生符應於神府仍焚救苦符拔度下元罪民生魂常居福夀此亦可謂前生曽立九幽大齋受持九真妙戒金籙標名金格列字玉清徳重功髙名通天界十方天尊我以神力隨念救護受持功徳拔難濟苦神力難思當消九幽大罪標名九宫即有察命童子護戒威神五帝直符六宫掾吏自當隨逐簡文覆護受持弟子因縁輪轉得爲九宫真人妙戒金籙威禁至重若能如法修行其福無量佩之者即獲九種福報一者若有國土分野兵災不息依法存念兵戈息靜忻國太平二者若有國土分野疫毒流行兆民死傷依法存念妖惡自屏天人稱慶三者若入山林猛獸虎狼將欲衝突依法存念猛獸自退終不害已四者若渡大海遇大惡風依法存念風浪息靜得逹於岸五者若在軍陣白刃之中依法存念兵戈即息不有傷害六者若在枷杻牢獄之中依法存念𡨚枉自伸必得解脫七者若有邪精鬼賊衆害所纒依法存念鬼妖消滅自得痊瘥八者名書黒籍身殁九幽修設大齋名書玉簡佩受九戒消除黒簿諸罪應時解脫魂升上天九者前生曽立九幽大齋受持黄籙白簡九真妙戒長生靈符當得三界十方救苦天尊隨念救護絶諸惡根其九種福報不可思議設若起心誹謗懷不信心即墮九幽備受諸苦綿綿長夜不可解脫若𥘉生信受後起慢心消除金簡注名死籍見世惡疾長淪惡趣一失真道无貽後悔建齋之𥘉量度其心縈於俗務不遑受持齋罷之後還戒玉清符歸寳函啓謝三寳亦獲後福若能終身佩受必保破劵飛昇名書紫微受度南宫東華青宫九龍符命祝符呪曰運真合靈會寳敕詔諸神六天壘重隂酆都九幽獄典吏部冥洞三官執九府主典神吏兵一切主獄者拔度善功魂出離三塗苦東宫九龍符照破諸地獄爐炭生青蓮刀劒作騫林火池化温泉鑊湯爲春浦超度長夜魂往生安樂國行持之法一如前式玉清破地獄真符九泉寒夜幽隂寒壑照破期劫輪塗忽覩光明九壘何敢不隨禀遵帝令風雷消散金剛拆摧火翳化池溟泠温和普掠無施火車息熖銅柱摧毀鑊湯罷吹屠割停摧元始有敕魂離酆岱有罪符到速追魄出鐡圍无罪速赦无違三界侍衛萬神敬依玉清寳籙開破九幽北酆憲壘敦攝火今面北長跪焚香啓祝如儀呪曰至聖神人巳成天真元皇之裔太上子孫億曾萬祖苦爽幽魂天尊大法十轉回靈赤書成章告下泉冥玉文一下摧毀鐡城符光洞照赫奕重隂刀化玉𣗳劒變騫林炎火生蓮冰消雪扄三塗五苦八難超凌魔王隂官稽首送迎玉清元命一如奉行呪一徧取西北炁吹筆書符畢再呪一徧取東方生炁一口布符上又呪一徧取南方生炁一口布符上存符有萬丈金光照耀奪日於三寳前宣讀訖焚烈焰中泰玄都省遵奉道旨奉行玉清寳籙破地獄真符拔度亡過某靈魂及六道四生孤魂滯魄等衆承茲道力出離地獄者髙上真王玉清寳籙破地獄真符告下北隂酆都内外六洞天宫三十六獄阿鼻地獄十二河源泉曲水獄五嶽地獄大小鐡圍有間无間十方獄庭長夜考掠隂關冥司萬神咸聽一如告命年月日時告行具位三天大法師玄中大法師天機内相天機上相天機右相天機左相泰玄上相玉樞上相祝符命文元始符命真文煥發照耀幽冥塗炭罷對考掠俱停炎火息焰冰消雪扄刀山劒𣗳化作騫林疾除罪簿落滅惡根不得拘留亡過某及囚苦罪魂乘此真符救苦功徳速令出離覩見光明上升南宫受煉更生一如告命封皮玉清寳籙破地嶽拔度苦魂具位謹封右符别用一道以朱書符文墨書告文封題如封候破獄時法師依文告下諸獄開赦罪魂玉清拔幽魂符元始符命普告三界風澤總炁上玄歷關諸天洞虚萬炁齊仙元洞玉曆九泉幽爽死魂受仙斬絶地根回骸起死時刻昇遷三官九署拔出地戸落滅惡根七祖升仙急急如靈寳天尊无量度人書符面西北長跪焚香啓祝如儀三天大羅髙上玉清元始靈書太一真文玄元大道敕降玉宸天洞天真主領魂神九幽主者六洞真靈禀受真符拔度幽魂天王律令隂曹速行呪一徧取西北炁吹筆上存金光透筆然後書符畢祝一徧取東方生炁一口布符存符有萬丈金光照耀奪日於三寳前宣讀焚烈熖中泰玄都省遵奉道旨奉行元始符命拔幽魂真符超度亡過某及六道四生孤魂滯魄上登朱宫者元始符命拔幽魂真符告下三官九署百二十曹水火罪録主管酆都内外宫洞五嶽地幽泉曲九壘十二河源九州社令地水萬神拔度九州分野之中死魂罪魄囚苦之靈疾除罪録消落過名群靈護送永離幽冥魂魄逍遥上登朱宫一如告命年月日時告下具位具八相位同前封皮玉清寳籙拔度幽魂具位謹封右二符留沖靖用栢木作簡長九寸闊二寸六分厚二分面書符文背書簡文年月法階共六行一如長生救苦符簡式靈寳本法用黄素丹篆其符白素墨書蕳文封以青素朱題如式拔幽魂破地獄符叙曰易曰精炁爲物遊魂爲變精者滯跡含於炁魂皆是有情血炁根於中化命曰神機與帝先同分一炁不由天地之變遷知此道者掌握宇宙萬化生乎身觀天法道念動則化移故得同天地浩劫以長存失此道者神去則機息命曰遊魂任隂陽之變遷拘造化之陶鎔故出死入生无所不化者蓋有血炁精魂之物禀性以識是以有善惡之業既在幽冥造化機内所以隨業受變善多則屬陽升於吉道惡多則屬隂降於凶趣善多陽盛則爲神惡多隂盛則爲鬼无惡純陽則爲仙隂陽沖和則爲人純惡无陽則沉幽極之鄉微善稍存陽火就燥化飛禽隂重惡存水務降下變走獸若惡業既盈雜以邪類之炁則魂炁遊散於濕化之屬惡殃之詣滅身之化也以此詳之升降六趣出入輪回皆由自致唯草木有性无識業任天地四時之變遷受精炁於隂陽无遊魂之升降故隨二炁之消長是以上聖垂哀同分一炁之墜憫遊魂變遷於異趣以純陽善炁結於符籙拔隂惡魂升於吉道繇是星斗龍鳳之書雲霞火霧之文成象在天蟲魚草木之札地蚓人物之篆成形於地内隠密機契合神化曰符集會妙炁默合聖樞曰籙皆上聖真人之垂範爲幽明之軌則流傳下世普度无窮玉清寳籙拔幽魂真符亦曰召魂符玄師曰玉清寳籙元始威章出九光紫陽玉冊靈寳普度靈文廼隂曹之合契冥官之會同欲書靈文面北長跪念敕筆呪曰三天大羅同前左乎玉清訣呪一徧取天門炁吹筆上書之五方五水召炁火司太隂旡鞅四鎮禦陽玉曆召吏飛馳急召急至四方玉符𠃔康左乎辰文取東南炁吹入符中如或召魂先於符下寫云十類无主孤魂滯魂若是亡魂先寫亡過某次書敕字玉清上帝上清大帝太清大帝金木水火土五星尊神吾奉大一救苦天尊敕行靈寳符命拔度亡過某魂魂出離地獄五苦三塗不得拘留逼合鬼群斷落死名急急如上帝敕書訖存元始本色玄炁吹入字中再誦前敕筆呪一徧取東方青炁吹布符上又誦呪一徧取南方紫炁一口布符存符有萬文金光照耀奪曰於三寳前宣訖焚烈焰中右符吿下十方三界无極神郷泉曲之府北都羅酆三官九署十二河源上解亡過某神魂及六道四生孤魂滯魄億劫罪魂疾除罪簿落滅惡根不得拘留時刻升遷萬神護送逕詣人天隨品受度更生福郷一如吿命風火驛傳玉清寳籙破地獄真符神霄玉清照破幽扄寒庭苦爽重泉咸傾閉炁書酆都酆庭符到皆停想天獄主獄吏宣奉天靈光降真經道化摧毀地關靈元宣告遊精易形靈光一照神霄攝魂金簡赦籙普度幽靈玉清宸命攝破不停開扄大將奉命速臨太皇開明萬鬼出形北帝真光照徹幽冥幽冥之鬼各得開明玉清符誥敕下三官四司五嶽九幽六洞十宫泉曲酆都主者凖今符命普釋亡魂出離地獄上生天堂告文髙上真王玉清寳籙破地獄真符告下酆都内外宫洞三十六獄九幽地獄泉曲水獄大小鐵圍山无間地獄長夜考掠隂關冥司主職萬神咸聴符命真文煥發照耀隂冥塗炭罷對考掠俱停炎火息焰冰雪消凝刀化玉𣗳劒變騫林疾除亡過某及九州分野五道四生幽魂滯魄等衆落滅惡根不得拘留囚苦罪魂乗此真符救苦功徳速令出離覩此光明上升南宫受化更生一如告命風火驛傳九幽拔罪超生金籙无上虚皇敕超度窮劫魂寳籙往泉扄俓生朱陵府太上弘慈悲日月左右照合與濟生度死輪下入開光門天帝徒罪魂金籙度苦爽並休停出離幽浪津靈寳大法司奉上清北極大帝敕符右籙奉敕亡過某靈魂執此隨願往生凖祖師上清北極大帝敕盟真玉匱度魂韓君真籙唵吒唎吽韓君司馬南宫丈人度命超生速消惡垢總監上天生神毓質超度三天靈寳大法司符右給付亡過某靈魂執此符命水爲身寳所注生處永爲證驗者皇人曰度品之法廼元始天尊傳付盟真玉匱之文以授道君召制南宫諸天真人以超北府上登流火之庭煉除穢滓悟性圓明其名黄籙存亡得之如銜三清之敕身生光明逍遥福境无所障礙應濟生度死不可闕此應法官書篆之時面南再拜搯上帝訣引太丹之炁朱書黄上黒書籙文對聖披宣付亡人齎執佩受太上五嶽破幽暗引魂寳籙太上三清三清急光光映敕降酆庭拔幽啓扄十方回尸起身三陽肇慶巨靈秉斧枮骸發榮劈破山嶽受命天府使者引魂萬神敬諾敕到奉行告文太上三清敕降酆庭三清慧光拔幽啓扃光照十方回尸起身三陽肇慶枯骨發榮巨靈秉斧劈破山嶽受命天府使者引魂萬神敬諾敕到奉行靈寳无量度人上經大法卷之五十五
