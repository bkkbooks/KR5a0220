body:
  text: 洞視神真品上香發爐存思如儀搯上帝訣無上三天玄元始三氣太上老君召出臣身中移訣在中指根循二指根歷上二指甲下搯之三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出彈訣出再皈上帝訣以中指壓定急上關啓無上三天虛無自然至真玉帝臣今正爾入靖燒香今日今時專於壇內行持通目洞視降真召靈所有密意具載表文願得十方正真生氣下降流入臣等身中令臣所啓速達徑御至真無極大道三清上帝昊天玉皇上帝御前再拜長跪默奏表某年太歲某甲子月朔日具法位臣稽首再拜上言伏念臣生居下土周旋塵世罪重業深甘沉鬼道無功贖罪惟待典刑爰因道泰時清宿契有𦍒佩參法籙玄盟寶經叨奉大道玄恩濫司三洞清職仰荷更生之澤欲遂枯朽之榮早夜感激憂惶恨無𥙷報萬一誓願佐天行化助國救民志當謝過祈恩禳災請福剪邪立正超度幽魂元元之心不敢懈怠少禆洪化用謝積愆臣誠惶誠恐頓首稽首重念臣雖虔誠心志願力守天規恐因動止行藏未合真理不能動達幽顯罔致妙用神通臣實以胎生穢質塵漏尸居積隂熾盛於百骸冲和弗充於四體遂致目光𧇊减視物昏蒙况亦難見於鬼神豈得洞徹於三界難使邪魔歸正行化立功况有目如盲有耳如塞先蒙度師某人付授混元玉札并採集三皇真諱靈真內名洞視神文臣當修行今來謹擇吉日自此長齊依式吞服臣欲內滌心垢外鍊目精意者欲洞見於鬼神乞徹視於三界伏望祖師玉清上帝宗師上清上帝真師太清大帝聖師昊天玉皇上帝玄師東極青玄大帝靈寶經師真君靈寶籍師真君靈寶度師真君靈寶諸師天君三天上聖髙真玉陛下乞垂聖造俯鑒塵心不以冒瀆賜臣天恩恭望允聽臣言特降百千萬重道氣十方正真坐氣混合大道慧光三寶聖力六通神慧妙化真光入臣身中蕩除心境塵垢洗去二目穢氛開通臟腑光明赦宥罪犯業障胞元散滯結節開通摧伏衆魔萬真侍衛臣今吞服內諱之後坐觀三界立照萬方洞見幽冥徹視鬼神暗知未兆明覩天文永脫八難三災解釋千殃九厄所向吉利陳願宣通大道興行群生信向誓願生生世世濟生度死降伏妖魔萬劫千運之中永為三寶弟子如蒙玄景報應不敢泄漏一言半句天機謹伏地拜上心表一通上徹徑詣三天門下乞隨香煙傳達奏御大道三寶上帝至尊几前臣無任祈恩望聖激切屏營之至臣某稽首再拜以聞復爐香官使者左右龍虎君侍香諸靈官當令臣拜表之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當令臣所行洞視通真達靈十方仙童玉女接侍香煙傳臣所啓之表徑詣至真無極大道三清上聖昊天玉皇大帝御前再拜出靖入局行持焚香叩齒二十四通集神依前步斗兩手搯玉清訣次念隱諱霐召三氣以鼻引三十二過面乾方目篆三天真形符吸入三宫化作三清在於三宫乘二氣而出住立前後次思已身化作神公之狀頂玉清金碧鵰蟬冠衣絳霞飛羽袍大帶朱履坐三色雲氣之中右手擲七斗因成紫微印左手擲三火因搯玉清訣次念三十二天通靈祕旨呪曰太皇黃曽天帝鬱繿玉明至太極平育賈奕天帝大擇法門三十二天三十二帝諸天隱諱至列言上清急急如元始天尊敕太上道君律令再上香念紅杏卯墨黑丑磨真兌襪臘離靈寶中指中實搯定左手托水盂右手持水罐傾水於水盂內念通神北魁水呪一傾水念一呪想水內有靈字七傾七呪向天吸北氣吹入水中呪曰太上老君神聖法九天玄女順聖法魁罡靈魁罡聖逢著邪氣必須應敕攝次將二手玉清訣拱手當心覷定水乾元亨利貞日月與吾并吾亦非飢渴賴得神水清五行之氣六甲之精靈水入五臟耳目口光明萬邪自歸正壽與天地齡神仙同羽化洞視見上清急急如律令又呪曰乾元亨利貞日月與吾并吾亦非飢渴願得神水清金木水火土五行之數六甲之精三真天倉濁氣常盈黃父赤子守中無傾急急如律今右默念七遍取西北氣呵入水中次將兩手玉清訣叉腰默念太一水呪想太陽火輪自東方倐忽而來入於水內運轉大赫光明照耀一室次念太一天真呪曰謹請太一天真太𥘉天真真仙真人上應軋位六丁佐神𩴑𩲙六甲佑軍為吾上受天心普救萬靈太一靈呪南方火輪除邪治病洞見萬靈耿水敕攝默呪七遍取南方赤氣呵入水中次兩手玉清訣拱手於心前服氣呪曰弟子一年三度受氣受天氣仰首向乾方取之應于華頂先咽一口吸一口吞之想纒絡五臟周滿一身次吸天氣一口吹水中又吸氣一口吹鏡中地氣俯首向坤方向下取之應于足底如前吸咽及吹水鏡中日氣看甚時是其方五色絳氣應于左目如前吸咽及吹水鏡中月氣看甚時月在何方銀色氣應于右目如前吸咽及吹水鏡中五星之氣向五方取之內應五臟各依方取五色氣如前吸咽及吹水鏡三皇之氣子方取青玄氣甲方取黃氣寅方取玄氣內應三田吸咽吹鏡內及水中如前法南斗尊神之氣南方赤氣內應于心如前吸咽吹水鏡中北斗九皇真氣隨方取五色氣應身之腎又應身之右手右肘右肩心宫左肩左肘左手如前吸咽吹水鏡三台真星之氣在斗頭黃白青三氣內應於肺如前吸咽吹水鏡二十八宿之氣但看官曆此日何宿直日角宿直日其日乙丑即於丑方取角星如是周而復始如前吸咽吹水鏡神虎七隂正氣斗隂取之想黑氣內應于腎之中如前吸咽吹水鏡三天三真內氣西北方乾位青黃白三氣應身之頂三宫如前吸咽吹水鏡三師度我神氣五方內應于心如前吸咽吹水鏡五嶽持身妙氣五方五色之氣內應五臟如前吸咽吹水鏡三塗總司之氣子午乾位黑紅氣應腎之中膀胱之後如前吹咽吹水鏡六丁柔和之氣隨丁旬取之如前