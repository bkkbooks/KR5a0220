body:
  text: 普度符誥品虛皇上帝金籙白簡敕制九幽赦拔五苦吞火食炭變為甘露鑊湯爐炭化作清波金鎚化蓮鐵杖匪杵三塗冥官朝禮拜舞苦魂飛升上朝帝府宸湛者乃三境上帝宸惠覃澤説金籙度命寶經破九幽三塗酆都五苦之難敕制鬼官咸遵教敕使火山熄熖水池靜波黑簿俱焚永無考掠超度亡魂上生南宫自古以來遵之者萬福如山謗之者幽沉無數始勤終怠譴惡不輕皈命執持夀祿維新塵世傳習多致訛謬今乃證訂略無差誤庶幾明白咸可遵用玄師曰三天有無上明真玉匱金籙玉簡救苦真符玉策云東極青宮九龍金籙救苦真符乃元始之威章上帝之曲恩實醫救沉淪之法藥開悟愚暗之法音灌沐身心之法雨覆廕群品之法雲照燭幽暗之法炬汲引亡爽之法門始因北帝啓陳虛皇演説曲湛宸恩度度無間召十方天尊而合契為九幽地獄之靈文承之則立登霄極回骸更生奉之則徑出昏衢位輔真人度三災九厄於塵世除千罪萬業於北都豈小輔哉凡書篆真符須入靖行事以香案面東置簡案上先面北長跪啓奏存祖師此祖師當存元始尊乘五色獅子百寶金臺蓮花之座外映金光口吐瑞氣降入丹砂中及簡木之上次起立面東左手搯震文呪曰玉誕長桑柏空度仙丹華曜木度魂升天氣映白簡金光自然永劫長存安鎮寒泉幽魂開度長保劫年呪畢取生氣九口存作日華之色吹布簡上如普度簡多亦並列几案上如前取氣至八十一口周遍於簡上以丹砂染毫書之玄師曰非名書左契者不得佩此靈章非心純九真妙戒者不得告用青宫救苦真符如專用薦拔非七德九功修真崇道之人不得告用長生錬真之符固非曲説以失慈悲之教蓋以為多罪下鬼焉可專擅宸恩而救苦爽也兼非至忠至孝至貞至廉至仁至慈於國有功於民有行修真奉道者無升騰南宫之格雖行告下地司秖執白簡隨牒受化隨功受生也學士冝詳之理亦昭然也此金簡神文非憑三寶之力亦不能普周濟拔依言修用當臻妙果救苦真符散形竅呪天寶君靈寶朱明景化后吾神寶君保素通真土九壘俱帝會庭五氣混合日月停輪魔王保舉諸天記名三元六紀注生注福慶合齊并司功司勳南辰北極中監五嶽金輿玉輦陶魄鑄魂下統人倫朝謁三清九霄紫户陀羅眇氣斡運生神育邈合雲九州幽爽華都安鎮完形曲麗稟敕奉行若度士庶度橫死度産死度生身將散形各換後項呪語三皇氣合景化凝玄九陽朗映冥夜升遷削除罪譴開度宿緣三素皓靈六辨虛凝寶玄流化威靈拔度五老啓圖極中混清道守岑遙九魂煉清周回加圖英魂開度徊合玄都九夜停刑幽境光舒曲赦北酆髙步雲衢右度士庶呪廣生髙映覺元洞虛應元九真五運華敷神戶纒絡三官總都六龍舞轅哀救三塗解釋仇對弘慈範樞五行返真清氣灌廬威光逺感爍照幽衢慧朗靜明度命南樞圓極湛常九液續隅幽泉開度福映酆都急如敕命飛步太虛右度橫死苦爽呪帝真混合煉神溉胞左右奉令司馬洞謡九夜沉魂惡根化消紫戶定録神府升霄開度長夜隂貫陽標三張總御合慶幽寥六氣咸遵明範演招司命司録司功司殺總御三靈明示都府中理五氣混合百神曇誦延越承命三清九陽司化覆雲育靈大明合日得天之晶赫奕玉帝九幽齊升泉曲受度敕赦幽魂急急如青玄律令右度産死幽魂呪三魂歸英緑字返生九竅開通五符納靈鬼戶斬絶皇道鮮明三台敷映六儀混成隂陽配合皇逹元靈五帝大魔侍衛送迎混本歸一飛步三清九族俱超三景澄明身度我界體入自然生身受度劫劫長存九泉不到幽廓難拘曲映帝河馳騁玉虛右度生身呪元始符命金籙白簡救苦真符普告十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度罪魂出離地獄永辭長夜覩見光明萬罪蕩除寃仇和釋承此九龍符命功德上生天堂一如告命長生靈符散形竅呪元始上帝玄照超品左陽真神無右隂靈神上七元默念化元聿白九星飛睪幽罪魂默念三聲九幽拔罪天尊神珠天地黃雲凝靈朗日合明氣象交元玄中澄輪左那仙府台真之神太仙右府三元上集八五覃赦五嶽九夜升騰獄嶽八獄罪根凡欲書八獄字先呵氣一口云破然後却下筆欲書五嶽字先呵氣一口云靜然後下筆四司帝迎桃康奉令天合地合人合日合月合五行合併日月並明南極注生紫策南昌帝君太極注生帝君紫虛丹老帝君長生大帝會精總中間通正筆即統帝府念末句三叩齒默念炳煥烘𤊞煴熳畢三叩齒三叩齒了帝會庭心長引西南氣一口灌筆中然後下筆地水隂三官北酆九壘重九九九隂九地九水皆覩光中峨峨丘陵飛龍太嶽主帝驛傳南斗上生先書此後書南斗字吸筆端丹色咽之納臍下存紅氣徑入丹田候度魂登橋時呵氣存此丹田中赤氣衝天送亡魂出五丈之外祝救苦簡呪曰太上開明元始明真五老上帝赤書玉文拔除罪戾宿對惡根皆蒙解脫考掠俱停魂升九天魄度朱陵今日上告萬神咸聽一如告命風火驛傳祝長生簡呪元始上帝赤書玉文解銷隂結煉火登真刀利南極浮閻神庭流煉火質禪猷保生婆尼真童與滌穢塵表裏瑩徹玉嬰之形飛步禪黎洞陽之庭一如告命風火驛傳遣救苦簡呪告符時於香上祝之方付亡魂元始上聖玉帝髙靈玉文告命濟死度生金籙妙戒拯護幽冥白簡寶符九真玄經解消罪咎寃債和平救苦真人削除罪刑察命童子注上生名護戒威神引詣福庭超離五苦乘駕雲軿轉輪得道飛升上清遣長生簡呪司府受煉相火成罡梁為天宰洞感炎光樞機輔弼星列玄章育精大明赤車凌芒煉化神府表裏俱昌二簡並上帝訣引東氣至玄元始三氣入符長生符度死魂總告一面别據所薦亡靈多寡合給一面明長生符旨皇人曰夫罪魂拘閉皆北斗七元之所管掌故先書無上七元九幽罪魂之字次以三光之氣照耀十方三台煥明故書玄象之光以照八獄五嶽五帝監生六神運靈次書合日之明三光所照紫府標名帝君執符度命華庭太山天元之氣灌注南斗三官稟敕九地之下九水之中九隂之景皆覩光明明救苦符旨皇人曰夫人之淪亡乃三尸九蟲之所制也皆在五行之所運故入五苦輪回之門故太一先用三氣之光以破九幽之獄書九星之氣以蕩尸穢五藏內明如日之比則隂陽返其魂魄也故書碭尸演由之氣然後布其八卦之星玄象分形二儀交泰三氣流通以鎮三田心主坎離上朝三清然後羅列真氣充溢萬神敬聽九幽隳毁混成一氣回尸返生故書曲赦真訓修用謹按九幽拔罪真經昔北帝廣為啓請救拔諸苦虛皇上帝金口宣説告諸四衆吾今為汝宣説九真妙戒金籙白簡救苦真符長生靈符受持功德拔難濟苦神力難思衆靈稽首伏受教命及虛皇天尊宸澤曲赦也今建黃籙大齋當須青章黃表上達虛皇御前然後可以告下十方無極世界救拔諸苦若章奏不達徒然建齋鮮有靈驗兼素車白馬章上清太玄真符齎太玄符命告下十方開通道路救拔亡魂乃是天人合契天法人法之式也黃籙九幽大齋豈可輕易為之况主壇髙功平日功少過多德行鮮薄自已罪名書於北府魂魄拘留於桎梏之內豈能救免亡魂於幽獄哉從以果食敷張壇席返有泄瀆髙真之愆若建大齋宿啓之𥘉臨壇道士六職法師先當遵守九真妙戒被受長生南昌煉質靈符以陽煉隂亦得罪除解壇之日納戒還符若不遵戒佩符齋事徒然必無感格其茭龍驛吏二符隨表上詣玄都具其亡者多寡請降真吏以符傳符其二符書篆之時以輕黃輕青為地丹砂書之焚香仰奏虛皇道祖望正北斗口相對有太尊寶星天皇寶星搯玉清訣書訖取氣吹符可以傳符隂司釋罪亡爽無不感通告下救苦長生靈符宜以柏木為簡蓋叢柏之尊天降靈氣秉植萬年人夀之貴三元所領九地之最形比金玉萬靈所衛萬木之中以椿為木王凡屋宅聚木之所有感妖邪之氣者當以椿木為梁棟其怪即巳以柏木為相秉天之秀氣受正萬年靈司稱金木之體地府貴生成之簡故古之為棺槨柏木為之者免三塗之投虛皇寶籙云以柏木為簡者代金玉也世間多用梓木乃煞氣之木非正不能生成亦違戾寶經之科永不可遵用其簡長九寸者法九天九陽之數出九隂重泉乘九陽九氣而升天也闊二寸四分者象三部八景具二十四神靈氣也厚二分象隂陽交泰之位備天地造化之理封以青囊三官所貴青始之色焚於青煙之中不可以雜煙混淆正氣當齋戒焚香以九煉丹砂面東書篆對三寶依科告行始合符節近觀世學昧於古科多以黃紙模印貼於板上上玄愍茲群魂沉於幽極深恐符簡不合元格悮其亡爽超度專遣靈官告戒云黃籙九幽功不殊北隂全賴二真符若言用紙模翻寫還得髙穹罪爾徒况兼文篆差錯書篆不謹全虧法式隂關主者竟不遵用兆宜謹之玉策曰衆生領祖太元靈源清淨從虛稟氣構形受神幸覩宸暉不能自貴氣緣物假妄起塵情神鬼用謀心勞日拙氣雕神逝難復本初五纍牽纏受毒幽壤或在五嶽大川九幽都府城隍社令泉曲河源或托孤蔭依仗邪物遊從野道附巫興妖執繫妄心罔悟宿命境緣善對形異神遷心與形俱旋環不息巍巍人道惟此自窮太上慈仁常善救物頒符曲府昧爽咸恩息熖火山解負宿命宸波曲湛更煉還人又云若夫普為九幽孤爽億劫宗支大醮天地歸命玄真者師當啓聞三境申聞玄師關告地司次作黃籙大齋陳醮謝儀凡篆符當入靖焚香啓聞三境對東北以柏簡朱篆救苦真符背書元始符命青紙袋封之具髙功位命茭龍驛吏馳告十方無極世界告命作五行舊本有六行乃上皇甲申運告行猶今所書歲次甲子是也今作舊本入年月日為六行以天篆闕支干等又不敢以世書混間真筆可權移年月告行一行書於簡背青紙封上以元始符命救苦真符告下十方無極世界作兩行於銜位之上然後召茭龍驛吏同金錢繪龍焚於烈熖中玉策云按真誥紫微王夫人答楊司命問書云請陳為書之本始如三元八會之書皇上太極髙真清仙之所用也雲篆光明之章今所見神靈符書之字是也華季之世共作巧末趣徑下書皆流尸濁文淫僻之字含本效假是囂穢死迹爾夫真仙之人曷為棄本領之文迹手畫淫亂之下字耶今長生符內四十七字并二符告文舊皆雲篆光明之章後人不知真凡用書之異直以世書代之得不上玷真逸之文下虧有禁之格哉玉策云命茭龍驛馳應謂不用文引只以符傳符今之行者若未能感動玄靈可以作請關篆驛吏符於關尾庶克逹命於寒司也或取新茭縛象龍吏納其符於身中使負簡文亦須別作疏狀告齋酆都不可不啓奏上玄不召驛吏直以私意率易宣告此符正猶人間赦命非臣下之所敢專也故須大醮天地方可行之玄師曰三十二天有飛龍騎吏玄都有驛龍騎吏故經云金龍驛呈承受信令或乘天馬或騎天蛟或駕金龍金馬宣告三界十方頃刻之間悉皆周遍茭龍驛吏符玄師曰泰玄都有茭龍驛吏一十二萬人主傳命泉曲開光赦罪凡告救苦真符當啓玄尊玉帝關召此吏一人書符時玉帝訣鼻師曰氣芒各類清濁異歸凡取三引光五星之芒各以鼻引口吐也生旺雲煙之氣當以口吸隨吹也引吹吸時勿使耳聞耳聞則氣芒不降又不可長引則喘息失度要在精傾注念馭氣合神於杳冥之間則引吸隨念感降自然也北極星光此北極星非斗中第六武曲乃天皇之右北極天樞星也繞筆墨書黃上紙以槐花染輕黃存思焚召驛吏屆前符納於茭龍之身中大上玄都敕命洞徹慧光泉隂遍照幽夜光明永辭五苦九龍符告斷絶地根何敢不隨飛度五戶三官赦原茭龍布信亡魂開泰符到速追性悟神飛風火律令羅酆速依右召玄都交龍驛吏一人齎持元始符命救苦真符開光赦罪一如告命若先行符則用此右語若只連符於關子丄不必用關式壇額今凖元始符命救苦真符拔度某魂出離幽夜者右關茭龍驛吏一人齎持符命速達羅酆拔度死魂昭示宸貺年月日時關具位姓某押金龍驛吏符玄師曰泰玄都有金龍驛吏二十五萬人主領符命魔天道馳信凡告長生真符預關一人丹書青上搯玉皇訣鼻引太尊星芒自南北望太尊星在斗頭中下台分中微向北也太尊北有四星勢如軍井南有少微如亢宿其太尊色黃而明要知在北斗璇璣二星之南也繞筆而書如前焚召凡取北極太尊二星之芒須候入夜星朗時取之為得其真太上玄都敕命通幽金光徹關普照洞煥重泉玉眸煉質黃華蕩形亡魂受煉超度三天真風普扇慈雲接身告命一下風火金龍負驛交馳一依律令急急右召玄都金龍驛吏一人齎持元始符命長生靈符超度亡靈某徑詣南宫一如告命關式壇額今凖元始符命長生靈符超度某魂上登朱宫者右關金龍驛吏一人齎持符命徑逹南天超度亡靈昭示宸貺年月日時關具位姓某押右二吏隸天猷所部欲請降當先述意申元景丹天府能併申四聖亦善以天蓬主攝魂佑聖常拯沉淪故也茭龍銜符遣符呪曰地府茭龍救苦真符追取亡魂早離酆都來朝太上得升天宫急急如玉清上帝律令金龍銜符遣符呪曰火府金龍長生靈符超度苦爽徑出幽都覩見光明上生南宫急急如玉清上帝律令明齎簡非龍童龍吏狀如力士今人悮作童子考之經云亡過之人若能受持金籙白簡九真妙戒長生靈符救苦真符察命童子護戒威神五帝直符六宫掾吏自當隨逐簡文覆護受戒弟子以此知不用童子齎簡是以傳流之失也靈寶無量度人上經大法卷之五十四
