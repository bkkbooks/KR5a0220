front:
  text: 靈寳无量度人上經大法卷之六十玉八
  hash: sha256:8b0b0880f342e40379592bbefa136f4a0fe321d4011f98077917a2ffcbb78886
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_060-001a, image: hfl/0096/0096-056.png}
body:
  text: 南昌受煉品皇人曰夫受煉死魂當遵靈寳本科而行先當詣聖前焚香黙奏畢次坐宣儀具位臣某以今焚香仰啓三清上聖十極髙真太一救苦天尊天樞三省五府主者三天扶教輔元大法師正一靜應真君南昌上宫長生大君九華真人南宫煉度真人南宫朱陵上帝開光尊神火府髙真水宫仙聖煉度司主宰黄籙院仙宰將吏功曹神兵土地飛天大神妙行真人九光童子八威龍文神火池神將水池神將攝魄使者度魂主吏火府功曹童子吏兵火池童子司命真君司録真君延夀益算度厄尊神廻骸起死監生大神五道大神溟泠大神煉度大神直日功曹煉度吏兵一切真宰伏願飛雲暫出於丹霄羽駕迂臨於法界五色鬱勃慈光徧燭於幽冥四象吁貟惠澤普霑於黒壤即使臣得開度拯拔幽魂今乞先賜大慈永爲證鑒發召魂符念隠諱念金闕化身天尊想引亡魂至案前伏以天地垂覆載之徳爰育物以无私隂陽推禍福之源必應人之以𩔖其有犯一不義行一不仁明固未免於人非幽實難逃於鬼責故若男若女爲庶爲官事君事親治人治已儻若背二儀生成之造昧三光臨照之明報國靡盡於忠勤居家罔竭於孝養驕奢淫逸而不遵恭儉諂諛僥倖而弗守中庸邪佞嫉妬而正直罔聞殘忍殺害而仁恕不立妄言綺語或變亂於是非曲意偏心而讒誣於良善冐干榮禄則薄功而厚享黷于貨賄則苟取而多藏罔知性命之所自來不究衣食之所自出倚法竊柄則輕重其心依勢作威則髙下其手曽不皈依三寳愍念四生死道咎師凌人傲物呪詛毒害公肆詐欺披經典以懷疑對神祇而起慢腥膻自恣蔑聞齋戒之儀香火不修寧有潔誠之薦凡此數端皆地獄之種子乃塵劫之迷因唯務自營謂長不死忽爾五行數盡大限時臨塜訟徴呼寃仇執對咎殃交至疾病縈纒或墮夭傷或經産厄一切横夭百種非亡永夜不陽獨抱憂愁之苦流年如逝尚縈考治之科况乃更生之未期雖欲自新之无路若非投依三境至尊丹天大帝朱陵火府煉度真聦孰知大道之好生用救群迷之極苦今者亡過某人叨居塵世未免凡身其於俯仰之間寧无愧怍之事由是身口意故起貪嗔癡縱有如前之咎愆全假從今之拯拔三塗困滯九壘拘囚咸仗薦修悉臻解脫恭惟大羅元始靈寳慈尊顯龍漢以蕩蕩示玉眸以詵詵大推眇眇劫仭之功以施巍巍大梵之徳敷五篇於碧落畢濟含生垂八角於朱陵悉度群品俾死魂之受煉獲仙化以成人乃以赤文靈暉丹天祖炁勑九光之童子命煉度之真人攝召幽魂埏鎔流火當使寃仇燼滅業垢烟消遂髙歩於朱宫乃垂名於紫策今辰謹依大法煉度魂儀恭奉行持仰祈真應再上香念十方救苦天尊執元始符命臣聞靈寳本章追度亡爽十回度人九冥隱韻開化自然空洞降靈太虚生神總治法象綂歸三元瓊宫大聖髙居帝尊敷弘至妙考校因縁元始符命下拔幽扃普救衆生追度祖先上詣朱宫切告三官嶽瀆靈洞十二河源赦除罪爽不得稽停大會玄都速召萬神中有東極宫中尋聲赴感太一救苦天尊中有度魂化形之君中有太冥煉尸大神中有大慈妙行真人中有天機好生文昌延壽益算度厄尊神招靈玄都无量度人今日校録諸天臨軒謹召十方威龍大神皓華大神玄英大神煉度大神變身大神復相大神正精大神火府大神返形大神返魂大神超生大神光明照耀洞朗諸天神霄上相仙伯陶公執籙把籍齊到帝前普度衆生上世亡魂敕攝鬼帝來聽教言酆都洞隂司禁侍郎各持黑簿削落罪根不得拘留逼合鬼群所有元始符命謹爲關行臣无任懇禱之至謹言念太一救苦天尊執度幽魂符上香臣伏聞長生大聖飛天神王當赤明之初劫會始青於上天山嶽吞烟承靈寳之隱韻鬼精滅爽振妙首之靈章施廻骸起死之功著監真度生之徳尋聲赴感隨願往生伏請長生大聖飛天神王齎元始之符命赦北都之罪魂使亡過某人獲制魔而保舉得時刻以昇遷侍衛送迎咸計日而受煉遨遊劫刃之臺證果洞玄之妙不經地獄俓上南宫脫五苦八難以逍遙薦九祖七玄而快樂請无拘制克副玄科臣无任懇禱之至念火煉丹界天尊伏願飛天神王使者吏兵等一如昔日始青天上浮黎法會之中不忘元始天尊教戒之言伏爲開度亡過某人死魂受煉仙化成人生身受度劫劫長存一切有情俱登道岸念朱陵度命天尊上香兩手中指中文召神吏謹召丹天左衛大將軍直日功曹使者地道功曹黄籙院功曹丹天童子追魂主吏聚魂功曹攝魂將軍煉魂使者火池水沼神將人府神兵煉度司神將來詣壇所當職謹奉道旨煉度死魂爾等威神當爲處分泰山五道城隍主者地府隂神引魂官吏疾速恭依原赦攝召亡過某人前到壇所以憑煉度念煉度南宫天尊先搯左手卯文云都功成東炁吹彈次搯辰文云興生轉西炁吹彈次搯三塗訣云可韓明南炁吹彈獨𨽻遷北炁吹彈對魂聚魂公都聚魂攝中央炁吹彈焚玉諱畢即吸鬼門炁吹却取東南炁吹亡魂即剔訣次再輪訣黙念勾神訣化五帝符訣祝曰青帝護魂保鎮三宫搯震文云紅杏存吸東方青炁九道在口運自己肝炁九道入口相交連訣吹彈符中赤帝養炁萬神歸身搯離文云墨黒存南方赤炁三道在口運自巳心炁三道入口相交連訣吹彈符中白帝侍魄冶煉隂邪搯兌文云磨真存吸西方白炁七道在口運自己肺炁七道入口相交連訣吹彈符中黒帝通血萬神保精搯坎文云襪臈存北方黒炁五道在口運自己腎炁五道入口相交連訣吹彈符中黄帝中主萬神无越搯中指中文云靈寳存吸中央黄炁十二道在口運自己脾炁十二道入口相交連訣吹彈符中焚淨天地符洒甘露誦解穢呪曰神靈天真玉液元津上清華房元始老君妙入太霞光耀玄文七神飛泉北酆受烟我位上王逼合鬼群八威吐火肅爾尊神千千去穢凶惡不存萬萬魔王保命護形急急如律令次念火呪三徧化日君符念畢指撝神將引領亡魂赴火池煉質再誦火呪三徧次念隠語一徧次火池内燒流金煉形符焚符呪曰陽明景精火煥紫庭八芒朗映魂魄溢盈五回三轉炁通太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御五景水母灌津順天運炁隨日華榮九孔納冥解脫本形急急如靈寳大法煉化成人律令次念水呪三徧化月君符呪曰耀羅丹陽元景敷陳赤爐大明九炁齊并三五運精二象交纒玉胞石體煉故返新流霞玄注水母凝神和魂柔魄内外同烟仰餐月華口啜日根靈芝盈溢面發金仙與月同幹與日同存乗景飛空上造帝宸次焚九陽符十二道次焚十二神將符念畢指揮神將引領亡魂赴水沼蕩形再呪三徧及念隠語一徧水沼内燒令形符今則亡魂某濯質明池煉形流火一切汙染悉獲蕩除五濁穢軀盡歸涓潔魔无干犯身有光明今則恭詣壇前受洒甘露領諸功徳以遂超生念法雨普潤天尊次宿命讃悲夫長夜苦熱惱三塗中猛火出咽喉長生飢渴念一灑甘露雨如熱得清涼神魂生大羅潤及於一切次念天氣呪曰天澄炁清五色髙明日月吐輝濯煉身形神津内盥香湯煉精光景流曜煥映上清炁不受邪五臟納靈罪滅三塗禍消九冥惡根斷絶福慶自生今日大願一切告盟普受開度昇入帝庭次發符籙并合用牒伏以亡魂奄歸長夜永隔陽光今某人追念逝川冀登道岸罄瀝哀號之懇修崇薦拔之科廣設清場備臻妙善懴愆贖罪煉質遷神業垢既巳蕩除靈識遂當明了然後身度我界依入自然依仗真風永契虚无之妙受持寳誥克臻廣漠之遊悟本性以逍遥達𥘉心之清靜天香不夜散花大渺之堂洞景長春舞轡大羅之境親朝元始面禮丹皇瞻瓊輪羽蓋之儀仰金闕玉房之範永超劫運更不輪廻即叩壇前受領功果念超度仙界天尊念隠語一徧搯超度訣燒符靈寳无量度人上經大法卷之六十
