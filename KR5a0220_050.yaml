front:
  text: 靈寳无量度人上經大法卷之五十水十
  hash: sha256:39a8feb20d1fd9cc8f05403849f9d1ecf389f8af886d360f1fccee4765605ea0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_050-001a, image: hfl/0094/0094-120.png}
body:
  text: 然燈破獄品取太陽火玄師曰昔祖師所說三元簡文然燈科式最爲禁重而重隂一照萬苦停辛鐵獄無窮蒙光開爽黄籙科九幽齋儀有囘耀輪燈九卮神燈九獄神燈破昬暗於長夜照苦爽於三途假天象之慧力分上聖之威光照徹寒扃普開冥壤當於然燈之𥘉法師以丹砂書慧光符先於日正中時念囘耀神呪以陽燧取太陽正炁於天尊像前明燭一炬至夜大法師與侍燈法帥二人立於像前九拜叩齒九通祝黄籙齋意又九拜大法師長跪微祝分燈慧光呪三徧叩齒三通執符取聖像炁吹符在天尊前分請燈光進三歩二侍燈法師再於法師前分請燈光成三炬方始分序明燈於三所都畢執殘炬并爲一枝大法帥執殘炬於像前再九拜退如此然燈光照徹於冥隂使幽爽立度於開泰然燈膏油無犯腥穢勿致不潔全須豐滿以自終馬慎勿吹撲分燈破暗儀伏以混元一炁帝開黄演之門玄照九成章者自然之格三張一隱一立三全布化人天恩流宇宙旋借燈輝之耀實從浩炁之先體羊角而順行按璇璣之網建上照九天則三光増耀下輝九地則庶獄停酸利及幽冥恩霑水陸伏願元尊開化頒詔帝師謹以分輝虔誠讃詠念大聖元始天尊請元始前燈誦呪曰元始一炁皇曽幽寥混合空洞渺離本條大通玄戸鬱降神霄以陽以隂胞命神交萬真和暢啓諸天朝九天符命億劫神超伏以元始分輝降道而爲帝續玉京内煥垂光以接師壇精以入神一以生二恭伸虔懇開化飛玄念大聖靈寳天尊請上清前燈誦呪曰帝真始明伯史元精單靈導炁内守身形太虚會應天地合明元功元吉二景生神今日演化上昇帝庭伏以三生萬物總祖炁於虚皇皆見十方俾群迷之開化師光慈度有感必通法力昭彰无幽不燭分清輝於三界現尊相於萬方稽首嚴恭諸天歡悅念大聖明皇天尊請太清前燈誦呪曰飄飄帝師駕落落翠玉尊胞胎魂魄命三部八景分中虚得長夀稽首玄上門太微廻黄旗无英命靈旛攝召長夜府開化受生魂燈光普照天尊伏以虚玄削死憑寳耀以燭幽玉簡成壇闡法橋以開度神光煥耀幽夜昭明壇衆同誠分輝下土皇人曰凡欲薦拔隂靈點破暗之燈須得慧光之法方能以三光之慧按凡火之光庶可追攝受度如無此法即是凡火之光不能超脱其法當於正齋之日午𥘉西南焚香對太陽吸炁吹筆再拜長跪書十二道應發燈光皆用此符分燈慧光符九日之光停六隂之炁元始午朗耀圓極反陽慧光靈寳慧光五星正炁月爲皇華炁灌列宿熒煌七元日爲陽暉炁注權樞玉晨之炁玉虚之炁玉皇之炁三台煌煌天中尊仰幽幽冥冥酆都沉淪陷溺二途受苦遭刑天尊慈慧光破重隂昏翳蒙照日月光明沭遇惠恩返生天堂右符長九寸朱書黄上玉清訣東方炁吹黄蠟鎔布符之背裏撚作火炬用之三景慧光符九日日華童十月月光童七星子九陽之光子月光之輝太一光照北極星光玉清天尊慧光上清天使者阿陀龍羅尊慧光太清天尊慧光三光合晨清微天禹餘天太赤天下照幽極三天正慧光景合離天寳靈寳神寳道諸天親慧光億劫種經師力普明寒池親一覩光明飛升天一作三天上帝十方慧光毫明庭天元天尊普化威儀救拔苦識日華香燈无𧇊百萬魔火毒月華神煇无期王拱手消翳地獄幽魂九泉太一中斗綂攝傾摧得度披靡光照九地八極急急如律令呪曰天尊慧日照破重昏三光輝映洞燭乹坤苦魂沉尸咸沐光明二景无窮慈慧長存右符黄紙朱書三光真炁吹入符中破九幽祕訣皇人曰夫九幽者乃北斗九元之所化幽獄也分布九維東曰幽冥南曰幽隂西曰幽夜北曰幽酆東北曰幽都東南曰幽治西南曰幽關西北曰幽府中央曰幽獄是名九幽且幽冥者乃東方震卦九炁之所化凡發生蠢動莫不待風雷之所驚故東號風雷之獄幽隂者乃南方離卦三炁之所化凡火數至於午爲陽極隂生之道故南號火翳之獄幽夜者乃西方兌卦七炁之所化凡一日之光没於酉位爲金方殺伐至剛之道故西號金剛之獄幽酆者乃北方坎卦五炁之所化凡水數至於子爲隂極陽生之道旺於子故北號溟泠之獄幽都者乃東北艮卦梵炁之所化凡炁候至於寅艮爲温柔發施之理木數之所生故東北號鑊湯地獄幽治者乃東南巽卦梵炁之所化凡火氣至已爲至旺之郷而有鑠金鎔銅之熾故東南號銅柱地獄幽關者乃西南坤卦梵炁之所化爲西方肅殺之候故至人門之郷多生貪殺之心故西南號屠割之獄幽府者乃西北乹卦梵炁之所化爲天輪運轉之象故西北號火車之獄幽獄者乃一炁之所化是中央土皇之所掌爲中央總制之法故中央號普掠之獄此九幽之獄分布九州各一社令主之凡子丑生人皆属北方溟泠之獄午生人皆属南方火翳之獄寅卯生人皆属東方風雷之獄已生人皆属東南銅柱之獄未申生人皆属西南屠割之獄酉生人皆属西方金剛之獄亥生人皆属西北方火車之獄辰戍生人皆属中央普掠地獄夫行攝召之法先明九幽之獄而能破其幽暗可度亡魂如或不明其獄則何以取攝哉其破幽之法訣盡總左手搯中指中隨方化身取本方炁而吹彈東方則存身爲玉寳皇上天尊南方則存身爲玄真萬福天尊其餘方各隨聖位存想東方則丁罡九步南方則丁罡三步西方則丁罡七步北方則丁罡五步四維則丁罡並五𡵯中央則丁罡一十二步皆取元始靈寳祖炁三色之光而照破之仍須存五帝策杖化爲上帝節杖有金童玉女左右各一十二人手執寳幢上有金書玉皇赦罪天尊其遂方獄各存鐵城萬丈羅網交加黒霧沉沉穢氣蓬渤銅蛇吐𤔵鐵狗噴烟鬼卒夜叉各守門鏁存兆身在百寳光明中接元始三炁逕衝其城見鐵城頽毀刀山斷刃劒化騫林火山息𤔵冰池靜波吞火食炭變成甘露鑊湯停沸金鎚鐵杖變成遵花獄中罪人隨幡所指光明所照枷鏁自落罪苦咸原俱悟本源寃仇和釋獄卒擎拳並皆稱善仰嘆天尊魂識拔度並隨光明而出幽冥之界也九獄燈圖玄師曰法天像地方圓爲式九幽隂曹主罪憲職羅酆東南是其所也按太一聖真之科以土九石作壇九所方靣二尺九壇自方六尺以法地之隂極二六之象每壇作四圍三曲如獄之形一壇明燈三烥九壇共然二十七燈於壇正東立遷神寳幡又於九壇之中心立牌並面書玉清破地獄真符背書獄名傍立青竹九竿各長九尺各掛小幡一首書十方靈寳天尊聖號於幡首書酆都符俟破獄之時侍燈法師宣破獄儀逐方用度法師執靈寳策杖詠破獄呪衆和十方救苦天尊即就燈燒化符并幡於獄上法師以策杖擊破地獄八方都畢至中央并燒二符二幡餘同諸方破獄法並搯玊清訣存黄色之雲覆於一方存自己作天尊之形儀每獄皆叩齒九通於呪之前後如此則地獄開亡爽登真也三十二天帝燈九獄燈幡天尊號玉寳皇上天尊玄真萬福天尊太妙至極天尊玄上玉晨天尊度止上聖天尊好生度命天尊太靈虚皇天尊无量太華天尊真皇洞神天尊玊清破九獄符朱書青旛之首身書本方天尊號兩手分書九獄符告文兩足書上清寳籙真符告某方某地獄書符時左手上帝訣念開光呪七徧取炁吹筆再誦本呪一徧閉炁依次書符畢再以本方呪敕之開光呪曰三星煌煌元始開光有罪無罪得赦諸方急急如律令上生天堂東方風雷地獄玊真之符三陽妙炁之光纒結氷破風雷九壘禀令告文九炁青華光耀風雷玉寳慈尊摧戈毀戟扶晨通照魂昇太微神識受煉享福无期一如告命風火驛傳呪曰青陽青帝震宫之精流光下照洞徹幽冥摧破地獄風雷悉停急急如律令敕南方火翳地獄玄真之符六陽之光照煥隂獄火翳玄敕停焰奉行告文三炁丹華光徹火翳萬福慈尊蠲消火池化成清圃甘涼瑩肌苦魂承恩逍遥无為一如吿命風火驛傳呪曰南閻赤精離宫耀明下照萬重無幽無冥火翳停焰深熱得清急急如律令敕西方金剛地獄太真之符四炁合陽分隂金剛摧毀成化冥曹禀遵吿文七炁素華照耀金剛太妙慈尊摧鋒滅芒刀化騫林劒變栢桑魂魄受度與日同光一如吿命風火驛傳呪曰白帝剛騎追斬妖魅乘炁驅除飛戈走吏下破剛風救護一切急急如律令敕北方溟泠地獄上真之符五炁順度玄光溟泠變温合真幽曹奉行吿文五炁蒼華光徹溟泠玉晨慈尊冰消雪城温生寒廓毒汁澄清魂獲妙果飛升香林一如吿命風火驛傳呪曰重隂冥冥黒龍持符俓達重泉罪無久拘北帝有命違者必誅急急如律令敕東北方鑊湯地獄仙真之符梵炁定極斗運璇璣鑊湯停沸九府除名吿文梵炁晨華徹照鑊湯度仙上聖威感无方沸湧澄息化甘泉漿亡爽生神遥昇天堂一如吿命風火驛傳呪曰幽隂之境罪業之門鑊湯煮漬考掠罪魂符命一下善惡悉分急急如律令敕東南銅柱地獄度真之符斗魒真炁銅柱摧折囘度混康隂府消愆吿文生炁之華下照東南銅柱摧落炎燄息閒好生度命普濟無間苦魂解脫昇度玉壇一如告命風火驛傳呪曰九龍符命下入重泉積劫滯魄无路可宣銅柱之苦咸賜赦原急急如律令敕西南屠割地獄寳真之符六真分布囘尸屠割停考返生隂府咸原告文黄華月輝透降坤維鐵城摧毀屠割停威虚皇慈尊保度浮黎罪魂登甦劫刃擕持一如告命風火驛傳呪曰三光普照幽冥易開積釁不原萬劫可哀免離屠割獲登天臺急急如律令敕西北火車地獄命真之符九炁肇動咸覩陽光火車俱住萬靈根伏告文天光景色祥華敷光无量慈尊除釋鋒鋩火車推毀塗炭消亡焦骨爛皮再生清涼一如告命風火驛傳呪曰炎炎之心重重之罪火車輪轉受此苦會符命一達九幽罷對急急如律令敕中央普掠地獄真陽之符四正四真隂尸九煉萬炁四炁四明返朴真如灌溉告文三晨玄景洞照普掠真皇慈尊除落考掠金鎚鐵杖應時消鑠百苦停酸魂獲快樂一如吿命風火驛傳呪曰乹坤交泰二炁感通元始符命萬聖咸從一切地獄永扇慈風急急如律令敕九獄燈符東方南方西方北方東北東南西南西北中央請策杖破獄伏以聖徳巍巍位列九清之籍神功赫赫威降六洞之魔普度沉迷賛揚造化恭惟玄中教主靜老天君至仁不測大道難名愍兹幽暗之塗示以哀愍之路請天尊之敕杖開除苦厄之關舒太上之慧光盡照泉扄之府恭依大法是仗真符願乘吒咤之威下破酆幽之獄臣干冒聖威无任懇禱之至稽首再拜五老策杖天尊慧符金簡玄籙通幽破塗大慈悲愍罪苦咸除靈寳无量取救迷愚敕符一下含靈咸甦玉清慧光符破獄用之元始散耀靈寳陽精一炁諸天鬱儀之君光囘九地暉破八冥太玄隂境炎火熱惱引結璘之神廓照生明日月星合精六合破暗炁神内外生明破獄秘呪唵俱祗知常阿勒薩曇波伽婁伐夜婆吒吽訶破東方風雷地獄呪曰九炁生烟玉寳慈尊皇上正炁流降冥空雷電息威偃消迅風戟戈摧折罪惡傾崩元始符命昇濟魂宗破南方火翳地獄呪曰三炁丹華萬福玄真吹吁陽光拔度苦魂火翳頓滅炎生靈風炮炙途炭法雨慈雲惠光布化罪考消蠲一如告命群靈敬聽破西方金剛地獄呪曰七炁素英太妙至極金光寳耀普度魂識鐵杖考掠永使脫離金鎚刀叉應時消摧天慈赦宥無敢有違魂升太素逍遥神儀破北方溟泠地獄呪曰五炁玄精玄上玉晨九和陽光普濟靈魂清香周布惡穢散氛冰戈霜刃消蕩其根九天道炁永除寒扄罪考解脫俓上南宫破東北方鑊湯地獄呪曰鎮劫保運神景慈尊化形救苦度仙上聖惠澤流布鑊湯滅爂沸煮火爛復形端正湯化甘涼蓮生青柄永出苦獄普登元應一如吿命鬼官敬聽破東南方銅柱地獄呪曰生化梵陽一炁好生度命大聖普度元窮焦爛生肌熱惱散衝炎燃銅柱永滅无榮苦除罪考上升仙宫破西南方屠割地獄呪曰坤蠡虛皇太虚髙明景色元輝下照幽宫風刀割切摧刃剉鋒罪魂零落肌復神冲永滅荼毒隨證仙宗破西北方火車地獄呪曰乾靈玉真无量太華天元正炁廓照无涯火車毀輪消滅踪瑕潰爛腐魂變形玉葩神聚魂凝上詣仙家破中央普掠地獄呪曰上元玉虚明皇紫宸下洞九淵真皇洞神惠慈二光普度亡魂刀山劒𣗳立化騫林考掠苦毒俓除酸辛鋸解倒懸永不由經鐵城破敢鬼官遷真億劫罪爽普度朱陵十天告命群靈奉聽敢不從命列奏玉宸納杖祝文伏以蕩蕩至仁曲示慈悲之典冥冥長夜咸蒙救護之恩恭惟玄中教主靜老天君道徳崇髙人天咸仰九幽罪籍已消除於寳炬之光六道輪廻永悟解於真常之理盡此有生之象歸依无極之真恭還策杖於靈壇益固威風於萬代臣無任荷恩之至稽首再拜收燈祝文伏以二象分形五行肇判旋斡至陽之炁融成神火之炎光芒布而可以燭昧達幽輝焰彰而可以破昏釋暗變通至大功徳元邊上聖真人性天明而蔑有昏蒙之累庸流濁類塵勞蔽而因成黒暗之愆是以太上開慈悲方便之門可使沉魂見光明快樂之路三元寳籙示然燈品格以居先九夜昏衢破暗功徳爲最勝恩霑无量利益有情是辰謹有某今則齋功圎備善果均霑皆由照燭之神輝廣濟幽沉之苦趣亡識已尋光而見道幽關覩寳炬以停囚自一燈而至九億燈續光明而无盡從此界而越大千界流福善以无窮謹遵玉簡之科請覆金蓮之焰恭願亡過某千生罪垢隨落燼以俱消萬劫殃纒逐傾光而盡滅身度光明之界永離黒暗之郷收燈呪曰至隂開光長夜續明太陽已朗八威開清燈還太隂光附景生曰月二真與我合年回向伏願邪心消滅不効死灰之復燃性地圎明永並陽暉之洞照靈寳无量度人上經大法卷之五十
