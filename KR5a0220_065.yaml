front:
  text: 靈寳无量度人上經大法卷之六十五出一
  hash: sha256:a7e4da635c53e1d626ede4c16af964a2c805bbb56a25ae34037e99ce7bc929b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_065-001a, image: hfl/0097/0097-004.png}
body:
  text: 九錬生尸品九巵生神明燈科燈符如後伏以混元本始藏三炁於太初神景含暉布九天於霄極大塊旣判元始開圖神滋惠靈炁分羅絡恩垂下土法度人天是以金籙示科雲編開敎紫微玉寳光明空洞之中東極碧霞變化始青之上本形如印煥爛八方文彩垂芒廣長一丈祕九重之金格耀七寳之騫林妙炁結成靈風鼓奏壇司得請許接引以宣行幽閉蒙休獲開明而度化今有某人披心大梵稽首太玄願垂五色之光暉照破九幽之隂獄伏願萬仙翼從六領前祛分善惡以定民回人天而向道周行不怠普度无窮昇入无形與道合眞謹然東北巵神燈布帝眞胞命元元二黄演之炁伏以旋斗歷箕羊角出扶揺之炁九和十合碧霞分羅絡之文懸居長樂之福堂下有朔單之隂獄歳之自始物所成終今之夜謹然東北巵神燈施鬰單无量天生神寳章伏願天寳金書混元祖炁開光龍漢照燭重隂凡夫克獲於飛仙枯骨還生於人道昇入无形與道合眞度仙上聖天尊次焚符旋遶誦鬱單天章謹然東巵神燈布帝眞胎命元洞冥紫戸之炁伏以帝出乎震首歳徳之發春物植乎東宅嵎夷而賔日木司九炁箕主七辰翠羽華林中有開明之童子碧霞玉闕上對始青之老人今之夜謹然東巵神燈施上上禪善无量壽天生神寳章伏願象輪布化龍頷垂光遊行三界之中下赦萬生之罪昇入無形與道合眞玉寳皇上天尊次焚符旋遶誦无量壽天章謹然東南巵神燈布帝眞魂命元長靈明仙之炁伏以陽上東南象重明之烜赫巽乎中正言萬物之潔齊處江海而不爭鼓風雷之相薄在元福用賢之界有好生度命之尊今之夜謹然東南巵神燈施梵監須延天生神玉章伏願停駕廻光隨機應化掃除五道詣長樂之清都過度三塗到眞常之妙境普令萬彚俱入大乗得道之後昇入無形好生度命天尊次焚符旋遶誦須延天章謹然南巵神燈布帝眞魄命元碭尸冥演由之炁伏以三炁天中赤帝號丹靈之老重陽宫内玉文錬流火之庭當萬物相見之時保億劫無終之運尋聲救苦應感分暉今之夜謹然南巵神燈施寂然兜術天生神玉章伏願億曽受度鍊以玉膏九族同仙賜之金液北府消大魔之試南河制洪澇之災普入光明常居福慶得道之後昇入無形玄眞萬福天尊次焚符旋遶誦兜術天章謹然西南巵神燈布帝眞藏府命元五仙中靈之炁伏以坤與載物未申居地勢之中梵炁流罡參井居森羅之右廣運太虚之德髙臨仁靜之郷萬寳裝嚴百方威伏今之夜謹然西南巵神燈施波羅尼宻不驕樂天帝生神寳章伏願億萬分暉百千應號校九府死生之録開八方罪福之門至賤至微普登道岸無窮無極俱轉法輪得道之後昇入无形太靈虚皇天尊次焚符旋遶誦不驕樂天章謹然西巵神燈布帝眞靈府命元髙眞沖融之炁伏以金靈皇老空青鳴紫宇之林玉國西那鬱刹峙浮羅之嶽八威煥爛七氣氤氲星分太白之精治在少隂之境今之夜謹然西巵神燈施洞玄化應聲天生神寳章伏望衆聖臨軒諸天慶駕九幽開夜騫林咸返於舊條十轉回輪福會更生於來運凡居法界盡入玄門得道之後昇入無形太妙至極天尊次焚符旋遶誦應化聲天章謹然西北巵神燈布帝眞元府命元高仙洞笈之炁伏以法輪十轉帝闕九開天奥穹窿鬰化精於三變乾元剛徤應君德之六爻位九五之尊稱居重陽之極數不言而應有感則通今之夜謹然西北巵神燈施靈化梵輔天生神寳章伏願種民主品梵行開生燒香散花同詣壇所執籙把籍齊到帝前絶六趣之惡根興五門之善念得道之後昇入無形无量太華天尊次焚符旋遶誦梵輔天章謹然北巵神燈布帝眞華府命元眞靈化凝之炁伏以元冥五炁坎爲天一之精黒帝𩀱皇辟總太微之景四時成歳萬物所皈玉壟神丘隱眞空而返照青裙羽䙱凝妙寂以居元今之夜謹然北巵神燈施髙虚清明天生神寳章伏願慈周永劫惠逮有生定水清泠制萬精於鬱絶玃天豁落束六鬼於羅鄷道德興隆人天共慶得道之後昇入無形玄上玉晨天尊次焚符旋遶誦清明天章謹然上巵神燈布帝眞嶽府命元自然玄照之炁伏以至聖至眞五境出三羅之界无巓无頂八方朝七寳之宫統皇上之天元鎮中央之地極威光翼翼神德巍巍今之夜謹然上巵神燈施无想无結无愛天生神寳章伏願无爲大道上帝尊神住慈悲善巧之門現微妙光明之相一身受福得爲金闕之臣九族蒙恩俱入紫虚之會得道之後昇入無形玉虚明皇天尊次焚符旋遶誦无愛天章燈光無盡天尊次宣九天尊表向來宣布九巵神燈懴祝五苦暗障伏願八會九光安天鎮地三塗五苦出離幽冥錬化萬生恩覃宇宙功歸南上刹利仙翁更願飫沾上善悟三界以俱空得證九壇度群生而普見催攝度魂符三台煌煌三天正炁召魂帝勑急召聚魂攝魄魂攝君急攝見返魂攝魄九炁瞿曇君急攝見君急受度元炁陽符三元正炁魂神開度君急受錬君急度魂身入光明黄炁陽精符禣桑炎帝光布天帝合明精明三景回傾精神光轉日有中藏炁爽五行重光陽精日耀光彩混合二炁陽炁炎昇玄元交并東井黄華澡魂鍊魄津金醴玉日月髙奔右符青紙黄書出洞眞金根經名曰黄炁陽精洞明靈符叩齒十二通面東卯訣書符呪曰陽藏隂生二炁交周天元混合三五應符服御黄華靈降其軀長享景福與道同休度巳九玄叅駕飛浮祝畢放黄華水中上元重明九斗陽芒火鈴眞符右符詳具立成儀東極青宫九龍符命稽首三皈依紫陽開長樂天宫玉匱重昬過朗日啓金光降神慧大慈仁者勑九龍使者青玄青玄童子救苦眞人靈官乗龍下降法雨慈雲吹灑地獄九幽罷對承兹六道停輪天澤出一七幽魂飛升十方天尊隨念升降應化沙塵救拔亡魂執符奉行上生福庭急急如青玄天尊勑右符詳具普度符告品九錬旛本炁符玉清九天慶雲火府隱文一名玉篆雷文髙上眞王玉清寳籙玉篆雷文普告南昌上宫鍊度注筭眞君酆都冥獄諸治典吏咸使聞知鍊度亡過某人消滅罪戾開泰泉扃蕩除隂翳調理隂陽制魔保舉度品南宫死魂受錬仙化成人永離三塗五苦八難超凌三界逍遥上清一如告命右符有雷嗔之人及犯刑法者用此符并孤魂亦用之返眞符本治天堂玉簡金符五文開廓永度三塗疾除普植神靈禍消九冥罪簿落滅惡根輪轉无色死魂受鍊總炁上元時刻昇遷身度我界體入自然傾光回駕神識洞了監眞度生身乗紫雲神霄玉簡三天符命上開八門三十六獄執出一十治治官速詣帝軒解宥宿罪超度亡過某人上昇神霄玉闕之天復還治職炁入玄玄一如吿命風火驛傳太歳年月日時吿下青封皮神霄玉闕金符吿下東嶽上生本治天堂具位臣姓某謹封焚符呪曰九陽運眞炁鍊化即神功焚符速吿行昭感自冥通急急如九炁天君律令九天紫府内音玉符上帝符命宣吿三界天牢地獄主司大神拔度亡過某人統領符命部衞形魂上朝帝庭罪尤和釋與道合并神登玉闕受鍊長存一如吿命具法位栢木爲簡白地丹書青紙封皮誥文四行年月一行書寳誥面西北焚香長跪存九天上帝九人如帝服衮冕絳霄飛羽華裳黙奏訖祝九天生神一遍取九炁光吹筆書訖再祝一遍依前吹炁符上玉清訣於三寳前宣讀訖給付亡靈焚於青煙之中靈寳五符見鍊度符誥品九天九陽符鬱單无量天魂精祕音内諱玉佩開明上符混合元炁胞元大道通玄宣通惡根化消灌漑命門隂陽元君遏戸炁交司馬洞謡滅度轉輪形與神同混合空洞炁飛爽浮幽寥延康無期劫眇眇離本條苦魂沉九夜乗晨希陽翹大有通玄戸鬱單降晨霄黄雲凝靈府隂陽炁象交胞元結長命惡根應化消桃康合精延二帝秀玉飄灌漑胞命門精鍊神不彫九天命靈章生神神目超元君遏死路司馬誦洞謡一唱萬眞和九遍諸天朝稽首恭劫年慶此榮舊苗右謹上請帝眞胞命元元一黄演之炁九重奉爲亡過某人纏其胞使胞元宣通上徹於天以生成一如告命風火驛傳上上禪善无量壽天魂精祕音内諱玉佩開明上符洞冥紫戸開度結胎斷死飛𤣥黄房斬根禪善靈炁精鍊成容務玄列備尚生明堂混合相和胎結解根无量結紫户炁尊天中王開度飛玄爽凝化輪空洞故根離昔愛縁本思舊宗幽夜淪遐劫對盡大運通帝眞始明精號曰字元陽孾兒伯史原結胎守黄房斬根斷死戸熈頥養孾童禪善導靈炁玄哺飛天芳華景秀玉質精鍊自成容務玄育上生羅列備明堂太虚感靈會命我生神章一唱動九玄二誦天地通混合自相和九遍成人功大聖慶元吉散華禮太空諸天並歡恱一切稽首恭右謹上請帝眞胎命元洞冥紫户之炁九重奉爲亡過某人纒其胎使胎結解根下響於地以固靈一如告命風火驛傳梵監須延天魂精祕音内諱玉佩開明上符須延三雲坤儀乾象玄元炁分定位著分明梵飛玄炁炁九開胎炁返根禄道生元魂生攝炁九轉成仙須延總三雲玄元始炁分落落大梵布華景翠玉尊明梵飛玄景開度長夜魂遊爽赴期歸炁炁返故根太帝號陽堂字曰八靈君九關緑廽道胎炁生上元陵梵度命籍太一輔精延泥丸敷帝席三部八景分魂生攝遊炁九轉自成仙琅琅九天音玉章生萬神三徧列正位炁參八辰門玄關遏死户靈鎭津液源應會感靈數明道潜廻輪慶此孾兒蛻稽首讃洞文右謹上請帝眞魂命元長靈明仙之炁九重奉爲亡過某人纒其三魂使魂門鍊仙通神以達精一如告命風火驛傳寂然兜術天魂精祕音内諱玉佩開明上符寂然無色靈化景分碭尸演由空洞生神騫爽合成九轉景靈魄戸閉關嬰兒歘歌寂然無色宗兜術抗大羅靈化四景分萬條翠朱霞遊魄不顧返一逝洞群魔神公攝遊炁飄飄練素華榮秀椿劫期乗運應靈圖空洞生神章瓊音逸九霞一唱萬眞會騫爽合成家九轉景靈備鬱鬱曜玉葩兜術開大有一慶享祚多上聖廻帝駕孾兒歘以歌不勝良晨會一切稽首和右謹上請帝眞魄命元碭尸冥演由之炁九重奉爲亡過某人纒其七魄使魄戸閉關天王降仙以安寧一如告命風火驛傳波羅尼宻不驕樂天魂精祕音内諱玉佩開明上符棌集空景回黄總録命靈形具開度生魂炁鍊元藏衆眞紫戸生仙交會聖母慶年章洞幽靈翻翻五帝駕飄飄玄上門遊歩黄華野廻靈驕樂端採集飛空景舊爽多不存太微廻黄旗無英命靈旛攝召長夜府開度受生魂公子輔黄寜總録具形神玉章洞幽靈五轉天地分炁鍊元藏府紫戸自生仙數周衆眞會啓陽應感繁玉女灌五香聖母慶萬年三界並歡樂稽首禮天尊右謹上請帝眞臓府命元五仙中靈之炁九重奉爲亡過某人纒其五臓使五臓清涼五帝朝眞以存神一如告命風火驛傳洞玄化應聲天魂精祕音内諱玉佩開明上符回化无影三炁冲融斬伐胞滯心超上京鍊胎返初混化元一魄壯魂强伏諸魔王應聲無色界霄映冠十方廻化輪無影冥期趣道場靈駕不待轡朗然生神章空洞諒無涯玄爽亦爲疆練胎返本初長乗飛玄梁畜喪天眞散思候履常斬伐胞樹滯心遊超上京願會既玄玄悟我理兼忘介福九天端交禮地辰良混化歸元一髙結元始王稽首儔靈運長謝囂塵張右謹上請帝眞靈府命元髙眞冲融之炁九重奉爲亡過某人纒其六腑使胃管生津以納和一如告命風火驛傳靈化梵輔天魂精祕音内諱玉佩開明上符玄元混梵列位務猷眞仙運靈瓊房妙音冲心自怡遨翫爽魂返根五神星宿朗明玄會綂無涯混炁歸梵輔務猷運靈化潜推無寒暑乗數搆貞條振袂拂輕羽瓊房有妙韻汎登髙神所圓輪無停映眞仙參列序上上霄衢邈洞元深萬巨秀葉翳翠霞停蔭清泠渚遨翫怡五神繁想嘯明侣五難縁理去冲心自怡處爽魂隨本根亹亹空中佇七誦重關開豁滯非神武運通由中發髙唱稽首舉右謹上請帝眞元府命元髙仙洞笈之炁九重奉爲亡過某人纒其七竅使孔竅開聰星辰朗明以開通一如告命風火驛傳髙虚清明天魂精祕音内諱玉佩開明上符清明重霄眞靈煥落化凝景霞空洞振音去留解帯超神方外明識生神整具形神清明重霄上合期慶雲際玉章散沖心孤景要靈會煥落景霞布神衿靡不邁玉條流逸響從容虚妙話靈音振空洞九玄離幽裔感爽無凝滯去留如解帯明識生神章髙遊無終敗玄景曜雲衢跡超神方外應感無方圓聊以運四大研心稽首誦衆聖共稱快右謹上請帝眞華府命元眞靈化凝之炁九重奉爲亡過某人纒其八景使三部八景整具形神幽夜開光以防身一如告命風火驛傳無想無結無愛天魂精祕音内諱玉佩開明上符玄玄虚中冥心靈感潜精神太虚凝神登内外無形稱爲眞人無結固無情玄玄虚中澄輪化無方序數來亦叵乗誰云無色平峩峩多立陵冥心縱一往髙期清神徴良遇非年歳劫數安可稱浮爽縁故條返胎自有𢘆靈感洞太虚飛歩霄上氷津趣鼓萬流潜凝眞神登無愛固無憂髙觀稽首昇右謹上請帝眞嶽府命元自然玄照之炁九重奉爲亡過某人纒其身使三關五臓六腑九宫金樓玉室十二重門紫戸玉閤三萬六千關節根源本始一時生神令神布炁炁满能聲聲尚神具毛髪生身諸天下臨以得其生一如吿命風火驛傳九天九隂符鬱單天隂符三炁尊神合生出乎隱乎九炁太空空洞禪善天隂符無光無名無色無緒無象無形無音無聲須延天隂符開關三色乍存玄通混沌乍亡兜術天隂符炁髙炁凝九並炁受清澄結滓列生位成不驕樂天隂符三元所育九炁所導應聲天隂符三元育養九月炁满九炁結形神布能聲梵輔天隂符九天稱慶帝君司命定筭太一執符品命五帝監生清明天隂符男則萬女則萬神唱恭神唱奉無愛天隂符男則司命敬諾女則司命敬順九陽梵炁九巵燈符一陽混溟溟理之炁符亥文北炁一陽幽壑四象分配生形開明合體五行呪曰神霄一陽出自九天混溟軒輿溟瑝微延符鎭左腎上升玉軒二陽泛華紫微之炁符丑文北炁二陽毓質會合靈童含輝五神玉女傳送呪曰神霄二陽出自九天泛華太素紫微微延符鎭右腎上升玉天三陽天屢鳳車之炁符寅文艮炁三陽受仙受福居華金門離合披閱四和紫戸胎元三秀鬱羅呪曰神霄三陽出自九天天婁玉閤鳳車微延符鎭命門上升九天四陽中女辟邪之炁符卯文震炁四陽蒼臺赤帝保生虹映丹靈勑拔命神呪曰神霄四陽出自九天中女養光辟邪微延符鎭絳宫上升丹天五陽太皇微延之炁符辰文巽炁五陽玉華太皇公子太一重寧執符會靈金童鼓歌鳯嘯龍吟呪曰神霄五陽出自九天太皇玉帝微微延延符鎮脾中上升始玄六陽化眞白灝之炁符辰文巳炁六陽錬眞造化玄元白炁灌漑死戸生根呪曰神霄六陽出自九天化眞入景白灝微延符鎭肺中上升玉元七陽絳實子光之炁符午文巽炁七陽運布平會身度返胎百川始青朱庭呪曰神霄七陽出自九天絳實朱柯子光微延符鎭肝中上升太玄八陽金眞命仙之炁符辰文南炁八陽形合内外瑩潔爍爏精延身外身存呪曰神霄八陽岀自九天天眞下降玉劵命仙符鎭泥丸上升玉元九陽太皇寂玄之炁符申文南炁九陽九炁結秀冠帶雲騰露凝華房玉金帝會玄元離合上清呪曰神霄九陽太陽九炁八十得一太皇玉室寂入元元上朝玉室九錬表符皇人曰是符廼髙上空洞混化九天元父道君降而結爲雲篆付九天金籙无量壽生神尊君行之以濟隂尸如遇此符九炁齊并如日之升百骸流光更无隂滓便成仙人凡用此符以表九道書符在内上奏九天之帝帝君受符即九天稱慶太一執符帝君品命主録勒籍司命定筭五帝監生聖母衞房鬱單天符天清地寧人靈九曜陽滿順行隂盈心生虚寂救苦幽隂自然日月道合同形禪善天符道本澄廓運化合眞隂陽悟道了心無心須延天符等觀慧化靈寳照微諸天玄光三十二帝與隆敎法救度存亡丹天靈符盡獲更生兜術天符靈符化錬百骸炁變神度自飛庚辛玄津身心清寕駕景騰飛不驕樂天符三炁勃煙日中魄錬魂生精明隂激陽標應聲天符三變九錬易景體合永享返容玄光長生梵輔天符梵上玄逐幽微達爽飛歩禦金耘存雲霄受炁玄玄俱守黄庭清明天符三陽煥發七炁五行成胎俱聚含鎭丹臺日月含輝包光芒垂无愛天符玄皇應運炁貫至妙眞靈大中匹配元宗皇人曰右符九道當用黄紙朱書於表前書時存身爲金籙生神道君掐九宫訣吸取九霄之炁呪而成符靈寳无量度人上經大法卷之六十五
