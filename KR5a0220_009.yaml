front:
  text: 靈寶無量度人上經大法卷之九霜八
  hash: sha256:53cc8665015fb13b24ad0298c54ba283b42f6e07277e3f8a76d7e575d1c5cb7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_009-001a, image: hfl/0086/0086-152.png}
body:
  text: 十轉回靈品十轉回靈萬氣齊仙玄師曰十轉之道乃五行生成之理其十轉之法是天尊十過說經神化者是其理也衆真侍座玄師曰一身真集可議斯言元始天尊說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰玄師曰真集常善水數生一普天蒙恩水生上朝遍流山谷沐腎增智聾耳得開病耳得聰以至道言之迷音不知音外真病耳不聽無聲大聰亦聾曰得水之真一流智升慧開而病耳聰也說經二遍盲者目明玄師曰一身光明之主日月精華之根者目也為集真之戶牖見道之靈宗上道禁經日月為首光明者火也中主之瞳熒惑之本日月分輝也火二生數天一真水浴生本始之根上玄真火騰飛於心故復光返明接景三光是盲者目明況生化之本甲坼兩腎戍亥之元系水朝元二瞳上凝於心生火視三光合并二瞳主目光曰吁員是也至道生育亦猶其類耳說經三遍喑者能言玄師曰木之生數也以至道言之一物生五行一色有五彩隂陽互用生成反復藏其用其喑者以常道言之肺主音也以五常用之言主金也金主聲也即天尊三遍木之生數神化理在西方正金之體以木召金返復神變故喑者能言是也說經四遍跛痾積逮皆能起行玄師曰金之生數也跛痾者偏枯肌血四肢攣曲癃痾跛蹇也積逮之疾者世傳逮及積沉不愈是也此正筋脉舒縱血絡澀流屬於木脉肝氣羅絡之主却四數神仙正所謂返覆五行生成之法也以至道言之法身之病金木互用則亡正是水火互相須金木互相愛故四遍金之生數而成木之神變此之謂也說經五遍久病痼疾一時復形玄師曰五乃土之生數之道肌血形骸皆屬於土故五遍復形全於五行之體聾盲喑啞跛痾積逮久病痼疾一時痊愈復形全質是五行生數也說經六遍髮白返黑齒落更生玄師曰水一生數使聾病耳皆開聰而水之成數於六真水成化髮白返黑齒落更生也說經七遍老者返壯少者皆强玄師曰說經七遍火之成數一身光明內生五臟光華外攺老者返壯少者得之顔貌益强皆水火之功也說經八遍婦人懷妊鳥獸含胎巳生未生皆得生成玄師曰八者木之成數生氣育物皆得生成聖胎凝靈八氣秀結分形胎化無諸惡損皆木之生氣之所主也說經九遍地藏發泄金玉露形玄師曰說經九遍聖胎九轉金之成數形難隱諱金光玉華照耀萬里所謂金容玉貌瓊肌瑶體沐溉一身噓呵萬物立化金玉吹氣成金唾地成玉百花千彩映絡一身皆由五行成用金玉發泄聖胎分形也說經十遍枯骨更生皆起成人玄師曰土之成數謂之十轉回靈萬氣齊仙回骸起死枯骨變仙更生成人此十遍之道元祖五行生數至於末後五行成數明此道則長生修此道則神仙脫殼飛升止於此矣若功成行滿位證髙真八十一日一轉八百日小乘三千日大乘不離斯言應出産一切神仙萬法徑路殊途事歸一揆真師口訣盡於斯馬法空真人十轉回靈萬氣齊仙頌曰自一至十五行為本隂陽周回出入聖關日上扶桑月沉玄衮萬神朝真得同大混玄師曰四玄二道大定神光黍米入妙中理五氣十轉回靈真人而說頌偈洞其奧則升騰有限明其旨則神仙有自胎化法質品皇人訓曰元始聖胎有十月生成之數有七首五根之道上品妙首十五歲無行上首二十五歲須延明首三十五歲阿那品首四十五歲宛首五十五歲三界稽首六十五歲群魔束首七十五歲群妖束首玄師曰上品妙首不待九年之功無行丄首七年可以成真阿那品首九年白日飛升須延明首一紀功滿成真宛首十八年尸解得道六十五歲地水之仙名注天府故三界稽首七十五歲長生度世無諸魔試故群魔束首巳下延夀天年群妖束首也上無色根是為天根斬絶地根保命生根落滅惡根玄師曰上無色根諸塵漏淨入於無想無為之品是謂天根未達此根先斬絶地根無諸業纍苦債即得保命生根二道並以落滅惡根為首又曰上法天根中法生根下法地根除於色根落滅惡根玄師曰既知聖胎七首五根之道方可入元始聖胎玄師曰元始聖胎生於赤文之後碧落之先産於大浮黎土心胞八脉外應九色煉於九鼎七首五根之先赤文碧落之初天地起於有數有數要在口中呼吸之氣既有呼吸之氣運於出入之息晝夜一萬三千五百息一息脉四至在呼吸之間一呼三寸一吸三寸呼吸之間六寸出入一至之脉一寸五分是十五分隂陽大數天地之體天一地二人三也其真氣入九鼎連汞攝鉛造化元始聖胎每一時氣長六千七百五十寸十二時通長八萬一千寸共計八千一百尺為八百一十丈真氣是十二時也每一時權機八刻二十分十二時通一百刻每一時定一千一百五十息十二時定一萬三千八百息每一息定火一銖二十四銖乃定一兩三百八十四銖定火一斤萬三千八百息計真火三百十五斤二兩半八隂八陽依天地運度定人氣血周流一晝夜百刻中每刻六十分一時八刻二十四分得三百六十息一呼一吸天地運行六十里一晝一夜運行九十六萬一千五百里周天三百六十五度二十五分半又周天一百八十二度七十二分七十五杪度一千四百六十四里六寸二十八宿行運皆隨天地旋斗歷箕進氣追之每刻天地運一萬八百里每一刻六十分一分六息一時八百九十寸天地運行八萬六千四百里一時氣長六千七百五十寸十二時氣行七十萬八百九十寸天地行時氣血行隂陽運時營衛行日月交時內氣交內氣交時産至寶至寶聚而成大丹大丹圓而成聖胎其走漏之道八邪所攻造丹之基十干之合配於九鼎合於九色成於九轉元始內宫心胞八脉之圖利元通神品天真皇人曰陽全則仙隂全則鬼陽全則天真可覩故有洞真洞玄洞神隂全則與鬼為徒故有洞隂朔單鬱絶玄隂寒庭長夜人禀冲和之氣隂陽兩半不能覩其仙真者謂陽不全也有絲毫之陽不能為鬼有杪忽之隂不能為仙是九天之上隂氣都消九地之下真陽永絶是故修行靈寶大法先當身不雜務心不他想內外清虛抱元守一次採服正氣煉氣成神使純隂去體陽神降身方可洞視百靈召降千真祛除妖魅禳却五兵兆當誦詠靈書歌章晝夜不怠方獲精感妄泄一字真靈皆散萬無一成兆宜閉口奉行當擇三元八節日稽首書十大真人十大玉童十大玉女降真召靈符法中仙曹五帝玉童承受玉女上奏靈官護道正神於卧床之後立一小室安排仙曹聖位法籙等文香華時果供養以為監察司師功過動靜關告守等報應於其吉日入靖朝真罷存想三寶各受碧玉金字真氣長九寸闊五寸題曰玉清真氣上清真氣太清真氣受訖再拜退身持念通神真人玉童玉女纍及萬遍寒處得溫熱處得涼倦處得勤臭處得香厄處得安皆得如意法中內外之事焚香禱祝皆來告人或大或小或光或影言語聲音光象色景隨意詳察以見吉凶通章達奏咸有感應太極真人太玄真人太一真人定光真人妙光真人寶積真人普得真人妙行真人正一真人玄一真人金光童子無上童子正真童子開光童子清光童子慧光童子法敬童子圓光童子道眼童子慧眼童子太玄玉女青腰玉女太素玉女玄妙玉女六丁玉女三清玉女八極玉女九宫玉女靈飛玉女變化玉女右法十真人玉童玉女若變特竒異相若起邪心必墮地獄大怒呼呌失信違盟其神逺去臨事不神兆欲修行靈寶當擇戊辰戊戍已未巳丑為首至日子時之後朝真罷對聖步斗自柄至斗口回身入斗口中又九拜三捻上香兩手結五嶽三途印捧在心前覷定水一鍾叩齒九通呪曰魁罡靈魁罡聖逢著邪氣必須應敕攝敕攝右法念九遍向天吸北氣呵入水中存想水內有靈字覷定水呪曰乾元亨利貞日月與吾并吾亦非飢渴賴得神水清五行之氣六甲之精神水入五臟永保得安寧神仙同羽化飛升朝上清急急如律令右法念九遍向北取氣呵水再呪曰紅杏卯墨黑坎磨真酉襪臘南靈寶中指中興生乾獨隸坤可韓巽謹請太一天真太初天真真仙真人上應乾位六丁左神六甲右軍為吾上受天心太一靈呪南方火輪除邪去病耿水敕攝太一諱右呪念十遍向北取氣呵水中念呪時存太陽如大火輪在水中取氣放印即將二手巡五嶽三途訣再呪曰但弟子一年三度受氣天氣地氣日氣月氣五星之氣南辰北斗之氣六丁六甲之氣北斗九皇之氣三台華蓋之氣無上三天之氣五嶽持身妙氣風雲氣雷雨氣四直之氣天不能蓋我地不能載我衝我者死撞我者亡急急如律令攝念呪三遍取北氣吹入水中然後向北再念呪一遍取五方氣入口灌漱入腹將水呷三呷壓下真氣以訣彈於身中再上香九拜而退靈寶無量度人上經大法卷之九
