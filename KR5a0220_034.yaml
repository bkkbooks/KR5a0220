front:
  text: 靈寳无量度人上經大法卷之三十四麗四
  hash: sha256:2246ca5b11f6f389142dbe48c196e38c4bc8af7f495d40905766d57152210d8d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_034-001a, image: hfl/0091/0091-098.png}
body:
  text: 五帝育物品玄師曰雜霧冗薄寒暑失節乾坤包承蟲蝗滋生啖食百榖疫癘交攻傷殺黎庶夏霜冬雷秋炁花榮春令不孚虹蜺徹天大雹苦雨烈風迅雷損害群物出蛟蜃陸走虎兕長虺隊鼠怪魔厭蠱祈火府以拯令請五帝以肓物西嶽治蟲毒收蝗束虵虎旻天除癘保命天官治疫救苦玉文鎮長蛟金書解厭蠱非上品難助神功假中篇以隆威力應速飛升遊神而獲恩得福於玄祖訣曰元始道祖分降化𩔖三素之炁化高眞五行正炁爲百神罡烈之炁化六甲柔和之炁化六丁冲和之炁化庶民至隂之炁爲鬼精雜𩔖之炁爲禽畜微冗之炁化昆蟲是也其四時之度五帝育物春時靑帝行於和炁至四月赤帝接令變和爲温若青帝不收春令則薄寒氣軟五榖百果不實霧炁作疫或赤帝侵令迅雷烈風水妖作災損於萬物民病熱癘癰疥痢毒夏時赤帝行於火令成熟萬物至七月自帝接令化温爲涼若赤帝不收夏令則亢陽水涸虹蜺雹電苦雨烈風損害草木毒虺惡蟲出於山野若白帝侵令則夏有霜霧草木黄死百榖不實民病瘧嗽秋時白帝行於秋令五榖結實萬物收成至十月黒帝接令變涼爲風若白帝不收秋令則秋炁花榮虎豹作災鼠食五榖民病瘡瘍或黒帝侵令則山河溢水海岸地震百榖不成飛走自死地毛荒饉餒疾交作冬時黒帝行於寒令至正月青帝不接令則雨螽折木老幼卒亡民病大疫於春或青帝侵令則百花早榮有秀不實水出蛟蜃民病暴死又四時四炁土德助之若水失於節度則隂陽不調百災萬害隨兹而生皆𨽻南昌上帝韓司火府韓君丈人主之號可韓統於五帝育物拯令正天宿度調泰璇璣齊常七政凡有此災須請命丈人告命五帝下有蟲蝗虎兕並西嶽君主之疫癘属東極青玄太清玉司長生保命府太一元生府翊天四帥院主之玊文金書别出仍皆須中篇萬過上品度人十回可以愈災凶於四表除妖孽於入方也積此玄功非福一身慶及玄祖五帝育物眞符靈寳有五帝育物眞符是靈寳度人中品之道五方五帝所掌五行造化功用是也凡學士修用此五符先佩五帝真刑符存五帝侍衞五星居於空玄之中各去兆面五尺木星靑光九芒熒惑赤光三芒太白白光七芒辰星黒光五芒土星黃輝十二芒然後上五方香面東九拜叩齒九通閉炁九度玉淸訣取東方炁吹符次面南三拜叩齒三通閉炁三度書成赤帝符玊淸訣取南方炁吹符次面西七拜叩齒七通閉炁七度書成白帝符玉清訣取西方炁吹符次面北五拜叩齒五通閉炁五度書成黒帝符玉清訣取北方炁吹符面天門十二拜叩齒十二通閉炁十二度書成黃帝符玉清訣取上方炁吹符東方青帝木功符九炁青天青靈始老中有帝君神仙眞靈𡻕星眞君東斗主筭東方青帝青天青帝巴元醜伯大魔保肝護魂降眞飛天神王執符奉行青帝天官兵馬金剛九十萬人角亢氐房心尾箕星東方八天天帝上靈流入正炁降於符中八天東八帝方隱語東方甲乙寅卯十二大神直符天尊而行東嶽萬神傳命驛程右符主生化萬物鎭東嶽整木星失度調東方七宿璇璣來和氣除春令不調治東方毛蟲之妖統東方鬼神召東華神仙治肝病筋脉之疾服九年青帝遣青靈玉童青腰玉女各九人迎兆登九炁青天位封青帝眞人南方赤帝火功符三炁丹天中有帝君丹靈眞老神仙眞靈熒惑火星南斗上生南方赤帝赤天赤帝大魔降真負天飬炁保心擔石保命長存飛天神王執符而行赤帝天官斗牛虚危室壁兵馬金剛三十萬人星南方八天天帝上靈流入正炁降於符中八天南方南方丙帝君隱語天尊丁巳午十二大神直符而行南方三界南嶽赤帝佐命司命南方萬神傳命驛程右符主成熟萬物鎭南嶽整熒惑失度調南方七宿璇璣來和炁除夏令不調治南方羽蟲之妖統南方鬼神召南極神仙治心病炁脉之疾服三年赤帝遣丹靈玉童太丹玉女各三人迎兆登三炁丹天位封赤帝眞人西方白帝金功符七炁素天中有帝君皓靈元老神仙眞靈太白西斗金星記名西方白帝侍煉白天天帝大魔降眞魂眞保肺安寧反山六日保神長存飛天神王執符奉奉行白帝天官兵馬金剛七十萬人奎婁胃昴畢觜參西方八天天帝上靈流入正炁降於符中八天西方西方天帝隱語天尊庚辛申酉十二大神執符而行西方三界西嶽白帝一切萬神傳命驛程右符主制伏萬類鎭西嶽整太白星失度調西方七宿璇璣來和炁除秋令不調治西方甲蟲之妖統西方鬼神召西靈神仙治肺疾腸胃不調服之七年白帝遣皓靈童子素華玉女各七人迎兆登七炁素天位封白帝眞人北方黒帝水功符五炁玄天中有玄靈帝君玄老神仙眞靈辰星北斗眞君落死北方黒帝北帝黒帝大魔降眞通血流精監醜朗馥祛孽保眞飛天神主執符奉行黒帝井鬼栁星天官兵馬金剛五十萬人張翼軫星北方八天天帝上靈八天流入正炁降於符中天帝北方隱語北方天尊北方六天鬼神拱手魔王敬形壬癸亥子十二大神直符而行北方三界北方黒帝一切萬神傳命驛程右符主收藏萬物鎭北嶽整水星失度調北方七宿璇璣來和炁除冬令不調治北方魚鱗之妖統北方鬼神召北眞神仙治腎病膏血之疾服之五年北帝遣玄靈玉童太玄玉女各五人迎兆登五炁玄天位封黒帝眞人中央黄帝土功符一十二炁昊蒼旻天中有帝君黄靈皇老三寳帝君中三天上帝三天天尊央鎭星土徳安寧九仙玉女三九聖九眞九靈金童天大神中斗大魁總監衆靈中央黄帝中主黄天皇帝大萬神无越无傾魔降眞十方飛天神王大神執符奉行黄帝天魁𩲃官千二百衆官君符吏十一萬衆𩵄䰢魓𩳐魒七星三天髙聖九天眞宰三十二天八景天帝九霄九靈靈妃上尊上聖丈人元君王母帝君眞君流入正炁降入符中三十二三十二天十方辰戍丑天隱語四方玉字天尊未戊己之神六甲六丁直符而行十方三界天地水神五嶽九州一切萬神金馬驛程如有不伏三界五帝列言上清右符助四帝造化萬物鎭中嶽整鎭星失度調中斗七宿璇璣來和炁除四時正令不調治中央躶蟲之妖統中央鬼神召中央上中下三界神仙治脾胃肌膚之病服之十二年黄帝遣黄靈玉童黄素玉女迎兆登一炁天位封黄帝眞人青帝符治瘟疫之災赤帝符鎭治火災白帝符鎭治兵災黒帝符鎭治水災黄帝符鎭治萬災其四方四帝眞符皆可通用中央黄帝符非王侯不得佩服五帝符青帝符治肝病魂不附體青書黄上搯震文祝之曰青帝護魂保鎭三官急急取東方炁吹符吞佩各一道忌酸九日忌辛七日即魂安肝病愈白帝符治肺病魄狂妄白書赤上搯兌文祝之曰白帝侍魄冶錬隂邪急急取西方炁吹符吞佩各一道忌食苦七日忌食辛三日即七魄復至肺病安寧赤帝符治心病炁不足朱書黒上搯離文祝之曰赤帝養炁萬神皈身急急取南方炁吹符吞佩各一道忌食甘五日忌食苦三日即神安炁盛心病乃愈黒帝符治腎病精血凝滯衰朽黒書黄上搯坎文祝之曰黒帝通血萬神保精急急取北炁吹符吞佩各一道忌食甘三日食鹹五日即精血流通腎病乃愈黄帝符治脾病亡魂失神肌膚羸劣飲啄不寧搯中指中文黄書青上祝之曰黄帝中主萬神无越急急取上方炁吹符吞佩各一道忌食酸十二日忌食甘五日大梵飛空品玄師曰學道之士几遇三元八節本命之辰或國土有災飢饉失時或法身昬病五音呪詛災星正照惡曜旁臨或兆庶𡨚枉不明男女不育山林猛戾剛狠之邪或飛空入地半天之神魈怪爲殃難救治者常行飛空之道拜伏心章躡旋斗歴箕之罡行坎離交遘之道黙朝上帝運思一泥丸之理洞達杳冥則鬼神振伏萬炁長存不經苦惱身有光明萬炁齊仙退災却厄除禍止非眞所謂靈寳上品妙道者也法當齋日寅旦之時入室端坐兩手靈寳訣相壓於左右膝如如自然使内想不出外想不入正念澄神見五臓六腑内外瑩徹存左日右月去面九寸頂中出五色圓象内有寳珠髣髴於空中旋運次思三十二天帝君並駕五色八景之輿各從方面至並於頂中各出五方色眞炁如絲交遘萬道寳光合我眞炁畢想後唱擊法鼓二十四通以集二十四炁覺兆身自下丹田玄炁盤旋而上交浹於心中温温盤折自兩眉間至髪際而出代爲二十四神次存夾脊之後有雙官室如瑠璃之殿殿中有水晶玄珠内明光徹尾閭自腎元逆有青碧之泉返湧朝至泥丸宮宫中有日月洞映成金碧流光之臺上有始青帝君降紫黄白青碧五炁直入兆頂門結爲寳臺次存兆玄炁化爲眞人坐於寳臺之上萬炁齊臨身坐百寳光明徹見十方三界外内一如目前然後黙誦大梵隱語六十四句每一句搯子至亥十二宫吸炁吹彈兆身至坎離乾坤四句即叩齒三十六通存三清北玄之炁交遘中有日月交光吸炁漱津納之九作呪曰玄黄素暉晃朗紫微始青琳梵交煥金芝出无入空窈窕靈扉結成靈胎化爲嬰兒灼擲流鈴鬱變蒼嵋萬天森輔逺示披衣三田溢光瑞光騫霓黄老變仙超脫苦危无爲上仁與道无𧇊誦畢服符興身出戸勿反顧左右如此行之六十四日則萬靈振伏招集群仙天无氛穢地无妖塵冥慧洞清得入玄玄大洞无量之品元綱流演罡法随歩念呪戍起返至亥止變神爲上清眞人大洞冠服執圭登五龍之車飛謁上清凡拜心章用降眞香爲函長三寸七分闊一寸二分内以黄素長一尺二寸髙三寸六分研硃密寫細書行數不拘上要約三分下空一分前先書維某年月日朔時某人謹齋沐誠惶誠恐拜手頓首稽首澄心百拜上言後文盡只云謹言用三元飛炁王章印封外内以章中首尾陛下再拜臣姓某印之發時以靈寳心呪烈火焚香中燒之存伏如前法三台八方眞炁混沌陽光流輝開通八門結炁成象通炁三宮二炁囘合洞觀无五炁朝元輪轉成眞外入衆妙門玄罡合璧透徹三天无拘天門急急如律令函底符三炁陽光玉眞有勑天真天令洞煥眞皇衝破靈罡二炁返常九轉九炁囘運黙制中央魔王伏諾萬炁來翔龍駕琅興佩玉帶璫飛謁靈寳受制華堂急應元元天元天九魁罡激指九陽靈神靈神風迅霄庭交圖玄感炁應五元觸破罡風浩炁堅成三晨三境通眞循日歴月五斗齊靈神靈炁衝運通由急魔王保迎急急囘返權衡如元始通章逹信律令袋上符太極未分陽炁先萌无極无上四象肇運元亨利貞大羅玉清元始祖劫洞景開明始陽九天敕停華育魂開八門杳黙无形金龍鼎巾火鈴前擲白虎奔程電激雷明炁衝擁怠奔飛日月玄炁透入紫精合景三晨煥擲衝破罡神直透三天升入无形三生萬炁天靈節榮三炁長存混合我身太玄守開往返通靈後書章於太𡻕某年月日時就醮壇内某時發三天門下通進典官火急奉行不得違滯立待報應急急如律令靈寳心呪和元陽集三靈拘魂制魄洞光内明玄影其苗道貫始青三部八景炁周香𡨋心運南北坎離遘精眞羅鬱絶慶開八門飛度三天合制乾坤右呪書符等並用此呪搯上清訣存身爲靈寳天尊大梵震靈章玄師曰夫日月薄蝕山川震鳴疫毒流行隂陽失律寒暑差時行持之士當入靖室端坐誦詠大梵正音之章佩大梵震靈之符以却萬災召集和炁護衞兆身庶安境土法用黄素朱書符炁以佩負則感五帝輔翼萬聖臨軒飛度法身得爲眞人免禳厄難書時存身爲道君搯上清訣取九霄正法旋繞筆素黙呪叩齒三作而書之呪曰梵炁彌羅大梵流光敷爲眞几玄應朝陽華英晃灼護衞中黄感激魁𩳐正斗明梁導恢流梵紀律玄罡大震靈音調隂和陽統制萬神囘度眞常匡御衆魔我位上王急急如靈寳律令敕大梵震靈符上開八門飛天二景逃形法輪囘死作生運炁黄中三田自冲周囘十方度命返童五行四炁祖炁煥映順序常豐澄景无窮梵琅纒霞飛躍丹龍百神元育混合眞童華君受命總攬玄宗赫奕齊功萬炁齊仙靈應昊穹五星浩融玉敕撫鎭眞符明恊在中二紀合慶元功返我混茫億我无終靈寳旡量度人上經大法卷之三十四
