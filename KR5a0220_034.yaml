body:
  text: 五帝育物品玄師曰雜霧冗薄寒暑失節乾坤包承蟲蝗滋生啖食百榖疫癘交攻傷殺黎庶夏霜冬雷秋氣花榮春令不孚虹霓徹天大雹苦雨烈風迅雷損害群物出蛟蜃陸走虎兕長虺隊鼠怪魔厭蠱祈火府以拯令請五帝以肓物西嶽治蟲毒收蝗束蛇虎旻天除癘保命天官治疫救苦玉文鎮長蛟金書解厭蠱非上品難助神功假中篇以隆威力應速飛升遊神而獲恩得福於玄祖訣曰元始道祖分降化類三素之氣化高真五行正氣為百神罡烈之氣化六甲柔和之氣化六丁沖和之氣化庶民至隂之氣為鬼精雜類之氣為禽畜微冗之氣化昆蟲是也其四時之度五帝育物春時靑帝行於和氣至四月赤帝接令變和為溫若青帝不收春令則薄寒氣軟五榖百果不實霧氣作疫或赤帝侵令迅雷烈風水妖作災損於萬物民病熱癘癰疥痢毒夏時赤帝行於火令成熟萬物至七月自帝接令化溫為涼若赤帝不收夏令則亢陽水涸虹霓雹電苦雨烈風損害草木毒虺惡蟲出於山野若白帝侵令則夏有霜霧草木黃死百榖不實民病瘧嗽秋時白帝行於秋令五榖結實萬物收成至十月黑帝接令變涼為風若白帝不收秋令則秋氣花榮虎豹作災鼠食五榖民病瘡瘍或黑帝侵令則山河溢水海岸地震百榖不成飛走自死地毛荒饉餒疾交作冬時黑帝行於寒令至正月青帝不接令則雨螽折木老幼卒亡民病大疫於春或青帝侵令則百花早榮有秀不實水出蛟蜃民病暴死又四時四氣土德助之若水失於節度則隂陽不調百災萬害隨兹而生皆𨽻南昌上帝韓司火府韓君丈人主之號可韓統於五帝育物拯令正天宿度調泰璇璣齊常七政凡有此災須請命丈人告命五帝下有蟲蝗虎兕並西嶽君主之疫癘屬東極青玄太清玉司長生保命府太一元生府翊天四帥院主之玊文金書别出仍皆須中篇萬過上品度人十回可以愈災凶於四表除妖孽於入方也積此玄功非福一身慶及玄祖五帝育物真符靈寶有五帝育物真符是靈寶度人中品之道五方五帝所掌五行造化功用是也凡學士修用此五符先佩五帝真刑符存五帝侍衛五星居於空玄之中各去兆面五尺木星靑光九芒熒惑赤光三芒太白白光七芒辰星黑光五芒土星黃輝十二芒然後上五方香面東九拜叩齒九通閉氣九度玉淸訣取東方氣吹符次面南三拜叩齒三通閉氣三度書成赤帝符玊淸訣取南方氣吹符次面西七拜叩齒七通閉氣七度書成白帝符玉清訣取西方氣吹符次面北五拜叩齒五通閉氣五度書成黑帝符玉清訣取北方氣吹符面天門十二拜叩齒十二通閉氣十二度書成黃帝符玉清訣取上方氣吹符東方青帝木功符九氣青天青靈始老中有帝君神仙真靈歲星真君東斗主算東方青帝青天青帝巴元醜伯大魔保肝護魂降真飛天神王執符奉行青帝天官兵馬金剛九十萬人角亢氐房心尾箕星東方八天天帝上靈流入正氣降於符中八天東八帝方隱語東方甲乙寅卯十二大神直符天尊而行東嶽萬神傳命驛程右符主生化萬物鎮東嶽整木星失度調東方七宿璇璣來和氣除春令不調治東方毛蟲之妖統東方鬼神召東華神仙治肝病筋脈之疾服九年青帝遣青靈玉童青腰玉女各九人迎兆登九氣青天位封青帝真人南方赤帝火功符三氣丹天中有帝君丹靈真老神仙真靈熒惑火星南斗上生南方赤帝赤天赤帝大魔降真負天飬氣保心擔石保命長存飛天神王執符而行赤帝天官斗牛虛危室壁兵馬金剛三十萬人星南方八天天帝上靈流入正氣降於符中八天南方南方丙帝君隱語天尊丁巳午十二大神直符而行南方三界南嶽赤帝佐命司命南方萬神傳命驛程右符主成熟萬物鎮南嶽整熒惑失度調南方七宿璇璣來和氣除夏令不調治南方羽蟲之妖統南方鬼神召南極神仙治心病氣脈之疾服三年赤帝遣丹靈玉童太丹玉女各三人迎兆登三氣丹天位封赤帝真人西方白帝金功符七氣素天中有帝君皓靈元老神仙真靈太白西斗金星記名西方白帝侍煉白天天帝大魔降真魂真保肺安寧反山六日保神長存飛天神王執符奉奉行白帝天官兵馬金剛七十萬人奎婁胃昴畢觜參西方八天天帝上靈流入正氣降於符中八天西方西方天帝隱語天尊庚辛申酉十二大神執符而行西方三界西嶽白帝一切萬神傳命驛程右符主制伏萬類鎮西嶽整太白星失度調西方七宿璇璣來和氣除秋令不調治西方甲蟲之妖統西方鬼神召西靈神仙治肺疾腸胃不調服之七年白帝遣皓靈童子素華玉女各七人迎兆登七氣素天位封白帝真人北方黑帝水功符五氣玄天中有玄靈帝君玄老神仙真靈辰星北斗真君落死北方黑帝北帝黑帝大魔降真通血流精監醜朗馥祛孽保真飛天神主執符奉行黑帝井鬼栁星天官兵馬金剛五十萬人張翼軫星北方八天天帝上靈八天流入正氣降於符中天帝北方隱語北方天尊北方六天鬼神拱手魔王敬形壬癸亥子十二大神直符而行北方三界北方黑帝一切萬神傳命驛程右符主收藏萬物鎮北嶽整水星失度調北方七宿璇璣來和氣除冬令不調治北方魚鱗之妖統北方鬼神召北真神仙治腎病膏血之疾服之五年北帝遣玄靈玉童太玄玉女各五人迎兆登五氣玄天位封黑帝真人中央黃帝土功符一十二氣昊蒼旻天中有帝君黃靈皇老三寶帝君中三天上帝三天天尊央鎮星土德安寧九仙玉女三九聖九真九靈金童天大神中斗大魁總監衆靈中央黃帝中主黃天皇帝大萬神無越無傾魔降真十方飛天神王大神執符奉行黃帝天魁𩲃官千二百衆官君符吏十一萬衆𩵄䰢魓𩳐魒七星三天髙聖九天真宰三十二天八景天帝九霄九靈靈妃上尊上聖丈人元君王母帝君真君流入正氣降入符中三十二三十二天十方辰戍丑天隱語四方玉字天尊未戊己之神六甲六丁直符而行十方三界天地水神五嶽九州一切萬神金馬驛程如有不伏三界五帝列言上清右符助四帝造化萬物鎮中嶽整鎮星失度調中斗七宿璇璣來和氣除四時正令不調治中央裸蟲之妖統中央鬼神召中央上中下三界神仙治脾胃肌膚之病服之十二年黃帝遣黃靈玉童黃素玉女迎兆登一氣天位封黃帝真人青帝符治瘟疫之災赤帝符鎮治火災白帝符鎮治兵災黑帝符鎮治水災黃帝符鎮治萬災其四方四帝真符皆可通用中央黃帝符非王侯不得佩服五帝符青帝符治肝病魂不附體青書黃上搯震文祝之曰青帝護魂保鎮三官急急取東方氣吹符吞佩各一道忌酸九日忌辛七日即魂安肝病愈白帝符治肺病魄狂妄白書赤上搯兌文祝之曰白帝侍魄冶錬隂邪急急取西方氣吹符吞佩各一道忌食苦七日忌食辛三日即七魄復至肺病安寧赤帝符治心病氣不足朱書黑上搯離文祝之曰赤帝養氣萬神皈身急急取南方氣吹符吞佩各一道忌食甘五日忌食苦三日即神安氣盛心病乃愈黑帝符治腎病精血凝滯衰朽黑書黃上搯坎文祝之曰黑帝通血萬神保精急急取北氣吹符吞佩各一道忌食甘三日食鹹五日即精血流通腎病乃愈黃帝符治脾病亡魂失神肌膚羸劣飲啄不寧搯中指中文黃書青上祝之曰黃帝中主萬神無越急急取上方氣吹符吞佩各一道忌食酸十二日忌食甘五日大梵飛空品玄師曰學道之士几遇三元八節本命之辰或國土有災飢饉失時或法身昏病五音呪詛災星正照惡曜旁臨或兆庶𡨚枉不明男女不育山林猛戾剛狠之邪或飛空入地半天之神魈怪為殃難救治者常行飛空之道拜伏心章躡旋斗歷箕之罡行坎離交遘之道默朝上帝運思一泥丸之理洞達杳冥則鬼神振伏萬氣長存不經苦惱身有光明萬氣齊仙退災却厄除禍止非真所謂靈寶上品妙道者也法當齋日寅旦之時入室端坐兩手靈寶訣相壓於左右膝如如自然使內想不出外想不入正念澄神見五臟六腑內外瑩徹存左日右月去面九寸頂中出五色圓象內有寶珠髣佛於空中旋運次思三十二天帝君並駕五色八景之輿各從方面至並於頂中各出五方色真氣如絲交遘萬道寶光合我真氣畢想後唱擊法鼓二十四通以集二十四氣覺兆身自下丹田玄氣盤旋而上交浹於心中溫溫盤折自兩眉間至髮際而出代為二十四神次存夾脊之後有雙官室如琉璃之殿殿中有水晶玄珠內明光徹尾閭自腎元逆有青碧之泉返湧朝至泥丸宮宫中有日月洞映成金碧流光之臺上有始青帝君降紫黃白青碧五氣直入兆頂門結為寶臺次存兆玄氣化為真人坐於寶臺之上萬氣齊臨身坐百寶光明徹見十方三界外內一如目前然後默誦大梵隱語六十四句每一句搯子至亥十二宫吸氣吹彈兆身至坎離乾坤四句即叩齒三十六通存三清北玄之氣交遘中有日月交光吸氣漱津納之九作呪曰玄黃素暉晃朗紫微始青琳梵交煥金芝出無入空窈窕靈扉結成靈胎化為嬰兒灼擲流鈴鬱變蒼嵋萬天森輔逺示披衣三田溢光瑞光騫霓黃老變仙超脫苦危無為上仁與道無𧇊誦畢服符興身出戶勿反顧左右如此行之六十四日則萬靈振伏招集群仙天無氛穢地無妖塵冥慧洞清得入玄玄大洞無量之品元綱流演罡法隨步念呪戍起返至亥止變神為上清真人大洞冠服執圭登五龍之車飛謁上清凡拜心章用降真香為函長三寸七分闊一寸二分內以黃素長一尺二寸髙三寸六分研硃密寫細書行數不拘上要約三分下空一分前先書維某年月日朔時某人謹齋沐誠惶誠恐拜手頓首稽首澄心百拜上言後文盡只云謹言用三元飛氣王章印封外內以章中首尾陛下再拜臣姓某印之發時以靈寶心呪烈火焚香中燒之存伏如前法三台八方真氣混沌陽光流輝開通八門結氣成象通氣三宮二氣回合洞觀無五氣朝元輪轉成真外入衆妙門玄罡合璧透徹三天無拘天門急急如律令函底符三氣陽光玉真有勑天真天令洞煥真皇衝破靈罡二氣返常九轉九氣回運默制中央魔王伏諾萬氣來翔龍駕琅興佩玉帶璫飛謁靈寶受制華堂急應元元天元天九魁罡激指九陽靈神靈神風迅霄庭交圖玄感氣應五元觸破罡風浩氣堅成三晨三境通真循日歷月五斗齊靈神靈氣衝運通由急魔王保迎急急回返權衡如元始通章逹信律令袋上符太極未分陽氣先萌無極無上四象肇運元亨利貞大羅玉清元始祖劫洞景開明始陽九天敕停華育魂開八門杳默無形金龍鼎巾火鈴前擲白虎奔程電激雷明氣衝擁怠奔飛日月玄氣透入紫精合景三晨煥擲衝破罡神直透三天升入無形三生萬氣天靈節榮三氣長存混合我身太玄守開往返通靈後書章於太歲某年月日時就醮壇內某時發三天門下通進典官火急奉行不得違滯立待報應急急如律令靈寶心呪和元陽集三靈拘魂制魄洞光內明玄影其苗道貫始青三部八景氣周香𡨋心運南北坎離遘精真羅鬱絶慶開八門飛度三天合制乾坤右呪書符等並用此呪搯上清訣存身為靈寶天尊大梵震靈章玄師曰夫日月薄蝕山川震鳴疫毒流行隂陽失律寒暑差時行持之士當入靖室端坐誦詠大梵正音之章佩大梵震靈之符以却萬災召集和氣護衛兆身庶安境土法用黃素朱書符氣以佩負則感五帝輔翼萬聖臨軒飛度法身得為真人免禳厄難書時存身為道君搯上清訣取九霄正法旋繞筆素默呪叩齒三作而書之呪曰梵氣彌羅大梵流光敷為真几玄應朝陽華英晃灼護衛中黃感激魁𩳐正斗明梁導恢流梵紀律玄罡大震靈音調隂和陽統制萬神回度真常匡御衆魔我位上王急急如靈寶律令敕大梵震靈符上開八門飛天二景逃形法輪回死作生運氣黃中三田自沖周回十方度命返童五行四氣祖氣煥映順序常豐澄景無窮梵琅纒霞飛躍丹龍百神元育混合真童華君受命總攬玄宗赫奕齊功萬氣齊仙靈應昊穹五星浩融玉敕撫鎮真符明協在中二紀合慶元功返我混茫億我無終靈寶旡量度人上經大法卷之三十四
