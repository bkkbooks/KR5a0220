front:
  text: 靈寶無量度人上經大法卷之四十四水四
  hash: sha256:49aabd61a12277ec5b02e8327fdb91adf97ba9c9ba4a1e82327a3483a5b7ece1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_044-001a, image: hfl/0093/0093-100.png}
body:
  text: 運神合景品精思侍衛先思肝中出青氣化為青龍在左肺出白氣化為白虎在右心出赤氣變為朱雀在前腎出黑氣化為玄武在後脾出黃氣變為黃龍在月建上次思左腎出上元道化真君唐將軍冠飛天冠衣絳章單衣執五色節自左腎由左耳出立於左長三十二丈次思右腎出中元護正真君葛將軍冠飛天冠衣絳章單衣執五色幢自右腎由右耳出立於右長如前次思下元定志真君周將軍自心中由於口出立於前冠章服如前左手執玉戰右手把金符長如前皆使分明次思上元赤子泥丸天帝君中元絳宫真人丹皇君下元黃庭元王皆出三田各在三將軍之後然後存自已元神法服衣冠自心中遊金闕至上元由明堂而出形貌衣服皆如自已立於三一之後分明次思六丁大神六丁玉女六甲大神六甲玉女飛天衛真吏傳言奏事吏飛天直事吏三十二天繡衣玉童五方五靈童子三天十天承事玉女上奏靈官章中從事法籙中文武仙曹侍衛排列如法然後行九靈飛步事進章訣若屬家國生靈大事須詣三天門下內朝畢存五方太靈洞陽五色在五方結為五重光暈三天太一紫雲玄廕一身其光下入泥丸左九轉心中右九轉混合帝宅上下三次即存心中出赤氣上升於天如長虹自已如常法存儀入赤氣運轉上行數百里見橫截日月黃道乃星界次橫截過西北行又千里遙見紫雲隱隱乃三天門下方投謁簡付三元三將軍持謁簡入天門良久見三將軍出傳言宣諭章敕許見然後同三將軍三一真神與自己丹元神并章文八金闕門此則渺冥恍惚隨機見化入天門向東乃太一玄生左府見太一玄生帝君具說朝見拜章事即九拜即呈上章奏狀達帝君回身向西入太皓金門即見三師及天師具奏所陳事回直趍太清太極宫門見三將軍三一真神與自已元神立良久見引進真宫出宫門引入至太清重樓寶殿玉案有金光童子青腰承翼玉女太一真君如上帝未還治即將章文度與太一真君安於玉案上良久乃進聽候敕命如值太一還治之時即見重樓玉殿寶臺金簾太清上帝降坐自已在殿下呈其所奏太一真君呈章畢於章後太清御銜下太一真君書天篆雲章敕命之事畢章付天省或天曹即下殿自已於殿下九拜回再詣大皓金樓見於諸道德衆尊懇禱所奏事同三將軍三一真人復出金闕門至伏章所若是太上未還治於此內朝法具如前回却至天藏華蓋之下還神等候報應章奏科格夫章者通九天之門達太上之階度脫災危遷拔𡨋爽莫過章奏最為第一若精誠道士女冠能不接世務持誦不闕者奏上章達立救危厄可度幽冥故即得太上降勒諸司轉下幽𡨋關告所部注上生名脫其死籍得壽年長加其考算幽魂拘絆冥漠可以原赦焚毁罪書受生道境凡章奏尋常齊醮祈恩禳災謝過等事止係到星界天門周將軍與直日官吏寫事目類進其法師祭酒苟無德行或有差錯穢氣衝干退於所屬城隍司收掌若非祭酒法師及無德行之者多被下官故氣半天午酉邪神雲路攔截更不上達如尋常祭酒法師為救治人民代天行化即中界周將軍同直日官吏收接詣天樞院與萬國章詞奏表類進若有錯越亦送城隍司若别無科戒不依科格自有天條降責如為帝王國主祝延萬夀消禳兵革所求嗣續滅除大害普濟普度祈求等事即周將軍與葛將軍傳至三天門下唐將軍與直日官吏徑達天省即時謄奏頃刻候報若能出陽神親齎章奏徑詣三天門下面朝金闕恭陳詞懇親承教敕即不在此限也如行靈寶大法自有三天十天承受玉女上奏靈官運神會道功曹衛真上吏傳言奏事仙吏金龍驛龍騎吏龍虎功曹五色繡衣玉童靈飛六甲玉女傳達章奏若有差誤不合格式即就三天門下天相之中天相一面改正謄奏如依格式其章奏即時上達蓋緣得三天合同太上符契自然更無邀阻凡遇行持章奏詞表於每年五月五日及歲除日默念三天隱諱霐三字一晝夜中誦滿十萬遍即得三天降氣符合合同欲進章奏先念此諱數百遍磨墨呪筆紙並用三天氣吹之若寫御號亦念數十遍如卷章表香上度過遣官了入函亦念數十遍吹之並使即時上達更無凝滯書寫章奏揀選淨紙不得安於卧席牀褥之上長一尺五寸每張不得過十二行按十二月十二時閏月添作十三行每行十八字上通九天下應九地臣與名不得露頭跣足不得折破臣姓名不得垂生露死神與鬼不得提頭頓首再拜不得破行以聞并太歲臣姓並低三字以聞去再拜三行第四行書之再拜去臣姓三行第四行書之道氣去臣姓三行第四行書之乃髙於衆行上空八分下通走蟻一氣或三氣書之不得過三寸已上不進道氣去太歲三行第四行書之太嵗後紙盡不進太嵗後止有一行不進有一行可續一張蓋太歲後三師書讃號方進其章臣為君子為父妻為夫弟為兄孫為祖客為主即順無有不達若父為子君為臣夫為婦祖為孫主為客雖有義禮祈求誠切章雖上達事多少從甚宜詳之其製章之法先寫祭酒法師自訟謙卑罪惡不當其職之詞然後具本人投詞事理次演罪考謝過之言次乞恩原赦救拔之詞然後請官不可繁詞及說弊隱心欺昧不實之事若如此格必至上達速得感格若不依格似石沉海既無靈感轉招罪考豈有福應百姓愚迷不知此理祭酒貪叨買名拜章如此兩皆有過不可不愼蓋三天門下盡是玉清大魔王與天相同領其事謂如太玄魔王即副相也靈魔即書功也非魔書過也比魔比量功過也制魔即代上帝制詔也如世之翰林之職所謂功過毫分無失非有道德安可洞明兼世間少得良材祭酒多是習依舊本不論合格與不合格按本寫之且如章舊格有恩惟太上既是章出太清官吏章上三天太清洞神金闕太上老君几前止是太清天中即不是太上太上金闕乃太清寥陽金闕可言恩惟太上也右如臣姓名今之祭酒不寫臣某名却寫姓名甚不合格也其中違科失例者數條非通真之子安可議之如留世祭酒李真人為楊許二真人家拜章方為祭酒之良材後為洞天主者今則巳遷真職何况愆尤之徒豈能如是後學尋其遺本乃為善本或千二百官儀及天師靖中請官訣按之行事稍合天格其拜章於格合有跪送天官香油柴米鎮信綵衣貧冨隨力辦之不可全闕若許願事效即還不可停廢事急亦可口章謝恩如書章請即以書章謝恩不可錯越天曹檢尋案牘不見便有罪考急事上章及咳鬼章當跪送青紙十幅其事即行蓋天官貴青色也此則略而言之祕密細要别具審覆祕旨凡欲行持此道先當入定外定六塵色聲香味觸法內定十惡謂之三業凡覺六塵三業欲起處便為真覺收挾和精氣神並入於丹田三業六塵隂氣變為純陽養成乾健之體與天為徒然後可以入神直候靜定之中有神光如太陽或五色紫氣或紅光瑞氣來降灌於泥丸或心中或身中乃是大道真氣入身謂之通生通生謂之得道雖名得道實無所得於審覆之時可以通真達靈召其真靈見景報應每日早晚持誦五行正氣利元通神祕呪使滿萬遍真靈示見玄景及耳聞目見形之於象物之於器呪曰魁𩲃𩵄䰢魓𩳐魒急管送言來魑𩲕急管送言來紅杏墨黑磨真襪臘靈寶急管送來興生獨隸公都切角韓明急管送來𩴑𩲙急管送來急管送來竇盧李魏鄧崔急管送來各使滿萬遍真靈降格示景通真審覆之時俯伏對揚先定修鼻端使息定氣寧密祝十天承受玉女上奏靈官飛天衛真上吏傳言奏事仙吏風雲氣雨四直玉文功曹神君將所焚章詞來通進存見衆靈齎所焚章詞并玉女靈官功曹分明自已同衆靈入眉間二寸洞房宫即見教主太清王中央黃老君在金樓玉殿雲錦黃房之中坐黃錦繡衣紫玉交帶太清萬變寶光坐於七色蓮華之上憑太清龍虎玉几從太清靈官一百二十人朱衣玄冠玉斧森列左右太清玉童一百二十人䨥髻五色雲錦衣綬帶飛裙在於教主左右自已九拜於黃老具奏章詞之意靈官玉女將所進章詞奏呈教主聖顔怡允靈官玉女進太清紫鳳神筆以金泥書允奏字靈官直奏仙官收章詞去再九拜謝恩願降報應臣在案前聽候聖景示見畢一向定心默念三天隱諱防中表德丘著意看其所見玄景審其報應如未純熟早晚默行習於朝奏如遇齊醮默朝畢將章詞焚燒畢取灰置於淨水器中念呪曰天清地寧隂陽五行大道造化萬法俱明臣今章奏上達神庭三尊有敕報化分明灰燼之中聖語見形攪勻俟水澄定取其灰燼中焚不盡字札及灰燼中不化破三兩字以為報應通真達詞祕法設大小醮筵奉聖真髙功據事書密請心詞期以遙逹須語意激切先詞意次衍考咎次謝罪次乞祈禳保鍚允願務在簡而直切勿習俗煩若得上達事無不應并領醮主詞同於靖中呈奏師寶畢存同師詣三尊前爐中焚拜畢候依科請聖至中獻有異香或香茶酒中真氣顯降子細審詳如降即便進朝奏詞意乞取感應如不降即飛神進朝上詞章乞感格不可空杳無驗又不可審報吉凶差亂罪福蹉跌以涉謬誤及昏寂神回祝白叩齒三通密祝曰剖心奏詞貢逹三天所祈如願所請如言罪除黑簿名上青篇疾病除差鬼魔消殄天官下降永保長年仙童玉女傳奏上玄畢叩齒三十六通咽液五過烈火望天門焚之祝曰髙上至真道開宥度衆生心詞徹三境速達奏仙名驛傳驛送所願皆成畢默念三尊玉號各九聲及隨事天尊若為國更念聖祖天尊九聲畢至醮卑復爐了九拜呪曰朝向天靈臺暮宿九天來連醮奏天回消滅諸禍災不以遍數拜畢止次還神出戶呪靈寶飛神金闕分神治局符呪靈寶大法有分神飛神之道上朝金闕下遊洞嶽中詣治職大體上以煉氣成神中以煉神習熟下以存想達神其符呪以助神氣也太玄都有太清飛神符呪曰無上太清玄元帝君保生護命敕攝三魂靈符衛魄立來見神令我朝闕度我玄門親登玊庭靣侍帝真來往分明恭奏臣誠玉帝敕命急令奉行右符玉帝訣朱書白紙念呪西北氣吹符吞服或燒灰水調服滿二十四道降真通神分神詣職變真神符作用具九靈飛步玉清訣朱書服二十四道足方可拜章呪曰吾乃太上之子元皇之孫玄通無上妙達三清五臟神君百神萬靈九靈之氣三天之精玄冥極應萬象咸誠太上神符分神上景豁落漂鈴冥冥澄澄往來金闕出入芝英急急如律令敕靈寶無量度人上經大法卷之四十四
