front:
  text: 靈寶無量度人上經大法卷之四十八水八
  hash: sha256:5bdf2dbf7541cf51a34d72490ff4c8d76595579b3b0d5c512ff858790d64f0b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_048-001a, image: hfl/0094/0094-052.png}
body:
  text: 登壇演祝品登壇演法章此一瓣香以杳冥為根虛空為體八風吹不動萬夫挽不回今朝出手拈來奉為法壇施設先為上祝皇帝伏願後天不老如日之升長為大道法王永作太平君主此一瓣香奉為當朝宰輔百執公卿我道吾邦要官賢職伏願一德格天而固久六鰲載地以齊堅佩玉橫金咸躋要路攀龍附鳳皆上層霄此一瓣香奉為在會一切賢士信人伏願道性淵澄頓悟一切煩惱罪根山峙永離無量縈纒人人玉骨凝真一一金書姓字先亡宗祖俱證善緣有識含靈咸超法界次升座白文自然元始靈風鼓空洞之章無量度人流火鍊丹陽之氣開明三景普殖神靈以混化之五文妙神機之九轉或出或入負隂抱陽若存若亡深根固帶處真寂而叩之即應悟玄虛而感之遂通況夫自生者附土塊而沉魂得一者體輕清而浮爽由是説三十六部之祕藴獨靈本真錫千二百之官章拯濟流浪白骨在野遇長生靈符而枯朽發煙紫氣度關演妙法真經而鑊湯停沸方方教化種種生成強名曰大則六合不遼字之曰道則萬夫受分超太元則一法不立被含識則衆妙難言授帝王三籙之簡文標士庶九壇之科式死生蒙福今古共遵奈何隂陽路隔生死理幽徒切斷腸莫知罔極切以太上降返魂之籙玄都出度死之儀齋告可崇靈音惟信是以洗心奉戒間邪存誠青絲代割髮之紋金寶充質盟之信削詞露懇拜手祈天既沐謙勤難以抑絶況某等遁身林嶺抗志煙霞粗研祕籙於玄壇常愧飛神於寥殿當兹勉勵咸在滌除吾無心則心廓太虛吾定慧則慧光不礙舉揚玄範吟詠空歌琳琅之音而響徹十方梵行之氣而充滿八極金龍飛躍神虎驟奔玉札頒而嶽瀆敬聽符命宣而酆幽遵領擲火萬里周旋大冶之爐流鈴八衝下破寒丘之鍔是以日月之精光一吸照破夜臺天地之正氣聚機度斯靈識上賴天尊之道下贊樵木之臣法衆同心大開靈席開壇啓請詞章黃籙大齋弟子某稽首再拜輒露精誠上干視聽伏念某等生居塵冗長務俗華區區苦海之中汨汨業塵之境𦍒緣宿骨有善志慕清虛雖為聾瞽之人心崇至道欲漸躋於玄妙推濟度於存亡擬將自新之功洗滌往日之過况自今日巳前九州分野之內忠臣義士因為國以亡身孝子順孫緣保家而喪魄或流離異邑遭凍餒以消魂或暴露他鄉致不足以橫夭或強虜凶殘假手還於宿債或遭罹兵運劫災償於前緣抱貞堅之烈婦懷赤心之正人犯觸一時之怒殞於刃劒之鋒或嬰孩氣怯病老尫羸因起居不節緣坐食不便死於道途漂泊郊野或自棄自殘投水赴火舟楫乘風濤之中屋宇遭風雨之害或故悮飲毒而歸溟泠或衝逢猛獸而遭吞啖顛險墮身國法喪命更有風勞氣泠數盡告終茫茫苦纍悲鄉路以遙長渺渺幽隂歎何年而生化若不依憑道力此等何遂超升切聞黃籙大齋功德不可思議洞玄醮法神力廣大善救無邊沉泉之苦能拯億萬期劫之魂金籙赦曩日愆非白簡度逍遙快樂三見此齋不經五苦何況精專修建伏聞某師先生廣揚教法丕闡真風演清靜於無為拯存亡於下土功成行著衆所推崇德責道尊人皆敬仰伏望慈悲憫念特垂允俞暫賜仙斿俯臨齋會提綱振領奉行髙功之令儀總宰壇場廣闡盟真之教範功霑幽顯惠及存亡誠非弟子之功能皆出先生之道化弟子再拜師答某蓬蓽寒生芻蕘下士雖得法於明師奈自身而未度伏聞內有妙而外妙自應內有真而外真自來緣某末學凡夫尚拘塵世無真妙之元焉能外揚至道本欲棲神岩穴絶智韜光吐納三晨之華灌煉九真之液內養胎仙形神俱妙方可濟物度生闡化流教特蒙誠懇敢不啓聞難當此職請求明師再請某等再陳丹懇之心仰瀆髙明之鑒伏聞正一天師獲丹書於荆山未欲修煉恐無功於下世漸事三境於天闕妙濟真君得玉籙於西楚徑行接物感拔宅而上升所謂先積外德次修內功表裹相扶丹誠貫日指洞天以遨遊定惠外修嘯風雲於仙闕自古髙真莫不如是伏望某師先生效前真之靈迹作濟世之津梁倣古仙之遺業修拯度之梯航特垂方便之門永開存亡之路億萬苦爽獲遂生成天上地下皆懹慈報況法壇巳備開啓俄臨𦍒乞慈悲俯賜方便存亡承開泰之恩生死荷提擕之化某等不勝戰灼之至師再答某伏聞盟真巨典玉匱玄章皆玉清天尊所宣實太上道君所授敷演三十六部之尊經具載百萬琅函之聖範保鎮邦家濟度幽顯諸天尊瞻仰仙真稟奉金符玉簡救多方之萬罪三皈九戒度億劫之𡨚讐破獄燭幽神燈分光於惠澤真經聖號金口所宣於苦海三回九煉十誦歌音非世上之常典乃玄都之禁文千真效職萬聖俯降有違纎毫威儀必受酆都刑憲某以凡材淺陋科格罕聞欲勉力而奉行恐沉墜於功德一身招譴尤甘寧無負於亡者不敢克當請求明師弟子三請某等不避干冒之愆再陳懇悃之詞特蒙指教一一知聞切緣壇場巳備威儀肅清三界神靈佇望久立九幽長夜孤爽瞻仰惟願慈悲俯臨法會開度亡魂若稍有私心不一始勤終怠訕謗評議論量假真違科慢道不敬師尊甘受風刀之苦萬劫長夜無終伏望不違盟誓特賜允陳不勝望恩之至師第三允請蒙示三請區區足認汝等竭誠不欲避辭恐誤圓成勉強枝持一心奉行隨其所願普獲殊恩以此開壇功德上資七廟尊儀遊神太漠煉真於碧落之天驂從玉皇養素於明霞之境次乃清除九土氛塵屏息四夷煙燧風雨時若有潤秋成疾疫不生蟲蝗殄滅一切亡爽上登道境四生六道皆獲妙樂今則威儀巳備開啓時至更不謙謙各惟珍重弟子謝師某等伏蒙某師先生允請不勝感恩仰謝之至再拜引師登壇登壇開啓生育天地運行日月長養萬物者道之用也垂科設教授戒傳符濟生度死者道之慈也黃籙白簡下拯冥途普濟幽爽者玉清之曲赦也明道之用運道之慈而祈玉清之曲赦者存乎人動天地感鬼神逺近幽深應如谷答者存乎誠苟非其人誠亦難格兹者伏承某人建兹法席夤奉真靈超度亡魂上生仙品我今克遵科教備列威儀有朱章以召魂有蘭湯以蕩穢有華燈以回耀有寶旙以遷神有靈符以下於九幽有供養以資於六道先皈命於三寶次説戒乎九真回幽魄於南宫削黑名於北府注大法藥以救沉淪執大法炬以照幽昏布大法雲以覆群品其為功德難可勝言如某者誤承人知祗事瑶壇敢不惕惕于心求哀太上所冀髙真降格亡者超升易容顔於九煉之庭消𡨚對於三官之府悉仗慈悲之願同遊道德之鄉更冀同壇敷揚教典拜章法語此一瓣香上通三境下徹九幽歷浩劫而必通御圓輪而常應以今焚向爐中奉為亡過某人伏望蠲除瑕纍逈脫塵根頓超有漏之鄉徑達無為之岸真源湛寂一法不存妄念分馳萬緣競起悟之則超凌大化昧之則沉溺迷途矧兹浮爽之憂未達返胎之旨故大道憫群生之苦而盟真垂濟度之章一念超升惟潛通於肸蠁叢霄沖漠曾不間於纎毫俯回曲照之恩感荷遷神之惠某式遵素簡叨系玄司既承訴列之詞敢怠謄陳之事今則百靈司在四氣澄清載肅威儀通行章御第惟𥘉淺曷副請祈尚冀同流共彰妙感鍊度説戒升座請答章道士三禮跪詞云某等伏聞大道闡慈悲之教衆生蒙濟度之恩式按金科肅陳淨醮既真仙之下鑒而符籙之可陳福被三途功超九夜願施開度拔爾沉淪答云玉言金訓示之寶籙靈符九夜三途賴之度魂煉魄當付上士不傳非人顧兹闒茸之庸材詎敢獨當於大請再跪云三界俯臨一心至恪符籙苟陳於座席靈儀實賴以生天仰辱遜謙遽辭請禱覬仰體乎天意俯從乎人心願矜九夜之沉魂實乃道師之慈惠既精誠而必至望幢節之早來答云伏聞代天行化利物濟人必也道價之髙明故慰人情之願望實惟淺陋難以奉行再跪云伏念某拜表上章常屢聞於三界肆筵設席巳敷布於四隅齋心激切以瞻天苦爽悲愁而俟命伏乞髙功大法師言泉潤下大度包荒促羽斾以溥臨演靈文而廣濟三途五苦願施拯拔之仁滯魄幽魂實賴超升之澤某無任懇禱之至答云請約再三信誠備悉既真靈而俯垂下降顧愚昧而敢不上聞義不容辭禮當敷奏符籙裝嚴於寶軸靈魂鍊度於朱陵大衆前行願從其後請真師頌曰龍漢啓盟津劫劫度天人大開靈寶囿津濟生死輪是謂慈悲道能發枯朽榮自非吾世師孰與達幽冥靈寶無量度人上經大法卷之四十八
