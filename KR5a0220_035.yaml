front:
  text: 靈寶無量度人上經大法卷之三十五麗五
  hash: sha256:f77f83e128a4c5bc985d87d34b7d3185f808a2261219368883abcab4ab3e9d18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_035-001a, image: hfl/0091/0091-136.png}
body:
  text: 自錬形神品錬神法章法於一陽生後受錬形神凡一周歲然後聞奏上帝關行三界攝召亡魂方行開度未及一年急欲救拔須啓請錬度真人九光童子受錬司真宰奏聞朱陵大帝三氣天君熒惑真君南宫上宫度生君火府真聰錬魂聚魄攝魂使者主將吏兵存在左右庶得衆真監度魔試潜消凡隂魂不過二尺在世喎邪跛躃殘疾刀兵形骸不具隂府亦然當行五府事一為泉曲之府是名腎宫此主天一水位之精則當存水神為水沼以洗滌孤魂二為陽明之府是名心宫此屬地二火位之精則存火神為火池以錬度孤魂魂既得洗滌又得錬度不可不具五府須存天三生木屬肝是為發生之府以象春之生物也次想地四生金為肺宫是名崑崙之府以象秋之收成也夫春屬肝為木位主青龍秋屬肺為金位主白虎夏為朱雀應心冬為玄武應腎四象既備萬神俱歸其於中黃之庭默行五府事當存脾神在於中宫為黃庭之府能生長萬物五行圎備則萬神咸亨矣然後亡魂形體悉備可以洗錬俾得托生天界仙衣輝嚴則流火之庭火鈴滿地焰焰燭於天界從此孤魂各登仙鄉永辭苦趣然後玄祖乘此妙因神識超脫逍遙霞霄之上身得道真矣每日清旦焚香面太陽先摩兩手心令極熱拭兩目次兩耳兩鼻然後左右各摩三次方搯四門訣勒至中指中文存東方青帝駕青龍與自巳肝中青氣青帝自眼出合而為一搯卯文默念紅杏吸青氣使津入肝又次想西方白帝乘白龍與自已肺中白氣白帝自鼻出合而為一搯酉文默念磨真吸白氣使津入肺次想南方赤帝駕赤龍與自巳心中赤氣赤帝自口中出合而為一搯午文默念襪臘吸赤氣使津入心次想北方黑帝駕黑龍與自已腎中黑氣黑帝自兩耳出合而為一搯子文默念墨黑吸黑氣使津入腎次想中央黃帝乘黃龍與自已脾中黃氣黃帝自脣中出合而為一搯中指中文默念靈寶吸黃氣使津入脾想五藏五色鬱勃充滿即心拜五方念金液錬形呪并太液呪取太陽氣九口通徹內外矣金液錬形呪曰金液錬形與道合真開明三景是為天根無幽無極無始無終元皇九醜靈魔絳宫紫氣飛天身乘六龍火上水下流入三宫神居陽明大道自通急急如上清金液錬形律令太液錬形呪曰太液錬形金馬驛程上下水火森羅淨霐元範恢漠幽寂度人受錬元窮為道至真三元降合五氣會神太上符告六丁潜靈紫羅鬱秀行符玉京急急如太上太液律令次誦太陽流金火鈴真一呪天中火光月中精光大明火鈴金剛之精日宫太陽髙陽明魁星五輔天元廷保鈴火速元鄒兵猛獸正妖入鬼精熒星火星火神王太一元兵平火山大聖金童星火及上童昊凶流金敕金剛寶光律令攝急急如南方熒惑寶光律令敕攝自錬法訣每日凌晨焚香少斗立斗中想為錬度真人先搯四門訣靜神絶慮兩手玉皇訣交於口上默念金液錬形呪直視太陽吸氣一口三次一咽吸氣九口念呪三遍想日輪九道光共咽口復念太液呪如金液作用咽氣畢念錬神呪曰太上錬神九步八坤行剛九轉內外咸成三台子午絳宫受真符煉萬靈赤心降精心辟惡毒往來俱榮北都曲府離合上清大洞自然風火無亭急急如太上陳形律令右仰視太陽左右手丑訣交於口上吸氣九口作三次咽念呪三遍如前法念呪曰坤順內營甲巳潜形三魂受錬七魄成真五氣中理斷絶惡根九宫康配列言上清太一含元戮伐魔精三貟四正地方坤寧神魂真魄往來玉京五嶽震伏萬毒自傾急急如太上錬神律令右仰視太陽服氣念呪並同前次同火星真氣念呪曰南方之君赤氣之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬類發生天帝有敕使者須聽攝召魂魄錬度真形除災滅禍回尸返生急急如律令右兩手火訣取南方真火咽下三口再念火鈴真一呪仰視南方取氣如前次端坐丁立取南方真火一口吹身左畔東南地上想為火池存錬身大神乘龍吐火於池中將右手劒訣攬自巳心火從口中出左手火訣次剔向火池中炎熾錬一身上下通瑩更無隂翳洞徹畢想赤龍一條從焰中飛入左耳孔中次搯子文取北方真水一口吹身右畔西北地上存為水池想流精玉女乘鳳吐氣於池中將右手劒訣攪自已腎水從口流出取北氣子文吹剔於水池中波浪滔滔濯質上下晶潔更無塵染洞徹中外畢想黑龍一條從水中飛入右耳孔中水竭次呪曰魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清又呪曰生身受度劫劫長存三遍叩齒心拜而退凡行錬度之道更須帝誦南昌錬度蕩穢才露龍漢大呪不以遍數則錬度亡魂蒙其功德徑獲超脫又呪曰龍漢蕩蕩洞陽玉錬章夫洞陽玉錬法夙有仙籍莫能行此且人雖有目可視一里之內則一里之外不可視雖有耳可聞崇墉之裏則崇墉之外不可聞而況幽明踈逺其可目見耳聞乎必賴上帝垂慈宣行妙化役使火府勑制地祇乃行錬度夫人不能自錬安能錬鬼鬼在幽𡨋隂暗之間得此錬度滌除垢穢百骸流光然後始獲超生譬猶冶之鑄金不能自冶安能鑄金上帝哀憫下愚於下元甲子遣六甲神仙降世流傳此法謂之玉皇禁書非下士所可見聞也輕泄漏慢觸犯憲章罪無容赦幽則纍及玄祖明則禍及子孫災害相仍可不愼哉今行持之士既有心拔度亡爽宜先自錬元陽陶鑄萬範不求真而自真不求神而自神化合太玄苦爽咸賴輒慕虛名叛道誑惑行尸走鬼失笑幽𡨋無所禱也戒之戒之勉勵形神隱顯獲慶每月玉錬法日精圓形方景赤色每月三日九日十七日十五日二十二日凡五過於金門之上以金精石景水母芝英錬於日魂此日華流散金精滂沱普天得潤若此日採日根靈降玉戶行此道升到金門金門在天西關之上日月通靈之門也右取日根先取井花水一瓶露于中庭朱書石景水母玉符青紙上置水中面向水叩齒十六通呪曰陽明景精光煥紫庭八芒朗映魂芒溢盈五轉三回氣周太靈流芳曲注蔭潤蒼生冠帶金門華根鮮明服御石景水母灌精順天運氣隨日華榮九孔納真解脫本形急急如律令次向日中叩齒二十四通服符呪曰陽精巳通飛華巳新皇芒流溢蔭注內纒仰餐玄潤芳華來臻宫宅開張蕩洗囂塵體映玉光面發金真靈飛禹步上造日門急急如律令右仰頭引日氣四十五咽餘水洗面沐浴還室內次面西向叩齒二十四通暝目思見日中五色流霞下來接繞一身及有紫雲大如目瞳纍十數重煥耀五色之內與氣俱入口中便引氣四十五咽液九過呪曰日魂流光五色滂沱錬形金門圓景峨峨靈輝吐耀受明天河玉芝盈溢蘭潤芳嗟飲我黃泉哺我飛華啜根咽實夀同靈柯形附太輝身騰飛霞千齡萬劫使我傾殂急急如律令次心三拜畢石景九錬水母玉符五氣玄華冠帶石景玉英圓光九錬魂魄日月垂映吐輝三天月華方形而圓景黃氣以每月𥘉五日十五日二十五日三過經東井之上東井玄耀之門也右取月華月臨東井日取井花水清旦露中庭夜半白上朱書陽精玉胎錬仙真符納符水中面水呪日黃氣陽精三合凝光玄暉返正冠帶八芒錬度東井受明飛星金華散靈五君流芳夫人降醴遍灑十方洪芳下注六腑溢充金精九化易景返容急急如律令次向月叩齒三十六通服符呪曰乘虛落烟遊宴太空上造月庭與真齊雙變化八道出有入無二景同輝永保無𧇊急急如律令右仰頭引月氣五十咽餘水沐浴洗面還室內次東向叩齒三十六通瞑目想見月中五色流光下繞兆身及有黃氣大如目瞳方圓內外纍數十重煥映五色之內與氣共入洞房中便引氣五十口咽液十五過止呪曰藏天包光黃氣鬱鬱結精含凝入芒朗煥瑩飾黃華石景淘灌玉芝盈溢潤光霄漢普天受潤登明晨旦駕景登空得升帝館長離下世超離八難與日同輝與月同幹次心拜三禮畢陽精玉胎錬仙真符黃華隂氣陽精沐浴固仙九魂九九煉生尸圓明啓告華光交映轉冠帶金晨王胎錬仙流芳淘津九陽育化元景回靈飛升上官玄霞散煙曲映我身洞觀瓊軒九宫洞視品玄師曰未有定力見一切無道鬼神可依九宫法男於離宫起一歲順行女一歲起坎逆行並一歲易一宫至何宫分即於年上起月月上用日日中用時又於時上起得患或作過鬼神發作歲支月支日支及方所即知鬼神情狀乾乾象主頭沉舉體重難任兩足俱冷痛祟是一陽人惡病纒身死西北是沉淪翻香有願誓皂衣及邪魂坎坎宫身悶亂懶語腸還鳴水蠱或支滿溺死語難伸正北因遊走怪夢足悲吟一鬼隂陽祟細問見其因艮艮方心腸悶喉中哽塞傷狂言并怪行悲笑同難量群鬼須八數廟社行不藏更有木金怪東北審形光震震宫瘟㾮病寒熱傳四支食厭并呪罵犯罪天使之刑傷疫驚死青碧死魂隨紅黃女鬼見三日有傾危巽巽宫顛狂鬼盲目不能明家先明隂語外厭是女人魂魄居鬼手書夜使呻吟潔齊求大道方始保康寧離離宫正南地癰癤火燒瘡上熱多黃病血鬼産傷亡緋紫橫死客沾親魂是陽正向火位討邪鬼見行藏坤鄉脾胃疾痢下體尫羸久須難治療西南有伏尸動土傷歲破光怪顯其時勾引家先母厭延死魄隨兊兊意癆尸疰喘嗽作迍邅葬埋坐不利刑傷有伏連橫夭求功德古器在宅邊鬼邪三人伴同共致𡨚愆玄師曰凡一切修誦度化消災制伏救治呪祝百物摧滅凶妖禳鎮不祥辟斥光怪召龍致雨請晴開光止水治火除瘟去害發符呪水收束毒獸求仙修真七經八緯降真召靈並須密誦靈書萬遍之後所欲立至神通漸至十萬遍坐致自然造化無方如火事書隱語火化吹揚或安髙山巖谷石上書寫或埋地中或沉水底採摘仙虊救病皆用此隱語誦之者一依口訣靈寶神鑑品道之至虛則應感萬物以咸生天之至清則鍳臨萬方以無隱地之至靜則育載萬彚以安寧水之至澄則潤澤萬品以化成日月至明照煦萬道以輝映其有物可體日月水之澄明可象天地道之清靜虛而應物無窮未嘗留物者外指事則九寸圓明是也內指事則方寸絳宫是也故靈寶大法之道以玄宅為主通神洞妙以明鑑為端於是天羅天相首叙靈寶神鑑妙法一十八篇九天九地之大數燭幽暗昧察鬼神之密機洞玄鑑微知聖凡之隱顯昭明五府映視十方如目覩掌法用九寸圓明清瑩平靜不經鑑粧者依式持呪布氣鑑面八十一日陽數法足所向神光必現真跡所謂洞觀三界徹視十方元逃纎毫況鬼神情狀踪跡乎苟心不澄正念不虛靜志不潔誠多致魔精變幻顯現非真修用之子可不謹歟靈寶五嶽三塗寶照呪紅杏墨黑磨真襪臘靈寶右以左手輪搯震坎兊離中即念呪捻定中指中文靈寶印取五方氣吹鑑畢呪曰功都聚魂招八方捷疾使者天神地祇萬靈同歸合天地勑攝右念呪畢再取中天氣吹艮方却吸艮方氣吹鑑畢以大指循八卦又呪曰謹請乾坎艮震巽離坤兊八卦大神催促入方天神地祇吾鑑中現形右以左手輪八卦靈寶印文以右手靈寶印文以中指於鑑上自乾方點八默於鑑面至兊亦循至靈實印搯住吸八方氣吹鑑放印在鑑上再念入室呪靈寶都天入室明鑑呪風收東巽雲崿上天乾氣收斗乾雨散五方右二隅氣吹鑑再輪搯五嶽即呪曰鄰紅杏入天成破象八方正東卯墨黑成雨降雨對四瀆龍乾元靈收卦北坎磨真想見金執千人甲坤混動五方氣西兊襪臘照南斗吾大溢在手地元對乾元離靈寶心內守中指中文襪臘列狀紐像宜破宫攝右法輪五嶽印念呪取五方氣吹鑑上再誦一遍自中文退至兊上搯定印吸西方氣吹乃靈寶入道五門鑑法然後召天神入鑑切鑑視天神呪曰順帝勑差靈寶照右法南方氣離文吹鑑再呪曰吾從何所能切鏡視天神收祖三元氣都天大法行上總取八方乾元助太陽幻隂從夜降吾列向五方右法念呪一遍吸天地人門氣吹又念呪一遍吸八方氣再念呪一遍取太陽氣吹鑑次念呪一遍自北方吸氣西南東中五方氣吹鑑可以視天神現形如昏濛未見再持移昏呪移昏寶照呪曰昏移閃破澄角翼新開公明氣斷收入驅擎迮移神清動神清動收收右法靈寶印吸日月明光吹鑑如方差殊未辨再念天都呪天都騰藏寶照呪移氣攢五音天門合入真邪氣犯五行地氣取三隂法靈催毁真三陽逐日散逢隂到取陽勑感應絶收勑攝右法念一遍搯靈寶印吸天門氣吹鑑再念呪一遍取太陽氣吹鑑畢再祝召合照天神名位吹鑑中次持五嶽呪催合照天神視見靈寶五嶽神照呪紅杏木行斷須呈足卯墨黑水破隂須疾催坎磨真金切角與西東兊櫗臘火經錬須成我離靈寶土靈寶歸生因中須疾摧疾疾右法以左手輪五嶽印自東北西南中天吸氣吹鑑中分仙真鬼物之品象萬類邪正之差殊再用三塗呪聚神成真三塗聚光寶照呪興生轉乾獨𨽻遷坤可韓明巽公都成切角正艮對魂氣收攝中收收收右法念呪吸三塗氣吹鑑詳視中可覩真象或八方進召神祇移景通見八方事再持換氣呪可以洞明換氣合卦寶照呪換氣移成堅天門立成新知題地戶尋文知氣全中右法搯乾坤靈寶印三次呪三方氣吹於鑑上可鑑八方事如遣而復召當持復見呪七覺換氣復見寶照呪曰隂靈徹覺滅瀆志天祁之神收對聚右法搯靈寶印念呪西北氣吹鑑即得所召之神後現於鑑內五行正氣寶照呪曰紅杏墨黑磨真襪臘靈寶興生轉獨𨽻遷可韓明功都成切角正聚魂攝功都聚魂招八方捷疾使者天神地祇萬靈同歸合天地勑攝合明天帝日勑攝右法先以左手輪五嶽三塗印取五方氣吹鑑上放印再輪八卦印以右手點鑑上八方八默再呪曰謹請乾坎艮震巽離坤兊八卦大神催促八方天神地祇吾鑑中見形右法念畢八方氣吹鑑上如照鬼神即攺念呪云收攝八方無道之鬼吾鑑中見形破對籙緑呪曰合咸池聽益緑白霜絹破緑體動朝昏緑破角分别緑依持西明緑可離見盡緑收管攝收管攝右法搯東嶽訣念法東方氣吹鑑辨英爽之衣服鬼魂之器用於鑑中視現知或潜姦隱由可用後法破匿成度呪曰繳意破角力度響名元立名度取性過力分度羅荒秀列破度右以可鑑幽隱或詐妄真正未别書依後法天洞六神呪曰三元妙洞定元華清洞持率勵行洞敕絳霄館洞意歷收李洞分六赤洞切右法靈寶印望天門仰視念呪取氣吹主為祟自稱大神高仙等以此用之以觀天界知其真假如或言是星宿直從後法驗之翼宿四神呪曰輪華年翼神清玉月翼神分定取照日翼神歆列助意時翼神右法靈寶印念呪東南氣吹又再呪取歲月日時建氣吹主鬼神之妄言為星宿之形狀或因人忤犯作災祟辨之乃見實端照精朴體呪曰招體四到空五方聚意成呼日結意破見意到數中結理意下成分氣在霞中可朝收意體結撲都意成右法向太陽搯靈寶即念呪吸日光氣吹再念呪向空中取五方氣吹鑑詳之蓋精氣為物歲久作害以此辨精魅結朴為形之始依何體挺質為精附人窮源照本事理可見擅興祠廟用後法治之三神對題呪曰破切逆攔交宿送管取到正可明悔回祿右法靈寶印西北氣吹鑑主鬼神之强捍令癲狂以怪妄擅興祠廟曲求祭祀令其見形把對生人如未真實再用後呪對望四行呪曰千察移易性行攝列到制足氣行攝移覷辨德正行攝躡移蹤離可行攝右法靈寶印四方氣吹鑑對辨鬼邪之真僞證望祟賊之虛實開通四方行跡可見四辨和形呪曰羸正和黑木察運通離欣别移八斷愛利切切切右法靈寶印四方氣吹鑑主諸邪類隨所以好惑人從欲入體乃牽引為禍祟辨别形影察見根源六玄察隂呪曰堪治渺真助玄罔貪破玄朝冝到玄呼瀆對玄六白輪轉意玄象移報玄右法靈寶印北氣吹鑑主難明幽冥之章不測之機用法可見七品辨品呪曰開理妙宫長華離宫對中算宫閻落妙宫取祟破宫寶城離宫對瀆角宿滅耗蝕音犯宫右法靈寶印念法東南氣吹鑑次西南氣吹鑑辨鬼神之邪正品位之大小用去究之即見靈寶無量度人上經大法卷之三十五
