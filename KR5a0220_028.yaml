front:
  text: 靈寶無量度人上經大法卷之二十八生八
  hash: sha256:bccac30339b6709573bfa4f2b5895939640128a3179d7a8a04dd2a20629f0330
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_028-001a, image: hfl/0090/0090-070.png}
body:
  text: 玄憲仙格品上品玄師曰功過罪福大則增減年壽小則促延齡算有三品九等皆叁玄都省天禁兆冝遵奉上等上格除增三紀上等中格除增二紀上等下格除增一紀中等上格除增十年中等中格除增九年中等下格除增七年下等上格除增半紀下等中格除增五年下等下格除增三年上等上格減益二百四十算上等中格減益一百二十算上等下格減益一百算中等上格減益九十算中等中格減益五十算中等下格減益四十算下等上格減益三十算下等中格減益二十算下等下格減益一十算玄師曰凡小善小惡更有減益十算已下至一算者太極玄能真人曰能造上品上等之功不可冒上品上等之罪小善須令一日一注小惡須是一日一消積小善成大功消小惡成大善上等之功雖造上品之罪不原學士誦之則享丘山之福慢之則獲萬劫之厄中品玄師曰男仙髙曰天尊女仙髙曰元君形神未獲俱妙尚有肉質尸骸不許封稱有功塵世大功三年中功七年下功九年一遷無功者並七百日一升初日校職隂曹次入水官山川主者次地官靖廬福地主者次洞天主者次十洲三島仙官漸進入於天官凡行功於世立十德大功行化之士內外功全迎神校職之所太隂鍊尸年限足日合形仙飛如功德內外不備分神治事建邸於天地水之隂曹也入此玄階清品須參斗受書落割死名上生南曹功德發於改正升入仙階年限比校亦許遷於仙品妄有冒越三官紏劾可不愼守犯之退品除年罰功墮事三天執茟伏魔持法使者初受法進入仙位太上執法弟子仙士真士仙官真官已上八發改正太上玉陛執法仙士太上玊陛執法真士太上玊陛執法仙官太上玊陛執法真官太上玉壇執法仙官太上玊壇一執法真官已上十發改正南宫少微執法真官南宫太微執法真官南宫元微執法真官南宫妙微執法真官南宫靈微執法真官已上十五發改正洞玄洞淵洞微洞神洞靈太極太清紫微大有天曹執法仙監已上有仙監七階天曹執法仙卿已上二十發改正太極執法仙卿太極執法真卿洞神執法仙卿洞神執法真卿太清執法仙卿太清執法真卿上清執法仙卿上清執法真卿玉清執法仙卿玊清執法真卿已上三十發改正太極執法真宰太初執法真宰太元執法真宰赤明執法真宰元明執法真宰太虛執法真宰耀明執法真宰竺落執法真宰虛明執法真宰觀明執法真宰玄師曰此法十位比諸天丞相之列並五十發改正一升四十發改正入已上十位仙宰自此已下入色界太煥元載太安顯定始皇孝芒翁重無思阮樂無極皓庭元洞執法仙宰執法上仙執法真宰並六十發改正入仙宰七十發改正入上仙八十發改正入真宰已上入無色界天太文太素無上太釋梵度平育執法仙宰執法上仙執法真宰太清執法真宰上清執法真宰玉清執法真宰玄師曰此位並九十發改正入仙宰一百發改正入上仙百二十發改正入真宰漸入真人之位並上帝特封兼諸天諸地諸水仙職亦是特封次進入天機內省天機都省太玄都省之任每發改正奏申天省比魔勘會非魔司校靈魔實功制魔司舉勳魔三官五帝保奏諸天列言方升品秩退降亦同非洞徹百神神通天司莫詳其奧别有天真仙格神朝金關日付之在賜衣建邸朝元參斗洞視按局大定七經功足方悉上玄至理下品玄憲仙格上品上格弒亂悖逆背叛征謀玄都律曰弒父與君毒害師長亂於天地五常道德紀綱毆悖君師父母怒毀違背師尊父母棄正入邪皈誠妖巫淫亂骨肉六親通同隂謀殺害並削名仙籍罰功墮事上負九祖下及七玄中及一身永受風刀之考萬劫不原後生禽獸之身非人之報永無仙冀除壽一紀玄憲仙格上品中格輕泄漏慢毀惡敗奪玄都律曰輕忽君師父母三寶尊像靈文不依年限妄泄三寶三洞禁經祕典法籙符圖漏泄天地五行讖諱未然神真天機密諱擉福不恭敬君師父母典禁靈文毀壞三寶尊像君師父母常住一切之物毆罵謀害殺戮道德五功六親之人敗毀教業生不信心靣奉背毀改其節志奪劫奸巧攻取三寶聖典君師父母七德之人物色衣具並削名仙格罰功墮事負纍九祖七玄中及一身死入長夜三塗苦報永於千劫不原後生蟲癩非人不相之形除壽二紀玄憲仙格上品下格殺害淫盜玄都律曰殺傷一切物命害陷一切生靈淫色無度夫婦不以禮交偷盜一切萬物並削退仙品罰功墮事負於祖考子孫中及一身死沉地獄三赦不原見世招聾盲喑顚不痊之相折壽一紀玄憲仙格中品上格破齊犯戒貪欲嫉妬憎煩玄都律曰啖食五辛三厭飲酒過度故嗜六畜禽蟲之肉破齊私情茹餐葷穢入齊喜怒賞罰不節巧僞貪求無厭所欲氛氲無足姤於勝已憎其不及嫉害善人擬願況惡恨𡜍心懷力不勝彼常操惡心並退落仙品三等罰功墮事九年除壽六年退齊一年補過善功一百二十贖罪玄憲仙格中品中格狡佞苟妄惡聲華綺穢汚呪罵玄都律曰狡心百曲嫌疑多端苟欲施為成敗奉上忽下佞於一時妄僞百端語行不實怒聲衝吼自尊自大背正信邪不明真假喜曲憎直細察求竒評論一切是非真假行住坐卧務於華綺性志不能返於朴素穢汙清淨五葷觸染淫語交集清晨呪罵誓怨天地風雨五行鬼神行諸厭祝並退落仙階二品罰功墮事五年除算二百四十退齊三百日𥙷過善功九十贖罪玄憲仙格中品下格竊詐欺昧意欲諸惡玄都律曰暗中竊物負缺不還因借不償因便取匿拾遺巧智因公為私詐言詐文取浮取實以僞作真幻妄鼓惑驕於天人欺心欺神暗中恣為罔昧三光天地善人心思意想欲為諸惡並退落仙階一品罰功墮事三年除算一百二十退齊百日𥙷過善功五十贖罪玄憲仙格下品上格玄都律曰賤毁五榖拋棄恩仁負盟負誓剪汙絲帛不信不義不仁不慈無推讓之心無拯救之念無的實之約無和睦之情並退仙格三品罰功墮事一年退齊七十日𥙷過善功三十贖罪玄憲仙格下品中格玄都律曰輕賤孤貧老幼不濟山林寒栖道士不修破壞未成功德不助善人困病衣食毁㙭山林冢墓自安以勢逼脅危人不救斫伐生旺草木將有作無昧心罔人占卜天地星辰祥異侵近王侯勢力以智網羅生物奉上有乖撫下有闕香華自用崇奉不專並退仙格二品罰功墮事半載退齊五十日𥙷過善功二十贖罪玄憲仙格下品下格玄都律曰妄言天司真靈之言假自已德行希求恩福恐嚇世俗漏言行道取於人知移攺簽緘印章符書窺人私事啓封擊鎖紀録小過踏踐案摖細微衆生考罵卑賤醉酒叫呼寒餓傭使許願不償毒害敗毁五行之物橫入是非飲食務精鞭考六畜籠繫禽蟲香火不潔拜禮草創於醮祭不潔章檄不謹敬尊失禮科章失儀並退落仙階一品罰功墮事九十日退齊一月𥙷過善功一十贖罪諸天音諱品三十二天正音皇曽天帝開玄攝明玉完天帝保玄道靈何童天帝冥生久真平育天帝飄翰默然文舉天帝開生舒越衡天帝鏡無翹濛翳天帝阿難洋明摩夷天帝延虛明和陽天帝治安保仙恭華天帝飛音洞靈宗飄天帝鬱貞英皇笳天帝難玄明堂曜天帝彌綸玄明端靖天帝朗觀曜明恭慶天帝威清道玄極瑶天帝洞真永觀孔升天帝開光竟真皇崖天帝暉英阿魂極風天帝回翹威孝芒天帝君華大權浮容天帝惠威光江由天帝朗法元阮樂天帝鬱元真曇誓天帝飛天虛英霄度天帝元清明元洞天帝法權道先妙成天帝靈勳惠元禁上天帝陽威曜清常融天帝攝玄靈真騰勝天帝空微道明梵度天帝掬靈妙光賈奕天帝永玄久生此諸天帝玉諱皆以赤晶之碧字刻之祕於上清帝宫乃諸天帝正音不傳下世其經中之諱乃隱名也皆空洞自然靈章九和十合變化上清無量之奧深不可詳誦之萬遍白日登真所謂我有洞章萬遍成仙蓋此言也三十二天隱音皇曽天帝諱覺觀玉完天帝諱攬覺何童天帝諱大覺平育天帝諱育王文舉天帝諱梵雲摩夷天帝諱玉真越衡天帝諱無上濛翳天帝諱吁育和陽天帝諱煥明恭華天帝諱世元宗飄天帝諱洛覺皇笳天帝諱韶堂曜天帝諱雲上端靖天帝諱淨生恭慶天帝諱鏡極瑶天帝諱廓奕孔升天帝諱猷皇崖天帝諱宛極風天帝諱流孝芒天帝諱易邈浮容天帝諱阿繿江由天帝諱阿丘阮樂天帝諱無量曇誓天帝諱曇霄度天帝諱育元洞天帝諱上妙成天帝諱陀禁上天帝諱隗騰勝天帝諱浮𥠖梵度天帝諱精上常融天帝諱極賈奕天帝諱惡奕五老天君內諱青帝天君諱閻開字靈威仰赤帝天君諱洞浮極炎字赤熛弩黃帝天君諱通班元氏字含樞紐白帝天君諱上金昌開字耀魄寶黑帝天君諱黑節靈會字隱侯局度生真人諱扶義常五方五帝內諱青帝諱常精明白帝諱混辱收赤帝諱炎洞丹黑帝諱玄明萌黃帝諱麻忠順此五帝乃經中言青帝護魂主肝在天主飛仙在地鎮王嶽主領鬼神在人主五臟領五神肝魂肺魄心氣腎血脾主中宫主於肌肉是以人法地地法天天法道道法自然開滅度之門教學仙元始關告為玄元之範治玉京玄都之中與經云齊到帝前是也大羅天相玉清公諱廓奕上元真人諱曇頥南宫度命君諱吁育九華真人諱落空玉帝諱廓奕上清天帝君又曰紫晨天帝君諱玉真字陀與乃無色之境梵行之天大梵之氣流行混成之圖自成九色光映不假三景上耀故經云無色之境梵行天帝玉真蓋言此也而出神景玉秀為道元標以龍漢而來至赤明摩訶者諸天呼元始天尊之隱號玄中太皇諱易邈九華真人諱九靈月中夫人字緑羅髙上神霄玉清王諱韶南斗君內諱緣北斗君內諱邅南上更生之神諱飛生南上好生君內諱猷四極上真人隱號景皇景霄真人隱諱蔚太上道君內號宛首更生真人內諱扶太隂都后九靈之母內號坤母天帝司命君內諱玄統領飛天十方神王好成神王諱育生天帝上相丈人亦號九天上真諱育主日真人諱吁主月真人諱員九天大帥內名那育四極真人官內名宛藪滌色度靈大仙師諱柏空斗中四真人諱阿陀龍羅始青天帝諱浮黎監生大神更生真人諱扶羲百靈隱名品五嶽帝君中央后上姓冥諱董南嶽君姓榮名𣋎西嶽君姓崇名北嶽君姓晨名中嶽君姓惲名𡾗東嶽君姓歲名嶚五天大魔王青天魔王姓斌諱齒成巴赤天魔王姓佛諱由莆勢白天魔王姓赤諱張布黑天魔王姓徐諱直事黃天魔王姓天行諱波五帝大魔王青帝大魔王姓迫落諱萬刑赤帝大魔王姓赭諱上柏白帝大魔王姓鄧諱吁黑帝大魔王姓梟諱公孫黃帝大魔王姓宛躬諱産生六神長生大君諱吁青無英公子諱玄亥叔白元尊神諱洞陽君帝皇太一諱重冥空司命尊神諱理明初命門大神諱回亥字道康太一在腦主衆神也司命主心納生元也無英在肝制三魂也白元在肺拘七魄也桃康在臍保精根也長生大君隨虔變生為精血周流之主三界魔王欲界魔王諱郁默色界魔王諱摩羅無色界魔王諱韶三界飛天大魔王諱大醜玄都大神諱阿那太和玉女名鮮斗中靈童諱都馥玄和玉女名道容南宫主火錬池靈童諱婆泥忉利天魔王諱咎通日中靈童諱少都天中羽林監神名邈天中侍宸諱空大梵神嬰名觀音火輪童子名無惒玉清掌火獄天官諱稼玉清斬邪大神諱那玉清飛天神王諱忽玉清萬化玉女諱訶玉清考察上吏諱流都上都神女名曲麗天機上相丈人諱育清精玉光大神名飛灑斗中二大神諱阿陀龍羅生胚變胎大神名阿繿三天阿那大神諱育菩首靈寶無量度人上經大法卷之二十八
