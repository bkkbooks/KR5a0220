front:
  text: 靈寶無量度人上經大法卷之一二同卷
  hash: sha256:40ee1801ededec2ca82d355478a8b6f28bcd3422c7fc57e66b37ee08b87f377f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_001-001a, image: hfl/0085/0085-010.png}
body:
  text: 八明開聰品玄師曰靈寶大法乃無上大羅元始天尊所説玉宸道君五老上帝髙尊上聖妙行真人十方神王至真大神所受後聖玄元金闕髙真天帝行化下教世間得而聞之乃是三十六部尊經總萬八千篇衆道之宗玄淵隱奧與萬法一貫一則明元始祖氣從何先化玉字按靈寶玉字內音經云自三氣之先溟涬之後其中真精歘化挺生元氣元氣之內有神曰元始天王其氣混凝與元始同生流化結芳非色非相或舒或張至延康開劫一氣分形而為二氣虛無自然而生始氣二氣交結凝相太空彌覆無極字方一文八角垂芒莫知其理二氣混凝包藏玉字至龍漢開劫元始天王分隸二氣混沌開光氣清髙澄成天氣降積滓成地二氣分合中有和氣名曰玄氣亦曰大梵之氣至赤明劫元始開圖中有真陽之氣化為洞陽之火元始運洞陽之火冶錬三氣混合玉字而成赤文因而劫號赤明文號赤書玉字是茲理也二則明生育混沌陶冶萬範自混沌開析三氣成文火錬為赤書光明之氣陽光之精成日靈光之精成月餘光布散分為萬象三氣之神分為三清之聖自此之後萬彚皆出皆生莫非玄元始三氣也至開皇劫分隸三元化生諸聖至上皇劫五劫周啓五行全形化生諸真諸仙應五劫之內産生玄中之精精中之神皆名上皇故劫號上皇劫五劫之中五行正氣流方布形或聚或散或卷或舒或張或體應雲煙火霧或象類星斗金玉或形分蟲魚龍鳥皆出於赤書玉字分形自然生成三洞四輔之文龍胎石景億萬圖書三部千條局命天真皇人太真玉妃悉書其文録為簡籙以正生成之本總括萬象之元陶鑄群品之機出産仙真之紐三則明靈寶大法自然生成圖書總括萬象為三才機紐是茲理也四則明大法為三洞祖教出生一切聖人自五劫開化之後玉清洞真上清洞玄太清洞神三洞之經四輔符籙皆因赤書玉字而化稟受靈寶之氣而成昔自元始天尊命上皇三十九帝九霄天帝各紀經祝而成大洞三十九章明五劫開化源洞之體述和合三氣歸一之法付玉宸道君次於諸天説三十六部尊經後自三皇之代金闕後聖玄元老君下化神農時下化為郁默子嘗百藥分五穀而説長生經伏羲時下化為元化子正八方演隂陽説靈寶元陽經祝融時下化為鬱華子修三綱齊七政説靈寶五星混常經黃帝時下化為廣成子説靈寶道戒經少皡時化為隨應子説靈寶元藏經髙辛時號元陽子説靈寶微言經帝堯時號務成子説靈寶政事經帝舜時號尹壽子説太清經靈寶赤書夏禹時號真寧子説五篇真文經龍蹻經周時號郭叔子説靈寶赤精經道德二篇靈寶八威治魔經秦始皇時授以鬼林經并策役鬼神之符漢世名赤松子説三一經文帝時號河上公説道德篇章西王母奉元始之命説靈寶三十六部尊經於武帝時下降人間授帝無上洞真洞玄洞神之教至于桓帝永夀元年又下降人間演正一太清洞神之道方成三洞皆因靈寶大法化生一切聖人也五則明人身體法元始造立混沌而自人身生聖胎法身父母交精一點含和二氣分坼先生其腎三氣分肇而生神府者心也四氣交并華蓋成形五氣交光如華五葉即五內備氣如三氣至五劫之象也二氣分判上生泥丸而下至玄谷水府也三氣火錬上生日月如同兩目一身光明為萬象也人身正同其理夫身外分形須知靈寶祖氣靈寶之氣入沙成金入石成玉禽生鸞鳳獸生玄龍草木生靈芝五穀含嘉瑞氣散成和風氣升成慶雲氣降為甘露入水生夜光在人生聖賢以比為祖氣乃至和太一之精衆靈之首大寶既有此物如人之生形入大浮黎土丹谷中央也成行九轉分形五變而成法身乃元始十遍枯骨更生是也六則明元始祖氣無形之先比擬降質成氣化生萬寶今世作何體狀復採錬此氣餌之則登真正所謂靈寶之氣如萬類亦有之謂龍珠虎寶牛黃鴉丹之屬也今流精玉光丹亦是也所是靈寶之氣天地者日月之對日中之時身中者神氣會合之初故太一真人曰常於太極握樞機動靜神珠降幌幃自有靈寶生玄谷黍米空歌嘯詠時是也得此餌之必登真人之位故下仙莫能階此髣佛矣七則明大法中大洞育物回靈之道則白日登升次誦詠長生度世尸解得道經經中備有萬法是寶經之指迷天中元始説經之旨趣則常理矣上有修真內錬骨肉同飛之道中有長生度世尸解之法下有升祖度玄之教大則保鎮天地正天宿度愈災却魔之格小則有治療沉痾回尸起死之功明則有嘯命風雷變化自然之靈幽則有策使萬靈徹視十天之文故曰備有萬法八則明大法有三品必成聖真仙道如通玄究微行諸十品上道功德合備則白日登升若其餘修誦得一法一教長生度世為地界洞天仙人之首或朝夕朝禮尊敬奉事供養則必獲尸解之仙十洲三島散仙之民矣靈寶無量度人上經大法卷之一
