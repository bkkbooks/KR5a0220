front:
  text: 靈寶無量度人上經大法卷之七霜六
  hash: sha256:313cb3dd29a32110a7f9c74549a1fd53740eaf329355e07a53324d4d16b64065
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_007-001a, image: hfl/0086/0086-078.png}
body:
  text: 靈寶符命品中理五氣服之通百關潤肌膚混合百神鎮宅安禁忌龍神十轉回靈鎮井泉鬼花木靈精萬氣齊仙鎮伏尸客亡鬼上開八門鎮宅財物興進飛天法輪鎮財物耗散罪福禁戒鎮子孫不旺多憂衰弱宿命因緣鎮夫妻嫉妬鬼普受開度安仁人手中得免罪上生梓木朱書告行之法死魂生身安亡人手中令子孫再生得壽梓木朱書告行之法人道渺渺治土瘟安鎮仙道漭漭治學道失心服食鬼道樂亏鎮舟船舟水性龍蜃不興災當人生門度傷死之鬼得生鎮地告亦同天道貴生鬼道貴終仙道常自吉鬼道常自凶髙上清靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人算斷絶人命門阿人歌洞章以攝北羅酆采送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆落落髙張明氣四騫梵行諸天周回十方無量大神皆由我身我有洞章萬遍成仙仙道貴度鬼道相連天地渺莽穢氣紛紛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别真我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故為歌音三界之上渺渺大羅上無色根雲層峨峨唯有元始浩劫之家部制我界統承玄都有過我界身入玉虛我位上王匡御衆魔空中萬變穢氣紛葩保真者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何魔王敬形敕制地祇永離鬼官魂度朱陵過度三界受煉更生是謂無量普度無窮書符呪曰天晶元元地廣川川雷公辟邪電母應天草人精靈役使萬年樹木靈異敢致壇前盧盧泠泠依佐四邊神靈在下召汝神魂立至使吾逆知千年立附立到隨時報應瑟瑟栗栗靈祇速集泄泄吉帝靈龜敕制急急如太上靈寶敕右法左手卯文呪之並用黃紙朱書按前文靈寶無量度人上經大法卷之七
  hash: sha256:05df2da5fcbb0e603755f3c5e282695e095c2823b92dbfb064a5b3966c0127b0
