front:
  text: 靈寶無量度人上經大法卷之二十金十
  hash: sha256:bc8b84ac263bf753f00cbd80780f7910fb0485b440fa2a4be51fba7ca86fc289
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_020-001a, image: hfl/0088/0088-128.png}
body:
  text: 隱書玄象品玄師曰乾坤開闢五行三才之象皆有形質為人能全天地之氣而不能長久者謂其通於變化而不能拘於精神以養清真之氣而反為妖孽邪魔夫人能養其天氣可證天真養其濁氣化為魔鬼此則易知而難行易行而難言也長生飛升之道無非得道是故迷淪於色欲之界靈寶隱書雖其言寡其行奧欲清氣不荒於色欲之間濁氣俱澄於沉淪之內當赤明劫運流行上學其於下士莫可得焉逮我皇人得之浮空立象至精之中日月星宿風雨四時正氣之內卞璇璣玉衡輪回晝夜世人能存其長生之道而不入於輪轉之界則具在隱書分別諸章酌然巳見長生要徑之門必使超凡入聖而易行上仙得之明風雨冥晦下仙得之通生死機候王侯得之推應四時資養萬物召感和氣乃至長生凡人不知委形與天地齊同使精神氣血耗散即衰老而自死靈寶長生之訣運度流行使歸根復命魂𩲸嘯詠氣血泛景然後隱形遁迹飢寒無侵消魔除毒避世絶味至於得無為長生之道萬法之宗不出於此戶庭耳所以四極天中梵氣音文一極六十四字是五行卦象之文不離人身若能動息悟解精氣混合靈音和暢是為長生不死之人在天成音文氣候在地成萬物形質在人得之沖識往來然後知空不空知色不色是為照了達我妙音身與天地齊氣與隱書合知音者其行有七一遍身輕二遍神安三遍氣全四遍精通五遍神化六遍通靈七遍成寶自然和合變化上清飛身金闕遊宴玉京青帝大魔神功符凡欲受持立春日志誠焚香靣東陽初甲子庚申三元日同雞鳴正坐合目拱手如意自在候氣安靜勻和不可以手擦面目恐亂神氣次以津液盥漱咽液一過叩齒三下然後鼓氣一口使息氣調勻出自鼻中徐徐勻停調一手息自然遍滿肌膚血脈毛竅之間六根即得清淨此養東方阿薈無愁發生之氣鼓氣一口以養胎息若不鼓氣奔入南昌心帝之位相剋未可用也凡欲使息氣長久以心目相存於鼻竅之中自然得久次以閉息令長久以心聽耳內若蠅蟲蓊蓊之聲凡人觀聽於聲色所以精神飛走而出於耳目之間致疾病夀夭常以心聽耳有若蟲聲自若魂魄不散故人居色欲之界常存此法令情欲自滅精神不衰不知此法神疲精耗死則近矣次心中存身化山川林木身若在天地日月之下久行此法精氣內守覺如山嶽之象以安百神即得精氣生存疾病自愈行持至此徐徐開目以淨水吞符此召青帝護魂按東方隱書自亶婁阿薈至四象吁貟此東方八天是八卦之象巳上六十四字分音氣為六十四卦上屬春官木德蓊鬱之精東斗主算青帝君之治在人身為護魂君主耳目口鼻毛髮生門之魂東方天魔名曰巴元醜伯天蓬兵法職之巴元醜伯勑九轉戊辰已巳納音屬木當行東方氣符及兼行中極氣符外納音屬木日凖此將上四字合為一符或隨形勢大小篆之凡篆此符面東方以左手仰掌大指搯中指中右手執筆念東方八天音文六十四字畢念目想東方八天帝在雲霄半空之中垂一珠如彈丸叩齒三下取珠中青氣一口吹筆上念呪曰元始靈書勑巴元醜伯魔王受天蓬大法急急如律令次用朱書符先寫巴元醜伯次字上劃八卦重疊劃之人書勑字隨筆左轉九匝出筆赤天大魔神功符焚香安坐如法調十餘息令勻長存心常若蓮花之狀後盥漱咽液沃澤想心氣與眼氣相通次想心氣直上至頂後過聲若雷轟覺如風雨存在兩眉之間存見眼中雙瞳有若金環之狀金環想法目前隨左轉九回凡人眼前有花生或黃或黑為精氣所散神光在外眼目有疾行此九轉神光法即得光明至老不昏昧次想身在猛火之中稍覺炎熱又想天柱之中時若雷電霹靂之聲覺百骨毛竅皆開身上若雨露升降大有剪邪辟惡之功按南方隱書自南閻洞浮至神纓自宫此南方八天是八卦之象六十四字分音氣為六十四卦上屬夏官火德赫奕之精南斗上生赤帝之治在人身為養氣君主心帝生氣樞機之門南方天魔名曰負天擔石天猷兵法職之負天擔石勑三轉丙寅丁卯日納音屬火當行南方氣符及兼行中極氣符外納音屬火日凖此凡書符面南搯中指第一節執筆念南方八天音文六十四字念目想南方八天帝君在雲霄之上垂一寶珠如彈丸叩齒三下取珠中赤氣吹筆上念呪曰元始靈書敕負天擔石魔王受天猷大法急急如律令次用朱書符先書負天擔石次劃八卦次書敕字三轉筆出筆如法白帝大魔神功符焚香安坐面西調十餘息令勻上想心中金色光明通照遍存心氣在兩乳中即巳遍然後盥漱咽液入華蓋肺腑之中想身在七寶林中上想見山不凡之狀髙若萬仞居大海中與塵世相隱次即心想兩乳左右有湧泉兩穴自丹天之下上升此穴流出身外皆散漫於海中此為泝流之法使精氣保養凡人兩乳煞氣若杵聲心從尸神之所感尸神按西方隱語自刀利禪猷至柏空度仙此西方八天八卦之象六十四字分音氣為六十四卦上屬秋官金德耀𩲸之精兩斗記名白帝君之治在人身為侍𩲸君主肺腑華蓋地根之𩲸西方大魔名曰反山六目翊聖兵法職之反山六目勑七轉甲子乙丑日納音屬金當行西方氣符兼行中極氣法餘納音金日凖此凡書此符面西搯中指中節右手執筆念西方八天音文六十四字令目想西方八天帝君在雲霄之上懸一寶珠如彈丸大叩齒三下取珠口中白氣吹筆上再呪曰元始靈書敕反山六目魔王受翊聖大法急急如律令次書符先書反山六目次劃八卦次書敕字轉筆七匝出筆如法黑帝大魔神功符焚香安坐面北調十餘息令勻長想耳中黑氣飛散出耳內聲若殘蟬之聲餘音斷續不絶自然神氣寂靜通血君朝於元矣凡有四肢骨血之疾此法消除為要也次調息閉氣存想上天日月之象降在兩眉前照徹十方然後日從左鼻孔入月從右鼻孔入直至頂後次入丹田中照耀光徹遍體先存日輪在丹田中旋行運轉九遍次想日左月右在丹田中不敢動放五色光明從天柱而上直至頂後光明十方想日月在丹田中若大冶鑄金石之狀如此烹煉隨意而止此為內金丹之法行恃歲月即為長生之人若鼓氣盥漱即成流珠之狀按北方隱書自玃無自育至幽寂度人此北方八天八卦之象六十四字分隂陽為六十四卦上屬冬官水德曲育之精北斗落死黑帝君之治在人身為通血君主真陽腎元生根之血北方天魔名曰監醜朗馥黑煞兵法職之監醜朗馥勑七轉丙子丁丑納音屬水當行北方氣符兼行中極之氣納音屬水日皆率此凡書符面北左手搯中指二節右手執筆念北方八天音文六十四字合目想北方八天帝君在雲霄之上懸一寶珠大如彈丸叩齒三通取珠口中黑氣吹筆上念呪曰元始靈書勑監醜朗馥魔王受黑煞大法急急如律令次書符先寫監醜朗馥四字次劃八卦次書敕字次轉筆七匝出筆黃帝大魔神功符焚香安坐調十餘息令勻長以心想頂門有黑氣直入至雲天碧落之中化成一宫若有所立圎象有式存自身披五色雲霞衣頭頂旒文冠手執玉簡珠履而坐所見圓象之內其中有靈光照徹天地之間如天帝所居之宫往來所都皆自然矣以此召黃帝中主之君此乃元始中極之法中斗大魁君之治經云黃帝中主萬神無越總監衆靈之司魔王名曰橫天擔力此尊在四極之上元始正氣土德之精圓象修真之法總氣歸於無色之界行持之後今人歸根復命煉精養氣煉氣成神煉質成真經云上遊上清出入華房八冥之內細微之中下鎮人身泥丸絳宫中理五氣混合百神十轉回靈萬氣齊仙橫天擔力勑一轉庚午辛未納音屬土日當行中極氣符更不兼用四方法外納音屬土凖此使內外金丹功成凡書此符面東存中央以左手仰掌搯中指中節執筆念呪曰光明立成度生辟禳度成想元始上帝在層霄之上垂一寶珠珠口中出五色氣吸氣吹筆上念呪曰元始靈書敕橫天擔力魔王受中斗大魁法使吾煉精養氣煉氣養神煉質成真即日飛升急急如律令次用朱書符先書橫天擔力不用卦次用光明立成度生辟禳度成十字次書敕字轉筆一匝出筆如法右法是上真之道所以飛升金闕遊宴玉京也學道之士行持至此依前法吞服巳上五符凡遇濟人治病看五臟所屬以五行同類給符佩服如病在肝用東方符如水火刀兵之禍用五行所尅之符如禍患是水即用中央土符治之凡寫符於物色器具上或草或篆大小皆可但不失音文理劃為妙也師曰自赤明開圖神農炎帝總三十二天帝君分降于世立成淳正之道至于黃帝有熊三十二天帝君又復始焉取用清濁立成法象皆形質之道天真皇人書其文為五行之正亘古五行卦象用之乃長生接物之道靈書三十二天乃上帝統御之司下應尊號帝王之位亘古之後自黃帝修真登太皇黃曾天百王輪轉至於有唐明皇玄宗登元載孔升天皆書記典籍周穆秦始漢武之君位列輔臣者亦可數考焉是知天人上士登真之道具在隱書三十二天一天內音八字一極共音六十四字立象八卦世人得之可以長生蓋天之文日月星地之文山川林人之文精氣神日月星道用光明山川林道用度生故經云無文不光無文不明無文不立無文不成無文不度無文不生又云無所不辟無所不禳無所不度無所不成此為道之妙用故三十二天下鎮人身以至四肢九竅五臟六腑𡨋合三十二天之宫分知之修煉合天之道復有黃帝真圓象大法修用按五行五氣日服一方氣符皆要治之訣昔黃帝之時為妖孽所害遂用五方符圖書於劒戟之上以降滅之又以五方旙蓋畫象戰蚩尤於涿鹿是知圓象可以感動圓極至後功滿德就白日沖舉黃帝書曰斗野之正以應圓象之地後失其所惟明皇廣求謂地有神人獻之在淮水之上四望正方遂建斗野堂今廢為亭臺矣昔夏禹治水觀大梵靈音八卦之文隨山川形勢穿源鑿穴飛步圓象疏決九河皆神之至故得太平之治周穆秦始漢武之君皆求此道多失其源後人攺易圓象符圖以大禹治五行形勢添減文畫無音可攻至東晉真人許遜因江湖為妖孽所害曾親受黃帝之書用鐵板書此五符拽於湘渚斬馘妖毒今符板在長沙昭潭之下真人以此治妖孽救生靈積功纍行拔宅飛升仙翁葛洪常以此符用五行相剋日戲書於水泝流而上見者皆知其神異至秦皇訪求靈迹輔臣徐福獻禹步天文地理圓象伏魔之書欲使民淳正佩奉行之可以朝至碧落暮返皇家遂去儒業慕蓬山之居役使生民枉死無數有失其治則天帝之官墮矣是知古聖今王皆三十二天之應治至於宣和庚子之運其象內方而外圓丙午之辰其象內圓而外方故西北有河潦之災兵革之害知此當立圓象以應淮水書靈符以投三山鎮此運會可以保天長存兆民受賴生死獲福略紀其異以為要驗之文靈寶無量度人上經二十
