front:
  text: 靈寶無量度人上經大法卷之四十九水九
  hash: sha256:0342f565442ab524b5d2238b981584983c6818eea735e3364e1d5ef97db044a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_049-001a, image: hfl/0094/0094-072.png}
body:
  text: 降召符命品皇人曰大有妙庭金闕玉房皆元始靈寶之氣結成自然之文以制萬天之分夫行持之士若建靈寶壇須篆降真召靈二符以化壇陛為金闕梵行之界方始行事上清靈寶降真符開明三景是為玉山大羅天根上京玉清三華大有大行無離便妙庭梵氣上真與道合同上清靈寶召靈符天中之天渺渺劫刃無幽混沌之中無冥旡形無影無窮梵氣彌羅泛景無極萬範開張太霞十轉回靈契休合真右二符中自有符吏一十二人監臨壇所書時玉清訣取天門三氣吹篆而成玄師曰元皇降真靈符虛皇召靈靈符乃三天飛玄正氣自然之章以召三元衆真萬靈兆司清宫仙階位治靈虛真品欲降百真召千靈以青綺七尺二寸中絶朱丹書降真靈符飛黃籙召靈靈符安於靖中以黃錦作席或黃繒亦得用醮禮祭之百日降真召靈使者玉女金童各三人隨祭降下直衛真文所召百真千靈立降于室學不篤信五嶽試人輕露泄密所召不神凡諸三天仙真靈神遵符而屇前無神文乃為妄召雖精思苦徹萬遍一報或有降者多作魔試受者依玄都憲格齎三素繒隨年尺詣有經之師以畫坐而心記不載於文恐鬼神禽畜切視漏泄也靈寶召天真符玉京衆妙神光樞冠玉清神光之宗萬道玄都上帝玉女秉敕速召來臨應召諸天真須依上書太上元始玉敕散形天真聖位天真大神辰妙行真人酉至真大神亥度人不死之神申南極長生君午好生韓君丈人離南上司命司録延夀益算度厄尊神寅卯丑離回骸起死無量大神未長生度世無量大神未五老帝君中指下諸天丞相玉皇監生大神子三官帝君中亥子東方八天帝君南方八天帝君西方八天帝君北方八天帝君東斗主算君卯西斗記名君酉北斗落死君子南斗上生君午中斗大魁君中指中青天魔王卯赤天魔王午白天魔王酉黑天魔王子黃天魔王中指中千和萬合君四指中過離至卯長生大君子玄無英公子寅丑白元尊神巳未太一司命君酉桃康合延君辰巳執符把籙君子丑保命生根君大指中中理五氣君中指中混合百神君卯酉中指中總召君吏符洞玄三氣五行所運急至元明成真三天敕行急至萬神咸聽君吏聖位神公受命君普掃不祥君八威吐毒君猛馬四張君天丁前驅君大帥仗旙君擲火萬里君流鈴八衝君金鉞前戮君巨天後刑君屠割鬼爽君風火無停君千千截首君萬萬剪形君明檢鬼營君金馬驛程君元洞玉曆君混洞赤文君敷落五篇君赤書玉字君八威龍文君旋斗歷箕君上開八門君飛天法輪君欲界大魔王無色界大魔王色界大魔王束送妖精君斬馘鬼鋒君敕制地祇君歷關諸天君普告三界君魂度朱陵君受煉更生君消諸不祥君保舉上仙君右官君皆屬法部之驅使應書神君號念諸天校録至諸天臨軒巳至午中指中召十方飛天神王符師曰十方飛天神王威德最大功力甚重聖化不可思議於赤明劫𥘉在浮黎國中開圖校録之日奉元始至尊之命掌三界十方一切圖録校量罪福輕重記録功過淺深隨方量品無極度人各有十方飛天使者吏兵億乘萬騎兆能崇重尊仰敬奉凡諸度生救死遣飛天使者奏告神王乞行救度朱書方位各隨事注於下吞佩燒服貼鎮立獲神應師曰所召所服别有密旨慎無妄泄犯之必至殃考擇吉日採古楓木作九宫盤方靣六寸畫九宫八卦中宫立上下二方以三素之色為綵繒如欲用柏木作神王位牌圓面一寸許自初一日為始召之凡有所度朱書其言擲直之方其響應立至無所不治無所不服無所不至無所不度也初一十一二十一東方神王下降初八日十八二十八南方東北方神王下降初四十四二十四西方神王下降初五十五二十五北方神王下降初三十三二十三東南神王下降初六十六二十六西南神王下降初七十七二十七西北神王下降初九十九二十九上方神王下降初十二十三十日下方神王下降師曰並依神王下降直日用之并所主之方神王同應之方小事不可召大事方可施用朝元皆神王開道引前也飛天寶臺之式符散形大梵億劫星宿元始旡量無上化身停關演化度人敕召飛天受事神王速降敕召十方無極飛天神王長生大聖齊駕降臨年月日具法銜姓某符召遣十方飛天神王呪東方無極飛天神王忽掌兖州分野震文召之遣呪曰七靜道生七觀無生元始觀身飛晨玄真東方神聖秉敕無停急急如靈寶大法律令水九六南方無極飛天神王飛掌揚州分野萬文召之遣呪曰靈都九通萬氣交中神敕一下靡敢不從急急如靈寶大法律令西方無極飛天神王雲掌豫州分野兊文召之遣呪曰仙司總録玉寶虛中玉敕一下莫有不從急急如靈寶大法律令北方無極飛天神王無鏡掌冀州分野坎文召之遣呪曰建元玄虛寂妙入無神敕振伏走霧雲衢急急如靈寶大法律令東北無極飛天神王梵掌青州分野艮文召之遣呪曰安陽昌靈保黃飛群直符所制萬神敬聽急急如靈寶大法律令東南無極飛天神王那掌梁州分野巽文召之遣呪曰絳力隱微太真玄珠敕命攝制風馬奔馳急急如靈寶大法律令西南無極飛天神王度仙掌荆州分野坤文召之遣呪曰空寂暉晨含景玉虛符命所遣莫敢遲儲急急如靈寶大法律令西北無極飛天神王玃無掌徐州分野乾文召之遣呪曰顯德總持靜梵玄英玉符一下不得留停急急如靈寶大法律令上方無極飛天神王瑛掌雍州分野中指甲下召之遣呪曰圓蓋法輪扶摶耀乾玉符一敕直造帝前急急如靈寶大法律令下方無極飛天神王落掌五嶽地府冥曹中指中召之遣呪曰嶽瀆滄溟宗崇靈敕玉符所遣何赦不遵急急如靈寶大法律令總召十方神王呪曰洞玄宗先靈枝之元太一左史御氣飛煙雍雍侃侃褒服飛仙一瞬十極總御萬天阿繿那易婆步曇延逺落那顧乘命玉宸付令侍壇為宣化度如律如編總遣呪阿繿那易孛連婆步逹落曇延厥淪那顧齎章飛馳以雲以霧龍召寶環削簡正誤錯字為攺落字為注無令上官典者遣去應十方神王各領天兵萬騎可以通信十方招集群仙收斬隂魔制伏鬼帥不可妄遣召集萬神啓運符具還無敘玄品召九隂符素華隂精晨耀合明混冥太真回反胎嬰青腰玉女飛霄羽裙右侍帝軒群魔東形隨我熙篇提攝魂靈襲慶柔順安鎮帝廷急急如律令召九陽符九陽神梵玄景晶英真光凝結反易胎嬰太華金童總統天星隨符驅役侍衛合井辟邪去穢摧滅妖精靈符告下與道長生急急如律令右二符黃紙朱書左手上帝訣天門氣玉清符玉清符文到處萬神咸從右符黃紙朱書玉清訣中指中文元始祖氣吹入符中上清符上清符文到處萬神敬從右符黃紙朱書上清譯中指卜文靈寶真氣吹入符中太清符太清符文到處萬神敬聽右符黃紙朱書太清訣中指下文太清混元氣吹入符中上界符使符驛龍騎吏星奔火衝急急右符黃紙朱書中指中文天門氣中界符使符播地撼山直符威兵急急右符黃素朱書中指中文地戶氣下界符使符帝靈敕命帝靈沒水急急右符白紙朱書中指中文斗氣日直功曹符玉帝靈靈上徹三清直日功曹疾速降臨玉清敕命敕召衆靈上通無極下徹幽冥收魔攝鬼不敢久停太上敕命火急降臨急急如律令右符黃紙朱書搯本日訣取本時氣敕呪曰玄曹玉文立功之官主治玉清奏報三天上帝有敕速下神光謹召某日功曹依律連至急急三五使者直日符兵功曹走吏聞吾呼召急急如雲急急召當界土地符乾天精靈七真元君五斗華蓋纒絡我形身佩七星流金火鈴照徹十方洞及杳冥普告當境土地正神魔無干犯鬼無妖精千千截首萬萬剪形安則有慶動則無生土地正神各保安寧急急如律令召社神符訖埵彌泮吒右符凡有事係召五嶽嶽吏使之書符時搯艮文念呪七遍欲召城隍社令應土地典者皆用此搯坤文於其下先書名次以符召此符昔嘗召南昌社伯用之驗命魔前祛符皇人曰夫拜表上章朝真謁帝宜先於壇陛焚命魔前祛之符開通道路夫度亡魂亦以黃紙朱書闊七寸長九寸青腰封搯上帝訣書之取靈寶祖氣貫注符中存五帝大魔手執命魔之幡引導而行經過三界萬神不敢拘留太清玄光玉清七元星光慧光上清寶光照開道路赤明開圖運度自然超度三界位登仙公白元尊神輪轉無色太一司命回度五常泛景太霞上遊上嘯詠洞章清出入華房十轉回靈萬氣齊仙牒命魔殺鬼前祛符吏元始王敕真符命魔奔火前道通開含虛三皇欽崇威制群魔命魔密呪曰皇人曰凡誦此呪當面西北存九天之氣化九色之光降灌兆身而成圓象光映十方然後吸氣玄光入口咽液九過叩齒九通而通氣再拜想元始天尊降於空玄之中而呪曰黃中策氣斬祅宗察制強精斷邪翁太上有命太上房急召北帝詣玉宫受承威令宣魔王五氣蓊鬱與命衝祕藏玉文方就隆三天運明六天運終腎者哉出靈寶玉符人鳥經呪畢存元始天尊降金光自頂門而入兆身至于絳宫結成金液之丹光充八溢內外瑩明萬神敬聽三界廓然然後挑中指中而退執符開通道路密呪曰元始登引天真大神上聖髙尊妙行真人十方無極至真大神傾光回駕監真度生諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷急急如長生大帝律令三遍取天門氣一口吹符上彈訣再搯破穢訣燒符於鬼門上又呪曰元始符命時刻升遷張萬福天師曰天尊未説經之前諸天三界魔王五帝大魔皆為萬神之宗總領鬼兵遊觀太空自號赫奕與天齊功行威縱毒病苦萬人男女禱祝鼓舞以敬畏迎天尊説經之後百魔伏化而神公受命普掃不祥魔無干犯鬼無妖精衆魔既伏天尊聖化便為諸天上聖妙行真人策駕前驅掃塵啓道所以衆聖將欲遊天先令諸魔前驅策駕也經云魔王敬受事故能朝諸天是也所以𡵯虛當先存思命魔右三朝命魔張清都所言盡矣趙道升修黃籙儀認為內事止於午朝命魔蓋本政和金籙此是其所見錯處非經旨也供侍真君玄武祭祝章皇人曰玄武者乃玄元之化身抱虛危之二宿合水火之兩精聲振九天威降魔部夫行持之士朝真望闕入靖存神莫不以玄武之神通靈符而行法籙驅除瘟瘧剪滅邪魔察其行道之心純乃保舉於玉帝度心供侍無願不從此靈寶法中之從將者也祝文天聽甚卑有言而必察神鑒不逺無願而不成角動角而宫應宫誠感誠而德召德雖惡人齋戒沐浴事帝惟恭夫末學道淺疾傷行香獲福仰啓玄天大聖依皈北極之神稟日光而生形含隂精而受質生神靈長勇猛惟務修行輔玉帝斬妖魔斯救群品佩紫袍金帶履蒼龜巨蛇劒光射虛危之間神氣衝吳齊之分六丁前擁八煞後隨神統萬靈威鎮五嶽騰天倒地掣電奔雲破碎妖魔飄蕩鬼賊百靈咸遵戒令小鬼不敢現形人民無橫夭之尤家國有安寧之慶所祈必應有感咸通某幸參大法受靈寶之玄章佩印行符應天元之節度切慮建玄壇陛穢惡侵凌捨爾靈明叨噉有室非假威神之力曷為逸樂之方式逢下降之辰特啓供陳之禮仰冀神光暉映聖力潛通神不鬼而鬼不神正不邪而邪不正克應有求之願潛消無妄之災即使靖治興隆魔王畏懼早著功勳之籍速成大道之功臣稽首再拜召玄武玉符福德立降玄真六字右符搯子文念呪曰梵行諸天周回十方無量大神皆由我身敕符所至混玄合冥急急如律令供侍北辰祭祝章恭聞太極未分舍三才而周一氣兩儀既判齊七政以均四時運斗極於中天布星躔於象外分司闡化立極承天八王為萬彚之宗七聖作衆生之祖總七十二候之氣運二十入宿之司旋轉斗垣周臨地軌為車而調理網紀拱辰而統制乾坤喉舌是司樞機是握示魒星之所指四海知時觀罡氣之有輝八紘咸福三台齊色九氣同光掌天上之機衡定人間之禍福漢明帝仰瞻光範張天師參受真經立玄教於塵寰脫凡愚於世網矧兹動植實有依皈某恭行大法濟度存亡若不籍二斗之回旋運坎離之逆順欲成道法全假璇衡今者伏遇下降之辰特具燈燭之供伏冀七星垂鑒雲軿暫離於樞霄二帝丕臨羽駕權駐於壇墠注上生籍勾落死名七元之真氣常充五臟之神君各保早獲真常之道速成清淨之風臣謹稽首再拜召北斗玉符默運璇璣四字右符搯坎文念呪曰璇璣玉衡一時停輪執符把籙齊到帝前千和萬合自然成真急急如靈寶大法律令召祭身神章玄師曰凡受誦神文謝罪祈恩日中三朝上玄每遇行道六時行香三朝者日出日中日入别有修用自依本科六時者半夜平旦食時日中晡時黃昏六陽時也所謂六時行香正斯六時也香灰不可用竈中灰火內有伏龍糞道之大禁須以松柏枝葉火化成灰貯爐器中欲得烈火豐香一舉煙騰誠隨上逹不使綿翳也若持誦須綿綿使煙不絶可也其燒香火內勿使有辛菜膻烈草木及蟲蛀毛甲之物褻瀆上真太極仙翁多以栁竹燼同葵莖葉杵和成塊加甘松少許亦無歉此之香火不惟疾得火矧又經久一時不灰不翳多用為烈火少用則綿久仙翁又多取古藤根濯長泉中日曝乾同青木香玄參合搗而焚之去穢達誠降真致仙餘辛烈之氣不可用也焚香之法端心注意一志存念在煙不可反顧閉氣而鼻息默祝通息而拜心拜之理恐傾側九宫須以體存隨心曲伏也一身之主在於神氣神氣合符通真達靈神走氣雕禱神何應況一身靈寶全在於神是以心拜者神拜也靈寶五符祕序有召神之法兆冝勤行之乃萬道之首衆法之先其法於甲子本命月中二日十六日晦日一月五次入靖空中備心意好樂飲食潔素酒果八品而巳先靣東正坐收心靜氣定息寧神少時即上香三次叩齒二十四通呪曰丹元真人太一真人桃康真人胎光真人幽精真人爽靈真人眉神天靈腦神元先頂神東王耳神嬌女目神英明髮神長壽鼻神通靈口神丹朱舌神丹皇齒神衛士喉神虎賁肩神鬱靈手神魂隂心神詬詬肝神臨臨肺神祝祝臍神玉露胃神阻阻脾神禆禆腎神漂漂膽神獲獲丹田神藏精大腸神託託小腸神梁梁陽神窮英隂神幽靈䏶神隂隂膝神區區腰神孔男足神玄元大力天丁呼召三遍曰汝等出吾身中各各請坐前後左右自依本位今日吉日祭祀汝等任意飲食隨意哺食醉飽為效以盡為度祝訖存神如巳者百十人揖讓兆取飲食以盡為度又祝日汝等既醉且飽欣樂無極每遇吉日祭召即至常日之時勿得離吾未來吉凶一一先報吾知吾身常存汝等亦存吾有悲憂汝等亦有悲憂或有仙藥致之取之令吾所食今與汝等長生萬物劫變為期汝等即還吾身中各安所治急急如律令玄師曰坐知未然尸解朝元升仙通真以此為先十祭之後與兆交言百祭之後可致神仙金丹靈芝飲食俱全泄之一語折算十年自致不靈慎勿妄傳靈寶元量度人上經大法卷之四十九
