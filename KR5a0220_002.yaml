front:
  text: 靈寶無量度人上經大法卷之二
  hash: sha256:2b7a917fbf7ce7219290f80b2c72c3d53baa6acd6c4aef035d1bebc0e771287d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_002-001a, image: hfl/0085/0085-022.png}
body:
  text: 五譯成書品玄師曰八明可以開聰而五譯始成世書一譯玉字生於虛無之先隱乎空洞之中名大梵玉字至赤明開圖火錬成文為赤書玉字元始以大通神威之力開廓五文而生神靈宣緯演祕而成大法也二譯文錬成文赤書之後字方一丈八角垂芒覆於諸天下蔭西元九天之根流金之勢玉光金真之明煥耀太空元始命天真皇人書其文名八威龍文亦曰諸天八會之書祕於上清玄都金闕七寶瓊臺及紫微上宫蘭房金室東西華堂九天太霞之府也三譯元始天尊為道法宗主玉宸道君為靈寶教主撰此靈書五篇真文三十二天玉字成經名雲篆光明之章內王母授黃帝龍威丈人授大禹靈寶五符之法并太上後聖授百代帝王靈寶尊經並在三十六部經內更一稱譯兼黃帝問道峨嵋親見皇人再蒙授旨及吳左仙翁於太極徐真人降授流布亦更不重敘為譯四譯漢元封元年七月七日西王母下降以此經法授漢武帝帝亦不曉大梵之言王母曰元始是大羅天人道君是西那玉國人天方與神洲之言不同況大梵之言乎遂以筆書之攺天書玉字為今文以大梵之言威儀服御宫名圖書名色宫闕甲子卦氣壇式大法之內諸品行用三十六部尊經並係漢制世文之語為古今之法言也五譯自天真皇人悉書其文以為正音妙行真人撰集符書大法修用真定真人鬱羅真人光妙真人集三十六部真經符圖為中盟寶籙以三十六部真經之文為靈寶大法因此流傳吳左仙翁授經籙法訣於太極徐真人仙翁遺於上清真人楊君總其玉清洞真上清洞玄二品之經法後世漸有神文是第五譯也齋戒節度品玄師曰凡受行靈寶大法先須受無上十戒一執心平等不得自欺二忠於事君孝敬天地父母三慈仁及物貧儉節身四清淨端直不得阿黨五尊敬大法深信修行六敬重鬼神不得輕侮七凡所衣食皆出元始祖氣不得外想八灰水蕩穢不用修飾九口誦心拜無使勞形十七日大定神光湛然見玉清境玄師曰凡修誦此經通玄究微行道希仙先須受持齋法十二大戒一戒不殺二戒不害三戒不嫉四戒不妬五戒不淫六戒不盜七戒不貪八戒不欲九戒不憎十戒不嫉十一戒言無華綺十二戒口無惡聲玄師曰欲尊敬上法救死度生威伏群魔統制百靈受九真妙戒一者敬讓孝養父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損己六者不嗔凶怒凌入七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一玄師曰凡受諸戒須皈身皈神皈命無上三寶不得信從邪師影響幻惑妖妄外道魔鬼教法師類仙者第一皈依無上道寶第二皈依無上經寶第三皈依無上師寶玄師曰如上諸戒皆天尊金口所説受持無犯諸天稱慶滅諸魔試克獲升仙若犯之則地司飛奏三官紏劾五帝書過小則折算中則考校生魂大則計功墮事除壽減祿退品仙階若非故違尚許懴謝惟忌秋分謝而勿再犯三負不原玄師曰修奉大法依諸天吉日淨齋則天地書名九玄七祖俱登南宫一身清吉長生不死功滿成真慶及家門所向如願鬼神稽首萬真來朝每月一日東方玉寶皇上天尊并九氣天君下降八日南方玄真萬福天尊并三氣天君下降十四日西方太妙至極天尊并七氣天君下降十五日北方玄上玉晨天尊并五氣天君下降十八日東北度仙上聖天尊并梵氣天君下降二十三日東南好生度命天尊并梵氣天君下降二十七日西南太靈虛皇天尊并梵氣天君下降二十八日西北無量太華天尊并梵氣天君下降二十九日上方玉虛明皇天尊并梵氣天君下降三十日下方真皇洞晨天尊并九壘重隂土皇下降小月退二十七日玄師曰此十天下降之日宜淨齋謝過祈求恩祐奏告十天三會亦宜如之正月七日舉遷上會七月七日慶生中會十月五日建生大會玄師曰此三會與三元十五日皆是普度考校之辰又有五臘之日天尊所説真一父母恩重經此日宜齋戒祭祀先亡祖考誦經行道拔度亡者名為孝子餘日祭祀非帷淫祀亦亡者不享祭亦不獲其福正月一日天臘五月五日地臘七月七日道德臘十月一日民歲臘十二月內王侯臘玄師曰更有小三會庚申甲子本命日是也庚申日尸神白人罪過甲子日太一簡閲神祇本命日百神朝身八節日八方天真朝集校量罪福功過於上無八景宫中四立二至二分是也又有小節會宜醮祭作福誦經即真降獲福甲午天節會甲申地莭會甲辰四時節會甲子人節會甲戍五行節會丙午天之會壬午地之會庚午日之會庚申月之會辛酉星之會丁卯仙真會三日斗辰會本生日本命會玄師曰既為學仙之士修誦大法几遇一切厄會亦當修齋行香誦經天地運終星宿錯度日月失昏四時失度隂陽不調國主有災兵革四興疫毒流行兆民死傷師友命過此六條正是學士功行之要道且天地運終者大小隂陽九百六之期有天地坼裂之變有度數否終之厄皆須修齋行香誦經兼星宿錯行軌道凌犯芒剌妖彗凶悖之變日月簿蝕昏蒙之異亦當修齋行香誦經四時寒溫失於即度隂陽水旱不調非時行令逆氣作災九野興兵諸暴亂起東征西伐亂臣賊子干戈遍行亦當修齋行香誦經其諸至聖神人儻還宿業遭諸魔試橫悮罹苦否之時亦當修齋行香誦經末學之夫不遣玄域疾傷焉免况五穢塵世蟲蝗兵火疫毒王法太一兵運同慈相濟收還夙債亦當修齋行香誦經行是功德必獲真人之位為金闕之臣也玄師曰誦經有法具載修誦品行香有儀出於經緯一編其內齋者有四一則心齋二則常齋三則清淨齋四則長齋心齋者謹守天戒心意同符內外同儀無思無欲無慮無恐翛然坐忘德同真人道合仙格乃曰心齋次則常齋者絶辛去厭斷葷戒欲是也清淨齋者斷五穀絶人事居山林飲元氣特戒律忘塵根散胞胎杜交友是也長齋者並持巳上三齋之法或一月兩月一嵗兩嵗十年二十年是也以至終於飛升始於立意是也按玄都定罪律太極科曰五辛食之念誦條戒內為苐一罪誦修持諷誦觸犯神靈忤穢真氣獲毒蛇穿心獄報三厭食之永無仙冀又六畜之肉禽畜胎卵不可食之食之傷生伐命豬犬尤忌不惟破犯齋戒科禁使人雖功德足備天門阻遏不令進入亦章不達上元惟道士病患食乾脯獐鹿鵝鴨肉脯而巳病安故不食亦佳寶經除世品明寶經緘藏降世天尊於始青天中敷説此經以授道君又於太丹天中賜大梵之音道君序成之後上天為寶祕於玄都玉京紫微上宫緘藏至重非聖不傳後西王母上請於天帝降保甲申之災以付修真之士因此遂留於人世此經並是諸天上帝及至靈魔王隱祕之歌音內説天地劫運萬神名諱交會隂陽元氣生化其義不可得而盡解得悟道者自能洞明上天四萬劫一傳人間四十年一授輕泄漏慢殃及九祖禍及幽隂可不愼歟右以李少微注定此章明內音所因天尊於赤明世界柏陵舍坐是時雲霧鬱勃三日三夜冥隂不解五老上帝上奏天尊曰今日侍座所未曽見天尊敷教則致山海靜默天地肅清今白日隂瞑天地惶懼臣等有疑不審何故天尊告曰今日諸天發瑞靈應自然玉字煥爛障蔽天光咸令四座瞑目以俟俄頃天氣頓啓瞑暗豁消五色光明洞照十方各有靈書字方一丈見於空虛之中文彩煥赫八角垂芒精光晃目不可得看天尊普告衆真曰此靈書八會字無正形其趣宛奧爾等難可看詳乃命天真皇人注書其字解釋其音以賜太上道君總二百五十六字道君撰次成文是謂大梵隱語因序而載二章之後皇人者嘗於黃帝時下降峨嵋山授帝以三一五芽之法復升於天也右以內音經合列仙傳定此章靈寶無量度人上經大法卷之二
