front:
  text: 靈寳无量度人上經大法卷之二
  hash: sha256:4d688098dbb64067fc62d02b5880384b07c34aa41dda1f0348a6df624607aaa5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_002-001a, image: hfl/0085/0085-022.png}
body:
  text: 五譯成書品玄師曰八明可以開聦而五譯始成世書一譯玉字生於虚无之先隱乎空洞之中名大梵玉字至赤明開圖火錬成文爲赤書玉字元始以大通神威之力開廓五文而生神靈宣緯演祕而成大法也二譯文錬成文赤書之後字方一丈八角垂芒覆於諸天下蔭西元九天之根流金之勢玉光金眞之明煥耀太空元始命天眞皇人書其文名八威龍文亦曰諸天八會之書祕於上清玄都金闕七寳瓊臺及紫微上宫蘭房金室東西華堂九天太霞之府也三譯元始天尊爲道法宗主玉宸道君爲靈寳教主撰此靈書五篇眞文三十二天玉字成經名雲篆光明之章内王母授黄帝龍威丈人授大禹靈寳五符之法并太上後聖授百代帝王靈寳尊經並在三十六部經内更一稱譯兼黄帝問道峨嵋親見皇人再蒙授旨及呉左仙翁於太極徐眞人降授流布亦更不重叙爲譯四譯漢元封元年七月七日西王母下降以此經法授漢武帝帝亦不曉大梵之言王母曰元始是大羅天人道君是西那玉國人天方與神洲之言不同況大梵之言乎遂以筆書之攺天書玉字爲今文以大梵之言威儀服御宫名圖書名色宫闕甲子卦炁壇式大法之内諸品行用三十六部尊經並係漢制世文之語爲古今之法言也五譯自天眞皇人悉書其文以爲正音妙行眞人撰集符書大法修用眞定眞人鬱羅眞人光妙眞人集三十六部眞經符圖爲中盟寳籙以三十六部眞經之文爲靈寳大法因此流傳呉左仙翁授經籙法訣於太極徐眞人仙翁遺於上清眞人楊君總其玉清洞眞上清洞玄二品之經法後世漸有神文是第五譯也齋戒節度品玄師曰凡受行靈寳大法先須受无上十戒一執心平等不得自欺二忠於事君孝敬天地父母三慈仁及物貧儉節身四清淨端直不得阿黨五尊敬大法深信修行六敬重鬼神不得輕侮七凡所衣食皆出元始祖炁不得外想八灰水蕩穢不用修飾九口誦心拜无使勞形十七日大定神光湛然見玉清境玄師曰凡修誦此經通玄究微行道希仙先須受持齋法十二大戒一戒不殺二戒不害三戒不嫉四戒不妬五戒不婬六戒不盜七戒不貪八戒不欲九戒不憎十戒不𡜍十一戒言无華綺十二戒口无惡聲玄師曰欲尊敬上法救死度生威伏群魔綂制百靈受九眞妙戒一者敬讓孝養父母二者克勤忠於君主三者不殺慈救衆生四者不婬正身處物五者不盜推義損己六者不嗔凶怒凌入七者不詐諂賊害善八者不驕傲忽至眞九者不二奉戒專一玄師曰凡受諸戒須皈身皈神皈命无上三寳不得信從邪師影響幻惑妖妄外道魔鬼教法師類仙者第一皈依无上道寳第二皈依无上經寳第三皈依无上師寳玄師曰如上諸戒皆天尊金口所說受持无犯諸天稱慶滅諸魔試克獲昇仙若犯之則地司飛奏三官紏劾五帝書過小則折筭中則考校生魂大則計功墮事除壽減禄退品仙階若非故違尚許懴謝惟忌秋分謝而勿再犯三負不原玄師曰修奉大法依諸天吉日淨齋則天地書名九玄七祖俱登南宫一身清吉長生不死功滿成眞慶及家門所向如願鬼神稽首萬眞來朝每月一日東方玉寳皇上天尊并九炁天君下降八日南方玄眞萬福天尊并三炁天君下降十四日西方太妙至極天尊并七炁天君下降十五日北方玄上玉晨天尊并五炁天君下降十八日東北度仙上聖天尊并梵炁天君下降二十三日東南好生度命天尊并梵炁天君下降二十七日西南太靈虚皇天尊并梵炁天君下降二十八日西北无量太華天尊并梵炁天君下降二十九日上方玉虚明皇天尊并梵炁天君下降三十日下方眞皇洞晨天尊并九壘重隂土皇下降小月退二十七日玄師曰此十天下降之日宜淨齋謝過祈求恩祐奏告十天三會亦宜如之正月七日舉遷上會七月七日慶生中會十月五日建生大會玄師曰此三會與三元十五日皆是普度考校之辰又有五臘之日天尊所說眞一父母恩重經此日宜齋戒祭祀先亡祖考誦經行道拔度亡者名爲孝子餘日祭祀非帷滛祀亦亡者不享祭亦不獲其福正月一日天臘五月五日地臘七月七日道徳臘十月一日民歳臘十二月内王侯臘玄師曰更有小三會庚申甲子本命日是也庚申日尸神白人罪過甲子日太一簡閱神祇本命日百神朝身八節日八方天眞朝集校量罪福功過於上无八景宫中四立二至二分是也又有小節會宜醮祭作福誦經即眞降獲福甲午天節會甲申地莭會甲辰四時節會甲子人節會甲戍五行節會丙午天之會壬午地之會庚午日之會庚申月之會辛酉星之會丁卯仙眞會三日斗辰會本生日本命會玄師曰既爲學仙之士修誦大法几遇一切厄會亦當修齋行香誦經天地運終星宿錯度日月失昏四時失度隂陽不調國主有災兵革四興疫毒流行兆民死傷師友命過此六條正是學士功行之要道且天地運終者大小隂陽九百六之期有天地坼裂之變有度數否終之厄皆須修齋行香誦經兼星宿錯行軌道凌犯芒剌妖彗凶悖之變日月簿蝕昏蒙之異亦當修齋行香誦經四時寒温失於即度隂陽水旱不調非時行令逆炁作災九野興兵諸暴亂起東征西伐亂臣賊子干戈徧行亦當修齋行香誦經其諸至聖神人儻還宿業遭諸魔試横悮罹苦否之時亦當修齋行香誦經末學之夫不遣玄域疾傷焉免况五穢塵世蟲蝗兵火疫毒王法太一兵運同慈相濟收還夙債亦當修齋行香誦經行是功徳必獲眞人之位爲金闕之臣也玄師曰誦經有法具載修誦品行香有儀出於經緯一編其内齋者有四一則心齋二則常齋三則清淨齋四則長齋心齋者謹守天戒心意同符内外同儀无思无欲无慮无恐翛然坐忘徳同眞人道合仙格乃曰心齋次則常齋者絶辛去厭斷葷戒欲是也清淨齋者斷五糓絶人事居山林飲元炁特戒律忘塵根散胞胎杜交友是也長齋者並持巳上三齋之法或一月兩月一嵗兩嵗十年二十年是也以至終於飛升始於立意是也按玄都定罪律太極科曰五辛食之念誦條戒内爲苐一罪誦修持諷誦觸犯神靈忤穢眞炁獲毒蛇穿心獄報三厭食之永无仙冀又六畜之肉禽畜胎卵不可食之食之傷生伐命猪犬尤忌不惟破犯齋戒科禁使人雖功徳足備天門阻遏不令進入亦章不達上元惟道士病患食乾脯獐鹿鵝鴨肉脯而巳病安故不食亦佳寳經除世品明寳經緘藏降世天尊於始青天中敷說此經以授道君又於太丹天中賜大梵之音道君序成之後上天爲寳祕於玄都玉京紫微上宫緘藏至重非聖不傳後西王母上請於天帝降保甲申之災以付修眞之士因此遂留於人世此經並是諸天上帝及至靈魔王隱祕之歌音内說天地劫運萬神名諱交會隂陽元炁生化其義不可得而盡解得悟道者自能洞明上天四萬劫一傳人間四十年一授輕泄漏慢殃及九祖禍及幽隂可不愼歟右以李少微註定此章明内音所因天尊於赤明世界栢陵舎坐是時雲霧鬱勃三日三夜冥隂不解五老上帝上奏天尊曰今日侍座所未曽見天尊敷教則致山海靜黙天地肅清今白日隂瞑天地惶懼臣等有疑不審何故天尊告曰今日諸天發瑞靈應自然玉字煥爛障蔽天光咸令四座瞑目以俟俄頃天炁頓啓瞑暗豁消五色光明洞照十方各有靈書字方一丈見於空虚之中文彩煥赫八角垂芒精光晃目不可得看天尊普告衆眞曰此靈書八會字无正形其趣宛奥爾等難可看詳乃命天眞皇人注書其字解釋其音以賜太上道君總二百五十六字道君撰次成文是謂大梵隱語因序而載二章之後皇人者甞於黄帝時下降峨嵋山授帝以三一五芽之法復升於天也右以内音經合列仙傳定此章靈寳无量度人上經大法卷之二
