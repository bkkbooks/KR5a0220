front:
  text: 靈寶無量度人上經大法卷之七十出六
  hash: sha256:8bae1fe00c0158042c5b7340526a5072842fafb4b7c28309fa976717880a6b00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_070-001a, image: hfl/0099/0099-058.png}
body:
  text: 凝香昭應品道德香符應設醮拜章黃籙通用玉皇訣呪曰道德竒香變滿法界徹逹三境事誠感通長生度世急急如律令超度三界香符訣同前呪曰香超三界遍滿虛空徑逹御前浮結供養祈禱必通急急如律令右二符並黃紙朱書中指中文西北氣吹入符中普度亡魂香符訣同前用普度印呪曰大道慈悲隨聲咸度一切亡魂隨香普度開徹九幽飛騰太虛不可思議功德右呪三句用印傳符簡香符傳命印東氣呪曰元始符命普度亡魂金龍驛傳不得留停破九幽香符呪曰金光玉煙速噴帝前符命悉傳通達幽關九幽諸都速開罪魂超度南天沐浴亡魂香符沐浴印北氣呪曰玉泉瓊煙鍊玉飛升玄明瑩潔快樂自然急急如律令右符用青紙黃書掐子文取直北氣吹入符中焚於浴室中皇人曰亡人既蒙沐浴塵穢蕩除當易仙衣使登壇陛如不給衣則冠帶不具難對聖真故太上慈悲大法中有變衣之法以度魂爽符用黃紙朱書面南丁罡三步叩齒三通左手握天皇訣念呪而變變仙衣符呪曰九曜扶衰真氣變衣四神合衛五緯交暉氣分羅綺綵集空威六合扶挾三氣玄微至真煥爛仙女齊緋圓景素明元始慈悲急急如律令變衣呪曰唵吽吽呼嗚伐夷帝明都變鍊有形攝變冥食皇人曰亡魂夊居冥昧不遇肴羞常懷飢渴之思難遇飫充之饌喉嚨生火纍劫飢陽如遇大齋全憑變鍊行持之士當以甘露玉符焚于水中手結五嶽印誦詠袐章加持法食變為甘露亡人食之即獲清涼快樂生天回心向道絶諸苦惱具足飽滿行持之法左右手玉清訣存身為元始天尊列天門三氣降接兆身然後以氣吹符焚水中以楊栁枝灑之誦祕呪普救亡魂其福難勝變食符呪曰唵嗡囉哩長參陀他尼陀耶多伽陀彌陀變食呪曰酆都夜壑忽以光輝照燭幽魂來霑香麋靈寶鍊符百骸自飛得見妙會仙𡵨知歸萬劫難遇功緣可崇開闢幽趣全假真風梯航彼岸濟惠無窮念念生因駕景飛空甘露開咽喉符呪曰浩浩渺渺太上靈泉潤枯育物流注自然神華生液澄清太玄生魂育魄雲𣲖綿綿清泠保命猛火絶煙華池浩渺莫測其源急急如律令右符黃紙朱書三道燒於水中或吹於亡位前子文北氣鍊度生天香符五嶽印東氣呪曰洞慈洞明灌鍊九尸逹度玄天逍遙自在普度法橋香符呪曰法橋大度法橋普度急召急升步虛玄靈呪施夜齋香符五嶽印東氣焚於香爐內呪曰食滿十方通關百飽食之無盡普沾歆享召魂赴壇香符攝魂印東氣呪曰元始真文急召靈魂速赴吾壇領無上道受度法衣香符玉清訣東氣呪曰百色之衣流光飛霞服之飛升上步玄空飛遊太極領魂受經香符中氣呪曰金口所宣玉文所司音徹三界九幽罷對亡魂生天無量度人香符無量度人印東北氣呪曰天中之真天中之神九和十合變化上清尋聲救苦香符太一救苦印東氣右一點一畫稱太一號四寶符化一珍為千車之寶化一金為千車之金普及無窮之世界散霑無極之鬼神靈寶無量度人上經大法卷之七十
