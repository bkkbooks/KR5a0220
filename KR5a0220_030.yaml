front:
  text: 靈寶無量度人上經大法卷之三十生十
  hash: sha256:869ad1e10a7783077c274f7fa3a784a679bb5d639f75ae36768bf47aa77184f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_030-001a, image: hfl/0090/0090-130.png}
body:
  text: 欀度施用品師曰夫天地運度當素書龍章鳳氣之文於紫羅之上安於名山修誦是經以禳之或星宿錯度日月失昏當黃素朱書五老赤書玉字真文安於名山修誦以欀之或四時失度隂陽不調當青素朱書大梵正音之章於里域祠廟名山修誦以欀之或國主有災兵革四興當黃素朱書三十二天袐諱佩帶隨身修誦以欀之或疫毒流行兆民死傷當緑素丹書三十二天正音佩帶隨身修誦以欀之或師友命過當黃素朱書大梵隱語無量音以焚度之凡作用之際皆存身為靈寶天尊恰中指中莭取天門三氣面南而書之如遵法格修齋至念存誠書符誦詠則諸天記名萬神傳衛得為金關之臣魔王保舉也龍章鳳氣正文觀覺鬱繿大明紫靈九神度魂開闢玉真阿奕煒燁飛天流音輪景帝常都靈頥臻豁落大宥慶雲啓靈七曜輝魔恬懀敷榮虛無上首天紀彌宸四吁育象濯曜騰精煥赤洞陽浮景玉光七靈謠歌世元紫堂羅英散景曜明玉房八晨總獸韶主攝精九都騫鬱飛生上靈密羅淨境馥育空論灌沃黃華霐運玄明神宫開廓延宛丹庭大猷浮景真定化元蜒宛素眇玉梁澄煙蕭峙結嵎景羅七纒秀盤三府流暉九玄寂然虛邈飛華拂軿晨濫録籍大漠由延阿丘九度六龍舞轅蓊鬱浮羅紫精馥淵溟涬太育九機化乾覆形厚德元河淪精育英明陀景晨眇雲太隗總監秀樂禁天紫虛陀丘劫量交前碧霞韻梵眇眇遊元六變運量馘絶惡愆恢冠玄漠萬度成仙龍章鳳氣篆文靈寶無量度人上經大法卷之三十
  hash: sha256:d8779ab5dea8a4850d08981a70d0ddf95476c2ad697f69a452402a715a802ebe
