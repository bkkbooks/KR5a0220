front:
  text: 靈寶無量度人上經大法卷之二十二生二
  hash: sha256:0eff531e994a2119c78237f1da5d7b27854364370685af55be321849b514e6a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_022-001a, image: hfl/0089/0089-048.png}
body:
  text: 招靈求仙品凡修靈寶五篇真文思神念仙諸所求欲使時聞九天真人詣房身得神仙當以立春後甲寅乙卯日沐浴清齋平旦入室東向九拜平坐叩齒九通關啓身神畢閉眼思東嶽泰山青帝君姓歲諱嶚形長九寸九分頭戴青王通天冠衣青羽飛衣駕乘青龍從青腰玉女十二人從東方來降兆室良久青帝君化為嬰兒在青氣之中隨氣從兆口入徑到腹中思心生赤氣以貫繞肝府青赤二氣混沌相著如慶雲之沓煙覺肝中薰熱便咽九過仰祝曰東方九門中有始皇出入三清遨宴玉房安鎮靈嶽役運勾芒上統青霞九千九重參駕羽輦十二飛龍左侍青腰右衛神童把執簡籍青札玉文校定名仙列言上宫今日大吉請陳所言身佩赤書名參帝堂願神願仙青籙簿中上回靈駕來降我房二氣混合化形嬰朦安治肝府招致華光靈暉流灌靣生金容坐致自然神明交通身得長生天地無窮畢引青氣九咽止行此道九年則致青腰玉女九人東嶽泰山靈官來降為兆通致求願上聞九天生死父母罪書責役配屬東嶽則神明更相屬滅除罪名自得解脫升上福堂此法妙重生死津梁也常以立夏後丙午丁未之日沐浴清齋正中入室南向三拜平坐叩齒三通關啓身神畢閉眼思南嶽霍山赤帝君姓榮諱𣋎形長三寸三分頭戴赤玉通天寶冠衣丹羽飛衣駕乘赤龍從赤圭玉女十二人從南方來降兆室良久赤帝君化為嬰兒始生常在赤氣之中隨氣從兆口入徑至心中思脾生黃氣以貫繞心宫黃赤二氣混沌相著如炎火之爛光覺心中薰熱便三咽仰祝曰丹天三光南上玉門中有大神赤帝靈君衣丹帶符飛文羽裙駕乘赤龍與降飛雲南霍靈山萬神髙尊出入三清上宴九女赤圭玉女玉童衛真把執簡籙絳簿玉文校定仙品輕重上聞今日大吉靈嶽關仙上回髙神降我三門變化嬰兒鎮心安魂混合二氣纏我命根長與祝融駕乘景雲逍遙南河天地長存畢引赤氣三咽止行此道南嶽皆得解除刑名釋散升上天宫其法妙重生死開通常以春分夏莭秋分冬莭後戊辰戊戌巳丑巳未之日沐浴清齋日映入室向王十二拜平坐叩齒十二通關啓身神畢閉目思中嶽嵩山黃帝君姓惲諱𡾗形長一尺二寸頭戴黃玉通天寶冠衣黃羽飛衣駕乘黃龍從黃素玉女十二人從中嶽來降兆室良久黃帝君化為嬰兒始生狀在黃氣之中隨氣從兆口入徑至脾府思肺生白氣以貫繞脾宫黃白二氣混沌相著似黃雲之回天覺脾中薰熱便十二咽祝曰中央黃元總統四靈戊己中山元始上精黃帝大神參駕飛軿十二黃龍上宴三清玉女侍衛神童使令開山出圖投仙定名徘徊中嶽四王敷靈回真曲降流灌我形混合變化老帝成嬰鎮安黃宫府藏華榮身生竒毛內外光明真人交接通達九清得參黃軿飛升玉庭畢引黃氣十二咽止行此道中嶽靈官降房致黃素玉女十二人為兆通達關啓上聞九天生死父母罪書刑名係於中嶽皆得解滅罪書上名仙録去離地官升入福堂生死開泰度人無量常以立秋後庚申辛酉之日晡時沐浴清齋入室向西七拜平坐叩齒七通關啓身神畢閉眼思西嶽華隂山白帝君姓崇諱長七寸七分頭載素玉通天寶冠衣素羽飛衣駕乘白龍從白素玉女十二人從西嶽來降兆室良久白帝君化為嬰兒始生之狀在白氣之中隨氣入兆口中徑至肺府思賢生黑氣以貫繞肺宫白黑二氣混沌相著似慶雲之沓霄覺肺中黃熱便七咽仰祝曰七氣之天素黃金堂白帝大神安鎮四方華隂靈山號曰神王白羽飛裙建旗御龍上遊玄清出入華宫總領仙籍列簡詣方日吉佳辰萬聖宴峯徘徊九霞流散暉光金精煥煥白石洋洋開山觀靈神敷四鄉願道願仙願生願長上願既會靡不吉昌蓐收通真改我形容變化自成與氣同翔身飛輕舉上升紫房畢引白氣七咽止行此道則西嶽靈宫白帝降真白素玉女七人為兆通靈關啓所求皆聞九天生死父毋罪書邢名係於西嶽咸得解脫罪名自除名上仙籍去離五道求升福堂生死開度福至自然常以立冬後壬子癸亥之日子時木浴清齋入室北向五拜平坐叩齒五通關啓身神畢閉眼思北嶽恆山黑帝君姓晨諱形長五寸五分頭戴玄玉通天寶冠衣玄羽飛衣駕乘黑龍從太玄玉女十二人從北嶽來降兆室良久黑帝化為嬰兒始生之狀在黑氣之中隨氣入兆口中徑至腎府思肝生青氣以貫繞腎府青黑二氣混沌相著如碧雲之沓煙覺腎中薰熱便五咽仰祝曰五氣玄天上始精流結氣凝靈號曰仙廬安鎮北恆黑帝所遊遨宴北單參龍駕浮今日王吉萬靈開圖五氣徘徊慶雲四敷仙童執簡太玄度符記我仙籍金籙上書回真曲降混合嬰孩二氣交落洞觀我軀玄冥攜提神仙為儔永享天地萬劫無休畢引黑氣五咽止行此道北嶽靈官黑帝降真太玄玉女五人給已使令通致啓乞上聞九天生死父母罪名刑書係屬北嶽並蒙解除得度三惡之道上升天堂大妙上法普度無窮行此道當夷心靜思意注分明靈真易感得其法式不移年而覩神行來出入之向方生宫司迎魔靈消伏不敢干前心聰意慧自審吉凶五嶽五帝常為友賔神明交通坐致神仙上道髙奔品南極上元君曰吾受髙上順行三道之要黃氣陽精之道服御靈暉口啜皇華仰餐飛根存七曜於紫景行三道於金門洞於淵景明日月之方圓覩朱階於洞陽入錬陽於廣寒登七寶於玄圃攀飛梯於雲觀吸陽精於浮黎採黃氣於鬱單傍金翅於髙木回石景以映顏修御靈圖遂感神真乃三景垂映七精翼軒五靈交帶四司結篇西龜定録名題髙晨故位登南極此道髙妙非庸夫狹學所可言論兆宜詳之而行夫髙奔日月上道清齋五十日絶交人事欲得隱靜止令始暉之處若天隂日月不見時及所在隱密但於室中所卧處潔淨存心而思之唯在正心精思心至則無所不通臨目存念極令髣佛也臨目者當在閉與不閉之間也須令見日月之光景密而行之勿令有知見之者見之則靈芒不降修行上道先與人事隔絶自齋後皆宜清淨特宜獨建一室門向東開不然則窗東向牀亦宜向東卧處不要雜穢及别有衣服狼籍非上真可降之處日月是隂陽對景諸法亦併存之惟在精思純一無雜他思太素真人曰子存日精五帝君口含太上鬱儀文須此道成乃見日中君無此徒勞自煩寃太素真人曰子存月精五夫人口含太上結璘章須此道成乃見月中夫人無此徒勞自悼傷右二條太素真人受太帝君訣太上隱書云存時執之帝君云含之太素真人教裴君存時含一文執一文兼而行之各寫經中二奔法并諱字不用餘語日法以朱書青紙闊二寸許絳囊盛存時以右手執之月法以雌黃青紙書以黃錦囊盛右手執之又各朱黃細書一通於青薄帛上濶一寸許其字須極細急卷以蠟通丸之存時口含一通事訖以酒拭之安於香合內鬱儀帝君真諱日中赤氣上皇真君諱將車梁字髙騫爽心存以知不得輒呼此位號尊袐經中無存修之法日中青帝名圓常旡字照龍韜形如嬰兒衣青玉錦帔蒼華飛羽裙建翠芙蓉晨冠赤帝諱丹靈峙字緑虹映形如嬰兒衣絳玉錦帔丹華飛羽裙建丹符靈明冠白帝諱浩鬱將字回金霞衣素玉錦帔白羽飛華裙建皓靈芙蓉冠黑帝諱澄增淳字玄緑炎形如嬰兒衣玄玉錦帔黑羽飛華裙建玄山芙蓉冠黃帝諱壽逸阜字飊暉象形如嬰兒衣黃玉錦帔黃羽飛華裙建抉靈紫冠清旦其冠服焚香向日再拜盥漱畢口含經文當舌上以字首向內正坐同日出圓光上香心存上皇真君諱字便即心拜拜畢乃臨目臨目閉目自此後不得中開閉氣十息久正對日平坐仰手膝上左手執經文亦宜屈大指為握固右手亦握固又咽日光十過當存日光入口即吞之存日中有赤氣紫芒有九道心呼曰曜靈九神華芒九芒來注於靣乃小開口微吸而吞之十通訖閉氣想腹中光芒上連泥丸下通臟腑煥照形體洞徹內外良久仍存此光芒直至事畢勿令散絶次微呼帝君名字呼聲𦆵令自耳聞之次存月魂作九圓之象黃色稍小於日在日氣之中如浮光虛映勿以實質然既不言形狀但覺其中若有神相應而巳密呪曰月魂精神曖蕭臺標使我得到日窟之天東蒙長丘得受神暉之章帶九有之符食青精日飴飲雲碧之腴晏八極之城登明真之臺坐布林之殿詠玉晨之辭心中默念不得出聲次默祝曰願得與五帝真君日魂精神共乘景雲上奔日宫次又閉目存青帝從日中乘光芒而來在我之左心呼諱字又存赤帝從日中乘光芒而來在我之右心呼諱字又存白帝從日中乘光而來在我之背而立心呼諱字又存黑帝從日中乘光芒而來在我左手上心呼諱字又存黃帝從日中乘光芒而來在我右手上心呼諱字手既執文不可以開只於手上而立靣向我心呼諱字五帝都來存帝服色令髣佛各存既畢又皆存五處五帝形容服色一時而見叩齒五通咽液九過微祝曰小動唇出聲可令自耳稍聞赤爐丹景圓華九明太暉啓晨煥耀朱精五帝肇霞映洞萬生觀落上真空無條平運氣煉彩流蕩五形使我神化六腑敷榮參承降雲陽燧九軿上奔日宫與帝合靈念畢存日魂乘日光中來對我之靣去靣九寸許想其中有神在焉再叩齒三通咽液三過又微祝曰月魂精神同前又存陽燧絳雲之車如今車輅之狀駕九赤龍從日光中來到我之前自與身形俱忘存祝都畢澄心注想又想左右手上黑黃二帝各下手外兩邊而立即都忘五帝共擕我我作起形一時同登此車中而坐并存月魂亦在車上光芒之中還乘此光芒騰迅而往徑達日中即冥心罷想令恍惚忘形如長在日中良久咽唾十四過訖乃開目更勿視日凡諸莭度預宜究習一坐至畢不可致疑看文行之一年倣像二年見形三年下降四年便朗然洞徹靣有玉光五年成真十一年得乘雲車羽蓋駕命群龍上奔日宫受書為上清真人得給玉童二十六人玉女二十四人結璘夫人真諱月中黃氣上皇神母諱曜道支字玉薈條心存以知不得輒呼比位號尊袐經中無存修之法月中青帝夫人諱隱娥珠字芬艷嬰形如嬰兒衣青華瓊錦帔翠羽鳳文飛羽裙頭作頽雲三角髻餘髮垂至腰赤帝夫人諱翳逸寥字婉延虛形如嬰兒衣丹蘂玉錦帔朱華鳳落飛羽裙頺雲三角髻白帝夫人諱靈素闌字鬱連華衣白琳四出龍錦帔素羽鸞章飛華裙頺雲三角髻黑帝夫人諱結連翹字淳厲金衣玄琅九道雲錦帔黑羽龍文飛華裙頽雲三角髻黃帝夫人諱清營襟字炅定容衣黃雲山文錦帔緑羽鳳紋繡裙頽雲三角髻餘髮並垂至腰形同如嬰兒靜夜具冠服焚香對月再拜或月夕曉亦有髙下宜所在向之其朔後二三日初出之時日𦆵沒見月即可為之至月漸髙則待日光沒盡月色光明乃可行之其晦朔之間月形既盡固無可存修室中不得見月當出庭外或屋簷之下隂兩居室內口含經文當舌上字首向內對月長跪心存上皇神母諱字起兩手拊心而拜值望日月夕蝕則未可行之待蝕巳則行之拜畢乃臨目自此臨目閉目直至事畢不得中開閉氣九息對月平坐仰手膝上右手執經文左手握固仰靣向月為之九息者如脈四十五動之久咽月光九過當存月光入口中吞之存月中有黃氣白光八朗之芒心呼曰月華夜精八芒八芒來注於靣開口微吸而吞之九過訖閉氣想腹中光芒上達泥九下通臟腑朗照形體洞徹內外良久此光芒直至事畢勿令散絶微呼呼聲𦆵令自耳聞之次存日魂作辟方之景赤色如月之大在月氣之中浮光虛映勿以虛質又魂神既不言形狀但覺其中若有神相應而巳默祝曰日魂精神珠景赤童使我西到六嶺之門入協晨玉宫八絃素丘八景上房得帶十明之符佩流星夜光之章坐太和之殿登七靈之臺領月帶雲膏食若琬紫津之粘詠髙上之篇吟玉晨之辭心中點念不得出聲次點祝曰願得與五帝夫人日魂精神共乘飛雲上奔月宫又閉目存青帝夫人乘月光芒而來在我之左心呼諱字次存赤帝夫人乘月光芒而來在我之右靣向左心呼諱字又存白帝夫人從月光中來在我之背心呼諱字又存黑帝夫人從月光中來在我之左手執握固只於手上而立靣向我心呼諱字又存黃帝夫人從月光中來在我之右手執經文於手上而立靣向我心呼諱字五帝夫人都來形容服色一時而見乃叩齒九通咽液九過微祝曰黃精啓暉元隂內章映觀太玄開動萬方散蔚寒飈七晨懸琅回隂三合天地吐光紫曜挺落浮華九空圓明賦釆六氣化通五帝夫人躡雲抱風雲披鬱羅佩瓊帶璫羽裙拂霄逸虛扇東騫樹敷晨蓋條秀蓬雲蟇鍊摩扶養木公洞視萬里蔭藹五躬魂和神化六玄雲充還老歸嬰玉映反童時乘流鈴雲飛十龍上奔月宫位為保皇存日魂乘月光來對我靣之前去靣九寸訐想其中有神在焉又叩齒九通咽液九過又微祝曰日魂精神同前澄心注想見月中有流鈴之車車狀如今車輅之形飛雲為車之前齊駕十龍與雲相連靄靄然從光芒中來既到我前乃回龍車之柱左右手上黑黃二夫人各下手外立於兩邊即都存五夫人共擕我我作起形一時同登此車中而坐并日魂亦在車上光芒之中乘此光騰迅而往徑達月中冥心罷想令恍愡忘形如長在月中良久咽液三十過訖乃開目更勿瞻月凡諸莭度預冝究習一坐至畢不可致疑看文行之一年髣佛二年見形三年下降四年洞視身生流光五年成真十一年得乘玄龍轡上奔月宫為上清真人得給玉童二十六人玉女二十四人太素真人傳清靈真人裴君二事太上鬱儀結璘之章以致日月之精神上奔日月通天光飛太空之道也皆乘雲車羽蓋駕命群龍而上升皇天紫庭也內視中方曰子欲步空當存日月王欲登清靈當存五星密室密行不出宇庭此之謂也素奏丹符曰大哉鬱儀妙乎結璘非上真不見非上仙不聞以日月五精之神乘龍步空足躡景雲遂與五帝上入天門有人聞之愼勿妄言見雲笈二十三卷靈寶無量度人上經大法卷之二十二
