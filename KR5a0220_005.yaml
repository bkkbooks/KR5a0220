front:
  text: 靈寳无量度人上經大法卷之五霜四
  hash: sha256:bcfe4fe4e95fcd5f4ee035e7f022864796cbe21cc6605fdf8e44d26a01a44920
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_005-001a, image: hfl/0085/0085-130.png}
body:
  text: 靈寳符命品保命生根笑爾不度利見大人治財物耗散故爲歌音不能更生祛離縛鬼顚人吞三道萬災不干獨歩玉京鎭厭穢服之貼中庭昇去巍巍大梵德難可勝服之尸解解災佩鎭辟山精鎭肤穢河海靜黙山嶽藏雲治水怪治山中蜃毒等起毒瘴日月停景璇璣不行佩服聰鎭墓神明耳目起災群魔束形鬼精滅爽鎭佩佩之降魔煞鬼廻尸起死白骨成人斷尸鬼安卒人土中佩服辟瘟治之重生病貴佩子五帝侍衛軆木洞真佩辟瘟佩服生服治病智怗三界稽首通玄究微佩伏鬼鎭精怪魔精喪眼鬼妖滅爽佩令鬼佩鎭目不明滅鬼威未制天政徳可伏御地祇佩之治水黒通有威地道安井功滿徳就皆得神仙佩之和佩服生合道炁子却鬼飛昇金闕遊宴玉京久服服長換骨肌肉三色雲炁之中内外蓊明服佩辟三浸水洗眼尸去五蟲能視鬼神青龍白虎朱雀玄武鎭消鎭厭官符治火獅子白鶴日月照明入山林伏佩服治虎狼三尸身厭洞煥室内項生圓光鎭心佩服利狂邪見大人三五功曹左右官使者佩服令佩服令人神靈人夢靈侍香金童傳言玉女佩之金佩之玉女童報事報事和合五帝直符直日香官佩服治佩之上奏五臟病言皆通天今日吉慶長齊清堂佩鎭吉利佩服清心解散官事神安五臟元始洞玄靈寳本章鎭宅除佩服无夢吉辟魔魅利睡卧安寧離合自然混沌赤文佩鎭佩服鎭離散心顚邪元始祖劫化生諸天治獸鎭佩冤作怪債和平開明三景是爲天根治作犯治葬犯宅舍土山林无文不光无文不明佩服食爵鎭壓生遷轉官禄貴子无文不成无文不度鎭四方富度死貴安胎昇天无文不立无文不生佩服聰催生下明智慧死胎天中之天鬱羅蕭臺治瘟土治飛鳥入列箭宅作怪大羅玉清渺渺劫刃治鷄不治賊盗時鳴及佩身若亡若存三華離便治水鬼治巤作怪作怪大有妙庭金闕玉房治蠶不利佩服治落胎森羅淨霐大行梵炁治楫遊神治隂鬼山鬼山魈解呪詛中有度人中有南極不死之神長生之君佩服佩之延年保胎求子服之中有度世中有好生司馬大神韓君丈人求子佩服生佩服仙子中有南上司命司録延壽益筭度厄尊神廻骸起死佩服解厄延年求子下鬼胎佩服奪胎成男无量度人五老啓途佩服軀尸蟲治三元九蟲服之下群仙翼轅諸天丞相鎭火星火災治舊宅興災南昌上宫監生大神治犯竈神催生下死胎韓司主録執符把籍佩鎭生貴子催生下死胎齊到帝前隨所應度鎭五方五土治五方蠱炁嚴校諸天北都羅酆治隂小生瘡佩鎭佩鎭令鬼死三官九署十二河源辟三尸起龍治水怪上解祖考億劫種親鎭解先亡爲禍解七祖寃債疾除罪簿落滅惡根佩之落死籍解呪詛不得拘留逼合鬼群鎭遣禍崇佩服辟瘟元始符命時刻昇遷治心病治肺病北都寒池部衞形魂治腎病治脾病死魂受煉仙化成人治卒中貼心上治百蟲又治百神生身受度劫劫長存保身退災不失人身隨劫輪轉與天齊年安土治子斷命永度三塗五苦八難太皇黄曽天給付亡人超凌三界逍遥上清午生人清明何童天玄胎平育天未生人太明玉完天元明文舉天午生人申生人上明七曜摩夷天虚无越衡天申生人申生人太極濛翳天赤明和陽天酉生人酉生人玄明恭華天曜明宗飄天戌生人戌生人竺落黄茄天虚明堂曜天戌生人亥生人觀明端静天元明恭慶天亥生人子生人太煥極瑶天元載孔昇天子生人丑生人太安皇崖天顯定極風天丑生人寅生人始皇孝芒天太皇蓊重浮容天卯生人无思江由天上楪阮樂天卯生人辰生人无極曇誓天皓庭霄度天辰生人辰生人淵通元洞天太文翰寵妙成天辰生人酉生人太素秀樂禁上天太虚无上常融天酉生人巳生人太釋玉隆騰勝天龍變梵度天巳生人巳生人太極平育賈奕天寅生人九和十合變化上清鎭佩和合夫妻變化上清用請滅三惡斬絶地根滅三惡難絶地拫用巴元醜伯負天擔石治肝病治心病反山六目監醜朗馥治肺病治腎病横天擔力萬神之宗治脾病治客死鬼總領鬼兵麾幢鼓節治血尸鬼遊觀太空自號赫奕治夢遺治山鬼附人神公受命普掃不祥治身厭治鬼炁臨身八威吐毒猛馬四張治獄瘟伏强盜天丁前驅大帥仗幡治夢中鬼通治夜夢驚惶擲火萬里流鈴八衝治鬼打魔治尸見形敢有干試拒遏上真治尸見形治鬼燒火金鉞前戮巨天後刑治鬼盜物追還治鬼火損物屠割鬼爽風火无停治鼠咬物鎭宅祛瘟千千截首萬萬翦形書地上縳鬼書地上枷鬼祛瘟魔无干犯鬼无妖精治小兒天吊鬼治小兒驚風三官北酆明檢鬼營治小兒夜啼治人睡語不得容隱金馬驛程治物成精治六畜疫炁普告无窮萬神咸聽治蠱毒炁起光風澤洞虚金剛乘天治耳内響治旣鳴玄中太皇上帝髙真治釡鳴治山魈現形魅人紫虚鬰秀輔翼萬仙治人驚治雞作人語千和萬合自然成真和合財物和合衆事真中有神長生大善和合男女治門户自開无英公子白元尊神服之伏粮太一司命桃康令造服之絶粮度厄昇天下鎮人身泥丸絳宫服之絶粒安定心神布炁通血中理五炁混合百神服之安神遊魂照在手心故作洞文變化飛空解呪詛解冤業債以試爾身成敗懈退解負命之鬼解今中凶星度者幾人執符把籙解男女之鬼井泉湧沸靈寳束縛魔靈神呪乃是大梵之言天中自然靈音非世上常辭舊文字皆廣長一丈昔青城丈人傳自太上道君誦之者百魔攝伏魔鬼潜消萬神護佑乃書其符文爲丸吞之可以昇玄太空誦呪百徧道備飛天神王下觀其身書其功勤奏聞十天可得靈寳元始自然之理乃於其呪可克一二字與世人立應禍福生卒吉祥善惡无差若得至人受金寳效心盟天而傳輕泄漏慢殃及九祖是文若所在之處精邪爲害若書其文鎭之其他精邪皆托化水用得自然成大道之理矣靈寳无量度人上經大法卷之五
