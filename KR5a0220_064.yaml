front:
  text: 靈寶無量度人上經大法卷之六十四玉十二
  hash: sha256:74afc6cd34346f26da6c314d3b0b3bca78701dea7e57711d0be64a1796770e02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_064-001a, image: hfl/0096/0096-182.png}
body:
  text: 九煉生尸品田先生科皇人曰夫九煉生尸之法最為上道人始受生皆從虛無中來莫不資其昔業會遇今緣取象乾坤含懷日月變化隂陽神識往來萬化之中三焦潜凝九天冥運皆以九天生神之氣合和而生一月為胞鬱單無量天真氣降為之二月為胎上上禪善無量壽天真氣降為之三月魂具梵監須延天真氣降為之四月魄成寂然兜術天真氣降為之五月生五臟波羅尼密不驕樂天真氣降為之六月化腑洞玄化應聲天真氣降為之七月明竅靈化梵輔天真氣降為之八月景附髙虛清明天真氣降為之九月降神無想無結無愛天真氣降為之身中神萬八千內外相合三萬六千神一時生身金樓玉室紫戶靈布匝繞身中表裏相應聲尚神具三元養育九氣結形晝夜不停布化轉變黃神受質故入在胞胎中悉知前生之事禀生所由飲食濁穢便自忘之受生莫有不禀九氣而生今將九天之氣攝化布在八方則死骸返生枯朽發烟罪纍蕩除九天混合萬神具全神識了然則魂靈超於三天法天象地含隂抱陽生神布氣各有法訣纍行煉化以升入無形凡行九煉生尸法建九壇髙九尺闊八十一寸或髙九寸闊五寸以象九天壇之中心用黃絹幡闊九寸髙三十六寸上書本天氣符一道雌雄黃書牌上書九天帝號分布每壇各用青紙書九煉符一道安於壇上布燈九盞共九九八十一盞每壇各用神水一瓶黃紙密封法官於壇內執幡召靈步七星斗誦呪以幡召魂迎入壇下次上香再拜於九天帝前上茶酒宣九煉表焚告玄壇神虎玉札符檄行持入煉先關點破暗九天生神燈名曰九巵焚符畢法師然後步斗變神作昊天金闕上帝貌若玉皇上帝身居金光紫霧中左右真人金童玉女侍衛左右存想九天帝君宫殿了然四向皆九霄霞光煥照九宫帝君各遣神吏百千立於四圍了然如見次誦九章每一壇各隨帝氣焚之畢次搯九宫訣隨四季行月春則東方一壇行之夏則南方一壇行之秋則西方一壇行之冬則北方一壇行之搯本師訣誦九天生神章每壇各焚本氣符一道各玄元始氣吹之須旋繞誦大梵隱語以淨水灑之呪畢以亡魂逐壇移立於壇下先告九天陽符生魂生神次告九隂符以全魄全性次告靈寶五符以生萬神次隱語一遍取五方氣吹次取玄元始三氣吹之九真氣定體次明亡者宿命因緣即當愛其形保其神貴其氣固其根終不死壤而得神仙骨肉同飛上登三清是為三氣合德九氣齊仙也九煉科皇人曰先詣洞案上香引亡靈於案前面聖再上香三禮復位東向請聖上茶酒次步斗噀水燒催攝度魂符次誦焚符呪曰靈寶符命召魂真符攝召亡魂赴壇煉度急急凖上帝敕次念黃華蕩形天尊焚黃氣陽精符次念火煉丹界天尊焚大火煉身符次誦三章品宣關九巵燈科吹宣九天尊表旋繞九壇誦大梵隱語三遍次告九龍符命次念九天煉化天尊次用香九塊於逐壇爐內焚各用生神章本氣符同化次念變煉有形天尊再上香再祝云具法位上啓臣某伏聞希夷之閫固窈眇以難通恍愡之間惟精明而可叩切仰生神之典實標起死之功罔怠欽承庶回昭鑒焚香上啓元陽慈父扶桑大帝木公尊神道君白玉龜臺九靈太妙青金丹皇夫人金母尊神青靈始老九氣天君丹靈真老三氣天君皓靈皇老七氣天君鬱靈玄老五氣天君黃靈黃老一氣天君鬱單無量天帝上上禪善無量夀天帝梵監須延天帝寂然兜術天帝波羅尼密不驕樂天帝洞玄化應聲天帝靈化梵輔天帝髙虛清明天帝無想無結無愛天帝飛天神王長生大聖無英公子白元尊神九天太乙君九天續命君桃康合延君九天注生注祿君九天衛房聖母九天監生大神諸司注祿保命真君三界官屬一切威靈伏望慈光熠耀羽衛森嚴群仙翼轅衆真扈蹕沛璇霄之惠澤振寶葉之靈風俯降齊壇宏敷道蔭稽首皈依虔誠稱讃次焚雷文誦隱語焚返真符命次念返生頌曰代謝若循環椿木不攺柯靜心念至真隨運順離羅常能誦玉章玄音徹霄霞永享無終紀豈知年劫多次再拜上香臣等謹稽首頓首再拜上奏扶桑大帝木公尊神道君白玉龜臺九靈太妙青金丹皇夫人伏聞元始降氣妙物分精作天地之尊神為靈真之主宰周行元梵有形咸被於生成密運璇璣無物不歸於陶鑄重玄大化至妙難思今有某人奉為亡過某人修建寶齊資薦魂儀返生人道切以亡魂早纏世網夙昧真筌九氣無歸五行蕩失三魂受譴萬劫沉淪不假良因詎回生理臣等恭依妙典體乾坤造化之功祗按玄文法隂陽和合之數密行匹配仰謝元宗願降流水之精煉而為胞陽火之明煉而為胎乘木之貞煉而為魂柔金之形煉而為魄合土之英煉而為臟致坎之靈煉而為腑昭離之精煉而為竅激震之聲煉而為景利兌之榮煉而為神天和地合九煉徘徊復請元和妙氣纏繞身形純陽道氣經羅內外三元養育得成其形臣等仰對靈真敷揚寶偈頓首再拜次焚九煉符表次念金木流晶頌扶桑啓初運鬱鬱吐青芽妙用流金母和合自然葩神氣凝元宫靈物輝絳霞自得生人道冥寂契仙家再上香臣等謹上啓鬱單無量天帝上上禪善無量壽天帝梵監須延天帝寂然兜術天帝波羅尼密不驕樂天帝洞元化應聲天帝靈化梵輔天帝髙虛清明天帝無想無結無愛天帝臣恭聞三寶開光九神感妙無形無影有相有靈遊於太空之中列於隂陽之內正五緯之出沒使萬品以化生乃九氣齊并三氣合德臣今依式煉度亡魂某人先具奏請木公大帝尊神金毋太真尊神降兩曜之英華結五行之秀氣立根受祖溟悻生精感氣合神恍愡有象伏望九天上帝賜正氣於九關十極髙真含胎元於十月流精混沌育質玄中謹上請黃演之氣九重纏其胞使胞源宣通上徹於天以生成謹上請洞冥紫尸之氣九重纏其胎使胎結解根下響於地以固靈謹上請長靈明仙之氣九重纒其三魂使魂門煉仙通神以達精謹上請碭尸冥演由之氣九重纏其七魄使魄戶閉關天王降仙以安寧謹上請髙真沖融之氣九重纏其六腑使胃管生津以納和謹上請髙仙洞笈之氣九重纏其七竅使孔竅開聰星宿朗明以開通謹上請真靈化凝之氣九重纏其八景使三部八景整具形神幽夜光明以防身謹上請自然玄照之氣九重纏其身使三關五臟六腑九宫金樓玉室十二重門紫戶玉閣三萬六千關節根原本始一時生神令神布氣氣滿能聲聲尚神具毛髮生身諸天下臨乃得生成臣等無任祈天禱聖激切屏營之至謹稽首再拜次上香念九氣神化天尊夫三氣為天地之尊九氣為萬物之祖故三合成德九陽為真乃天地玄功之極也今則九天化象尚九結之未分十月生成尤十纏而難解降本巳就流末須分更仗帝真始終護度有勞官衆無雜正心誦大有之金章濟生尸之慶事次誦九章次五帝符行用焚青帝符誦呪曰謹召肝為青宫無英制魂君少陽木精歲星之氣納化身中以生肝三魂處之木神九人神吏九千衆速降真氣營衛皮膚主其毛髮焚白帝符誦呪曰謹召肺為素宫白元營魄君少隂金精太白之氣納化身中以生肺七魄處之金神七人領神吏七千人下治其中營衛筋骨主其牙齒焚黑帝符誦呪曰謹召賢為玄宫桃康納精君太隂水精辰星之氣納化身中以生賢左肩玉童右肩玉女處之水神五人從吏五千人主治其中營衛血骨主其生精焚赤帝符誦呪曰謹召心為絳宫太一司命君太陽火精熒惑之氣納化身中以生心左有玉童右有玉女處之火神三人從吏三千人主治其中營衛宫府主其魂魄焚黃帝符誦呪曰謹召脾為黃庭常在化靈君土精之氣納化身中以生脾土神一十二人領從吏一萬二千人主治其中營衛肌肉主化四肢血脉而生萬神虛皇一氣流布周身以生一萬二千精光神三萬六千毛竅神五臟納靈萬氣長存百神混合內外蓊冥返胎復嬰上朝帝君急急如九天生神帝君律令吹焚大梵隱語及護魂等符護魂符者乃本治天堂還形復性九天寶誥也次明亡者宿命章呪曰辰中黃景氣三秀發霄庭蒼臺飛羽輪迎延道巳成司命奏帝書號為玄度君得生太霞宫列賔館上卿金門含精延守其魂黃寧左携元素君右攝朱鬱靈次宣赦發遣九章誦徹五體生成汝等既膺大道之洪恩當禀上真之慈訓澄心皈向諦聽奉行蓋以九天之氣生其神三元之精育其質黃白致相混沌合形六甲周流五行交感法天象地含隂吐陽則地剛柔應天分度千真備列萬象森羅合道通真既尊且貴於是首為崑崙髮為星辰眉為華蓋眼為日月鼻為天柱耳為天窗口為天門面為天鍳五嶽四瀆九江八河一元二儀三光四象五行六律七元八景九宫十方三十六天三十六地莫不備焉皆大道之應妙神靈之所滋也汝等自當清虛滅欲正念無為則氣養其神神與氣合氣與精凝返胎更生漸登無何有之鄉可不樂哉如或躁動渾濁淫惡存心則傷害其神氣盡神逝魂沉六道魄役三塗無有休息可不悲哉即使三官增罪七祖遭殃劫劫生生不可窮盡汝能含純養素抱朴修真於慧性中超生樂土顧善惡因緣不可忽也更為亡靈開通冥路智慧光生贊揚功德次念智慧頌智慧生戒根真道戒為主三寶由是興髙仙所崇授泛此不死舟倐忽濟大有當此說戒時諸仙來稽首再拜上香三禮長跪致詞臣等伏為煉度亡魂冒干洪造仰蒙二儀育質九氣凝形千真皆會於三田萬象森羅於六腑百關和暢七竅開通魄靜魂寧神清氣爽即還生路永托真休臣等螻蟻微生醯雞小職繆依法教罔測玄風輒應命以祈真賴垂慈而濟物獲伸微悃祗荷傾光今則度品功圎生尸事畢伏望龍車鳳輦却返於瓊都羽蓋霓旌復升於絳闕馳心逈漢注想層霄更冀洪仁益施妙蔭臣不勝攀戀之至謹稽首再拜奉送靈寶無量度人上經大法卷之六十四
