front:
  text: 靈寳无量度人上經大法卷之六十四玉十二
  hash: sha256:d4c5d70e9b989905498a948854bfe927daf2411d559b635b2824d74827b55d16
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0220_HFL_064-001a, image: hfl/0096/0096-182.png}
body:
  text: 九煉生尸品田先生科皇人曰夫九煉生尸之法最爲上道人始受生皆從虚无中來莫不資其昔業會遇今縁取象乹坤含懷日月變化隂陽神識徃來萬化之中三焦潜凝九天冥運皆以九天生神之炁合和而生一月爲胞鬱單无量天真炁降爲之二月爲胎上上禪善无量壽天真炁降爲之三月魂具梵監須延天真炁降爲之四月魄成寂然兠術天真炁降爲之五月生五臓波羅尼密不驕樂天真炁降爲之六月化腑洞玄化應聲天真炁降爲之七月明竅靈化梵輔天真炁降爲之八月景附髙虚清明天真炁降爲之九月降神无想无結无愛天真炁降爲之身中神萬八千内外相合三萬六千神一時生身金樓玉室紫戸靈布匝繞身中表裏相應聲尚神具三元養育九炁結形晝夜不停布化轉變黄神受質故入在胞胎中悉知前生之事禀生所由飲食濁穢便自忘之受生莫有不禀九炁而生今將九天之炁攝化布在八方則死骸返生枯朽發烟罪累蕩除九天混合萬神具全神識了然則魂靈超於三天法天象地含隂抱陽生神布炁各有法訣累行煉化以昇入无形凡行九煉生尸法建九壇髙九尺闊八十一寸或髙九寸闊五寸以象九天壇之中心用黄絹幡闊九寸髙三十六寸上書本天炁符一道雌雄黄書牌上書九天帝號分布毎壇各用青紙書九煉符一道安於壇上布燈九盞共九九八十一盞每壇各用神水一瓶黄紙密封法官於壇内執旛召靈歩七星斗誦呪以旛召魂迎入壇下次上香再拜於九天帝前上茶酒宣九煉表焚告玄壇神虎玉札符檄行持入煉先關點破暗九天生神燈名曰九巵焚符畢法師然後歩斗變神作昊天金闕上帝貌若玉皇上帝身居金光紫霧中左右真人金童玉女侍衛左右存想九天帝君宫殿了然四向皆九霄霞光煥照九宫帝君各遣神吏百千立於四圍了然如見次誦九章毎一壇各隨帝炁焚之畢次搯九宫訣隨四季行月春則東方一壇行之夏則南方一壇行之秋則西方一壇行之冬則北方一壇行之搯本師訣誦九天生神章每壇各焚本炁符一道各玄元始炁吹之須旋繞誦大梵隠語以淨水洒之呪畢以亡魂逐壇移立於壇下先告九天陽符生魂生神次告九隂符以全魄全性次告靈寳五符以生萬神次隠語一徧取五方炁吹次取玄元始三炁吹之九真炁定體次明亡者宿命因縁即當愛其形保其神貴其炁固其根終不死壤而得神仙骨肉同飛上登三清是爲三炁合徳九炁齊仙也九煉科皇人曰先詣洞案上香引亡靈於案前面聖再上香三禮復位東向請聖上茶酒次歩斗噀水燒催攝度魂符次誦焚符呪曰靈寳符命召魂真符攝召亡魂赴壇煉度急急凖上帝敕次念黄華蕩形天尊焚黄炁陽精符次念火煉丹界天尊焚大火煉身符次誦三章品宣關九巵燈科吹宣九天尊表旋繞九壇誦大梵隠語三徧次告九龍符命次念九天煉化天尊次用香九塊於逐壇爐内焚各用生神章本炁符同化次念變煉有形天尊再上香再祝云具法位上啓臣某伏聞希夷之閫固窈眇以難通恍愡之間惟精明而可叩切仰生神之典實標起死之功罔怠欽承庶回昭鑒焚香上啓元陽慈父扶桑大帝木公尊神道君白玉龜臺九靈太妙青金丹皇夫人金母尊神青靈始老九炁天君丹靈真老三炁天君皓靈皇老七炁天君鬱靈玄老五炁天君黄靈黄老一炁天君鬱單无量天帝上上禪善无量夀天帝梵監須延天帝寂然兠術天帝波羅尼密不驕樂天帝洞玄化應聲天帝靈化梵輔天帝髙虚清明天帝无想无結无愛天帝飛天神王長生大聖无英公子白元尊神九天太乙君九天續命君桃康合延君九天注生注禄君九天衞房聖母九天監生大神諸司注禄保命真君三界官属一切威靈伏望慈光熠耀羽衛森嚴群仙翼轅衆眞扈蹕沛璇霄之惠澤振寳葉之靈風俯降齋壇宏敷道蔭稽首皈依虔誠稱讃次焚雷文誦隠語焚返真符命次念返生頌曰代謝若循環椿木不攺柯靜心念至真隨運順離羅常能誦玉章玄音徹霄霞永享无終紀豈知年劫多次再拜上香臣等謹稽首頓首再拜上奏扶桑大帝木公尊神道君白玉龜臺九靈太妙青金丹皇夫人伏聞元始降炁妙物分精作天地之尊神爲靈真之主宰周行元梵有形咸被於生成密運璇璣无物不歸於陶鑄重玄大化至妙難思今有某人奉爲亡過某人修建寳齋資薦魂儀返生人道切以亡魂早纏世網夙昧真筌九炁无歸五行蕩失三魂受譴萬劫沉淪不假良因詎回生理臣等恭依妙典體乹坤造化之功祗按玄文法隂陽和合之數密行匹配仰謝元宗願降流水之精煉而爲胞陽火之明煉而爲胎乘木之貞煉而爲魂柔金之形煉而爲魄合土之英煉而爲臓致坎之靈煉而爲腑昭離之精煉而爲竅激震之聲煉而爲景利兌之榮煉而爲神天和地合九煉徘徊復請元和妙炁纏繞身形純陽道炁經羅内外三元養育得成其形臣等仰對靈真敷揚寳偈頓首再拜次焚九煉符表次念金木流晶頌扶桑啓初運鬱鬱吐青芽妙用流金母和合自然葩神炁凝元宫靈物輝絳霞自得生人道冥寂契仙家再上香臣等謹上啓鬱單无量天帝上上禪善无量壽天帝梵監須延天帝寂然兠術天帝波羅尼密不驕樂天帝洞元化應聲天帝靈化梵輔天帝髙虚清明天帝无想无結无愛天帝臣恭聞三寳開光九神感妙无形无影有相有靈遊於太空之中列於隂陽之内正五緯之出没使萬品以化生乃九炁齊并三炁合徳臣今依式煉度亡魂某人先具奏請木公大帝尊神金毋太真尊神降兩曜之英華結五行之秀炁立根受祖溟悻生精感炁合神恍愡有象伏望九天上帝賜正炁於九關十極髙真含胎元於十月流精混沌育質玄中謹上請黄演之炁九重纏其胞使胞源宣通上徹於天以生成謹上請洞冥紫尸之炁九重纏其胎使胎結解根下響於地以固靈謹上請長靈明仙之炁九重纒其三魂使魂門煉仙通神以達精謹上請碭尸冥演由之炁九重纏其七魄使魄戸閉關天王降仙以安寜謹上請髙真沖融之炁九重纏其六腑使胃管生津以納和謹上請髙仙洞笈之炁九重纏其七竅使孔竅開聦星宿朗明以開通謹上請真靈化凝之炁九重纏其八景使三部八景整具形神幽夜光明以防身謹上請自然玄照之炁九重纏其身使三關五臓六腑九宫金樓玉室十二重門紫戸玉閣三萬六千關節根原本始一時生神令神布炁炁滿能聲聲尚神具毛髪生身諸天下臨乃得生成臣等无任祈天禱聖激切屏營之至謹稽首再拜次上香念九炁神化天尊夫三炁爲天地之尊九炁爲萬物之祖故三合成徳九陽爲真乃天地玄功之極也今則九天化象尚九結之未分十月生成尤十纏而難解降本巳就流末須分更仗帝真始終護度有勞官衆无雜正心誦大有之金章濟生尸之慶事次誦九章次五帝符行用焚青帝符誦呪曰謹召肝爲青宫无英制魂君少陽木精𡻕星之炁納化身中以生肝三魂處之木神九人神吏九千衆速降真炁營衞皮膚主其毛髮焚白帝符誦呪曰謹召肺爲素宫白元營魄君少隂金精太白之炁納化身中以生肺七魄處之金神七人領神吏七千人下治其中營衞筋骨主其牙齒焚黒帝符誦呪曰謹召賢爲玄宫桃康納精君太隂水精辰星之炁納化身中以生賢左肩玉童右肩玉女處之水神五人從吏五千人主治其中營衞血骨主其生精焚赤帝符誦呪曰謹召心爲絳宫太一司命君太陽火精熒惑之炁納化身中以生心左有玉童右有玉女處之火神三人從吏三千人主治其中營衞宫府主其魂魄焚黄帝符誦呪曰謹召脾爲黄庭常在化靈君土精之炁納化身中以生脾土神一十二人領從吏一萬二千人主治其中營衞肌肉主化四肢血脉而生萬神虚皇一炁流布周身以生一萬二千精光神三萬六千毛竅神五臓納靈萬炁長存百神混合内外蓊冥返胎復嬰上朝帝君急急如九天生神帝君律令吹焚大梵隱語及護魂等符護魂符者乃本治天堂還形復性九天寳誥也次明亡者宿命章呪曰辰中黄景炁三秀發霄庭蒼臺飛羽輪迎延道巳成司命奏帝書號爲玄度君得生太霞宫列賔舘上卿金門含精延守其魂黄寜左携元素君右攝朱鬱靈次宣赦發遣九章誦徹五體生成汝等既膺大道之洪恩當禀上真之慈訓澄心皈向諦聽奉行蓋以九天之炁生其神三元之精育其質黄白致相混沌合形六甲周流五行交感法天象地含隂吐陽則地剛柔應天分度千真備列萬象森羅合道通真既尊且貴於是首爲崑崙髮爲星辰眉爲華蓋眼爲日月鼻爲天柱耳爲天䆫口爲天門面爲天鍳五嶽四瀆九江八河一元二儀三光四象五行六律七元八景九宫十方三十六天三十六地莫不備焉皆大道之應妙神靈之所滋也汝等自當清虚滅欲正念无爲則炁養其神神與炁合炁與精凝返胎更生漸登无何有之郷可不樂哉如或躁動渾濁滛惡存心則傷害其神炁盡神逝魂沉六道魄役三塗无有休息可不悲哉即使三官增罪七祖遭殃劫劫生生不可窮盡汝能含純養素抱朴修真於慧性中超生樂土頋善惡因縁不可忽也更爲亡靈開通冥路智慧光生賛揚功德次念智慧頌智慧生戒根真道戒爲主三寳由是興髙仙所崇授泛此不死舟倐忽濟大有當此說戒時諸仙來稽首再拜上香三禮長跪致詞臣等伏爲煉度亡魂冒干洪造仰蒙二儀育質九炁凝形千真皆會於三田萬象森羅於六腑百關和暢七竅開通魄靜魂寜神清炁爽即還生路永托真休臣等螻蟻微生醯鷄小職繆依法教罔測玄風輒應命以祈真頼垂慈而濟物獲伸微悃祗荷傾光今則度品功圎生尸事畢伏望龍車鳳輦却返於瓊都羽蓋霓旌復昇於絳闕馳心逈漢注想層霄更冀洪仁益施妙蔭臣不勝攀戀之至謹稽首再拜奉送靈寳无量度人上經大法卷之六十四
